}

// In-season DNPQ firing checkpoints — runs at two rounds around each boundary rather than a
// single concentrated one: 'two weeks before' and 'one week before' the mid-season recalc, and
// the same pair before the finale (e.g. rounds 6/7 and 14/15 in a 16-round season). Uses
// _seasonDNPQCountSinceRecalc (reset when the recalc happens) rather than the full-season
// counter used by the end-of-season check, and scales the threshold to the size of the
// window being judged rather than the full season, so a driver isn't judged against a
// standard calibrated for 16 rounds when only 6 have actually happened since the reset.
function checkMidSeasonDNPQFirings(movementNews){
  const w=app.currentWeekend;
  const round=w.raceMeta.round;
  const rules=seasonRules();
  const totalRounds=rules.totalRounds||16;
  const recalcRound=rules.preqRecalcAfterRound||8;
  const isBeforeRecalc=round===recalcRound-2||round===recalcRound-1;
  const isBeforeFinale=round===totalRounds-2||round===totalRounds-1;
  if(!isBeforeRecalc&&!isBeforeFinale)return;
  const windowSize=isBeforeRecalc?round:(round-recalcRound);
  if(windowSize<=0)return;
  const dnpqThreshold=Math.max(2,Math.ceil(0.4*windowSize));
  const counts=app._seasonDNPQCountSinceRecalc||{};
  [...(app.preqDriverIds||[])].forEach(id=>{
    const d=BASE_DRIVERS.find(x=>x.id===id);
    if(!d||d.team==='Available'||d._retired||d._temp)return;
    // Needs at least 2 rounds actually established at THIS team — otherwise a driver hired
    // just the round before (whose season-long DNPQ count may be entirely, or mostly, from
    // an earlier stint at a DIFFERENT team) could be judged and fired within a single race
    // of arriving. Give them more than one race to actually prove themselves here first.
    if(roundsSinceTeamJoin(id,d.team,round)<2)return;
    const dnpqCount=counts[id]||0;
    if(dnpqCount<dnpqThreshold)return;
    // Scale directly off the same formula used for the end-of-season DNPQ firing check,
    // rather than an independent formula. Each boundary now gets checked at two rounds
    // instead of one, so the per-checkpoint multiplier is reduced (p = 1-sqrt(1-T)) so the
    // COMBINED chance of being caught across the pair lands close to what the old single
    // checkpoint produced (~50% before the recalc, ~75% before the finale) — smoothing the
    // firing out across two rounds rather than roughly doubling the total risk.
    const _eosEquivalentProb=Math.min(0.80,((dnpqCount-dnpqThreshold+1)/dnpqThreshold)*0.50+0.30);
    const prob=_eosEquivalentProb*(isBeforeRecalc?0.29:0.50);
    if(Math.random()>=prob)return;
    const team=d.team;
    const name=driverFullName(d);
    const nation2=d.nation2;
    releaseDriverFromTeam(d,'fired');
    recordDriverIncident(id,'teamChange',{action:'fired',fromTeam:team,round,year:app.currentSeason,reason:'poor-qualifying'});
    recordDriverMovement(id,'fired',team,null,`Too many DNPQs (${dnpqCount} of ${windowSize} rounds since ${isBeforeRecalc?'start of season':'recalc'})`,round,app.currentSeason,name);
    let repl;
    if(!isBeforeRecalc){
      // Pre-finale check: pick a genuinely random driver from the pool regardless of
      // modifier fit — simulates a pay driver being brought in for the season's remaining
      // rounds rather than a considered performance-based signing.
      initSeasonFAPool();
      const eligiblePool=(app._seasonFAPool||[]).filter(fa=>faEligible(fa.id)&&!(app._seasonTeamBlocklist?.[fa.id]||[]).includes(teamCanonicalName(team)));
      repl=eligiblePool.length?eligiblePool[Math.floor(Math.random()*eligiblePool.length)]:null;
    } else {
      repl=findReplacement(team,BASE_DRIVERS.map(x=>x.id),false);
    }
    // Push to _firedNews (matching the structure the standard firing/replacement display
    // reads from) rather than _movementNews as a plain string — this is the array that
    // actually surfaces in the player-facing race news; _movementNews only feeds the debug
    // export and a few specific news sections (rivalry, contract returns) that explicitly
    // filter out firings/hires to avoid double-displaying them here.
    if(!w._firedNews)w._firedNews=[];
    const _firedEntry={action:'fired',reason:'poor-qualifying',nation2,originalName:name,team};
    if(repl){
      hireReplacement(repl,team,999,null);
      _firedEntry.replacementName=driverFullName(repl);
      _firedEntry.replacementNation2=repl.nation2||repl.n2||'';
    }
    w._firedNews.push(_firedEntry);
  });
}
// Reputation penalty for severe underperformance at a top team: a driver whose season
// points share of their team's total is well below what their seat deserves takes a
// scaled modifier hit, on top of (and independent of) any mid-season firing that may or
// may not have happened — a driver who survived the season at the team still needs
// their reputation to reflect how poor it actually was. Runs immediately after the last
// race of the season (not during the EoS transition) so the driver enters every EoS
// stage — retirements, movements, signings — already carrying the lower modifier, with
// no need to reorder anything in the EoS pipeline itself.
function applyReputationPenaltyAfterLastRace(movementNews){
  const REP_TEAM_THRESHOLD=3.0;
  const _repYear=app.currentSeason;
  const _stForRep=seasonStandings(_repYear);
  const _repWeekends=app.history.weekends.filter(w=>w.raceMeta.year===_repYear).sort((a,b)=>b.raceMeta.round-a.raceMeta.round);
  const _driverTeamAtSeasonEndRep=driverId=>{
    for(const w of _repWeekends){
      const entry=(w.race||[]).find(r=>r.id===driverId)||(w.qualifying||[]).find(r=>r.id===driverId)||(w.prequalifying||[]).find(r=>r.id===driverId);
      if(entry)return teamCanonicalName(entry.team);
    }
    return null;
  };
  const _driverIdsThisSeasonRep=new Set();
  _repWeekends.forEach(w=>{
    (w.race||[]).forEach(r=>_driverIdsThisSeasonRep.add(r.id));
    (w.qualifying||[]).forEach(r=>_driverIdsThisSeasonRep.add(r.id));
    (w.prequalifying||[]).forEach(r=>_driverIdsThisSeasonRep.add(r.id));
  });
  const _repByTeam={};
  _driverIdsThisSeasonRep.forEach(id=>{
    const team=_driverTeamAtSeasonEndRep(id);
    if(!team)return;
    if(!_repByTeam[team])_repByTeam[team]=[];
    _repByTeam[team].push(id);
  });
  if(!app._repPenalizedIds)app._repPenalizedIds=[];
  Object.entries(_repByTeam).forEach(([team,driverIds])=>{
    const ttmRep=teamTotalMod(team);
    if(ttmRep<REP_TEAM_THRESHOLD)return;
    const teamSeasonPtsRep=driverIds.reduce((s,id)=>{
      const dSt=_stForRep.drivers.find(x=>x.id===id);
      return s+(dSt?.championshipPoints||0);
    },0);
    if(teamSeasonPtsRep<30*_scoringScaleForYear(_repYear))return;
    driverIds.forEach(id=>{
      // Exclude anyone who joined this team mid-season (injury/suspension replacement,
      // or a permanent mid-season signing) — they weren't there for the full season's
      // worth of points, so judging their share of the team's total isn't a fair
      // reputation signal. Only a driver who was there for the team's FULL season gets
      // judged by it.
      const _joinedMidSeasonRep=(app.driverIncidents?.[id]||[]).some(inc=>
        inc.type==='teamJoin'&&inc.year===_repYear&&teamCanonicalName(inc.details?.team||'')===team&&(inc.details?.round||0)>0);
      if(_joinedMidSeasonRep)return;
      // Minimum appearance gate: a driver who missed most of the season to injury (even
      // if they were on the team from round 1) shouldn't be judged on the same 15%-share
      // standard as someone who raced the whole year — their tiny points total reflects
      // limited opportunity, not underperformance.
      const _driverRaceCountRep=_repWeekends.filter(w=>(w.race||[]).some(r=>r.id===id)).length;
      const _appearanceRatioRep=_repWeekends.length>0?_driverRaceCountRep/_repWeekends.length:0;
      if(_appearanceRatioRep<0.75)return;
      const dSt=_stForRep.drivers.find(x=>x.id===id);
      const dPtsRep=dSt?.championshipPoints||0;
      const shareRep=dPtsRep/teamSeasonPtsRep;
      if(shareRep>=0.15)return;
      // Scale between 0.20 and 0.30 based on how severe the shortfall is and how strong
      // the team is — a driver at a merely-good team missing 15% by a little still gets
      // a meaningful penalty (0.20 floor), while a driver at a dominant team
      // contributing almost nothing tops out at 0.30.
      const _severityRatio=Math.min(1,(0.15-shareRep)/0.15);
      const repPenalty=Math.min(0.30,0.20+_severityRatio*0.10*(1+(ttmRep-REP_TEAM_THRESHOLD)*0.15));
      if(repPenalty>0.01){
        const _dispName=BASE_DRIVERS.find(x=>x.id===id)?driverFullName(BASE_DRIVERS.find(x=>x.id===id)):(DRIVER_DATABASE.find(x=>x.id===id)?`${DRIVER_DATABASE.find(x=>x.id===id).fn} ${DRIVER_DATABASE.find(x=>x.id===id).ln}`:`Driver ${id}`);
        applyDriverMod(id,-repPenalty);
        recordMod('driver',id,_dispName,-repPenalty,`Failed to convert a top team drive into results (${dPtsRep}/${teamSeasonPtsRep} team points)`,'race');
        app._repPenalizedIds.push(id);
        if(movementNews)movementNews.push(`📉 <strong>${escapeHtml(_dispName)}</strong>: <span class="modifier-neg">-${repPenalty.toFixed(2)}</span> — failed to convert a top team drive into results (${dPtsRep}/${teamSeasonPtsRep} team points).`);
      }
    });
  });
}
function finishWeekend(){
  const w=app.currentWeekend;
  if(w.weekendFinished)return; // guard against double-invocation (was previously possible to duplicate every modifier log entry for the race)
  assignChampionshipPoints();
  const race=w.sessions.race;
  const active=race.drivers.filter(d=>d.status==='active').sort(compareRaceActive);
  const inactive=race.drivers.filter(d=>d.status!=='active').sort(compareInactive);
  race.finishedOrder=[...active.map(d=>d.id),...inactive.map(d=>d.id)];
  w.displayOrder=[...race.finishedOrder];
  w.weekendFinished=true;w.sessionFinished=true;
  const _raceResults=race.finishedOrder.map((id,i)=>{const d=race.drivers.find(x=>x.id===id);const qd=app.currentWeekend.sessions.qualifying.drivers.find(x=>x.id===id);return{id,position:i+1,team:teamDisplayName(d.base.team),gridPos:d.gridPos||0,qualifyingPos:qd?(app.currentWeekend.sessions.qualifying.finishedOrder.indexOf(id)+1):99,status:d.status,retirementReason:d.retirementReason||'',points:d.points||0,totalNumeric:d.totalNumeric||0,bonus:d.bonus||0,laps:d.laps||[]};});
  updateModifiersAfterRace(_raceResults);
  // Pre-qual failures for inexperience scale-down
  const _preqAdvFail=app._preqAdvanceOverride||seasonRules().preqAdvance||6;
  const _preqFailed=app.currentWeekend.sessions.prequalifying?(app.currentWeekend.sessions.prequalifying.finishedOrder||[]).slice(_preqAdvFail):[]; // positions 7+ failed to qualify
  const _qualifiedIds=(app.currentWeekend.sessions.qualifying?.drivers||[]).map(d=>d.id);
  updateInexperienceAfterRace(_raceResults,_preqFailed,_qualifiedIds);
  // Apply random modifiers
  const randMods=applyRandomModifiers(false);
  w._randMods=randMods;
  // Clear one-race qualifying retirement penalties after race
  if(app._qualiRetirementPenalty) app._qualiRetirementPenalty={};

  // ── Run all post-race driver movement BEFORE recording history so news is complete ──
  if(!w._firedNews)w._firedNews=[];
  const _movementNews=w._movementNews||[];
  // Keep w._movementNews pointing at this SAME array from here on. Some nested
  // functions push directly onto app.currentWeekend._movementNews
  // (== w._movementNews) rather than the local variable — if w._movementNews were left
  // undefined until later, those pushes would land in a different array object that
  // then gets discarded when w._movementNews is reassigned below, silently losing news
  // (this was causing driver-poaching news to disappear).
  w._movementNews=_movementNews;
  // Do not process firings/quits after last round — season end, new-season logic handles this separately
  const _isLastRound=w.raceMeta.round>=seasonRules().totalRounds;
  if(!_isLastRound){
    evaluateAndFireDrivers(_raceResults,_movementNews);
    checkMidSeasonDNPQFirings(_movementNews);
    // Hire injury/suspension replacements NOW (not deferred to next newWeekend)
    // so replacement names appear in this race's news
    const _nextRound=w.raceMeta.round+1;
    const _earlyFills=ensureAllSeatsFilledBeforeWeekend(_nextRound);
    // Append seat fill news to this race's movement news
    _earlyFills.filter(n=>!n.startsWith('⚠')&&!n.includes('signs (')).forEach(n=>_movementNews.push(n));
  } else {
    applyReputationPenaltyAfterLastRace(_movementNews);
  }
  w._movementNews=_movementNews;

  // Check contract expirations BEFORE recording history so TEAMRETURN items
  // are captured in the history entry and appear in post-race news.
  // Pass the just-completed round explicitly (not yet in history count).
  const _completedRoundForContracts=currentSeasonEntries().length+1;
  const _returnedDriverIds=new Set();
  checkContractExpirations(_movementNews, _completedRoundForContracts, _returnedDriverIds);
  checkLoanExpirations(_movementNews, _completedRoundForContracts, _returnedDriverIds);

  // Fallback: guarantee a news item whenever a driver's injury/suspension ends,
  // even if no replacement contract exists to expire (e.g. the free-agent pool
  // had no cover available at the time, so the driver was simply never subbed out).
  if(app.driverInjuries){
    const _nextRoundForRecovery=w.raceMeta.round+1;
    Object.keys(app.driverInjuries).forEach(idStr=>{
      const id=Number(idStr);
      const inj=app.driverInjuries[id];
      if(!inj||inj.career||inj.missRaces==='career')return;
      if(_returnedDriverIds.has(id))return;
      const wasInjured=isDriverInjured(id,w.raceMeta.round);
      const stillInjured=isDriverInjured(id,_nextRoundForRecovery);
      if(wasInjured&&!stillInjured){
        const d=BASE_DRIVERS.find(x=>x.id===id);
        if(d&&d.team&&d.team!=='Available'){
          const returnStr=inj.cause==='suspension'?'returns from suspension':'returns from injury';
          // Look up whoever was covering this seat, so the message matches the format
          // used by the normal contract-expiry path (which already names the temp driver).
          const _coveringD=findPreciseTempCoverage(d.team,id);
          const _coveringName=_coveringD?(driverFullName(_coveringD)||((_coveringD.fn||_coveringD.firstName||'')+' '+(_coveringD.ln||_coveringD.lastName||'')).trim()):null;
          const _coverStr=_coveringName?` — <strong>${escapeHtml(_coveringName)}</strong>'s temporary contract ends`:'';
          _movementNews.push(`📋TEAMRETURN:${flagImg(d.nation2||'')} <strong>${escapeHtml(teamDisplayName(d.team)||d.team)}</strong> — <strong>${escapeHtml(driverFullName(d))}</strong> ${returnStr}${_coverStr}.`);
          _returnedDriverIds.add(id);
        }
      }
    });
  }

  // Evaluate rivalries from this race
  const _rivalryNews=[];
  const _crashedThisRace=(app.currentWeekend._crashedIds||[]);
  evaluateRaceDayRivalries(_raceResults,_crashedThisRace,_rivalryNews);
  evaluateTeamRivalries(_raceResults,_crashedThisRace,_rivalryNews);
  w._rivalryNews=_rivalryNews;

  // Track records — compare this race's winner/pole against the track's prior best
  // BEFORE this race is written to history below.
  const _trackRecordNews=[];
  checkTrackRecords(_trackRecordNews);
  w._trackRecordNews=_trackRecordNews;

  applyCloseChampionshipRelations(app.currentSeason||1989,w.raceMeta.round);

  recordWeekendHistory();
  invalidateStandingsCache();

  // After race 8, recalculate pre-qualifying pool
  const _completedRound=app.history.weekends.filter(wk=>wk.raceMeta.year===app.currentSeason).length;
  if(_completedRound===seasonRules().preqRecalcAfterRound){
    const _preqChange=applyPreqRecalc();
    app._preqChangeAfterR8=_preqChange;
    setTimeout(()=>{if(confirm('Pre-qualifying pool has been recalculated. Since there\'s no autosave, this is a good point to export your progress. Export now?'))exportSaveFile();},400);
  } else if(_completedRound>seasonRules().preqRecalcAfterRound){
    applyPQSinkModifier();
  }
  if(_completedRound===seasonRules().totalRounds){
    setTimeout(()=>{if(confirm('That\'s the final round of the season! Since there\'s no autosave, this is a good point to export your progress. Export now?'))exportSaveFile();},400);
  }

  clearLive();

  // Build race news from history entry (which now has all movement data via recordWeekendHistory)
  const entry=app.history.weekends[app.history.weekends.length-1];
  if(entry){
    const newsItem=buildRaceNews(entry);
    pushNews(newsItem);
    if(app._preqChangeAfterR8)delete app._preqChangeAfterR8;
  }
  saveApp(); // single save per race end, after all post-race processing
  requestAnimationFrame(()=>{
    if(app.news&&app.news.length)showNewsModal(app.news[0]);
  });
  w.pendingSeasonReturn=true;
  render();
  requestAnimationFrame(()=>{if(app.currentWeekend&&app.currentWeekend.pendingSeasonReturn)render();});
}

function instantResult(){
  const w=app.currentWeekend;
  if(!w||w.weekendFinished)return;
  if(w.pendingAdvance){advanceToPendingSession();render();return;}
  const ss=w.session;
  w._suppressRender=true;
  try{
    while(app.currentWeekend&&!app.currentWeekend.weekendFinished&&app.currentWeekend.session===ss&&!app.currentWeekend.pendingAdvance){
      const _nextId=app.currentWeekend.order[app.currentWeekend.slotPointer];
      const _nextDriver=_nextId!==undefined?getSessionDriver(app.currentWeekend.session,_nextId):null;
      if(_nextId!==undefined&&!_nextDriver){
        console.log('[DEBUG] instantResult: null driver at slot',app.currentWeekend.slotPointer,`id=${_nextId}`);
        app.currentWeekend.slotPointer++;
        continue;
      }
      processNextRoll();
      if(app.currentWeekend.pendingAdvance||app.currentWeekend.session!==ss)break;
    }
  }catch(e){
    console.error('instantResult exception:',e);
    try{debugMsg('instantResult exception',e?.message||String(e));}catch(e2){}
  }finally{
    if(app.currentWeekend)app.currentWeekend._suppressRender=false;
  }
  render();
  if(app.currentWeekend&&app.currentWeekend.weekendFinished&&app.news&&app.news.length){
    requestAnimationFrame(()=>{
      if(app.news&&app.news.length&&!document.getElementById('newsModal'))showNewsModal(app.news[0]);
    });
  }
}
function startAuto(){
  const w=app.currentWeekend;
  if(!w||w.weekendFinished||w.autoTimer||w.pendingAdvance)return;
  const speed=Number(document.getElementById('speedSelect').value);
  w.autoTimer=setInterval(()=>{if(!app.currentWeekend||app.currentWeekend.weekendFinished||app.currentWeekend.pendingSeasonReturn||app.currentWeekend.pendingAdvance){stopAuto(true);return;}processNextRoll();},speed);
  render();
}
function stopAuto(silent){
  const w=app.currentWeekend;
  if(w&&w.autoTimer){clearInterval(w.autoTimer);w.autoTimer=null;saveLive();if(!silent)addLog('Auto roll stopped.');render();}
}

// ── STANDINGS CACHE ───────────────────────────────────────────────────────

// Cache declared at top of script (before postInitSetup). See top of file.

function seasonStandings(year){
  if(_standingsCache[year])return _standingsCache[year];
  const weeks=app.history.weekends.filter(w=>w.raceMeta.year===year).sort((a,b)=>a.raceMeta.round-b.raceMeta.round);
  // Key driver stats by numeric ID to avoid surname collisions
  const dm={}, tm={};
  // Build a display-name map: if two active drivers share a surname, use full name for both
  const surnameCount={};
  BASE_DRIVERS.forEach(d=>{surnameCount[d.name]=(surnameCount[d.name]||0)+1;});
  const displayName=d=>surnameCount[d.name]>1?driverFullName(d):(d.name||driverFullName(d));
  // Only pre-populate drivers who actually appear in this year's race history
  // (Do NOT add all current BASE_DRIVERS — future-season drivers would pollute past standings)
  // BASE_DRIVERS entries are added lazily below when they appear in race history.
  // Also add any driver who appears in this year's race history but is no longer in BASE_DRIVERS
  // (fired/quit drivers removed from BASE_DRIVERS mid-season must still score in standings)
  weeks.forEach(w=>{
    [...w.prequalifying,...w.qualifying,...w.race].forEach(r=>{
      if(!dm[r.id]&&r.id){
        // First try BASE_DRIVERS for a full entry (driver is still active)
        const bd=BASE_DRIVERS.find(d=>d.id===r.id);
        if(bd){
          dm[r.id]={id:r.id,name:displayName(bd),firstName:bd.firstName||'',lastName:bd.name,nation2:bd.nation2,championshipPoints:0,totalRacePoints:0,races:0,starts:0,entries:0,poles:0,wins:0,seconds:0,thirds:0,podiums:0,retirements:0,crashes:0};
        } else {
          // Reconstruct from history (fired/quit/retired driver)
          const retired=app._retiredDrivers?.find(x=>x.id===r.id||x.dbKey===r.id);
          const name=retired?((retired.firstName||retired.fn||'')+' '+(retired.lastName||retired.ln||retired.name||'')).trim():(r.driver||String(r.id));
          const n2=r.nation2||r.n2||'';
          dm[r.id]={id:r.id,name,lastName:name,nation2:n2,championshipPoints:0,totalRacePoints:0,races:0,starts:0,entries:0,poles:0,wins:0,seconds:0,thirds:0,podiums:0,retirements:0,crashes:0,_fromHistory:true};
        }
      }
    });
  });
  // Initialise teams using canonical names; also include any alias names from this year's history
  // Only include teams that actually raced this year (not current BASE_DRIVERS which includes future teams)
  const _allTeamsThisYear=new Set(
    weeks.flatMap(w=>[...w.qualifying.map(q=>q.team),...w.race.map(r=>r.team),...(w.prequalifying||[]).map(p=>p.team)])
    .filter(t=>t&&t!=='Available').map(t=>teamCanonicalName(t)));

  const teams=[..._canonicalTeams].sort().map(t=>{const c=teamCareer(t);const disp=teamDisplayName(t);const firstTeamEntry=app.history.weekends.filter(w=>w.qualifying.some(q=>teamCanonicalName(q.team)===t)||w.race.some(r=>teamCanonicalName(r.team)===t)).sort((a,b)=>a.raceMeta.year-b.raceMeta.year);const _tdE_enc=TEAMS_DATABASE.find(x=>teamCanonicalName(x.name)===t);const firstYear=firstTeamEntry.length?firstTeamEntry[0].raceMeta.year:(_tdE_enc?.firstYear||'—');const lastTeamYear=firstTeamEntry.length?firstTeamEntry[firstTeamEntry.length-1].raceMeta.year:null;return{type:'Team',lastYear:lastTeamYear,name:disp,canonicalName:t,firstYear,entries:c.stats.entries,starts:c.stats.starts,poles:c.stats.poles,wins:c.stats.wins,podiums:c.stats.podiums,retirements:c.stats.retirements+c.stats.crashes,championshipPoints:c.stats.championshipPoints,championshipWins:c.stats.championshipWins};}).filter(t=>t.entries>0);
  return{drivers,teams};
}


function driverLink(id,label,fromEnc){
  if(!id||typeof id!=='number'||!Number.isFinite(id))return label; // guard: never link to invalid id
  const h=`#driver-${id}`;
  if(fromEnc)return`<a class="profile-link" href="${h}" onclick="event.preventDefault();goHash('${h}')">${label}</a>`;
  return`<a class="profile-link" href="${h}" onclick="event.preventDefault();goHash('${h}')">${label}</a>`;
}
function teamIdForName(teamName){
  // Resolve a team name (canonical or alias) to its numeric TEAMS_DATABASE id
  const canon=teamCanonicalName(teamName);
  const td=TEAMS_DATABASE.find(t=>t.name===canon||teamCanonicalName(t.name)===canon);
  return td?.id||null;
}
function teamLink(teamNameOrId,label,fromEnc){
  if(!teamNameOrId)return label;
  let tid=typeof teamNameOrId==='number'?teamNameOrId:teamIdForName(teamNameOrId);
  if(!tid&&typeof teamNameOrId==='string')tid=teamIdForName(teamNameOrId);
  // If still no ID, use slug as fallback (old format, still routed by renderProfile)
  const h=tid?`#team-${tid}`:`#team-${slugify(teamCanonicalName(teamNameOrId)||teamNameOrId)}`;
  return`<a class="profile-link" href="${h}" onclick="event.preventDefault();goHash('${h}')">${label}</a>`;
}
function raceLink(key,label,fromEnc){const h=`#racehistory-${key}`;return`<a class="profile-link" href="${h}" onclick="event.preventDefault();goHash('${h}')">${label}</a>`;}
function gpLink(gp,label,fromEnc){const h=`#gp-${slugify(gp)}`;return`<a class="profile-link" href="${h}" onclick="event.preventDefault();goHash('${h}')">${label||gp}</a>`;}
function trackLink(track,label,fromEnc){const h=`#track-${slugify(track)}`;return`<a class="profile-link" href="${h}" onclick="event.preventDefault();goHash('${h}')">${label||track}</a>`;}
// Driver status badge
function driverStatusBadge(id){
  const round=nextRoundIndex()+1;
  const inj=app.driverInjuries&&app.driverInjuries[id];
  if(inj&&isDriverInjured(id,round))return`<span class="status-badge badge-inj">🔴 inj</span>`;
  return'';
}

  }

          const isDNQRow=viewSession==='qualifying'&&isPastView&&pos>_raceFieldN2&&(w._dnqIds||[]).includes(d.id);

function setWeekendTab(tab){
  const w=app.currentWeekend;if(!w)return;
  w.viewTab=(tab==='main')?undefined:tab;
  render();
}

// ── RENDER: SEASON ────────────────────────────────────────────────────────
function renderSeason(hash){
  const y=Number(hash.replace('#season-',''))||1989;
  const st=seasonStandings(y),currentIdx=nextRoundIndex(),complete=st.roundsCompleted>=(st.totalRounds||seasonRules(y).totalRounds||16);
  // Helper: get driver surname only from a full name string
  const _surname=n=>{if(!n||n==='—')return n;const p=n.trim().split(/\s+/);return p[p.length-1];};
  // Helper: strip "Grand Prix" from GP name
  const _shortGP=n=>(n||'').replace(/\s*Grand Prix$/i,'').trim();
  // Helper: format modifier value for display
  const _fmtMod=(v,title)=>{if(!v&&v!==0)return'—';const n=Number(v);if(isNaN(n))return'—';const t=title?` title="${escapeHtml(title)}"`:'';return(n>0?`<span class="modifier-pos"${t}>+`+n.toFixed(2)+'</span>':`<span class="modifier-neg"${t}>`+n.toFixed(2)+'</span>');};
  // Modifier lock: for past seasons use historical modHistory snapshots; for current use live values
  const isCurrentSeason=y===app.currentSeason;
  // Get driver total modifier — for historical seasons try to reconstruct from modHistory end-of-season snapshot
  const _driverModForSeason=(id)=>{
    if(isCurrentSeason) return driverTotalMod(id);
    const bd=BASE_DRIVERS.find(x=>x.id===id);
    const base=bd?bd.driverBonus||0:((app._lastKnownDriverBonus||{})[id]??0);
    const hist=app.modHistory?.drivers?.[id];
    if(Array.isArray(hist)){
      // Find the last entry at or before the end of year y
      const seasonEntries=hist.filter(h=>(h.yr||0)<=y);
      const acc=seasonEntries.length?seasonEntries[seasonEntries.length-1].v:0;
      return Math.round((base+acc)*100)/100;
    }
    return base;
  };
  const _teamModForSeason=(tname)=>{
    if(isCurrentSeason) return teamTotalMod(tname);
    const baseTb=teamBaseTb(tname)||0;
    const hist=app.modHistory?.teams?.[tname];
    if(Array.isArray(hist)){
      const seasonEntries=hist.filter(h=>(h.yr||0)<=y);
      const acc=seasonEntries.length?seasonEntries[seasonEntries.length-1].v:0;
      return Math.round((baseTb+acc)*100)/100;
    }
    return baseTb;
  };
  // Season gain/loss (vs end of previous year, or vs base if no prior history) — shown as a tooltip
  const _driverSeasonGain=(id)=>{
    const bd=BASE_DRIVERS.find(x=>x.id===id);
    const base=bd?bd.driverBonus||0:((app._lastKnownDriverBonus||{})[id]??0);
    const hist=app.modHistory?.drivers?.[id];
    const priorEntries=Array.isArray(hist)?hist.filter(h=>(h.yr||0)<y):[];
    const startAcc=priorEntries.length?priorEntries[priorEntries.length-1].v:0;
    const startTotal=Math.round((base+startAcc)*100)/100;
    return Math.round((_driverModForSeason(id)-startTotal)*100)/100;
  };
  const _teamSeasonGain=(tname)=>{
    const baseTb=teamBaseTb(tname)||0;
    const hist=app.modHistory?.teams?.[tname];
    const priorEntries=Array.isArray(hist)?hist.filter(h=>(h.yr||0)<y):[];
    const startAcc=priorEntries.length?priorEntries[priorEntries.length-1].v:0;
    const startTotal=Math.round((baseTb+startAcc)*100)/100;
    return Math.round((_teamModForSeason(tname)-startTotal)*100)/100;
  };
  const _seasonGainTitle=g=>`Season: ${g>=0?'+':''}${g.toFixed(2)}`;

  document.getElementById('routeSeason').innerHTML=`<div class="card"><a class="back-link" href="#start">← Home screen</a> · <a class="back-link" href="#encyclopedia" onclick="event.preventDefault();goHash('#encyclopedia')">Encyclopedia</a><h2 class="route-title">${y} season <button class="ghost" onclick="newWeekend()" style="font-size:12px;padding:4px 10px;margin-left:8px" title="Shortcut: S" ${currentSeasonEntries().length>=seasonRules().totalRounds?'disabled':''}>▶ Start next round <span style="font-size:10px;opacity:.6">(s)</span></button></h2>
  <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;margin-bottom:12px">
    <div class="metric"><div class="label">Drivers&#39; leader</div><div class="value" style="font-size:16px">${(()=>{const _ld=st.drivers[0];if(!_ld)return'—';const _b=BASE_DRIVERS.find(d=>d.id===_ld.id);return (_b?flagImg(_b.nation2)+' ':'')+escapeHtml(_b?driverFullName(_b):_ld.name)+` <span style="font-size:13px;color:var(--muted);font-weight:400">(${_ld.championshipPoints}pts)</span>`;})()}</div></div>
    <div class="metric"><div class="label">Constructors&#39; leader</div><div class="value" style="font-size:16px">${st.teams[0]?teamLink(st.teams[0].canonicalName||st.teams[0].name,escapeHtml(st.teams[0].displayName||teamDisplayName(st.teams[0].name)),true)+` <span style="font-size:13px;color:var(--muted);font-weight:400">(${st.teams[0].championshipPoints}pts)</span>`:'—'}</div></div>
    <div class="metric"><div class="label">Rounds completed</div><div class="value">${st.roundsCompleted}/${st.totalRounds}</div></div>
  </div>
  <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px;align-items:start;margin-top:0">
    <div class="panel"><h2 style="text-align:center">Drivers&#39; Championship</h2><div class="table-wrap"><table class="small-table"><thead><tr><th>Pos</th><th>Driver</th><th>Starts</th><th>Points</th><th>Wins</th><th title="Current total modifier">Mod</th></tr></thead><tbody>
    ${(()=>{
      if(!st.drivers.length) return '<tr><td colspan="6">No standings yet.</td></tr>';
      const firstZeroIdx=st.drivers.findIndex(d=>d.championshipPoints===0);
      const zeroPos=firstZeroIdx>=0?firstZeroIdx+1:null;
      return st.drivers.map((d,i)=>{
        const bd=BASE_DRIVERS.find(x=>x.id===d.id);
        const isZero=d.championshipPoints===0;
        const posStr=isZero?`=${zeroPos}`:String(i+1);
        let _dName;
        if(bd) _dName=driverFullName(bd);
        else if(d.firstName&&d.lastName) _dName=d.firstName+' '+d.lastName;
        else{
          const _ret=app._retiredDrivers?.find(x=>x.id===d.id||x.dbKey===d.id);
          const _dbE=DRIVER_DATABASE.find(x=>x.id===d.id);
          _dName=_ret?(((_ret.firstName||_ret.fn||'')+' '+(_ret.lastName||_ret.ln||_ret.name||'')).trim()):_dbE?((_dbE.fn||'')+' '+(_dbE.ln||'')).trim():d.name;
        }
        const modVal=_driverModForSeason(d.id);
        const modCell=_fmtMod(modVal,_seasonGainTitle(_driverSeasonGain(d.id)));
        return`<tr><td>${posStr}</td><td class="left">${driverLink(d.id,flagImg(d.nation2)+' '+escapeHtml(_dName||d.name),true)}</td><td>${d.starts||0}</td><td>${d.championshipPoints}</td><td>${d.wins||0}</td><td>${modCell}</td></tr>`;
      }).join('');
    })()}
    </tbody></table></div></div>
    <div class="panel"><h2 style="text-align:center">Constructors&#39; Championship</h2><div class="table-wrap"><table class="small-table"><thead><tr><th>Pos</th><th>Team</th><th>Starts</th><th>Points</th><th>Wins</th><th>Pods</th><th title="Current total modifier">Mod</th></tr></thead><tbody>
    ${(()=>{
      const _SK=new Set(['Available']);
      const ranked=st.teams.filter(t=>!_SK.has(t.name));
      const rankedNames=new Set(ranked.map(t=>t.name));
      let all;
      if(isCurrentSeason){
        const allTeamNames=[...new Set(BASE_DRIVERS.map(d=>d.team))].filter(t=>!_SK.has(t));

function buildDriverRaceResultsHtml(c,selectedYear){
  if(!c.races||!c.races.length)return'<div class="panel"><h2>Race results</h2><p class="subtle" style="padding:8px">No race history recorded yet.</p></div>';
  const allYears=[...new Set(c.races.filter(e=>e&&e.meta).map(e=>e.meta.year))].sort((a,b)=>a-b);
  const selYr=selectedYear&&allYears.includes(selectedYear)?selectedYear:allYears[allYears.length-1];
  const yearBtns=allYears.map(y=>`<button onclick="_profileRaceYear=${y};renderProfile(window.location.hash)" style="padding:3px 8px;font-size:11px;font-weight:${y===selYr?700:400};color:${y===selYr?'var(--accent)':'var(--muted)'};background:none;border:none;border-bottom:${y===selYr?'2px solid var(--accent)':'2px solid transparent'};cursor:pointer">${y}</button>`).join('');
  const rows=c.races.filter(e=>e&&e.meta&&e.meta.year===selYr).map(entry=>{
    if(!entry||!entry.meta)return'';
    const q=entry.quali,pq=entry.preq,r=entry.race;
    const dnpq=pq&&!pq.advanced&&!q; // was in PQ but didn't advance
    const dnq=!r&&q&&!q.retired;     // qualified but didn't make race grid (1991: pos 27-30)
    const preqCell=pq?(pq.retired?'<span style="color:#dc2626">X</span>':pq.advanced?`P${pq.position||'?'}`:`<span style="color:#dc2626">P${pq.position||'?'}</span>`):'\u2014';
    const qualiCell=dnpq?'<span style="color:#dc2626">DNPQ</span>':q?(q.retired?'<span style="color:#dc2626">X</span>':`P${q.position||'?'}`):(pq&&!pq.advanced?'<span style="color:#dc2626">DNPQ</span>':'\u2014');
    const finishCell=r?`P${r.position}`:dnq?'<span style="color:#dc2626">DNQ</span>':dnpq?'<span style="color:#dc2626">DNPQ</span>':'\u2014';
    const statusCell=r?(r.status==='active'?'Finished':r.status==='crashed'?`Crashed${entry.atFaultForCrash?' <span title="At fault" style="color:#dc2626;font-weight:700;cursor:default">(F)</span>':''}`:r.retirementReason||r.status||''):'\u2014';
    const ptsCell=r&&r.points>0?String(r.points):'';
    const gpShort=entry.meta.country||(entry.meta.gp||'').replace(/ Grand Prix$/,'').replace(/^.* /,'');
    return'<tr><td>'+entry.meta.round+'</td><td class="left">'+raceLink(weekendKey(entry.meta),escapeHtml(gpShort),true)+'</td><td>'+preqCell+'</td><td>'+qualiCell+'</td><td>'+finishCell+'</td><td class="left" style="font-size:11px">'+statusCell+'</td><td>'+ptsCell+'</td></tr>';
  }).join('');
  return'<div class="panel"><h2>Race results</h2><div style="margin-bottom:6px">'+yearBtns+'</div><div class="table-wrap"><table class="small-table"><thead><tr><th>Rd</th><th>GP</th><th>Pre-Q</th><th>Q</th><th>Finish</th><th>Status</th><th>Points</th></tr></thead><tbody>'+rows+'</tbody></table></div></div>';
}

function buildDriverSeasonSummaryHtml(c){
  if(!c.seasons||!c.seasons.length)return'<div class="panel" style="margin-top:12px"><h2>Season summary</h2><p class="subtle" style="padding:8px">No data yet.</p></div>';
  const rows=[...c.seasons].sort((a,b)=>a.year-b.year).reverse().filter(s=>s.races&&s.races.length>0).map(s=>{
    const sr=s.races.map(x=>x.race).filter(Boolean);
    const sq=s.races.map(x=>x.quali).filter(Boolean);
    const entries=s.races.filter(r=>r.preq||r.quali).length;
    if(!entries&&!sr.length)return null; // skip years with no actual entries
    // Championship position
    const st=seasonStandings(s.year);
    const driverPos=st.drivers.findIndex(d=>d.id===c.base?.id)+1;
    const totalStarters=st.drivers.filter(d=>d.starts>0).length;
    const posStr=sr.length>0?(driverPos>0?`${driverPos}/${totalStarters}`:'—'):'N/A';
    return'<tr><td>'+s.year+'</td><td>'+entries+'</td><td>'+sr.length+'</td><td>'+sq.filter(q=>q.pole).length+'</td><td>'+sr.filter(r=>r.position===1).length+'</td><td>'+sr.filter(r=>r.position<=3).length+'</td><td>'+s.championshipPoints+'</td><td>'+posStr+'</td></tr>';
  });
  const filteredRows=rows.filter(Boolean);
  return'<div class="panel" style="margin-top:12px"><h2>Season summary</h2><div class="table-wrap"><table class="small-table"><thead><tr><th>Year</th><th>Entries</th><th>Starts</th><th>Poles</th><th>Wins</th><th>Podiums</th><th>Points</th><th>Position</th></tr></thead><tbody>'+(filteredRows.join('')||'<tr><td colspan="8" class="subtle">No data yet.</td></tr>')+'</tbody></table></div></div>';
}

// ── RENDER: ENCYCLOPEDIA ──────────────────────────────────────────────────
function renderEncyclopedia(){
  // Only include seasons that have actual race history (avoid showing cache from old games)
  const _allHistYears=[...new Set(app.history.weekends.map(w=>w.raceMeta.year))].sort((a,b)=>a-b);
  // Include current season even if no races yet (shows as "In progress"), but not others with 0 races
  const seasons=_allHistYears.length>0
    ? ([...new Set([..._allHistYears,(app.currentSeason||1989)])].sort((a,b)=>a-b))
    : [app.currentSeason||1989];
  const _baseIds=new Set(BASE_DRIVERS.map(d=>d.id));
  // Also track permanent IDs (pid) to catch FA pool entries that duplicate BASE_DRIVERS
  const _basePids=new Set(BASE_DRIVERS.map(d=>d.pid||d.id).filter(Boolean));
  const _seasonFADrivers=(app._seasonFAPool||[]).filter(f=>{
    if(!f.id)return false;
    if(_baseIds.has(f.id)||_basePids.has(f.id)||_basePids.has(f.pid))return false;
    if(!(f.firstName||f.fn))return false;
    return true;
  });
  // Track all IDs+pids already included to prevent any duplication
  const _includedIds=new Set([..._baseIds,..._basePids,..._seasonFADrivers.map(f=>f.id)]);
  const _dedupedFAs=(FREE_AGENTS||[]).filter(f=>{
    const fid=f.id||0; const fpid=f.pid||f.id||0;
    if(_includedIds.has(fid)||_includedIds.has(fpid))return false;
    _includedIds.add(fid); if(fpid)_includedIds.add(fpid);
    return true;
  });
  const _faObjs=_seasonFADrivers.map(f=>({...f,firstName:f.firstName||f.fn||'',lastName:f.lastName||f.ln||'',name:f.lastName||f.ln||'',team:'Available',nation2:f.nation2||f.n2||'',isFreeAgent:true}));
  // Include retired drivers (spliced from BASE_DRIVERS but recorded in _retiredDrivers)
  const _retiredObjs=(app._retiredDrivers||[]).map(r=>{
    const bd=BASE_DRIVERS.find(d=>d.id===r.id);if(bd)return null; // still in BASE_DRIVERS
    if(_includedIds.has(r.id))return null; // already included via FA pool
    _includedIds.add(r.id);
    // Reconstruct a minimal driver object for display
    const dbE=DRIVER_DATABASE.find(d=>d.id===r.id)||DRIVER_DATABASE.find(d=>d.pid===r.id);
    return{id:r.id,firstName:r.firstName||r.fn||dbE?.fn||'',lastName:r.lastName||r.ln||r.name||dbE?.ln||'',
      name:r.lastName||r.ln||r.name||dbE?.ln||'',nation2:r.nation2||dbE?.n2||'',
      team:'Available',_retired:true,_retiredSeason:r.season,dob:r.dob||dbE?.dob||0};
  }).filter(Boolean);
  const allDrivers=[...BASE_DRIVERS,..._dedupedFAs,..._faObjs,..._retiredObjs].sort((a,b)=>(a.name||'').localeCompare(b.name||''));
  // Include both current BASE_DRIVERS teams AND all historical teams from race history
  const _encHistTeams=new Set(app.history.weekends.flatMap(w=>[...w.qualifying.map(q=>teamCanonicalName(q.team)),...w.race.map(r=>teamCanonicalName(r.team))]));
  const teams=[...new Set([...BASE_DRIVERS.map(d=>d.team).filter(t=>t&&t!=='Available'),..._encHistTeams])].sort();
  const round=nextRoundIndex()+1;
  // Filter drivers
  const statusFilter=encFilter.status||'active';
  const filteredDrivers=allDrivers.filter(d=>{
    if(statusFilter==='all')return true;
    const injured=app.driverInjuries&&app.driverInjuries[d.id]&&isDriverInjured(d.id,round);
    if(statusFilter==='active')return d.team!=='Available'&&!d._retired;
    if(statusFilter==='free'){if(d._retired)return false;const _rdId=(app._retiredDrivers||[]).find(r=>r.id===d.id);if(_rdId)return false;return d.team==='Available';}
    if(statusFilter==='inactive'){

// ── CIRCUITS ─────────────────────────────────────────────────────────────
let circuitSort={col:'track',dir:'asc'};
function sortCircuits(c){if(circuitSort.col===c){circuitSort.dir=circuitSort.dir==='asc'?'desc':'asc';}else{circuitSort.col=c;circuitSort.dir=c==='track'?'asc':'desc';}render();}
function getAllTrackSummaries(){
  const byTrack={};
  app.history.weekends.forEach(w=>{
    const track=w.raceMeta.track||'';
    if(!track)return;
    const slug=slugify(track);
    if(!byTrack[slug])byTrack[slug]={track,slug,firstYear:w.raceMeta.year,lastYear:w.raceMeta.year,driverWins:{},driverNames:{},teamWins:{}};
    const t=byTrack[slug];
    t.firstYear=Math.min(t.firstYear,w.raceMeta.year);
    t.lastYear=Math.max(t.lastYear,w.raceMeta.year);
    const winner=(w.race||[]).find(r=>r.position===1&&r.status==='active');
    if(winner){
      t.driverWins[winner.id]=(t.driverWins[winner.id]||0)+1;
      t.driverNames[winner.id]=winner.driver;
      const tc=teamCanonicalName(winner.team);
      t.teamWins[tc]=(t.teamWins[tc]||0)+1;
    }
  });
  return Object.values(byTrack).map(t=>{
    const driverEntries=Object.entries(t.driverWins);
    const teamEntries=Object.entries(t.teamWins);
    const maxDW=driverEntries.length?Math.max(...driverEntries.map(([,c])=>c)):0;
    const topDriverIds=driverEntries.filter(([,c])=>c===maxDW).map(([id])=>id);
    const maxTW=teamEntries.length?Math.max(...teamEntries.map(([,c])=>c)):0;
    const topTeamNames=teamEntries.filter(([,c])=>c===maxTW).map(([name])=>name);
    return{track:t.track,slug:t.slug,firstYear:t.firstYear,lastYear:t.lastYear,
      maxDriverWins:maxDW,topDriverIds,driverNames:t.driverNames,
      maxTeamWins:maxTW,topTeamNames};
  });
}
function renderCircuits(){
  const rows=sortRows(getAllTrackSummaries(),circuitSort.col,circuitSort.dir);
  const _tiedNames=(ids,names,linkFn)=>{
    const shown=ids.slice(0,3).map(id=>linkFn(id,escapeHtml(names[id]||'')));
    return shown.join(', ')+(ids.length>3?' et al.':'');
  };
  const _recCell=rec=>rec?`${driverLink(rec.driverId,escapeHtml(rec.driverName),true)} <span class="subtle">(${rec.value.toFixed(2).replace(/\.00$/,'')}, ${rec.year})</span>`:'—';
  const rowsHtml=rows.map(t=>{
    const driverCell=t.maxDriverWins<=0?'—':t.topDriverIds.length>1
      ?`${_tiedNames(t.topDriverIds,t.driverNames,(id,label)=>driverLink(id,label,true))} (${t.maxDriverWins})`
      :`${driverLink(t.topDriverIds[0],escapeHtml(t.driverNames[t.topDriverIds[0]]||''),true)} (${t.maxDriverWins})`;
    const teamCell=t.maxTeamWins<=0?'—':t.topTeamNames.length>1
      ?`Multiple (${t.maxTeamWins})`
      :`${teamLink(t.topTeamNames[0],escapeHtml(teamDisplayName(t.topTeamNames[0])),true)} (${t.maxTeamWins})`;
    const recs=getTrackRecords(t.slug);
    return`<tr><td class="left">${trackLink(t.track,escapeHtml(t.track),true)}</td><td>${t.firstYear}</td><td>${t.lastYear}</td><td class="left">${driverCell}</td><td class="left">${teamCell}</td><td class="left">${_recCell(recs.raceMod)}</td><td class="left">${_recCell(recs.raceNoMod)}</td><td class="left">${_recCell(recs.qualiMod)}</td><td class="left">${_recCell(recs.qualiNoMod)}</td></tr>`;
  }).join('');
  document.getElementById('routeProfile').innerHTML=`<div class="card"><a class="back-link" href="#" onclick="event.preventDefault();goBack()">← Back</a> · <a class="back-link" href="#encyclopedia" onclick="event.preventDefault();goHash('#encyclopedia')">Encyclopedia</a> · <a class="back-link" href="#start" onclick="event.preventDefault();goHash('#start')">Home screen</a>
  <h2 class="route-title">Circuits</h2>
  ${rows.length?`<div class="table-wrap"><table class="small-table"><thead><tr>
    <th class="sortable left" onclick="sortCircuits('track')">Track name</th>
    <th class="sortable" onclick="sortCircuits('firstYear')">First year</th>
    <th class="sortable" onclick="sortCircuits('lastYear')">Last year</th>
    <th class="sortable left" onclick="sortCircuits('maxDriverWins')">Most driver wins</th>
    <th class="sortable left" onclick="sortCircuits('maxTeamWins')">Most constructor wins</th>
    <th class="left">Race record (with mods)</th>
    <th class="left">Race record (w/o mods)</th>
    <th class="left">Qualifying record (with mods)</th>
    <th class="left">Qualifying record (w/o mods)</th>
  </tr></thead><tbody>${rowsHtml}</tbody></table></div>`:'<p class="subtle">No races run yet.</p>'}
  </div>`;
}

// ── RENDER: RACE HISTORY ─────────────────────────────────────────────────
function renderRaceHistory(hash){
  const key=hash.replace('#racehistory-',''),entry=app.history.weekends.find(w=>w.weekendKey===key);
  if(!entry){document.getElementById('routeRaceHistory').innerHTML=`<div class="card"><a class="back-link" href="#encyclopedia">← Encyclopedia</a><p>Not found.</p></div>`;return;}
  const weather=entry.raceMeta.weather||'dry';
  const tbl=(title,rows,showGrid,showPoints)=>{
    // Build per-race fault set from _crashGroups (last driver in each group is at fault)
    const _raceEntry=entry;
    const _faultIds=new Set((_raceEntry._crashGroups||[]).map(g=>crashGroupFaultId(g)).filter(Boolean));
    // Bold points-scoring positions in the race table specifically — based on the scoring
    // system that actually applied THAT season (not whatever's currently active), since this
    // is historical race data.
    const _pointsPositionsHist=showPoints?_pointsPositionsForYear(entry.raceMeta.year):0;
    return`<div class="panel"><h2>${title}</h2><div class="table-wrap"><table class="small-table"><thead><tr><th>Pos</th><th>Driver</th><th>Team</th>${showGrid?'<th>Grid</th>':''}<th>Total</th>${showPoints?'<th>Pts</th>':''}<th>Status</th></tr></thead><tbody>${rows.map(r=>{
      const _bd=BASE_DRIVERS.find(x=>x.id===r.id)||(app._retiredDrivers||[]).find(x=>x.id===r.id)||(app._seasonFAPool||[]).find(x=>x.id===r.id);
      const _dname=_bd?driverFullName(_bd)||r.driver:r.driver;
      // A one-race injury fill-in who scored points here has typically already been
      // removed from BASE_DRIVERS by the time this result is viewed later — linking to
      // their profile would lead to a broken/nonexistent page, so show plain text instead.
      const _totalStarts=app.history.weekends.filter(w=>(w.race||[]).some(rr=>rr.id===r.id)).length;
      const _isInjuryFillIn=(app.driverIncidents?.[r.id]||[]).some(inc=>inc.type==='teamJoin'&&inc.details?.isInjuryReplacement);
      const _skipLink=showPoints&&r.points>0&&_totalStarts===1&&_isInjuryFillIn;
      const _driverCell=_skipLink?escapeHtml(_dname):driverLink(r.id,escapeHtml(_dname),true);
      const _fastestLapTag=(showPoints&&r.fastestLap)?'<span style="font-size:10px;color:#7c3aed;font-weight:700" title="Most 6s rolled in the race"> ⚡FL</span>':'';
      const _rowCls=(showPoints&&r.position<=_pointsPositionsHist)?' class="top6"':'';
      return`<tr${_rowCls}><td>${r.position}</td><td class="left">${flagImg(r.nation2)} ${_driverCell}${_fastestLapTag}</td><td class="left">${teamLink(r.team,escapeHtml(r.team),true)}</td>${showGrid?`<td>${r.gridPos}</td>`:''}<td>${Number(r.total).toFixed(2).replace(/\.00$/,'')}</td>${showPoints?`<td>${r.points}</td>`:''}<td>${(()=>{if(r.status==='active')return'Finished';if(r.status==='crashed')return'Crashed'+(_faultIds.has(r.id)?' (at fault)':'');return(r.retirementReason||r.status||'').replace(/^./,c=>c.toUpperCase());})()}</td></tr>`;}).join('')}</tbody></table></div></div>`;
  };
  document.getElementById('routeRaceHistory').innerHTML=`<div class="card"><a class="back-link" href="#encyclopedia">← Encyclopedia</a> · <a class="back-link" href="#start">← Home screen</a>
  <h2 class="route-title">${escapeHtml(entry.raceMeta.title)}</h2>
  <div class="metric-grid">
    <div class="metric"><div class="label">Round</div><div class="value">${entry.raceMeta.round}</div></div>
    <div class="metric"><div class="label">Weather</div><div class="value">${weatherIcon(weather)} ${weatherLabel(weather)}</div></div>
    <div class="metric"><div class="label">Pole sitter</div><div class="value">${escapeHtml((BASE_DRIVERS.find(d=>d.id===entry.poleDriverId)||{}).name||'—')}</div></div>
    <div class="metric"><div class="label">Winner</div><div class="value">${escapeHtml(entry.race.find(r=>r.position===1)?.driver||'—')}</div></div>
  </div>

}

function slotSummary(data){
  if(!data||!data.history) return null;
  const rounds=data.history.weekends.length;
  const season=data.currentSeason||1989;
  const lastRace=data.history.weekends[rounds-1];
  const lastGP=lastRace?lastRace.raceMeta.gp:'No races yet';
  const ts=data._savedAt?new Date(data._savedAt).toLocaleString('en-AU',{day:'2-digit',month:'2-digit',year:'2-digit',hour:'2-digit',minute:'2-digit'}):'Unknown';
  return{rounds,season,lastGP,ts};
}
function saveToSlot(slotIdx){
  const {_eos,currentWeekend,...snap}=app;
  snap._savedAt=Date.now();
  // Also snapshot BASE_DRIVERS so slot loads restore the exact in-game roster
  const payload={appState:snap,_baseDrivers:BASE_DRIVERS.map(d=>{const {laps,...rest}=d;return rest;})};
  const key=slotKey(null,slotIdx);
  try{
    localStorage.setItem(key,JSON.stringify(payload));
    return true;
  }catch(e){
    // Quota — try stripping lap logs from history
    try{
      const slim={...snap,history:{...snap.history,weekends:(snap.history?.weekends||[]).map(w=>({
        ...w,
        prequalifying:(w.prequalifying||[]).map(d=>({...d,laps:[]})),
        qualifying:(w.qualifying||[]).map(d=>({...d,laps:[]})),
        race:(w.race||[]).map(d=>({...d,laps:[]})),
        log:[],
      }))}};
      slim._savedAt=Date.now();
      localStorage.setItem(key,JSON.stringify({appState:slim,_baseDrivers:payload._baseDrivers}));
      return true;
    }catch(e2){
      alert('⚠ Save failed — storage full.\nTry the "Export to file" option instead.');
      return false;
    }
  }
}
function loadFromSlot(slotIdx){
  try{
    const raw=JSON.parse(localStorage.getItem(slotKey(null,slotIdx))||'null');
    if(!raw)return null;
    // New format: {appState, _baseDrivers}. Old format: raw app object.
    return raw.appState?raw:raw;
  }catch(e){return null;}
}
function loadFromSlotFull(slotIdx){
  // Returns full payload {appState, _baseDrivers} for restore
  try{
    const raw=JSON.parse(localStorage.getItem(slotKey(null,slotIdx))||'null');
    if(!raw)return null;
    if(raw.appState)return raw; // new format
    return{appState:raw,_baseDrivers:null}; // old format — no BASE_DRIVERS
  }catch(e){return null;}
}
function deleteSlot(slotIdx){localStorage.removeItem(slotKey(null,slotIdx));}
function saveAutosave(){
  // Autosave removed — persistence now relies solely on manual export/import.

function startNewGameWithSeason(year){
  applyRealismDefaults();
  // Remove all overlays regardless of exact style string
  document.querySelectorAll('[style*="position:fixed"]').forEach(el=>{if(el!==document.body)el.remove();});
  document.querySelectorAll('.splash-screen,.modal-overlay,.retro-modal-overlay').forEach(el=>el.remove());
  if(app.history&&app.history.weekends.length>0)saveAutosave();
  // Wipe ALL season saves from localStorage so no stale season can reload on refresh
  // Scan known season years plus any others stored under our key pattern
  const knownYears=[1989,1990,1991,1992,1993,1994,1995,1996,1997,1998,1999,2000,2001,2002,2003,2004,2005];
  knownYears.forEach(y=>{localStorage.removeItem(appKey(y));localStorage.removeItem(liveKey(y));});
  // Also scan all localStorage keys for our pattern (catches any unexpected years like 1996)
  Object.keys(localStorage).filter(k=>k.startsWith('f1dice_')&&k.endsWith('_app_v8')).forEach(k=>localStorage.removeItem(k));
  Object.keys(localStorage).filter(k=>k.startsWith('f1dice_')&&k.endsWith('_live_v8')).forEach(k=>localStorage.removeItem(k));
  // Reset lastSeason to the chosen year so refresh loads correctly
  localStorage.setItem('f1dice_lastSeason',String(year));
  // Rebuild season data
  BASE_DRIVERS=buildDrivers(year);
  FREE_AGENTS=buildFreeAgents(year);
  app=defaultApp(year);
  app._eos=null;
  // Age decline is normally only (re)computed at each end-of-season transition, but that
  // means a new game's starting roster — which can include drivers already well into
  // their 30s (e.g. several 1989/1991 veterans) — showed no age-decline banner at all
  // until after season 1 ended. Apply it once here too, against the starting season's
  // year, so veteran drivers carry the correct penalty (and banner) from round 1.
  applyAgeDeclineForNewSeason(year,new Set());
  app._initialAgeDeclineSeeded=true;
  _navHistory.length=0;
  invalidateStandingsCache();
  clearLive();
  saveApp();
  // Always re-render the start screen immediately
  hideAllRoutes();
  document.getElementById('routeStart').classList.remove('hidden');
  document.title='F1 Dice Simulator';
  renderStart();
  if(window.location.hash!=='#start')window.location.hash='#start';
}
window.startNewGameWithSeason=startNewGameWithSeason;

function splashLoadSlot(idx,isAuto){
  const payload=isAuto?{appState:loadAutosave(),_baseDrivers:null}:loadFromSlotFull(idx);
  const state=payload?.appState||null;
  if(!state){alert('Save slot is empty.');return;}
  state._eos=null;if(state.currentWeekend===undefined)state.currentWeekend=null;
  app=state;
  if(payload?._baseDrivers&&payload._baseDrivers.length){
    BASE_DRIVERS=JSON.parse(JSON.stringify(payload._baseDrivers));
    repairDriverFlags(BASE_DRIVERS);
    FREE_AGENTS=getSeasonFreeAgents(state.currentSeason);
    invalidateStandingsCache();
  }else{postInitSetup();}
  hideSplash();
  goHash('#start');render();
}

function _buildScoringOverride(key){
  if(!key||key==='current')return null;
  if(key==='always9')return{points:[9,6,4,3,2,1],bestN:11,fastestLap:false,label:'Always 9pts'};
  if(key==='always10')return{points:[10,6,4,3,2,1],bestN:null,fastestLap:false,label:'Always 10pts'};
  const era=SCORING_ERAS.find(e=>String(e.from)===String(key));
  if(!era)return null;
  return{points:era.points,bestN:era.bestN,fastestLap:era.fastestLap,label:era.label};
}

function debugRunNonChampRace(){
  const sel=document.getElementById('nonChampTrack');
  if(!sel){return;}
  const cal=seasonCalendar()[Number(sel.value)];
  // Capture the manual die value BEFORE the modal (and its input) is removed — previously
  // this was read nowhere at all, so the field had no effect on the race whatsoever.
  const _manualDieVal=parseInt((document.getElementById('manualDieInput')?.value||'').trim());
  const _hasManualDie=!isNaN(_manualDieVal)&&_manualDieVal>=1&&_manualDieVal<=6;
  const _scoringSel=document.getElementById('nonChampScoring')?.value||'current';
  document.getElementById('nonChampModal').remove();
  // Save current weekend state
  const savedWeekend=app.currentWeekend?JSON.parse(JSON.stringify(app.currentWeekend)):null;
  const savedLive=localStorage.getItem('f1dice_live');
  // Shuffle all drivers and pick 26 randomly
  const shuffled=BASE_DRIVERS.slice().sort(()=>Math.random()-0.5);
  const picked=shuffled.slice(0,Math.min(26,shuffled.length));
  // Flag this weekend as non-championship
  app.currentWeekend=createWeekend(seasonCalendar().indexOf(cal));
  if(app.currentWeekend){
    app.currentWeekend._nonChampionship=true;
    // Points-system override — only affects the points shown for THIS exhibition race
    // (stored on the weekend itself, so it can't leak into or persist beyond this race).
    const _scoringOverride=_buildScoringOverride(_scoringSel);
    if(_scoringOverride)app.currentWeekend._pointsOverride=_scoringOverride;
    app.currentWeekend.raceMeta.title=`[NON-CHAMP${_scoringOverride?' · '+_scoringOverride.label+' scoring':''}] ${app.currentWeekend.raceMeta.title}`;
    const _wSel=document.getElementById('nonChampWeather')?.value||'random';
    const _w=_wSel==='random'?rollWeather(app.currentWeekend.raceMeta?.track):_wSel;
    app.currentWeekend.raceMeta.weather=_w;
    if(_w==='rain'||_w==='heavy rain')requestAnimationFrame(()=>showWeatherWarning(_w));
  }
  saveLive();saveApp();
  goHash('#weekend');
  if(_hasManualDie&&app.currentWeekend){
    // Force the very first roll of the new race to the requested value. Passed as a
    // parameter (not a global Math.random override) so it can't leak into any other
    // random rolls that happen to cascade synchronously afterward.
    processNextRollWrapper(_manualDieVal);
  }
}

function debugConfirmDumpDriverHistory(){
  const id=Number(document.getElementById('debugHistDumpId')?.value);
  if(!id){alert('Please enter a valid driver ID.');return;}
  document.getElementById('debugHistDumpModal').remove();
  const lines=['Year\tRound\tGP\tTrack\tSession\tTeam\tPosition\tStatus\tPoints\tWeekendKey'];
  const seenKeys={};
  app.history.weekends.forEach(w=>{
    [['prequalifying',w.prequalifying],['qualifying',w.qualifying],['race',w.race]].forEach(([sn,arr])=>{
      (arr||[]).forEach(r=>{
        if(r.id!==id)return;
        lines.push([w.raceMeta.year,w.raceMeta.round,w.raceMeta.gp||'',w.raceMeta.track||'',sn,r.team||'',r.position??'',r.status||'',r.points??'',w.weekendKey||''].join('\t'));
        const dupKey=`${w.raceMeta.year}-R${w.raceMeta.round}-${sn}`;
        seenKeys[dupKey]=(seenKeys[dupKey]||0)+1;
      });
    });
  });
  // Flag any (year, round, session) combo recorded more than once for THIS driver — the most
  // direct possible evidence of a duplicated record.
  const dupes=Object.entries(seenKeys).filter(([,c])=>c>1);
  lines.push('');
  if(dupes.length){
    lines.push(`⚠ DUPLICATE (year/round/session) RECORDS FOR THIS DRIVER (${dupes.length}):`);
    dupes.forEach(([k,c])=>lines.push(`  ${k} — appears ${c} times`));
  } else {
    lines.push('No duplicate (year/round/session) records found for this driver.');
  }
  // Also check for duplicate weekendKeys across the ENTIRE history array — a genuinely
  // duplicated weekend record would show up for every driver in that race, not just this one,
  // so this check isn't limited to the driver above.
  const wkKeyCounts={};
  app.history.weekends.forEach(w=>{if(w.weekendKey)wkKeyCounts[w.weekendKey]=(wkKeyCounts[w.weekendKey]||0)+1;});
  const dupWeekends=Object.entries(wkKeyCounts).filter(([,c])=>c>1);
  lines.push('');
  if(dupWeekends.length){
    lines.push(`⚠ DUPLICATE WEEKENDKEYS IN app.history.weekends — affects EVERY driver in that race, not just the one above (${dupWeekends.length}):`);
    dupWeekends.forEach(([k,c])=>lines.push(`  ${k} — appears ${c} times`));
  } else {
    lines.push('No duplicate weekendKeys found in app.history.weekends overall.');
  }
  const blob=new Blob([lines.join('\n')],{type:'text/plain'});
  const a=document.createElement('a');a.href=URL.createObjectURL(blob);
  a.download=`driver_${id}_weekend_history.tsv`;a.click();
}

// ── SEAT FILLING: ensure every team has its required number of drivers before each round ──
function ensureAllSeatsFilledBeforeWeekend(roundNum){
  initSeasonFAPool();
  // Required seat count is LOCKED to the number of contracted drivers each team
  // started the season with. This is stored once in app._initialTeamSizes.
  // Using live BASE_DRIVERS would give wrong counts after firings/quits set team='Available'.
  if(!app._initialTeamSizes){
    app._initialTeamSizes={};
    BASE_DRIVERS.filter(d=>d.team!=='Available'&&!d._retired&&!d._temp).forEach(d=>{
      app._initialTeamSizes[d.team]=(app._initialTeamSizes[d.team]||0)+1;
    });
  }
  // Include teams from _initialTeamSizes even if they currently have ZERO drivers in
  // BASE_DRIVERS. A one-driver team (e.g. EuroBrun) whose sole driver was just fired/quit
  // is spliced out of BASE_DRIVERS entirely by releaseDriverFromTeam, so deriving the team
  // list purely from live BASE_DRIVERS membership made such teams invisible to this seat-fill
  // check — their seat silently stayed empty for the next race (driver "didn't appear").
  const allTeams=[...new Set([
    ...Object.keys(app._initialTeamSizes||{}),
    ...BASE_DRIVERS.filter(d=>d.team!=='Available'&&!d._retired).map(d=>d.team),
  ])];
  const seatNews=[];
  allTeams.forEach(team=>{
    const required=app._initialTeamSizes[team]||0;
    if(!required)return;
    const activeContracted=BASE_DRIVERS.filter(d=>d.team===team&&!d._retired&&!d._temp&&!isDriverInjured(d.id,roundNum));
    const activeTemps=BASE_DRIVERS.filter(d=>d.team===team&&d._temp&&!isDriverInjured(d.id,roundNum));
    const covered=activeContracted.length+activeTemps.length;
    if(covered<required){
      const missing=required-covered;
      // Anyone currently holding a seat for this team — contracted OR temp — can need
      // covering if they're injured. A temp driver who's already covering one injury can
      // themselves become injured; previously temps were excluded from this pool entirely,
      // so nobody would ever be hired to cover THEM.
      const allSeatHolders=BASE_DRIVERS.filter(d=>d.team===team&&!d._retired);
      const outContracted=allSeatHolders.filter(d=>isDriverInjured(d.id,roundNum));
      // Find injured drivers NOT yet covered by an existing temp replacement
      const coveredByTemp=new Set(
        BASE_DRIVERS.filter(d=>d.team===team&&d._temp&&!isDriverInjured(d.id,roundNum)).map(d=>{
          const contract=app._activeContracts?.[d.id];return contract?.replacingId;
        }).filter(Boolean)
      );
      const uncoveredOut=outContracted.filter(d=>!coveredByTemp.has(d.id));
      for(let i=0;i<missing;i++){
        const taken=BASE_DRIVERS.map(d=>d.id);
        // Use uncovered injured drivers first; fall back to full outContracted list
        const replacingDriver=uncoveredOut[i]??outContracted[i]??null;
        const inj=replacingDriver&&app.driverInjuries?.[replacingDriver.id];
        let racesLeft;
        if(inj){
          // Temp covers for the remaining injury duration
          if(inj.missRaces==='season'||inj.missRaces==='career') racesLeft=999;
          else racesLeft=Math.max(1,(inj.fromRound+Number(inj.missRaces))-roundNum+1);
        } else {
          racesLeft=999; // fired/quit vacancy — replacement stays rest of season
        }
        const durationStr=racesLeft>=999?'rest of season':`${racesLeft} round${racesLeft===1?'':'s'}`;
        // Genuine temporary injury/suspension covers may be filled by a loan first.
        // Exclude list must only be this team's own current drivers, not the whole field —
        // reusing `taken` (correct for the free-agent findReplacement call below) here
        // excluded every possible rival candidate and made loans impossible to ever succeed.
        const _teamExistingIds=BASE_DRIVERS.filter(dd=>dd.team===team&&!dd._temp&&!dd._retired).map(dd=>dd.id);
        if(replacingDriver&&racesLeft<999){
          const _loanResult=attemptLoanForInjuryCover(team,replacingDriver.id,racesLeft,_teamExistingIds);
          if(_loanResult){
            const{driver:_loanedD,fromTeam:_loanDonorTeam}=_loanResult;
            const _loanReplName=driverFullName(_loanedD)||((_loanedD.fn||_loanedD.firstName||'')+' '+(_loanedD.ln||_loanedD.lastName||'')).trim();
            seatNews.push(`<strong>${escapeHtml(teamDisplayName(team)||team)}</strong>: <strong>${escapeHtml(_loanReplName)}</strong> joins on loan from <strong>${escapeHtml(teamDisplayName(_loanDonorTeam)||_loanDonorTeam)}</strong>, covering for ${replacingDriver.name}.`);
            continue;
          }
        }
        const repl=findReplacement(team,taken,false);
        if(repl){
          hireReplacement(repl,team,racesLeft,replacingDriver?replacingDriver.id:null);
          const replName=((repl.fn||repl.firstName||'')+' '+(repl.ln||repl.lastName||'')).trim();
          const isInjRep=!!(replacingDriver&&inj&&inj.cause!=='suspension');
          const isSuspRep=!!(replacingDriver&&inj&&inj.cause==='suspension');
          const repType=isInjRep?'injury replacement':isSuspRep?'suspension replacement':'temporary';
          const forStr=replacingDriver?`, covering for ${replacingDriver.name}`:'';
          seatNews.push(`<strong>${escapeHtml(teamDisplayName(team)||team)}</strong>: <strong>${escapeHtml(replName)}</strong> signs (${repType})${forStr}.`);
          // seat filled — banner shown in weekend view
        } else {
          const reason=inj?(inj.cause==='suspension'?'suspension':`injury (${inj.impact||'unknown'})`):'vacancy';
          seatNews.push(`⚠ <strong>${escapeHtml(teamDisplayName(team)||team)}</strong> — no available driver to fill seat due to ${reason}.`);
          // seat unfilled — pool exhausted
        }
      }
    }
  });
  return seatNews;
}

function newWeekend(){
  try{
  const idx=nextRoundIndex();
  const totalRounds=seasonRules().totalRounds||16;
  if(idx>=totalRounds){
    // Season complete - show end-of-season news if not yet shown
    const endKey='season-end-'+app.currentSeason;
    if(!app.news||!app.news.some(n=>n.id===endKey)){
      expireSeasonEndInexperience();
  const endNews=buildSeasonEndNews(app.currentSeason);
      pushNews(endNews);
      saveApp();
      requestAnimationFrame(()=>showNewsModal(endNews));
    } else {
      alert('Season complete.');
    }
    return;
  }
  stopAuto(true);
  // Clear any lingering end-of-race state before creating the new weekend
  if(app.currentWeekend){app.currentWeekend.pendingSeasonReturn=false;app.currentWeekend._psrDismissed=true;}
  // Ensure all team seats are filled before creating the weekend
  const nextRound=(seasonCalendar()[idx]||{}).round||idx+1;
  // Release any temp contracts that have expired BEFORE this round (prevents 3-driver teams
  // when an injured driver returns — their replacement must be gone before the weekend is built)
  if(app._activeContracts){
    Object.entries(app._activeContracts).forEach(([faIdStr,contract])=>{
      const faId=Number(faIdStr);
      if(nextRound>contract.expiresAfterRound){
        releaseReplacement(faId); // silent — no news; news was shown at end of last race
      }
    });
  }
  const _seatNews=ensureAllSeatsFilledBeforeWeekend(nextRound);
  app.currentWeekend=createWeekend(idx);
  if(app.currentWeekend){
    app.currentWeekend.rollSequence=0;
    // Attach seat-fill news to weekend so it appears in team news post-race if needed
    if(_seatNews.length) app.currentWeekend._seatFillNews=_seatNews;
    const _wr=rollWeather(app.currentWeekend.raceMeta?.track);
    app.currentWeekend.raceMeta.weather=_wr;
    if(_wr==='rain'||_wr==='heavy rain'){
      requestAnimationFrame(()=>showWeatherWarning(_wr));
    }
  }
  // Show season-start news on round 1
  if(idx===0){
    const startKey='season-start-'+app.currentSeason;
    if(!app.news||!app.news.some(n=>n.id===startKey)){
      const startNews=buildSeasonStartNews(app.currentSeason);
      pushNews(startNews);
      saveApp();
      requestAnimationFrame(()=>showNewsModal(startNews));
    }
  }
  saveApp();saveLive();goHash('#weekend');
  }catch(e){console.error('newWeekend error:',e);alert('Error starting round: '+e.message+'\n\nCheck browser console for details.');}
}

// Export modifier change log — all _raceEventMods across the entire season history
function exportModifierLog(){
  const lines=[
    'F1 Dice Simulator — Modifier Change Log',
    `Season: ${app.currentSeason||1989}  Rounds completed: ${app.history.weekends.length}`,
    `Exported: ${new Date().toLocaleString()}`,
    '',
    'Round\tGP\tSession\tKind\tName\tDelta\tAcc. mod (not total)\tReason',
  ];
  // Also include current weekend if in progress — but only if it hasn't already been
  // recorded into history (recordWeekendHistory copies the weekend in but shares the SAME
  // _raceEventMods array reference; app.currentWeekend isn't cleared afterward, so without
  // this check every entry from the just-finished weekend would be counted twice).
  const allWeekends=[...app.history.weekends];
  const _curKey=app.currentWeekend?.raceMeta?weekendKey(app.currentWeekend.raceMeta):null;
  const _curAlreadyRecorded=_curKey&&app.history.weekends.some(w=>w.weekendKey===_curKey);
  if(app.currentWeekend&&!_curAlreadyRecorded&&(app.currentWeekend._raceEventMods||[]).length)allWeekends.push(app.currentWeekend);
  // Build one combined, chronologically-sorted timeline — race events sort by (year, round),
  // EOS events sort just after that year's races (round=Infinity) and before the next year's.
  // Previously every EOS event was appended after ALL race rows from the ENTIRE game history,
  // regardless of which season they actually belonged to.
  const timeline=[];
  allWeekends.forEach(w=>{
    const mods=w._raceEventMods||[];
    if(!mods.length)return;
    const gp=w.raceMeta?.gp||'?';
    const round=w.raceMeta?.round||0;
    const yr=w.raceMeta?.year||0;
    mods.forEach(m=>{
      const accNow=typeof m.newMod==='number'?m.newMod:(m.kind==='driver'?(getDriverMod(m.id)||0):(getTeamMod(m.name)||0));
      timeline.push({yr,round,line:[
        `R${round}`,escapeHtml(gp).replace(/&amp;/g,'&'),
        m.session||'race',m.kind,
        m.name,
        (m.delta>=0?'+':'')+m.delta.toFixed(2),
        (accNow>=0?'+':'')+accNow.toFixed(2),
        m.reason||'',
      ].join('\t')});
    });
  });
  // Off-season modifier changes (e.g. signing bonuses) — previously untracked entirely
  (app._eosModifierEvents||[]).forEach(e=>{
    const name=e.kind==='driver'?(driverFullName(BASE_DRIVERS.find(d=>d.id===e.id))||`Driver ${e.id}`):teamDisplayName(e.id);
    const accNow=typeof e.newMod==='number'?e.newMod:(e.kind==='driver'?(getDriverMod(e.id)||0):(getTeamMod(e.id)||0));
    timeline.push({yr:e.yr||0,round:Infinity,line:[
      `${e.yr} EOS`,'—','end-of-season',e.kind,
      name,
      (e.delta>=0?'+':'')+e.delta.toFixed(2),
      (accNow>=0?'+':'')+accNow.toFixed(2),
      e.reason||'',
    ].join('\t')});
  });
  timeline.sort((a,b)=>a.yr-b.yr||a.round-b.round);
  timeline.forEach(t=>lines.push(t.line));
  const blob=new Blob([lines.join('\n')],{type:'text/plain;charset=utf-8'});
  const a=document.createElement('a');a.href=URL.createObjectURL(blob);
  a.download=`F1Dice_ModifierLog_${app.currentSeason||1989}.txt`;a.click();
}
window.exportModifierLog=exportModifierLog;

const BG_DB_NAME='f1dice_assets', BG_STORE='bg', BG_KEY='background';
const PHOTO_STORE='driverPhotos';
let _driverPhotoURLs={};   // id→objectURL cache for current page load
let _driverFolderHandle=null; // FileSystemDirectoryHandle from last pickFolder

function driverPhoto_openDB(){
  return new Promise((res,rej)=>{
    const req=indexedDB.open(BG_DB_NAME,2);
    req.onupgradeneeded=e=>{
      const db=e.target.result;
      if(!db.objectStoreNames.contains(BG_STORE))db.createObjectStore(BG_STORE);
      if(!db.objectStoreNames.contains(PHOTO_STORE))db.createObjectStore(PHOTO_STORE);
    };
    req.onsuccess=e=>res(e.target.result);
    req.onerror=()=>rej(req.error);
  });
}
async function driverPhoto_save(id,blob){
  const db=await driverPhoto_openDB();
  return new Promise((res,rej)=>{
    const tx=db.transaction(PHOTO_STORE,'readwrite');
    tx.objectStore(PHOTO_STORE).put(blob,Number(id));
    tx.oncomplete=()=>res();
    tx.onerror=()=>rej(tx.error);
  });
}
async function driverPhoto_getBlob(id){
  try{
    const db=await driverPhoto_openDB();
    return new Promise((res,rej)=>{
      const tx=db.transaction(PHOTO_STORE,'readonly');

async function driverPhoto_pickFolder(){
  if(!window.showDirectoryPicker){
    // Fallback: multi-file input
    const inp=document.createElement('input');
    inp.type='file';inp.accept='image/jpeg,image/png,image/webp';inp.multiple=true;
    inp.onchange=async()=>{
      const files=Array.from(inp.files||[]);
      let count=0;
      for(const f of files){
        const m=f.name.toLowerCase().match(/^(\d+)\.(jpe?g|jpg|png|webp)$/);
        if(m){await driverPhoto_save(Number(m[1]),f);delete _driverPhotoURLs[Number(m[1])];count++;}
      }
      driverPhoto_updateStatus(`${count} photo(s) loaded.`);
    };
    inp.click();return;
  }
  try{
    const handle=await window.showDirectoryPicker({mode:'read'});
    _driverFolderHandle=handle;
    await driverPhoto_scanFolder(handle);
  }catch(e){if(e.name!=='AbortError')alert('Could not open folder: '+e.message);}
}
async function driverPhoto_scanFolder(handle){
  let count=0;
  const skippedNames=[];
  for await(const [name,entry] of handle.entries()){
    if(entry.kind!=='file'){skippedNames.push(`${name} (not a file)`);continue;}
    // Case-insensitive match: filename must be all digits + image extension
    const nameLower=name.toLowerCase();
    const m=nameLower.match(/^(\d+)\.(jpe?g|jpg|png|webp)$/);
    if(!m){
      // Only report image files that were skipped (ignore .DS_Store etc)
      const isImg=/\.(jpe?g|jpg|png|webp)$/i.test(name);
      if(isImg)skippedNames.push(name);
      continue;
    }
    const id=Number(m[1]);
    try{
      const file=await entry.getFile();
      await driverPhoto_save(id,file);
      delete _driverPhotoURLs[id];
      count++;
    }catch(e){skippedNames.push(`${name} (read error: ${e.message})`);}
  }
  let msg=`${count} photo(s) loaded.`;
  if(skippedNames.length)msg+=` Skipped: ${skippedNames.slice(0,5).join(', ')}${skippedNames.length>5?' …':''}`;
  driverPhoto_updateStatus(msg);
}
async function driverPhoto_reload(){
  if(!_driverFolderHandle){driverPhoto_pickFolder();return;}
  await driverPhoto_scanFolder(_driverFolderHandle);
}
async function driverPhoto_clear(){
  if(!confirm('Clear all driver photos?'))return;
  const db=await driverPhoto_openDB();
  await new Promise((res,rej)=>{
    const tx=db.transaction(PHOTO_STORE,'readwrite');
    tx.objectStore(PHOTO_STORE).clear();
    tx.oncomplete=()=>res();
    tx.onerror=()=>rej(tx.error);
  });
  // Revoke all cached URLs
  Object.values(_driverPhotoURLs).forEach(u=>{try{URL.revokeObjectURL(u);}catch(e){}});
  _driverPhotoURLs={};
  _driverFolderHandle=null;
  driverPhoto_updateStatus('All photos cleared.');
}
function driverPhoto_updateStatus(msg){
  const el=document.getElementById('driverPhotoStatus');
  if(el)el.textContent=msg;
}

function exportRetirementLog(){
  const yr=app.currentSeason||1989;
  const weekends=app.history.weekends.filter(w=>w.raceMeta.year===yr);
  if(!weekends.length){
    alert('No races recorded yet this season.');
    return;
  }
  let csv='Round,GP,Driver,Team,Status,Reason,AtFault\n';
  let rowCount=0;
  weekends.forEach(w=>{
    const round=w.raceMeta.round;
    const gp=w.raceMeta.gp;
    const _faultIds=new Set((w._crashGroups||[]).map(g=>crashGroupFaultId(g)).filter(Boolean));
    (w.race||[]).forEach(r=>{
      if(r.status==='active')return;
      const d=BASE_DRIVERS.find(x=>x.id===r.id)||(app._retiredDrivers||[]).find(x=>x.id===r.id);
      const name=d?driverFullName(d):(r.driver||'Unknown');
      const status=r.status==='crashed'?'Crashed':'Retired';
      const reason=r.retirementReason||(r.status==='crashed'?'Crash':'');
      const atFault=r.status==='crashed'?(_faultIds.has(r.id)?'Yes':'No'):'N/A';
      csv+=`${round},"${gp}","${name}","${r.team||''}","${status}","${reason}","${atFault}"\n`;
      rowCount++;
    });
  });
  if(!rowCount){
    alert('No retirements or crashes recorded yet this season.');
    return;
  }
  const blob=new Blob([csv],{type:'text/csv'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');
  a.href=url;
  a.download=`F1_Retirements_${yr}.csv`;
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
}

  let csv='Year,Round,Action,From,To,Reason,Date,Explanation\n';

function getMovementExplanation(movement){
  const {action,reason}=movement;
  
  const explanations={
    'hired/mid-season-hire':'Driver was hired to permanently fill a seat for the remainder of the season.',
    'hired/injury-replacement':'Driver was hired as a replacement for an injured teammate. Will leave when injury ends.',
    'hired/temporary-cover':'Driver was hired to cover for a suspension or brief absence.',
    'fired/rivalry':'Driver was fired due to intense rivalry with their teammate.',
    'fired/poor-qualifying':'Driver was fired after failing to qualify.',
    'fired/reckless-driving':'Driver was fired due to multiple at-fault crashes.',
    'fired/paddock-drama':'Driver was fired following paddock controversy.',
    'fired/very-poor-form':'Driver was fired following a prolonged loss of form.',
    'fired/rivalry':'Driver was fired following teammate rivalry conflict.',
    'fired/performance':'Driver was fired due to poor overall performance.',
    'quit/personal':'Driver voluntarily quit their team to pursue other opportunities.',
    'quit/rivalry':'Driver quit due to a hatred-level rivalry with their teammate.',
    'quit/car-reliability-frustration':'Driver quit out of frustration after repeated mechanical failures cost them a competitive season.',
    'retired/age-limit':'Driver mandatory retirement at age 45.',
    'retired/voluntary':'Driver chose to retire at their current age.'
  };

  return explanations[key]||`${action} (${reason})`;
}
