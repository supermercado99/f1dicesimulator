function rollInjury(scale=1){const r=Math.random();let c=0;for(const row of INJURY_TABLE){c+=row.prob*scale;if(r<c)return row;}return null;}
function applyInjury(id,row,round,effectiveFromRound){
  if(!app.driverInjuries)app.driverInjuries={};
  const _bd=BASE_DRIVERS.find(d=>d.id===id);
  const teamAtInjury=_bd&&_bd.team!=='Available'?_bd.team:null;
  // missRaces may be a [min,max] range — resolve to a concrete integer
  let missRaces=row.missRaces;
  if(Array.isArray(missRaces)){
    const [lo,hi]=missRaces;
    missRaces=lo+Math.floor(Math.random()*(hi-lo+1));
  }
  // fromRound is 'the last round they were fully fit for' — isDriverInjured() excludes them
  // from every round AFTER this one. A race-time injury correctly uses the current round
  // (they already raced/attempted it). A pre-qualifying/qualifying-time injury happens BEFORE
  // that same round's race even starts, so effectiveFromRound must be passed as round-1 —
  // otherwise the driver would incorrectly still be allowed to start a race they were injured
  // getting to.
  app.driverInjuries[id]={impact:row.impact,result:row.result,fromRound:(effectiveFromRound!=null?effectiveFromRound:round),missRaces,career:missRaces==='career',teamAtInjury};
  // Confidence-hit penalty scales with actual races missed rather than the injury's
  // severity-tier bucket: -0.05 for a single missed race, linear up to a capped -0.50 for
  // 15+ missed races. A career-ending injury counts as maxed out (they're permanently
  // 'missing' every remaining race).
  const _racesForMod=Math.max(1,missRaces==='career'?15:missRaces);
  const _injuryMod=Math.round(Math.max(-0.50,-0.05+(_racesForMod-1)*((-0.50+0.05)/14))*100)/100;
  if(_injuryMod!==0){
    applyDriverMod(id,_injuryMod);
    if(_bd)recordMod('driver',id,driverFullName(_bd),_injuryMod,`Injury (${row.impact})`,app.currentWeekend?.session||'race');
  }
}
// Shared eligibility logic for "take a driver from a weaker rival team" — used by both
// permanent signings (attemptSigningFromRival) and temporary injury-cover loans
// (attemptLoanForInjuryCover). Returns {driver, fromTeam} or null.
function findRivalTargetDriver(borrowingTeam,minTeamMod,excludeIds){
  const borrowingTeamMod=teamTotalMod(borrowingTeam);
  if(borrowingTeamMod<minTeamMod){
    if(app._debugMessages)console.log('[DEBUG] findRivalTargetDriver: borrowing team not strong enough',`team=${borrowingTeam} mod=${borrowingTeamMod} needed>=${minTeamMod}`);
    return null; // only teams with real pulling power try this
  }
  const prospects=BASE_DRIVERS.filter(d=>{
    if(excludeIds.includes(d.id))return false;
    if(d.team===borrowingTeam||d.team==='Available'||d._retired||d._temp)return false;
    if(app._activeLoans&&app._activeLoans[d.id])return false; // already out on loan elsewhere
    if((app._seasonTeamBlocklist?.[d.id]||[]).includes(teamCanonicalName(borrowingTeam)))return false;
    const donorMod=teamTotalMod(d.team);
    if(donorMod>=borrowingTeamMod-0.5)return false; // not enough of an upgrade to tempt them
    if(isDriverInjured(d.id,currentSeasonEntries().length+1))return false;
    const dmod=driverTotalMod(d.id);
    const seasonGain=driverCurrentSeasonGain(d.id);
    const outperformingOwnTeam=dmod>donorMod;
    // Only a driver who has gained ground this season, or who is rated higher than
    // their own team, is considered a worthwhile target.
    if(!(seasonGain>0||outperformingOwnTeam))return false;
    // Relationship: a driver who isn't keen on the borrowing team (poor history, or built up
    // through things like a close title fight against them) is less likely to be receptive to
    // an approach at all — same hidden mechanism used for rejoin reluctance.
    return Math.random()>=_relationRejoinBlockChance(d.id,borrowingTeam);
  });
  if(!prospects.length){
    if(app._debugMessages)console.log('[DEBUG] findRivalTargetDriver: no eligible donor found',`borrowingTeam=${borrowingTeam} mod=${borrowingTeamMod}`);
    return null;
  }
  // Shortlist by raw modifier, then let form make a genuinely probabilistic difference in
  // who actually gets poached — not an automatic pick of whoever has the single best
  // modifier-plus-form blend.
  const target=pickWeightedByForm(prospects);
  if(app._debugMessages)console.log('[DEBUG] findRivalTargetDriver: target found',`driver=${target.id} fromTeam=${target.team} toTeam=${borrowingTeam}`);
  return{driver:target,fromTeam:target.team};
}

function attemptSigningFromRival(signingTeam,excludeIds){
  // A team with a fresh vacancy may very occasionally sign an established driver away
  // from a weaker rival rather than dip into the free-agent pool — but this should stay
  // rare: free-agent signings still account for ~70% of vacancy fills, poaching only
  // ~30% when eligible, and capped at 1-2 successful signings per season league-wide
  // (this cap is shared with the injury-cover loan system below).
  // Returns {driver, fromTeam} on success, or null (caller falls back to free agents).
  if(app._seasonSigningCap===undefined)app._seasonSigningCap=1+Math.round(Math.random()); // 1 or 2 per season
  if(app._seasonSigningCount===undefined)app._seasonSigningCount=0;
  if(app._seasonSigningCount>=app._seasonSigningCap){
    if(app._debugMessages)console.log('[DEBUG] attemptSigningFromRival: season cap reached',`count=${app._seasonSigningCount} cap=${app._seasonSigningCap} team=${signingTeam}`);
    return null; // season cap reached
  }
  if(Math.random()>0.30){
    if(app._debugMessages)console.log('[DEBUG] attemptSigningFromRival: lost the 70/30 roll',`team=${signingTeam}`);
    return null; // 70/30 weighting toward free agents
  }
  const found=findRivalTargetDriver(signingTeam,1.0,excludeIds);
  if(!found)return null;
  app._seasonSigningCount++;
  if(app._debugMessages)console.log('[DEBUG] attemptSigningFromRival: SUCCESS',`team=${signingTeam} count=${app._seasonSigningCount}/${app._seasonSigningCap}`);
  return found;
}

// A PQ driver in good form deserves a shot at the big time. Unlike attemptSigningFromRival
// (which requires the SIGNING team to have real pulling power, +1.00 total modifier), this
// pathway is available to ANY auto-qualifying team regardless of its own modifier — a weak
// auto-qual team can still offer a promotion, the same way a struggling top-flight club can
// still call up a in-form player from the reserves. Team strength is irrelevant here; the
// PQ driver's form is the whole point. Shares the same season signing cap as
// attemptSigningFromRival (keeps total mid-season churn sane) and the same 70/30 rarity roll.
function attemptPQPromotionSigning(borrowingTeam,excludeIds){
  // Only makes sense moving PQ -> auto-qualifying; a PQ team offering another PQ team's
  // driver isn't a 'promotion'.
  const _borrowingIsPQ=(app.preqDriverIds||[]).some(pid=>BASE_DRIVERS.find(b=>b.id===pid)?.team===borrowingTeam);
  if(_borrowingIsPQ)return null;
  if(app._seasonSigningCap===undefined)app._seasonSigningCap=1+Math.round(Math.random());
  if(app._seasonSigningCount===undefined)app._seasonSigningCount=0;
  if(app._seasonSigningCount>=app._seasonSigningCap){
    if(app._debugMessages)console.log('[DEBUG] attemptPQPromotionSigning: season cap reached',`count=${app._seasonSigningCount} cap=${app._seasonSigningCap} team=${borrowingTeam}`);
    return null;
  }
  if(Math.random()>0.30){
    if(app._debugMessages)console.log('[DEBUG] attemptPQPromotionSigning: lost the 70/30 roll',`team=${borrowingTeam}`);
    return null;
  }
  const preqIdSet=new Set(app.preqDriverIds||[]);
  const prospects=BASE_DRIVERS.filter(d=>{
    if(excludeIds.includes(d.id))return false;
    if(d.team===borrowingTeam||d.team==='Available'||d._retired||d._temp)return false;
    if(!preqIdSet.has(d.id))return false; // must actually be in the PQ pool
    if(app._activeLoans&&app._activeLoans[d.id])return false;
    if((app._seasonTeamBlocklist?.[d.id]||[]).includes(teamCanonicalName(borrowingTeam)))return false;
    if(isDriverInjured(d.id,currentSeasonEntries().length+1))return false;
    return driverFormScore(d.id)>=0.5; // good form or better — deserving of promotion
  });
  if(!prospects.length){
    if(app._debugMessages)console.log('[DEBUG] attemptPQPromotionSigning: no in-form PQ driver found',`team=${borrowingTeam}`);
    return null;
  }
  const target=pickWeightedByForm(prospects);
  if(!target)return null;
  // Driver's decision: a promotion out of PQ is normally an easy yes. The one real
  // hesitation is if their current team is actually clear of the drop zone (doing fine,
  // maybe even about to escape PQ status itself) while the team offering the 'promotion'
  // is itself down near/in the drop zone — jumping to a struggling auto-qual team that's
  // barely better than PQ isn't much of an upgrade, so they're more likely to stay put.
  const _donorSafe=!isTeamNearPQDropZone(target.team);
  const _offerRisky=isTeamNearPQDropZone(borrowingTeam);
  const _acceptChance=(_donorSafe&&_offerRisky)?0.20:0.90;
  if(Math.random()>_acceptChance){
    if(app._debugMessages)console.log('[DEBUG] attemptPQPromotionSigning: driver declined, staying put',`driver=${target.id} donorTeam=${target.team} offerTeam=${borrowingTeam}`);
    return null;
  }
  app._seasonSigningCount++;
  if(app._debugMessages)console.log('[DEBUG] attemptPQPromotionSigning: SUCCESS',`driver=${target.id} fromTeam=${target.team} toTeam=${borrowingTeam} count=${app._seasonSigningCount}/${app._seasonSigningCap}`);
  return{driver:target,fromTeam:target.team,viaPromotion:true};
}



// Loans a driver from a weaker team to cover an injury/suspension vacancy, on the same
// eligibility/frequency system as attemptSigningFromRival (shared season cap, 70/30 split),
// but temporary: the loaned driver returns to their original team, and the donor team's own
// backfill hire returns to the pool, when the loan period ends (see checkLoanExpirations).
// Requires the borrowing team to have a +2.00 total modifier (higher bar than a permanent
// signing) and a free agent available to backfill the donor team — if no backfill is
// available the loan is cancelled entirely and the caller falls back to a normal FA hire.
function attemptLoanForInjuryCover(borrowingTeam,injuredDriverId,racesLeft,excludeIds){
  if(app._seasonSigningCap===undefined)app._seasonSigningCap=1+Math.round(Math.random());
  if(app._seasonSigningCount===undefined)app._seasonSigningCount=0;
  if(app._seasonSigningCount>=app._seasonSigningCap)return null;
  if(Math.random()>0.30)return null;
  const found=findRivalTargetDriver(borrowingTeam,2.00,excludeIds);
  if(!found)return null;
  const{driver:loanedDriver,fromTeam:donorTeam}=found;
  // A strong team (modifier above +1.50) won't loan out one of their own drivers to help
  // a rival, even under the normal rival-donor eligibility rules.
  if(teamTotalMod(donorTeam)>1.50)return null;
  const donorExistingIds=BASE_DRIVERS.filter(dd=>dd.team===donorTeam&&!dd._temp&&!dd._retired).map(dd=>dd.id);
  const backfill=findReplacement(donorTeam,[loanedDriver.id,...donorExistingIds,...excludeIds],false);
  if(!backfill)return null; // no cover available for the donor team — cancel the loan
  app._seasonSigningCount++;
  const expiresAfterRound=currentSeasonEntries().length+Math.max(1,racesLeft)+1;
  hireReplacement(backfill,donorTeam,racesLeft,null);
  if(!app._activeLoans)app._activeLoans={};
  let wasInPQ=false;
  if(app.preqDriverIds&&app.preqDriverIds.includes(loanedDriver.id)){
    wasInPQ=true;
    app.preqDriverIds=app.preqDriverIds.filter(id=>id!==loanedDriver.id);
  }
  app._activeLoans[loanedDriver.id]={fromTeam:donorTeam,toTeam:borrowingTeam,replacingId:injuredDriverId,backfillId:backfill.id,expiresAfterRound,wasInPQ};
  const _loanNewTb=teamBaseTb(borrowingTeam)||0;
  const _loanDb=loanedDriver.driverBonus||0;
  loanedDriver.team=borrowingTeam;
  loanedDriver.teamBonus=_loanNewTb;
  loanedDriver.qualiBonus=_loanDb+_loanNewTb;
  loanedDriver.raceNoGridBonus=_loanDb+_loanNewTb;
  const _round=currentSeasonEntries().length+1;
  recordDriverMovement(loanedDriver.id,'loaned',donorTeam,borrowingTeam,'injury-replacement-loan',_round,app.currentSeason||1989);
  recordDriverIncident(loanedDriver.id,'loaned',{toTeam:borrowingTeam,fromTeam:donorTeam,round:_round,untilRound:expiresAfterRound,year:app.currentSeason||1989});
  // Motivation boost for the loaned driver — a chance to prove themselves at a new team.
  // Smaller than a permanent signing's boost since the arrangement is temporary.
  const _loanDriverBoost=Math.round((0.05+Math.random()*0.05)*100)/100; // +0.05 to +0.10
  applyDriverMod(loanedDriver.id,_loanDriverBoost);
  recordMod('driver',loanedDriver.id,driverFullName(loanedDriver),_loanDriverBoost,'Loaned to another team as injury cover','race');
  // Small boost for the donor team — goodwill for stepping up to help a rival
  const _loanDonorBoost=Math.round((0.02+Math.random()*0.03)*100)/100; // +0.02 to +0.05
  applyTeamMod(donorTeam,_loanDonorBoost);
  recordMod('team',null,teamDisplayName(donorTeam),_loanDonorBoost,'Driver loaned out as injury cover','race');
  return found;
}

// Reverts any loans whose period has ended: the loaned driver returns to their original
// team, and PQ status is restored if applicable. The donor team's backfill hire expires
// naturally through the normal _activeContracts mechanism (it was given the same duration).
function checkLoanExpirations(newsItems,overrideRound,coveredReturnIds){
  if(!app._activeLoans)return;
  const currentRound=overrideRound!==undefined?overrideRound:currentSeasonEntries().length;
  Object.entries(app._activeLoans).forEach(([idStr,loan])=>{
    const loanedId=Number(idStr);
    if(currentRound<loan.expiresAfterRound)return;
    const d=BASE_DRIVERS.find(x=>x.id===loanedId);
    if(d){
      const _retTb=teamBaseTb(loan.fromTeam)||0;
      const _retDb=d.driverBonus||0;
      d.team=loan.fromTeam;
      d.teamBonus=_retTb;
      d.qualiBonus=_retDb+_retTb;
      d.raceNoGridBonus=_retDb+_retTb;
      if(loan.wasInPQ&&app.preqDriverIds&&!app.preqDriverIds.includes(loanedId)){
        // Only restore PQ status if the original team is still a PQ team
        const stillPQTeam=(app.preqDriverIds.some(id=>BASE_DRIVERS.find(dx=>dx.id===id)?.team===loan.fromTeam))
          ||!!(seasonData().teams[teamCanonicalName(loan.fromTeam)]?.pq);
        if(stillPQTeam)app.preqDriverIds.push(loanedId);
      }
      recordDriverMovement(loanedId,'loan-returned',loan.toTeam,loan.fromTeam,'injury-replacement-loan-ended',currentRound,app.currentSeason||1989);
      recordDriverIncident(loanedId,'loanReturned',{fromTeam:loan.toTeam,toTeam:loan.fromTeam,round:currentRound+1,year:app.currentSeason||1989});
      if(newsItems){
        const injuredD=BASE_DRIVERS.find(x=>x.id===loan.replacingId);
        const backfillD=BASE_DRIVERS.find(x=>x.id===loan.backfillId);
        let msg=`<strong>${escapeHtml(teamDisplayName(loan.toTeam))}</strong> — `;
        msg+=injuredD?`<strong>${escapeHtml(driverFullName(injuredD))}</strong> returns from injury. `:'';
        msg+=`<strong>${escapeHtml(driverFullName(d))}</strong> returns to <strong>${escapeHtml(teamDisplayName(loan.fromTeam))}</strong>.`;
        if(backfillD){
          msg+=` <strong>${escapeHtml(driverFullName(backfillD))}</strong>'s temporary contract at <strong>${escapeHtml(teamDisplayName(loan.fromTeam))}</strong> ends.`;
        }
        newsItems.push(`🔁 ${msg}`);
      }
      if(coveredReturnIds&&loan.replacingId)coveredReturnIds.add(loan.replacingId);
    }
    delete app._activeLoans[loanedId];
  });
}

function recordDriverMovement(driverId,action,fromTeam,toTeam,reason,round,year,explicitName){
  if(!app._driverMovementLog)app._driverMovementLog=[];
  let _name=explicitName;
  if(!_name){
    const _bd=BASE_DRIVERS.find(d=>d.id===driverId);
    if(_bd)_name=driverFullName(_bd);
    else{
      const _ret=(app._retiredDrivers||[]).find(x=>x.id===driverId);
      const _dbE=DRIVER_DATABASE.find(x=>x.id===driverId);
      _name=_ret?(((_ret.firstName||_ret.fn||'')+' '+(_ret.lastName||_ret.ln||_ret.name||'')).trim()):_dbE?((_dbE.fn||'')+' '+(_dbE.ln||'')).trim():null;
    }
  }
  app._driverMovementLog.push({
    driverId,
    driverName:_name||'Unknown',
    action, // 'hired','fired','quit','transferred','retired'
    fromTeam:fromTeam||null,
    toTeam:toTeam||null,
    reason, // 'paddock-drama','rivalry','poor-qualifying','reckless-driving','personal','age-limit','voluntary'
    round: round!=null?round:currentSeasonEntries().length,
    year: year||app.currentSeason||1989,
    timestamp: Date.now()
  });
}

function recordDriverIncident(id,type,details){

function injuryLogMsg(id,row,round){
  const name=BASE_DRIVERS.find(d=>d.id===id)?.name||'Driver';
  const impact=row.impact;
  // Use the resolved missRaces from the stored injury record (avoids showing [8,23] from INJURY_TABLE row)
  const storedInj=app.driverInjuries&&app.driverInjuries[id];
  const missRaces=(storedInj&&storedInj.missRaces!==undefined)?storedInj.missRaces:row.missRaces;
  if(missRaces==='career')return `${impact}: ${escapeHtml(name)} career-ending injury.`;
  if(missRaces==='season')return `${impact}: ${escapeHtml(name)} injured for remainder of season.`;
  const totalRounds=seasonRules().totalRounds;
  const racesLeft=totalRounds-round; // races after this one
  const mr=Number(missRaces)||1;
  if(mr>=racesLeft)return `${impact}: ${escapeHtml(name)} injured until end of season.`;
  return `${impact}: ${escapeHtml(name)} injured for next ${mr} race${mr===1?'':'s'}.`;
}
function isDriverInjured(id,round){
  const inj=app.driverInjuries&&app.driverInjuries[id];
  if(!inj)return false;
  if(inj.career)return true;
  if(inj.missRaces==='season')return true;
  // Injury applied at end of fromRound; driver misses the NEXT missRaces rounds
  return round>inj.fromRound&&round<=inj.fromRound+inj.missRaces;
}
function SUSPENSION_CHANCE(faultId,victimIds){
  // Base 0.5% suspension; 2% if fault driver has hatred rivalry with any victim
  if(faultId&&victimIds&&victimIds.length){
    const hasHatred=victimIds.some(vid=>{
      const rv=app.rivalries&&(app.rivalries[faultId+'-'+vid]||app.rivalries[vid+'-'+faultId]);
      return rv&&rv.hatred;
    });
    if(hasHatred)return Math.random()<0.02;
  }
  return Math.random()<0.005;
}

// Write a 1-race suspension to driverInjuries state (mirrors applyInjury)
// and queue a replacement. Returns a log message string.
function applySuspension(id,round){
  if(!app._movementRules?.suspensions)return `🚩 ${escapeHtml(BASE_DRIVERS.find(x=>x.id===id)?.name||'Driver')} — suspension (disabled by options).`;
  if(!app.driverInjuries)app.driverInjuries={};
  app.driverInjuries[id]={impact:'Suspension',result:'1-race ban',fromRound:round,missRaces:1,career:false,cause:'suspension'};
  recordDriverIncident(id,'suspension',{gp:app.currentWeekend?.raceMeta?.gp,round});
  const d=BASE_DRIVERS.find(x=>x.id===id);
  applyDriverMod(id,MOD_SUSPENSION);
  recordMod('driver',id,d?driverFullName(d):String(id),MOD_SUSPENSION,'Suspension',app.currentWeekend?.session||'race');
  if(d&&d.team&&d.team!=='Available'&&round<(seasonRules().totalRounds||16)){
    const _taken=BASE_DRIVERS.map(x=>x.id);
    const _repl=findReplacement(d.team,_taken,false);
    if(_repl){hireReplacement(_repl,d.team,1,id);}
  }
  // Return string for race log only — Team news section handles the full suspension report
  const nm=d?driverFullName(d):BASE_DRIVERS.find(x=>x.id===id)?.name||'Driver';
  return `🚩 <strong>${escapeHtml(nm)}</strong> receives a 1-race ban.`;
}

// ── WEATHER ──────────────────────────────────────────────────────────────
// Circuits in genuinely arid desert climates, where rain during the F1 race weekend is
// a real rarity rather than just 'less likely' — the Gulf-state Middle East venues, plus
// the two US desert circuits. Keyed by track name (not country) since 'United States'
// also covers plenty of non-desert circuits (Indianapolis, COTA, Miami).
const EXTREME_DRY_TRACKS=new Set(['Sakhir','Sakhir Outer','Yas Marina','Losail','Jeddah','Phoenix','Las Vegas']);
function rollWeather(track){
  const r=Math.random();
  if(track&&EXTREME_DRY_TRACKS.has(track)){
    if(r<0.005)return 'heavy rain';
    if(r<0.03)return 'rain';
    return 'dry';
  }
  if(r<0.05)return 'heavy rain';
  if(r<0.20)return 'rain';
  return 'dry';
}
function weatherIcon(w){
  if(w==='heavy rain')return '⛈';
  if(w==='rain')return '🌧';
  return '☀️';
}
function weatherLabel(w){
  if(w==='heavy rain')return 'Heavy Rain';
  if(w==='rain')return 'Rain';
  return 'Dry';
}
// Is the opening-lap crash logic active for the current lap?
// Detects a crash specifically between the current race leader and the last still-running
// driver — an unusual, notable pairing where the backmarker catching/being caught by the
// leader is a plausible story either way, so fault gets a special 50% roll rather than
// always defaulting to the same convention as an ordinary midfield crash.
function isLeaderVsLastRunnerCrash(w,crashedIds){
  if(!crashedIds||crashedIds.length!==2)return false;
  const sess=w?.sessions?.race;
  if(!sess)return false;
  const runningDrivers=(sess.drivers||[]).filter(d=>d.status==='active'||d.status==='crashed');
  if(runningDrivers.length<2)return false;
  const sorted=[...runningDrivers].sort(compareRaceActive);
  const leaderId=sorted[0].id,lastId=sorted[sorted.length-1].id;
  if(leaderId===lastId)return false;
  return crashedIds.includes(leaderId)&&crashedIds.includes(lastId)?lastId:false;
}
function crashLogicActive(w){
  const weather=w.raceMeta.weather||'dry';
  if(w.session!=='race')return false;
  if(weather==='heavy rain')return w.lap<=7;
  if(weather==='rain')return w.lap<=4;
  return w.lap===1;
}

// ── COMPARATORS ───────────────────────────────────────────────────────────
function compareQuali(a,b){
  if(b.totalNumeric!==a.totalNumeric)return b.totalNumeric-a.totalNumeric;
  for(const v of[6,5,4,3]){if((b.counts[v]||0)!==(a.counts[v]||0))return(b.counts[v]||0)-(a.counts[v]||0);}
  return a.base.listOrder-b.base.listOrder;
}
function compareRaceActive(a,b){
  if(b.totalNumeric!==a.totalNumeric)return b.totalNumeric-a.totalNumeric;
  if((b.counts[6]||0)!==(a.counts[6]||0))return(b.counts[6]||0)-(a.counts[6]||0);
  if((b.counts[5]||0)!==(a.counts[5]||0))return(b.counts[5]||0)-(a.counts[5]||0);
  if((b.counts[4]||0)!==(a.counts[4]||0))return(b.counts[4]||0)-(a.counts[4]||0);
  if((b.counts[3]||0)!==(a.counts[3]||0))return(b.counts[3]||0)-(a.counts[3]||0);
  return a.gridPos-b.gridPos; // higher grid position (lower number) wins
}
function compareInactive(a,b){
  if((b.incidentLap||0)!==(a.incidentLap||0))return(b.incidentLap||0)-(a.incidentLap||0);
  if((b.incidentRoll||0)!==(a.incidentRoll||0))return(b.incidentRoll||0)-(a.incidentRoll||0);
  return a.gridPos-b.gridPos;
}
function currentSeasonEntries(){return app.history.weekends.filter(w=>w.raceMeta.year===app.currentSeason);}
function nextRoundIndex(){return currentSeasonEntries().length;}

// ── WEEKEND CREATION ──────────────────────────────────────────────────────
function createWeekend(idx){
  const cal=seasonCalendar()[idx];
  const raceMeta={year:app.currentSeason||1989,round:cal.round,country:cal.country,gp:cal.gp,track:cal.track,title:`${app.currentSeason||1989} ${cal.gp} at ${cal.track}`,weather:null};
  const preqIds=app.preqDriverIds&&app.preqDriverIds.length?app.preqDriverIds:BASE_DRIVERS.filter(d=>d.listOrder>AUTO_QUALIFY_CUTOFF_FOR_SEASON()).map(d=>d.id);
  const _thisRound=cal.round;
  if(BASE_DRIVERS.length>55) console.log('[DEBUG] BASE_DRIVERS overflow',`${BASE_DRIVERS.length} drivers`);
  const _injuredIds=new Set(Object.entries(app.driverInjuries||{}).filter(([id,inj])=>isDriverInjured(Number(id),_thisRound)).map(([id])=>Number(id)));
  // Cap drivers per team: never include more than maxS drivers from the same team
  const _teamCountAuto={},_teamCountPreq={};
  const _curYr=app.currentSeason||1989;
  const autoBase=BASE_DRIVERS.filter(d=>!preqIds.includes(d.id)&&!_injuredIds.has(d.id)&&d.team!=='Available'&&!d._retired).filter(d=>{
    const maxS=isOneDriverTeam(d.team,_curYr)?1:2;
    const c=(_teamCountAuto[d.team]||0);
    if(c>=maxS)return false;
    _teamCountAuto[d.team]=(c+1);return true;
  }).map(d=>({...d,gridPos:d.listOrder}));
  const preqBase=BASE_DRIVERS.filter(d=>preqIds.includes(d.id)&&!_injuredIds.has(d.id)&&d.team!=='Available'&&!d._retired).filter(d=>{
    const maxS=isOneDriverTeam(d.team,_curYr)?1:2;
    const c=(_teamCountPreq[d.team]||0);
    if(c>=maxS)return false;
    _teamCountPreq[d.team]=(c+1);return true;
  }).map(d=>({...d,gridPos:d.listOrder}));
  const preqExpected=seasonRules().preqTotal||20;
  if(preqBase.length<preqExpected){
    console.log('[DEBUG] PQ grid short',`${preqBase.length}/${preqExpected}`);
  }
  // Sanity check: auto-qualifiers should always be ~26 (25–27 allowed for edge cases).
  // If outside this range something has gone wrong with PQ assignment.
  const _autoCount=autoBase.length;
  if(seasonRules().hasPreQualifying&&(_autoCount<25||_autoCount>27)){
    console.warn(`[PQ SANITY] ${raceMeta.year} R${cal.round}: auto-qualifiers=${_autoCount} (expected 25–27). preqIds=${preqIds.length}, BASE_DRIVERS=${BASE_DRIVERS.length}`);
  }

  return {
    raceMeta,session:'prequalifying',lap:1,rollSequence:0,
    order:preqBase.map(d=>d.id),displayOrder:preqBase.map(d=>d.id),slotPointer:0,
    sameNumberStreak:{value:null,refs:[]},_prevSameStreak:{value:null,refs:[]},fiveStreak:{refs:[]},_openFiveCrash:null,
    sessionFinished:false,weekendFinished:false,autoTimer:null,log:[],pendingAdvance:null,
    _logIncidentsOnly:true, // default: show incidents only in race log (user can toggle)
    sessions:{
      prequalifying:{name:'prequalifying',header:`${raceMeta.title} — Pre-qualifying`,lapLimit:seasonRules().preqLaps,drivers:preqBase.map(b=>sessionDriver(b,'prequalifying')),startOrder:preqBase.map(d=>d.id),finishedOrder:[]},
      qualifying:{name:'qualifying',header:`${raceMeta.title} — Qualifying`,lapLimit:seasonRules().qualiLaps,drivers:[],startOrder:[],finishedOrder:[]},
      race:{name:'race',header:`${raceMeta.title} — Race`,lapLimit:seasonRules().raceLaps,drivers:[],startOrder:[],finishedOrder:[]}
    },
    poleDriverId:null,poleTeam:null,
    _autoBase:autoBase.map(d=>d.id)
  };
}

// sessionDriver now includes modifier in starting bonus
function sessionDriver(base,mode,preqPenalty){
  const dMod=getDriverMod(base.id);
  const tModRaw=getTeamMod(base.team);
  // Full team contribution = base team bonus + accumulated modifier
  const tFull=base.teamBonus+tModRaw;
  // In qualifying: double the full team contribution if positive
  const tEffective=(mode==='qualifying'&&tFull>0)?Math.round(tFull*1.5*100)/100:tFull;
  const qualiRetPenalty=(mode==='race'&&app._qualiRetirementPenalty&&app._qualiRetirementPenalty[base.id])||0;
  // basePure: for race, strip out teamBonus from raceNoGridBonus (it's added back via tEffective)
  // for qualifying, strip out teamBonus from qualiBonus (same reason)
  // raceNoGridBonus = driverBonus + teamBonus; qualiBonus = driverBonus + teamBonus
  // We apply tEffective (= teamBonus + tModRaw, or 1.5x if positive in qualifying)
  // so we must NOT also include teamBonus in basePure. Age decline is already folded into
  // driverBonus (and therefore raceNoGridBonus/qualiBonus) at season start, so it needs no
  // separate term here.
  const basePure=mode==='race'?(base.raceNoGridBonus-base.teamBonus+gridBonus(base.gridPos)):(base.qualiBonus-base.teamBonus);
  const penalty=preqPenalty?seasonRules().preqPenalty:0;
  const startBonus=basePure+penalty+dMod+tEffective+qualiRetPenalty;
  const dTotal=base.driverBonus+dMod;
  const doubled=mode==='qualifying'&&tFull>0; // used for tooltip label only
  const parts=[`D ${fmtBonus(dTotal)}`,`T ${fmtBonus(tEffective)}${doubled?' (×1.5)':''}`];
  const gVal=mode==='race'?gridBonus(base.gridPos):null;
  if(gVal!==null)parts.push(`G ${gVal>=0?'+':''}${gVal}`);
  if(qualiRetPenalty!==0)parts.push(`QRet ${fmtBonus(qualiRetPenalty)}`);
  if(preqPenalty)parts.push(`PQ ${seasonRules().preqPenalty}`);
  const bd=parts.join(', ')+` = ${fmtBonus(startBonus)}`;
  const lapLimit=mode==='prequalifying'?seasonRules().preqLaps:(mode==='qualifying'?seasonRules().qualiLaps:seasonRules().raceLaps);
  return {id:base.id,base,gridPos:base.gridPos,totalNumeric:startBonus,bonus:startBonus,bonusBreakdown:bd,status:'active',retirementReason:'',points:0,laps:Array(lapLimit).fill(''),incidentLap:null,incidentRoll:null,counts:{3:0,4:0,5:0,6:0},pitDramaLaps:[]};
}

function getCurrentSession(){return app.currentWeekend.sessions[app.currentWeekend.session];}
function getSessionDriver(sn,id){return app.currentWeekend.sessions[sn].drivers.find(d=>d.id===id);}
function currentActive(){return getCurrentSession().drivers.filter(d=>d.status==='active');}
function currentCompare(a,b){return app.currentWeekend.session==='race'?compareRaceActive(a,b):compareQuali(a,b);}
function currentDisplayRows(){return app.currentWeekend.displayOrder.map(id=>getSessionDriver(app.currentWeekend.session,id)).filter(Boolean);}
function addLog(html){const sess=app.currentWeekend?.session||'';app.currentWeekend.log.unshift({html,sess});app.currentWeekend.log=app.currentWeekend.log.slice(0,350);}

function setupQualifyingFromPreQualifying(){
  const w=app.currentWeekend;
  const fin=w.sessions.prequalifying.finishedOrder;
  const advance=app._preqAdvanceOverride||seasonRules().preqAdvance;
  const top6=fin.slice(0,advance);
  const failed=fin.slice(advance);
  applyPreqFailMod(failed);
  // Extra-form penalty for failing to advance from PQ — same decaying signal as the race-day
  // categories, scaled the same way (costs a higher-modifier driver more).
  failed.forEach(id=>{
    const dtm=driverTotalMod(id);
    _accumulateExtraForm(id,-0.25*Math.max(0.4,Math.min(1.8,1+dtm*0.15)));
  });
  // Track DNPQ count per driver — mirrors the per-driver DNQ counter used for auto-qual
  // firing, feeding the equivalent PQ-driver firing mechanism.
  if(!app._seasonDNPQCount)app._seasonDNPQCount={};
  failed.forEach(id=>{app._seasonDNPQCount[id]=(app._seasonDNPQCount[id]||0)+1;});
  // Separate counter that resets after the mid-season recalc, feeding the two in-season
  // DNPQ firing checkpoints (2 races before recalc, 2 races before the season finale) —
  // the end-of-season check uses the full-season counter above instead.
  if(!app._seasonDNPQCountSinceRecalc)app._seasonDNPQCountSinceRecalc={};
  failed.forEach(id=>{app._seasonDNPQCountSinceRecalc[id]=(app._seasonDNPQCountSinceRecalc[id]||0)+1;});
  w._pqAdvancerIds=[...top6]; // resolved into the actual advance bonus once qualifying concludes and we know who made the race
  // Teams that fail to get ANY driver through PQ for 5 races in a row take a flat -0.25
  // penalty, then the streak resets and starts counting fresh. Capped at 2 penalties
  // (-0.50 total) per season — this is meant to punish genuinely bad teams for sustained
  // failure, not to keep compounding indefinitely.
  {
    const pqTeamsThisRace=[...new Set(fin.map(id=>teamCanonicalName(BASE_DRIVERS.find(d=>d.id===id)?.team||'')).filter(Boolean))];
    const advancedTeams=new Set(top6.map(id=>teamCanonicalName(BASE_DRIVERS.find(d=>d.id===id)?.team||'')).filter(Boolean));
    if(!app._seasonPQFailStreak)app._seasonPQFailStreak={};
    if(!app._seasonPQPenaltyCount)app._seasonPQPenaltyCount={};
    pqTeamsThisRace.forEach(team=>{
      if(advancedTeams.has(team)){
        app._seasonPQFailStreak[team]=0;
      } else {
        const streak=(app._seasonPQFailStreak[team]||0)+1;
        if(streak>=5){
          const timesPenalized=app._seasonPQPenaltyCount[team]||0;
          const _ttmForPQPenalty=teamTotalMod(team);
          if(timesPenalized<2&&_ttmForPQPenalty>-2.00){
            applyTeamMod(team,-0.25);
            recordMod('team',null,teamDisplayName(team),-0.25,'Failed to PQ any driver for 5 races','prequalifying');
            app._seasonPQPenaltyCount[team]=timesPenalized+1;
          }
          app._seasonPQFailStreak[team]=0; // reset and start counting a fresh streak
        } else {
          app._seasonPQFailStreak[team]=streak;
        }
      }
    });
  }
  w._preqAdvance=advance;
  // Exclude any driver injured or suspended during PQ from the qualifying grid
  const _injuredInPQ=new Set(top6.filter(id=>{
    const inj=app.driverInjuries&&app.driverInjuries[id];
    return inj&&inj.fromRound===w.raceMeta.round;
  }));
  if(_injuredInPQ.size){
    if(!w._pqInjuredOut)w._pqInjuredOut=[];
    _injuredInPQ.forEach(id=>w._pqInjuredOut.push(id));
  }
  const auto=BASE_DRIVERS.filter(d=>w._autoBase&&w._autoBase.includes(d.id)).map(d=>({...d,gridPos:d.listOrder}));
  const movers=BASE_DRIVERS.filter(d=>top6.includes(d.id)&&!_injuredInPQ.has(d.id)).map(d=>({...d,gridPos:d.listOrder}));
  const union=[...auto,...movers.filter(m=>!auto.some(a=>a.id===m.id))];
  w.sessions.qualifying.drivers=union.map(b=>{
    const isFromPQ=movers.some(m=>m.id===b.id);
    if(!isFromPQ)return sessionDriver(b,'qualifying',false);
    // Pass penalty override: winner gets -2.50, others -3.00 (from SEASONS rules default)
    const d=sessionDriver(b,'qualifying',true);
    // All 4 PQ drivers get same flat -2.00 penalty (no winner bonus)
    return d;
  });
  w.sessions.qualifying.startOrder=union.map(b=>b.id);
}

function setupRaceFromQualifying(){
  const w=app.currentWeekend;
  const qualifiedIds=w.sessions.qualifying.finishedOrder;
  const raceField=seasonRules().raceField||26; // 1991=26, 1989=26 (all qualifiers race)
  // Exclude injured/suspended
  const injuredForThisRound=qualifiedIds.filter(id=>isDriverInjured(id,w.raceMeta.round));
  if(injuredForThisRound.length){
    if(!w._qualiInjuredOut)w._qualiInjuredOut=[];
    injuredForThisRound.forEach(id=>{if(!w._qualiInjuredOut.includes(id))w._qualiInjuredOut.push(id);});
  }
  const eligible=qualifiedIds.filter(id=>!injuredForThisRound.includes(id));
  // Take top raceField drivers (promotes from positions 27+ if injuries create vacancies)
  const raceIds=eligible.slice(0,raceField);
  // Track DNQ (qualified for qualifying but not race — only relevant in 1991 with 30→26 cut)
  w._dnqIds=qualifiedIds.filter(id=>!raceIds.includes(id)&&!injuredForThisRound.includes(id));
  // Extra-form penalty for DNQing — auto-qualifying drivers only. A PQ advancer missing the
  // race field on top of already having to fight through PQ isn't the same kind of shock.
  const _preqIdsForDNQForm=new Set(app.preqDriverIds||[]);
  w._dnqIds.filter(id=>!_preqIdsForDNQForm.has(id)).forEach(id=>{
    const dtm=driverTotalMod(id);
    _accumulateExtraForm(id,-0.3*Math.max(0.4,Math.min(1.8,1+dtm*0.15)));
  });
  const ordered=raceIds.map((id,i)=>{
    const qd=getSessionDriver('qualifying',id);
    return {...qd.base,gridPos:i+1};
  });
  const pole=ordered[0];
  w.poleDriverId=pole?pole.id:null;
  w.poleTeam=pole?pole.team:null;
  if(pole){updateModifiersForPole(pole.id,pole.team);}
  w.sessions.race.drivers=ordered.map(b=>sessionDriver(b,'race'));
  w.sessions.race.startOrder=ordered.map(d=>d.id);
}

function advanceToPendingSession(){
  const w=app.currentWeekend;
  if(!w.pendingAdvance)return false;
  const next=w.pendingAdvance;
  w.pendingAdvance=null;w.session=next;w.lap=1;w.slotPointer=0;
  w.sessionFinished=false;w.sameNumberStreak={value:null,refs:[]};w._prevSameStreak={value:null,refs:[]};w.fiveStreak={refs:[]};w._openFiveCrash=null;
  w.rollSequence=0; // restart roll numbers per phase
  w.order=[...w.sessions[next].startOrder];w.displayOrder=[...w.order];
  saveLive();render();return true;
}

function markRetired(d,lap,roll,die){
  if(!d||d.status!=='active')return;
  d.status='retired';d.retirementReason=chooseRetirementReason(d,app.currentWeekend.rollSequence);
  if(d.retirementReason===SPUN_OFF){
    if(!app._seasonSpunOffCount)app._seasonSpunOffCount={};
    app._seasonSpunOffCount[d.id]=(app._seasonSpunOffCount[d.id]||0)+1;
  }
  d.incidentLap=lap;d.incidentRoll=roll;d.laps[lap-1]='X';
  // In qualifying/pre-qualifying, void the retirement lap score entirely (deduct the full roll)
  if(die&&app.currentWeekend.session!=='race'){
    d.totalNumeric-=die;
  }
  // Reset five streak and crash state — retiring driver's roll must not seed a crash sequence
  // sameNumberStreak is NOT reset here: consecutive retirements (4th, 5th same number etc.)
  // must keep triggering. Only crashes reset the same-number streak.
  const w=app.currentWeekend;
  if(w&&w.session==='race'){
    w._prevSameStreak={value:null,refs:[]};
    w.fiveStreak={refs:[]};
    if(w._openFiveCrash){try{closeFiveCrash(w);}catch(e){} w._openFiveCrash=null;}
  }
  // Team mod for retirement; spun off driver mod (guarded)
  try{if(app.currentWeekend&&(d.base||d.team))applyRetirementTeamMod(d,app.currentWeekend.session);}catch(e){}
  try{if(d.retirementReason===SPUN_OFF)applySpunOffDriverMod(d.id);}catch(e){}
}
function markCrashed(d,lap,roll,die){
  if(!d)return;
  d.status='crashed';d.retirementReason='';d.incidentLap=lap;d.incidentRoll=roll;d.laps[lap-1]='X';
  // _crashedIds feeds legacy tracking; _crashGroups feeds per-incident rivalry evaluation
  if(app.currentWeekend&&app.currentWeekend.session==='race'){
    if(!app.currentWeekend._crashedIds)app.currentWeekend._crashedIds=[];
    if(!app.currentWeekend._crashedIds.includes(d.id))app.currentWeekend._crashedIds.push(d.id);
  }
  // In qualifying/pre-qualifying, void the crash lap score entirely (deduct the full roll)
  if(die&&app.currentWeekend.session!=='race'){
    d.totalNumeric-=die;
  }
}

function updateSameNumberStreak(id,val,lap,roll){
  const w=app.currentWeekend;
  const s=w.sameNumberStreak;
  if(s.value===val){
    s.refs.push({driverId:id,lap,roll,value:val});
    s._postRetire=false; // same number again clears the taint — retirements continue
  } else {
    // Only promote to _prevSameStreak for crash detection if NOT tainted by a retirement
    if(!s._postRetire)w._prevSameStreak=s;
    w.sameNumberStreak={value:val,refs:[{driverId:id,lap,roll,value:val}]};
  }
}
function updateFiveStreak(id,val,lap,roll){
  const w=app.currentWeekend;
  if(val===5){
    // Always accumulate 5s — needed for 5-5-5 crash which fires in all conditions
    w.fiveStreak.refs.push({driverId:id,lap,roll,value:val});
  } else {
    // Non-5 breaks the streak — close any open crash first
    if(w._openFiveCrash){
      if(!crashLogicActive(w))closeFiveCrash(w);
      else closeFiveCrash(w);
    }
    w.fiveStreak={refs:[]};
  }
  // If crash was open and crash logic deactivated (e.g. lap changed), close it
  if(!crashLogicActive(w)&&w._openFiveCrash)closeFiveCrash(w);
}

function closeFiveCrash(w){
  const crash=w._openFiveCrash;
  if(!crash||!crash.ids.length){w._openFiveCrash=null;return;}
  // Use explicit faultId if set (new logic; may be null if a 2-car no-fault roll was
  // already made when the crash opened), otherwise fall back to ids[1] (legacy)
  const _faultId='faultId' in crash?crash.faultId:(crash.ids[1]||crash.ids[0]);
  applyCrashMod(crash.ids,_faultId,w.session);
  const injMsgs=[];
  crash.ids.forEach((id)=>{
    // Crash injury: same probability as spun off (call rollInjury directly, no additional gate)
    const inj=rollInjury();
    if(inj){
      applyInjury(id,inj,w.raceMeta.round,w.session==='race'?w.raceMeta.round:w.raceMeta.round-1);
      recordDriverIncident(id,'injury',{impact:inj.impact,result:inj.result,missRaces:inj.missRaces,round:w.raceMeta.round,gp:w.raceMeta.gp});
      injMsgs.push(`🚑 ${injuryLogMsg(id,inj,w.raceMeta.round)}`);
      const _injD=w.sessions?.race?.drivers?.find(x=>x.id===id);
      if(_injD&&_injD.incidentLap!=null)_injD.laps[_injD.incidentLap-1]='🚑';
      const _isLastRaceOfSeason=w.raceMeta.round>=(seasonRules().totalRounds||16);
      if(!_isLastRaceOfSeason){
        if(inj.missRaces==='career'){executeCareerEndingInjury(id,[]);hireCareerEndingReplacement(id);}
        else{
          const _injDriver=BASE_DRIVERS.find(x=>x.id===id);
          if(_injDriver&&_injDriver.team&&_injDriver.team!=='Available'){
            const _taken=BASE_DRIVERS.map(x=>x.id);
            const _repl=findReplacement(_injDriver.team,_taken,false);
            const _misses=typeof inj.missRaces==='number'?inj.missRaces:(seasonRules().totalRounds||16);
            if(_repl)hireReplacement(_repl,_injDriver.team,_misses,id);
          }
        }
      } else if(inj.missRaces==='career'){
        // Still process the career-ending retirement itself, just without a same-season replacement.
        executeCareerEndingInjury(id,[]);
      }
    }
    if(id===_faultId&&SUSPENSION_CHANCE(_faultId,crash.ids.filter(x=>x!==_faultId))){injMsgs.push(applySuspension(id,w.raceMeta.round));}
  });
  // Extra suspension check for at-fault driver in 4+ car crashes (~2%)
  if(crash.ids.length>=4&&_faultId){
    if(Math.random()<0.02){
      const alreadySusp=app.driverInjuries&&app.driverInjuries[_faultId]?.cause==='suspension';
      if(!alreadySusp){injMsgs.push(applySuspension(_faultId,w.raceMeta.round).replace('1 race.','1 race (multi-car crash).'));}
    }
  }
  // Crash fault count is already recorded when the crash opens; do NOT double-count here.
  // Record this crash as a group for per-incident rivalry evaluation
  if(crash.ids.length>=2){
    if(!w._crashGroups)w._crashGroups=[];
    w._crashGroups.push({ids:[...crash.ids],faultId:_faultId});
  }
  // Log injuries/suspensions only (crash declaration already logged when it opened/joined)
  if(injMsgs.length)addLog(`<span class="injury">${injMsgs.join('<br>')}</span>`);
  w._openFiveCrash=null;
}

// Shared: apply injury from a spun-off incident, queue replacement for all sessions.
// isPreRaceSession: true when this happened in prequalifying/qualifying — needed so the
// injury's effective fromRound excludes the driver from THAT SAME round's race (see
// applyInjury), not just future rounds.
function applySpunInjury(driver,round,isPreRaceSession){
  if(!app._movementRules?.injuries)return null;
  const inj=rollInjury(0.95); // spun-off injury chance reduced 5% relative to the base table
  if(!inj)return null;
  applyInjury(driver.id,inj,round,isPreRaceSession?round-1:round);
  recordDriverIncident(driver.id,'injury',{impact:inj.impact,result:inj.result,missRaces:inj.missRaces,round,gp:app.currentWeekend.raceMeta.gp});
  if(inj.missRaces==='career'){
    if(round<(seasonRules().totalRounds||16)){
      executeCareerEndingInjury(driver.id,[]);
      hireCareerEndingReplacement(driver.id);
    } else {
      executeCareerEndingInjury(driver.id,[]);
    }
  } else if(inj.missRaces>0&&round<(seasonRules().totalRounds||16)){
    // Queue replacement for NEXT round regardless of which session the injury happened in
    const _injTeam=driver.base.team;
    const _taken=BASE_DRIVERS.map(d=>d.id);
    const _misses=typeof inj.missRaces==='number'?inj.missRaces:16;
    // Exclude list for a loan must only cover the borrowing team's OWN current drivers
    // (findRivalTargetDriver searches rival teams' rosters) — using the full driver
    // field here (as findReplacement below correctly does, since it searches the
    // separate free-agent pool) excluded every possible candidate and made loans
    // impossible to ever succeed.
    const _injTeamExistingIds=BASE_DRIVERS.filter(dd=>dd.team===_injTeam&&!dd._temp&&!dd._retired).map(dd=>dd.id);
    const _loaned=attemptLoanForInjuryCover(_injTeam,driver.id,_misses,_injTeamExistingIds);
    if(!app.currentWeekend._movementNews)app.currentWeekend._movementNews=[];
    if(_loaned){
      const{driver:_loanedDriver,fromTeam:_donorTeam}=_loaned;
      app.currentWeekend._movementNews.push(`🚑 <strong>${escapeHtml(driverFullName(driver.base))}</strong> injured for ${_misses} race${_misses>1?'s':''}. <strong>${escapeHtml(driverFullName(_loanedDriver))}</strong> joins on loan from <strong>${escapeHtml(teamDisplayName(_donorTeam)||_donorTeam)}</strong> to cover at ${escapeHtml(_injTeam)}.`);
    } else {
      const _repl=findReplacement(_injTeam,_taken,false);
      if(_repl){
        hireReplacement(_repl,_injTeam,_misses,driver.id);
        app.currentWeekend._movementNews.push(`🚑 <strong>${escapeHtml(driverFullName(driver.base))}</strong> injured for ${_misses} race${_misses>1?'s':''}. <strong>${escapeHtml(driverFullName(_repl))}</strong> will substitute at ${escapeHtml(_injTeam)}.`);
      }
    }
  }
  return inj;
}

function handleGeneralIncident(driver,die,w){
  const lap=w.lap,roll=w.rollSequence,sess=w.session;
  const refs=w.sameNumberStreak.refs;
  if(refs.length<3)return'';
  // Global rule: In PQ, retirements only trigger on last 2 laps; in Q, last lap only.
  // Streak CAN start on an earlier lap and complete on an eligible lap.
  const lapLimit=sess==='prequalifying'?seasonRules().preqLaps:sess==='qualifying'?seasonRules().qualiLaps:null;
  if(lapLimit){
    const eligibleFrom=sess==='prequalifying'?lapLimit-1:lapLimit; // PQ: last 2 laps; Q: last lap
    if(lap<eligibleFrom)return''; // streak accumulating but not yet on eligible lap
  }
  markRetired(driver,lap,roll,die);
  if(w.session!=='race'){
    if(!app._qualiRetirementPenalty)app._qualiRetirementPenalty={};
    app._qualiRetirementPenalty[driver.id]=(app._qualiRetirementPenalty[driver.id]||0)-0.25;
  }
  const isSpun=driver.retirementReason===SPUN_OFF;
  const ordinal={3:'3rd',4:'4th',5:'5th',6:'6th',7:'7th',8:'8th'}[refs.length]||`${refs.length}th`;
  const reasonStr=isSpun?'spun off':`(${escapeHtml(driver.retirementReason)})`;
  let msg=`<span class="incident">Retirement!</span> <strong>${ordinal} consecutive ${die}. ${escapeHtml(driverSurname(driver.base))}</strong> ${reasonStr}.`;
  if(isSpun){
    const inj=applySpunInjury(driver,w.raceMeta.round,w.session!=='race');
    if(inj){
      msg+=` <span class="injury">🚑 ${injuryLogMsg(driver.id,inj,w.raceMeta.round)}</span>`;
      if(driver.laps&&driver.incidentLap!=null)driver.laps[driver.incidentLap-1]='🚑';
      // retirementReason remains 'Spun Off' for total column display
    }
  }
  recordDriverIncident(driver.id,'retirement',{reason:driver.retirementReason,gp:w.raceMeta.gp,round:w.raceMeta.round});
  // After a retirement/spun-off, KEEP the same-number streak value active so that
  // a 4th, 5th consecutive same number also causes retirement (6-6-6-retire, 6-retire, 6-retire).
  // Only clear the crash-detection context (fiveStreak + _prevSameStreak) so that
  // a 5 after a retirement does NOT trigger a crash off the old streak.
  if(w&&w.session==='race'){
    // Keep sameNumberStreak so further same-number rolls cause more retirements.
    // But mark it _postRetire so it cannot feed crash detection (same/same/5 logic).
    if(w.sameNumberStreak)w.sameNumberStreak._postRetire=true;
    w._prevSameStreak={value:null,refs:[]};
    w.fiveStreak={refs:[]};
    if(w._openFiveCrash){try{closeFiveCrash(w);}catch(e){}w._openFiveCrash=null;}
  }
  return msg;
}

function handleFiveCrash(driver,roll){
  const w=app.currentWeekend;
  const refs=w.fiveStreak.refs;
  const streak=w._prevSameStreak||{refs:[]};

  // ── 5/5/5 trigger — ALWAYS active regardless of weather/lap ───────────────
  // 2nd and 3rd five-rollers crash; 3rd is at fault. 1st unaffected.
  const _tripleF=refs.length===3&&refs.every(r=>r.value===5);
  if(_tripleF){
    const crashedIds=[],names=[];
    [refs[1],refs[2]].forEach(ref=>{
      const d=getSessionDriver('race',ref.driverId);
      if(d&&d.status==='active'&&!crashedIds.includes(d.id)){markCrashed(d,w.lap,roll,5);crashedIds.push(d.id);names.push(d.base.name);}
    });
    if(!crashedIds.length){w.fiveStreak={refs:[]};w._prevSameStreak={value:null,refs:[]};return'';}
    // 25% of 2-car crashes assign no fault at all — sometimes it's just a racing incident.
    const _noFault1=crashedIds.length===2&&Math.random()<0.25;
    const _lastRunnerId1=isLeaderVsLastRunnerCrash(w,crashedIds);
    const faultId=_lastRunnerId1&&Math.random()<0.5?_lastRunnerId1:(_noFault1?null:(crashedIds[crashedIds.length-1]||crashedIds[0]));
    if(!app._seasonCrashFaultCount)app._seasonCrashFaultCount={};
    if(faultId!=null)app._seasonCrashFaultCount[faultId]=(app._seasonCrashFaultCount[faultId]||0)+1;
    const nameList=names.map((n,i)=>crashedIds[i]===faultId?`${escapeHtml(n)} <em>(at fault)</em>`:escapeHtml(n));
    const _crashLabel1=crashGroupLabel(crashedIds);
    let msg=`<span class="incident">${_crashLabel1}</span> <strong>${nameList.join(' and ')}</strong>.`;
    crashedIds.forEach(id=>recordDriverIncident(id,'crash',{gp:w.raceMeta.gp,round:w.raceMeta.round,others:crashedIds.filter(x=>x!==id)}));
    w._openFiveCrash={ids:crashedIds,names,lap:w.lap,faultId};
    w.fiveStreak={refs:[]};w._prevSameStreak={value:null,refs:[]};
    return msg;
  }

  // All remaining triggers require crash logic active (wet or lap 1)
  if(!crashLogicActive(w))return'';

  // ── Joining an already-open crash — check BEFORE same/same/5 ────────────
  // Any 5 rolled while a crash is open joins it, preventing a new crash from opening
  if(refs.length>=1&&w._openFiveCrash&&driver.status==='active'){
    markCrashed(driver,w.lap,roll,5);
    recordDriverIncident(driver.id,'crash',{gp:w.raceMeta.gp,round:w.raceMeta.round,others:[]});
    if(!w._openFiveCrash.ids.includes(driver.id)){
      w._openFiveCrash.ids.push(driver.id);
      w._openFiveCrash.names.push(driver.base.name);
    }
    const existing=w._openFiveCrash.names.filter(n=>n!==driver.base.name).map(n=>escapeHtml(n)).join(', ');
    const _crashLabel2=crashGroupLabel(w._openFiveCrash.ids);
    if(existing)return`<span class="incident">${_crashLabel2}</span> <strong>${escapeHtml(driver.base.name)}</strong> collides with <strong>${existing}</strong>.`;
    return`<span class="incident">Chaos!</span> <strong>${escapeHtml(driver.base.name)}</strong> joins multi-car crash.`;
  }

  // ── Same/Same/5 trigger ───────────────────────────────────────────────────
  // First 5 in fiveStreak AND at least 2 prior same-number rolls.
  // The 5-roller is AT FAULT. 2nd same-number roller 100% eliminated.
  // 1st same-number roller ~50% chance.
  if(refs.length===1&&streak.refs.length>=2){
    const dFirst=getSessionDriver('race',streak.refs[0].driverId);
    const dSecond=getSessionDriver('race',streak.refs[1].driverId);
    const crashedIds=[],names=[];
    if(driver&&driver.status==='active'&&!crashedIds.includes(driver.id)){
      markCrashed(driver,w.lap,roll,5);
      crashedIds.push(driver.id);names.push(driver.base.name);
      recordDriverIncident(driver.id,'crash',{gp:w.raceMeta.gp,round:w.raceMeta.round,others:[]});
    }
    const faultId=driver.id;
    if(dSecond&&dSecond.status==='active'&&!crashedIds.includes(dSecond.id)){
      markCrashed(dSecond,w.lap,streak.refs[1].roll,5);
      crashedIds.push(dSecond.id);names.push(dSecond.base.name);
      recordDriverIncident(dSecond.id,'crash',{gp:w.raceMeta.gp,round:w.raceMeta.round,others:[]});
    }
    if(dFirst&&dFirst.status==='active'&&!crashedIds.includes(dFirst.id)&&Math.random()<0.5){
      markCrashed(dFirst,w.lap,streak.refs[0].roll,5);
      crashedIds.push(dFirst.id);names.push(dFirst.base.name);
      recordDriverIncident(dFirst.id,'crash',{gp:w.raceMeta.gp,round:w.raceMeta.round,others:[]});
    }
    if(!crashedIds.length){w._prevSameStreak={value:null,refs:[]};w.fiveStreak={refs:[]};return'';}
    // 25% of 2-car crashes assign no fault at all — only applies when exactly 2 drivers
    // crashed here (the 5-roller + one same-number roller), not the 3-car case.
    const _noFault2=crashedIds.length===2&&Math.random()<0.25;
    const _lastRunnerId2=isLeaderVsLastRunnerCrash(w,crashedIds);
    const resolvedFaultId=_lastRunnerId2&&Math.random()<0.5?_lastRunnerId2:(_noFault2?null:faultId);
    w._openFiveCrash={ids:crashedIds,names,lap:w.lap,faultId:resolvedFaultId};
    if(!app._seasonCrashFaultCount)app._seasonCrashFaultCount={};
    if(resolvedFaultId!=null)app._seasonCrashFaultCount[resolvedFaultId]=(app._seasonCrashFaultCount[resolvedFaultId]||0)+1;
    const openNames=crashedIds.map((id,i)=>id===resolvedFaultId?escapeHtml(names[i])+' <em>(at fault)</em>':escapeHtml(names[i]));
    const _crashLabel3=crashGroupLabel(crashedIds);
    return`<span class="incident">${_crashLabel3}</span> <strong>${openNames.join(' and ')}</strong>.`;
  }

  return'';
}

function processNextRoll(forcedDie){
  const w=app.currentWeekend;
  if(!w||w.weekendFinished)return;
  if(w.pendingAdvance){advanceToPendingSession();return;}
  if(w.slotPointer>=w.order.length){endLapAndReorder();return;}
  const driver=getSessionDriver(w.session,w.order[w.slotPointer]);
  if(!driver){
    // Driver ID in order but not found in session drivers — skip slot and log it
    console.log('[DEBUG] processNextRoll: driver not found',`session=${w.session} id=${w.order[w.slotPointer]} slot=${w.slotPointer}`);
    w.slotPointer++;
    if(w.slotPointer>=w.order.length){endLapAndReorder();return;}
    return;
  }
  const lapIdx=w.lap-1;
  w.rollSequence+=1;
  const die=(forcedDie>=1&&forcedDie<=6)?forcedDie:Math.floor(Math.random()*6)+1;
  let pitDramaThisRoll=false;
  if(driver.status==='active'){
    driver.laps[lapIdx]=String(die);
    driver.totalNumeric+=die;
    if(driver.counts[die]!==undefined)driver.counts[die]+=1;
    // Pit Stop Drama: same die value rolled by THIS driver for 4 consecutive laps (laps 4-9, triggers on lap 4 or when the 4th consecutive falls within laps 4-9)
    if(w.session==='race'&&w.lap>=4&&w.lap<=9){
      const recentLaps=driver.laps.slice(w.lap-4,w.lap); // laps [lap-3 .. lap], 4 entries
      if(recentLaps.length===4&&recentLaps.every(v=>v===String(die))&&!driver.pitDramaLaps.includes(w.lap)){
        // Pit Stop Drama triggered! Cancel lap 5's die from total, mark lap cell
        driver.totalNumeric-=die;
        driver.laps[lapIdx]='P';
        driver.pitDramaLaps.push(w.lap);
        pitDramaThisRoll=true;
        applyTeamMod(driver.base.team,-0.05);
        recordMod('team',null,teamDisplayName(driver.base.team),-0.05,'Pit stop drama',w.session);
      }
    }
  }
  if(pitDramaThisRoll){
    // Pit Stop Drama takes priority over the crash sequence: this roll doesn't count
    // toward (or complete) a 5-5-5 or same-same-5 crash, and the crash-building sequence
    // resets so the next roll starts counting fresh rather than silently continuing a
    // sequence that included a now-voided roll.
    w.fiveStreak={refs:[]};
    w.sameNumberStreak={value:null,refs:[]};
    w._prevSameStreak={value:null,refs:[]};
  } else {
    if(driver.status==='active')updateSameNumberStreak(driver.id,die,w.lap,w.rollSequence);
    if(driver.status==='active')updateFiveStreak(driver.id,die,w.lap,w.rollSequence);
  }
  const msgs=[];
  if(w.session==='race'&&!pitDramaThisRoll){const m=handleFiveCrash(driver,w.rollSequence);if(m)msgs.push(m);}
  // Only fire retirement if no crash message already fired — crash covers the event
  const g=msgs.length===0?handleGeneralIncident(driver,die,w):null;
  if(g)msgs.push(g);
  // If pit drama's driver suffered an unrelated mechanical retirement on this same roll,
  // cancel pit drama (their race is over — no meaningful voided lap score to speak of).
  // Crash can no longer coincide with pit drama (handled above), so this now only
  // applies to mechanical retirements from handleGeneralIncident.
  if(pitDramaThisRoll&&driver.status!=='active'){
    // Reverse pit drama: restore die to total, restore lap cell to X (crash/retire overwrites)
    driver.totalNumeric+=die; // restore voided score
    driver.pitDramaLaps.splice(driver.pitDramaLaps.indexOf(w.lap),1); // un-mark lap
    applyTeamMod(driver.base.team,0.05); // reverse team modifier
    recordMod('team',null,teamDisplayName(driver.base.team),0.05,'Pit stop drama voided (mechanical retirement)',w.session);
    pitDramaThisRoll=false;
  }
  const prefix=`<span style="color:var(--muted);font-size:12px">Roll ${w.rollSequence} · Lap ${w.lap}:</span> <strong>${escapeHtml(driverSurname(driver.base))}</strong> rolled <strong>${die}</strong>.`;
  if(pitDramaThisRoll)msgs.push(`<span class="incident">🔧 Pit stop drama!</span> <strong>${escapeHtml(driverSurname(driver.base))}</strong> rolls ${die} for 4 consecutive laps — Lap score voided.`);
  addLog(msgs.length?`${prefix}<br>${msgs.join('<br>')}`:prefix);
  w.slotPointer+=1;
  saveLive(); // crash-recovery only; saveApp() happens at session/race end
  if(w.slotPointer>=w.order.length){endLapAndReorder();if(!w._suppressRender)render();return;}
  if(!w._suppressRender)render();
}

// Instant lap: complete all remaining rolls in current lap only
function instantLap(){
  const w=app.currentWeekend;
  if(!w||w.weekendFinished||w.pendingAdvance)return;
  const lapBefore=w.lap;
  w._suppressRender=true; // skip per-roll renders during instant mode
  try{
    while(app.currentWeekend&&!app.currentWeekend.weekendFinished&&!app.currentWeekend.pendingAdvance&&!app.currentWeekend.sessionFinished&&app.currentWeekend.lap===lapBefore){
      if(app.currentWeekend.slotPointer>=app.currentWeekend.order.length){
        endLapAndReorder();
        break;
      }
      const _nextId=app.currentWeekend.order[app.currentWeekend.slotPointer];
      const _nextDriver=getSessionDriver(app.currentWeekend.session,_nextId);
      if(!_nextDriver){
        console.log('[DEBUG] instantLap: null driver at slot',app.currentWeekend.slotPointer,`id=${_nextId}`);
        app.currentWeekend.slotPointer++;
        continue;
      }
      processNextRoll();
      if(!app.currentWeekend||app.currentWeekend.weekendFinished||app.currentWeekend.pendingAdvance||app.currentWeekend.sessionFinished)break;
      if(app.currentWeekend.lap!==lapBefore)break;
    }
  }catch(e){
    console.error('instantLap exception:',e);
    try{debugMsg('instantLap exception',e?.message||String(e));}catch(e2){}
  }finally{
    if(app.currentWeekend)app.currentWeekend._suppressRender=false;
  }
  render();
  if(app.currentWeekend&&app.currentWeekend.weekendFinished&&app.news&&app.news.length){
    requestAnimationFrame(()=>{
      if(app.news&&app.news.length&&!document.getElementById('newsModal'))showNewsModal(app.news[0]);
    });
  }
}

function endLapAndReorder(){
  const w=app.currentWeekend,s=getCurrentSession();
  let active=currentActive().sort(currentCompare);
  let inactive=s.drivers.filter(d=>d.status!=='active');
  if(w.session==='qualifying'){
    // Active drivers sorted by score; retired drivers placed at end of the lap they retired on
    // Group: for each lap, show active drivers who scored on that lap, then retired on that lap
    const retiredByLap={};
    inactive.forEach(d=>{const l=d.incidentLap||0;if(!retiredByLap[l])retiredByLap[l]=[];retiredByLap[l].push(d);});
    // Sort active by score
    const activeSorted=active.sort(compareQuali);
    // Build ordered list: active in score order, with retired inserted after their incident lap's active batch
    // Simpler approach: active first (score order), retired at end sorted by lap desc then score
    // Retired drivers ranked by total score at retirement - merge with active by score
    // Active drivers take precedence over retired with equal score (they can still improve)
    // Active drivers sorted by score with 6s tiebreaker; retired merged by total then 6s, active beats retired on equal
    const allSorted=[...active,...inactive].sort((a,b)=>{
      if(b.totalNumeric!==a.totalNumeric)return b.totalNumeric-a.totalNumeric;
      // 6s tiebreaker
      if((b.counts[6]||0)!==(a.counts[6]||0))return(b.counts[6]||0)-(a.counts[6]||0);
      if((b.counts[5]||0)!==(a.counts[5]||0))return(b.counts[5]||0)-(a.counts[5]||0);
      // Active beats retired at equal score (active can still improve)
      const aActive=a.status==='active',bActive=b.status==='active';
      if(aActive!==bActive)return aActive?-1:1;
      return (b.incidentLap||0)-(a.incidentLap||0)||a.base.listOrder-b.base.listOrder;
    });
    w.displayOrder=allSorted.map(d=>d.id);
  } else if(w.session==='prequalifying'){
    // Pre-qualifying: sort by total, then 6s count (main tiebreaker), then 5s, then active > retired, then listOrder
    const allSortedPreq=[...active,...inactive].sort((a,b)=>{
      if(b.totalNumeric!==a.totalNumeric)return b.totalNumeric-a.totalNumeric;
      if((b.counts[6]||0)!==(a.counts[6]||0))return(b.counts[6]||0)-(a.counts[6]||0);
      if((b.counts[5]||0)!==(a.counts[5]||0))return(b.counts[5]||0)-(a.counts[5]||0);
      const aActive=a.status==='active',bActive=b.status==='active';
      if(aActive!==bActive)return aActive?-1:1;
      return (b.incidentLap||0)-(a.incidentLap||0)||a.base.listOrder-b.base.listOrder;
    });
    w.displayOrder=allSortedPreq.map(d=>d.id);
  } else {
    inactive=inactive.sort(compareInactive);
    w.displayOrder=[...active.map(d=>d.id),...inactive.map(d=>d.id)];
  }
  const phaseName=w.session==='prequalifying'?'Pre-Qualifying':w.session==='qualifying'?'Qualifying':'Race';
  addLog(`<strong>End of ${phaseName} Lap ${w.lap}.</strong>`);
  if(w.lap>=s.lapLimit||active.length===0){s.finishedOrder=[...w.displayOrder];finishSession();return;}
  w._crashActiveLastLap=crashLogicActive(w); // capture before incrementing — see render-timing note above
  w.lap+=1;
  // Retirement roll streaks end at the lap boundary (reverted — this was making whoever leads
  // a lap uniquely likely to be caught on their very first roll of every new lap, since the
  // roll order is re-sorted by standings each lap and the leader always rolls first). The
  // crash streak (fiveStreak / _prevSameStreak) is unaffected and still carries through.
  w.sameNumberStreak={value:null,refs:[]};
  if(w.session==='qualifying'||w.session==='prequalifying'){w.order=w.displayOrder.filter(id=>getSessionDriver(w.session,id)?.status==='active');}else{w.order=active.map(d=>d.id);}
  w.slotPointer=0;
  if(!crashLogicActive(w)){if(w._openFiveCrash)closeFiveCrash(w);w.fiveStreak={refs:[]};}
  // No render() here — processNextRoll calls render() for single-roll mode,
  // and instantLap/instantResult render after the whole loop completes.
}

function finishSession(){
  const w=app.currentWeekend;
  w.sessionFinished=true;
  if(w.session==='prequalifying'){
    setupQualifyingFromPreQualifying();
    // pre-qual complete — banner shown in UI, no log entry needed
    w.pendingAdvance='qualifying';saveLive();render();return;
  }
  if(w.session==='qualifying'){
    setupRaceFromQualifying();
    const pole=getSessionDriver('qualifying',w.sessions.qualifying.finishedOrder[0]);
    // Apply qualifying result modifiers for all drivers (scaled by total modifier)
  const qualiFinished=w.sessions.qualifying.finishedOrder;
  const totalQ=qualiFinished.length;
  const raceField=seasonRules().raceField||26;
  // Best driver result per team for team modifier
  const qualiTeamBest={};
  qualiFinished.forEach((id,i)=>{
    const pos=i+1;
    const qd=BASE_DRIVERS.find(d=>d.id===id);if(!qd)return;
    const dtm=driverTotalMod(id);
    // Tier: 0=Pole, 1=P2-3, 2=P4-8, 3=P9-15, 4=P16+/DNQ/Ret
    const tier=pos===1?0:pos<=3?1:pos<=8?2:pos<=15?3:4;
    let dd=scaledMod(MOD_QUALI_DRIVER,dtm,tier);
    // Double positive qualifying gains when BOTH driver and team have negative modifiers —
    // a strong lap from a genuine underdog combination deserves extra recognition.
    if(dd>0&&dtm<0&&teamTotalMod(qd.team)<0)dd=Math.round(dd*2*100)/100;
    // High-modifier drivers (+3.00 total) are already at/near the cap — don't give them
    // further positive qualifying modifiers except for pole itself. Negative modifiers
    // (e.g. a bad qualifying result) still apply as normal.
    if(tier!==0&&dd>0&&dtm>=3.00)dd=0;
    // PQ advancers get no negative qualifying modifiers at all — they've already proven
    // themselves by making it out of PQ; a poor qualifying result on top of that isn't
    // additionally penalized.
    if(dd<0&&(w._pqAdvancerIds||[]).includes(id))dd=0;
    // Inexperience: reduce positive grid modifier by up to 75% for new drivers, decaying over 16 starts
    if(dd>0&&app._inexperienceDrivers&&app._inexperienceDrivers[id]){
      const _ir=app._inexperienceDrivers[id];
      const _iDecay=Math.min(1.0,0.25+0.75*((_ir.entries||0)/16));
      dd=Math.round(dd*_iDecay*100)/100;
    }
    if(dd!==0&&pos!==1&&pos<=raceField){applyDriverMod(id,dd);recordMod('driver',id,driverFullName(qd),dd,`Quali P${pos}`,'qualifying');}
    const t=qd.team;
    if(pos<=raceField&&(qualiTeamBest[t]===undefined||tier<qualiTeamBest[t]))qualiTeamBest[t]=tier;
    // Both-drivers-count scenario: any team at +0.00 modifier or above still takes a hit
    // for a driver qualifying P16-26, even if their teammate qualified much better and
    // would otherwise be the only result counted via qualiTeamBest. Teams at -0.01 or
    // below are already expected to run near the back, so this doesn't apply to them.
    if(pos>=16&&pos<=26){
      const ttmForP16=teamTotalMod(t);
      if(ttmForP16>=0){
        const _p16Penalty=-Math.round((0.03+Math.max(0,ttmForP16)*0.015)*0.75*100)/100;
        applyTeamMod(t,_p16Penalty);
        recordMod('team',null,teamDisplayName(t),_p16Penalty,`Qualified P${pos} (below expected)`,'qualifying');
      }
    }
  });
  // Also DNQ (pos > raceField)
  (w._dnqIds||[]).forEach(id=>{
    const qd=BASE_DRIVERS.find(d=>d.id===id);if(!qd)return;
    const dtm=driverTotalMod(id);
    let dd=scaledMod(MOD_QUALI_DRIVER,dtm,4); // tier 4 = DNQ
    if(dd<0&&(w._pqAdvancerIds||[]).includes(id))dd=0;
    if(dd!==0){applyDriverMod(id,dd);recordMod('driver',id,driverFullName(qd),dd,'DNQ','qualifying');}
    const t=qd.team;
    if(qualiTeamBest[t]===undefined||4<qualiTeamBest[t])qualiTeamBest[t]=4;
    // Both-drivers-count scenario: a DNQ costs the team a baseline penalty regardless of
    // the teammate's result — previously a DNQ had zero effect on the team modifier if the
    // other car qualified well, since only the best-of-team tier was ever counted. Scales
    // higher for a stronger team/driver DNQing, since that's a bigger surprise/failure.
    const srcIsPreqForDnq=(app.preqDriverIds||[]).some(pid=>BASE_DRIVERS.find(b=>b.id===pid)?.team===qd.team);
    if(!srcIsPreqForDnq){
      const ttmForDnq=teamTotalMod(t);
      const _teamDnqPenalty=-Math.round((0.03+Math.max(0,ttmForDnq)*0.02)*100)/100;
      applyTeamMod(t,_teamDnqPenalty);
      recordMod('team',null,teamDisplayName(t),_teamDnqPenalty,'Driver DNQ','qualifying');
    }
  });
  Object.entries(qualiTeamBest).forEach(([team,tier])=>{
    if(tier===0)return; // pole team modifier already applied by updateModifiersForPole
    const ttm=teamTotalMod(team);
    let td=scaledMod(MOD_QUALI_TEAM,ttm,tier);
    if(td>0)td=Math.round(td*0.75*100)/100; // reduce positive qualifying boosts
    if(td!==0){applyTeamMod(team,td);recordMod('team',null,teamDisplayName(team),td,`Quali best P${['1','2-3','4-8','9-15','16+'][tier]}`,'qualifying');}
  });
  // Advanced-from-PQ bonus: only for advancers who then actually qualify for the race
  // itself (i.e. didn't DNQ). Advancing from PQ alone isn't worth a modifier bump if it
  // doesn't translate into a race start.
  if(w._pqAdvancerIds&&w._pqAdvancerIds.length){
    const _madeRace=w._pqAdvancerIds.filter(id=>!(w._dnqIds||[]).includes(id));
    if(_madeRace.length)applyPreqTop6TeamMod(_madeRace);
  }
  // DNQ notice: list drivers who qualified but won't start the race
  if(w._dnqIds&&w._dnqIds.length){
    const dnqNames=w._dnqIds.map(id=>{
      const qd=getSessionDriver('qualifying',id);
      const name=qd?driverFullName(qd.base)||qd.base.name:'Driver';
      const team=qd?teamDisplayName(qd.base.team):'';
      return`<strong>${escapeHtml(name)}</strong>${team?` (${escapeHtml(team)})`:''}`
    }).join(', ');
    addLog(`<span class="incident">❌ Did not qualify:</span> ${dnqNames}.`);
    // Track DNQ count per driver (excludes PQ drivers, excludes mechanical retirements)
    const preqIds=new Set(app.preqDriverIds||[]);
    if(!app._seasonDNQCount)app._seasonDNQCount={};
    w._dnqIds.forEach(id=>{
      if(preqIds.has(id))return; // PQ drivers exempt
      // Check if driver retired from qualifying (mechanical) — if so, don't count as DNQ
      const qd=getSessionDriver('qualifying',id);
      if(qd&&qd.status==='retired'&&qd.retirementReason!=='Spun Off')return; // mechanical retirement — skip
      app._seasonDNQCount[id]=(app._seasonDNQCount[id]||0)+1;
    });
  }
    w.pendingAdvance='race';saveLive();render();return;
  }
  if(w.session==='race'){finishWeekend();render();}
}

function assignChampionshipPoints(){
  const race=app.currentWeekend.sessions.race;
  race.drivers.forEach(d=>{d.points=0;d._fastestLap=false;});
  // Sort all drivers by final finishing order: active first (by total desc), then inactive (by incidentLap desc)
  const active=race.drivers.filter(d=>d.status==='active').sort(compareRaceActive);
  const inactive=race.drivers.filter(d=>d.status!=='active').sort(compareInactive);
  const allFinishers=[...active,...inactive];
  // Award points to the top N finishers regardless of status (if fewer finish than points positions, award all)
  const ptsList=_effectiveChampPoints();
  allFinishers.slice(0,ptsList.length).forEach((d,i)=>d.points=champPointsFor(i+1));
  // Fastest lap bonus point (2019-2024 era only): awarded to whoever rolled the most 6s in
  // the race. Ties are broken by whichever tied driver finished highest — allFinishers is
  // already in final finishing order, so the first match is the highest-placed one.
  if(_effectiveHasFastestLap()){
    const maxSixes=Math.max(0,...race.drivers.map(d=>d.counts?.[6]||0));
    if(maxSixes>0){
      const tiedIds=new Set(race.drivers.filter(d=>(d.counts?.[6]||0)===maxSixes).map(d=>d.id));
      const winner=allFinishers.find(d=>tiedIds.has(d.id));
      if(winner){
        winner.points=(winner.points||0)+1;
        winner._fastestLap=true;
      }
    }
  }
}

// ── Track records ─────────────────────────────────────────────────────────
// 'With modifiers' race/qualifying score for a weekend = the winner's / pole-sitter's
// totalNumeric (guaranteed the highest in that session by construction, since compareRaceActive
// / compareQuali sort strictly on totalNumeric first — WITH modifiers included). 'No modifiers'
// is a DIFFERENT competition: the highest pure dice-roll sum (totalNumeric minus that driver's
// starting bonus) among all classified finishers in the session — NOT necessarily the same
// driver as the with-mods winner, since a weaker-modifier driver can easily roll better dice
// and still finish behind a stronger car/driver overall. Every classified finisher has to be
// checked, not just whoever finished first. Older saves recorded before the bonus field
// existed have bonus:null and are simply skipped for the no-mod records (there's no way to
// reconstruct which portion of their total was dice vs modifier after the fact) — they still
// count fully toward the with-modifiers records, which only need the winner's total.
function getTrackRecords(trackSlug){
  const weekends=app.history.weekends.filter(w=>slugify(w.raceMeta.track||'')===trackSlug);
  const recs={raceMod:null,raceNoMod:null,qualiMod:null,qualiNoMod:null};
  const considerMod=(key,entry,w)=>{
    if(!entry)return;
    const withMod=Number(entry.total)||0;
    if(!recs[key]||withMod>recs[key].value){
      recs[key]={value:withMod,driverId:entry.id,driverName:entry.driver,nation2:entry.nation2,year:w.raceMeta.year,weekendKey:w.weekendKey,gp:w.raceMeta.gp};
    }
  };
  const considerNoMod=(keyNoMod,entries,w)=>{
    (entries||[]).forEach(entry=>{
      if(!entry||entry.status!=='active'||entry.bonus==null)return;
      const noMod=Number(entry.total)-entry.bonus;
      if(!recs[keyNoMod]||noMod>recs[keyNoMod].value){
        recs[keyNoMod]={value:noMod,driverId:entry.id,driverName:entry.driver,nation2:entry.nation2,year:w.raceMeta.year,weekendKey:w.weekendKey,gp:w.raceMeta.gp};
      }
    });
  };
  weekends.forEach(w=>{
    considerMod('raceMod',(w.race||[]).find(r=>r.position===1&&r.status==='active'),w);
    considerMod('qualiMod',(w.qualifying||[]).find(q=>q.pole),w);
    considerNoMod('raceNoMod',w.race,w);
    considerNoMod('qualiNoMod',w.qualifying,w);
  });
  return recs;
}
// Compares this just-finished weekend's results against the track's PRIOR records (this race
// hasn't been written to history yet at the point this runs) — announces any new/beaten
// record in the post-race news, and applies a small driver modifier boost specifically for the
// no-modifiers records (the driver-only signal the modifier bumps are meant to reward). The
// with-mods check only needs the winner/pole-sitter; the no-mods check has to scan every
// classified finisher, same reasoning as getTrackRecords above.
function checkTrackRecords(trackRecordNews){
  const w=app.currentWeekend;
  const trackName=w.raceMeta.track||'';
  if(!trackName)return;
  const trackSlug=slugify(trackName);
  const prior=getTrackRecords(trackSlug);
  const raceWinnerSess=w.sessions.race.finishedOrder.length?getSessionDriver('race',w.sessions.race.finishedOrder[0]):null;
  const raceWinner=(raceWinnerSess&&raceWinnerSess.status==='active')?raceWinnerSess:null;
  const poleId=w.sessions.qualifying.finishedOrder[0];
  const poleSess=poleId!=null?getSessionDriver('qualifying',poleId):null;
  const _report=(session,type,priorRec,newVal,driverBase,noMod)=>{
    if(newVal==null)return;
    const isNew=!priorRec||newVal>priorRec.value;
    if(!isNew)return;
    const dName=driverFullName(driverBase)||driverBase.name||'Driver';
    const verb=priorRec?'breaks':'sets';
    trackRecordNews.push(`🏆 <strong>${escapeHtml(dName)}</strong> ${verb} the <strong>${escapeHtml(trackName)} ${session} (${type})</strong> record (${newVal.toFixed(2).replace(/\.00$/,'')}${priorRec?`, previously ${priorRec.value.toFixed(2).replace(/\.00$/,'')} by ${escapeHtml(priorRec.driverName)}, ${priorRec.year}`:''}).`);
    if(noMod){
      applyDriverMod(driverBase.id,0.10);
      recordMod('driver',driverBase.id,driverFullName(driverBase)||driverBase.name,0.10,`New no-modifiers ${session} track record at ${trackName}`,'race');
    }
  };
  // Best no-mod (pure dice) finisher THIS race/quali — not necessarily the winner/pole.
  const _bestNoMod=(sessionName)=>{
    const drivers=(w.sessions[sessionName]?.finishedOrder||[]).map(id=>getSessionDriver(sessionName,id));
    let best=null,bestVal=-Infinity;
    drivers.forEach(d=>{
      if(!d||d.status!=='active'||d.bonus==null)return;
      const val=d.totalNumeric-d.bonus;
      if(val>bestVal){bestVal=val;best=d;}
    });
    return best?{driver:best,value:bestVal}:null;
  };
  if(raceWinner){
    _report('race','with modifiers',prior.raceMod,raceWinner.totalNumeric,raceWinner.base,false);
  }
  const raceNoModBest=_bestNoMod('race');
  if(raceNoModBest){
    _report('race','no modifiers',prior.raceNoMod,raceNoModBest.value,raceNoModBest.driver.base,true);
  }
  if(poleSess){
    _report('qualifying','with modifiers',prior.qualiMod,poleSess.totalNumeric,poleSess.base,false);
  }
  const qualiNoModBest=_bestNoMod('qualifying');
  if(qualiNoModBest){
    _report('qualifying','no modifiers',prior.qualiNoMod,qualiNoModBest.value,qualiNoModBest.driver.base,true);
  }
}

  const preq=w.sessions.prequalifying.finishedOrder.map((id,i)=>ser('prequalifying',id,i+1));
  const quali=w.sessions.qualifying.finishedOrder.map((id,i)=>{const r=ser('qualifying',id,i+1);r.pole=(i===0);return r;});
  const race=w.sessions.race.finishedOrder.map((id,i)=>ser('race',id,i+1));
