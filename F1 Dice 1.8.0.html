  const dtm=driverTotalMod(driverId);
  const dd=scaledMod(MOD_QUALI_DRIVER,dtm,0); // tier 0 = pole
  if(dd!==0){applyDriverMod(driverId,dd);recordMod('driver',driverId,d?driverFullName(d):'Driver',dd,'Pole position','qualifying');}
  const ttm=teamTotalMod(team);
  const td=scaledMod(MOD_QUALI_TEAM,ttm,0);
  if(td!==0){applyTeamMod(team,td);recordMod('team',null,teamDisplayName(team),td,'Pole position','qualifying');}
}
function applyPreqFailMod(ids){
  ids.forEach(id=>{
    const d=BASE_DRIVERS.find(x=>x.id===id);
    const dtm=driverTotalMod(id);
    const delta=scaledMod(MOD_PQ_DRIVER,dtm,1); // tier 1 = fails to advance
    if(delta!==0){applyDriverMod(id,delta);recordMod('driver',id,d?driverFullName(d):'Driver',delta,'Failed to advance from PQ','prequalifying');}
  });
}
function applyPreqTop6TeamMod(ids){
  const _round=currentSeasonEntries().length+1;
  const _pastRecalc=_round>(seasonRules().preqRecalcAfterRound||8);
  ids.forEach(id=>{
    const b=BASE_DRIVERS.find(d=>d.id===id);
    if(!b)return;
    // Driver advance scaled mod
    const dtm=driverTotalMod(id);
    let dd=scaledMod(MOD_PQ_DRIVER,dtm,0); // tier 0 = advances
    if(dd>0&&_pastRecalc)dd=Math.round(dd*0.5*100)/100; // halved post-recalc — smaller/less competitive field
    if(dd>0){applyDriverMod(id,dd);recordMod('driver',id,driverFullName(b),dd,'Advanced from PQ','prequalifying');}
    // Team advance scaled mod
    const ttm=teamTotalMod(b.team);
    let td=scaledMod(MOD_PQ_TEAM,ttm,0); // tier 0 = advances
    if(td>0&&_pastRecalc)td=Math.round(td*0.5*100)/100;
    if(td>0){applyTeamMod(b.team,td);recordMod('team',null,teamDisplayName(b.team),td,`${escapeHtml(driverFullName(b))} advanced from PQ`,'prequalifying');}
  });
}
// ── PRE-QUALIFYING RECALCULATION ──────────────────────────────────────────
// PQ pool computation
// ── PQ helper: sort candidates by PQ priority ─────────────────────────────
// Mid-season tiebreakers (in order after primary points sort):
//   TB1: already in PQ   TB2: fewer starts   TB3: one-driver team   TB4: lower modifier
function _pqSortMid(a,b){
  if(a.pts!==b.pts)return a.pts-b.pts;
  if(a.isPQ!==b.isPQ)return b.isPQ-a.isPQ;
  if(a.starts!==b.starts)return a.starts-b.starts;
  if(a.isOne!==b.isOne)return b.isOne-a.isOne;
  if(a.mod!==b.mod)return a.mod-b.mod;
  return 0;
}
// EoS tiebreakers:
//   TB1: already in PQ   TB2: one-driver (1989-start only, pass true)   TB3: fewer starts   TB4: lower modifier
function _pqSortEos(a,b,include1Driver){
  if(a.pts!==b.pts)return a.pts-b.pts;
  if(a.isPQ!==b.isPQ)return b.isPQ-a.isPQ;
  if(include1Driver&&a.isOne!==b.isOne)return b.isOne-a.isOne;
  if(a.starts!==b.starts)return a.starts-b.starts;
  if(a.mod!==b.mod)return a.mod-b.mod;
  return 0;
}
function _pqTeamRow(t,yr,st,currentPQSet,startsByTeam){
  const stT=(st.teams||[]).find(x=>teamCanonicalName(x.name)===t);
  const pts=stT?.championshipPoints??0;
  const isPQ=currentPQSet.has(t)?1:0;
  const starts=startsByTeam.get(t)||0;
  const isOne=isOneDriverTeam(t,yr)?1:0;
  const mod=teamTotalMod(t);
  return{t,pts,isPQ,starts,isOne,mod};
}
function _pqStarts(yr){
  const m=new Map();
  (app.history.weekends||[]).filter(w=>w.raceMeta.year===yr).forEach(w=>{
    (w.race||[]).forEach(r=>{const c=teamCanonicalName(r.team);m.set(c,(m.get(c)||0)+1);});
  });
  return m;
}
// ── Unified PQ-team-count rule (all databases, from the second season onward) ──────
// Grid runs 17–20 teams (34–40 drivers). There's always a base of 26 auto-qualifiers
// (13 two-driver teams); every team beyond that must pre-qualify:
//   17 teams → 4 PQ teams   18 teams → 5 PQ teams   19 teams → 6 PQ teams   20 teams → 7 PQ teams
// (8/10/12/14 PQ drivers; 4 always advance; auto-qualifiers + advancers = 30 in qualifying.)
function pqSlotsForTeamCount(teamCount){
  return Math.max(4,Math.min(7,teamCount-13));
}

function computePreqIds(){
  const yr=app.currentSeason||1989;
  const rules=seasonRules(yr);
  const round=currentSeasonEntries().length+1;
  const gameStartYr=app.history.weekends.length>0
    ?Math.min(...app.history.weekends.map(w=>w.raceMeta.year)):yr;

  // ── 1989 R1 through preqRecalcAfterRound: fixed initial split-seat list ──
  if(gameStartYr<=1989&&yr===1989&&round<=rules.preqRecalcAfterRound){
    const PQ_SEATS_1989={Brabham:2,Onyx:2,Osella:2,Zakspeed:2,AGS:2,EuroBrun:1,Coloni:1,Dallara:1,Rial:1};
    const result=[];
    Object.entries(PQ_SEATS_1989).forEach(([team,count])=>{
      BASE_DRIVERS.filter(d=>d.team===team&&!d._retired&&!d._temp)
        .sort((a,b)=>b.listOrder-a.listOrder).slice(0,count).forEach(d=>result.push(d.id));
    });
    return result.filter(id=>BASE_DRIVERS.some(d=>d.id===id&&!d._retired));
  }

  // ── 1991-start R1 through preqRecalcAfterRound: fixed initial list from DB ──
  if(gameStartYr>1989&&yr===1991&&round<=rules.preqRecalcAfterRound){
    const pqIds=rules.initialPreqIds91||[];
    if(pqIds.length){
      const pqTeamNames=new Set(pqIds.map(id=>BASE_DRIVERS.find(d=>d.id===id)?.team).filter(Boolean));
      return BASE_DRIVERS.filter(d=>!d._retired&&!d._temp&&d.team!=='Available'&&pqTeamNames.has(d.team)).map(d=>d.id);
    }
  }

  // ── R1 through mid-point in SUBSEQUENT seasons: use stored EoS teams ──────
  // Only applies when there IS a stored result (i.e. at least one EoS has been completed)
  const storedPqTeams=(app._pqTeamsBySeason||{})[yr]||[];
  const midPoint=rules.preqRecalcAfterRound||8;
  if(round<=midPoint&&storedPqTeams.length>0){
    const pqTeamSet=new Set(storedPqTeams.map(t=>teamCanonicalName(t)));
    TEAMS_DATABASE.filter(t=>t.firstYear===yr).forEach(t=>pqTeamSet.add(teamCanonicalName(t.name)));
    return BASE_DRIVERS.filter(d=>
      !d._retired&&!d._temp&&d.team!=='Available'&&pqTeamSet.has(teamCanonicalName(d.team))
    ).map(d=>d.id);
  }

  // ── Mid-season recalc (R > midPoint, both DBs, all years) ───────────────
  // Slot count: 1989-start = totalActiveTeams-13 always; 1991-start = 5 always
  // Union with _initialTeamSizes so a one-driver team (e.g. EuroBrun) between drivers at
  // the exact moment of recalc isn't invisible to candidate selection (see ensureAllSeatsFilledBeforeWeekend).
  const allActive=[...new Set([
    ...Object.keys(app._initialTeamSizes||{}).map(t=>teamCanonicalName(t)),
    ...BASE_DRIVERS.filter(d=>d.team!=='Available'&&!d._retired&&!d._temp).map(d=>teamCanonicalName(d.team)),
  ])];
  // Slot count: use preqRecalcTeams from season rules ONLY when the game actually started
  // in this exact season — that hardcoded value (e.g. 5 for 1991) is tuned for that
  // season's specific starting team roster and is wrong for a different-start game merely
  // passing through this calendar year with its own, independently-evolved team roster.
  // Otherwise, PQ absorbs whatever exceeds the season's raceField cap, in teams of 2 (all
  // teams have 2 drivers from 1992) — see eosComputeNextPQTeams for the matching
  // season-start calculation and the two reported cases this was verified against.
  const PQ_SLOTS_MID=(gameStartYr===yr&&rules.preqRecalcTeams)
    ?rules.preqRecalcTeams
    :pqSlotsForTeamCount(allActive.length);

  const st=seasonStandings(yr);
  const startsMid=_pqStarts(yr);
  const currentPQMid=new Set(
    (app.preqDriverIds||[]).map(id=>teamCanonicalName(BASE_DRIVERS.find(d=>d.id===id)?.team||'')).filter(t=>t&&t!=='Available')
  );
  const candidatesMid=allActive.map(t=>_pqTeamRow(t,yr,st,currentPQMid,startsMid)).sort(_pqSortMid);
  const pqSetMid=new Set();
  for(const s of candidatesMid){if(pqSetMid.size>=PQ_SLOTS_MID)break;pqSetMid.add(s.t);}
  return BASE_DRIVERS.filter(d=>
    !d._retired&&!d._temp&&d.team!=='Available'&&pqSetMid.has(teamCanonicalName(d.team))
  ).map(d=>d.id);
}


function applyPreqRecalc(){
  const oldIds=[...(app.preqDriverIds||[])];
  const newIds=computePreqIds();
  app.preqDriverIds=newIds;
  app._vacatedPQTeams={};
  app._seasonDNPQCountSinceRecalc={};
  saveApp();
  // Diff by CANONICAL team name, not individual drivers or raw/display names — using
  // raw team strings here meant a team whose display name changed between the two
  // snapshots (e.g. an alias/rename transition) could spuriously show as both 'removed'
  // and 'added' even with zero real PQ change.
  const oldTeams=new Set(oldIds.map(id=>{const t=BASE_DRIVERS.find(d=>d.id===id)?.team;return t?teamCanonicalName(t):null;}).filter(Boolean));
  const newTeams=new Set(newIds.map(id=>{const t=BASE_DRIVERS.find(d=>d.id===id)?.team;return t?teamCanonicalName(t):null;}).filter(Boolean));
  const addedTeams=[...newTeams].filter(t=>!oldTeams.has(t));
  const removedTeams=[...oldTeams].filter(t=>!newTeams.has(t));
  // PQ-stuck modifier sink: only teams that started the year in PQ and are STILL in PQ
  // after this recalc are eligible (teams that fell into PQ for the first time at the
  // recalc are explicitly excluded — see applyPQSinkModifier).
  app._pqSinkTeams=[...oldTeams].filter(t=>newTeams.has(t));
  // If a one-driver PQ team (e.g. EuroBrun in 1989, Osella/Coloni in 1991) exits PQ after recalc,
  // there are now one fewer auto-qualifier, so one extra driver from PQ must advance to keep qualifying at 30.
  // seasonRules().oneDriverTeams is hardcoded per calendar year (e.g. 1991's list is
  // ['Osella','Coloni'], NOT EuroBrun) — wrong for a different-start game merely passing
  // through that year with its own evolved roster. app._initialTeamSizes is tracked live
  // per-playthrough and is accurate regardless of which season's hardcoded data applies.
  const oneDriverTeams=seasonRules().oneDriverTeams||[];
  const onedriverExited=removedTeams.some(t=>{
    const canon=teamCanonicalName(t);
    return oneDriverTeams.includes(t)||oneDriverTeams.includes(canon)
      ||app._initialTeamSizes?.[t]===1||app._initialTeamSizes?.[canon]===1;
  });
  if(onedriverExited&&seasonRules().preqAdvanceIfOnedriverExits){
    app._preqAdvanceOverride=seasonRules().preqAdvanceIfOnedriverExits;
  } else {
    delete app._preqAdvanceOverride;
  }
  // Unscaled +0.25/-0.25 for escaping PQ / dropping into PQ at the recalc — a flat
  // reward/penalty independent of the team's current modifier level.
  removedTeams.forEach(t=>{
    if(!t||t==='Available')return;
    applyTeamMod(t,0.25);
    recordMod('team',null,teamDisplayName(t)||t,0.25,'Escaped pre-qualifying at recalc','prequalifying');
  });
  addedTeams.forEach(t=>{
    if(!t||t==='Available')return;
    applyTeamMod(t,-0.25);
    recordMod('team',null,teamDisplayName(t)||t,-0.25,'Dropped into pre-qualifying at recalc','prequalifying');
  });
  return {addedTeams,removedTeams,newIds,onedriverExited};
}

// Slow modifier sink for teams stuck in pre-qualifying. Applied every round from the round
// AFTER the recalc through the rest of the season, only to teams in app._pqSinkTeams (set by
// applyPreqRecalc: teams that started the year in PQ and are still there post-recalc — teams
// that only fell into PQ AT the recalc are never included). Each eligible round, pulls the
// team's total modifier a little closer to -2.00; never pushes it below -2.00, and does
// nothing once it's already at or below that floor (a team that sinks further on its own,
// e.g. from other race-day penalties, is left alone rather than dragged back up). Because this
// re-checks the current modifier every round rather than tracking a one-off flag, a team that
// claws its way back above -2.00 while still stuck in PQ simply resumes being pulled down —
// the 'restart' the design calls for falls out naturally.
function applyPQSinkModifier(){
  const teams=app._pqSinkTeams||[];
  if(!teams.length)return;
  teams.forEach(t=>{
    if(!t||t==='Available')return;
    const cur=teamTotalMod(t);
    if(cur<=-2.0)return;
    const gap=cur-(-2.0);
    let delta=-Math.max(0.03,Math.round(gap*0.12*100)/100);
    if(cur+delta<-2.0)delta=Math.round((-2.0-cur)*100)/100;
    if(delta>=0)return;
    applyTeamMod(t,delta);
    recordMod('team',null,teamDisplayName(t)||t,delta,'Stuck in pre-qualifying','prequalifying');
  });
}

function applyCrashMod(crashed,secondId,session){
  const applied=new Set();
  crashed.forEach(id=>{
    if(applied.has(id))return; // prevent double-apply
    applied.add(id);
    const isFault=id===secondId;
    const delta=isFault?MOD_CRASH_FAULT:MOD_CRASH_NONFAULT;
    if(delta===0)return; // not-at-fault crashes carry no modifier penalty
    applyDriverMod(id,delta);
    const d=BASE_DRIVERS.find(x=>x.id===id);
    recordMod('driver',id,d?driverFullName(d):String(id),delta,'At fault for crash',session||'race');
  });
}

// ── INEXPERIENCE MODIFIERS ───────────────────────────────────────────────
// Drivers: free agents start at -0.50. Scale up per race result until 0.00.
// Teams: new entrants start at -0.30. Expires end of debut season regardless.

function registerFreeAgentDriver(id,targetSeason){
  // Apply inexperience penalty to a driver entering the FA pool for the first time
  // from the second season onwards. Penalty decays uniformly over 16 race entries.
  if(!app._inexperienceDrivers)app._inexperienceDrivers={};
  if(app._inexperienceDrivers[id]!==undefined)return; // already registered (mid-decay)
  // Permanent record: a driver who has EVER been registered before — even if that
  // registration has since fully decayed away and been deleted — has already served
  // their rookie period once and must never be re-penalized for it again, no matter how
  // many times they cycle out of and back into the free-agent pool later in their career.
  if(!app._hasHadInexperience)app._hasHadInexperience={};
  if(app._hasHadInexperience[id])return;
  const gameStartYr=app.history.weekends.length>0?Math.min(...app.history.weekends.map(w=>w.raceMeta.year)):(app.currentSeason||1989);
  // Use the explicit target season if given (needed during EoS processing, where
  // app.currentSeason is still the OUTGOING season until the very end of the transition —
  // relying on it here made the very first season transition of any game incorrectly treat
  // newly-generated drivers as if they belonged to the starting roster). Otherwise fall
  // back to app.currentSeason for the normal mid-season registration path.
  const effectiveSeason=targetSeason!=null?targetSeason:app.currentSeason;
  if(effectiveSeason<=gameStartYr)return; // no penalty in the starting year
  // A driver who was already active in/before the game's starting year is an established
  // veteran, not a rookie — even if they're picked up again in a later season after a
  // gap (e.g. released mid-career, then signed as an injury replacement).
  const _dbEntryInexp=DRIVER_DATABASE.find(d=>d.id===id);
  if(_dbEntryInexp&&_dbEntryInexp.firstYear<=gameStartYr)return;
  app._hasHadInexperience[id]=true;
  // Apply to base modifier (driverBonus) so it shows clearly in profiles
  const _bdInexp=BASE_DRIVERS.find(d=>d.id===id);
  app._inexperienceDrivers[id]={penalty:-0.50,entries:0,appliedTo:_bdInexp?'base':'accumulated'};
  if(_bdInexp){
    _bdInexp.driverBonus=(_bdInexp.driverBonus||0)-0.50;
    _bdInexp.qualiBonus=(_bdInexp.qualiBonus||0)-0.50;
    _bdInexp.raceNoGridBonus=(_bdInexp.raceNoGridBonus||0)-0.50;
    // Floor: never let this push the driver's total modifier below the -5.00 basement.
    // (Only the driverBonus/qualiBonus/raceNoGridBonus set above need adjusting back —
    // they were all reduced by the identical -0.50 delta, so clawing back the same
    // amount on each keeps them consistent with each other.)
    const _accumNowInexp=app.driverModifiers[id]||0;
    if(_bdInexp.driverBonus+_accumNowInexp<-DRIVER_MOD_CAP){
      const _flooredBase=-DRIVER_MOD_CAP-_accumNowInexp;
      const _clawback=_flooredBase-_bdInexp.driverBonus;
      _bdInexp.driverBonus=_flooredBase;
      _bdInexp.qualiBonus+=_clawback;
      _bdInexp.raceNoGridBonus+=_clawback;
    }
    // Previously invisible in the modifier log since it adjusts base rather than the
    // accumulated modifier — recorded here purely so the change is traceable. If this
    // happens outside an active race weekend (e.g. a brand-new EoS entrant), recordMod
    // is a no-op, so also log to the exportable off-season event list.
    if(app.currentWeekend){
      recordMod('driver',id,driverFullName(_bdInexp),-0.50,'Inexperience penalty (new to the grid)','race');
    } else {
      if(!app._eosModifierEvents)app._eosModifierEvents=[];
      app._eosModifierEvents.push({kind:'driver',id,yr:app.currentSeason||1989,delta:-0.50,newMod:driverTotalMod(id),reason:'Inexperience penalty (new to the grid)',ts:Date.now()});
    }
  } else {
    applyDriverMod(id,-0.50); // fallback if not yet in BASE_DRIVERS
  }
}

function registerNewTeam(team,season){
  if(!app._inexperienceTeams)app._inexperienceTeams={};
  const canon=teamCanonicalName(team);
  if(app._inexperienceTeams[canon])return; // already registered
  app._inexperienceTeams[canon]={penalty:-0.30,entries:0,seasonDebut:season};
  // Apply penalty directly to teamModifiers without modHistory entry
  // (so it doesn't show as a spurious R17 entry on the modifier chart) — but still
  // floored at the -5.00 basement, same as every other modifier change.
  if(!app.teamModifiers)app.teamModifiers={};
  const _newAccumT=Math.round(((app.teamModifiers[canon]||0)+MOD_INEXP_TEAM)*100)/100;
  app.teamModifiers[canon]=clampAccumToCap(teamBaseTb(canon)||0,_newAccumT,TEAM_MOD_CAP);
}

function updateInexperienceAfterRace(results,preqFailedIds,qualifiedIds){
  if(!app._inexperienceDrivers)return;
  const INEXP_TOTAL_ENTRIES=16; // full decay after 16 race entries
  const INEXP_PENALTY=0.50;
  const decayPerEntry=INEXP_PENALTY/INEXP_TOTAL_ENTRIES; // +0.03125 per entry
  // Result-based bonus decay: a strong result knocks extra off the inexperience penalty,
  // on top of the flat per-entry decay every race entry gets. Only the single BEST
  // qualifying result applies per entry — a win doesn't also stack the podium/points bonus.
  const INEXP_DECAY_POINTS=0.02;
  const INEXP_DECAY_PODIUM=0.05;
  const INEXP_DECAY_WIN=0.10;

  Object.keys(app._inexperienceDrivers).forEach(rawId=>{
    const id=Number(rawId);
    const rec=app._inexperienceDrivers[id];
    if(!rec||typeof rec!=='object'){delete app._inexperienceDrivers[id];return;}
    if(rec.penalty>=0){delete app._inexperienceDrivers[id];return;}
    // Count an entry for ANY appearance this weekend — raced, DNQ'd (qualified but didn't
    // start), or failed to advance from PQ. Previously a DNQ fell through both the
    // 'raced' and 'attemptedPQ' checks and got no decay progress at all that round.
    const raced=results.some(x=>x.id===id);
    const attemptedPQ=preqFailedIds&&preqFailedIds.includes(id);
    const dnqd=qualifiedIds&&qualifiedIds.includes(id)&&!raced;
    if(raced||attemptedPQ||dnqd){
      rec.entries=(rec.entries||0)+1;
      // Extra decay for a strong result this race — win > podium > points, only one applies.
      let extraDecay=0;
      if(raced){
        const raceRes=results.find(x=>x.id===id);
        if(raceRes){
          if(raceRes.status==='active'&&raceRes.position===1)extraDecay=INEXP_DECAY_WIN;
          else if(raceRes.status==='active'&&raceRes.position<=3)extraDecay=INEXP_DECAY_PODIUM;
          else if((raceRes.points||0)>0)extraDecay=INEXP_DECAY_POINTS;
        }
      }
      const newPen=Math.min(0,rec.penalty+decayPerEntry+extraDecay);
      const actualDelta=newPen-rec.penalty;
      rec.penalty=newPen;
      if(actualDelta!==0){
        const _bdDecay=BASE_DRIVERS.find(d=>d.id===id);
        if(rec.appliedTo==='base'&&_bdDecay){
          _bdDecay.driverBonus=(_bdDecay.driverBonus||0)+actualDelta;
          _bdDecay.qualiBonus=(_bdDecay.qualiBonus||0)+actualDelta;
          _bdDecay.raceNoGridBonus=(_bdDecay.raceNoGridBonus||0)+actualDelta;
        } else {
          applyDriverMod(id,actualDelta);
        }
      }
      if(rec.entries>=INEXP_TOTAL_ENTRIES||newPen>=0){
        if(rec.penalty<0){
          const r2=-rec.penalty;
          const _bdFinal=BASE_DRIVERS.find(d=>d.id===id);
          if(rec.appliedTo==='base'&&_bdFinal){
            _bdFinal.driverBonus=(_bdFinal.driverBonus||0)+r2;_bdFinal.qualiBonus=(_bdFinal.qualiBonus||0)+r2;_bdFinal.raceNoGridBonus=(_bdFinal.raceNoGridBonus||0)+r2;
          } else {
            applyDriverMod(id,r2);
          }
        }
        delete app._inexperienceDrivers[id];
      }
    }
  });

  // Team inexperience: decay over 16 race entries same as driver penalty
  if(!app._inexperienceTeams)return;
  const INEXP_TEAM_ENTRIES=16;
  const INEXP_TEAM_PENALTY=0.30;
  const teamDecayPerEntry=INEXP_TEAM_PENALTY/INEXP_TEAM_ENTRIES;
  Object.keys(app._inexperienceTeams).forEach(team=>{
    const entry=app._inexperienceTeams[team];
    if(!entry||entry.penalty>=0){delete app._inexperienceTeams[team];return;}
    // Count an entry if at least one of the team's drivers raced
    const teamRaced=results.some(r=>teamCanonicalName(r.team)===teamCanonicalName(team));
    if(teamRaced){
      entry.entries=(entry.entries||0)+1;
      const newPen=Math.min(0,entry.penalty+teamDecayPerEntry);
      const actualDelta=newPen-entry.penalty;
      entry.penalty=newPen;
      if(actualDelta!==0)applyTeamMod(team,actualDelta);
      if(entry.entries>=INEXP_TEAM_ENTRIES||newPen>=0){
        if(entry.penalty<0)applyTeamMod(team,-entry.penalty);
        delete app._inexperienceTeams[team];
      }
    }
  });
}

function expireSeasonEndInexperience(){
  // Team inexperience now decays by race entries (see updateInexperienceAfterRace).
  // This function is kept as a safety cleanup for any stuck entries after multiple seasons.
  if(!app._inexperienceTeams)return;
  Object.keys(app._inexperienceTeams).forEach(team=>{
    const entry=app._inexperienceTeams[team];
    if(!entry)return;
    // Only clean up teams that have been through 2+ full seasons without decaying fully
    if(entry.seasonDebut&&app.currentSeason>entry.seasonDebut+1){
      if(entry.penalty<0)applyTeamMod(team,-entry.penalty);
      delete app._inexperienceTeams[team];
    }
  });
}

// ── SEASON TRANSITION MECHANICS ─────────────────────────────────────────

// ── FIRING PROBABILITY (during season) ────────────────────────────────────
// Returns base % chance a driver gets fired after a given race.
// Target: ~10 firings per 16-race season across ~20 drivers.
// Random element: low base rate fires ~1-2 drivers/season from pure chance.
// Performance multipliers (DNQ, crashes, modifier gap) account for the rest.
// Weighted heavily towards low-modifier teams.
function firingChance(raceNum, isPreqTeam, isReplacingFiredDriver, teamTotalMod, isLowlyTeam, totalRoundsForFire){
  // Replacers are much harder to fire — they just filled an emergency vacancy
  if(isReplacingFiredDriver) return isPreqTeam?0.004:0.003;
  const ttm=teamTotalMod||0;
  // Base random element: survives even with no performance issues
  // Low-mod teams (ttm<0): 0.8%; mid (0-2): 0.5%; high (2+): 0.3%
  const randomBase=ttm<0?0.008:ttm<2?0.005:0.003;
  let chance;
  if(isPreqTeam){
    // PQ teams: higher baseline churn, scales with race number
    const base=raceNum<=8?0.025:raceNum<=13?0.035:0.055;
    chance=base+randomBase;
  } else {
    const base=raceNum<=8?0.004:raceNum<=13?0.008:0.015;
    chance=base+randomBase;
  }
  // Final-3-rounds volatility: a struggling team (PQ, or near the bottom of the
  // constructors' table) cutting ties with a lost-cause driver as the season winds
  // down — meaningfully more likely than the general late-season bump above already
  // accounts for.
  const totalR=totalRoundsForFire||16;
  if(isLowlyTeam&&raceNum>totalR-3){
    chance*=2.2;
  }
  return chance;
}

// ── MID-SEASON: FIRING & QUITTING LOGIC ──────────────────────────────────
// quittingChance = half of firingChance; driver in top 5 cannot quit
function quittingChance(raceNum, isPreqTeam, isReplacingFiredDriver, teamTotalMod){
  return firingChance(raceNum, isPreqTeam, isReplacingFiredDriver, teamTotalMod) * 0.4;
}

// Remove a driver from their team mid-season and return them to available pool
// reason: 'fired' | 'quit'
// Keeps preqDriverIds correct whenever a driver's team changes for any reason OTHER than the
// normal hireReplacement() pipeline (which already has its own PQ-inheritance checks for
// brand-new hires). Poaching — both in-season and at EOS — reassigns .team directly rather
// than going through releaseDriverFromTeam/hireReplacement, so without this it could leave a
// driver credited with PQ status at a team they've already left, while the team they left
// carries a phantom PQ id nobody accounts for. toTeam is optional — pass it when the driver
// is moving straight to a known new team (poaching); omit it for a plain departure (fired/
// quit) where the destination isn't decided yet.
function syncPQStatusOnTeamChange(driverId,fromTeam,toTeam){
  if(!app.preqDriverIds)return;
  const wasInPQ=app.preqDriverIds.includes(driverId);
  if(wasInPQ){
    app.preqDriverIds=app.preqDriverIds.filter(id=>id!==driverId);
    // Single-car PQ team edge case (e.g. EuroBrun): no teammate id survives to prove the OLD
    // team was in PQ once this id is removed. Stash it so hireReplacement can still restore
    // PQ status for whoever fills the vacated seat, however long that takes.
    if(!app._vacatedPQTeams)app._vacatedPQTeams={};
    app._vacatedPQTeams[teamCanonicalName(fromTeam)]=currentSeasonEntries().length;
  }
  if(toTeam){
    const newTeamCurrentlyInPQ=app.preqDriverIds.some(id=>{
      const t=BASE_DRIVERS.find(b=>b.id===id)?.team;
      return t&&teamCanonicalName(t)===teamCanonicalName(toTeam);
    });
    if(newTeamCurrentlyInPQ&&!app.preqDriverIds.includes(driverId)){
      app.preqDriverIds.push(driverId);
    }
  }
}
function releaseDriverFromTeam(d, reason){
  d._fired = reason==='fired' ? true : undefined;
  d._quit  = reason==='quit'  ? true : undefined;
  // Remember which team(s) this driver has left this season — they cannot return to any
  // of them as a free agent later in the same season (captured before team is overwritten).
  if(!app._seasonTeamBlocklist)app._seasonTeamBlocklist={};
  if(!app._seasonTeamBlocklist[d.id])app._seasonTeamBlocklist[d.id]=[];
  const _leftTeamCanon=teamCanonicalName(d.team);
  if(!app._seasonTeamBlocklist[d.id].includes(_leftTeamCanon))app._seasonTeamBlocklist[d.id].push(_leftTeamCanon);
  // Driver-team relationship: leaving mid-season is a 'controversial' departure, whichever
  // side initiated it — firing is the harsher of the two (team's own decision), quitting is
  // variable (sometimes acrimonious, sometimes just an opportunity elsewhere, hence the
  // random range rather than a flat penalty).
  if(reason==='fired'){
    applyDriverTeamRelation(d.id,d.team,-18,'Fired mid-season');
  } else if(reason==='quit'){
    applyDriverTeamRelation(d.id,d.team,-Math.random()*10,'Quit mid-season');
  }
  // Remove from PQ list immediately
  syncPQStatusOnTeamChange(d.id,d.team,null);
  // Remove from BASE_DRIVERS — fired/quit drivers are no longer in the active race pool.
  // Their history remains in app.history; they return to the available pool below.
  const idx=BASE_DRIVERS.findIndex(x=>x.id===d.id);
  if(idx>=0){cacheDriverBonusBeforeRemoval(BASE_DRIVERS[idx]);BASE_DRIVERS.splice(idx,1);}
  // Return to available pool with clean bonus data (strip stale team bonus)
  if(app._seasonFAPool){
    app._seasonFAPool.push({
      ...d,
      id: d.id,
      fn: d.firstName, ln: d.lastName,
      firstName: d.firstName, lastName: d.lastName,
      n2: d.nation2||d.n2||'', n3: d.nation3||d.n3||'',
      teamBonus: 0,
      qualiBonus: d.driverBonus||0,
      raceNoGridBonus: d.driverBonus||0,
      team: 'Available'
    });
  }
}

// Is this auto-qualifying team ranked in or near the PQ drop zone for the upcoming
// mid-season recalc? Reuses the exact same ranking (_pqTeamRow/_pqSortMid) that
// computePreqIds itself uses to decide PQ membership, checking a small margin beyond
// the actual cutoff so 'near' captures teams genuinely at risk, not just those already in.
function isTeamNearPQDropZone(team){
  const yr=app.currentSeason||1989;
  const canon=teamCanonicalName(team);
  const allActive=[...new Set([
    ...Object.keys(app._initialTeamSizes||{}).map(t=>teamCanonicalName(t)),

    (app.preqDriverIds||[]).map(id=>teamCanonicalName(BASE_DRIVERS.find(d=>d.id===id)?.team||'')).filter(t=>t&&t!=='Available')

    // ── Underperforming-teammate eligibility ──────────────────────────────

    // or quitting even if they have season points themselves (which normally fully
    // protects them) and even if they're in the top 5 (which normally fully protects

    // Only active from 25% of the season onward, chance ramps up (slow start,
    // accelerating late season) as the gap persists. Firing is the more common outcome

    // more common instead.

    if(teammateUP){
      const dPtsUP=dStUP?.championshipPoints||0;
      const tStUP=st.drivers.find(x=>x.id===teammateUP.id);

      }
    }

    // ── Top-team underperformance eligibility ──────────────────────────────
    // A driver at a genuinely strong team (modifier >= 3.0) who fails to convert that
    // into a reasonable share of the team's points can become eligible for firing even
    // with season points/top-5 protection — being a small fraction of a big team haul
    // is itself the signal, independent of the teammate comparison above (e.g. both
    // drivers could be underperforming together and this would still catch it). Gated
    // to round 6+ ("at least six weeks into the season") and deliberately much rarer
    // than the teammate mechanic — this is meant to be a genuine possibility for a
    // catastrophic season at a top team, not a routine consequence.

    let topTeamUnderperformEligible=false,topTeamFireChance=0;

      const ttmForTopCheck=teamTotalMod(d.team);
      if(ttmForTopCheck>=TOP_TEAM_FIRE_THRESHOLD){
        const dStTop=st.drivers.find(x=>x.id===d.id);
        const dPtsTop=dStTop?.championshipPoints||0;
        const teamSeasonPtsTop=BASE_DRIVERS.filter(x=>x.team===d.team&&!x._retired).reduce((s,x)=>{

        // Require a meaningful sample (team has actually scored a real haul) before
        // judging a share of it — avoids noise early in a low-scoring season.
        if(teamSeasonPtsTop>=30*_scoringScaleForYear(app.currentSeason||1989)){
          const shareTop=dPtsTop/teamSeasonPtsTop;
          if(shareTop<0.15){
            topTeamUnderperformEligible=true;
            const totalRoundsTop=seasonRules().totalRounds||16;
            const progressTop=Math.max(0,Math.min(1,(round-6)/Math.max(1,totalRoundsTop-6)));
            const scaledTop=progressTop*progressTop; // slow start, accelerates late season
            topTeamFireChance=0.005+scaledTop*0.035; // ~0.5% at round 6, up to ~4% at season end
          }
        }
      }
    }

    // ── Very poor form eligibility ──────────────────────────────────────────
    // A driver whose form has collapsed (below -1.50) is put at risk of firing at ANY
    // team, bypassing the top-team/points protection above — regardless of their
    // absolute modifier standing, a prolonged nosedive is itself the signal. The
    // newly-signed grace period is a SEPARATE, deliberate protection and still applies

    const _formForFire=driverFormScore(d.id);
    const veryPoorFormEligible=_formForFire<-1.5;

    if(veryPoorFormEligible){

    // Extra replacement chance for an auto-qualifying team in or near the PQ drop zone,

    // as a random chance the way ordinary firing churn is.

          const _faMod=(fa.driverBonus||0)+(getDriverMod(fa.id)||0);

        });

      }
    }

    // things: it only fires at all for a driver whose form isn't positive (see the form-based
    // suppression further below, which now protects any driver trending well regardless of
    // points — a driver with neutral or negative form is not shielded just because he's scored
    // before) and who just DNQ'd this specific race. On top of that, two factors shape how
    // newsworthy the DNQ actually is: a weak team gets real leeway (their own car is plausibly
    // to blame — as low as 0.2x), while a driver whose form was already trending negative is
    // judged more harshly for the same result (up to ~2.2x). A mid-pack team (ttm≈+1) with
    // neutral form is the roughly-1x baseline.

    // Genuinely 'escaped PQ this season' = was in PQ last season AND is not in PQ now —
    // not just 'absent from last season's PQ list', which is true for nearly every normal
    // auto-qual team (most have never been in PQ at all) and was silently disabling this
    // whole mechanic for almost the entire grid.

    if(!isPreq&&!escapedPQThisSeason&&thisRaceDNQIds.has(d.id)){
      const dnqCount=(app._seasonDNQCount||{})[d.id]||0;
      if(dnqCount>=1){
        // Ensure base is non-zero so DNQ multiplier has something to multiply

        const _dnqFormFactor=_formForFire<0?1+Math.min(-_formForFire,3)*0.4:1;

      }
    }

    // DNPQ multiplier — marginal boost when a driver's team has a sustained streak of
    // failing to get anyone through pre-qualifying. Deliberately modest (unlike the DNQ
    // multiplier above) since this reflects team-wide frustration building gradually,
    // not a single driver's individual results.

      const _pqStreakForFire=(app._seasonPQFailStreak||{})[teamCanonicalName(d.team)]||0;
      if(_pqStreakForFire>=2){
        fireChance*=Math.min(1.6,1+_pqStreakForFire*0.08);
      }
    }

    // Crash fault multiplier — only when at fault for a crash in THIS race, AND only
    // from the SECOND at-fault crash of the season onward (a driver's first at-fault
    // crash of the season carries no extra firing risk on its own).

      const crashFaults=(app._seasonCrashFaultCount||{})[d.id]||0;
      if(crashFaults>=2){

          ?1+(crashFaults*0.45)
          :dtm>=-3
            ?1+(crashFaults*0.30)
            :1+(crashFaults*0.18);

      }

    }

    // ── Quitting ──

    // A driver rated well above his own team's car feels increasingly wasted there —
    // scale the quit chance up with how far his personal modifier sits above the team's,
    // capped so an extreme gap doesn't make quitting a near-certainty.

    }
    // Driver-team relationship: a driver who likes it here is less inclined to walk away;
    // a soured relationship makes quitting more likely. Same dead zone as firing leniency.

    }
    // Sub-hatred teammate friction (Tension/Dislike, 0-99pts) — same idea as the EOS

    // EOS), since this rolls every race rather than being a once-a-season decision.

      const _rvQuit=getRivalry(d.id,teammate.id);
      if(_rvQuit&&!_rvQuit.hatred&&_rvQuit.pts>0)quitChance*=1+(_rvQuit.pts/100)*1.0;
    }

      return;
    }

    // ── Hatred quitting (mid-season) — deliberately much rarer than the equivalent hatred
    // firing above (20% per check, capped at 3/season): 6% per check, capped at 2/season,
    // and top-5 teams are quarantined entirely (a plum seat is much harder to walk away
    // from even out of genuine animosity). Independent of the general quit chance, so it
    // isn't affected by the points/form suppressions above — hatred is hatred regardless
    // of how the season's going on track.
    if(app._movementRules?.quitting!==false&&teammate&&!top5TeamCanons.has(teamCanonicalName(d.team))){
      const _rvHateQuit=getRivalry(d.id,teammate.id);
      if(_rvHateQuit&&_rvHateQuit.hatred&&(app._seasonHatredQuitChecks||0)<2){
        app._seasonHatredQuitChecks=(app._seasonHatredQuitChecks||0)+1;
        if(Math.random()<0.06){
          toProcess.push({id:d.id,team:d.team,reason:'rivalry',action:'quit'});
          return;
        }
      }
    }

    // ── Car reliability frustration (independent of the general quit chance above, which
    // the hasSeasonPoints check just zeroed out for this driver) — a driver who's actually
    // scored, but whose season has been repeatedly wrecked by mechanical failures, can walk
    // away in frustration. Only live from just after the PQ recalc through the second-last
    // round — never in the final round itself. Only right after a mechanical DNF in THAT race
    // (the season-cumulative count feeding the threshold below includes PQ/qualifying
    // mechanical retirements too, but only a RACE mechanical DNF can ever be the trigger
    // itself, since a PQ/Q retirement means the driver isn't even in that round's race to be
    // evaluated for quitting). Scaled by how far behind the championship leader the driver's
    // own points total is: a genuine title contender never quits for this (ratio to leader
    // >= 0.6), a mid-table driver is less likely (ratio well below 0.6 but still meaningful),
    // and someone hanging onto a handful of points while the car keeps failing them is the
    // most likely to snap.
    if(!isPreq&&hasSeasonPoints){
      const _recalcRoundForMech=seasonRules().preqRecalcAfterRound||8;
      const _totalRoundsForMech=seasonRules().totalRounds||16;
      if(round>_recalcRoundForMech&&round<=_totalRoundsForMech-1){
        const _lastMechDNFRoundForQuit=(app._lastMechDNFRound||{})[d.id];
        const _withinMechDNFWindow=_lastMechDNFRoundForQuit===round;
        if(_withinMechDNFWindow){
          const _mechDNFCountForQuit=(app._seasonMechDNFCount||{})[d.id]||0;
          if(_mechDNFCountForQuit>=3){
            const _leaderPtsForMech=st.drivers[0]?.championshipPoints||0;
            const _driverPtsForMech=dSt?.championshipPoints||0;
            if(_leaderPtsForMech>0){
              const _ptsRatioForMech=_driverPtsForMech/_leaderPtsForMech;
              const _proximityForMech=Math.max(0,(0.6-_ptsRatioForMech)/0.6); // 0 = in contention, 1 = barely on the board
              if(_proximityForMech>0){
                const _seasonProgressForMech=Math.max(0,Math.min(1,(round-_recalcRoundForMech)/Math.max(1,_totalRoundsForMech-1-_recalcRoundForMech)));
                const _dnfSeverityForMech=Math.min(1.6,1+(_mechDNFCountForQuit-3)*0.2);
                const _reliabilityQuitChance=0.09*_proximityForMech*(0.3+0.7*_seasonProgressForMech)*_dnfSeverityForMech;
                if(Math.random()<_reliabilityQuitChance){
                  toProcess.push({id:d.id,team:d.team,reason:'car-reliability-frustration',action:'quit'});
                  return;
                }
              }
            }
          }
        }
      }
    }

    // ── Underperforming teammate (independent of the points/top-5 protections above —
    // that's the whole point of this mechanic) ──
    if(underperformEligible){
      const _teamCanonUP=teamCanonicalName(d.team);
      const _alreadyFiredThisSeasonUP=(app._seasonUnderperformFiredTeams||[]).includes(_teamCanonUP);
      if(!_alreadyFiredThisSeasonUP&&Math.random()<underperformFireChance){
        if(!app._seasonUnderperformFiredTeams)app._seasonUnderperformFiredTeams=[];
        app._seasonUnderperformFiredTeams.push(_teamCanonUP);
        toProcess.push({id:d.id,team:d.team,reason:'underperforming-teammate',action:'fired'});
        return;
      }
      if(Math.random()<underperformQuitChance){
        toProcess.push({id:d.id,team:d.team,reason:'teammate-frustration',action:'quit'});
      }
    }

    // ── Top-team underperformance (independent of the points/top-5 protections above) ──
    // Firing only — this is about the team's patience with a results problem, not a
    // personal grievance that would lead the driver to quit.
    if(topTeamUnderperformEligible&&Math.random()<topTeamFireChance){
      toProcess.push({id:d.id,team:d.team,reason:'top-team-underperformance',action:'fired'});
      return;
    }

    // ── Very poor form (independent of the points/top-5 protections above) — but the
    // newly-signed grace period is a deliberate, separate protection and still applies. ──
    if(veryPoorFormEligible&&!isReplacer&&Math.random()<veryPoorFormFireChance){
      toProcess.push({id:d.id,team:d.team,reason:'very-poor-form',action:'fired'});
      return;
    }
  });

  toProcess.forEach(f=>{
    const d=BASE_DRIVERS.find(x=>x.id===f.id);
    if(!d)return;
    const name=driverSurname(d);
    const fullName=driverFullName(d);
    const team=d.team;

    if(f.action==='fired'&&f.reason==='rivalry'){
      const tm=BASE_DRIVERS.find(x=>x.team===team&&x.id!==d.id&&!x._temp);
      if(tm){const rv=getRivalry(f.id,tm.id);if(rv){rv.pts=100;rv.hatred=true;}}
    }

    // Modifier hit for losing a driver mid-season — team takes a hit either way (fired or
    // quit), but only a FIRED driver takes a personal confidence hit (quitting was their
    // own choice). Must apply before releaseDriverFromTeam, which removes them from
    // BASE_DRIVERS entirely.
    if(f.action==='fired'){
      applyDriverMod(f.id,-0.05);
      recordMod('driver',f.id,fullName,-0.05,'Fired','race');
    }
    applyTeamMod(team,-0.05);
    recordMod('team',null,teamDisplayName(team),-0.05,f.action==='fired'?'Driver fired':'Driver quit','race');

    releaseDriverFromTeam(d, f.action);
    recordDriverMovement(f.id,f.action,f.team,'Available',f.reason,app.history.weekends.filter(w=>w.raceMeta.year===app.currentSeason).length+1,app.currentSeason||1989);
    recordDriverIncident(f.id,'teamChange',{action:f.action,fromTeam:team,reason:f.reason,round:app.history.weekends.filter(w=>w.raceMeta.year===app.currentSeason).length+1,year:app.currentSeason||1989});

    // Always find a replacement (teams must stay at their starting driver count).
    // Prefer signing an established driver away from a weaker rival team; fall back
    // to the free-agent pool if no signing happens.
    if(!app.currentWeekend._firedNews)app.currentWeekend._firedNews=[];
    if(!app.currentWeekend._recentReplacementIds)app.currentWeekend._recentReplacementIds=new Set();
    const _existingTeamIds=BASE_DRIVERS.filter(d=>d.team===team&&!d._temp&&!d._retired).map(d=>d.id);
    const _excludeIds=[f.id,..._existingTeamIds,...Array.from(app.currentWeekend._recentReplacementIds)];
    const signing=attemptSigningFromRival(team,_excludeIds)||attemptPQPromotionSigning(team,_excludeIds);
    const actionLabel=f.action==='quit'?'has quit':'has been fired';

    if(signing){
      const poachedDriver=signing.driver,donorTeam=signing.fromTeam;
      const poachedFullName=driverFullName(poachedDriver);

      // Motivation boost for the signed driver — moving mid-season to a stronger team
      const driverBoost=Math.round((0.10+Math.random()*0.10)*100)/100; // +0.10 to +0.20
      applyDriverMod(poachedDriver.id,driverBoost);
      recordMod('driver',poachedDriver.id,poachedFullName,driverBoost,signing.viaPromotion?'Promoted from pre-qualifying':'Signed by a stronger team mid-season','race');
      // Motivation boost for the donor team — rallying after losing a driver
      const teamBoost=Math.round((0.05+Math.random()*0.05)*100)/100; // +0.05 to +0.10
      applyTeamMod(donorTeam,teamBoost);
      recordMod('team',null,teamDisplayName(donorTeam),teamBoost,signing.viaPromotion?'Driver promoted away mid-season':'Driver signed away mid-season','race');
      // Poaching a driver is a natural team-rivalry seed — a promotion out of PQ isn't a
      // competitive snub the same way, so it doesn't seed a rivalry.
      if(!signing.viaPromotion){
        addTeamRivalryPoints(team,donorTeam,Math.floor(Math.random()*26)+15,'Driver poached',newsItems);
        // Relationship: leaving the donor team mid-season isn't always acrimonious — sometimes
        // it's just an opportunity taken, sometimes it stings. The new team gets a flat
        // goodwill bump for having wanted him enough to poach him.
        applyDriverTeamRelation(poachedDriver.id,donorTeam,-Math.random()*10,'Poached away mid-season');
        applyDriverTeamRelation(poachedDriver.id,team,6,'Poached by this team mid-season');
      } else {
        // A PQ promotion is literally 'given a chance at a bigger team' — one-off boost.
        applyDriverTeamRelation(poachedDriver.id,team,8,'Given a chance at a bigger team');
      }

      const _newTb=teamBaseTb(team)||0;
      const _newDb=poachedDriver.driverBonus||0;
      // Direct team reassignment bypasses releaseDriverFromTeam/hireReplacement entirely, so
      // PQ status has to be synced explicitly here — otherwise a driver poached away from a
      // PQ team keeps stale PQ membership at a team they've left, while their old team's
      // vacancy carries no trace that it needs a PQ replacement.
      syncPQStatusOnTeamChange(poachedDriver.id,donorTeam,team);
      poachedDriver.team=team;
      poachedDriver.teamBonus=_newTb;
      poachedDriver.qualiBonus=_newDb+_newTb;
      poachedDriver.raceNoGridBonus=_newDb+_newTb;
      recordDriverMovement(poachedDriver.id,'transferred',donorTeam,team,signing.viaPromotion?'promoted-from-pq':'signed-from-rival',
        app.history.weekends.filter(w=>w.raceMeta.year===app.currentSeason).length+1,app.currentSeason||1989);
      app.currentWeekend._recentReplacementIds.add(poachedDriver.id);

      const newsEntry={
        team, action: f.action, reason: f.reason,
        originalName: fullName||name,
        replacementName: poachedFullName,
        replacementNation2: poachedDriver.nation2||poachedDriver.n2||'',
        nation2: d.nation2||'',
        signedFromTeam: donorTeam,
        viaPromotion: !!signing.viaPromotion,
      };
      const rivalPts=Math.floor(Math.random()*26);
      if(rivalPts>0) addRivalryPoints(f.id,poachedDriver.id,rivalPts,f.action==='fired'?'Fired and replaced':'Replaced after quitting',newsItems);

      // Donor team now has its own vacancy — fill from the free-agent pool
      const _donorExistingIds=BASE_DRIVERS.filter(dd=>dd.team===donorTeam&&!dd._temp&&!dd._retired).map(dd=>dd.id);
      const donorRepl=findReplacement(donorTeam,[poachedDriver.id,..._donorExistingIds,...Array.from(app.currentWeekend._recentReplacementIds)],true);
      if(donorRepl){
        hireReplacement(donorRepl,donorTeam,999,null);
        app.currentWeekend._recentReplacementIds.add(donorRepl.id);
        newsEntry.backfillName=((donorRepl.fn||donorRepl.firstName||'')+' '+(donorRepl.ln||donorRepl.lastName||'')).trim();
        newsEntry.backfillNation2=donorRepl.nation2||donorRepl.n2||'';
        recordDriverMovement(donorRepl.id,'hired','Available',donorTeam,'replacement-for-signed-away',
          app.history.weekends.filter(w=>w.raceMeta.year===app.currentSeason).length+1,app.currentSeason||1989);
      } else if(newsItems){
        newsItems.push(`⚠ No available replacement found for <strong>${escapeHtml(teamDisplayName(donorTeam)||donorTeam)}</strong> after losing a driver mid-season.`);
      }
      app.currentWeekend._firedNews.push(newsEntry);
    } else {
      const repl=findReplacement(team,_excludeIds,true);
      if(repl){
        hireReplacement(repl,team,999,null); // 999 = rest of season; null = no one returning
        app.currentWeekend._recentReplacementIds.add(repl.id);
        const replFullName=((repl.fn||repl.firstName||'')+' '+(repl.ln||repl.lastName||'')).trim();
        app.currentWeekend._firedNews.push({
          team, action: f.action, reason: f.reason,
          originalName: fullName||name,
          replacementName: replFullName,
          replacementNation2: repl.nation2||repl.n2||'',
          nation2: d.nation2||''
        });
        // Rivalry points between departing driver and replacement
        const rivalPts=Math.floor(Math.random()*26);
        if(rivalPts>0) addRivalryPoints(f.id,repl.id,rivalPts,f.action==='fired'?'Fired and replaced':'Replaced after quitting',newsItems);
      } else {
        if(newsItems)newsItems.push(`⚠ No available replacement found for <strong>${escapeHtml(teamDisplayName(team)||team)}</strong> after ${escapeHtml(name)} ${f.action==='quit'?'quit':'was fired'}.`);
      }
    }
  });
  return toProcess;
}
function retirementChance(age){
  if(age<20)return 0;
  if(age<=25)return 0.01;   // 20-25
  if(age<=27)return 0.03;   // 26-27
  if(age<=29)return 0.04;   // 28-29
  if(age<=31)return 0.07;   // 30-31
  if(age<=35)return 0.18;   // 32-35  (32-33 row deleted)
  if(age<=37)return 0.28;   // 36-37
  if(age<=39)return 0.35;   // 38-39  (38-39 only, 39-40 row deleted)
  if(age<=44)return 0.50+(age-40)*0.075; // 40-44: linear 50% -> 80%, smoothing the previous flat-75% cliff at 40
  return 1.00;               // 45+ mandatory retirement (handled in runEndOfSeasonRetirements)
}

function runEndOfSeasonRetirements(){
  const season=app.currentSeason;
  const retired=[];
  const allDrivers=[...BASE_DRIVERS,...(FREE_AGENTS||[])];
  allDrivers.forEach(d=>{
    if(d.team==='Available'&&!d._active)return; // skip unused FAs
    const age=driverAge(d,season);
    if(!age)return;
    if(age<17)return; // under 17 can't retire
    if(age>=45){
      // Mandatory retirement at 45
      retired.push({id:d.id,name:d.name,team:d.team,reason:'Age limit (45)',age});
      return;
    }
    if(age<17||age<=20)return; // 17-20 cannot voluntarily retire
    const chance=retirementChance(age);
    if(Math.random()<chance){
      retired.push({id:d.id,name:d.name,team:d.team,reason:'Voluntary retirement',age});
    }
  });
  if(!app._retiredDrivers)app._retiredDrivers=[];
  if(!app._qualiRetirementPenalty)app._qualiRetirementPenalty={};
  retired.forEach(r=>{
    const bd=BASE_DRIVERS.find(d=>d.id===r.id);
    app._retiredDrivers.push({...r,season,
      firstName:bd?.firstName||r.firstName||'',
      lastName:bd?.name||r.lastName||r.name||'',
      nation2:bd?.nation2||r.nation2||''
    });
  });
  return retired;
}

function teamChangeChance(teamPos, numTeams){
  // Returns {oneDriver: %, bothDrivers: %}
  const rank=teamPos;
  if(rank<=3)  return {one:0.20,both:0.10};
  if(rank<=6)  return {one:0.30,both:0.15};
  if(rank<=12) return {one:0.60,both:0.30};
  if(rank<=15) return {one:0.75,both:0.50};
  return            {one:0.90,both:0.60};
}

function runEndOfSeasonTeamChanges(){
  const season=app.currentSeason;
  const st=seasonStandings(season);
  const changes=[];
  const teamsSorted=st.teams.map((t,i)=>({...t,pos:i+1}));
  teamsSorted.forEach(t=>{
    const tc=teamChangeChance(t.pos,teamsSorted.length);
    const drivers=BASE_DRIVERS.filter(d=>d.team===t.name);
    // Both drivers change?
    if(drivers.length>=2&&Math.random()<tc.both){
      drivers.forEach(d=>changes.push({id:d.id,name:d.name,team:d.team,reason:'End-of-season team change (both)'}));
    } else if(drivers.length>=1&&Math.random()<tc.one){
      // One driver changes - random pick
      const d=drivers[Math.floor(Math.random()*drivers.length)];
      changes.push({id:d.id,name:d.name,team:d.team,reason:'End-of-season team change'});
    }
  });
  if(!app._teamChanges)app._teamChanges=[];
  changes.forEach(c=>app._teamChanges.push({...c,season}));
  return changes;
}
