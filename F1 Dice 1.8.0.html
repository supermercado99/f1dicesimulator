// ── Compute PQ teams for next season after Stage 3 ────────────────────────
// ── Compute PQ teams for next season after Stage 3 ────────────────────────
function eosComputeNextPQTeams(){
  const eos=app._eos;if(!eos)return[];
  const closedSet=new Set(eos.closures.map(t=>teamCanonicalName(t)));
  const newTeamCanons=(eos.confirmedNewTeams||[]).map(t=>teamCanonicalName(t)).filter(t=>!closedSet.has(t));
  const activeCurrent=[...new Set(
    BASE_DRIVERS.filter(d=>d.team!=='Available'&&!d._retired&&!d._temp).map(d=>d.team)
  )].filter(t=>!closedSet.has(teamCanonicalName(t))).map(t=>teamCanonicalName(t));
  const st=eos._standingsCache;
  const startsEos=_pqStarts(eos.year);
  const currentPQSet=new Set(
    (app.preqDriverIds||[]).map(id=>teamCanonicalName(BASE_DRIVERS.find(d=>d.id===id)?.team||'')).filter(t=>t&&t!=='Available')
  );

  // ── Unified rule, both databases, from the second season onward (the first season's
  // PQ setup is the hardcoded one baked into the season data and never reaches this
  // function): always a base of 26 auto-qualifiers (13 two-driver teams); every team
  // beyond that pre-qualifies. Grid runs 17–20 teams, so this is always 4–7 PQ teams:
  //   17 teams → 4 PQ teams (8 drivers)     18 teams → 5 PQ teams (10 drivers)
  //   19 teams → 6 PQ teams (12 drivers)    20 teams → 7 PQ teams (14 drivers)
  // In every case, auto-qualifiers (26) + advancers from PQ (4) = 30 in qualifying.
  const _fieldTeams=activeCurrent.length+newTeamCanons.filter(t=>!activeCurrent.includes(t)).length;
  const PQ_SLOTS=pqSlotsForTeamCount(_fieldTeams);
  const pqTeams=[...newTeamCanons];
  if(pqTeams.length<PQ_SLOTS){
    const cands=activeCurrent.filter(t=>!pqTeams.includes(t))
      .map(t=>_pqTeamRow(t,eos.nextYear,st,currentPQSet,startsEos))
      .sort((a,b)=>_pqSortEos(a,b,true));
    for(const s of cands){if(pqTeams.length>=PQ_SLOTS)break;pqTeams.push(s.t);}
  }
  return pqTeams;
}

// ── Stage 4: Driver Movements — four sequential phases ─────────────────────
// Each phase is lazy-computed ONLY AFTER the previous phase is confirmed by user.
// Phase state in eos._movementsPhase: 'voluntary'→'recruited'→'releases'→done
// Data: eos._phase1/2/3 = {computed,items:[{d,from,to,type,reason,approved}]}
// eos.movements = combined Phase1+Phase2+Phase3 (for downstream compatibility)

function _eosApproved(items){return items.filter(m=>m.approved!==false);}

// How many consecutive seasons has this driver been at the given team, counting the
// join year through the current year? Used to give successful top drivers some
// protection against constant churn — both voluntarily leaving and being poached.
function driverTenureAtTeam(driverId,team,currentYear){
  const joins=(app.driverIncidents?.[driverId]||[]).filter(inc=>inc.type==='teamJoin'&&teamCanonicalName(inc.details?.team||'')===teamCanonicalName(team));
  if(!joins.length)return 1; // no join record on file — treat as at least a full season
  const mostRecentJoin=joins.reduce((best,j)=>{
    if(!best)return j;
    if(j.year>best.year)return j;
    if(j.year===best.year&&(j.details?.round||0)>(best.details?.round||0))return j;
    return best;
  },null);
  return Math.max(1,currentYear-mostRecentJoin.year+1);
}
function eosComputePhase1Voluntary(){
  const eos=app._eos;
  if(!eos||eos._phase1?.computed)return;
  const items=[];
  const closedTeams=new Set(eos.closures);
  const retiringIds=new Set(eos.retirements.filter(r=>!r.override).map(r=>r.d.id));
  const recruitedAwayIds=new Set(); // Phase 2 not yet computed — hatred check uses teammate currently present
  const activeDrivers=BASE_DRIVERS.filter(d=>d.team!=='Available'&&!d._retired&&!d._careerEndingInjury&&!d._temp&&!retiringIds.has(d.id)&&!closedTeams.has(d.team));
  const alreadyMovingIds=new Set();
  const teamTtm=t=>(teamBaseTb(t)||0)+(getTeamMod(t)||0);
  const driverDtm=d=>driverTotalMod(d.id);

  activeDrivers.forEach(d=>{
    const team=d.team;
    const dtm=driverDtm(d);
    const ttm=teamTtm(team);
    const teammates=activeDrivers.filter(x=>x.team===team&&x.id!==d.id);
    const isPreq=(app.preqDriverIds||[]).some(id=>id===d.id)||(app.preqDriverIds||[]).some(pid=>BASE_DRIVERS.find(b=>b.id===pid)?.team===team);
    const currentSeason=app.currentSeason||1989;
    const dHistory=(app.modHistory?.drivers?.[d.id]||[]).filter(h=>h.yr===currentSeason);
    const seasonStartMod=dHistory.length?dHistory[0].v:(getDriverMod(d.id)||0);
    const developingDriver=(getDriverMod(d.id)||0)-seasonStartMod>=0.50;

    // Hatred relationship → high chance of leaving; rivalry escalates to 100pts permanent
    const hatredTeammate=teammates.find(t2=>{const r=getRivalry(d.id,t2.id);return r&&r.hatred&&!alreadyMovingIds.has(t2.id);});
    if(hatredTeammate&&Math.random()<0.75){
      const rKey=[Math.min(d.id,hatredTeammate.id),Math.max(d.id,hatredTeammate.id)].join(':');
      if(!app.rivalries)app.rivalries={};
      if(!app.rivalries[rKey])app.rivalries[rKey]={pts:0,hatred:false};
      app.rivalries[rKey].pts=100;app.rivalries[rKey].hatred=true;app.rivalries[rKey]._permanent=true;
      items.push({d,from:team,to:null,type:'leave',approved:null,reason:`Negative teammate relationship (${escapeHtml(driverFullName(hatredTeammate)||'teammate')})`});
      alreadyMovingIds.add(d.id);alreadyMovingIds.add(hatredTeammate.id);return;
    }
    // Voluntary baseline (8% base; champions much less likely to leave; successful top
    // drivers early in a team tenure are also less likely to leave — 'doing well and the
    // team wants them' shouldn't churn every season regardless of form).
    const _champBonus=(()=>{const _prevYr=(eos.year||app.currentSeason)-1;if(_prevYr<1989)return 1;try{const _pst=seasonStandings(_prevYr);return _pst.drivers[0]?.id===d.id?0.2:1;}catch(e){return 1;}})();
    const _tenure=driverTenureAtTeam(d.id,team,eos.year||app.currentSeason);
    const _loyaltyBonus=(dtm>=3.0&&_tenure<2&&(ttm-dtm)<1.0)?(developingDriver?0.25:0.35):1;
    // Sub-hatred teammate friction (Tension/Dislike, 0-99pts — hatred is handled above and
    // excluded here so it isn't counted twice). Scales up to +300% (4x) at the top of the
    // scale — end-of-season is a natural, once-a-year decision point, so this is deliberately
    // a much bigger factor here than the equivalent mid-season quit adjustment.
    const _dislikeTeammateEOS=teammates.find(t2=>!alreadyMovingIds.has(t2.id));
    let _dislikeFactorEOS=1;
    if(_dislikeTeammateEOS){
      const _rvEOS=getRivalry(d.id,_dislikeTeammateEOS.id);
      if(_rvEOS&&!_rvEOS.hatred&&_rvEOS.pts>0)_dislikeFactorEOS=1+(_rvEOS.pts/100)*3;
    }
    if(Math.random()<0.08*_champBonus*_loyaltyBonus*_dislikeFactorEOS){
      items.push({d,from:team,to:null,type:'leave',approved:null,reason:'Voluntary departure'});
      alreadyMovingIds.add(d.id);return;
    }
  });
  // Guarantee at least 1 voluntary departure per season (from non-hatred drivers not already moving)
  if(!items.some(m=>m.type==='leave')){
    const eligible=activeDrivers.filter(d=>!alreadyMovingIds.has(d.id));
    if(eligible.length){
      const pick=eligible[Math.floor(Math.random()*eligible.length)];
      items.push({d:pick,from:pick.team,to:null,type:'leave',approved:null,reason:'Voluntary departure'});
    }
  }
  eos._phase1={computed:true,items};
}

function eosComputePhase2Recruitment(){
  const eos=app._eos;
  if(!eos||eos._phase2?.computed)return;
  const items=[];
  const closedTeams=new Set(eos.closures);
  const retiringIds=new Set(eos.retirements.filter(r=>!r.override).map(r=>r.d.id));
  const phase1LeavingIds=new Set(_eosApproved(eos._phase1.items).map(m=>m.d.id));
  const activeDrivers=BASE_DRIVERS.filter(d=>d.team!=='Available'&&!d._retired&&!d._careerEndingInjury&&!d._temp&&!retiringIds.has(d.id)&&!closedTeams.has(d.team)&&!phase1LeavingIds.has(d.id));
  const teamTtm=t=>(teamBaseTb(t)||0)+(getTeamMod(t)||0);
  const driverDtm=d=>driverTotalMod(d.id);
  const activeTeams=[...new Set(activeDrivers.map(d=>d.team))].sort((a,b)=>teamTtm(b)-teamTtm(a));
  const recruitedIds=new Set();
  activeTeams.forEach(targetTeam=>{
    const ttm=teamTtm(targetTeam);
    const isPreq=(app.preqDriverIds||[]).some(pid=>BASE_DRIVERS.find(b=>b.id===pid)?.team===targetTeam);
    if(isPreq)return;
    if(Math.random()>Math.max(0.10,0.55+ttm*0.05))return;
    const candidates=activeDrivers.filter(d=>{
      if(d.team===targetTeam||recruitedIds.has(d.id))return false;
      const srcIsPreq=(app.preqDriverIds||[]).some(pid=>BASE_DRIVERS.find(b=>b.id===pid)?.team===d.team);
      if(srcIsPreq)return false;
      const dtm=driverDtm(d);
      // Still needs to be a credible, worthwhile talent — not actively underperforming.
      // No requirement here that the move be a strict upgrade (that's handled as a strong
      // WEIGHTING preference below, not a hard filter) — previously this instead required
      // the candidate's OWN modifier to exceed the RECRUITING team's modifier by 0.5-3.0,
      // which became nearly impossible once a team was already strong (a +2.75 team needed
      // a driver rated 3.25+, essentially unreachable) while trivially easy for a weak team —
      // systematically pulling talent DOWN the grid instead of up.
      if(dtm<0)return false;
      // Elite drivers (+2.50 and above) are biased away from joining a team with a negative
      // modifier — a >5-point gap (e.g. a +4.88 driver joining a -0.44 team) reads as an
      // implausible mismatch rather than a credible underdog story. Mostly excluded, not
      // absolutely impossible — a rare surprise signing can still happen.
      if(dtm>=2.5&&ttm<0&&Math.random()<0.90)return false;
      if(activeDrivers.filter(x=>x.team===targetTeam).some(td=>isRivalryBlocked(d.id,td.id)))return false;
      // Tenure loyalty: a top driver early in a successful spell at their current team is
      // much harder to poach away — 'doing well and the team wants them' shouldn't churn
      // just because another team could technically offer a marginally higher fit.
      const srcTtm=teamTtm(d.team);
      const srcTenure=driverTenureAtTeam(d.id,d.team,eos.year||app.currentSeason);
      if(dtm>=3.0&&srcTenure<2&&(srcTtm-dtm)<1.0&&Math.random()<0.70)return false;
      return true;
    });
    if(!candidates.length)return;
    // Rank primarily by how much of a step up this represents for the driver (target team
    // stronger than their current one) — this is what makes the phase primarily about teams
    // improving themselves — blended with the driver's own quality, so a strong driver can
    // still occasionally rank highly enough for an underdog/lateral move rather than upgrades
    // being an absolute requirement. Downgrade amount is floored so a severe downgrade isn't
    // impossible, just heavily discouraged.
    const pick=pickWeightedByForm(candidates,c=>{
      const upgradeAmount=ttm-teamTtm(c.team);
      return driverDtm(c)+Math.max(-1.5,upgradeAmount)*3;
    });
    if(pick){
      items.push({d:pick,from:pick.team,to:targetTeam,type:'upgrade',approved:null,
        reason:`Recruited by ${escapeHtml(teamDisplayName(targetTeam))} (team ${ttm.toFixed(2)}, driver ${driverDtm(pick).toFixed(2)})`});
      recruitedIds.add(pick.id);
    }
  });
  eos._phase2={computed:true,items};
}

function eosComputePhase3Releases(){
  const eos=app._eos;
  if(!eos||eos._phase3?.computed||!eos._phase2?.computed)return;
  const items=[];
  const closedTeams=new Set(eos.closures);
  const retiringIds=new Set(eos.retirements.filter(r=>!r.override).map(r=>r.d.id));
  const phase1LeavingIds=new Set(_eosApproved(eos._phase1.items).map(m=>m.d.id));
  const recruitedIds=new Set(_eosApproved(eos._phase2.items).map(m=>m.d.id));
  const recruitedTo=new Map(_eosApproved(eos._phase2.items).map(m=>[m.d.id,m.to]));
  const teamTtm=t=>(teamBaseTb(t)||0)+(getTeamMod(t)||0);
  const driverDtm=d=>driverTotalMod(d.id);
  const activeDrivers=BASE_DRIVERS.filter(d=>d.team!=='Available'&&!d._retired&&!d._careerEndingInjury&&!d._temp&&!retiringIds.has(d.id)&&!closedTeams.has(d.team));
  const alreadyReleasedIds=new Set();

  // Reputation-penalized drivers (see applyReputationPenaltyAfterLastRace) are almost
  // certain to be released here, unless they already left voluntarily in Phase 1 or got
  // poached by another team in Phase 2 — a driver whose season reputation collapsed at a
  // top team essentially never survives at that team into the next season on their own.
  (app._repPenalizedIds||[]).forEach(id=>{
    if(phase1LeavingIds.has(id)||recruitedIds.has(id)||alreadyReleasedIds.has(id))return;
    const d=activeDrivers.find(x=>x.id===id);
    if(!d)return;
    if(Math.random()<0.90){
      items.push({d,from:d.team,to:null,type:'release',approved:null,reason:'Reputation collapsed after underperforming a top team drive'});
      alreadyReleasedIds.add(id);
    }
  });

  // Over-cap releases: only needed when incoming recruits push team over maxS
  const activeTeams=[...new Set(activeDrivers.map(d=>d.team))];
  activeTeams.forEach(team=>{
    const staying=activeDrivers.filter(d=>d.team===team&&!phase1LeavingIds.has(d.id)&&(!recruitedIds.has(d.id)||recruitedTo.get(d.id)===team));
    const incoming=activeDrivers.filter(d=>d.team!==team&&recruitedIds.has(d.id)&&recruitedTo.get(d.id)===team);
    // Only fire for over-cap if there are actual incoming recruits — never fire existing drivers
    // on behalf of a recruit that doesn't exist
    if(!incoming.length)return;
    const roster=[...staying,...incoming];
    const maxS=isOneDriverTeam(team,eos.nextYear)?1:2;
    if(roster.length<=maxS)return;
    const releasable=roster.filter(d=>!recruitedIds.has(d.id)).sort((a,b)=>driverDtm(a)-driverDtm(b));
    for(let i=0;i<Math.min(roster.length-maxS,releasable.length);i++){
      items.push({d:releasable[i],from:team,to:null,type:'release',approved:null,reason:`Released to make room for recruit`});
      alreadyReleasedIds.add(releasable[i].id);
    }
  });

  // Below-teammate / below-team-level releases
  const releasedInPhase1=new Set(_eosApproved(eos._phase1.items).filter(m=>!m.to).map(m=>m.d.id));
  alreadyReleasedIds.forEach(id=>releasedInPhase1.add(id));

  // DNQ/crash firings (team decisions, not driver choices — belong here in releases)
  // Drivers who escaped PQ at mid-season recalc are exempt from DNQ firing
  const _prevPQTeams=new Set((app._pqTeamsBySeason?.[app.currentSeason-1]||app._pqTeamsBySeason?.[app.currentSeason]||[]).map(t=>teamCanonicalName(t)));
  const _escapedPQIds=new Set();
  if(app.preqDriverIds){
    BASE_DRIVERS.forEach(d=>{
      if(!app.preqDriverIds.includes(d.id)&&_prevPQTeams.has(teamCanonicalName(d.team))){
        _escapedPQIds.add(d.id); // was in PQ team last season but auto-qualified this season
      }
    });
  }

  activeDrivers.filter(d=>!phase1LeavingIds.has(d.id)&&!recruitedIds.has(d.id)&&!releasedInPhase1.has(d.id)).forEach(d=>{
    const dtm=driverDtm(d);
    const isPreq=(app.preqDriverIds||[]).some(id=>id===d.id)||(app.preqDriverIds||[]).some(pid=>BASE_DRIVERS.find(b=>b.id===pid)?.team===d.team);
    // A driver's season-cumulative DNQ/DNPQ/crash counts can include rounds spent at a
    // DIFFERENT team earlier this season (if they were released/quit and picked up again
    // elsewhere) — require at least a handful of rounds actually established at their
    // CURRENT team before judging them by a record that may not even be mostly theirs here.
    const _establishedForRelease=roundsSinceTeamJoin(d.id,d.team,seasonRules().totalRounds)>=3;
    // DNQ firing: auto-qual drivers, not PQ-escaped, 40% of total rounds
    const dnqCount=(app._seasonDNQCount||{})[d.id]||0;
    const dnqThreshold=Math.max(2,Math.ceil(0.4*seasonRules().totalRounds));
    if(_establishedForRelease&&!isPreq&&!_escapedPQIds.has(d.id)&&dnqCount>=dnqThreshold&&!releasedInPhase1.has(d.id)){
      const prob=Math.min(0.80,((dnqCount-dnqThreshold+1)/dnqThreshold)*0.50+0.30);
      if(Math.random()<prob){
        items.push({d,from:d.team,to:null,type:'release',approved:null,reason:`Too many DNQs (${dnqCount} of ${seasonRules().totalRounds} rounds this season)`,_firedForDNQ:true});
        releasedInPhase1.add(d.id);return;
      }
    }
    // DNPQ firing: mirrors DNQ firing above, but for drivers actually in the PQ pool who
    // regularly fail to advance from pre-qualifying — closing the gap where a driver could
    // DNPQ race after race with no consequence at all, unlike an auto-qualifier who DNQs.
    const dnpqCount=(app._seasonDNPQCount||{})[d.id]||0;
    const dnpqThreshold=Math.max(2,Math.ceil(0.4*seasonRules().totalRounds));
    if(_establishedForRelease&&isPreq&&dnpqCount>=dnpqThreshold&&!releasedInPhase1.has(d.id)){
      const prob=Math.min(0.80,((dnpqCount-dnpqThreshold+1)/dnpqThreshold)*0.50+0.30);
      if(Math.random()<prob){
        items.push({d,from:d.team,to:null,type:'release',approved:null,reason:`Too many DNPQs (${dnpqCount} of ${seasonRules().totalRounds} rounds this season)`,_firedForDNPQ:true});
        releasedInPhase1.add(d.id);return;
      }
    }
    // Crash firing: requires ≥2 at-fault crashes; sliding scale by modifier
    const crashFaultCount=(app._seasonCrashFaultCount||{})[d.id]||0;
    if(_establishedForRelease&&crashFaultCount>=2&&!releasedInPhase1.has(d.id)){
      let crashFireProb=0;
      if(dtm>=-5&&dtm<-3)crashFireProb=Math.min(0.70,crashFaultCount*0.30);
      else if(dtm>=-3&&dtm<-1)crashFireProb=Math.min(0.45,crashFaultCount*0.20);
      if(crashFireProb>0&&Math.random()<crashFireProb){
        items.push({d,from:d.team,to:null,type:'release',approved:null,reason:`At fault in ${crashFaultCount} crashes this season`,_firedForCrash:true});
        releasedInPhase1.add(d.id);return;
      }
    }
  });
  activeDrivers.filter(d=>!phase1LeavingIds.has(d.id)&&!recruitedIds.has(d.id)&&!releasedInPhase1.has(d.id)).forEach(d=>{
    const team=d.team;const dtm=driverDtm(d);const ttm=teamTtm(team);
    const isPreq=(app.preqDriverIds||[]).some(id=>id===d.id)||(app.preqDriverIds||[]).some(pid=>BASE_DRIVERS.find(b=>b.id===pid)?.team===team);
    const _formEOS=driverFormScore(d.id);
    // Exclude newly recruited drivers from 'below teammate' check — recruitment is done, and
    // drivers who ended the season with the team shouldn't be penalised for an incoming star
    const stayingTeammates=activeDrivers.filter(x=>x.team===team&&x.id!==d.id&&!phase1LeavingIds.has(x.id)&&!releasedInPhase1.has(x.id)&&!recruitedIds.has(x.id));
    const bestMod=stayingTeammates.length?Math.max(...stayingTeammates.map(x=>driverDtm(x))):-99;
    const tml=stayingTeammates.length===0&&activeDrivers.some(x=>x.team===team&&x.id!==d.id&&phase1LeavingIds.has(x.id));
    // Below teammate: exempt if very good form; less likely if good form; MORE likely if
    // poor/very poor form — a driver trending down is a real signal on top of their raw
    // modifier standing, not just an offsetting factor for improving drivers.
    const teammateProbMult=_formEOS>1.5?0:_formEOS>=0.5?0.4:_formEOS<=-1.5?1.6:_formEOS<=-0.5?1.25:1.0;
    // Same 'credible second driver' protection as below-team-level: a positive modifier PLUS
    // positive current form makes a driver a believable second driver even well behind a
    // stronger teammate, not obviously a mismatch.
    const _secondDriverProtectionTM=(dtm>0&&_formEOS>0)?0.5:1;
    if(teammateProbMult>0&&!tml&&stayingTeammates.length&&bestMod-dtm>1.2&&Math.random()<0.55*teammateProbMult*_secondDriverProtectionTM&&!releasedInPhase1.has(d.id)){
      items.push({d,from:team,to:null,type:'release',approved:null,reason:`Below teammate by ${(bestMod-dtm).toFixed(2)}`});
      releasedInPhase1.add(d.id);return;
    }
    const relThresh=isPreq?0.8:1.2;const relProb=isPreq?0.60:0.45;
    const negT=ttm<0?3.0:relThresh;const highT=ttm>=3.0?2.0:relThresh;
    const effThresh=Math.max(relThresh,negT,highT);
    // Exempt drivers with total modifier ≥ +2.50 from below-team-level releases (high-modifier
    // drivers are franchise assets regardless of relative standing) — UNLESS their form has
    // collapsed into 'very poor': a prolonged nosedive puts even a franchise player at risk,
    // regardless of this or any other protection.
    const _veryPoorFormEOS=_formEOS<-1.5;
    if(dtm>=2.50&&!_veryPoorFormEOS)return;
    // Below team level: exempt if very good form; less likely if good form; MORE likely if
    // poor/very poor form (out of form) this season.
    const teamLevelProbMult=_formEOS>1.5?0:_formEOS>=0.5?0.4:_formEOS<=-1.5?1.6:_formEOS<=-0.5?1.25:1.0;
    // A driver with BOTH a positive modifier and positive current form gets extra leeway to
    // stay even when well below the team's level — a modest-but-solid, in-form driver
    // (e.g. +0.24 at a +2.75 team) is a believable 'second driver' next to a stronger
    // teammate, not obviously a mismatch the way a negative-modifier or out-of-form driver
    // in the same seat would be.
    const _secondDriverProtection=(dtm>0&&_formEOS>0)?0.5:1;
    if(teamLevelProbMult>0&&(dtm<3.0||_veryPoorFormEOS)&&ttm-dtm>effThresh&&Math.random()<relProb*teamLevelProbMult*_secondDriverProtection&&!releasedInPhase1.has(d.id)){
      items.push({d,from:team,to:null,type:'release',approved:null,reason:_veryPoorFormEOS?`Prolonged loss of form (${_formEOS.toFixed(2)})`:`Below team level (driver ${dtm.toFixed(2)} vs team ${ttm.toFixed(2)})`});
      releasedInPhase1.add(d.id);
    }
  });
  eos._phase3={computed:true,items};
}

function eosComputeMovements(){

  const eos=app._eos;if(!eos||eos.movements!==null)return;

}

// ── Stage 5: Roster Fill (Signings) ───────────────────────────────
// Tiered realistic-candidate-range filter, shared by the main signing loop and the
// mandatory fallback fill — progressively loosens the range only as needed (never picks
// candidates outside a sane fit for a positive-modifier team unless every looser tier is
// also empty). Returns an empty array if nothing fits any tier; caller decides whether to
// fall back to the full, unrestricted pool as a genuine last resort.
function findRealisticCandidates(pool,ttmBase,ttmTotal,round,driverMod,debugLog,bias){
  const maxReach=Math.max(1.5,2.5+Math.max(0,ttmBase)*0.1+(round-1)*0.8);
  const driverFloor=ttmBase>0?(ttmTotal-2.5):-99;
  const _biasFloorExpand=bias?(NATIONALITY_BIAS_FLOOR_EXPAND[bias.level]||0):0;
  let cands=pool.filter(f=>{
    if(Math.abs(driverMod(f)-ttmTotal)>maxReach)return false;
    if(driverMod(f)>=driverFloor)return true;
    // Nationality bias: widen the shortlist to admit a lower-modifier driver of the
    // team's favoured nationality, within that bias level's extra allowance.
    if(bias&&driverNationalityOf(f)===bias.nation&&driverMod(f)>=driverFloor-_biasFloorExpand)return true;
    return false;
  });
  if(ttmBase>0){
    if(!cands.length)cands=pool.filter(f=>driverMod(f)>0);
    if(!cands.length)cands=pool.filter(f=>Math.abs(driverMod(f))<0.5);
    if(!cands.length)cands=pool.filter(f=>driverMod(f)>=-1.0);
    if(!cands.length){const hardCap=ttmTotal-4.0;cands=pool.filter(f=>driverMod(f)>=hardCap);}
  } else if(!cands.length&&debugLog){
    debugLog(`0 cands in range ±${maxReach.toFixed(1)} (ttm=${ttmTotal.toFixed(1)})`);
  }
  return cands;
}
function eosComputeSignings(){
  const eos=app._eos;if(!eos||eos.signings!==null)return;
  if(!eos.movementsConfirmed)return;
  // Tracks which teams had each driver as a genuine candidate at any point during
  // signing (not just whoever won the weighted pick) — feeds the holdout mechanic below,
  // where a driver considered by multiple teams but signed by only one gets logged as
  // having chosen their actual team over the other(s) that also wanted them.
  const driverConsideredByTeams={};

  const retiringIds=new Set(eos.retirements.filter(r=>!r.override).map(r=>r.d.id));
  const closedTeams=new Set(eos.closures);
  const movedDrivers=new Map();
  (eos.movements||[]).filter(m=>m.approved!==false).forEach(m=>movedDrivers.set(m.d.id,{type:m.type,to:m.to}));

  // Active teams (existing + new entries, not closed)
  const existingActiveTeams=[...new Set(BASE_DRIVERS.filter(d=>d.team!=='Available'&&!d._retired&&!d._careerEndingInjury&&!d._temp).map(d=>d.team))].filter(t=>!closedTeams.has(t));
  const newTeamNames=(eos.confirmedNewTeams||[]).filter(t=>!closedTeams.has(t)&&!existingActiveTeams.includes(t));
  const activeTeams=[...existingActiveTeams,...newTeamNames];

  // Calculate seats per team after retirements + movements
  const teamSeats={};
  activeTeams.forEach(t=>{
    if(newTeamNames.includes(t)){
      const td=TEAMS_DATABASE.find(x=>x.name===t);
      // All new entry teams start in PQ (1989-era: up to 2 single-driver PQ teams allowed)
      // In 1991-era, new teams have 2 drivers in PQ
      const maxS=2; // always field 2 drivers
      teamSeats[t]={count:0,max:maxS,isNew:true,isPQ:true,genMod:td?.genMod||0};return;
    }
    const staying=BASE_DRIVERS.filter(d=>d.team===t&&!d._retired&&!d._careerEndingInjury&&!d._temp&&!retiringIds.has(d.id)).filter(d=>{
      const mv=movedDrivers.get(d.id);return !mv||mv.to===t;
    });
    const arriving=BASE_DRIVERS.filter(d=>d.team!==t&&!d._retired&&!d._careerEndingInjury&&!d._temp&&!retiringIds.has(d.id)&&movedDrivers.get(d.id)?.to===t);
    const maxS=isOneDriverTeam(t, eos.nextYear)?1:2;
    teamSeats[t]={count:Math.min(staying.length+arriving.length,maxS),max:maxS,isNew:false,genMod:teamBaseTb(t)||0};
  });

  // ── Build available pool ─────────────────────────────────────────
  // Add closed team drivers to pool — they should be immediately available
  // INCLUDE: FA pool, season free agents, released drivers (approved movements with no to)
  // EXCLUDE: retired drivers, upgrade-moving drivers, drivers already contracted elsewhere
  const upgradeIds=new Set([...(eos.movements||[])].filter(m=>m.approved!==false&&m.to).map(m=>m.d.id));
  const releasedIds=new Set([...(eos.movements||[])].filter(m=>m.approved!==false&&!m.to).map(m=>m.d.id));
  // Drivers from closed teams — immediately available for signing
  const closedTeamDrivers=BASE_DRIVERS.filter(d=>closedTeams.has(d.team)&&!d._retired&&!d._temp&&!retiringIds.has(d.id));
  // FA pool (existing available drivers from during the season)
  const faBase=(app._seasonFAPool||[]).filter(f=>!retiringIds.has(f.id));
  // Season free agents from DRIVER_DATABASE (firstYear<=season)
  const filteredFAs=getSeasonFreeAgents(eos.year).filter(f=>!retiringIds.has(f.id));
  // Drivers released by EoS movements (NOT retired — those go to _retiredDrivers)
  const releasedFromMovements=BASE_DRIVERS.filter(d=>releasedIds.has(d.id)&&!retiringIds.has(d.id));
  // Existing BASE_DRIVERS with team=Available (in-season released, not retired)
  const existingAvail=BASE_DRIVERS.filter(d=>d.team==='Available'&&!d._retired&&!retiringIds.has(d.id));

  // Exclude: upgrade movers (already in teamSeats.arriving) and contracted drivers
  const contractedIds=new Set([
    ...BASE_DRIVERS.filter(d=>d.team!=='Available'&&!d._retired&&!d._temp).map(d=>d.id),
    ...BASE_DRIVERS.filter(d=>d.team!=='Available'&&!d._retired&&!d._temp).map(d=>d.pid).filter(Boolean),
  ]);
  // Remove contracted drivers who are STAYING (not released/leaving) from pool
  // upgradeIds: already counted as arriving elsewhere
  // contractedIds minus releasedIds minus upgradeIds: the truly contracted-and-staying set
  const stayingContractedIds=new Set([...contractedIds].filter(id=>!releasedIds.has(id)&&!upgradeIds.has(id)));

  const allPool=[...faBase,...filteredFAs,...releasedFromMovements,...existingAvail,...closedTeamDrivers]
    .filter(f=>{
      const fid=f.id||f.pid;
      if(!fid)return false;
      if(upgradeIds.has(fid)||upgradeIds.has(f.pid||f.id))return false;
      if(stayingContractedIds.has(fid)||stayingContractedIds.has(f.pid||f.id))return false;
      return true;
    });

  // Deduplicate ONLY by permanent ID — name-based dedup causes false exclusions
  // Sort pool by surname for consistent display
  allPool.sort((a,b)=>(a.lastName||a.ln||a.name||'').localeCompare(b.lastName||b.ln||b.name||''));
  const seen=new Set();
  const uniquePool=allPool.filter(f=>{
    const fid=f.id||f.pid;
    if(!fid||seen.has(fid))return false;
    seen.add(fid);
    // Also mark the alternate ID form to prevent duplicates
    if(f.pid&&f.pid!==fid)seen.add(f.pid);
    if(f.id&&f.id!==fid)seen.add(f.id);
    return true;
  });
  // (pool size logged below after signingDebugLog declared)

  // Build a lookup: driverId → team(s) they left/were released from this season
  // Drivers cannot re-sign with a team they just departed
  const leftTeamMap=new Map(); // driverId → Set of team names they left
  (eos.movements||[]).filter(m=>m.approved!==false).forEach(m=>{
    // Driver left m.from (either released with no destination, or upgraded away)
    if(!leftTeamMap.has(m.d.id))leftTeamMap.set(m.d.id,new Set());
    leftTeamMap.get(m.d.id).add(m.from);
  });
  // Also include mid-season voluntary departures (quits) from earlier in the SAME season —
  // these predate the EoS wizard's own movements stage, so eos.movements alone doesn't
  // know about them, and a driver who quit mid-season could otherwise be re-signed
  // straight back to the exact team they just left.
  (app._driverMovementLog||[]).filter(m=>m.action==='quit'&&m.year===eos.year&&m.fromTeam).forEach(m=>{
    if(!leftTeamMap.has(m.driverId))leftTeamMap.set(m.driverId,new Set());
    leftTeamMap.get(m.driverId).add(m.fromTeam);
  });

  // Driver-team relationship: hidden reluctance to sign with a team the relationship is
  // currently poor with — rolled ONCE per driver-team pair here (not inline inside
  // pickForTeam, which runs multiple times per team across signing rounds) so a candidate
  // doesn't randomly flicker in and out of eligibility for the same team between rounds.
  const relationBlockedPairs=new Set();
  uniquePool.forEach(f=>{
    const fid=f.id||f.pid;
    activeTeams.forEach(team=>{
      if(Math.random()<_relationRejoinBlockChance(fid,team))relationBlockedPairs.add(`${fid}::${teamCanonicalName(team)}`);
    });
  });

  // Debug log for vacancy analysis
  const signingDebugLog=[];
  signingDebugLog.push(`Pool after dedup: ${uniquePool.length} drivers available for signing`);

  // ── Signing loop — round-robin so every team gets a pick before second picks ─
  // Round 1: each team picks their FIRST vacancy (best teams get first pick within round)
  // Round 2: teams with a second vacancy pick again from what remains
  // This prevents best teams exhausting the pool before bottom teams get any pick.
  const sorted=[...activeTeams].sort((a,b)=>(teamBaseTb(b)||0)-(teamBaseTb(a)||0));
  const usedIds=new Set();const results=[];

  function pickForTeam(team,round){
    const ts=teamSeats[team];if(!ts)return;
    const alreadyPicked=results.filter(r=>r.team===team).length;
    const totalNeeded=Math.max(0,(ts.max||2)-(ts.count||0));
    if(alreadyPicked>=totalNeeded)return; // all vacancies filled
    if(alreadyPicked<round-1)return; // haven't filled earlier rounds yet (shouldn't happen)

    const ttmBase=teamBaseTb(team)||0;
    const ttmTotal=ttmBase+(getTeamMod(team)||0);
    const isNew=ts.isNew||false;
    // isPQ for signing: use next season's computed PQ list, not current preqDriverIds
    const _nextPQ=eos._nextPQTeams||[];
    const isPQ=_nextPQ.some(t=>teamCanonicalName(t)===teamCanonicalName(team))||
               (isNew&&TEAMS_DATABASE.find(x=>x.name===teamCanonicalName(team))?.firstYear===eos.nextYear);
    const driverMod=f=>(f.driverBonus||f.db||0)+(getDriverMod(f.id)||0);
    const bias=getTeamNationalityBias(team,eos.nextYear);

    // Pool: exclude used drivers and drivers who just left this team
    const pool=uniquePool.filter(f=>!usedIds.has(f.id)&&!leftTeamMap.get(f.id)?.has(team)&&!relationBlockedPairs.has(`${f.id}::${teamCanonicalName(team)}`));
    if(!pool.length){
      signingDebugLog.push(`⚠ ${teamDisplayName(team)} R${round}: pool exhausted (ttm=${ttmTotal.toFixed(1)}, vacancies=${totalNeeded-alreadyPicked})`);
      return;
    }

    // ── Signing tier thresholds ─────────────────────────────────────
    // "Top team": ttmTotal >= TOP_TEAM_THRESHOLD. Their R1 pick is gated to experienced drivers.
    const TOP_TEAM_THRESHOLD = 3.0;
    // Minimum race entries to count as "experienced" for the top-team gate
    const TOP_TEAM_EXP_GATE = 8;
    // Season momentum: modifier gain during the current season used as a weight multiplier
    const seasonModGain = f => {
      const fid = f.id || f.pid;
      if (!fid) return 0;
      const startMod = app._seasonStartDriverMod?.[fid];
      if (startMod === undefined) return 0;
      const currentMod = driverMod(f);
      return Math.max(0, currentMod - startMod);
    };

    let pick;
    if(isNew){
      const gm=ts.genMod||0;
      const weights=pool.map(f=>{
        let w=Math.max(0.05,1/(Math.abs(driverMod(f)-gm)+0.5));
        if(bias&&driverNationalityOf(f)===bias.nation)w*=NATIONALITY_BIAS_WEIGHT[bias.level];
        return w;
      });
      const tot=weights.reduce((a,b)=>a+b,0);let r=Math.random()*tot,idx=0;
      for(let j=0;j<weights.length;j++){r-=weights[j];if(r<=0){idx=j;break;}}
      pick=pool[Math.min(idx,pool.length-1)];
    } else if(isPQ){
      // PQ teams: prefer low-modifier 'pay' drivers (negative/zero mod)
      const payWeight=f=>{
        const dm=driverMod(f);
        let w=dm<=0?Math.max(0.5,2.0-dm*0.3):Math.max(0.05,1.0/(dm+1));
        if(bias&&driverNationalityOf(f)===bias.nation)w*=NATIONALITY_BIAS_WEIGHT[bias.level];
        return w;
      };
      const pwts=pool.map(f=>payWeight(f));
      const ptot=pwts.reduce((a,b)=>a+b,0);let pr=Math.random()*ptot,pidx=0;
      for(let j=0;j<pwts.length;j++){pr-=pwts[j];if(pr<=0){pidx=j;break;}}
      pick=pool[Math.min(pidx,pool.length-1)];
    } else {
      // ── Top-team R1 experience gate ──────────────────────────────
      // R1 pick for top teams (ttmTotal >= TOP_TEAM_THRESHOLD) is restricted to
      // drivers with at least TOP_TEAM_EXP_GATE race entries this game.
      // If no experienced drivers remain, gate opens. R2 is always unrestricted.
      const isTopTeam = ttmTotal >= TOP_TEAM_THRESHOLD;
      const gatedPool = (isTopTeam && round === 1)
        ? pool.filter(f => {
            const entries = app.history.weekends.filter(w => (w.race||[]).some(r => r.id === (f.id||f.pid))).length;
            return entries >= TOP_TEAM_EXP_GATE;
          })
        : null;
      // Use the gated pool for candidate filtering if it has entries, else fall through to full pool
      const effectivePool = (gatedPool && gatedPool.length > 0) ? gatedPool : pool;
      if (gatedPool && gatedPool.length === 0) {
        signingDebugLog.push(`  ${teamDisplayName(team)} R${round}: experience gate empty — opening to full pool`);
      }

      // Non-PQ tiered picking with effective pool
      const cands0=findRealisticCandidates(effectivePool,ttmBase,ttmTotal,round,driverMod,(msg)=>signingDebugLog.push(`  ${teamDisplayName(team)} R${round}: ${msg}`),bias);
      let cands=cands0;
      if(!cands.length)cands=effectivePool;
      if(!cands.length)cands=pool; // absolute fallback to unrestricted pool
      // Record every driver this team seriously considered — used later to detect
      // 'holdout' situations where a driver was a realistic candidate for more than one
      // team but only signed with one of them.
      cands.forEach(f=>{
        const fid=f.id||f.pid;
        if(!driverConsideredByTeams[fid])driverConsideredByTeams[fid]=new Set();
        driverConsideredByTeams[fid].add(team);
      });

      // Apply rivalry penalty + experience weighting + season momentum bonus
      const existingTeamDriverIds=BASE_DRIVERS.filter(d=>d.team===team&&!d._retired&&!d._temp).map(d=>d.id);
      const weights=cands.map(f=>{
        const _fEntries=app.history.weekends.filter(w=>(w.race||[]).some(r=>r.id===(f.id||f.pid))).length;
        // ── Experience weighting ─────────────────────────────────────
        // Steeper curve for top teams: they prefer battle-hardened drivers much more strongly.
        // ttmTotal >= TOP_TEAM_THRESHOLD → cap 2.5 (experienced driver up to 2.5x weight of rookie)
        // ttmTotal >= 1 → cap 2.0
        // ttmTotal >= 0 → cap 1.6
        // below 0 → cap 1.3 (slight experience preference everywhere)
        const _expCap = ttmTotal >= TOP_TEAM_THRESHOLD ? 2.5 : ttmTotal >= 1 ? 2.0 : ttmTotal >= 0 ? 1.6 : 1.3;
        const _expFactor = Math.min(_expCap, 1 + (_fEntries / 40));
        // ── Season momentum bonus ────────────────────────────────────
        // A driver who improved significantly this season looks attractive to hiring teams.
        // gain >= 1.0: +60% weight multiplier. Scales linearly from 0 gain (no bonus) to 1.0 (max bonus).
        const gain = seasonModGain(f);
        const _momentumFactor = 1 + Math.min(0.60, gain * 0.60);
        let baseW = Math.max(0.05, (1 / (Math.abs(driverMod(f) - ttmTotal) + 0.5)) * _expFactor * _momentumFactor);
        // Relationship: a mild thumb toward re-signing someone this team got on well with in
        // the past, away from someone with a soured history — no effect at all for a driver
        // with no prior relationship with this team (relationEffect's dead zone covers that).
        baseW*=(1+relationEffect(driverTeamRelationScore(f.id||f.pid,team),0.3));
        // Nationality bias: tip the scales toward a similarly-fitting driver from the
        // team's favoured country — a soft nudge among comparable options, not a rule.
        if(bias&&driverNationalityOf(f)===bias.nation)baseW*=NATIONALITY_BIAS_WEIGHT[bias.level];
        // Rivalry penalty
        const maxPenalty=existingTeamDriverIds.reduce((max,eid)=>Math.max(max,rivalryJoinPenalty(f.id||f.pid,eid)),0);
        if(maxPenalty>=100)return 0.001;
        if(maxPenalty>0)return baseW*(1-maxPenalty/200);
        return baseW;
      });
      const tot=weights.reduce((a,b)=>a+b,0);let r=Math.random()*tot,idx=0;
      for(let j=0;j<weights.length;j++){r-=weights[j];if(r<=0){idx=j;break;}}
      pick=cands[Math.min(idx,cands.length-1)];
    }

    if(pick){
      const gm_for_reason=isNew?(ts.genMod||0):ttmBase;
      const reason=isNew?`New team hire (genMod ${gm_for_reason>=0?'+':''}${gm_for_reason.toFixed(1)})`
        :isPQ?'PQ — pool selection'
        :`Modifier match R${round} (team ${ttmTotal.toFixed(2)})`;
      results.push({driver:pick,team,reason});
      usedIds.add(pick.id);
      if(pick.pid&&pick.pid!==pick.id)usedIds.add(pick.pid);
      const pname=(pick.firstName||pick.fn||'')+' '+(pick.lastName||pick.ln||pick.name||'');
      signingDebugLog.push(`  ✓ ${teamDisplayName(team)} R${round}: signed ${pname.trim()} (driver ${driverMod(pick).toFixed(2)}, team ${ttmTotal.toFixed(2)})`);
    } else {
      signingDebugLog.push(`  ✗ ${teamDisplayName(team)} R${round}: no pick made (pool=${pool.length}, cands available)`);
    }
  }

  // ── EOS poaching pre-pass ────────────────────────────────────────────
  // Everything above (the free-agent pool, uniquePool) deliberately excludes any driver who's
  // staying under contract elsewhere — stayingContractedIds is filtered OUT of the signing
  // pool entirely. That means, left alone, EOS recruits can only ever be drivers who were
  // released/quit/closed-team — and strong teams rarely release good drivers, so the pool a
  // top team draws from is structurally skewed toward lower-modifier origin teams. This gives
  // strong teams a real (but uncommon) chance to instead sign a promising or in-form driver
  // away from a weaker team's roster, mirroring the in-season attemptSigningFromRival
  // mechanic. The donor team's seat count is reduced, creating a genuine new vacancy that the
  // normal round-robin pool loop below fills as usual.
  function attemptEosPoach(team,ttmTotal,excludeIds){
    if(Math.random()>0.55)return null; // uncommon-but-real, not the default path
    const prospects=BASE_DRIVERS.filter(d=>{
      if(d.team===team||d.team==='Available'||d._retired||d._temp)return false;
      if(retiringIds.has(d.id))return false; // retiring this cycle — not actually applied to
      // BASE_DRIVERS yet at this point in the sequence, so d._retired above can't catch this
      // on its own. Without this check a driver who'd just decided to retire could be poached
      // and un-retired for one more season instead.
      if(excludeIds.includes(d.id))return false;
      if(!stayingContractedIds.has(d.id))return false; // only a driver actually staying put has anything to poach
      const donorTtm=teamTotalMod(d.team);
      if(donorTtm>=ttmTotal-0.3)return false; // not enough of an upgrade to tempt them
      const dmod=driverTotalMod(d.id);
      const form=driverFormScore(d.id);
      // 'Promising and/or in form': outperforming their own team's level, OR trending well
      // this season — either is enough to catch a bigger team's eye.
      return dmod>donorTtm||form>=0.5;
    });
    if(!prospects.length)return null;
    const target=pickWeightedByForm(prospects);
    return{driver:target,fromTeam:target.team};
  }
  // 'Strong team' is defined RELATIVE to this season's field (top third, at least 4 teams)
  // rather than an absolute modifier threshold — an absolute cutoff meant this could quietly
  // stop firing at all in a career where the overall modifier spread has drifted over many
  // seasons. This also directly targets the actual bottleneck: the round-robin below only
  // ever draws from released/free-agent drivers, so a genuinely strong team that both its
  // drivers stayed with keeps drawing a blank here every single season it doesn't happen to
  // have a vacancy — widening eligibility and raising the odds/cap is what actually makes
  // this visible in practice rather than a rare once-a-career event.
  const _eosPoachEligibleTeams=new Set(sorted.slice(0,Math.max(4,Math.ceil(sorted.length*0.35))));
  const eosPoachCap=4+Math.floor(Math.random()*3); // 4-6 poaches this EOS cycle, league-wide
  let eosPoachCount=0;
  const poachedAwayIds=new Set();
  sorted.forEach(team=>{
    if(eosPoachCount>=eosPoachCap)return;
    if(!_eosPoachEligibleTeams.has(team))return;
    const ts=teamSeats[team];if(!ts)return;
    if((ts.max||2)-(ts.count||0)<=0)return; // no vacancy to use the poach on
    const ttmTotal=(teamBaseTb(team)||0)+(getTeamMod(team)||0);
    const poach=attemptEosPoach(team,ttmTotal,[...usedIds,...poachedAwayIds]);
    if(!poach)return;
    const{driver,fromTeam}=poach;
    const donorSeats=teamSeats[fromTeam];
    if(donorSeats)donorSeats.count=Math.max(0,(donorSeats.count||0)-1);
    results.push({driver,team,reason:`EOS poach from ${teamDisplayName(fromTeam)} — promising/in-form driver`});
    usedIds.add(driver.id);
    poachedAwayIds.add(driver.id);
    eosPoachCount++;
    // Same motivation-boost / rivalry-seed / relationship treatment as the in-season poach.
    const driverBoost=Math.round((0.10+Math.random()*0.10)*100)/100;
    applyDriverMod(driver.id,driverBoost);
    recordMod('driver',driver.id,driverFullName(driver)||driver.name,driverBoost,'Signed by a stronger team at end of season','signing');
    addTeamRivalryPoints(team,fromTeam,Math.floor(Math.random()*26)+15,'Driver poached at end of season',null);
    applyDriverTeamRelation(driver.id,fromTeam,-Math.random()*10,'Poached away at end of season');
    applyDriverTeamRelation(driver.id,team,6,'Poached by this team at end of season');
    signingDebugLog.push(`⇄ EOS poach: ${teamDisplayName(team)} signs ${driverFullName(driver)||driver.name} from ${teamDisplayName(fromTeam)}`);
  });

  // Round 1: every team picks first driver
  sorted.forEach(t=>pickForTeam(t,1));
  if(uniquePool.filter(f=>!usedIds.has(f.id)).length>0){
    // Round 2: teams that need a second driver pick again
    sorted.forEach(t=>pickForTeam(t,2));
  }

  signingDebugLog.push(`Main loop: ${results.length} picks made, ${uniquePool.filter(f=>!usedIds.has(f.id)).length} pool remaining`);

  // Hard cap: never exceed maxSeats per team
  const signedCount={};
  let filteredResults=results.filter(s=>{
    const max=teamSeats[s.team]?.max||2;
    const existing=teamSeats[s.team]?.count||0;
    signedCount[s.team]=(signedCount[s.team]||0)+1;
    return existing+signedCount[s.team]<=max;
  });

  // ── Contract holdout drama ─────────────────────────────────────────
  // For each genuine (non-fallback) signing, check whether a weaker team also had a live
  // vacancy this round and would plausibly have wanted the same driver. If so, it's a
  // contested signing: a small, age-weighted chance the driver picks the underdog instead
  // (older drivers more open to it, young stars overwhelmingly still pick the best team),
  // bounded so it can only happen between teams of broadly similar standing — not letting
  // a genuine star fall all the way to a backmarker or PQ team. Either way, genuine contests
  // seed a team rivalry (both teams wanted the same driver).
  {
    const driverMod2=f=>(f.driverBonus||f.db||0)+(getDriverMod(f.id)||0);
    const teamsWithVacancyThisPass=new Set(filteredResults.map(s=>s.team));
    filteredResults.forEach(sign=>{
      const pick=sign.driver;
      const topTeam=sign.team;
      const topTtm=(teamBaseTb(topTeam)||0)+(getTeamMod(topTeam)||0);
      const topAffinity=1/(Math.abs(driverMod2(pick)-topTtm)+0.5);
      let bestUnderdog=null,bestUnderdogAffinity=0;
      teamsWithVacancyThisPass.forEach(t=>{
        if(t===topTeam)return;
        const tBase=teamBaseTb(t)||0;
        if((teamBaseTb(topTeam)||0)-tBase>3.5)return; // too far below — not a plausible contest
        const tPQ=(eos._nextPQTeams||[]).some(x=>teamCanonicalName(x)===teamCanonicalName(t));
        if(tPQ&&driverMod2(pick)>0)return; // don't let an above-par driver end up PQ via this path
        const tTtm=tBase+(getTeamMod(t)||0);
        const aff=1/(Math.abs(driverMod2(pick)-tTtm)+0.5);
        if(aff>bestUnderdogAffinity){bestUnderdogAffinity=aff;bestUnderdog=t;}
      });
      if(!bestUnderdog)return;
      if(bestUnderdogAffinity<topAffinity*0.12)return; // not a real contest
      // A genuine trade — the underdog must have a concrete signing of their own this
      // round to swap with. This needs no seat-capacity check at all: X takes the
      // underdog's seat, and the underdog's own pick (Y) takes X's vacated seat at the
      // top team, so team sizes stay exactly balanced on both sides.
      const underdogSign=filteredResults.find(s=>s.team===bestUnderdog);
      if(!underdogSign||underdogSign===sign)return;
      // Age-weighted swap chance: young drivers overwhelmingly pick the best team; older
      // drivers are more open to a smaller team.
      const age=driverAge(pick,eos.nextYear)||26;
      const swapChance=age<=24?0.02:age<=28?0.05:age<=32?0.10:age<=36?0.16:0.20;
      // Always seed a rivalry — both teams wanted the same driver, regardless of outcome —
      // but only if the driver has a genuinely positive modifier. Two teams settling for
      // an underwhelming free agent isn't the same story as a real bidding war.
      // Stored on eos rather than pushed to a live newsItems array — this function runs
      // during signing computation/preview, before the EoS transition is confirmed and
      // news actually gets built later in eosApplyAndBeginNewSeason.
      if(driverMod2(pick)>0&&!eos._biddingWarUsedThisSeason){
        addTeamRivalryPoints(topTeam,bestUnderdog,Math.floor(Math.random()*16)+10,'Bidding war for the same driver',null);
        if(!eos._biddingWars)eos._biddingWars=[];
        eos._biddingWars.push({teamA:topTeam,teamB:bestUnderdog,driverName:((pick.firstName||pick.fn||'')+' '+(pick.lastName||pick.ln||pick.name||'')).trim()});
        eos._biddingWarUsedThisSeason=true;
      }
      const pname=((pick.firstName||pick.fn||'')+' '+(pick.lastName||pick.ln||pick.name||'')).trim();
      if(Math.random()<swapChance){
        const otherPick=underdogSign.driver;
        const opname=((otherPick.firstName||otherPick.fn||'')+' '+(otherPick.lastName||otherPick.ln||otherPick.name||'')).trim();
        sign.team=bestUnderdog;
        sign.reason=`Holdout — chose ${teamDisplayName(bestUnderdog)} over ${teamDisplayName(topTeam)}`;
        sign._holdoutSwap={from:topTeam,to:bestUnderdog};
        underdogSign.team=topTeam;
        underdogSign.reason=`Signed after ${pname} chose ${teamDisplayName(bestUnderdog)} instead`;
        underdogSign._holdoutSwap={from:bestUnderdog,to:topTeam};
        signingDebugLog.push(`  ⇄ Holdout: ${pname} surprises paddock, signs for ${teamDisplayName(bestUnderdog)} over ${teamDisplayName(topTeam)} — ${opname} takes the vacated seat at ${teamDisplayName(topTeam)}`);
      } else {
        signingDebugLog.push(`  ~ Contested: ${pname} weighed ${teamDisplayName(bestUnderdog)} but stays with ${teamDisplayName(topTeam)}`);
      }
    });
  }

  // ── Mandatory fallback: fill all remaining vacancies no matter what ──
  // If any team still has vacancies after the weighted loop, assign from remaining pool
  // without ANY modifier filtering. This guarantees full rosters.
  const signedIds=new Set(filteredResults.map(s=>s.driver.id));
  let remainingPool=uniquePool.filter(f=>!signedIds.has(f.id));

  // Process teams with at least one leftTeamMap-restricted vacancy LAST — this gives
  // other teams first chance to draw from the shared remaining pool, so a driver who
  // can't rejoin their old team is more likely to get picked up elsewhere (ideally a
  // smaller team than force back into the exact seat they just left) before that old
  // team's fallback fill runs and would otherwise have no other candidate to reach for.
  const _teamsSortedForFallback=[...activeTeams].sort((a,b)=>{
    const aRestricted=remainingPool.some(f=>leftTeamMap.get(f.id)?.has(a));
    const bRestricted=remainingPool.some(f=>leftTeamMap.get(f.id)?.has(b));
    return(aRestricted?1:0)-(bRestricted?1:0);
  });
  _teamsSortedForFallback.forEach(team=>{
    const ts=teamSeats[team];if(!ts)return;
    const existing=ts.count||0;
    const alreadySigned=(signedCount[team]||0);
    const stillNeeded=Math.max(0,(ts.max||2)-existing-alreadySigned);
    if(!stillNeeded)return;

    for(let i=0;i<stillNeeded;i++){
      // Filter: cannot re-sign from same team, and not already used
      const eligible=remainingPool.filter(f=>!leftTeamMap.get(f.id)?.has(team)&&!relationBlockedPairs.has(`${f.id}::${teamCanonicalName(team)}`));
      const _fallbackSource=eligible.length?eligible:remainingPool; // only ignore the team restriction if nothing else exists at all
      if(!_fallbackSource.length)break;
      const _ttmBaseForFallback=teamBaseTb(team)||0;
      const _ttmForFallback=_ttmBaseForFallback+(getTeamMod(team)||0);
      const _driverModForFallback=f=>(f.driverBonus||f.db||0)+(getDriverMod(f.id)||0);
      // Same tiered realistic-range logic as the main signing loop — doesn't have to be the
      // exact closest match, just within a sane fit for the team, only going fully
      // unrestricted if the pool genuinely has nothing that fits any tier.
      const _realisticCands=findRealisticCandidates(_fallbackSource,_ttmBaseForFallback,_ttmForFallback,2,_driverModForFallback);
      const _pickPool=_realisticCands.length?_realisticCands:_fallbackSource;
      const pick=_pickPool[Math.floor(Math.random()*_pickPool.length)];
      if(!pick)break;
      const reason=`Fallback fill (${team} had ${stillNeeded} vacancy)`;
      filteredResults.push({driver:pick,team,reason});
      signedIds.add(pick.id);
      signedCount[team]=(signedCount[team]||0)+1;
      remainingPool=remainingPool.filter(f=>f.id!==pick.id);
      signingDebugLog.push(`Fallback fill: ${(pick.firstName||pick.fn||'')} ${(pick.lastName||pick.ln||pick.name||'')} → ${teamDisplayName(team)}`);
    }
  });

  // Star driver guarantee: a high-modifier free agent (>=3.0) should never end up
  // completely unsigned just because every team's realistic-range check happened to fall
  // short of them. Tries progressively lower tiers of team strength before accepting a
  // truly weak team — top teams first (>=3.0), then any positive-modifier team, then
  // anything above -1.00, and only as a last resort any remaining team at all. Within
  // each tier, a genuine vacancy is preferred over displacing an existing signing.
  const STAR_DRIVER_THRESHOLD=3.0;
  const _teamTtmForStar=t=>(teamBaseTb(t)||0)+(getTeamMod(t)||0);
  const _starTierThresholds=[3.0,0.0,-1.0,-Infinity];
  const _starDrivers=remainingPool.filter(f=>{
    const fMod=(f.driverBonus||f.db||0)+(getDriverMod(f.id)||0);
    return fMod>=STAR_DRIVER_THRESHOLD;
  }).sort((a,b)=>{
    const aMod=(a.driverBonus||a.db||0)+(getDriverMod(a.id)||0);
    const bMod=(b.driverBonus||b.db||0)+(getDriverMod(b.id)||0);
    return bMod-aMod; // strongest first, so they get first pick of any vacancy/swap
  });
  function _tryPlaceStarInTier(star,minTtm,excludedTeam){
    // Vacancy first, at the weakest vacant team within this tier — 'able to sign for a
    // lower team' should mean the weakest team that still meets the tier bar, not the
    // weakest team overall.
    const _vacantTeamsInTier=activeTeams.filter(t=>{
      if(excludedTeam&&teamCanonicalName(t)===teamCanonicalName(excludedTeam))return false;
      const ts=teamSeats[t];if(!ts)return false;
      const filled=(ts.count||0)+(signedCount[t]||0);
      return filled<(ts.max||2)&&_teamTtmForStar(t)>=minTtm;
    }).sort((a,b)=>_teamTtmForStar(a)-_teamTtmForStar(b));
    if(_vacantTeamsInTier.length){
      const team=_vacantTeamsInTier[0];
      filteredResults.push({driver:star,team,reason:'Star driver guarantee — no team otherwise signed them'});
      signedIds.add(star.id);
      signedCount[team]=(signedCount[team]||0)+1;
      remainingPool=remainingPool.filter(f=>f.id!==star.id);
      signingDebugLog.push(`Star driver guarantee: ${(star.firstName||star.fn||'')} ${(star.lastName||star.ln||star.name||'')} → ${teamDisplayName(team)} (vacancy, tier>=${minTtm})`);
      return true;
    }
    // No vacancy within this tier — try displacing the weakest existing signing at the
    // weakest team within this same tier. Does not drop to a lower tier just because a
    // higher-tier team happens to be full; that's what the next call (with a lower
    // minTtm) is for.
    const _teamsInTierRankedWeakest=activeTeams.filter(t=>{
      if(excludedTeam&&teamCanonicalName(t)===teamCanonicalName(excludedTeam))return false;
      return _teamTtmForStar(t)>=minTtm;
    }).sort((a,b)=>_teamTtmForStar(a)-_teamTtmForStar(b));
    for(const team of _teamsInTierRankedWeakest){
      const _teamSignings=filteredResults.filter(r=>r.team===team);
      if(!_teamSignings.length)continue;
      const _weakestSigning=_teamSignings.reduce((worst,r)=>{
        const rMod=(r.driver.driverBonus||r.driver.db||0)+(getDriverMod(r.driver.id)||0);
        const worstMod=(worst.driver.driverBonus||worst.driver.db||0)+(getDriverMod(worst.driver.id)||0);
        return rMod<worstMod?r:worst;
      });
      const _displacedMod=(_weakestSigning.driver.driverBonus||_weakestSigning.driver.db||0)+(getDriverMod(_weakestSigning.driver.id)||0);
      const _starMod=(star.driverBonus||star.db||0)+(getDriverMod(star.id)||0);
      if(_displacedMod>=_starMod)continue; // this team's weakest signing is still better than the star — try the next team in this tier
      const idx=filteredResults.indexOf(_weakestSigning);
      filteredResults.splice(idx,1,{driver:star,team,reason:'Star driver guarantee — displaced a weaker signing'});
      signedIds.delete(_weakestSigning.driver.id);
      signedIds.add(star.id);
      remainingPool=remainingPool.filter(f=>f.id!==star.id);
      remainingPool.push(_weakestSigning.driver);
      signingDebugLog.push(`Star driver guarantee: ${(star.firstName||star.fn||'')} ${(star.lastName||star.ln||star.name||'')} → ${teamDisplayName(team)} (displaced ${(_weakestSigning.driver.firstName||_weakestSigning.driver.fn||'')} ${(_weakestSigning.driver.lastName||_weakestSigning.driver.ln||_weakestSigning.driver.name||'')}, tier>=${minTtm})`);
      return true;
    }
    return false;
  }
  _starDrivers.forEach(star=>{
    if(!remainingPool.some(f=>f.id===star.id))return; // already placed by an earlier iteration
    // Find the team this driver just left (voluntarily or via release) — they can never
    // be placed back there by this guarantee, at any tier.
    const _ownDeparture=(eos.movements||[]).find(m=>m.d.id===star.id&&m.approved!==false&&!m.to);
    const _excludedTeam=_ownDeparture?_ownDeparture.from:null;
    for(const _tierMin of _starTierThresholds){
      if(_tryPlaceStarInTier(star,_tierMin,_excludedTeam))break;
    }
  });

  // Debug: report any teams STILL vacant and remaining available pool
  const stillVacant=activeTeams.filter(t=>{
    const ts=teamSeats[t];if(!ts)return false;
    const filled=(ts.count||0)+(signedCount[t]||0);
    return filled<(ts.max||2);
  });
  if(stillVacant.length){
    const poolLeft=remainingPool.length;
    signingDebugLog.push(`⚠ ${stillVacant.length} team(s) still have vacancies after fill. Pool remaining: ${poolLeft} driver(s).`);
    stillVacant.forEach(t=>{
      const ts=teamSeats[t];
      const filled=(ts.count||0)+(signedCount[t]||0);
      signingDebugLog.push(`  ↳ ${teamDisplayName(t)}: ${filled}/${ts.max||2} filled`);
    });
  }
  // Holdout detection: a driver considered by more than one team as a genuine candidate,
  // but signed with only one, is treated as having actively chosen that team over the
  // other(s). Scales the resulting modifier with driver strength — a stronger driver's
  // choice/rejection carries more weight than a weak one's.
  const holdouts=[];
  const _rejectionPenalizedTeams=new Set(); // caps the rejection penalty at one per team per EoS cycle
  filteredResults.forEach(r=>{
    const driverId=r.driver.id||r.driver.pid;
    const consideredBy=driverConsideredByTeams[driverId];
    if(!consideredBy||consideredBy.size<=1)return;
    const rejectedTeams=[...consideredBy].filter(t=>t!==r.team);
    if(!rejectedTeams.length)return;
    const dMod=(r.driver.driverBonus||r.driver.db||0)+(getDriverMod(driverId)||0);
    const _scaleFactor=1+Math.max(0,dMod)*0.10;
    const chosenBonus=Math.round(0.10*_scaleFactor*100)/100;
    applyTeamMod(r.team,chosenBonus);
    recordMod('team',null,teamDisplayName(r.team),chosenBonus,`Holdout signing — ${driverFullName(r.driver)||r.driver.name} chose this team`,'signing');
    applyDriverTeamRelation(driverId,r.team,6,'Chose this team in a bidding war');
    const rejectedPenalty=-Math.round(0.10*_scaleFactor*100)/100;
    // Only apply the rejection penalty to a team once per EoS cycle — a team passed over
    // by several different holdout drivers shouldn't stack a separate penalty for each one.
    // (The relationship hit below is per driver-team pair, so it isn't capped the same way —
    // each driver's own relationship with a team they personally rejected takes the hit
    // regardless of how many other drivers also passed on that team this cycle.)
    // Relationship-specific scaling for the rejection sting below: a team isn't nearly as
    // offended by a lowly driver passing them over as by a genuinely strong one doing so.
    // Floored so it never fully vanishes, uncapped on the top end so an elite snub can sting
    // more than the -6 baseline.
    const _rejectRelScale=Math.max(0.15,0.5+dMod*0.15);
    rejectedTeams.forEach(t=>{
      applyDriverTeamRelation(driverId,t,-6*_rejectRelScale,'Rejected this team in a bidding war');
      const _tCanon=teamCanonicalName(t);
      if(_rejectionPenalizedTeams.has(_tCanon))return;
      _rejectionPenalizedTeams.add(_tCanon);
      applyTeamMod(t,rejectedPenalty);
      recordMod('team',null,teamDisplayName(t),rejectedPenalty,`Holdout signing — ${driverFullName(r.driver)||r.driver.name} chose another team`,'signing');
    });
    holdouts.push({
      driverId,driverName:driverFullName(r.driver)||r.driver.name,
      chosenTeam:r.team,rejectedTeams,
    });
  });
  eos._holdouts=holdouts;
  eos.signings=filteredResults;
  eos._signingDebugLog=signingDebugLog;
}

  const _stayingIds=new Set(BASE_DRIVERS
    .filter(d=>d.team!=='Available'&&!d._retired&&!d._temp&&!retiringIds.has(d.id))

  const _faPoolIds=new Set((app._seasonFAPool||[]).map(f=>f.id||f.pid).filter(Boolean));
  const allAvail=[
    ...(app._seasonFAPool||[]),

    ...(eos.closures||[]).flatMap(t=>BASE_DRIVERS.filter(d=>d.team===t&&!d._retired&&!retiringIds.has(d.id))),
    ...BASE_DRIVERS.filter(d=>{const mv=(eos.movements||[]).find(m=>m.d.id===d.id&&m.approved!==false);return mv&&!mv.to&&!retiringIds.has(d.id);}),
  ].filter(f=>{

window.eosConfirmSignings=function(){

    const name=(s.driver.firstName||s.driver.fn||'')+' '+(s.driver.lastName||s.driver.ln||s.driver.name||'');

    const _reason=_holdout
      ?`Holdout — chose ${teamDisplayName(s.team)} over ${_holdout.rejectedTeams.map(t=>teamDisplayName(t)).join(', ')}`
      :(s.reason||'end-of-season signing');

// ── Stage 6: Complete + Apply ──────────────────────────────────────
function eosRenderComplete(){
  const eos=app._eos;const isDone=eos.stagesDone.has(6);
  const st=eos._standingsCache;
  const dChamp=st.driverChampion||st.drivers[0]?.name||'—';
  const cChamp=st.teamChampion||teamDisplayName(st.teams[0]?.name||'—')||'—';

  // ── Build roster summary: team → {stays, leaves, joins} ──────────
  const retiringIds=new Set(eos.retirements.filter(r=>!r.override).map(r=>r.d.id));
  const closedTeams=new Set(eos.closures);
  const approvedMvs=(eos.movements||[]).filter(m=>m.approved!==false);
  const movedOut=new Map(); // id → {type,to,from}
  const movedIn=new Map();  // teamName → [{d,from}]
  approvedMvs.forEach(m=>{
    movedOut.set(m.d.id,m);
    if(m.to){if(!movedIn.has(m.to))movedIn.set(m.to,[]);movedIn.get(m.to).push(m);}
  });
  const signingsByTeam=new Map();
  (eos.signings||[]).forEach(s=>{
    if(!signingsByTeam.has(s.team))signingsByTeam.set(s.team,[]);
    signingsByTeam.get(s.team).push(s.driver);
  });

  // All teams for next year (existing minus closed, plus new entries)
  const existingTeams=[...new Set(BASE_DRIVERS.filter(d=>d.team!=='Available'&&!d._retired&&!d._careerEndingInjury&&!d._temp).map(d=>d.team))].filter(t=>!closedTeams.has(t));
  const newTeamNames=(eos.confirmedNewTeams||[]).filter(t=>!closedTeams.has(t)&&!existingTeams.includes(t));
  const allNextTeams=[...existingTeams,...newTeamNames].sort((a,b)=>a.localeCompare(b));

  const gr=eos.gridRules||{};
  // Count projected drivers
  let totalDrivers=0;
  const teamRows=allNextTeams.map(team=>{
    const isNew=newTeamNames.includes(team);
    const disp=teamDisplayName(team);
    const stays=isNew?[]:BASE_DRIVERS.filter(d=>d.team===team&&!d._retired&&!d._temp&&!retiringIds.has(d.id)).filter(d=>{
      const mv=movedOut.get(d.id);return !mv||mv.to===team;
    });
    const retires=isNew?[]:BASE_DRIVERS.filter(d=>d.team===team&&!d._temp&&retiringIds.has(d.id));
    const leaves=isNew?[]:BASE_DRIVERS.filter(d=>d.team===team&&!d._retired&&!d._temp&&!retiringIds.has(d.id)).filter(d=>{
      const mv=movedOut.get(d.id);return mv&&!mv.to; // released/left
    });
    const promoted=(movedIn.get(team)||[]).map(m=>m.d); // moves in from other teams
    const signed=signingsByTeam.get(team)||[];
    const total=stays.length+promoted.length+signed.length;
    totalDrivers+=total;
    const maxS=isNew?2:(isOneDriverTeam(team,eos.nextYear)?1:2);
    const shortage=maxS-total;
    const fn=d=>driverFullName(d)||d.name||d.ln||'?';
    const rows=[];
    stays.forEach(d=>rows.push(`<div style="font-size:11px;padding:1px 0">${flagImg(d.nation2)} ${escapeHtml(fn(d))}</div>`));
    promoted.forEach(d=>rows.push(`<div style="font-size:11px;padding:1px 0;color:#1d4ed8">↗ ${flagImg(d.nation2)} ${escapeHtml(fn(d))}</div>`));
    signed.forEach(f=>{const n=(f.firstName||f.fn||'')+' '+(f.lastName||f.ln||f.name||'');rows.push(`<div style="font-size:11px;padding:1px 0;color:#15803d">+ ${flagImg(f.nation2||f.n2||'')} ${escapeHtml(n.trim())}</div>`);});
    retires.forEach(d=>rows.push(`<div style="font-size:11px;padding:1px 0;color:#9f1239;text-decoration:line-through">⛔ ${flagImg(d.nation2)} ${escapeHtml(fn(d))}</div>`));
    leaves.forEach(d=>rows.push(`<div style="font-size:11px;padding:1px 0;color:#92400e">🚪 ${flagImg(d.nation2)} ${escapeHtml(fn(d))}</div>`));
    return`<div class="panel" style="margin-bottom:6px">
      <div style="display:flex;justify-content:space-between;align-items:baseline;margin-bottom:4px">
        <span style="font-weight:600;font-size:13px">${escapeHtml(disp)}${isNew?'<span style="font-size:10px;color:#1d4ed8;margin-left:4px">NEW</span>':''}</span>
        <span style="font-size:11px;color:${shortage>0?'#dc2626':total>maxS?'#dc2626':'var(--muted)'}">${total}/${maxS} drivers${shortage>0?` ⚠ ${shortage} short`:total>maxS?' ⚠ over':''}</span>
      </div>
      ${rows.join('')}
    </div>`;
  });

  // Closed teams
  const closedRows=eos.closures.map(t=>`<div class="panel" style="margin-bottom:6px;opacity:0.6">
    <div style="font-weight:600;font-size:13px;color:#991b1b">✕ ${escapeHtml(teamDisplayName(t))} — Closed</div>
    ${BASE_DRIVERS.filter(d=>d.team===t&&!d._retired&&!d._temp).map(d=>`<div style="font-size:11px;padding:1px 0;color:#9f1239;text-decoration:line-through">${flagImg(d.nation2)} ${escapeHtml(driverFullName(d)||d.name||'?')}</div>`).join('')}
  </div>`);

  return`
  <div class="eos-header"><div class="eos-tag">Stage 6 of 6</div><h2>${eos.nextYear} Season Grid</h2>
    <p style="color:var(--muted);font-size:13px">${gr.label||''} rules: ${gr.minDrivers}–${gr.maxDrivers} drivers from ${gr.minTeams}–${gr.maxTeams} teams. Projected: <strong>${totalDrivers} drivers from ${allNextTeams.length} teams</strong>.</p></div>
  <div class="btn-row">
    ${isDone?`<button class="btn" style="background:#15803d" onclick="eosApplyAndBeginNewSeason()">🏁 Begin ${eos.nextYear} season →</button>
    ${eos._debugMode?`<button class="ghost" style="color:#7c3aed" onclick="eosDebugNextYear()">🛠 Debug: next year →</button>`:''}
    `:`<button class="btn" onclick="eosConfirmComplete()">Confirm all →</button>`}
  </div>
  <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:12px">
    <div class="metric"><div class="label">${eos.year} Drivers' Champion</div><div class="value" style="font-size:13px">${escapeHtml(dChamp)}</div></div>
    <div class="metric"><div class="label">${eos.year} Constructors' Champion</div><div class="value" style="font-size:13px">${escapeHtml(cChamp)}</div></div>
  </div>
  <div style="font-size:11px;color:var(--muted);margin-bottom:8px">Legend: stays (grey) &nbsp;·&nbsp; <span style="color:#1d4ed8">↗ promoted</span> &nbsp;·&nbsp; <span style="color:#15803d">+ signed</span> &nbsp;·&nbsp; <span style="color:#9f1239;text-decoration:line-through">⛔ retiring</span> &nbsp;·&nbsp; <span style="color:#92400e">🚪 leaving</span></div>
  <div class="two-col">
  ${teamRows.join('')}
  ${closedRows.join('')}
  </div>
  <div class="sec" style="margin-top:12px">Process log</div>
  <div class="panel" style="max-height:180px;overflow-y:auto">
  ${eos.processLog.length?eos.processLog.map(e=>`<div style="font-size:11px;color:var(--muted);padding:2px 0;border-bottom:1px solid var(--line)">${escapeHtml(e)}</div>`).join(''):'<span style="color:var(--muted);font-size:12px">No log entries.</span>'}
  </div>`;
}

  // Stage 1: retirements
