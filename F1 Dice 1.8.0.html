function importSaveFileHandle(input){
  const file=input?.files?.[0];
  if(!file){return;}
  const reader=new FileReader();
  reader.onload=e=>{
    try{
      const payload=JSON.parse(e.target.result);
      // Accept either wrapped format (with _f1diceVersion) or raw app state
      const state=payload.appState||payload;
      if(!state||!state.history||!state.currentSeason){
        alert('This file doesn\'t look like a valid F1 Dice save file.');
        return;
      }
      // Validate season is a sane year — not capped near SEASONS' hardcoded entries, since
      // the game legitimately supports play for decades beyond 1989/1991 via seasonData()'s
      // calendar-stub and fully-dynamic-year fallback systems. This is a sanity check
      // against corrupted data, not a ceiling on how long a game can run.
      if(!Number.isFinite(state.currentSeason)||state.currentSeason<1950||state.currentSeason>2200){
        alert(`Cannot load: season ${state.currentSeason} is outside the supported range.`);
        return;
      }
      const rounds=payload._rounds??state.history?.weekends?.length??'?';
      const version=payload._f1diceVersion||state.version||'?';
      const hasBaseDrivers=Array.isArray(payload._baseDrivers)&&payload._baseDrivers.length>0;
      const warningNote=hasBaseDrivers?'':'\n\n⚠ Old format: driver roster will be rebuilt from database (some accuracy loss).';
      showRetroModal(
        `Load save from file?\n\nSeason: ${state.currentSeason} — Round ${rounds} played\nSave version: ${version}${warningNote}\n\nThis will REPLACE your current game state. localStorage slots are not affected.`,
        ()=>{
          // Apply same migrations as loadApp
          if(!state.modHistory)state.modHistory={drivers:{},teams:{}};
          if(!state._pqTeamsBySeason)state._pqTeamsBySeason={};
          if(!state._closedTeamIds)state._closedTeamIds=[];
          if(!state.realism)state.realism={realDrivers:false,realCalendar:true,realCircuits:false,scoringMode:'historical'};
          if(!state.realism.scoringMode)state.realism.scoringMode='historical';
          if(!state.realism.scoringEras)state.realism.scoringEras={1989:true,1991:true,2003:true,2010:true,2019:true,2025:true};
          if(!state._movementRules)state._movementRules={injuries:true,suspensions:true,quitting:true,firing:true};
          if(state._debugMessages===undefined)state._debugMessages=true;
          if(state.currentWeekend===undefined)state.currentWeekend=null;
          state._eos=null;
          state.version=APP_VERSION;
          app=state;

          if(hasBaseDrivers){
            // Restore BASE_DRIVERS exactly from the export snapshot.
            // This preserves all EoS team/driver changes, closures, retirements etc.
            // Do NOT call postInitSetup() — that would clobber BASE_DRIVERS with the wrong season data.
            BASE_DRIVERS=payload._baseDrivers;
            repairDriverFlags(BASE_DRIVERS);
            FREE_AGENTS=getSeasonFreeAgents(state.currentSeason);
            invalidateStandingsCache();
          } else {
            // Old export format — no BASE_DRIVERS snapshot. Fall back to postInitSetup.
            // Accuracy limited to the starting season's roster.
            postInitSetup();
          }

          // Write to localStorage so the game persists across a refresh
          try{
            saveApp();
            localStorage.setItem('f1dice_lastSeason',String(state.currentSeason));
          }catch(err){console.warn('localStorage write after import failed:',err);}
          goHash('#start');
          render();
          alert(`✅ Save loaded successfully!\nSeason ${state.currentSeason}, ${state.history.weekends.length} race(s) played.`);
        },
        ()=>{}
      );
    }catch(err){
      alert(`Failed to read save file: ${err.message}`);
    }
    if(input)input.value='';
  };
  reader.readAsText(file);
}
window.importSaveFileHandle=importSaveFileHandle;

// ── Export end-of-season state for single-season prototype ──────────────────
function exportEndOfSeasonData(){
  const yr=app.currentSeason||1989;
  const st=seasonStandings(yr);

  // Build team list
  const teams=BASE_DRIVERS.filter(d=>d.team&&d.team!=='Available'&&!d._retired&&!d._temp)
    .reduce((acc,d)=>{
      if(!acc.find(t=>t.name===d.team)){
        const teamMod=getTeamMod(d.team);
        const tb=d.teamBonus||0;
        // Get standings data
        const stTeam=st.teams.find(t=>teamCanonicalName(t.name)===d.team)||{};
        const isPQ=(app.preqDriverIds||[]).some(id=>BASE_DRIVERS.find(x=>x.id===id)?.team===d.team);
        const rules=seasonRules(yr);
        acc.push({
          id: (TEAMS_DATABASE.find(t=>teamCanonicalName(t.name)===teamCanonicalName(d.team))?.id)||(20000+acc.length),
          name: d.team,
          disp: teamDisplayName(d.team),
          tb, acc:teamMod,
          pq: isPQ,
          starts: stTeam.starts||0,
          pts: stTeam.championshipPoints||0,
          dnpq:0, dnq:0, // not tracked per-team in current version
          isNew: false,
          nextAlias: seasonData(yr).teamAliases?.[d.team]||null,
        });
      }
      return acc;
    },[]);

  // Build driver list (contracted + available pool)
  const stDriverMap={};
  st.drivers.forEach(d=>{stDriverMap[d.id]=d;});
  const contracted=BASE_DRIVERS.filter(d=>d.team&&d.team!=='Available'&&!d._retired&&!d._temp).map(d=>{
    const dMod=getDriverMod(d.id);
    const sd=stDriverMap[d.id]||{};
    return{
      id:d.id, simId:'d_'+d.id, name:driverFullName(d), nat:d.nationality,
      team: d.team, // canonical team name
      dob: d.dob||1960, db: d.driverBonus||0, acc: dMod,
      fa:0, wins:sd.wins||0, pods:sd.podiums||0, poles:sd.poles||0,
      dnpq:0, dnq:0, retired:false,
    };
  });
  const available=(app._seasonFAPool||[]).filter(f=>f.id&&(f.firstName||f.fn)).map(f=>{
    const dMod=getDriverMod(f.id);
    return{
      id:f.id, simId:'fa_'+f.id, name:(f.firstName||f.fn)+' '+(f.lastName||f.ln),
      nat:f.nationality||f.nat||'', team:null,
      dob:f.dob||1960, db:f.driverBonus||f.db||0, acc:dMod,
      fa:0, wins:0, pods:0, poles:0, dnpq:0, dnq:0, retired:false,
    };
  });
  // Retired drivers from this season
  const retired=(app._retiredDrivers||[]).map(r=>({
    id:r.dbKey, simId:'ret_'+r.dbKey, name:(r.firstName||'')+' '+(r.lastName||r.ln||''),
    nat:'', team:null, dob:1960, db:0, acc:0, fa:0,
    wins:0,pods:0,poles:0,dnpq:0,dnq:0, retired:true,
  }));

  // Rivalry data
  const rivalries=[];
  Object.entries(app.rivalries||{}).forEach(([key,r])=>{
    if(!r||!r.level)return;
    const [a,b]=key.split('|');
    const da=BASE_DRIVERS.find(d=>d.id===Number(a));
    const db2=BASE_DRIVERS.find(d=>d.id===Number(b));
    if(da&&db2)rivalries.push({a:'d_'+a,b:'d_'+b,level:r.hatred?'Hatred':r.level,
      driverA:driverFullName(da),driverB:driverFullName(db2)});
  });

  const exportObj={
    exportedAt: new Date().toISOString(),
    season: yr,
    seasonLabel: `${yr} end-of-season`,
    minTeams: seasonRules(yr).minTeams||17,
    maxTeams: seasonRules(yr).maxTeams||20,
    targetTeams: seasonRules(yr).targetTeams||18,
    teams, drivers:[...contracted,...available,...retired],
    rivalries,
    roundsCompleted: currentSeasonEntries().length,
    totalRounds: seasonRules(yr).totalRounds||16,
  };

  const blob=new Blob([JSON.stringify(exportObj,null,2)],{type:'application/json'});
  const a=document.createElement('a');a.href=URL.createObjectURL(blob);
  a.download=`f1dice_endofseason_${yr}.json`;a.click();
}
window.exportEndOfSeasonData=exportEndOfSeasonData;
document.addEventListener('keydown',e=>{
  if(e.target.tagName==='INPUT'||e.target.tagName==='TEXTAREA'||e.target.tagName==='SELECT')return;
  if(e.key==='Escape'){
    const wm=document.getElementById('weatherModal');
    if(wm){e.preventDefault();wm.remove();return;}
  }
  const w=app.currentWeekend;
  const _inActiveWeekend=!!(w&&!w.weekendFinished&&!w.pendingSeasonReturn);
  // Global navigation shortcuts — work from anywhere in the app, not just the home screen.
  // Encyclopedia/options are suppressed mid-weekend — navigating away there mid-session is
  // more likely to be an accidental keypress than an intentional detour.
  if(e.key==='h'||e.key==='H'){e.preventDefault();goHash('#start');return;}
  if((e.key==='e'||e.key==='E')&&!_inActiveWeekend){e.preventDefault();goHash('#encyclopedia');return;}
  if(e.key==='r'||e.key==='R'){e.preventDefault();goHash('#rankings');return;}
  if((e.key==='o'||e.key==='O')&&!_inActiveWeekend){e.preventDefault();goHash('#options');return;}
  if(w&&!w.weekendFinished&&!w.pendingSeasonReturn){
    if(e.key==='n'||e.key==='N'){e.preventDefault();processNextRollWrapper();return;}
    if(e.key==='i'||e.key==='I'){e.preventDefault();instantLapWrapper();return;}
    if(e.key==='s'||e.key==='S'){e.preventDefault();instantResult();return;}
  }
  // 'S' also starts the next round when no weekend is currently in progress — matches the
  // 'Start next round' button on the home page and season page.
  if((e.key==='s'||e.key==='S')&&(!w||w.weekendFinished)&&!app._eos&&currentSeasonEntries().length<seasonRules().totalRounds){
    e.preventDefault();newWeekend();
  }
});
