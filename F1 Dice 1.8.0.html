<style>

.controls,.statusbar{display:flex;gap:12px;flex-wrap:wrap;align-items:center}.controls{padding:12px;margin-bottom:12px}.statusbar{padding:12px;margin-bottom:12px}
button,select{font:inherit;padding:8px 12px;border-radius:8px;border:1px solid var(--line);background:white} button{cursor:pointer;background:var(--accent);color:white;border:none;font-weight:600}.secondary{background:#4b5563}.ghost{background:white;color:var(--accent);border:1px solid var(--accent)} button:disabled{opacity:.5;cursor:not-allowed}
.pill{display:inline-flex;align-items:center;gap:8px;background:#eef3fb;border:1px solid #d7e4f5;border-radius:999px;padding:6px 12px;font-size:14px}.pill.preq{background:var(--preq);border-color:#ecd9b2}.pill.quali{background:var(--quali);border-color:#dbd1f4}.pill.race{background:var(--race);border-color:#d7e4f5}.pill.wet{background:var(--wet);border-color:#93c5fd}.pill.vwet{background:var(--vwet);border-color:#c4b5fd}
.layout{display:grid;grid-template-columns:1.89fr .68fr;gap:12px;align-items:start}.hidden{display:none!important}.table-wrap{overflow:auto;max-height:calc(100vh - 200px)}.session-table-wrap{overflow:auto;max-height:calc(100vh - 160px)} table{border-collapse:collapse;width:100%;background:white} th,td{border:1px solid var(--line);padding:6px 8px;text-align:center;font-size:14px;line-height:1.2} thead th{position:sticky;top:0;background:var(--head);z-index:2;white-space:nowrap} th.left,td.left{text-align:left}

/* ── RETRO MODAL ─────────────────────────────────────────────────────────── */

.retro-dialog{background:#1a5200;border:4px solid #f5c518;border-radius:4px;padding:32px 40px;max-width:520px;width:90%;box-shadow:6px 6px 0 #8a7000,0 0 40px rgba(0,0,0,.5);font-family:'Press Start 2P',monospace,sans-serif;text-align:center}
.retro-dialog p{color:#e8e4c8;font-size:clamp(9px,1.4vw,14px);line-height:1.8;margin:0 0 28px;letter-spacing:1px}

.retro-no:hover{background:#e8e4c8;color:#1a5200}

<div class="app">
  <h1 id="appTitle">🏎 Formula 1 Dice Simulator</h1>
  <div id="routeStart" class="route"></div>
  <div id="routeWeekend" class="route hidden"></div>
  <div id="routeProfile" class="route hidden"></div>
  <div id="routeEncyclopedia" class="route hidden"></div>
  <div id="routeRankings" class="route hidden"></div>
  <div id="routeSeason" class="route hidden"></div>
  <div id="routeRaceHistory" class="route hidden"></div>
  <div id="routeOptions" class="route hidden"></div>
</div>
<script>

// ── DEBUG MESSAGE SYSTEM ───────────────────────────────────────────────────
// Shows on-screen toast when app._debugMessages is true (default on).
// Safe to call anywhere — never throws.

// ── STANDINGS & HISTORY CACHES ────────────────────────────────────────────
// Declared here (top of script) so invalidateStandingsCache() is safe to call
// from postInitSetup(), which runs before these would otherwise be declared.
const _standingsCache={};
let _historyRaceFlatCache=null,_historyFlatLen=-1;
function getHistoryRaceFlat(){
  if(_historyFlatLen===app.history.weekends.length&&_historyRaceFlatCache)return _historyRaceFlatCache;
  _historyRaceFlatCache=app.history.weekends.flatMap(w=>w.race);
  _historyFlatLen=app.history.weekends.length;
  return _historyRaceFlatCache;
}
function invalidateStandingsCache(){Object.keys(_standingsCache).forEach(k=>delete _standingsCache[k]);_historyRaceFlatCache=null;_historyFlatLen=-1;}
// Every one of these trackers is scoped to a single season and MUST be cleared at each
// season transition. Deliberately consolidated into ONE function — the season-transition
// logic used to duplicate this list across two code paths (the live one and a dead,
// never-called proceedToNewSeason()), and every time a new tracker was added, it kept
// landing in only one copy. That silently broke the season-gain cap, the DNPQ penalty
// system, and the mechanical-retirement penalty system at various points — each ended up
// stuck using its very-first-season snapshot/count forever, since nothing ever reset it
// again. Any new season-scoped tracker should be added HERE, and only here.
function resetSeasonScopedTrackers(){
  app._qualiRetirementPenalty={};
  app._earlyCareerWinAwarded={};app._earlyCareerPodiumAwarded={};app._earlyCareerPtsAwarded={};
  app._seasonDNQCount={};app._seasonCrashFaultCount={};app._seasonHatredFireChecks=0;app._seasonHatredQuitChecks=0;
  app._seasonSigningCount=0;app._seasonSigningCap=1+Math.round(Math.random());
  app._seasonTeamBlocklist={};app._activeLoans={};
  app._seasonStartDriverMod={};app._seasonStartTeamMod={};
  app._seasonFourCapBase={};app._seasonThreeCapBase={};
  app._seasonPQFailStreak={};app._seasonPQPenaltyCount={};
  app._seasonMechRetire={};app._seasonMechRetirePenalty={};
  app._seasonMechDNFCount={};
  app._lastMechDNFRound={};
  app._seasonExtraFormPoints={};
  app._seasonNoPointsStreak={};
  app._seasonSpunOffCount={};
  app._vacatedPQTeams={};
  app._seasonDNPQCount={};
  app._seasonDNPQCountSinceRecalc={};
  app._repPenalizedIds=[];
  app._pqSinkTeams=[];
  app._seasonUnderperformFiredTeams=[];
}
function debugMsg(title, detail){
  try{
    console.log('[DEBUG]',title, detail||'');
    if(typeof app==='undefined'||!app||app._debugMessages===false)return;
    const el=document.createElement('div');
    el.style.cssText='position:fixed;bottom:12px;left:50%;transform:translateX(-50%);background:#1e293b;color:#f1f5f9;padding:8px 14px;border-radius:8px;font-size:11px;font-family:monospace;z-index:9999;max-width:520px;box-shadow:0 4px 12px rgba(0,0,0,.4);pointer-events:none';
    el.innerHTML=`<strong style="color:#fbbf24">${escapeHtml?escapeHtml(String(title)):String(title)}</strong>${detail?'<br>'+String(detail).slice(0,200):''}`;
    document.body.appendChild(el);
    setTimeout(()=>{try{el.remove();}catch(e){}},8000);
  }catch(e){
    // debugMsg itself must never throw
    try{console.error('[debugMsg error]',e);}catch(e2){}
  }
}

// flag display (n2) and encyclopaedia filtering (n3).

function natCodes(nat){return NAT_MAP[nat?.trim()]||{n2:'??',n3:'???'};}

      autoQualCutoff:25,            // 25 auto-qualifiers; 14 PQ drivers; qualifying field = 29

      raceField:26,                 // top 26 from qualifying start the race
      totalRounds:16, preqRecalcAfterRound:8,

      preqRecalcTeams:7,            // R9+: bottom 7 teams. If EuroBrun included: 6×2+1=13 PQ → 4 advance. If not: 7×2=14 PQ → 5 advance to keep 30-car field.
      // R1-R8 fixed PQ driver IDs (permanent IDs), reintroduced as split-seat 1989 pre-qualifying.
      // 2-driver PQ teams (both drivers PQ): Brabham, Onyx, Zakspeed, AGS, Osella.
      // 1-driver PQ teams (named driver only, teammate auto-qualifies): Dallara (Alex Caffi, 10025),

      // Coloni (Pierre-Henri Raphanel, 10032). Valid for Round 1–8, 1989 ONLY — R9+ uses the
      // bottom-team recalc below (all drivers from those teams). Do not reuse this list for any

      initialPreqIds89:[10020,10028,10006,10050,10035,10038,10030,10039,10010,10031,10025,10042,10040,10032],

    },
    teamAliases: {},
    oneDriverTeams: ['EuroBrun'],
    randomSecondDriver: null,
    contracted: [

// Get closest real calendar for a given year
// Get the real calendar for a given year.
// Exact match wins; otherwise use the nearest year (prefer earlier, fall forward if needed).
function getRealCalendarForYear(yr){
  if(REAL_CALENDARS[yr])return REAL_CALENDARS[yr];
  const keys=Object.keys(REAL_CALENDARS).map(Number).sort((a,b)=>a-b);
  // Best earlier-or-equal key
  let best=null;
  for(const k of keys){if(k<=yr)best=k;}
  if(best!==null)return REAL_CALENDARS[best];
  // No earlier key — fall forward to nearest future calendar
  return REAL_CALENDARS[keys[0]];
}

function seasonData(yr){
  let year=yr;
  if(!year){try{year=app?.currentSeason;}catch(e){year=1989;}}
  year=year||1989;

  // Determine which base season's RULES to use.
  // The game started in either 1989 or 1991 — all intermediate years inherit that era's rules.
  // This ensures PQ structure (preqTotal, preqAdvance, etc.) stays consistent throughout a campaign.
  let gameStartYr=1989; // default
  try{gameStartYr=app?.history?.weekends?.length>0?Math.min(...app.history.weekends.map(w=>w.raceMeta.year)):(app?.currentSeason||1989);}catch(e){}
  const baseRulesSeason=gameStartYr<=1989?1989:1991; // 1989-start uses 1989 rules, 1991-start uses 1991 rules
  const base=SEASONS[baseRulesSeason]||SEASONS[1989]; // rules fallback

  // Full-data season (has contracted + teams + rules)
  const sd=SEASONS[year];
  if(sd&&sd.contracted&&sd.rules){
    // If realCalendar is on and we have a real calendar for this year, substitute it
    try{
      if(app?.realism?.realCalendar&&REAL_CALENDARS[year]){
        const rc=REAL_CALENDARS[year];
        return{...sd,calendar:rc.calendar,rules:_scaleRules(sd.rules,rc.rounds)};
      }
    }catch(e){}
    return sd;
  }

  // Calendar-only stub (e.g. 1992, 1996, 2000, 2010, 2024 in SEASONS) OR unknown year —
  // merge the stub's calendar with the era-appropriate rules, overriding only totalRounds.
  // If realCalendar is on, use the REAL_CALENDARS entry for the exact year (falling back to closest).
  const stubCalendar=sd?.calendar||null;
  try{
    if(app?.realism?.realCalendar){
      const rc=getRealCalendarForYear(year);
      return{...base,calendar:rc.calendar,rules:_scaleRules(base.rules,rc.rounds)};
    }
  }catch(e){}
  // Random calendar mode: use stub calendar if available, else base calendar
  if(stubCalendar){
    const stTotal=sd.rounds||base.rules.totalRounds||16;
    return{...base,calendar:stubCalendar,rules:_scaleRules(base.rules,stTotal)};
  }
  return base; // fully unknown year — use entire base
}
function _scaleRules(baseRules, totalRounds){
  if(!baseRules)return baseRules;
  const baseTotal=baseRules.totalRounds||16;
  if(totalRounds===baseTotal)return{...baseRules,totalRounds};
  const scaledPreqRecalc=Math.round((baseRules.preqRecalcAfterRound||8)*(totalRounds/baseTotal));
  return{...baseRules,totalRounds,preqRecalcAfterRound:scaledPreqRecalc};
}
function seasonRules(yr){const sd=seasonData(yr);return sd.rules;}
function seasonCalendar(yr){return seasonData(yr).calendar;}
// Display name for a team (e.g. 'Arrows' → 'Footwork' in 1991)
function teamDisplayName(teamKey,yr){
  // 1. Check SEASONS alias for the explicit or current year
  const year=yr||(()=>{try{return app?.currentSeason;}catch(e){return 1989;}})();
  const sd=SEASONS[year];
  if(sd&&sd.teamAliases&&sd.teamAliases[teamKey])return sd.teamAliases[teamKey];
  // 2. Fall back to TEAMS_DATABASE aliases (covers intermediate years like 1990)
  const td=TEAMS_DATABASE.find(t=>t.name===teamKey);
  if(td&&td.aliases&&td.aliases.length){
    // Find an alias whose year range covers the current year
    for(const a of td.aliases){
      if(!a.years)continue;
      // Parse "1990-" or "1990-1996" etc.
      const parts=a.years.replace(/\s/g,'').split('-');
      const start=parseInt(parts[0])||0;
      const end=parts[1]===''||parts[1]===undefined?9999:parseInt(parts[1])||9999;
      if(year>=start&&year<=end)return a.name;
    }
  }
  return teamKey;
}
// Canonical key from display name
function teamCanonicalName(displayName){
  // 1. Check SEASONS for current year
  const year=(()=>{try{return app?.currentSeason;}catch(e){return 1989;}})();
  const sd=SEASONS[year];
  if(sd&&sd.teamAliases){
    for(const[k,v]of Object.entries(sd.teamAliases)){if(v===displayName)return k;}
  }
  // 2. Fall back to TEAMS_DATABASE aliases — resolves regardless of current game year,
  // since a known alias name unambiguously identifies its canonical team no matter when
  // it's being looked up from (e.g. 'Footwork' always means Arrows, even when viewed
  // from a season years after the alias was last actually in use).
  for(const td of TEAMS_DATABASE){
    if(td.name===displayName)return td.name; // is already canonical
    if(td.aliases){
      for(const a of td.aliases){
        if(a.name===displayName)return td.name;
      }
    }
  }
  return displayName;
}
// Base team bonus for current season
function teamBaseTb(teamKey){
  // A team's base modifier is a fixed historical constant, established once at whichever
  // season THIS playthrough actually started in (only 1989 and 1991 have their own hardcoded
  // team data) — it must never be re-derived from "whatever the current season happens to
  // be". Previously this used seasonData() with no year (defaulting to app.currentSeason),
  // which for a 1989-start game reaching 1991 would silently use 1991-start's OWN team data
  // instead (e.g. Arrows' 1991-start value of -3.0, not their real 1989-start value of 0.0),
  // or fall back to 0 entirely for a team not in that season's roster (e.g. Zakspeed, absent
  // from 1991-start's smaller field, instead of their real -3.5).
  let gameStartYr=1989;
  try{gameStartYr=app?.history?.weekends?.length>0?Math.min(...app.history.weekends.map(w=>w.raceMeta.year)):(app?.currentSeason||1989);}catch(e){}
  const baseSeasonYr=gameStartYr<=1989?1989:1991;
  const sd=seasonData(baseSeasonYr);
  const canon=teamCanonicalName(teamKey);
  const found=sd.teams[canon]||sd.teams[teamKey];
  if(found)return found.tb||0;
  // Team wasn't part of the game-start year's roster at all — it joined later as a new
  // entrant (e.g. Life in 1990), so its starting modifier comes from TEAMS_DATABASE.genMod
  // instead, applied directly at the moment it was created.
  const dbEntry=TEAMS_DATABASE.find(t=>teamCanonicalName(t.name)===canon);
  return dbEntry?.genMod||0;
}
// Is this team a one-driver team in a given season?
// From 1992 onwards, ALL teams must have 2 drivers — no one-driver teams permitted.
function isOneDriverTeam(teamKey, seasonOverride){
  const yr=seasonOverride||(()=>{try{return app?.currentSeason;}catch(e){return 1989;}})();
  if(yr>=1992)return false; // 1992+ rule: all teams must field 2 drivers (both databases)
  let gameStartYr=1989;
  try{gameStartYr=app?.history?.weekends?.length>0?Math.min(...app.history.weekends.map(w=>w.raceMeta.year)):(app?.currentSeason||1989);}catch(e){}
  if(gameStartYr<=1989&&yr>1989){
    // 1989-start games: 2 drivers required from 1990+ for most teams.
    // EXCEPTION: EuroBrun only ever fielded 1 driver and closed after 1990 — keep as one-driver through 1991.
    const canon=teamCanonicalName(teamKey);
    if(canon==='EuroBrun')return true;
    return false;
  }
  return(seasonRules(yr).oneDriverTeams||[]).includes(teamCanonicalName(teamKey));
}

// Real F1 scoring history: 1989-1990 (9pts, best-11 results), 1991-2002 (10pts, all results),
// 2003-2009 (10-8-6-5-4-3-2-1), 2010-2018 (25-18-15-12-10-8-6-4-2-1), 2019-2024 (same table
// plus a fastest-lap bonus point), 2025+ (same table, no fastest-lap point).
const SCORING_ERAS=[
  {from:1989,label:'1989–1990',points:[9,6,4,3,2,1],bestN:11,fastestLap:false},
  {from:1991,label:'1991–2002',points:[10,6,4,3,2,1],bestN:null,fastestLap:false},
  {from:2003,label:'2003–2009',points:[10,8,6,5,4,3,2,1],bestN:null,fastestLap:false},
  {from:2010,label:'2010–2018',points:[25,18,15,12,10,8,6,4,2,1],bestN:null,fastestLap:false},
  {from:2019,label:'2019–2024',points:[25,18,15,12,10,8,6,4,2,1],bestN:null,fastestLap:true},
  {from:2025,label:'2025–',points:[25,18,15,12,10,8,6,4,2,1],bestN:null,fastestLap:false},

// In 'custom' mode, an unchecked era is skipped entirely — the previous CHECKED era's system
// simply continues until the next checked era's start year (rather than jumping straight to
// what the next era's rules would have been at its own boundary).
function _activeScoringEras(){
  const mode=app?.realism?.scoringMode||'historical';
  if(mode!=='custom')return SCORING_ERAS;
  const checked=app?.realism?.scoringEras||{};
  const filtered=SCORING_ERAS.filter(e=>checked[e.from]!==false);
  return filtered.length?filtered:SCORING_ERAS; // never end up with zero eras selected
}
function _scoringEraForYear(yr){
  // The 1989 era only applies to games that actually started in/before 1989 — a game
  // starting in 1991 should never see the 9pt/best-11 system, since it never experienced
  // 1989-1990. Mirrors the gating the old two-era logic already used.
  const gameStartYr=app?.history?.weekends?.length>0?Math.min(...app.history.weekends.map(w=>w.raceMeta.year)):(app?.currentSeason||1989);
  const usable=_activeScoringEras().filter(e=>e.from!==1989||gameStartYr<=1989);
  const pool=usable.length?usable:_activeScoringEras();
  let match=pool[0];
  for(const e of pool){if(e.from<=yr)match=e;else break;}
  return match;
}
function _effectiveChampPoints(){
  const _override=app?.currentWeekend?._pointsOverride;
  if(_override)return _override.points;
  const mode=app?.realism?.scoringMode||'historical';
  if(mode==='always9') return [9,6,4,3,2,1];
  if(mode==='always10') return [10,6,4,3,2,1];
  return _scoringEraForYear(app?.currentSeason||1989).points;
}
// forCurrentWeekend: only pass true when explicitly asking about the race currently in
// app.currentWeekend (e.g. scoring it, or bolding its own live results table) — NOT when
// asking about an arbitrary season/year (standings pages, historical race pages, championship
// news for a past round), even if that year happens to match app.currentSeason. Otherwise a
// non-championship race's points-system override would leak into unrelated historical lookups.
function _effectiveBestN(year,forCurrentWeekend){
  const _override=forCurrentWeekend?app?.currentWeekend?._pointsOverride:null;
  if(_override)return _override.bestN;
  const mode=app?.realism?.scoringMode||'historical';
  if(mode==='always9') return 11; // always best 11
  if(mode==='always10') return null; // always all results
  return _scoringEraForYear(year||app?.currentSeason||1989).bestN;
}
// Fastest-lap bonus point active for this year? Only the 2019-2024 era (in historical/custom
// modes) has this — always9/always10 never do. No year arg = asking about the current
// weekend's race, so the override applies there too.
function _effectiveHasFastestLap(year,forCurrentWeekend){
  const _override=(forCurrentWeekend||year===undefined)?app?.currentWeekend?._pointsOverride:null;
  if(_override)return !!_override.fastestLap;
  const mode=app?.realism?.scoringMode||'historical';
  if(mode==='always9'||mode==='always10')return false;
  return !!_scoringEraForYear(year||app?.currentSeason||1989).fastestLap;
}
// How many finishing positions score points this year — used to bold the points positions
// in race result tables. See forCurrentWeekend note above.
function _pointsPositionsForYear(year,forCurrentWeekend){
  const _override=forCurrentWeekend?app?.currentWeekend?._pointsOverride:null;
  if(_override)return _override.points.length;
  const mode=app?.realism?.scoringMode||'historical';
  if(mode==='always9'||mode==='always10')return 6;
  return _scoringEraForYear(year||app?.currentSeason||1989).points.length;
}
function champPointsFor(position){

  return rows.map((d,i)=>{

// they're about to enter. Must be called BEFORE resetSeasonScopedTrackers() clears
// _seasonStartDriverMod, since it needs the just-completed season's gain to check the
// 'positive season modifier' offset condition. excludeIds are drivers retiring this
// transition — no point adjusting a base modifier they'll never use again.
function applyAgeDeclineForNewSeason(newSeasonYear,excludeIds){
  if(!app._ageDeclineApplied)app._ageDeclineApplied={};
  BASE_DRIVERS.filter(d=>!d._retired&&!d._temp&&!excludeIds.has(d.id)).forEach(d=>{
    if(!d.dob)return;
    const age=newSeasonYear-d.dob;
    const target=ageDeclineTarget(age);
    const current=app._ageDeclineApplied[d.id]||0;
    const hadPositiveSeason=driverCurrentSeasonGain(d.id)>0;
    let newApplied=current;
    if(target<current){
      // Aged into a worse (more severe) bracket — this always takes effect in full,
      // regardless of any offset earned in a milder bracket. Aging always catches up
      // eventually; the offset only ever softens the CURRENT bracket, never exempts a
      // driver from the next one.
      newApplied=target;
    } else if(hadPositiveSeason&&current<0){
      // Maintained a positive season modifier — claw back up to 25% of the CURRENTLY
      // applied decline (not the full age-bracket target).
      newApplied=Math.round(current*0.75*100)/100;
    }
    if(newApplied===current)return;
    const delta=Math.round((newApplied-current)*100)/100;
    d.driverBonus=(d.driverBonus||0)+delta;
    d.qualiBonus=(d.qualiBonus||0)+delta;
    d.raceNoGridBonus=(d.raceNoGridBonus||0)+delta;
    // Floor: never let this push the driver's total modifier below the -5.00 basement,
    // same as every other base-modifier adjustment.
    const _accumNow=app.driverModifiers[d.id]||0;
    if(d.driverBonus+_accumNow<-DRIVER_MOD_CAP){
      const _flooredBase=-DRIVER_MOD_CAP-_accumNow;
      const _clawback=_flooredBase-d.driverBonus;
      d.driverBonus=_flooredBase;
      d.qualiBonus+=_clawback;
      d.raceNoGridBonus+=_clawback;
    }
    app._ageDeclineApplied[d.id]=newApplied;
    if(!app._eosModifierEvents)app._eosModifierEvents=[];
    // Label with the season just CONCLUDED (newSeasonYear-1), matching the convention used by
    // off-season storylines (applyDriverModEndOfSeason) — both fire at the same real
    // transition, and previously disagreed by one year in the exported log, making a single
    // transition's events look like they belonged to different seasons entirely.
    app._eosModifierEvents.push({kind:'driver',id:d.id,yr:newSeasonYear-1,delta,newMod:driverTotalMod(d.id),
      reason:delta<0?'Age decline':'Age decline offset (strong season)',ts:Date.now()});
  });
}

// canonical key) favour drivers of a particular nationality when hiring. This is a soft
// nudge, not a hard rule: it can (a) widen the realistic-candidate shortlist to admit a
// lower-modifier driver of the favoured nationality who'd otherwise fall short of the
// usual cutoff, and (b) tip the scales toward that nationality when two candidates are
// otherwise a similarly good fit. Keyed by DISPLAY name so the bias switches off the
// moment a team's alias changes (e.g. Jordan's bias lapses once it becomes Midland).

function getTeamNationalityBias(canonicalTeam,season){
  const display=teamDisplayName(canonicalTeam,season);

function getTeamDBEntry(name){
  if(!name)return null;

  return TEAMS_DATABASE.find(t=>t.name===canonical||t.name===name)||null;
}
// Helper: teams entering in a given year (firstYear===year)
function getNewTeamsForYear(year){
  const closedIds=new Set(app?._closedTeamIds||[]);

}

// Get available free agents for a given season (from DB, eligible, not retired)
function getSeasonFreeAgents(season){
  const retiredIds=new Set([
    ...(app._retiredDrivers||[]).map(r=>r.id),  // permanent ID (dbKey was legacy)
  ].filter(Boolean));
  // Use BOTH permanent IDs and dynamic IDs to exclude already-contracted drivers
  const usedIds=new Set([
    ...BASE_DRIVERS.map(d=>d.id),
    ...BASE_DRIVERS.map(d=>d.pid).filter(Boolean),
    ...(app._seasonFAPool||[]).map(f=>f.id).filter(Boolean),  // already in FA pool
    ...(app._seasonFAPool||[]).map(f=>f.pid).filter(Boolean),
  ]);
  return DRIVER_DATABASE.filter(d=>{
    if(!d.firstYear||d.firstYear>season)return false;
    // lastYear is reference data only — do NOT filter by it
    // Exclude drivers with no generation modifier (e.g. Streiff — historical record only)
    if(d.db===null||d.db===undefined)return false;
    const pid=d.id; // DRIVER_DATABASE entries always have permanent IDs now (V5 data)
    if(!pid)return false;
    if(retiredIds.has(pid)||retiredIds.has(d.ln))return false;
    if(usedIds.has(pid))return false;
    return true;
  }).map(d=>({
    ...d,
    id:d.id,
    pid:d.id,
    name:d.ln,
    firstName:d.fn,
    lastName:d.ln,
    teamBonus:0,preferredTeam:null,team:'Available',
    driverBonus:d.db,qualiBonus:d.db,raceNoGridBonus:d.db,
    _poolSince:(()=>{try{return app?.history?.weekends?.length>0?Math.min(...app.history.weekends.map(w=>w.raceMeta.year)):(app?.currentSeason||1989);}catch(e){return app?.currentSeason||1989;}})(),
  }));
}

// One-time repair for BASE_DRIVERS entries restored from a save that predates a fix where
// certain EoS-signed drivers were pushed without nation2/nation3 (only n2/n3 survived the
// spread), leaving them with no flag for the rest of the game. Backfills from DRIVER_DATABASE
// by id whenever nation2 is missing. Safe/no-op for correctly-populated entries.
function repairDriverFlags(drivers){
  (drivers||[]).forEach(d=>{
    if(d.nation2)return;
    const db=DRIVER_DATABASE.find(x=>x.id===(d.id||d.pid));
    if(db){
      d.nation2=db.n2||'';
      d.nation3=d.nation3||db.n3||'';
      if(!d.nationality)d.nationality=db.nat||'';
    }
  });
}

// ── NAME DISPLAY HELPERS ─────────────────────────────────────────────────
function driverFullName(d){
  if(!d)return'';
  if(d.firstName&&d.lastName)return d.firstName+' '+d.lastName;
  if(d.name&&d.name.trim())return d.name;
  // Fallback: look up in DRIVER_DATABASE by id
  if(d.id||d.pid){
    const db=DRIVER_DATABASE.find(x=>x.id===(d.id||d.pid));
    if(db&&db.fn&&db.ln)return db.fn+' '+db.ln;
    if(db&&db.fn)return db.fn;
  }
  return'';
}
function driverShortName(d){
  // "A. Surname" format for race screens
  if(d.firstName&&d.lastName)return d.firstName.charAt(0)+'. '+d.lastName;
  return d.name||'';
}
function driverSurname(d){return d.lastName||d.name||'';}

// mechanical-DNF-driven system (team/driver modifier penalties, the season DNF counter, the

function isMechanicalRetirement(status,retirementReason){

function clampAccumToCap(base,accum,cap){

// Merge any team modifier data stored under a non-canonical key (e.g. an alias/display
// name like 'Leyton House', vs its canonical 'March') into the canonical key. This fixes
// saves where team modifiers got fragmented across multiple keys for the same logical
// team — getTeamMod/applyTeamMod now always canonicalize, but existing saves may still
// have stale non-canonical entries from before that fix.
function migrateTeamModifierKeys(s){
  if(!s)return;
  if(s.teamModifiers){
    Object.keys(s.teamModifiers).forEach(k=>{
      const canon=teamCanonicalName(k);
      if(canon===k)return;
      const val=s.teamModifiers[k];
      s.teamModifiers[canon]=Math.round(((s.teamModifiers[canon]||0)+val)*100)/100;
      delete s.teamModifiers[k];
    });
  }
  if(s.modHistory&&s.modHistory.teams){
    Object.keys(s.modHistory.teams).forEach(k=>{
      const canon=teamCanonicalName(k);
      if(canon===k)return;
      const hist=s.modHistory.teams[k];
      if(!Array.isArray(hist)){delete s.modHistory.teams[k];return;}
      if(!Array.isArray(s.modHistory.teams[canon]))s.modHistory.teams[canon]=[];
      s.modHistory.teams[canon]=[...s.modHistory.teams[canon],...hist]
        .sort((a,b)=>(a.yr||0)-(b.yr||0)||(a.round||0)-(b.round||0));

// Repair existing saves affected by the inexperience re-registration bug: a driver who
// had already fully served their rookie decay once (their tracking entry deleted on
// completion) could be wrongly re-penalized with a fresh -0.50 if they later cycled back
// through the free-agent pool, since nothing permanently remembered they'd already paid
// their dues (fixed alongside this migration in registerFreeAgentDriver). Detect this by
// checking whether the driver's real total entry count already far exceeds 16 — a
// genuine first-time rookie wouldn't have accumulated that many races yet.
// Repair modHistory.teams entries left in the old malformed format ({delta,season} instead
// of {v,yr}) by now-removed code that used to double-count a new team's genMod. Any entry
// missing a proper 'v' field breaks every downstream season-gain calculation that reads
// the array (undefined + number = NaN), which is exactly what caused e.g. Jordan's
// 'season change' column to show NaN despite their overall modifier displaying correctly.
function migrateMalformedModHistory(s){
  if(!s.modHistory?.teams)return;
  Object.keys(s.modHistory.teams).forEach(team=>{
    const hist=s.modHistory.teams[team];

function migrateInexperiencePenalties(s){
  if(!s._inexperienceDrivers)return;
  if(!s._hasHadInexperience)s._hasHadInexperience={};
  const weekends=s.history?.weekends||[];
  Object.keys(s._inexperienceDrivers).forEach(idStr=>{
    const id=Number(idStr);
    const rec=s._inexperienceDrivers[id];
    if(!rec)return;
    let totalEntries=0;
    weekends.forEach(w=>{
      const inRace=(w.race||[]).some(r=>r.id===id);
      const inQuali=(w.qualifying||[]).some(r=>r.id===id);
      const inPreq=((w.prequalifying||[])).some(r=>r.id===id);
      if(inRace||inQuali||inPreq)totalEntries++;
    });
    if(totalEntries>20){
      if(rec.penalty<0){
        if(!s.driverModifiers)s.driverModifiers={};
        s.driverModifiers[id]=Math.round(((s.driverModifiers[id]||0)-rec.penalty)*100)/100;

// After app is initialized, rebuild BASE_DRIVERS/FREE_AGENTS for correct season
// and fix the random EuroBrun driver to match the saved choice
function postInitSetup(){
  const yr=app.currentSeason||1989;
  // Only rebuild from SEASONS data if that season has full driver data (contracted + teams).
  // Calendar-only stubs (e.g. 1992, 1996 used for real-calendar mode) don't have contracted lists —
  // calling buildDrivers() on them would fall through to the 1989 BASE and produce wrong drivers.
  // For those years, we keep whatever BASE_DRIVERS the season-advance logic already set up.
  const sd=SEASONS[yr];
  const hasFullData=sd&&sd.contracted&&sd.teams;
  if(hasFullData){
    BASE_DRIVERS=buildDrivers(yr);
    FREE_AGENTS=buildFreeAgents(yr);
  } else if(!sd){
    // Completely unknown season — fall back to 1989 base (shouldn't happen after loadApp fix)
    BASE_DRIVERS=buildDrivers(1989);
    FREE_AGENTS=buildFreeAgents(1989);
  }
  // else: calendar-only stub — leave BASE_DRIVERS as-is (already correct from season-advance logic)
  // Invalidate standings cache so new season starts clean
  invalidateStandingsCache();
  // One-time backfill for saves created before initial age-decline seeding existed: if
  // still in the game's first season (never reached an EoS transition, which is the only
  // other place age decline gets computed), apply it now against the starting roster.
  // Guarded to run only once ever per save — re-running mid-season would incorrectly
  // re-trigger the 'positive season so far' offset against a still-changing, not final,
  // season gain.
  if(!app._initialAgeDeclineSeeded){
    const gameStartYr=app.history.weekends.length>0?Math.min(...app.history.weekends.map(w=>w.raceMeta.year)):yr;
    if(yr===gameStartYr)applyAgeDeclineForNewSeason(yr,new Set());
    app._initialAgeDeclineSeeded=true;
  }
}
function saveApp(){
  // Strip transient runtime state — never needed in a saved file:
  //   _eos          — EoS UI state, always rebuilt on load
  //   currentWeekend — lap arrays live in saveLive() during play; after finishWeekend()
  //                    everything useful is already in app.history.weekends via recordWeekendHistory()
  const {_eos,currentWeekend,...appToSave}=app;
  const key=appKey();
  function tryWrite(obj){
    localStorage.setItem(key,JSON.stringify(obj));
    localStorage.setItem('f1dice_lastSeason',String(app.currentSeason||1989));
  }
  function stripLaps(weekends){
    return weekends.map(w=>({...w,
      prequalifying:(w.prequalifying||[]).map(d=>({...d,laps:[]})),
      qualifying:(w.qualifying||[]).map(d=>({...d,laps:[]})),
      race:(w.race||[]).map(d=>({...d,laps:[]})),
      sessions:w.sessions?Object.fromEntries(Object.entries(w.sessions).map(([k,v])=>[k,{...v,drivers:(v.drivers||[]).map(d=>({...d,laps:[]}))}])):w.sessions,
      log:[], // also drop race log — it's display-only
    }));
  }
  try{
    tryWrite(appToSave);
    return;
  }catch(e){}
  // Attempt 1: strip all lap arrays and logs from history (biggest space savers, and purely
  // display-only detail — the Race History page reads only position/total/points/status,
  // never lap-by-lap rolls, so this never affects which races remain viewable).
  try{

    console.warn('saveApp: saved without lap logs (quota pressure).');
    return;
  }catch(e){}
  // Attempt 2: also trim accumulated news — over a long playthrough this can be a real
  // contributor to save size (every race report, season summary, and retrospective ever
  // shown, each carrying full HTML). Safe to trim: the Race History page regenerates race
  // summaries directly from app.history.weekends and never reads app.news at all, so this
  // never removes access to a past race's results — only how far back the news FEED scrolls.
  try{
    const slim2={...appToSave,history:{...appToSave.history,weekends:stripLaps(appToSave.history?.weekends||[])},news:(appToSave.news||[]).slice(-30)};
    tryWrite(slim2);

    return;
  }catch(e){
    // Deliberately does NOT fall back to trimming history.weekends. Since export/import
    // is now the authoritative persistence mechanism, localStorage's only job is keeping
    // the current session alive across an accidental refresh — silently saving a version
    // with older races removed would look fine right up until the next reload, at which
    // point those races' data would be gone from the live app too, permanently, with no
    // warning. Failing loudly here instead is what makes 'export to be safe' meaningful.
    console.error('saveApp: could not fit save in local storage even after trimming laps and news — export a save file now to avoid losing progress on refresh.',e);

    }
  }
}

function chooseRetirementReason(d,s){
  const weather=app.currentWeekend?.raceMeta?.weather||'dry';
  const spinChance=weather==='heavy rain'?0.50:weather==='rain'?0.25:0.05;
  if(spinChance>0&&Math.random()<spinChance)return SPUN_OFF;
  // Fire — very rare, 0.1% chance, any session
  if(Math.random()<0.001)return 'Fire';
  // Out of fuel — rare, 1% chance, only on the final lap of the RACE (never in PQ/Q)
  const w=app.currentWeekend;
  const _curSess=w?.sessions?.[w.session];
  const _isFinalRaceLap=w?.session==='race'&&_curSess&&w.lap>=(_curSess.lapLimit||10);
  if(_isFinalRaceLap&&Math.random()<0.01)return 'Out of fuel';
  // Everything else splits the remaining probability uniformly. Includes collision/chassis
  // damage as possible causes — those just aren't counted as 'mechanical' downstream (see
  // isMechanicalRetirement), since they imply contact rather than a genuine failure.
  const nonSpecialReasons=RETIREMENT_REASONS.filter(r=>r!==SPUN_OFF&&r!=='Fire'&&r!=='Out of fuel');
  return nonSpecialReasons[Math.floor(Math.random()*nonSpecialReasons.length)];
}

const MOD_MECH_RETIRE_REPEAT=-0.08;
const MOD_BACKGRID_POINTS=0.12;     // bonus for scoring points from 18th+ on grid
const MOD_LOWLY_TEAM_POINTS=0.10;   // bonus for lowly teams (ttm <= -1.0) scoring championship points
const MOD_EARLY_WIN=1.00,MOD_EARLY_PODIUM=0.30,MOD_EARLY_PTS=0.10;
const MOD_INEXP_DRIVER=-0.50,MOD_INEXP_TEAM=-0.30;
const MOD_SD_WIN=0.25,MOD_SD_POD=0.15,MOD_SD_PTS=0.10,MOD_SD_START=0.04,MOD_SD_PQ=0.02;
const MOD_SD_TWIN=0.15,MOD_SD_TPOD=0.05;
const MIDWEEK_DRIVER_PROB=0.03,MIDWEEK_TEAM_PROB=0.03;
// Lookup: table[clamp(round(totalMod),-5,6)][tierIndex]
function scaledMod(table,totalMod,tier){
  // Interpolate between the two adjacent integer buckets rather than hard-rounding to the
  // nearest one — previously a driver at 2.49 and one at 2.51 landed in completely
  // different table rows with no transition, so near-identical modifiers could see
  // noticeably different bonus sizes. This smooths that edge while leaving the overall
  // table shape (and the fast-zone multiplier below) untouched.
  const clamped=Math.max(-5,Math.min(6,totalMod));
  const lo=Math.floor(clamped),hi=Math.ceil(clamped);
  const frac=clamped-lo;
  const baseLo=(table[String(lo)]&&table[String(lo)][tier])||0;
  const baseHi=(table[String(hi)]&&table[String(hi)][tier])||0;
  const base=lo===hi?baseLo:baseLo+(baseHi-baseLo)*frac;
  if(base===0)return 0;
  // Modifiers between -1.0 and +1.0 move faster — amplify by 1.4×.
  // Outside that band, movement gradually slows back toward normal (1.0×).
  // This creates a more volatile "developing" zone around zero and slower
  // movement at extremes where drivers/teams are more established.
  const absTotal=Math.abs(totalMod);
  let multiplier=1.0;
  if(absTotal<=1.0){
    multiplier=1.4; // fast zone: -1 to +1
  } else if(absTotal<=2.0){
    multiplier=1.4-0.4*(absTotal-1.0); // linear fade from 1.4→1.0 between ±1 and ±2
  }
  return Math.round(base*multiplier*100)/100;
}
function driverTotalMod(id){
  const d=BASE_DRIVERS.find(x=>x.id===id);
  if(d)return Math.round(((d.driverBonus||0)+(getDriverMod(id)||0))*100)/100;
  // Driver isn't currently in BASE_DRIVERS (quit/retired/released with no replacement yet)
  // — fall back to their cached last-known base modifier rather than silently returning 0,
  // which previously made a departed driver's total mod look wildly different across
  // different parts of the UI depending on which fallback (or lack of one) each happened
  // to use.
  const cachedBase=(app._lastKnownDriverBonus||{})[id];
  if(cachedBase!==undefined)return Math.round((cachedBase+(getDriverMod(id)||0))*100)/100;
  return Math.round((getDriverMod(id)||0)*100)/100;
}
function cacheDriverBonusBeforeRemoval(d){
  if(!d)return;
  if(!app._lastKnownDriverBonus)app._lastKnownDriverBonus={};
  app._lastKnownDriverBonus[d.id]=d.driverBonus||0;
}
function teamTotalMod(team){
  return Math.round((teamBaseTb(team)+(getTeamMod(team)||0))*100)/100;
}
// ── Driver form ──────────────────────────────────────────────────────────────
// Form = 75% of this season's modifier gain/loss so far + 25% of last season's total
// gain/loss. It's a trajectory signal (are they trending up or down right now),
// separate from driverTotalMod (their absolute current rating).
function driverCurrentSeasonGain(id){
  if(!app._seasonStartDriverMod||app._seasonStartDriverMod[id]===undefined)return 0;
  return driverTotalMod(id)-app._seasonStartDriverMod[id];
}
function driverPreviousSeasonGain(id){
  return (app._prevSeasonDriverGain&&app._prevSeasonDriverGain[id])||0;
}
// How many rounds has this driver actually been with this specific team, THIS season? Used
// to gate mechanics that judge a driver's results/behavior against a team — comparing stats
// accumulated partly (or entirely) at a PREVIOUS team is meaningless. No record on file, or a
// join from a prior season, is treated as long-serving (999) rather than 0, since the absence
// of a teamJoin incident means they were already established when this season's tracking began.
function roundsSinceTeamJoin(driverId,team,round){
  const incs=(app.driverIncidents||{})[driverId]||[];
  const joins=incs.filter(i=>i.type==='teamJoin'&&teamCanonicalName(i.details?.team||'')===teamCanonicalName(team));
  if(!joins.length)return 999;
  const lastJoin=joins[joins.length-1];
  if(lastJoin.year!==app.currentSeason)return 999;
  return round-(lastJoin.round||0);
}
function driverFormScore(id){
  const modBased=driverCurrentSeasonGain(id)*0.75+driverPreviousSeasonGain(id)*0.25;
  const extra=(app._seasonExtraFormPoints&&app._seasonExtraFormPoints[id])||0;
  return Math.round((modBased+extra)*100)/100;
}
// Category thresholds, as specified: good form +0.50 to +1.50, very good form above
// +1.50, poor form -0.50 to -1.50, very poor form below -1.50. Returns null for the
// neutral band in between (no label shown).
function driverFormCategory(form){
  if(form>1.5)return{tier:'very-good',label:'Very good form'};
  if(form>=0.5)return{tier:'good',label:'Good form'};
  if(form<=-1.5)return{tier:'very-poor',label:'Very poor form'};
  if(form<=-0.5)return{tier:'poor',label:'Poor form'};
  return null;
}
// Moderate blend for use when comparing/ranking candidate drivers (signing, poaching,
// release choices): real weight, but FORM_WEIGHT is deliberately small enough that a
// genuine modifier gap still dominates the comparison rather than being flipped by form.
const FORM_WEIGHT=0.3;
function driverEffectiveRating(id){
  return driverTotalMod(id)+driverFormScore(id)*FORM_WEIGHT;
}
// Genuine, probabilistic 'which candidate does the team back' choice: shortlist by raw
// modifier first (so form can only sway a decision among realistically comparable
// candidates, not pull in someone far weaker overall), then weight the actual pick by
// form. This is a real chance either way — not a deterministic re-ranking — so a team
// backing the higher-modifier driver over an in-form upstart (or vice versa) is a
// genuine possible outcome each time, not a fixed rule.
function pickWeightedByForm(candidates,ratingFn=(c)=>driverTotalMod(c.id),shortlistSize=3,bias=null){
  if(!candidates.length)return null;
  const sorted=[...candidates].sort((a,b)=>ratingFn(b)-ratingFn(a));
  let shortlist=sorted.slice(0,shortlistSize);
  if(bias){
    // Nationality bias: widen the shortlist by one extra slot for the best same-nationality
    // candidate who didn't make the normal cut — a lower-modifier compatriot still gets a look-in.
    const _inShortlist=new Set(shortlist.map(c=>c.id));
    const _biasedCandidate=sorted.find(c=>!_inShortlist.has(c.id)&&driverNationalityOf(c)===bias.nation);
    if(_biasedCandidate)shortlist=[...shortlist,_biasedCandidate];
  }
  const weights=shortlist.map(c=>{
    let w=Math.max(0.1,1+driverFormScore(c.id)*FORM_WEIGHT);
    if(bias&&driverNationalityOf(c)===bias.nation)w*=NATIONALITY_BIAS_WEIGHT[bias.level];
    return w;
  });
  const wTot=weights.reduce((a,b)=>a+b,0);
  let wr=Math.random()*wTot,wIdx=0;
  for(let j=0;j<weights.length;j++){wr-=weights[j];if(wr<=0){wIdx=j;break;}}
  return shortlist[Math.min(wIdx,shortlist.length-1)];
}
function applyDriverMod(id,delta){
  const baseDb=(BASE_DRIVERS.find(d=>d.id===id)?.driverBonus)||0;
  // Slow positive gains above +4.00 — climbing from +4.00 to +5.00 fades down to 30%
  // strength by the time you reach +5.00, so that level is a genuine rare achievement
  // rather than a routine extension of a good season. Losses are NOT slowed — a driver
  // up here still has to fully defend their position.
  if(delta>0){
    const _preDeltaTotalHigh=baseDb+(app.driverModifiers[id]||0);
    if(_preDeltaTotalHigh>=4.0){
      const _highMult=Math.max(0.3,1.0-(_preDeltaTotalHigh-4.0)*0.7);
      delta=Math.round(delta*_highMult*100)/100;
    }
  }
  let v=(app.driverModifiers[id]||0)+delta;
  // Cap the COMBINED modifier (base + accumulated) to ±DRIVER_MOD_CAP
  const combined=baseDb+v;
  if(combined>DRIVER_MOD_CAP)v=DRIVER_MOD_CAP-baseDb;
  if(combined<-DRIVER_MOD_CAP)v=-DRIVER_MOD_CAP-baseDb;
  // Season gain cap: a driver who is (or becomes) a +4.0 total modifier driver is capped
  // to +0.50 gain from whichever came first: their season-start total (if already >=4.0),
  // or the point they cross +4.0 mid-season. Previously only the season-start case was
  // checked, so a driver starting just under +4.0 could climb indefinitely once past it.
  if(delta>0){
    if(!app._seasonStartDriverMod)app._seasonStartDriverMod={};
    if(app._seasonStartDriverMod[id]===undefined){
      // First modifier this season — record start value before this change
      app._seasonStartDriverMod[id]=baseDb+(app.driverModifiers[id]||0);
    }
    const startTotal=app._seasonStartDriverMod[id];
    const preDeltaTotal=baseDb+(app.driverModifiers[id]||0);
    if(!app._seasonFourCapBase)app._seasonFourCapBase={};
    if(app._seasonFourCapBase[id]===undefined){
      if(startTotal>=4.0)app._seasonFourCapBase[id]=startTotal;
      else if(preDeltaTotal>=4.0)app._seasonFourCapBase[id]=4.0;
    }
    const capBase=app._seasonFourCapBase[id];
    if(capBase!==undefined){
      const maxTotal=capBase+0.50;
      if(baseDb+v>maxTotal)v=maxTotal-baseDb;
    }
  }
  v=Math.round(v*100)/100;
  app.driverModifiers[id]=v;
  if(!Array.isArray(app.modHistory.drivers[id])) app.modHistory.drivers[id]=[];
  const _dr=currentSeasonEntries().length+1;
  app.modHistory.drivers[id].push({round:_dr,v,yr:app.currentSeason||1989});
}
// Wraps applyDriverMod for changes applied BETWEEN seasons (e.g. a motivation boost from
// signing with a stronger team). Previously these used applyDriverMod directly, which
// stamped them with a nonsensical 'Round 17' (one past the season's last real round) and
// never appeared in the exported modifier log at all (recordMod requires an active race
// weekend, which doesn't exist at this point). This tags the entry so the graph can show
// '<year> end of season' instead, and mirrors the change into an exportable event log.
function applyDriverModEndOfSeason(id,delta,reason){
  applyDriverMod(id,delta);
  const yr=app.currentSeason||1989;
  const hist=app.modHistory.drivers[id];
  if(hist&&hist.length){
    const last=hist[hist.length-1];
    last.round=(seasonRules(yr).totalRounds||16)+1;
    last.yr=yr;
    last.eos=true;
  }
  if(!app._eosModifierEvents)app._eosModifierEvents=[];
  app._eosModifierEvents.push({kind:'driver',id,yr,delta,newMod:driverTotalMod(id),reason:reason||'End-of-season modifier change',ts:Date.now()});
}
function applyTeamMod(team,delta){
  const canon=teamCanonicalName(team);
  const baseTb=teamBaseTb(canon)||0;
  // Slow positive gains above +4.00 — same rationale as the driver-side version.
  if(delta>0){
    const _preDeltaTotalHighT=baseTb+(app.teamModifiers[canon]||0);
    if(_preDeltaTotalHighT>=4.0){
      const _highMultT=Math.max(0.3,1.0-(_preDeltaTotalHighT-4.0)*0.7);
      delta=Math.round(delta*_highMultT*100)/100;
    }
  }
  let v=(app.teamModifiers[canon]||0)+delta;
  // Cap the COMBINED modifier (base + accumulated) to ±TEAM_MOD_CAP
  const combined=baseTb+v;
  if(combined>TEAM_MOD_CAP)v=TEAM_MOD_CAP-baseTb;
  if(combined<-TEAM_MOD_CAP)v=-TEAM_MOD_CAP-baseTb;
  // Season gain cap: a team that is (or becomes) a +3.0 total modifier team is capped
  // to +0.50 gain from whichever came first: season-start total (if already >=3.0), or
  // the point they cross +3.0 mid-season.
  if(delta>0){
    if(!app._seasonStartTeamMod)app._seasonStartTeamMod={};
    if(app._seasonStartTeamMod[canon]===undefined){
      app._seasonStartTeamMod[canon]=baseTb+(app.teamModifiers[canon]||0);
    }
    const startTotal=app._seasonStartTeamMod[canon];
    const preDeltaTotal=baseTb+(app.teamModifiers[canon]||0);
    if(!app._seasonThreeCapBase)app._seasonThreeCapBase={};
    if(app._seasonThreeCapBase[canon]===undefined){
      if(startTotal>=3.0)app._seasonThreeCapBase[canon]=startTotal;
      else if(preDeltaTotal>=3.0)app._seasonThreeCapBase[canon]=3.0;
    }
    const capBase=app._seasonThreeCapBase[canon];
    if(capBase!==undefined){
      const maxTotal=capBase+0.50;
      if(baseTb+v>maxTotal)v=maxTotal-baseTb;
    }
  }
  v=Math.round(v*100)/100;
  app.teamModifiers[canon]=v;
  if(!Array.isArray(app.modHistory.teams[canon])) app.modHistory.teams[canon]=[];
  const _tr=currentSeasonEntries().length+1;
  app.modHistory.teams[canon].push({round:_tr,v,yr:app.currentSeason||1989});
}
// Team-side counterpart to applyDriverModEndOfSeason — see that function for rationale.
function applyTeamModEndOfSeason(team,delta,reason){

// Record a modifier into the current weekend's _raceEventMods with a session label
function recordMod(kind,id,name,delta,reason,session){
  if(!app.currentWeekend)return;
  if(!app.currentWeekend._raceEventMods)app.currentWeekend._raceEventMods=[];
  const newMod=Math.round((kind==='driver'?(app.driverModifiers[id]||0):(app.teamModifiers[name]||0))*100)/100;
  app.currentWeekend._raceEventMods.push({kind,id,name,delta,reason,session:session||'race',newMod});

// ── Extra form points ────────────────────────────────────────────────────────
// A second, independent layer on top of the modifier-driven form signal (driverCurrentSeasonGain
// / driverPreviousSeasonGain in driverFormScore below) — this one is driven directly by
// notable race-day RESULTS rather than accumulated modifier changes, so a driver can be
// recognised as 'hot' or 'cold' from results alone even before those results have fully
// worked their way into the modifier. Mutually exclusive per race on the positive side (win >
// podium > points from the back — only the best one applies, they don't stack) and similarly
// exclusive on the negative side (a crash at fault takes priority over a merely underwhelming
// drive, which takes priority over losing places relative to qualifying). Every effect is
// scaled by the driver's own total modifier: a positive result matters MORE for a weaker
// driver (a bigger surprise) and LESS for an already-elite one (more expected); a negative
// result is the mirror image — it costs a highly-rated driver more (more was expected of them)
// and costs a weaker driver less (more forgivable). The whole thing decays each race rather
// than accumulating forever, since this is meant to track recent momentum, not a season-long tally.
function _accumulateExtraForm(id,delta){
  if(!app._seasonExtraFormPoints)app._seasonExtraFormPoints={};
  const prev=app._seasonExtraFormPoints[id]||0;
  const next=Math.max(-3,Math.min(3,prev*0.8+delta));
  app._seasonExtraFormPoints[id]=Math.round(next*100)/100;
}
function applyExtraFormPoints(results,faultIds,fieldSize){
  const _posScale=mod=>Math.max(0.4,Math.min(1.8,1-mod*0.15));
  const _negScale=mod=>Math.max(0.4,Math.min(1.8,1+mod*0.15));
  results.forEach(r=>{
    const dtm=driverTotalMod(r.id);
    const active=r.status==='active';
    let delta=0;
    if(r.position===1){
      delta=0.5*_posScale(dtm);
    } else if(r.position===2||r.position===3){
      delta=0.3*_posScale(dtm);
    } else if(active&&r.points>0&&r.gridPos>=Math.ceil(fieldSize*0.5)){
      // Scored points despite starting in the back half of the field.
      delta=0.25*_posScale(dtm);
    } else if(r.status==='crashed'&&faultIds.has(r.id)){
      delta=-0.4*_negScale(dtm);
    } else if(r.status==='retired'&&r.retirementReason===SPUN_OFF){
      delta=-0.35*_negScale(dtm);
    } else if(active&&r.qualifyingPos&&r.qualifyingPos<99&&(r.position-r.qualifyingPos)>=5){
      // Lost significant ground relative to where they started — poor race execution.
      delta=-0.3*_negScale(dtm);
    } else if(active&&r.position>Math.floor(results.length*0.7)&&!(r.points>0)){
      // Finished deep in the back of a field they actually started/finished the race in,
      // without even the excuse of losing ground from a good qualifying — just a slow race.
      delta=-0.25*_negScale(dtm);
    }
    _accumulateExtraForm(r.id,delta);
  });
}
// ── Driver-team relationship: frequent per-race events ──────────────────
// Own-team events (points/podium/win, at-fault crash, mechanical DNF, form drag) plus the
// cross-team 'not at fault crash caused by a driver from another team' event — the other
// cross-team event (close championship battle) is handled separately in
// applyCloseChampionshipRelations since it needs full standings, not just this race's results.
function applyDriverTeamRelationEvents(results,faultIds,crashGroups){
  results.forEach(r=>{
    const team=r.team;
    if(!team||team==='Available')return;
    if(r.position===1){
      applyDriverTeamRelation(r.id,team,0.75,'Race win');
    } else if(r.position<=3){
      applyDriverTeamRelation(r.id,team,0.3,'Podium finish');
    } else if(r.points>0){
      applyDriverTeamRelation(r.id,team,0.15,'Points finish');
    }
    if(r.status==='crashed'&&faultIds.has(r.id)){
      applyDriverTeamRelation(r.id,team,-0.4,'At-fault crash');
    }
    const isMechanicalDNF=isMechanicalRetirement(r.status,r.retirementReason);
    if(isMechanicalDNF){
      applyDriverTeamRelation(r.id,team,-0.15,'Mechanical DNF');
    }
    const form=driverFormScore(r.id);
    if(form){
      applyDriverTeamRelation(r.id,team,Math.max(-0.3,Math.min(0.3,form*0.1)),'Form trend');
    }
  });
  // Not-at-fault crash victims resent the team of whoever caused it (only when that's a
  // different team — a teammate causing the crash is a separate, own-team story).
  (crashGroups||[]).forEach(g=>{
    const faultId=crashGroupFaultId(g);
    if(!faultId)return;
    const ids=crashGroupIds(g);
    const faultDriver=BASE_DRIVERS.find(x=>x.id===faultId)||results.find(r=>r.id===faultId);
    const faultTeam=faultDriver?.team;
    if(!faultTeam||faultTeam==='Available')return;
    ids.filter(id=>id!==faultId).forEach(id=>{
      const victim=results.find(r=>r.id===id);
      if(!victim)return;
      if(teamCanonicalName(victim.team)===teamCanonicalName(faultTeam))return; // teammate, not another team
      applyDriverTeamRelation(id,faultTeam,-0.15,'Not at fault in a crash caused by this team\'s driver');
    });
  });
}
// ── Driver-team relationship: close championship battle with a rival team's driver ──────
// Only checked in the final quarter of the season (same window the championship-race news
// uses). For every pair of genuine contenders on DIFFERENT teams, both directions take a
// small hit: each driver's relationship with the OTHER's team — not their own team, and not
// a driver-vs-driver rivalry (that's the existing separate rivalry system's job).
function applyCloseChampionshipRelations(year,round){
  const totalRounds=seasonRules().totalRounds||16;
  if(round<Math.ceil(totalRounds*0.75))return;
  const st=seasonStandings(year);
  const leaderPts=st.drivers[0]?.championshipPoints;
  if(leaderPts===undefined)return;
  const winPtsForYear=_scoringSummaryForYear(year).points[0]+(_effectiveHasFastestLap(year)?1:0);
  const gap=(totalRounds-round)*winPtsForYear;
  const contenders=(st.drivers||[]).filter(d=>(leaderPts-d.championshipPoints)<=gap);
  if(contenders.length<2)return;
  for(let i=0;i<contenders.length;i++){
    for(let j=i+1;j<contenders.length;j++){
      const a=contenders[i],b=contenders[j];
      const teamA=BASE_DRIVERS.find(x=>x.id===a.id)?.team;
      const teamB=BASE_DRIVERS.find(x=>x.id===b.id)?.team;
      if(!teamA||!teamB||teamA==='Available'||teamB==='Available')continue;
      if(teamCanonicalName(teamA)===teamCanonicalName(teamB))continue; // teammates — not a rival battle
      applyDriverTeamRelation(a.id,teamB,-0.15,'Close championship battle with a rival team');
      applyDriverTeamRelation(b.id,teamA,-0.15,'Close championship battle with a rival team');
    }
  }
}
function updateModifiersAfterRace(results){
  const _gameStartYrForBonuses=app.history.weekends.length>0?Math.min(...app.history.weekends.map(w=>w.raceMeta.year)):(app.currentSeason||1989);
  const isSecondSeasonPlus=app.currentSeason>_gameStartYrForBonuses||(app.history.weekends.filter(w=>w.raceMeta.year!==app.currentSeason).length>0);
  const rec=(kind,id,name,delta,reason)=>recordMod(kind,id,name,delta,reason,'race');
  // Fault ids for THIS race's crashes — same convention used by evaluateAndFireDrivers.
  const _thisRaceFaultIdsForForm=new Set((app.currentWeekend?._crashGroups||[]).map(g=>crashGroupFaultId(g)).filter(Boolean));
  const _raceFieldSizeForForm=results.length||seasonRules().raceField||26;

  applyDriverTeamRelationEvents(results,_thisRaceFaultIdsForForm,app.currentWeekend?._crashGroups||[]);
  results.forEach(r=>{
    const d=BASE_DRIVERS.find(x=>x.id===r.id);
    const dName=d?driverFullName(d):String(r.id);
    const tName=teamDisplayName(r.team);
    const dtm=driverTotalMod(r.id);
    const ttm=teamTotalMod(r.team);

    const tier=r.position===1?0:r.position<=3?1:r.position<=6?2:r.position<=12?3:4;
    const dnf=r.status!=='active';

    // their own dedicated driver penalty (applySpunOffDriverMod / applyCrashMod), so this
    // generic tier-4 race-result penalty must not ALSO apply or it double-penalizes the
    // same incident (previously it did, since neither condition actually excluded them below).
    const isMechanicalDNF=dnf&&isMechanicalRetirement(r.status,r.retirementReason);
    if(isMechanicalDNF){
      if(!app._seasonMechDNFCount)app._seasonMechDNFCount={};
      app._seasonMechDNFCount[r.id]=(app._seasonMechDNFCount[r.id]||0)+1;
      // Recorded using the same 'rounds completed so far' value evaluateAndFireDrivers uses
      // for its own 'round' variable (both run before recordWeekendHistory this same race),
      // so the two are directly comparable for the reliability-frustration quit window.
      if(!app._lastMechDNFRound)app._lastMechDNFRound={};
      app._lastMechDNFRound[r.id]=currentSeasonEntries().length;
    }
    const isSpunOff=dnf&&r.status==='retired'&&r.retirementReason===SPUN_OFF;
    const isCrashed=r.status==='crashed';
    const effectiveTier=dnf?4:tier;
    // Driver scaled delta
    let dd=(isMechanicalDNF||isSpunOff||isCrashed)?0:scaledMod(MOD_RACE_DRIVER,dtm,effectiveTier);
    // PQ advancers get no negative P13+ race-finish modifier — they've already proven
    // themselves by making it through both pre-qualifying and qualifying; finishing at the
    // back of the race itself on top of that isn't additionally penalized.
    if(dd<0&&!dnf&&effectiveTier===4&&(app.currentWeekend?._pqAdvancerIds||[]).includes(r.id))dd=0;
    // Inexperience: reduce positive race modifier by up to 75% for new drivers, decaying
    // over 16 entries — mirrors the same dampening already applied to qualifying gains.
    // Race results are the larger of the two channels, so without this a talented rookie
    // dropped into a strong car could still rise very fast on race-day results alone.
    if(dd>0&&app._inexperienceDrivers&&app._inexperienceDrivers[r.id]){
      const _ir=app._inexperienceDrivers[r.id];
      const _iDecay=Math.min(1.0,0.25+0.75*((_ir.entries||0)/16));
      dd=Math.round(dd*_iDecay*100)/100;
    }
    if(dd!==0){applyDriverMod(r.id,dd);rec('driver',r.id,dName,dd,dnf?'DNF':['Win','Podium','P4-6','P7-12','P13+'][effectiveTier]);}
    // At dtm <= -2.00, the table's tier-4 (DNF/P13+) value is exactly 0 for every level —
    // by far a struggling driver's most common outcome. Without this, a driver who
    // consistently finishes at the back and never scores points has no mechanism at all
    // to ever move, however many races they complete. A small nudge for simply finishing
    // the race (not DNFing/crashing/spinning off) breaks that permanent freeze.
    if(dd===0&&!dnf&&!isCrashed&&!isSpunOff&&dtm<=-2.00){
      const _survivalNudge=0.02;
      applyDriverMod(r.id,_survivalNudge);
      rec('driver',r.id,dName,_survivalNudge,'Race completed');
    }
    // Extra boost for negative-modifier drivers who score points:
    // Scale = (-dtm / 5) × (tier bonus factor). No season gain cap until dtm >= 0.
    // Win: 1.0×, Podium: 0.6×, P4-6: 0.3× base scale
    if(!dnf&&(r.points||0)>0&&dtm<0){
      const _negDepth=Math.min(5,Math.abs(dtm)); // 0–5 range
      const _perfFactor=tier===0?1.0:tier===1?0.6:tier===2?0.3:0;
      if(_perfFactor>0){
        const _negBonus=Math.round((_negDepth/5)*_perfFactor*0.40*100)/100; // max +0.40 for -5 winner (increased from +0.30)
        if(_negBonus>0){
          // Temporarily remove season gain cap for negative-modifier drivers (let them recover to 0)
          const _savedStart=app._seasonStartDriverMod?.[r.id];
          if(app._seasonStartDriverMod&&dtm<0)delete app._seasonStartDriverMod[r.id];
          applyDriverMod(r.id,_negBonus);
          // Re-apply cap guard (cap applies once they reach >= 0)
          if(_savedStart!==undefined&&(dtm+_negBonus)>=0&&app._seasonStartDriverMod){
            app._seasonStartDriverMod[r.id]=_savedStart;
          }
          rec('driver',r.id,dName,_negBonus,`Negative-mod points boost (${['Win','Podium','P4-6'][tier]})`);
        }
      }
    }
    // Team scaled delta — only best driver result (handled outside loop via bestTier tracking)
    // Special flat bonuses on top of scaled delta
    const fromPreq=(app.preqDriverIds||[]).includes(r.id);
    if(!dnf&&r.position<=6&&fromPreq){applyDriverMod(r.id,MOD_TOP6_FROM_PQ);rec('driver',r.id,dName,MOD_TOP6_FROM_PQ,'Top-6 from PQ');}
    // (Top-6 from back of grid team modifier bonus removed)
    if(!dnf&&r.qualifyingPos<=6&&r.position>10&&!fromPreq){applyDriverMod(r.id,MOD_UNDERPERF);rec('driver',r.id,dName,MOD_UNDERPERF,'Underperformed vs qualifying position');}
    // Backgrid points bonus: driver scored championship points from 18th or lower on grid
    if(!dnf&&(r.points||0)>0&&(r.gridPos||r.qualifyingPos||99)>=18){
      const _bgBonus=Math.round(Math.min(0.20,MOD_BACKGRID_POINTS+(dtm<-1?Math.floor(Math.abs(dtm+1))*0.03:0))*100)/100;
      applyDriverMod(r.id,_bgBonus);rec('driver',r.id,dName,_bgBonus,'Points from back of grid (P18+)');
    }
    // Early career
    if(isSecondSeasonPlus){
      const careerEntries=app.history.weekends.filter(w=>w.qualifying.some(q=>q.id===r.id)||w.prequalifying.some(p=>p.id===r.id)).length;
      if(careerEntries<10){
        if(r.position===1&&!(app._earlyCareerWinAwarded||{})[r.id]){
          if(!app._earlyCareerWinAwarded)app._earlyCareerWinAwarded={};
          app._earlyCareerWinAwarded[r.id]=true;
          applyDriverMod(r.id,MOD_EARLY_WIN);rec('driver',r.id,dName,MOD_EARLY_WIN,'First career win bonus');
        } else if(r.position<=3&&!(app._earlyCareerPodiumAwarded||{})[r.id]&&!(app._earlyCareerWinAwarded||{})[r.id]){
          if(!app._earlyCareerPodiumAwarded)app._earlyCareerPodiumAwarded={};
          app._earlyCareerPodiumAwarded[r.id]=true;
          applyDriverMod(r.id,MOD_EARLY_PODIUM);rec('driver',r.id,dName,MOD_EARLY_PODIUM,'First career podium bonus');
        } else if((r.points||0)>0&&!(app._earlyCareerPtsAwarded||{})[r.id]&&!(app._earlyCareerWinAwarded||{})[r.id]&&!(app._earlyCareerPodiumAwarded||{})[r.id]){
          // One-time only (previously could re-fire up to 3x, and could double-dip
          // with a win/podium bonus scored in the same race — both now fixed).
          if(!app._earlyCareerPtsAwarded)app._earlyCareerPtsAwarded={};
          app._earlyCareerPtsAwarded[r.id]=true;
          applyDriverMod(r.id,MOD_EARLY_PTS);rec('driver',r.id,dName,MOD_EARLY_PTS,'Early career points bonus');
        }
      }
    }
    // "Slow driving": a genuinely capable driver (total mod >= +1.00) who completes all
    // 10 laps (no DNF) but rolls poorly the whole race — raw dice total under 30 across
    // all laps, NOT including any modifiers. Scales from -0.025 at +1.00 total modifier
    // up to -0.075 at +6.00 (halved from the original -0.05 to -0.15, per request).
    if(!dnf&&dtm>=1.00){
      const _lapVals=(r.laps||[]).map(v=>Number(v)).filter(v=>!isNaN(v));
      if(_lapVals.length>=10){
        const _rawTotal=_lapVals.reduce((s,v)=>s+v,0);
        if(_rawTotal<30){
          const _clampedDtm=Math.min(6.00,Math.max(1.00,dtm));
          const _slowPenalty=Math.round((-0.025+(-0.05)*((_clampedDtm-1.00)/5.00))*100)/100;
          applyDriverMod(r.id,_slowPenalty);
          rec('driver',r.id,dName,_slowPenalty,`Slow driving (rolls: ${_rawTotal})`);
        }
      }
    }
  });
  // Team modifier — best driver result per team
  const byTeam={};
  const mechanicalDnfsByTeam={}; // tracked separately — see comment below on why
  results.forEach(r=>{
    const rDnf=r.status!=='active';
    const isMech=rDnf&&isMechanicalRetirement(r.status,r.retirementReason);
    const tier=rDnf?4:(r.position===1?0:r.position<=3?1:r.position<=6?2:r.position<=12?3:4);
    if(byTeam[r.team]===undefined||tier<byTeam[r.team].tier){
      byTeam[r.team]={tier,dnf:rDnf,mech:isMech};
    } else if(tier===byTeam[r.team].tier&&rDnf&&isMech){
      byTeam[r.team].mech=true; // either contributing driver being mechanical is enough to flag it
    }
    // Track every mechanical DNF independently, not just whichever happens to be the
    // team's best (lowest-tier) result — the best-tier tracking above completely discards
    // a mechanical DNF's info the moment a teammate's better result replaces the entry, so
    // a team with one reliability failure and one decent finish would otherwise face zero
    // penalty for the DNF at all, regardless of how bad it was.
    if(isMech){
      if(!mechanicalDnfsByTeam[r.team])mechanicalDnfsByTeam[r.team]=[];
      mechanicalDnfsByTeam[r.team].push(r);
    }
  });
  Object.entries(byTeam).forEach(([team,{tier,dnf:teamDnf,mech}])=>{
    const ttm=teamTotalMod(team);
    const tName=teamDisplayName(team);
    // A team DNF caused purely by a crash (or spin) gets no generic team penalty here —
    // crashes are a driver-level concern (the at-fault driver is already penalized
    // separately) and shouldn't also cost the team modifier. A DNF caused by a
    // mechanical retirement gets an INCREASED penalty instead, since that reflects a
    // genuine reliability problem for the team.
    if(teamDnf&&!mech)return;
    const tdBase=scaledMod(MOD_RACE_TEAM,ttm,tier);
    const td=(teamDnf&&mech)?Math.round(tdBase*1.5*100)/100:tdBase;
    if(td!==0){applyTeamMod(team,td);recordMod('team',null,tName,td,teamDnf?(mech?'Mechanical DNF':'DNF'):['Win','Podium','P4-6','P7-12','P13+'][tier],'race');}
    // Negative modifier team/driver points bonus: scales by how far below zero
    // Teams: points bonus scale = 0.10 base + 0.05 per full point below -1.0
    if(ttm<=-1.0&&tier<=2){
      const teamPts=results.filter(r=>teamCanonicalName(r.team)===teamCanonicalName(team)&&(r.points||0)>0);
      if(teamPts.length>0){
        const _teamBonus=Math.round(Math.min(0.30,MOD_LOWLY_TEAM_POINTS+Math.floor(Math.abs(ttm+1))*0.05)*100)/100;
        applyTeamMod(team,_teamBonus);
        recordMod('team',null,tName,_teamBonus,'Negative-mod team scored points','race');
      }
    }
  });
  // Mechanical DNFs hidden by a teammate's better result get their own penalty here —
  // the best-tier loop above only ever flags 'mech' when the mechanical DNF itself is the
  // team's best (lowest-tier) result. If a teammate finished better, that better result
  // completely replaced the DNF's entry, so the mechanical failure would otherwise cost
  // the team nothing at all regardless of how bad it was.
  Object.entries(mechanicalDnfsByTeam).forEach(([team,dnfResults])=>{
    if(byTeam[team]&&byTeam[team].mech)return; // already counted via the best-tier record above
    const ttm=teamTotalMod(team);
    const tName=teamDisplayName(team);
    const tdBase=scaledMod(MOD_RACE_TEAM,ttm,4);
    const td=Math.round(tdBase*1.5*100)/100;
    if(td!==0){applyTeamMod(team,td);recordMod('team',null,tName,td,'Mechanical DNF','race');}
  });

  // Consecutive-races-without-scoring penalty for teams at +1.00+ modifier: a small,
  // scaled penalty if a strong team fails to score ANY points for 5 consecutive races.
  // The streak resets when the penalty triggers, but — unlike the PQ-failure penalty,
  // which caps at 2/season — this can trigger multiple times in a season if the team
  // stays off the board.
  {
    if(!app._seasonNoPointsStreak)app._seasonNoPointsStreak={};
    const _teamsThisRaceNP=[...new Set(results.map(r=>teamCanonicalName(r.team)))];
    _teamsThisRaceNP.forEach(team=>{
      const ttmNP=teamTotalMod(team);
      if(ttmNP<1.00){app._seasonNoPointsStreak[team]=0;return;}
      const teamScoredThisRace=results.some(r=>teamCanonicalName(r.team)===team&&(r.points||0)>0);
      if(teamScoredThisRace){
        app._seasonNoPointsStreak[team]=0;
        return;
      }
      const streakNP=(app._seasonNoPointsStreak[team]||0)+1;
      if(streakNP>=5){
        const _noPtsPenalty=Math.min(0.20,0.05+(ttmNP-1.00)*0.03);
        applyTeamMod(team,-_noPtsPenalty);
        recordMod('team',null,teamDisplayName(team),-_noPtsPenalty,'Failed to score for 5 consecutive races','race');
        app._seasonNoPointsStreak[team]=0; // reset — but can trigger again this season
      } else {
        app._seasonNoPointsStreak[team]=streakNP;
      }
    });
  }

  // Hated rivals: a small modifier swing for beating (or losing to) a driver you hate,
  // based on relative finishing position this race. Only applies if BOTH drivers are in
  // the main race field (i.e. both actually started/classified this race — a rival who
  // DNQ'd doesn't count, since they never got the chance to be beaten).
  if(app.rivalries){
    const MOD_RIVAL_BEAT=0.05,MOD_RIVAL_LOST=-0.05;
    const _processedRivalPairs=new Set();
    Object.entries(app.rivalries).forEach(([key,rv])=>{
      if(!rv||!rv.hatred)return;
      if(_processedRivalPairs.has(key))return;
      _processedRivalPairs.add(key);
      const [idA,idB]=key.split(':').map(Number);
      const rA=results.find(r=>r.id===idA);
      const rB=results.find(r=>r.id===idB);
      if(!rA||!rB)return; // both must be in the main race field this round
      if(rA.position===rB.position)return;
      const [winner,loser]=rA.position<rB.position?[rA,rB]:[rB,rA];
      applyDriverMod(winner.id,MOD_RIVAL_BEAT);
      const wD=BASE_DRIVERS.find(x=>x.id===winner.id);
      rec('driver',winner.id,wD?driverFullName(wD):String(winner.id),MOD_RIVAL_BEAT,'Finished ahead of hated rival');
      applyDriverMod(loser.id,MOD_RIVAL_LOST);
      const lD=BASE_DRIVERS.find(x=>x.id===loser.id);
      rec('driver',loser.id,lD?driverFullName(lD):String(loser.id),MOD_RIVAL_LOST,'Finished behind hated rival');
    });
  }
  // Team rivals: same idea, using each team's best-placed car this race. Team rivalries
  // have no permanent lock, so this checks CURRENT points (>=75) rather than a fixed flag.
  if(app.teamRivalries){
    const MOD_TEAM_RIVAL_BEAT=0.05,MOD_TEAM_RIVAL_LOST=-0.05;
    const byTeamBestMod={};
    results.forEach(r=>{
      const t=teamCanonicalName(r.team);
      if(byTeamBestMod[t]===undefined||r.position<byTeamBestMod[t].position)byTeamBestMod[t]=r;
    });
    const _processedTeamRivalPairs=new Set();
    Object.entries(app.teamRivalries).forEach(([key,rv])=>{
      if(!rv||rv.pts<75)return;
      if(_processedTeamRivalPairs.has(key))return;
      _processedTeamRivalPairs.add(key);
      const [teamA,teamB]=key.split('::');
      const rA=byTeamBestMod[teamA],rB=byTeamBestMod[teamB];
      if(!rA||!rB)return; // both teams must have a car classified this race
      if(rA.position===rB.position)return;
      const [winnerTeam,loserTeam]=rA.position<rB.position?[teamA,teamB]:[teamB,teamA];
      applyTeamMod(winnerTeam,MOD_TEAM_RIVAL_BEAT);
      recordMod('team',null,teamDisplayName(winnerTeam),MOD_TEAM_RIVAL_BEAT,'Beat hated rival team','race');
      applyTeamMod(loserTeam,MOD_TEAM_RIVAL_LOST);
      recordMod('team',null,teamDisplayName(loserTeam),MOD_TEAM_RIVAL_LOST,'Lost to hated rival team','race');
    });
  }
}
function applyRetirementTeamMod(driver,session){
  const team=(driver.base&&driver.base.team)||driver.team;
  if(!team||team==='Available'||typeof team!=='string')return;
  const retReason=driver.retirementReason||'';
  const isMechanical=isMechanicalRetirement('retired',retReason)&&session==='race';
  // A mechanical race retirement's generic penalty is skipped here — the separate
  // post-race 'best driver per team' loop already applies its own tier-scaled Mechanical
  // DNF penalty for this exact case, so applying both meant every mechanical DNF cost the
  // team twice. Non-mechanical race retirements (spin/crash) and all PQ/qualifying
  // session retirements still use this generic penalty, since nothing else covers those.
  if(!isMechanical){
    const delta=session==='prequalifying'?MOD_RET_PQ:session==='qualifying'?MOD_RET_QUALI:MOD_RET_RACE;
    applyTeamMod(team,delta);
    const dName=(driver.base&&(driver.base.firstName||driver.base.lastName))?driverFullName(driver.base||driver):(driver.firstName?' '+driver.lastName:'driver');
    recordMod('team',null,teamDisplayName(team),delta,`${escapeHtml(dName)} retired`,session);
  }
  // Cumulative penalty for repeated mechanical DNFs — starts from 5th DNF, sliding scale, season max -1.00
  // DNF 5: -0.10, DNF 6: -0.15, DNF 7: -0.20, DNF 8: -0.25, DNF 9: -0.15, DNF 10+: -0.15 (capped at -1.00 total)
  if(isMechanical){
    const canon=teamCanonicalName(team);
    if(!app._seasonMechRetire)app._seasonMechRetire={};
    if(!app._seasonMechRetirePenalty)app._seasonMechRetirePenalty={};
    const cnt=(app._seasonMechRetire[canon]||0)+1;
    app._seasonMechRetire[canon]=cnt;
    if(cnt>=5){
      const totalSoFar=app._seasonMechRetirePenalty[canon]||0;
      const remaining=Math.min(0,-1.00-totalSoFar); // how much penalty budget is left (negative, or 0 once exhausted)
      if(remaining<0){
        // Sliding scale per DNF from 5th onward: 0.10, 0.15, 0.20, 0.25, then 0.15 each
        const perDnf=[0.10,0.15,0.20,0.25][cnt-5]||0.15;
        const extra=-Math.min(perDnf,-remaining); // don't exceed the -1.00 cap
        if(extra!==0){
          app._seasonMechRetirePenalty[canon]=totalSoFar+extra;
          applyTeamMod(team,extra);
          recordMod('team',null,teamDisplayName(team),extra,`Mechanical DNF #${cnt} this season`,session);
        }
      }
    }
  }
  // Driver-side mechanical DNF tracking for PQ/qualifying retirements, feeding the
  // reliability-frustration quit mechanic's season count. Race retirements are already
  // counted in updateModifiersAfterRace, so this only covers the other two sessions —
  // otherwise a single incident could be double-counted. Note this can never itself be the
  // 'last straw' trigger for that quit mechanic (a driver who retires in PQ/Q isn't in that
  // round's race, so the round numbers can never line up) — it only ever feeds the count.
  if(session!=='race'&&isMechanicalRetirement('retired',retReason)){
    const _driverIdForMechCount=driver.base?.id??driver.id;
    if(_driverIdForMechCount!=null){
      if(!app._seasonMechDNFCount)app._seasonMechDNFCount={};
      app._seasonMechDNFCount[_driverIdForMechCount]=(app._seasonMechDNFCount[_driverIdForMechCount]||0)+1;
      if(!app._lastMechDNFRound)app._lastMechDNFRound={};
      app._lastMechDNFRound[_driverIdForMechCount]=currentSeasonEntries().length;
    }
  }
}
function applySpunOffDriverMod(driverId){
  if(driverId==null)return;
  applyDriverMod(driverId,MOD_SPUN_OFF);
  const d=BASE_DRIVERS.find(x=>x.id===driverId);
  const sess=app.currentWeekend?.session||'race';

}
function updateModifiersForPole(driverId,team){
