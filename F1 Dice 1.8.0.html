// ── RIVALRY SYSTEM ───────────────────────────────────────────────────────
// No pre-coded rivalries — all rivalries develop organically through race events.

function rivalryKey(a,b){return a<b?`${a}:${b}`:`${b}:${a}`;}
function getRivalry(idA,idB){if(!app.rivalries)return null;return app.rivalries[rivalryKey(idA,idB)]||null;}
// Precisely find which temp driver is covering for a SPECIFIC injured driver on a team —
// checks each temp driver's own contract for a matching replacingId, rather than blindly
// grabbing any temp driver on the team (which breaks when a team has multiple simultaneous
// temp covers, e.g. two injured regulars at once).
function findPreciseTempCoverage(teamName,injuredId){
  const canon=teamCanonicalName(teamName);
  // A driver can never be their own replacement — matters when a temp driver themselves
  // later gets injured and needs covering (e.g. hired to cover one injury, then injured
  // themselves): without this exclusion they'd still appear in teamTemps and could match
  // themselves via the fallback below if no precise contract match is found.
  const teamTemps=BASE_DRIVERS.filter(x=>x._temp&&x.id!==injuredId&&teamCanonicalName(x.team)===canon);
  const precise=teamTemps.find(x=>{
    const c=app._activeContracts?.[x.id];
    return c&&c.replacingId===injuredId;
  });
  if(precise)return precise;
  const preciseLoan=teamTemps.find(x=>{
    const l=app._activeLoans?.[x.id];
    return l&&l.replacingId===injuredId;
  });
  if(preciseLoan)return preciseLoan;
  // No precise match found in contracts/loans at all — last resort, any OTHER temp on the team
  return teamTemps[0]||null;
}
function crashGroupHasRivalry(ids){
  for(let i=0;i<ids.length;i++){
    for(let j=i+1;j<ids.length;j++){
      const rv=getRivalry(ids[i],ids[j]);
      if(rv&&(rv.hatred||rv.pts>=20))return true;
    }
  }
  return false;
}
function crashGroupHasTeammates(ids){
  for(let i=0;i<ids.length;i++){
    for(let j=i+1;j<ids.length;j++){
      const dA=BASE_DRIVERS.find(d=>d.id===ids[i]);
      const dB=BASE_DRIVERS.find(d=>d.id===ids[j]);
      if(dA&&dB&&dA.team&&dB.team&&teamCanonicalName(dA.team)===teamCanonicalName(dB.team))return true;
    }
  }
  return false;
}
function crashGroupLabel(ids){
  if(crashGroupHasTeammates(ids))return'Teammate Crash!';
  if(crashGroupHasRivalry(ids))return'Rival Crash!';
  return'Crash!';
}

function rivalryLevel(pts){
  if(pts>=75)return'Hatred';
  if(pts>=50)return'Dislike';
  if(pts>=25)return'Tension';
  return null;
}

function rivalryColour(level){
  if(level==='Hatred')return'#dc2626';
  if(level==='Dislike')return'#d97706';
  if(level==='Tension')return'#6b7280';
  return'#94a3b8';
}

function addRivalryPoints(idA,idB,delta,reason,newsItems){
  if(!app.rivalries)app.rivalries={};
  const key=rivalryKey(idA,idB);
  if(!app.rivalries[key]){
    app.rivalries[key]={pts:0,hatred:false,started:null,ended:null,history:[]};
  }
  const r=app.rivalries[key];
  const oldPts=r.pts;
  const oldLevel=r.hatred?'Hatred':rivalryLevel(oldPts);
  // Round: use currentSeasonEntries().length + 1 since the race isn't saved yet
  const round=currentSeasonEntries().length+1;
  const year=app.currentSeason||1989;

  r.pts=Math.max(0,Math.min(100,r.pts+delta));

  // Lock hatred permanently
  if(oldLevel==='Hatred'||r.pts>=75)r.hatred=true;
  if(r.hatred)r.pts=Math.max(75,r.pts); // floor at 75 once hatred

  const newLevel=r.hatred?'Hatred':rivalryLevel(r.pts);
  const _findDriver=id=>BASE_DRIVERS.find(d=>d.id===id)||(app._seasonFAPool||[]).find(d=>d.id===id)||FREE_AGENTS.find(d=>d.id===id)||DRIVER_DATABASE.find(d=>d.id===id)||getHistoryRaceFlat().find(r=>r.id===id);
  const na=_findDriver(idA);
  const nb=_findDriver(idB);
  const nameA=na?(na.lastName||na.ln||na.driver||driverSurname(na)||'?'):'?';
  const nameB=nb?(nb.lastName||nb.ln||nb.driver||driverSurname(nb)||'?'):'?';

  r.history.push({year,round,delta,reason,pts:r.pts});

  // wasNew: this call is what first pushed the rivalry to a named level
  const wasNew=!oldLevel&&!!newLevel;

  // Rivalry started — only when crossing into Tension (≥25) for the first time
  if(wasNew){
    r.started={year,round,reason};r.ended=null;
    // Log rivalry start as a driver incident for both drivers
    recordDriverIncident(idA,'rivalryStart',{otherId:idB,reason,year,round});
    recordDriverIncident(idB,'rivalryStart',{otherId:idA,reason,year,round});
    if(newLevel&&newsItems)newsItems.push(`⚔ <strong>New rivalry:</strong> ${escapeHtml(nameA)} vs ${escapeHtml(nameB)} — <span style="color:${rivalryColour(newLevel)}">${newLevel}</span> (${escapeHtml(reason)})`);
  }
  // Level changed — only if the rivalry already existed before this call and not started this same round
  else if(!wasNew&&oldLevel&&newLevel&&oldLevel!==newLevel){
    const startedThisRound=r.started&&r.started.year===year&&r.started.round===round;
    if(!startedThisRound){
      const levelOrder={Tension:1,Dislike:2,Hatred:3};
      const rising=(levelOrder[newLevel]||0)>(levelOrder[oldLevel]||0);
      const verb=rising?'Rivalry escalates':'Rivalry cools';
      if(newsItems)newsItems.push(`⚔ <strong>${verb}:</strong> ${escapeHtml(nameA)} vs ${escapeHtml(nameB)} ${oldLevel} → <span style="color:${rivalryColour(newLevel)}">${newLevel}</span>`);
    }
  }
  // Rivalry ended (dropped below 25, not hatred) — but not within 2 rounds of starting
  const tooNew=r.started&&r.started.year===year&&(round-r.started.round)<2;
  if(oldLevel&&!newLevel&&!r.hatred&&!tooNew){
    r.ended={year,round};
    if(newsItems)newsItems.push(`⚔ <strong>Rivalry ends:</strong> ${escapeHtml(nameA)} vs ${escapeHtml(nameB)}.`);
  }
}

function decayRivalries(newsItems){
  if(!app.rivalries)return;
  Object.keys(app.rivalries).forEach(key=>{
    const r=app.rivalries[key];
    if(r.hatred)return; // Hatred never decays
    if(r.pts<=0)return;
    const decay=Math.floor(Math.random()*3)+1; // 1-3
    const [a,b]=key.split(':').map(Number);
    addRivalryPoints(a,b,-decay,'Natural decay',newsItems);
  });
}

function evaluateRaceDayRivalries(raceResults, crashedIds, newsItems){
  const round=currentSeasonEntries().length;
  const weather=app.currentWeekend?.raceMeta?.weather||'dry';
  const wetFactor=(weather==='heavy rain'||weather==='rain')?0.5:1;

  // 1. Crash rivalry — only pair drivers who were in THE SAME crash incident
  const crashGroups=app.currentWeekend?._crashGroups||[];
  // Fall back to treating all crashed drivers as one group if no group data
  const groups=(crashGroups.length>0?crashGroups.map(g=>crashGroupIds(g)):(crashedIds&&crashedIds.length>=2?[crashedIds]:[]));
  groups.forEach(group=>{
    const groupCrash=crashGroups.find(g=>{const ids=crashGroupIds(g);return ids.length===group.length&&ids.every(id=>group.includes(id));});
    const faultId=groupCrash?crashGroupFaultId(groupCrash):undefined;
    const noFault=groupCrash&&faultId===null; // explicitly no-fault (25% of 2-car crashes)
    for(let i=0;i<group.length;i++){
      for(let j=i+1;j<group.length;j++){
        const dA=BASE_DRIVERS.find(d=>d.id===group[i]);
        const dB=BASE_DRIVERS.find(d=>d.id===group[j]);
        const areTeammates=dA&&dB&&dA.team===dB.team;
        const minPts=areTeammates?20:10;
        const maxPts=areTeammates?95:75; // teammates: 20-95, others: 10-75
        let pts=Math.round((Math.floor(Math.random()*(maxPts-minPts))+minPts)*wetFactor);
        // No-fault crashes generate half the rivalry points — racing incident, less blame
        if(noFault)pts=Math.max(1,Math.round(pts/2));
        addRivalryPoints(group[i],group[j],pts,
          'Crash'+(areTeammates?' — teammates':''),
          newsItems);
      }
    }
  });

  // 2. Close race finish: P1 and P2 within 0.25 on raw die scores (excluding modifiers)
  if(raceResults.length>=2){
    const p1=raceResults.find(r=>r.position===1);
    const p2=raceResults.find(r=>r.position===2);
    if(p1&&p2){
      const rawP1=(p1.totalNumeric||0)-(p1.bonus||0);
      const rawP2=(p2.totalNumeric||0)-(p2.bonus||0);
      const margin=Math.abs(rawP1-rawP2);
      if(margin<=0.25){
        const pts=Math.floor(Math.random()*10)+1;
        addRivalryPoints(p1.id,p2.id,pts,'Extremely close race finish',newsItems);
      }
      // Close race between existing rivals (within 1.00)
      const r12=getRivalry(p1.id,p2.id);
      if(r12&&r12.pts>=25&&margin<=1.00){
        const pts=Math.floor(Math.random()*10)+1;
        addRivalryPoints(p1.id,p2.id,pts,'Rivals fight for victory',newsItems);
      }
    }
    // Close finish between rivals at 6th/7th
    const p6=raceResults.find(r=>r.position===6);
    const p7=raceResults.find(r=>r.position===7);
    if(p6&&p7){
      const r67=getRivalry(p6.id,p7.id);
      if(r67&&r67.pts>=25){
        const margin=Math.abs((p6.totalNumeric||0)-(p7.totalNumeric||0));
        if(margin<=1.00){
          const pts=Math.floor(Math.random()*10)+1;
          addRivalryPoints(p6.id,p7.id,pts,'Points battle between rivals',newsItems);
        }
      }
    }
  }

  // 3. Paddock drama: 0.2% chance per driver pair, maximum one event per race
  const activeIds=raceResults.map(r=>r.id);
  let paddockDramaFired=false;
  const pairs=[];
  for(let i=0;i<activeIds.length;i++)for(let j=i+1;j<activeIds.length;j++)pairs.push([activeIds[i],activeIds[j]]);
  // Shuffle pairs so the cap doesn't always favour lower IDs
  for(let k=pairs.length-1;k>0;k--){const r=Math.floor(Math.random()*(k+1));[pairs[k],pairs[r]]=[pairs[r],pairs[k]];}
  for(const [idA,idB] of pairs){
    if(paddockDramaFired)break;
    if(Math.random()<0.002){
      const pts=Math.floor(Math.random()*24)+1;
      addRivalryPoints(idA,idB,pts,'Paddock drama',newsItems);
      paddockDramaFired=true;
    }
  }

  // 4. Teammate drama: 2% chance per teammate pair
  const teamMap={};
  raceResults.forEach(r=>{
    const d=BASE_DRIVERS.find(x=>x.id===r.id);
    if(!d)return;
    if(!teamMap[d.team])teamMap[d.team]=[];
    teamMap[d.team].push(r.id);
  });
  Object.values(teamMap).forEach(ids=>{
    for(let i=0;i<ids.length;i++)for(let j=i+1;j<ids.length;j++){
      if(Math.random()<0.02){
        const pts=Math.floor(Math.random()*10)+1;
        addRivalryPoints(ids[i],ids[j],pts,'Teammate drama',newsItems);
      }
    }
  });

  // 5. Rival drama: 4% chance between existing rivals
  if(app.rivalries){
    Object.keys(app.rivalries).forEach(key=>{
      const r=app.rivalries[key];
      if(r.pts<25)return;
      if(Math.random()<0.04){
        const pts=Math.floor(Math.random()*24)+1;
        const [a,b]=key.split(':').map(Number);
        addRivalryPoints(a,b,pts,'Rival drama',newsItems);
      }
    });
  }

  // 6. Decay all rivalries after race
  decayRivalries(newsItems);
}

function evaluateTeamRivalries(raceResults, crashedIds, newsItems){
  const round=currentSeasonEntries().length;

  // 1. Close finish / fight for victory between the two teams' best-placed cars
  if(raceResults.length>=2){
    const byTeamBest={};
    raceResults.forEach(r=>{
      const t=teamCanonicalName(r.team);
      if(byTeamBest[t]===undefined||r.position<byTeamBest[t].position)byTeamBest[t]=r;
    });
    const bestRows=Object.entries(byTeamBest).map(([t,r])=>({team:t,...r})).sort((a,b)=>a.position-b.position);
    if(bestRows.length>=2){
      const t1=bestRows[0],t2=bestRows[1];
      // Compare full modifier-inclusive totals — NOT raw dice with the bonus subtracted
      // back out. A close finish should reflect a close overall result (skill/car
      // included), not two teams coincidentally rolling similar dice while one had a
      // much stronger modifier carrying them to a clearly bigger margin.
      const margin=Math.abs((t1.totalNumeric||0)-(t2.totalNumeric||0));
      if(margin<2.00){
        const pts=Math.floor(Math.random()*10)+1;
        addTeamRivalryPoints(t1.team,t2.team,pts,'Extremely close race finish',newsItems);
      }
    }
  }

  // 2. Close constructors' championship battle (late season, existing rivals only)
  if(round>=Math.ceil((seasonRules().totalRounds||16)*0.5)){
    const st=seasonStandings(app.currentSeason||1989);
    const teams=(st.teams||[]).slice(0,8);
    for(let i=0;i<teams.length;i++){
      for(let j=i+1;j<teams.length;j++){
        const rt=getTeamRivalry(teams[i].name,teams[j].name);
        if(rt&&rt.pts>=25){
          const gap=Math.abs((teams[i].championshipPoints||0)-(teams[j].championshipPoints||0));
          if(gap<=10*_scoringScaleForYear(app.currentSeason||1989)){
            const pts=Math.floor(Math.random()*10)+1;
            addTeamRivalryPoints(teams[i].name,teams[j].name,pts,'Points battle between rival teams',newsItems);
          }
        }
      }
    }
  }

  // 3. Crash between drivers of different teams
  const crashGroups=app.currentWeekend?._crashGroups||[];
  const groups=(crashGroups.length>0?crashGroups.map(g=>crashGroupIds(g)):(crashedIds&&crashedIds.length>=2?[crashedIds]:[]));
  groups.forEach(group=>{
    for(let i=0;i<group.length;i++){
      for(let j=i+1;j<group.length;j++){
        const dA=BASE_DRIVERS.find(d=>d.id===group[i]);
        const dB=BASE_DRIVERS.find(d=>d.id===group[j]);
        if(!dA||!dB||teamCanonicalName(dA.team)===teamCanonicalName(dB.team))continue;
        const pts=Math.floor((Math.random()*30+5)*0.5);
        addTeamRivalryPoints(dA.team,dB.team,pts,'Crash',newsItems);
      }
    }
  });

  // 4. Paddock drama: small chance per active team pair, max one event per race
  const activeTeams=[...new Set(raceResults.map(r=>teamCanonicalName(r.team)))];
  let dramaFired=false;
  const teamPairs=[];
  for(let i=0;i<activeTeams.length;i++)for(let j=i+1;j<activeTeams.length;j++)teamPairs.push([activeTeams[i],activeTeams[j]]);
  for(let k=teamPairs.length-1;k>0;k--){const r=Math.floor(Math.random()*(k+1));[teamPairs[k],teamPairs[r]]=[teamPairs[r],teamPairs[k]];}
  for(const [tA,tB] of teamPairs){
    if(dramaFired)break;
    if(Math.random()<0.0015){
      const pts=Math.floor(Math.random()*24)+1;
      addTeamRivalryPoints(tA,tB,pts,'Paddock drama',newsItems);
      dramaFired=true;
    }
  }

  decayTeamRivalries(newsItems);
}

function rivalrySummaryForDriver(id){
  if(!app.rivalries)return[];
  return Object.entries(app.rivalries)
    .filter(([key])=>key.split(':').map(Number).includes(id))
    .map(([key,r])=>{
      const [a,b]=key.split(':').map(Number);
      const otherId=a===id?b:a;
      const other=BASE_DRIVERS.find(d=>d.id===otherId)
        ||(app._retiredDrivers||[]).find(d=>d.id===otherId)
        ||(app._seasonFAPool||[]).find(d=>d.id===otherId)
        ||DRIVER_DATABASE.find(d=>d.id===otherId);
      const otherName=other
        ?driverFullName(other)||(other.fn||'')+' '+(other.ln||other.name||'')
        :`Driver ${otherId}`;
      return{otherId,otherName,pts:r.pts,hatred:r.hatred,started:r.started,ended:r.ended,level:r.hatred?'Hatred':rivalryLevel(r.pts),startReason:r.started?.reason||''};
    })
    .filter(r=>r.pts>=25||r.ended||r.hatred)
    .sort((a,b)=>b.pts-a.pts);
}

function isRivalryBlocked(idA,idB){
  const r=getRivalry(idA,idB);
  if(!r)return false;
  return r.hatred; // hatred = cannot join same team as free agents
}

function rivalryJoinPenalty(idA,idB){
  // Returns a weight penalty for team assignment (higher = less likely same team)
  const r=getRivalry(idA,idB);
  if(!r||r.pts<25)return 0;
  if(r.pts>=75)return 100; // hatred = blocked
  if(r.pts>=50)return 60;  // dislike = strongly prefer not
  return 30;               // tension = less likely
}

// ── TEAM RIVALRY SYSTEM ──────────────────────────────────────────────────
// Mirrors the driver rivalry system (same triggers, same point scale/tiers) with two
// deliberate differences: decay is slower, and there is NO permanent 'hatred' lock —
// a team rivalry can fully fade away given enough time apart, unlike a driver hatred
// rivalry which floors at 75 forever once reached.
function teamRivalryKey(a,b){const ca=teamCanonicalName(a),cb=teamCanonicalName(b);return ca<cb?`${ca}::${cb}`:`${cb}::${ca}`;}
function getTeamRivalry(teamA,teamB){if(!app.teamRivalries)return null;return app.teamRivalries[teamRivalryKey(teamA,teamB)]||null;}
function teamRivalryLevel(pts){
  if(pts>=75)return'Hatred';
  if(pts>=50)return'Dislike';
  if(pts>=25)return'Tension';
  return null;
}
function addTeamRivalryPoints(teamA,teamB,delta,reason,newsItems){
  const ca=teamCanonicalName(teamA),cb=teamCanonicalName(teamB);
  if(ca===cb)return;
  if(!app.teamRivalries)app.teamRivalries={};
  const key=teamRivalryKey(ca,cb);
  if(!app.teamRivalries[key]){
    app.teamRivalries[key]={pts:0,started:null,ended:null,history:[]};
  }
  const r=app.teamRivalries[key];
  const oldPts=r.pts;
  const oldLevel=teamRivalryLevel(oldPts);
  const round=currentSeasonEntries().length+1;
  const year=app.currentSeason||1989;
  r.pts=Math.max(0,Math.min(100,r.pts+delta));
  const newLevel=teamRivalryLevel(r.pts);
  const nameA=teamDisplayName(ca)||ca,nameB=teamDisplayName(cb)||cb;
  r.history.push({year,round,delta,reason,pts:r.pts});
  const wasNew=!oldLevel&&!!newLevel;
  if(wasNew){
    r.started={year,round,reason};r.ended=null;
    if(newsItems)newsItems.push(`⚔ <strong>New team rivalry:</strong> ${escapeHtml(nameA)} vs ${escapeHtml(nameB)} — <span style="color:${rivalryColour(newLevel)}">${newLevel}</span> (${escapeHtml(reason)})`);
  } else if(!wasNew&&oldLevel&&newLevel&&oldLevel!==newLevel){
    const rising=r.pts>oldPts;
    const verb=rising?'Team rivalry escalates':'Team rivalry cools';
    if(newsItems)newsItems.push(`⚔ <strong>${verb}:</strong> ${escapeHtml(nameA)} vs ${escapeHtml(nameB)} ${oldLevel} → <span style="color:${rivalryColour(newLevel)}">${newLevel}</span>`);
  }
  const tooNew=r.started&&r.started.year===year&&(round-r.started.round)<2;
  if(oldLevel&&!newLevel&&!tooNew){
    r.ended={year,round};
    if(newsItems)newsItems.push(`⚔ <strong>Team rivalry ends:</strong> ${escapeHtml(nameA)} vs ${escapeHtml(nameB)}.`);
  }
  // Track hatred-tier crossings specifically, separate from general tier start/end —
  // used to keep the team career log focused on hatred only, not every tier change.
  const wasHatred=oldLevel==='Hatred',isHatred=newLevel==='Hatred';
  if(!wasHatred&&isHatred){r.hatredStarted={year,round,reason};r.hatredEnded=null;}
  if(wasHatred&&!isHatred){r.hatredEnded={year,round};}
}
function decayTeamRivalries(newsItems){
  if(!app.teamRivalries)return;
  Object.keys(app.teamRivalries).forEach(key=>{
    const r=app.teamRivalries[key];
    if(r.pts<=0)return;
    // Exactly 50% the pace of driver decay: same 1-3 point range, but only applies half
    // the time (0.5 × avg 2 = 1.0/race, vs driver's always-on 1.0 × avg 2 = 2.0/race).
    if(Math.random()<0.5)return;
    const decay=Math.floor(Math.random()*3)+1; // 1-3
    const [a,b]=key.split('::');
    addTeamRivalryPoints(a,b,-decay,'Natural decay',newsItems);
  });
}
function teamRivalrySummary(team){
  if(!app.teamRivalries)return[];
  const canon=teamCanonicalName(team);
  return Object.entries(app.teamRivalries)
    .filter(([key])=>key.split('::').includes(canon))
    .map(([key,r])=>{
      const [a,b]=key.split('::');
      const otherTeam=a===canon?b:a;
      return{otherTeam,pts:r.pts,started:r.started,ended:r.ended,level:teamRivalryLevel(r.pts),startReason:r.started?.reason||'',hatredStarted:r.hatredStarted,hatredEnded:r.hatredEnded};
    })
    .filter(r=>r.pts>=25||r.ended)
    .sort((a,b)=>b.pts-a.pts);
}

// ── DRIVER-TEAM RELATIONSHIP ─────────────────────────────────────────────
// Background-only metric (never shown to the player) tracking how a specific driver and a
// specific team feel about each other, career-long (never reset between seasons — same
// persistence model as app.rivalries above). Starts at 50 (neutral) on first contact; 0-49 is
// negative, 51-100 is positive, distance from 50 scales everything.
//
// Two distinct damping mechanisms, deliberately different shapes:
//  - EVENT damping (_relDamping): an event that pushes the score further in the direction
//    it's already leaning is damped harder the further out it already is — this is what makes
//    the 40-60 band 'sticky' to leave. An event pulling back TOWARD 50 is never damped, so
//    repair is always easier than escalation.
//  - DRIFT (driftDriverTeamRelations, once per season for every stored pair): passive forgetting
//    over time with no new events. Unlike event damping, drift is SLOWER the further from 50 a
//    score already is — a mild grudge fades in a season or two, a genuine hatred (or a real
//    bond) stays remembered for years. This is intentionally the opposite shape from event
//    damping: hard to CREATE an extreme, and once created, slow to fade on its own.
function relKey(driverId,team){return `${driverId}::${teamCanonicalName(team)}`;}
function getDriverTeamRelation(driverId,team){
  if(!app.driverTeamRelations)return null;
  return app.driverTeamRelations[relKey(driverId,team)]||null;
}
function driverTeamRelationScore(driverId,team){
  return getDriverTeamRelation(driverId,team)?.score??50;
}
// Damping factor for an event of a given (signed) delta applied to a given current score.
// Only damps when the delta pushes AWAY from 50 (same sign as (score-50)); an event pulling
// back toward 50 gets full, undamped effect.
function _relEventDampFactor(score,delta){
  if(delta===0)return 1;
  const pushingAway=(score-50)*delta>0;
  if(!pushingAway)return 1;
  const dist=Math.abs(score-50);
  return Math.max(0.15,1-dist/60);
}
function applyDriverTeamRelation(driverId,team,delta,reason){
  if(!driverId||!team||team==='Available')return;
  const canon=teamCanonicalName(team);
  if(!app.driverTeamRelations)app.driverTeamRelations={};
  const key=relKey(driverId,canon);
  if(!app.driverTeamRelations[key])app.driverTeamRelations[key]={score:50,history:[]};
  const rel=app.driverTeamRelations[key];
  const damped=delta*_relEventDampFactor(rel.score,delta);
  const next=Math.max(0,Math.min(100,rel.score+damped));
  rel.score=Math.round(next*100)/100;
  const year=app.currentSeason||1989;
  const round=currentSeasonEntries().length+1;
  rel.history.push({year,round,delta:Math.round(damped*100)/100,rawDelta:delta,reason,score:rel.score});
  if(rel.history.length>200)rel.history=rel.history.slice(-200); // cap growth over a long career
}
// Passive drift toward 50 for every stored pair — called once per season transition.
function driftDriverTeamRelations(){
  if(!app.driverTeamRelations)return;
  const BASE_DRIFT_RATE=0.12; // up to 12% of the remaining gap per season, before extremity damping
  Object.values(app.driverTeamRelations).forEach(rel=>{
    const dist=Math.abs(rel.score-50);
    if(dist<0.5)return;
    const extremityFactor=Math.max(0.12,1-dist/60); // slower drift the further from 50
    const drift=(50-rel.score)*BASE_DRIFT_RATE*extremityFactor;
    rel.score=Math.round(Math.max(0,Math.min(100,rel.score+drift))*100)/100;
  });
}
// Maps a relation score to a signed effect in [-maxMagnitude, +maxMagnitude], with a
// deliberate dead zone across 40-60 (returns 0 — 'minimal within 40-60' by design) and a
// linear ramp outside it: a good relation (>60) returns positive, a bad one (<40) returns
// negative, scaling toward maxMagnitude as the score approaches the extremes. Callers combine
// this with their own multiplier shape (e.g. quitChance *= (1 - relationEffect(score,0.6))).
function relationEffect(score,maxMagnitude){
  if(score>=40&&score<=60)return 0;
  const dist=score<40?(40-score):(score-60); // 0..40
  const sign=score<40?-1:1;
  return sign*maxMagnitude*(dist/40);
}

// ── DRIVER MOVEMENT SYSTEM ────────────────────────────────────────────────

// ── MID-SEASON: INJURY/SUSPENSION REPLACEMENT ─────────────────────────────
// app._activeContracts: {driverId: {replacingId, racesLeft, originalTeam, originalListOrder}}
// app._faCallupCount: {driverId: count} — tracks FA->team->FA->team cycles this season
// app._seasonFAPool: [{...dbEntry, id}] — current season free agent pool

function initSeasonFAPool(){
  if(!app._seasonFAPool||!app._seasonFAPool.length){
    app._seasonFAPool=getSeasonFreeAgents(app.currentSeason||1989);
  }
}

function faEligible(faId){
  const count=(app._faCallupCount||{})[faId]||0;
  return count<2; // FA->team->FA->team = 2 contracts; third time ineligible
}

// Hidden (never shown to the player) chance that a driver simply won't rejoin a team, driven
// by the driver-team relationship score rather than a fixed schedule: a badly damaged
// relationship (score well below 40) makes rejoining statistically unlikely, tapering to no
// effect at all once the score is back in the neutral 40-60 band (relationEffect's dead zone).
// The same-season hard block above is unrelated to this and always applies regardless of score.
function _relationRejoinBlockChance(driverId,team){
  return Math.max(0,-relationEffect(driverTeamRelationScore(driverId,team),0.85));
}
function findReplacement(team, excludeIds, permanent){
  initSeasonFAPool();
  const pool=(app._seasonFAPool||[]).filter(fa=>{
    if(excludeIds.includes(fa.id))return false;
    if(!faEligible(fa.id))return false;
    // Cannot return to a team they were fired/quit from earlier this season
    if((app._seasonTeamBlocklist?.[fa.id]||[]).includes(teamCanonicalName(team)))return false;
    // Hidden reluctance to rejoin a team the relationship with is currently poor
    if(Math.random()<_relationRejoinBlockChance(fa.id,team))return false;
    if(permanent){
      const teammates=BASE_DRIVERS.filter(d=>d.team===team&&!excludeIds.includes(d.id));
      if(teammates.some(t=>isRivalryBlocked(t.id,fa.id)))return false;
    }
    return true;
  });
  if(!pool.length)return null;
  // Final-3-rounds bias: prefer a driver who hasn't participated in ANY session this
  // season at all — a struggling team cutting ties late tends to reach for an unproven
  // fresh face over someone who's already had (and presumably not made much of) their
  // chances this year. Only a bias, not a hard requirement — falls back to the full pool
  // if no fresh candidates exist.
  const _currentRoundFR=currentSeasonEntries().length+1;
  const _totalRoundsFR=seasonRules().totalRounds||16;
  let effectivePool=pool;
  if(_currentRoundFR>_totalRoundsFR-3){
    const _hasParticipatedThisSeason=faId=>app.history.weekends.some(w=>w.raceMeta.year===app.currentSeason&&
      ((w.race||[]).some(r=>r.id===faId)||(w.qualifying||[]).some(q=>q.id===faId)||(w.prequalifying||[]).some(p=>p.id===faId)));
    const freshPool=pool.filter(fa=>!_hasParticipatedThisSeason(fa.id));
    if(freshPool.length)effectivePool=freshPool;
  }
  // Auto-qualifying teams: prefer best available modifier (positive first, then closest to 0)
  const teamData=seasonData().teams[teamCanonicalName(team)];
  const teamIsPQ=teamData?teamData.pq:false;
  const bias=getTeamNationalityBias(teamCanonicalName(team),app.currentSeason);
  if(!teamIsPQ){
    return pickWeightedByForm(effectivePool,fa=>fa.driverBonus||0,3,bias);
  }
  // PQ teams: random selection, lightly nudged by nationality bias
  if(bias){
    const weights=effectivePool.map(f=>driverNationalityOf(f)===bias.nation?NATIONALITY_BIAS_WEIGHT[bias.level]:1);
    const wTot=weights.reduce((a,b)=>a+b,0);
    let wr=Math.random()*wTot,wIdx=0;
    for(let j=0;j<weights.length;j++){wr-=weights[j];if(wr<=0){wIdx=j;break;}}
    return effectivePool[Math.min(wIdx,effectivePool.length-1)];
  }
  return effectivePool[Math.floor(Math.random()*effectivePool.length)];
}

function hireReplacement(fa, team, racesLeft, replacingId){
  if(!app._faCallupCount)app._faCallupCount={};
  // Only count against the 2-team temporary limit for genuine temp contracts.
  // Permanent season hires (racesLeft===999) are not temporary and don't use a temp slot.
  const isTemp=racesLeft<999;
  if(isTemp)app._faCallupCount[fa.id]=(app._faCallupCount[fa.id]||0)+1;
  // First time this FA driver enters play (temp OR permanent): register inexperience
  // penalty if applicable. Previously this only fired for temp callups, so a driver
  // signed permanently straight from the initial free-agent pool (never having gone
  // through generateEndOfSeasonFreeAgents) never got registered at all.
  if(!app._inexperienceDrivers||app._inexperienceDrivers[fa.id]===undefined){
    registerFreeAgentDriver(fa.id);
  }
  if(!app._activeContracts)app._activeContracts={};
  const _existingContract=app._activeContracts[fa.id];
  if(_existingContract&&_existingContract.replacingId!=null&&replacingId!=null&&_existingContract.replacingId!==replacingId){
    // This driver is already actively covering a DIFFERENT injured driver — a temp
    // driver can't cover two seats at once. Refusing to overwrite prevents the contract
    // from silently pointing at the wrong person (which would then show up as e.g. the
    // wrong 'temporary contract ends' name when the ORIGINAL covered driver returns).
    console.log('[DEBUG] hireReplacement: driver',fa.id,'already covering',_existingContract.replacingId,'- refusing to overwrite with replacingId',replacingId);
  } else {
    // Derive expiresAfterRound directly from the SPECIFIC injured driver's own injury
    // record (fromRound + missRaces) whenever one exists, rather than trusting the
    // racesLeft parameter as passed through the call chain. This is a defensive
    // safeguard for the rare case of two teammates being injured in quick succession —
    // each contract's expiry is always independently re-derived from its own
    // replacingId's actual injury data, so there's no way for two simultaneous hires to
    // have their durations cross-contaminated by a bug anywhere upstream of this point.
    let _expiresAfterRound=currentSeasonEntries().length+racesLeft+1;
    if(replacingId!=null){
      const _replInj=app.driverInjuries?.[replacingId];
      if(_replInj&&typeof _replInj.missRaces==='number'&&_replInj.fromRound!=null){
        _expiresAfterRound=_replInj.fromRound+_replInj.missRaces;
      }
    }
    app._activeContracts[fa.id]={replacingId,racesLeft,team,expiresAfterRound:_expiresAfterRound};
  }
  // Capture BEFORE mutating BASE_DRIVERS — used below to only log a career 'Joined'
  // milestone once per genuine new hire (hireReplacement can be called again for a
  // driver already on the roster, e.g. contract bookkeeping updates, which previously
  // logged a spurious second 'Joined' entry at whatever round that call happened to run).
  const _isNewHireForLog=!BASE_DRIVERS.find(d=>d.id===fa.id);
  // Add to BASE_DRIVERS temporarily
  if(!BASE_DRIVERS.find(d=>d.id===fa.id)){
    const tb=teamBaseTb(team); // use season base team bonus only
    // Do NOT add liveTeamMod (app.teamModifiers) here — sessionDriver adds it live.
    // Baking it in would double-count it: once in qualiBonus/raceNoGridBonus and
    // again via tFull = base.teamBonus + tModRaw in sessionDriver.
    const db=fa.driverBonus||0;
    const qb=db+tb; // driver base + team base only (same as eosComputeSignings)
    const replacingDriver=replacingId?BASE_DRIVERS.find(d=>d.id===replacingId):null;
    const _dbLookupHr=DRIVER_DATABASE.find(x=>x.id===fa.id);
    const _fnHr=fa.fn||fa.firstName||_dbLookupHr?.fn||'';
    const _lnHr=fa.ln||fa.lastName||fa.name||_dbLookupHr?.ln||'';
    BASE_DRIVERS.push({
      id:fa.id,pid:fa.pid||fa.id,listOrder:replacingDriver?replacingDriver.listOrder:39,firstName:_fnHr,lastName:_lnHr,name:_lnHr,
      nation2:fa.n2||fa.nation2||'',nation3:fa.n3||fa.nation3||'',team,dob:fa.dob||0,
      driverBonus:db,teamBonus:tb,qualiBonus:qb,raceNoGridBonus:qb,
      preferredTeam:fa.pref||null,isFreeAgent:true,_temp:isTemp,
      bonusBreakdownQuali:`D${db>=0?'+':''}${db} T${tb>=0?'+':''}${tb}`,
      bonusBreakdownRaceBase:`D${db>=0?'+':''}${db} T${tb>=0?'+':''}${tb}`,
    });
    // Driver-team relationship: mark the start of this pairing. A temp cover gets a light
    // touch; a permanent signing that's a genuine step up for the driver gets the same
    // 'given a chance at a bigger team' treatment as EOS upgrades/PQ promotions, otherwise
    // just a modest 'new signing' bump.
    if(isTemp){
      applyDriverTeamRelation(fa.id,team,2,'Temporary contract begins');
    } else {
      const stepUp=tb-db;
      if(stepUp>1.0){
        applyDriverTeamRelation(fa.id,team,Math.min(8,4+stepUp*1.5),'Given a chance at a bigger team');
      } else {
        applyDriverTeamRelation(fa.id,team,3,'Signed mid-season');
      }
    }
  }
  // Remove from available pool
  if(app._seasonFAPool)app._seasonFAPool=app._seasonFAPool.filter(f=>f.id!==fa.id);

  // ── PQ status inheritance ──────────────────────────────────────────────
  // A replacement driver inherits PQ status if their team is currently in PQ.
  // Three checks (any one is sufficient):
  //  1. The driver being replaced is currently in preqDriverIds (injury/temp covers)
  //  2. The team (by display OR canonical name) still has a driver in preqDriverIds
  //     (covers permanent hires where the fired driver was already removed)
  //  3. Pre-recalc: the team has pq:true in season data (covers last-driver-left scenarios)
  if(app.preqDriverIds){
    const _canon=teamCanonicalName(team);
    // Check 1: replacing driver still in list (temp covers)
    const replacingIsInPQ=replacingId&&app.preqDriverIds.includes(replacingId);
    // Check 2: team has any remaining PQ driver (by display name OR canonical name)
    const pqTeamsByDisplay=new Set(app.preqDriverIds.map(id=>BASE_DRIVERS.find(dx=>dx.id===id)?.team).filter(Boolean));
    const pqTeamsByCanon=new Set(app.preqDriverIds.map(id=>teamCanonicalName(BASE_DRIVERS.find(dx=>dx.id===id)?.team||'')).filter(Boolean));
    const teamCurrentlyInPQ=pqTeamsByDisplay.has(team)||pqTeamsByCanon.has(_canon);
    // Check 3: hardcoded season pq flag is ONLY valid for Round 1 of the game's actual
    // start year (1989 or 1991) — that's the one moment it's meant to set up initial PQ
    // status. After that, PQ is entirely dynamic (driven by results/recalc), so this must
    // not be treated as an ongoing truth for later rounds or later seasons. Previously this
    // used seasonData() with no year (defaulting to the CURRENT season), which for any
    // season without its own hardcoded data (e.g. 1990) silently fell back to reusing the
    // start year's ORIGINAL team data indefinitely — meaning a team that had already
    // escaped PQ via the mid-season recalc would still be treated as a PQ team forever
    // after, in every later season, until a driver happened to trigger Check 1/2 instead.
    let _gameStartYrForPQ=1989;
    try{_gameStartYrForPQ=app?.history?.weekends?.length>0?Math.min(...app.history.weekends.map(w=>w.raceMeta.year)):(app?.currentSeason||1989);}catch(e){}
    const _isVeryFirstRoundOfGame=(app.currentSeason||_gameStartYrForPQ)===_gameStartYrForPQ&&currentSeasonEntries().length===0;
    const sd2=seasonData(_gameStartYrForPQ);
    const teamIsPQBySeason=_isVeryFirstRoundOfGame&&!!(sd2.teams&&sd2.teams[_canon]?.pq);
    // Check 4: the seat's previous occupant left while the team was in PQ (covers
    // one-driver teams like EuroBrun, where no teammate id survives to detect this).
    // Expires after 3 rounds — this flag is only meant to bridge the gap between a
    // driver leaving and a replacement being hired for that SAME vacancy; without an
    // expiry, it could go stale and incorrectly grant PQ status to a much later,
    // unrelated hire if the team's actual PQ status changed in the meantime (e.g. via
    // the mid-season recalc, which also explicitly clears this flag directly).
    const _vacatedAtRound=app._vacatedPQTeams?.[_canon];
    const teamRecentlyVacatedPQ=_vacatedAtRound!=null&&(currentSeasonEntries().length-_vacatedAtRound)<=3;
    const shouldInheritPQ=replacingIsInPQ||teamCurrentlyInPQ||teamIsPQBySeason||teamRecentlyVacatedPQ;
    if(shouldInheritPQ&&!app.preqDriverIds.includes(fa.id)){
      app.preqDriverIds.push(fa.id);
    }
    if(teamRecentlyVacatedPQ)delete app._vacatedPQTeams[_canon];
    // While the temp covers an injured/suspended driver, remove the original from the
    // active PQ list so they don't ghost into PQ while out. They're restored in releaseReplacement.
    if(replacingId&&app.preqDriverIds.includes(replacingId)){
      app.preqDriverIds=app.preqDriverIds.filter(id=>id!==replacingId);
    }
  }

  // Determine the actual debut round. ensureAllSeatsFilledBeforeWeekend calls this BEFORE
  // the upcoming round starts, where currentSeasonEntries().length+1 correctly IS that
  // debut round. But an immediate mid-race hire (injury/firing replacement hired DURING
  // the current round's processing) can't retroactively join a race already underway —
  // their actual first race is the round after. Detect this by checking whether
  // currentWeekend is actively mid-race for the round the naive formula would produce.
  const _naiveDebutRound=currentSeasonEntries().length+1;
  // Note: deliberately NOT gated on !weekendFinished. Post-race seat-filling (e.g.
  // ensureAllSeatsFilledBeforeWeekend called from finishWeekend) runs AFTER
  // weekendFinished is set true but BEFORE this round is recorded into history, so
  // currentSeasonEntries().length+1 still naively equals the just-finished round. Any
  // hire happening while currentWeekend still IS that round — mid-race or already
  // finished — can't debut in a race that's already underway or over, so it always
  // needs the +1 correction below.
  const _isMidRaceForThatRound=app.currentWeekend&&app.currentWeekend.raceMeta&&app.currentWeekend.raceMeta.round===_naiveDebutRound&&app.currentWeekend.session;
  const _debutRound=_isMidRaceForThatRound?_naiveDebutRound+1:_naiveDebutRound;
  // Log team join for career log — only for a genuinely new hire, not a repeat call
  // for a driver already rostered (previously logged a duplicate 'Joined' entry). Checks
  // both BASE_DRIVERS presence AND existing incident history for this exact team+season,
  // since a driver already actively covering one vacancy could otherwise be selected
  // again for a second, separate vacancy on the same team and get double-logged.
  const _alreadyLoggedThisTeamSeason=(app.driverIncidents?.[fa.id]||[]).some(inc=>
    inc.type==='teamJoin'&&inc.year===(app.currentSeason||1989)&&teamCanonicalName(inc.details?.team||'')===teamCanonicalName(team));
  if(_isNewHireForLog&&!_alreadyLoggedThisTeamSeason){
    const _replacedInj=replacingId?app.driverInjuries?.[replacingId]:null;
    const isSuspRep=!!(_replacedInj&&_replacedInj.cause==='suspension');
    const isInjRep=!!(replacingId&&!isSuspRep);
    recordDriverIncident(fa.id,'teamJoin',{team,round:_debutRound,year:app.currentSeason||1989,isInjuryReplacement:isInjRep,isSuspensionReplacement:isSuspRep});
    // Reset DNQ/DNPQ season counters on a genuine new join — these drive the "too many
    // DNQs/DNPQs" release check, and must only reflect this driver's tenure at THIS team,
    // not appearances racked up earlier this season at a previous team (or before being
    // dropped and re-signed). Without this, a driver who joined mid-season could be flagged
    // for release almost immediately based on a count that predates them joining.
    if(app._seasonDNQCount)app._seasonDNQCount[fa.id]=0;
    if(app._seasonDNPQCount)app._seasonDNPQCount[fa.id]=0;
  }
  
  // Log driver movement — uses the hire-event round (when the signing actually happened),
  // not the corrected debut round used for the career log display below.
  const reason=replacingId?'injury-replacement':racesLeft===999?'mid-season-hire':'temporary-cover';
  recordDriverMovement(fa.id,'hired','Available',team,reason,_naiveDebutRound,app.currentSeason||1989);

  // Rivalry: new-teammate trigger
  const newTeammates=BASE_DRIVERS.filter(d=>d.team===team&&d.id!==fa.id&&!d._temp);
  newTeammates.forEach(tm=>{
    const rv=getRivalry(fa.id,tm.id);
    if(rv&&rv.pts>=25){
      // Existing Tension or Dislike: randomly add OR subtract 1–24
      const delta=(Math.random()<0.5?1:-1)*(Math.floor(Math.random()*24)+1);
      const reason=delta>0?'Teammate tension flares':'Teammates find common ground';
      addRivalryPoints(fa.id,tm.id,delta,reason,null);
    }
    // Track as new pairing regardless (for future hooks)
    if(!app._teammateHistory)app._teammateHistory={};
  if(!app.realism)app.realism={realDrivers:false,realCalendar:false,realCircuits:false};
    const pKey=rivalryKey(fa.id,tm.id);
    if(!app._teammateHistory[pKey])app._teammateHistory[pKey]=[];
    app._teammateHistory[pKey].push({season:app.currentSeason||1989,round:currentSeasonEntries().length,teamA:fa.id,teamB:tm.id,team});
  });
}

function releaseReplacement(faId){
  const contract=app._activeContracts&&app._activeContracts[faId];
  const d=BASE_DRIVERS.find(x=>x.id===faId&&x._temp);
  if(d){
    const idx=BASE_DRIVERS.indexOf(d);
    cacheDriverBonusBeforeRemoval(d);
    BASE_DRIVERS.splice(idx,1);
  } else {
    console.log('[DEBUG] releaseReplacement: temp driver not found in BASE_DRIVERS',`id=${faId}`);
  }

  // ── PQ slot restore ────────────────────────────────────────────────────
  if(app.preqDriverIds){
    // Remove temp driver from PQ list
    const wasInPQ=app.preqDriverIds.includes(faId);
    app.preqDriverIds=app.preqDriverIds.filter(id=>id!==faId);

    // Restore the original driver's PQ slot if:
    // (a) the temp was in PQ, AND (b) an original driver was being covered, AND
    // (c) that original driver is still contracted (to the same team they left)
    if(wasInPQ&&contract&&contract.replacingId){
      const origDriver=BASE_DRIVERS.find(x=>x.id===contract.replacingId);
      if(origDriver&&origDriver.team&&origDriver.team!=='Available'){
        // wasInPQ already confirms this team WAS represented in PQ (via the temp driver
        // who's just been removed) — no need to re-derive team PQ status from OTHER
        // drivers on the team, which incorrectly evaluates false for a single-driver PQ
        // team (there are no "other" drivers to find, since the temp was the only one).
        if(!app.preqDriverIds.includes(contract.replacingId)){
          app.preqDriverIds.push(contract.replacingId);
          console.log('[DEBUG] PQ: original driver restored to PQ list',`id=${contract.replacingId} team=${origDriver.team}`);
        }
      } else {
        console.log('[DEBUG] PQ: original driver not restored',`replacingId=${contract.replacingId}`);
      }
    }
  }

  // Return to available pool if under the 2-contract limit
  const count=(app._faCallupCount||{})[faId]||0;
  if(count<2){
    const existing=app._seasonFAPool&&app._seasonFAPool.find(x=>x.id===faId);
    if(!existing){
      // Use permanent ID lookup (V5: all DRIVER_DATABASE entries have d.id set)
      const dbEntry=DRIVER_DATABASE.find(d=>d.id===faId)||(()=>{const idx=DRIVER_DATABASE.findIndex((_,i)=>3000+i===faId);return idx>=0?DRIVER_DATABASE[idx]:null;})();
      if(dbEntry&&app._seasonFAPool){
        const _db=dbEntry.db??dbEntry.driverBonus??0;
        app._seasonFAPool.push({...dbEntry,id:faId,pid:faId,name:dbEntry.ln,firstName:dbEntry.fn,lastName:dbEntry.ln,
          driverBonus:_db,qualiBonus:_db,raceNoGridBonus:_db,teamBonus:0,team:'Available'});
      } else if(d){
        app._seasonFAPool=app._seasonFAPool||[];
        app._seasonFAPool.push({...d,id:faId,teamBonus:0,qualiBonus:d.driverBonus||0,_poolSince:app.currentSeason||1989,raceNoGridBonus:d.driverBonus||0,team:'Available',_temp:false});
      } else {
        console.log('[DEBUG] releaseReplacement: cannot return driver to available pool',`id=${faId} — not in DRIVER_DATABASE or BASE_DRIVERS`);
      }
    }
  }
  if(app._activeContracts)delete app._activeContracts[faId];
}

function checkContractExpirations(newsItems, overrideRound, coveredReturnIds){
  if(!app._activeContracts)return;
  // Use overrideRound when called before recordWeekendHistory (race not yet in history)
  const currentRound=overrideRound!==undefined?overrideRound:currentSeasonEntries().length;
  // Snapshot keys first to avoid mutating while iterating
  const entries=Object.entries(app._activeContracts);
  entries.forEach(([faIdStr,contract])=>{
    const faId=Number(faIdStr);
    if(currentRound>=contract.expiresAfterRound){
      const faD=BASE_DRIVERS.find(d=>d.id===faId);
      // Broaden search for injured driver: check all locations including FREE_AGENTS and DRIVER_DATABASE
      const origD=contract.replacingId?(BASE_DRIVERS.find(d=>d.id===contract.replacingId)||(app._retiredDrivers||[]).find(d=>d.id===contract.replacingId)||(app._seasonFAPool||[]).find(d=>d.id===contract.replacingId)||FREE_AGENTS.find(d=>d.id===contract.replacingId)||DRIVER_DATABASE.find(d=>d.id===contract.replacingId)):null;
      const faN=faD?driverFullName(faD):(()=>{const fa=FREE_AGENTS.find(d=>d.id===faId)||(app._seasonFAPool||[]).find(d=>d.id===faId);return fa?((fa.fn||fa.firstName||'')+' '+(fa.ln||fa.lastName||'')).trim():'Driver';})();
      const origN=origD?driverFullName(origD):'original driver';
      const teamN=contract.team||faD?.team||'—';
      const teamFlag=origD?flagImg(origD.nation2||''):(faD?flagImg(faD.nation2||''):'');
      console.log('[DEBUG] Contract expiry',`${faN} (id=${faId}) expires after R${contract.expiresAfterRound}, current R${currentRound}`);
      releaseReplacement(faId);
      // Generate news if this is a replacement contract (replacingId is set)
      // Include the news even if origD couldn't be found, as long as replacingId exists
      if(contract.replacingId){
        const isSusp=origD&&app.driverInjuries&&app.driverInjuries[contract.replacingId]?.cause==='suspension';
        const returnStr=isSusp?'returns from suspension':'returns from injury';
        if(newsItems)newsItems.push(`📋TEAMRETURN:${teamFlag} <strong>${escapeHtml(teamN)}</strong> — <strong>${escapeHtml(origN)}</strong> ${returnStr} — <strong>${escapeHtml(faN)}</strong>'s temporary contract ends`);
        if(coveredReturnIds)coveredReturnIds.add(contract.replacingId);
      } else if(contract.replacingId==null){
        if(newsItems)newsItems.push(`🔄 ${escapeHtml(faN)}'s one-round seat fill has ended.`);
      }
    }
  });
}

// ── END-OF-SEASON: GENERATE NEW FREE AGENTS FROM DATABASE ─────────────────
function generateEndOfSeasonFreeAgents(season){
  initSeasonFAPool();
  const nextYear=season+1;
  const newEntrants=DRIVER_DATABASE.filter(d=>d.firstYear===nextYear);
  const added=[];
  newEntrants.forEach((d,i)=>{
    const id=d.id;
    const existing=BASE_DRIVERS.find(x=>x.id===id);
    if(existing)return;
    // Do not add drivers who are already 45+ — they would retire immediately
    const ageAtEntry=nextYear-(d.dob||0);
    if(d.dob&&ageAtEntry>=45)return;
    const faEntry={...d,id,name:d.ln,firstName:d.fn,lastName:d.ln,
      teamBonus:0,team:'Available',preferredTeam:null,driverBonus:d.db||0,
      qualiBonus:d.db||0,raceNoGridBonus:d.db||0,isFreeAgent:true,
      _poolSince:nextYear}; // track when they entered the pool
    if(!app._seasonFAPool)app._seasonFAPool=[];
    app._seasonFAPool.push(faEntry);
    added.push(faEntry);
    // Apply inexperience penalty — only from second season of gameplay onwards
    registerFreeAgentDriver(id);
  });
  return added;
}

// ── END-OF-SEASON: EXECUTE RETIREMENTS ────────────────────────────────────
// A retiring driver's career is notable enough for a full retrospective article if they
// cleared any ONE of these bars — not all of them — so it catches genuine winners,
// one-off qualifying heroes, champions, and reliable long-serving journeymen alike,
// while still excluding a driver who did a couple of quiet seasons and nothing else.
function qualifiesForCareerRetrospective(stats){
  if(!stats)return false;
  return(stats.wins>=1)||(stats.poles>=1)||(stats.podiums>=3)||(stats.championshipWins>=1)||(stats.starts>=50);
}
function buildCareerRetrospective(driverId,retirementReason){
  const bd=BASE_DRIVERS.find(d=>d.id===driverId);
  const c=driverCareer(driverId);
  const st=c.stats;
  const name=bd?driverFullName(bd):`Driver ${driverId}`;
  const nation=bd?.nation2||'';
  const teams=[...new Set(getHistoryRaceFlat().filter(r=>r.id===driverId).map(r=>teamCanonicalName(r.team)))]
    .map(t=>teamDisplayName(t)||t);
  const years=[...new Set(c.races.map(r=>r.meta.year))].sort((a,b)=>a-b);
  const span=years.length?(years.length>1?`${years[0]}–${years[years.length-1]}`:`${years[0]}`):'';
  const rivals=rivalrySummaryForDriver(driverId).filter(r=>r.pts>=25);
  const rivalsStr=rivals.length?rivals.map(r=>escapeHtml(r.otherName)+' ('+r.level+')').join(', '):null;
  const titleStr=st.championshipWins>0?`${st.championshipWins}× World Champion`:null;
  const headline=titleStr||(st.wins>0?`${st.wins} career win${st.wins>1?'s':''}`:(st.poles>0?`${st.poles} career pole${st.poles>1?'s':''}`:(st.podiums>0?`${st.podiums} career podium${st.podiums>1?'s':''}`:`${st.starts} career starts`)));
  return`<div style="margin-bottom:10px"><strong>${flagImg(nation)} ${escapeHtml(name)}</strong> <span style="color:var(--muted);font-size:12px">(${escapeHtml(span)}${retirementReason?' · '+escapeHtml(retirementReason):''})</span></div>
    <div style="font-size:13px;line-height:1.7">
      <strong>${escapeHtml(headline)}</strong><br>
      Teams: ${escapeHtml(teams.join(', ')||'—')}<br>
      Entries: ${st.entries} · Starts: ${st.starts} · Poles: ${st.poles} · Wins: ${st.wins} · Podiums: ${st.podiums} · Points: ${st.championshipPoints}
      ${rivalsStr?`<br>Notable rivalries: ${rivalsStr}`:''}
    </div>`;
}
function executeEndOfSeasonRetirements(newsItems){
  const season=app.currentSeason||1989;
  const retired=runEndOfSeasonRetirements();
  retired.forEach(r=>{
    const d=BASE_DRIVERS.find(x=>x.id===r.id);
    if(d){d._retired=true;d._retirementSeason=season;}
    recordDriverIncident(r.id,'retired',{team:r.team,reason:r.reason,round:0,year:season});
    if(newsItems)newsItems.push(`🏁 <strong>${escapeHtml(r.name)}</strong> retires from Formula 1 after ${r.age} years of age. (${escapeHtml(r.reason)})`);
    const stats=driverCareer(r.id)?.stats;
    if(qualifiesForCareerRetrospective(stats)){
      pushNews({id:'retrospective-'+r.id+'-'+season,type:'career-retrospective',year:season,
        title:`Career retrospective: ${r.name}`,
        html:buildCareerRetrospective(r.id,r.reason)});
    }
  });
  return retired;
}

function executeCareerEndingInjury(driverId, newsItems){
  const d=BASE_DRIVERS.find(x=>x.id===driverId);
  if(!d)return;
  const season=app.currentSeason||1989;
  d._retired=true;d._retirementSeason=season;d._careerEndingInjury=true;
  if(!app._retiredDrivers)app._retiredDrivers=[];
  app._retiredDrivers.push({id:driverId,name:d.name,firstName:d.firstName||'',lastName:d.name||'',nation2:d.nation2||'',team:d.team,reason:'Career-ending injury',season,age:driverAge(d,season)});
  if(newsItems&&!d?._suppressCEINews)newsItems.push(`🏥 <strong>${escapeHtml(driverSurname(d))}</strong> has suffered a career-ending injury and will not return to Formula 1.`);
}

// Immediately hires a replacement for a career-ending injury and names them in the news.
// Shared by both the spun-off and crash injury paths — previously only the spun-off path
// did this, so a crash-caused career-ending injury left the seat unfilled with no
// replacement named until the next round's generic seat-fill check.
function hireCareerEndingReplacement(driverId){
  const d=BASE_DRIVERS.find(x=>x.id===driverId);
  const team=d?.team;
  if(!team||team==='Available')return;
  const takenIds=BASE_DRIVERS.map(x=>x.id);
  const repl=findReplacement(team,takenIds,false);
  if(!repl)return;
  const missesRemaining=seasonRules().totalRounds-(app.currentWeekend?.raceMeta?.round||1);
  hireReplacement(repl,team,Math.max(1,missesRemaining),driverId);
  if(!app.currentWeekend._movementNews)app.currentWeekend._movementNews=[];
  const dName=driverFullName(d)||d.name||'Driver';
  const replName=driverFullName(repl)||((repl.fn||repl.firstName||'')+' '+(repl.ln||repl.lastName||'')).trim();
  app.currentWeekend._movementNews.push(`🏥 <strong>${escapeHtml(dName)}</strong> career-ending injury. <strong>${escapeHtml(replName)}</strong> will cover the remaining races at ${escapeHtml(team)}.`);
}

// ── END-OF-SEASON: DRIVER MOVEMENTS ──────────────────────────────────────
function executeEndOfSeasonMovements(newsItems){
  const season=app.currentSeason||1989;
  const nextSeason=season+1; // the season being entered — used for rule checks
  const newFAs=generateEndOfSeasonFreeAgents(season);
  if(newFAs.length&&newsItems) newsItems.push(`📋 New drivers joining the free agent pool for ${season+1}: ${newFAs.map(d=>escapeHtml(d.fn+' '+d.ln)).join(', ')}.`);

  // Calculate team changes
  const teamChanges=runEndOfSeasonTeamChanges();
  teamChanges.forEach(tc=>{
    const d=BASE_DRIVERS.find(x=>x.id===tc.id);
    if(!d)return;
    d.team='Available';d._released=true;
    if(app._seasonFAPool)app._seasonFAPool.push({...d,teamBonus:0,team:'Available'});
    if(newsItems)newsItems.push(`🚪 <strong>${escapeHtml(tc.name)}</strong> leaves <strong>${escapeHtml(teamDisplayName(tc.team)||tc.team)}</strong> and enters the free agent market.`);
    // Small rivalry chance with remaining teammate (5–15% that departing causes bad blood)
    const remainingTm=BASE_DRIVERS.find(x=>x.team===tc.team&&x.id!==tc.id&&!x._temp&&!x._retired&&!x._released);
    if(remainingTm&&Math.random()<0.10){
      const pts=Math.floor(Math.random()*16)+5; // 5–20
      addRivalryPoints(tc.id,remainingTm.id,pts,'Acrimonious team departure',newsItems);
    }
    // Remove from BASE_DRIVERS (splice out, don't just change team)
    const _ri=BASE_DRIVERS.findIndex(x=>x.id===tc.id);
    if(_ri!==-1){cacheDriverBonusBeforeRemoval(BASE_DRIVERS[_ri]);BASE_DRIVERS.splice(_ri,1);}
  });

  // Fill vacancies from FA pool
  const vacancies=[];
  const allTeams=[...new Set(BASE_DRIVERS.filter(d=>!d._temp&&!d._retired&&d.team!=='Available').map(d=>d.team))];
  allTeams.forEach(team=>{
    const seats=BASE_DRIVERS.filter(d=>d.team===team&&!d._temp&&!d._retired&&!d._released);
    const expectedSeats=isOneDriverTeam(team,nextSeason)?1:2; // check next season's rules
    for(let i=seats.length;i<expectedSeats;i++) vacancies.push(team);
  });

  vacancies.forEach(team=>{
    const taken=BASE_DRIVERS.filter(d=>d.team===team&&!d._retired).map(d=>d.id);
    const maxSeats=isOneDriverTeam(team,nextSeason)?1:2;if(taken.length>=maxSeats)return; // check next season's rules
    const repl=findReplacement(team,taken,true);
    if(repl){
      // Permanent contract
      const existingFA=BASE_DRIVERS.find(d=>d.id===repl.id);
      const newTbEos=teamBaseTb(team)||0;
      const newDbEos=repl.driverBonus||repl.db||0;
      if(existingFA){
        existingFA.team=team;existingFA._released=false;
        existingFA.teamBonus=newTbEos;
        existingFA.qualiBonus=newDbEos+newTbEos;
        existingFA.raceNoGridBonus=newDbEos+newTbEos;
      }
      else BASE_DRIVERS.push({...repl,team,nation2:repl.nation2||repl.n2||'',nation3:repl.nation3||repl.n3||'',nationality:repl.nationality||repl.nat||'',teamBonus:newTbEos,qualiBonus:newDbEos+newTbEos,raceNoGridBonus:newDbEos+newTbEos,_temp:false});
      if(app._seasonFAPool)app._seasonFAPool=app._seasonFAPool.filter(f=>f.id!==repl.id);
      if(newsItems)newsItems.push(`✅ <strong>${escapeHtml(repl.fn+' '+repl.ln)}</strong> signs with <strong>${escapeHtml(teamDisplayName(team)||team)}</strong> for ${season+1}.`);
      recordDriverIncident(repl.id,'teamJoin',{team,round:0,year:season+1});
      // Rivalry: new permanent teammate hook — same as mid-season
      const permTeammates=BASE_DRIVERS.filter(d=>d.team===team&&d.id!==repl.id&&!d._temp&&!d._retired);
      permTeammates.forEach(tm=>{
        const rv=getRivalry(repl.id,tm.id);
        if(rv&&rv.pts>=25){
          const delta=(Math.random()<0.5?1:-1)*(Math.floor(Math.random()*24)+1);
          addRivalryPoints(repl.id,tm.id,delta,delta>0?'Tension with new teammate':'Fresh start with new teammate',newsItems);
        }
        if(!app._teammateHistory)app._teammateHistory={};
  if(!app.realism)app.realism={realDrivers:false,realCalendar:false,realCircuits:false};
        const pKey=rivalryKey(repl.id,tm.id);
        if(!app._teammateHistory[pKey])app._teammateHistory[pKey]=[];
        app._teammateHistory[pKey].push({season:season+1,round:0,team});
      });
    }
  });

  return {teamChanges,newFAs};
}

// ── NEW SEASON TRANSITION ─────────────────────────────────────────────────
// ── Driver-team relationship: end-of-season milestones ──────────────────
// Championship success and longevity — called once per season transition, for the season
// that just finished (BEFORE drift, so these count as 'this season's events' rather than
// getting immediately faded).
function applyEndOfSeasonRelationMilestones(year){
  const weeks=app.history.weekends.filter(w=>w.raceMeta.year===year);
  if(!weeks.length)return;
  const st=seasonStandings(year);
  // Team success: every driver who raced for the champion constructor this season.
  const champTeam=st.teamChampion||st.teams?.[0]?.name;
  if(champTeam){
    const champTeamCanon=teamCanonicalName(champTeam);
    const driverIdsForTeam=new Set();
    weeks.forEach(w=>(w.race||[]).forEach(r=>{if(teamCanonicalName(r.team)===champTeamCanon)driverIdsForTeam.add(r.id);}));
    driverIdsForTeam.forEach(id=>applyDriverTeamRelation(id,champTeam,12,`Won the ${year} Constructors' Championship together`));
  }
  // Personal success: the drivers' champion, specifically with whichever team they were
  // actually driving for at season's end (their team at the last race of the year).
  const champId=st.drivers?.[0]?.id;
  if(champId){
    const lastRaceForChamp=[...weeks].reverse().find(w=>(w.race||[]).some(r=>r.id===champId));
    const champTeamAtEnd=lastRaceForChamp?.race.find(r=>r.id===champId)?.team;
    if(champTeamAtEnd)applyDriverTeamRelation(champId,champTeamAtEnd,12,`Won the ${year} Drivers' Championship with this team`);
  }
  // Longevity: stayed with the same team from the first race of the season to the last.
  const firstWeek=weeks[0],lastWeek=weeks[weeks.length-1];
  const firstTeamById={};(firstWeek.race||[]).forEach(r=>{firstTeamById[r.id]=r.team;});
  const lastTeamById={};(lastWeek.race||[]).forEach(r=>{lastTeamById[r.id]=r.team;});
  Object.keys(firstTeamById).forEach(idStr=>{
    const id=Number(idStr);
    const firstTeam=firstTeamById[id],lastTeam=lastTeamById[id];
    if(!firstTeam||!lastTeam)return;
    if(teamCanonicalName(firstTeam)!==teamCanonicalName(lastTeam))return; // changed teams mid-season
    applyDriverTeamRelation(id,lastTeam,2,`Full season with the team (${year})`);
  });
}
function proceedToNewSeason(){
  const oldSeason=app.currentSeason||1989;
  const newSeason=oldSeason+1;
  const newsItems=[];

  // 1. Run retirements
  executeEndOfSeasonRetirements(newsItems);

  // 2. Career-ending injury retirements (already flagged mid-season)
  BASE_DRIVERS.filter(d=>d._careerEndingInjury&&!d._retired).forEach(d=>{
    executeCareerEndingInjury(d.id,newsItems);
  });

  // 3. Clear mid-season flags
  BASE_DRIVERS.forEach(d=>{delete d._released;delete d._fired;});

  // 4. Reset injury clearances (drivers retained keep no injury)
  if(app.driverInjuries){
    Object.keys(app.driverInjuries).forEach(id=>{
      delete app.driverInjuries[id];
    });
  }

  // 5. Driver movements + new FA generation
  app._seasonFAPool=[];
  app._faCallupCount={};
  app._activeContracts={};
  executeEndOfSeasonMovements(newsItems);

  // 6. Increment season
  app.currentSeason=newSeason;
  resetSeasonScopedTrackers();

  // Rebuild preqDriverIds for the new season
  // 1989→1990 and beyond (1989 start): derive from IN-GAME constructor standings of the just-finished season
  // All drivers from bottom N teams PQ, plus ALL drivers from any new entry teams (they always start in PQ)
  // NO split-team arrangements from 1990 onwards — full team PQ only
  {
    const _gameStartYr=app.history.weekends.length>0?Math.min(...app.history.weekends.map(w=>w.raceMeta.year)):newSeason;
    if(_gameStartYr<=1989&&newSeason>1989){
      // 1989-start, transitioning to 1990+: use standings-based bottom-team PQ
      // Target: 12–13 PQ drivers = bottom 6 teams (all with 2 drivers = 12, or 6+1 one-driver team = 13)
      const _st=eos._standingsCache; // standings from the just-finished season
      const _closedNow=new Set(eos.closures.map(t=>teamCanonicalName(t)));
      // All teams that existed in the just-finished season, excluding closed ones
      const _teamsRanked=(_st.teams||[]).map(t=>teamCanonicalName(t.name)).filter(t=>!_closedNow.has(t));
      // Sort ascending by points (worst first); teams with 0 pts already at bottom
      // New teams (joined this EoS, confirmed in Stage 3) are NOT ranked — they auto-PQ
      const _newTeamSet=new Set((eos.confirmedNewTeams||[]).map(t=>teamCanonicalName(t)));
      const _rankedOnly=_teamsRanked.filter(t=>!_newTeamSet.has(t));
      // Pick bottom 6 ranked teams for PQ
      const _pqTeamCount=6;
      const _bottomTeams=_rankedOnly.slice(_rankedOnly.length-_pqTeamCount).concat([..._newTeamSet]);
      // Build preqDriverIds: ALL drivers from those teams
      app.preqDriverIds=BASE_DRIVERS.filter(d=>
        !d._retired&&!d._temp&&d.team!=='Available'&&
        _bottomTeams.some(t=>teamCanonicalName(d.team)===t||d.team===t)
      ).map(d=>d.id);
      // Store the PQ team set for use in computePreqIds during the season
      app._pqTeamsBySeason=app._pqTeamsBySeason||{};
      app._pqTeamsBySeason[newSeason]=[..._bottomTeams];
    } else {
      // 1991-start (or later) transitioning to next year: use EoS-computed PQ teams.
      // Never reuse initialPreqIds91 — those are only valid for season R1, not EoS transitions.
      const _rls=seasonRules();const _sd=SEASONS[app.currentSeason];
      const _sdHasData=_sd&&_sd.contracted&&_sd.rules;
      const _nextPQSimple=eos._nextPQTeams||[];
      if(_nextPQSimple.length){
        const _pqSetSimple=new Set(_nextPQSimple.map(t=>teamCanonicalName(t)));
        app.preqDriverIds=BASE_DRIVERS.filter(d=>!d._retired&&!d._temp&&d.team!=='Available'&&_pqSetSimple.has(teamCanonicalName(d.team))).map(d=>d.id);
        app._pqTeamsBySeason=app._pqTeamsBySeason||{};
        app._pqTeamsBySeason[newSeason]=[..._nextPQSimple];
      } else if(_sdHasData){
        app.preqDriverIds=_rls.initialPreqIds89||_rls.initialPreqIds91||_sd.contracted.filter(e=>_sd.teams[e[6]]?.pq).map(e=>e[5]).filter(Boolean);
      } else {
        app.preqDriverIds=(app.preqDriverIds||[]).filter(id=>BASE_DRIVERS.some(d=>d.id===id&&!d._retired&&!d._temp));
      }
    }
  }

  // 7. Build end-of-season news
  const endNews={
    id:'season-end-'+oldSeason,
    type:'season-end',
    year:oldSeason,
    title:`${oldSeason} Season Review`,
    html:buildSeasonEndSummary(oldSeason,newsItems,[],[],newSeason),
  };
  pushNews(endNews);
  saveApp();
  saveAutosave(); // autosave only at end of season
  render();
  // Show the news with proceed button
  showSeasonEndModal(endNews,newSeason);
}

// ── EoS helper: retirement probability using main game's retirementChance ───
// Cached lookup of a completed season's champion (by driver id) — avoids recomputing full
// season standings repeatedly across every driver's retirement-probability check in the same
// EoS transition. Returns null if that season never happened or isn't finished.
function _getSeasonChampionId(year){
  if(!app._champCache)app._champCache={};
  if(Object.prototype.hasOwnProperty.call(app._champCache,year))return app._champCache[year];
  let champId=null;
  try{
    if(app.history.weekends.some(w=>w.raceMeta.year===year)){
      champId=seasonStandings(year)?.drivers?.[0]?.id??null;
    }
  }catch(e){}
  app._champCache[year]=champId;
  return champId;
}
function eosAdjRetProb(dob, nextYear, driverId){
  const age=nextYear-dob;
  let p=retirementChance(age);
  // Apply career adjustments using actual standings data
  const st=app._eos?._standingsCache;
  if(st&&driverId){
    const sd=st.drivers.find(x=>x.id===driverId)||{};
    const wins=sd.wins||0,poles=sd.poles||0,pods=sd.podiums||0;
    const starts=sd.starts||0;
    p=Math.max(0,Math.min(0.99,p
      -wins*0.001
      -poles*0.0005
      -pods*0.0003
      +(starts<5&&starts>0?0.02:0)
    ));
  }
  // Reigning champion discount: a driver on top of the world is less inclined to walk away.
  // The champion of the season just concluded gets -10%; the champion of the season before
  // that gets an additional -5% — these stack if the same driver won both (e.g. -15% total
  // for a back-to-back champion).
  if(driverId){
    if(_getSeasonChampionId(nextYear-1)===driverId)p=Math.max(0,p-0.10);
    if(_getSeasonChampionId(nextYear-2)===driverId)p=Math.max(0,p-0.05);
  }
  // Contracted driver bonus: -2% less likely to retire every season (desire to continue)
  const bd=BASE_DRIVERS.find(d=>d.id===driverId);
  if(bd&&bd.team&&bd.team!=='Available'&&!bd._retired)p=Math.max(0,p-0.02);
  // First two seasons bonus: additional -2% on top of contracted bonus (achievements not yet built up)
  const gameStartYr=app.history.weekends.length>0?Math.min(...app.history.weekends.map(w=>w.raceMeta.year)):(app.currentSeason||1989);
  const seasonsPlayed=(nextYear-1)-gameStartYr; // seasons completed so far
  if(seasonsPlayed<2)p=Math.max(0,p-0.02);
  // First year in the database: an additional -5%, on top of any other bonuses — a driver
  // who's just arrived shouldn't be judged by the same standard as an established veteran.
  const _dbEntryForFirstYear=DRIVER_DATABASE.find(d=>d.id===driverId);
  if(_dbEntryForFirstYear&&_dbEntryForFirstYear.firstYear===nextYear)p=Math.max(0,p-0.05);
  // Young driver bonus: drivers aged 31 or younger are less likely to retire soon after generation
  if(age<=31){
    // First season after first appearing: -10%
    // Second season: -5%
    const st2=app._eos?._standingsCache;
    const sd2=st2?st2.drivers.find(x=>x.id===driverId):null;
    const starts=sd2?.starts||0;
    if(starts<=seasonRules().totalRounds)p=Math.max(0,p-0.10); // first season's worth of starts
    else if(starts<=seasonRules().totalRounds*2)p=Math.max(0,p-0.05); // second season
  }
  return Math.max(0,Math.min(0.99,p));
}

// ── EoS state (stored in app._eos) ────────────────────────────────
function eosInitState(){
  const yr=app.currentSeason||1989;
  const st=seasonStandings(yr);
  // Era-aware grid rules based on when the game STARTED (not current year)
  const gameStartYear=app.history.weekends.length>0?Math.min(...app.history.weekends.map(w=>w.raceMeta.year)):yr;
  const using89Rules=gameStartYear<=1989;
  // Use nextYear for rule check — rules apply to the season being entered, not the one just finished
  const nextYr=yr+1;
  // Unified across all databases: minimum 17 teams (34 drivers), maximum 20 teams
  // (40 drivers). Applies from the second season onward — the first season of a
  // 1989 or 1991 start keeps its hardcoded PQ setup from the season data regardless.
  const gridRules=using89Rules
    ?(nextYr>=1992
      // 1989-start 1992+: all-two-driver rule
      ?{minTeams:17,maxTeams:20,targetTeams:18,minDrivers:34,maxDrivers:40,allowSingleDriverPQ:false,maxSingleDriverPQ:0,label:'1989-era (1992+)'}
      // 1989-start pre-1992: one-driver teams allowed
      :{minTeams:17,maxTeams:20,targetTeams:18,minDrivers:34,maxDrivers:40,allowSingleDriverPQ:true,maxSingleDriverPQ:2,label:'1989-era'})
    :{minTeams:17,maxTeams:20,targetTeams:18,minDrivers:34,maxDrivers:40,allowSingleDriverPQ:false,maxSingleDriverPQ:0,label:'1991-era'};
  initSeasonFAPool();
  return {
    stage:0,stagesDone:new Set(),year:yr,nextYear:yr+1,
    settings:{overrideRetirements:true,allowRandomTeams:false},
    gridRules,
    retirements:[],retConfirmed:false,
    entrantsConfirmed:false,
    confirmedNewTeams:[],
    _nextPQTeams:null,  // computed after Stage 3 confirms
    _newTeamsSkipped:false,
    _debugMode:false,
    closures:[],renames:[],closuresConfirmed:false,
    movements:null,movementsConfirmed:false,_movementsPhase:'voluntary',
    _phase1:null,_phase2:null,_phase3:null,
    signings:null,rosterConfirmed:false,_revealedSignings:0,
    processLog:[],_standingsCache:st,
  };
}

function eosGoStage(n){

  // (use process log at Stage 6 to review all decisions)
  const maxAllowed=Math.max(...[...eos.stagesDone],-1)+1;
  if(n===eos.stage)return; // already here
  if(n===maxAllowed&&!eos.stagesDone.has(n)){eos.stage=n;renderEndOfSeason();return;}
  // Block everything else — no backward navigation to completed stages
}

}

// ── Stage 1: Retirements ───────────────────────────────────────────
function eosComputeRetirements(){
  const eos=app._eos;if(!eos||eos.retConfirmed)return;
  eos.retirements=[];
  const yr=eos.year,nyr=eos.nextYear;

  // Release all temp drivers (injury/suspension fill-ins) at end of season.
  // They have _temp:true and must not carry over into the next season's contracted roster.
  // They're added to the FA pool so they can be re-signed normally in Stage 5.
  BASE_DRIVERS.filter(d=>d._temp&&d.team!=='Available'&&!d._retired).forEach(d=>{
    d.team='Available';
    d._temp=false;
    d._released=true;
    if(app._seasonFAPool&&!app._seasonFAPool.find(f=>f.id===d.id)){
      app._seasonFAPool.push({...d,teamBonus:0,_poolSince:yr});
    }
  });
  // Clear all active contracts — they either expired during season or are cleaned up now
  app._activeContracts={};
  app._replacementDrivers={};

  BASE_DRIVERS.filter(d=>d.team!=='Available'&&!d._retired&&!d._temp).forEach(d=>{
    const forced=d._careerEndingInjury||(nyr-d.dob>=45);
    if(forced){eos.retirements.push({d,forced:true,override:false,reason:d._careerEndingInjury?'Career-ending injury':`Age ${nyr-d.dob} — mandatory retirement`});return;}
    const prob=eosAdjRetProb(d.dob,nyr,d.id);
    if(prob<0.05)return; // below 5% threshold — not eligible to retire this off-season
    if(prob>0&&Math.random()<prob){
      eos.retirements.push({d,forced:false,override:false,reason:`Age ${nyr-d.dob}`});
    }
  });
  // FA pool drivers: apply same age-based retirement roll as contracted drivers
  // Ignore lastYear column — it is reference data only
  const _contractedIds=new Set(BASE_DRIVERS.filter(d=>d.team!=='Available'&&!d._retired&&!d._temp).map(d=>d.id));
  const _faRetiringIds=new Set(eos.retirements.map(r=>r.d.id));
  // Also include original Available drivers (FREE_AGENTS) who were never contracted
  const _allFAForRetire=[...(app._seasonFAPool||[])];
  (FREE_AGENTS||[]).forEach(fa=>{
    if(!_allFAForRetire.find(f=>f.id===fa.id)&&!_contractedIds.has(fa.id))_allFAForRetire.push(fa);
  });
  // Build a set of driver IDs who entered at least one race this season (any session counts)
  const _yr=app.currentSeason||1989;
  const _racedThisSeason=new Set(
    app.history.weekends.filter(w=>w.raceMeta.year===_yr)
      .flatMap(w=>[...w.prequalifying,...w.qualifying,...w.race].map(r=>r.id))
  );
  _allFAForRetire.forEach(fa=>{
    if(_faRetiringIds.has(fa.id))return;
    const dob=fa.dob||0;
    // Mandatory retirement at 45 — check first regardless of other conditions
    if(dob&&nyr-dob>=45){
      eos.retirements.push({d:fa,forced:true,override:false,
        reason:`Age ${nyr-dob} — mandatory retirement`});
      _faRetiringIds.add(fa.id);return;
    }
    // Age-based retirement: same probability as active drivers (threshold >= 5%)
    // + 5% extra retirement chance for drivers who entered zero races this season
    // (10% instead of 5% for drivers over 40 — an aging driver sitting out entirely is a
    // stronger signal than a younger one between drives)
    const enteredRace=_racedThisSeason.has(fa.id);
    if(!dob)return;
    const _ageThisSeason=nyr-dob;
    let prob=eosAdjRetProb(dob,nyr,fa.id);
    if(!enteredRace){
      // Base zero-entry penalty: +5% for any age, +10% for over 40
      const _zeroBase=_ageThisSeason>40?0.10:0.05;
      // Compounding: each additional year without a GP entry adds another 10% over 40
      // Track via _yearsWithoutEntry on the FA object
      const _yearsOut=(fa._yearsWithoutEntry||0)+1;
      fa._yearsWithoutEntry=_yearsOut; // persist for next season's EoS
      const _compoundPenalty=_ageThisSeason>40?(_yearsOut-1)*0.10:0;
      prob=Math.min(0.99,prob+_zeroBase+_compoundPenalty);
    } else {
      // Reset the counter when a driver enters at least one race
      fa._yearsWithoutEntry=0;
    }
    if(prob>=0.05&&Math.random()<prob){
      eos.retirements.push({d:fa,forced:false,override:false,
        reason:`Age ${nyr-dob}`});
      _faRetiringIds.add(fa.id);
    }
    // Apply a random modifier penalty (-0.05 to -0.25) for every full season with zero
    // race entries — previously a flat value, now varies so the consequence doesn't feel

function eosGetNewEntrants(){
  const nyr=app._eos?.nextYear||1992;
  const currentIds=new Set(BASE_DRIVERS.map(d=>d.id));
  const faIds=new Set((app._seasonFAPool||[]).map(f=>f.id));
  // Primary: DRIVER_DATABASE entries with firstYear===nyr
  const fromDB=(DRIVER_DATABASE||[]).filter(d=>!d._dynId).map(d=>({...d,_dynId:d.id}))
    .filter(d=>d.firstYear===nyr&&!currentIds.has(d.id)&&!faIds.has(d.id))
    .map(d=>({
      id:d._dynId,firstName:d.fn,lastName:d.ln,name:d.ln,
      nation2:d.n2||'',nat:d.nat,dob:d.dob,driverBonus:d.db||0,firstYear:nyr
    }));
  // Secondary: if next season exists in SEASONS, include drivers with NEW permanent IDs not in DB
  // NOTE: Ignore 1991=Y/N column (in89/in91 flags) — only use firstYear from DRIVER_DATABASE
  // Do NOT double-load drivers that are already covered by DRIVER_DATABASE (same permanent ID)
  const dbPermIds=new Set(fromDB.map(d=>d.id));
  const fromSeason=[]; // reserved for truly new drivers not in DRIVER_DATABASE
  // Global dedup: same permanent ID can only appear once
  const allEntrants=[...fromDB,...fromSeason];
  const seenPerm=new Set();
  return allEntrants.filter(d=>{if(seenPerm.has(d.id))return false;seenPerm.add(d.id);return true;});
}

// ── Stage 3: Team Changes (Closures + Renames) ─────────────────────
function eosComputeClosures(mandatoryOnly=false){
  const eos=app._eos;if(!eos)return[];
  const gr=eos.gridRules||{minTeams:17,maxTeams:20,targetTeams:18};
  const teams=[...new Set(BASE_DRIVERS.filter(d=>d.team!=='Available'&&!d._retired).map(d=>d.team))];
  const newEntryCount=(eos.confirmedNewTeams||[]).filter(t=>!teams.includes(t)).length;
  const total=teams.length+newEntryCount;
  // Mandatory: must close to reach maxTeams. Optional: one more roll to reach targetTeams.
  const mandatoryCount=Math.max(0,total-(gr.maxTeams||20));
  const surplus=mandatoryOnly?mandatoryCount:Math.min(total-(gr.targetTeams||18), mandatoryCount+1);
  if(surplus<=0)return[];
  // Score teams for closure: PQ + poor results + negative modifier
  const st=eos._standingsCache;
  // Score ALL teams for closure (PQ teams score higher, making them more likely to be selected)
  const scored=teams.map(t=>{
    const isPQ=(app.preqDriverIds||[]).some(id=>BASE_DRIVERS.find(d=>d.id===id)?.team===t);
    const stTeam=st.teams.find(x=>teamCanonicalName(x.name)===teamCanonicalName(t));
    const pts=stTeam?.championshipPoints||0;
    const tb=teamBaseTb(t)||0;
    const posIdx=st.teams.findIndex(x=>teamCanonicalName(x.name)===teamCanonicalName(t));
    const pos=posIdx>=0?posIdx+1:(st.teams.length+1);
    // PQ teams score higher (more likely to close), non-PQ teams have base lower score
    const pqBonus=isPQ?50:0;
    return{team:t,score:pos*5+(pts===0?30:0)+pqBonus-tb*2};
  }).sort((a,b)=>b.score-a.score);
  // Weighted random selection from worst teams
  const results=[];
  const candidates=[...scored];
  for(let i=0;i<Math.min(surplus,candidates.length);i++){
    const wts=candidates.map((_,j)=>Math.pow(candidates.length-j,2));
    const tot=wts.reduce((a,b)=>a+b,0);let r=Math.random()*tot,idx=0;
    for(let j=0;j<wts.length;j++){r-=wts[j];if(r<=0){idx=j;break;}}
    results.push(candidates.splice(idx,1)[0].team);
  }
  return results;
}
function eosGetRenames(){
  const yr=app._eos?.year;if(!yr)return[];
  // Renames come from TEAMS_DATABASE aliases, not SEASONS (which only covers 1989/1991)
  // Only show a rename if: the team currently uses its canonical name (not already aliased)
  // i.e. the alias hasn't taken effect yet in the game
  const nextYr=app._eos?.nextYear||yr+1;
  const renames=[];
  TEAMS_DATABASE.forEach(td=>{
    if(!td.aliases||!td.aliases.length)return;
    for(const a of td.aliases){
      if(!a.years)continue;
      const parts=a.years.replace(/\s/g,'').split('-');
      const start=parseInt(parts[0])||0;
      const end=parts[1]===''||parts[1]===undefined?9999:parseInt(parts[1])||9999;
      // This alias should apply starting nextYr
      if(nextYr<start||nextYr>end)continue;
      // Check it wasn't ALREADY in effect (i.e. the team name wasn't already aliased last year)
      if(yr>=start)continue; // alias was already active last year — skip
      // Team must currently be active in the game
      const isActive=BASE_DRIVERS.some(d=>teamCanonicalName(d.team)===td.name&&d.team!=='Available'&&!d._retired);
      if(!isActive)continue;
      const willClose=(app._eos?.closures||[]).some(c=>teamCanonicalName(c)===td.name);
      if(!willClose)renames.push({from:td.name,to:a.name,canonical:td.name});
    }
  });
  return renames;
}

    const _allActiveTeams=[...new Set(BASE_DRIVERS.filter(d=>d.team&&d.team!=='Available'&&!d._retired&&!d._temp).map(d=>teamCanonicalName(d.team)))].filter(Boolean);
    const _teamRows=_allActiveTeams.map(t=>{
      const stT=_stMap.get(t);

      return{t,pts,starts,isPQ};
    }).sort((a,b)=>{if(a.isPQ!==b.isPQ)return b.isPQ-a.isPQ;return b.pts-a.pts||a.t.localeCompare(b.t);});
    if(_teamRows.length){
      return`<div class="sec" style="margin-top:12px">All teams — ${eos.year} season${_curPQTeams.size?' · PQ teams highlighted':''}</div>
  <table class="small-table" style="width:100%;margin-bottom:8px"><thead><tr><th>Team</th><th>Starts</th><th>Pts</th><th>Total Mod</th><th>Season Δ</th></tr></thead><tbody>
  ${_teamRows.map(r=>{
    const _base=teamBaseTb(r.t);
    const _total=teamTotalMod(r.t);
    const _seasonStartTotal=_base+seasonStartAccMod(r.t,true);
    const _seasonDelta=Math.round((_total-_seasonStartTotal)*100)/100;
    return`<tr style="${r.isPQ?'background:#fff7ed;':''}"><td class="left">${r.isPQ?'<span style="font-size:11px;color:#92400e;margin-right:4px">(PQ)</span>':''}<strong>${escapeHtml(teamDisplayName(r.t,eos.year))}</strong></td><td>${r.starts}</td><td>${r.pts}</td><td style="color:${_total>=0?'#15803d':'#dc2626'}">${_total>=0?'+':''}${_total.toFixed(2)}</td><td style="color:${_seasonDelta>=0?'#15803d':'#dc2626'}">${_seasonDelta>=0?'+':''}${_seasonDelta.toFixed(2)}</td></tr>`;
  }).join('')}
  </tbody></table>`;
    }
    return '';
  })()}
  `,isDone);
}
