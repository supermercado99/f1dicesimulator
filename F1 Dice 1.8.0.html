    eosLog(`SIGN: ${n.trim()} → ${teamDisplayName(s.team)} (${s.reason})`,6);
  });
  if((eos._signingDebugLog||[]).length)(eos._signingDebugLog||[]).forEach(e=>eosLog(e,6));
  eosNextStage();
};

// ── Apply EoS to game state ─────────────────────────────────────────
window.eosApplyAndBeginNewSeason=function(){
  const eos=app._eos;if(!eos)return;
  const newsItems=[];
  const _retireNews=[]; // retirements (left column)
  const _moveNews=[]; // driver movements + signings (right column)
  const newSeason=eos.nextYear; // hoisted — used in signings block (step 5) AND season-advance block (step 6)
  // Snapshot each team's roster BEFORE any retirements/movements/signings this transition —
  // used later to count how many driver seats actually changed occupant.
  const _rosterAtStart={};
  BASE_DRIVERS.filter(d=>d.team&&d.team!=='Available'&&!d._retired).forEach(d=>{
    const canon=teamCanonicalName(d.team);
    if(!_rosterAtStart[canon])_rosterAtStart[canon]=new Set();
    _rosterAtStart[canon].add(d.id);
  });
  // Snapshot this season's modifier gain for every driver who raced this season, before
  // resetSeasonScopedTrackers() (further below) clears _seasonStartDriverMod for the new
  // season — this becomes 'previous season gain' for next season's form calculation.
  if(!app._prevSeasonDriverGain)app._prevSeasonDriverGain={};
  Object.keys(app._seasonStartDriverMod||{}).forEach(idKey=>{
    const _startMod=app._seasonStartDriverMod[idKey];
    if(_startMod===undefined)return;
    app._prevSeasonDriverGain[idKey]=Math.round((driverTotalMod(Number(idKey))-_startMod)*100)/100;
  });
  // Apply/adjust age-decline base-modifier penalties for the season about to begin — also
  // needs the just-completed season's gain data (for the 'positive season' offset check)
  // before it gets cleared below, so this must happen at the same point in the transition.
  applyAgeDeclineForNewSeason(newSeason,new Set(eos.retirements.filter(r=>!r.override).map(r=>r.d.id)));
  // Wrap in try-catch so errors are visible rather than silently failing
  try{

  // 1. Retirements — must set suppress flag BEFORE calling executeCareerEndingInjury
  const _appliedRetireIds=new Set();
  eos.retirements.filter(r=>!r.override).forEach(r=>{
    if(_appliedRetireIds.has(r.d.id))return;
    _appliedRetireIds.add(r.d.id);
    const d=BASE_DRIVERS.find(x=>x.id===r.d.id);
    if(d){
      d._suppressCEINews=true; // set BEFORE call so the CEI message is blocked
      executeCareerEndingInjury(d.id,_retireNews);
    } else {
      // FA pool retirement — remove from pool AND add to _retiredDrivers so getSeasonFreeAgents excludes them permanently
      if(app._seasonFAPool)app._seasonFAPool=app._seasonFAPool.filter(f=>f.id!==r.d.id);
      if(!app._retiredDrivers)app._retiredDrivers=[];
      if(!app._retiredDrivers.find(x=>x.id===r.d.id)){
        app._retiredDrivers.push({
          id:r.d.id,name:r.d.ln||r.d.name||'',
          firstName:r.d.fn||r.d.firstName||'',lastName:r.d.ln||r.d.lastName||r.d.name||'',
          nation2:r.d.n2||r.d.nation2||'',team:'Available',
          reason:r.reason,season:eos.year||app.currentSeason,
          age:(eos.nextYear||app.currentSeason+1)-(r.d.dob||0)||'?'
        });
      }
    }
    const _retAge=(()=>{const _nyr=eos.nextYear||app.currentSeason+1;return _nyr-(r.d.dob||0)||'?';})();
    if(d){const rd=app._retiredDrivers.find(x=>x.id===d.id);if(rd){rd.firstName=rd.firstName||d.firstName||'';rd.lastName=rd.lastName||d.name||'';rd.nation2=rd.nation2||d.nation2||'';}}
    recordDriverIncident(r.d.id,'retired',{team:r.d.team||'',reason:r.reason,round:0,year:eos.year||app.currentSeason});
    const _retStats=driverCareer(r.d.id)?.stats;
    if(qualifiesForCareerRetrospective(_retStats)){
      const _retName=driverFullName(r.d)||r.d.name||'?';
      pushNews({id:'retrospective-'+r.d.id+'-'+(eos.year||app.currentSeason),type:'career-retrospective',year:eos.year||app.currentSeason,
        title:`Career retrospective: ${_retName}`,
        html:buildCareerRetrospective(r.d.id,r.reason)});
      // Also surface it inline in the Season Review card itself — the retrospective is a
      // separate news card that a player would otherwise only find by browsing the
      // archive, so the season transition they actually see wouldn't mention it at all.
      // Combined into a single line (age + highlight) rather than a separate plain
      // retirement line followed by a second notable-retirement line.
      const _retHighlight=_retStats.championshipWins>0?`${_retStats.championshipWins}× champion`:
        _retStats.wins>0?`${_retStats.wins} win${_retStats.wins>1?'s':''}`:
        _retStats.poles>0?`${_retStats.poles} pole${_retStats.poles>1?'s':''}`:
        _retStats.podiums>0?`${_retStats.podiums} podium${_retStats.podiums>1?'s':''}`:`${_retStats.starts} starts`;
      _retireNews.push(`⭐ <strong>${escapeHtml(_retName)}</strong> retires at age ${_retAge} (${escapeHtml(_retHighlight)}).`);
    } else {
      _retireNews.push(`⛔ <strong>${escapeHtml(driverFullName(r.d)||r.d.name||'?')}</strong> retires at age ${_retAge}.`);
    }
  });

  // 2. Clear mid-season flags and splice retired drivers from BASE_DRIVERS for new season
  BASE_DRIVERS.forEach(d=>{delete d._released;delete d._fired;delete d._eosMovement;delete d._suppressCEINews;});
  // Splice out retired drivers so they don't remain in BASE_DRIVERS for new season
  // (they're recorded in _retiredDrivers already by executeCareerEndingInjury)
  for(let i=BASE_DRIVERS.length-1;i>=0;i--){
    if(BASE_DRIVERS[i]._retired){cacheDriverBonusBeforeRemoval(BASE_DRIVERS[i]);BASE_DRIVERS.splice(i,1);}
  }
  if(app.driverInjuries){Object.keys(app.driverInjuries).forEach(id=>{delete app.driverInjuries[id];});}

  // 3. Apply movements (releases + upgrades)
  const movedDrivers=new Map();
  (eos.movements||[]).filter(m=>m.approved!==false).forEach(m=>movedDrivers.set(m.d.id,m));
  movedDrivers.forEach((mv,dId)=>{
    const d=BASE_DRIVERS.find(x=>x.id===dId);if(!d)return;
    if(mv.to){
      // Upgrade: change team. Reset teamBonus to new team's base modifier.
      // Rule: leaving a team resets all team modifier context. Driver takes on the
      // total modifier of the new team (base + accumulated), applied via teamBonus + getTeamMod.
      // We set teamBonus = teamBaseTb(newTeam) so that:
      //   tFull = teamBonus + getTeamMod(newTeam) = tb + accumulated = totalTeamMod(newTeam) ✓
      const newTb=teamBaseTb(mv.to)||0;
      const newDb=d.driverBonus||0;
      d.team=mv.to;
      d.teamBonus=newTb;
      d.qualiBonus=newDb+newTb;
      d.raceNoGridBonus=newDb+newTb;
      recordDriverIncident(d.id,'teamJoin',{team:mv.to,round:0,year:eos.nextYear});
      _moveNews.push(`🔄 <strong>${escapeHtml(driverFullName(d))}</strong> moves to <strong>${escapeHtml(teamDisplayName(mv.to))}</strong>.`);
    } else {
      // Release/leave
      recordDriverIncident(d.id,'teamChange',{action:mv.type,fromTeam:d.team,round:0,year:eos.year});
      releaseDriverFromTeam(d,mv.type);
      _moveNews.push(`🚪 <strong>${escapeHtml(driverFullName(d))}</strong> leaves <strong>${escapeHtml(teamDisplayName(mv.from||'?'))}</strong>.`);
    }
  });

  // 4. Team closures — record IDs permanently to prevent re-entry
  if(!app._closedTeamIds)app._closedTeamIds=[];
  eos.closures.forEach(team=>{
    // Record team ID as permanently closed
    const td=TEAMS_DATABASE.find(t=>t.name===teamCanonicalName(team));
    if(td&&!app._closedTeamIds.includes(td.id))app._closedTeamIds.push(td.id);
    // A closed team can never race, sign, or be signed-for again, so any driver-team
    // relationship involving it is now permanently frozen and meaningless — remove it
    // entirely rather than leaving a stale Liked/Disliked entry nobody can ever interact
    // with again.
    if(app.driverTeamRelations){
      const _closedTeamCanon=teamCanonicalName(team);
      Object.keys(app.driverTeamRelations).forEach(key=>{
        if(key.endsWith(`::${_closedTeamCanon}`))delete app.driverTeamRelations[key];
      });
    }
    // Release all drivers from closed team into FA pool
    BASE_DRIVERS.filter(d=>d.team===team&&!d._retired).forEach(d=>{
      releaseDriverFromTeam(d,'closed');
      _moveNews.push(`🏴 <strong>${escapeHtml(teamDisplayName(team))}</strong> closes. <strong>${escapeHtml(driverFullName(d))}</strong> enters FA pool.`);
    });
  });

  // 5. Apply signings
  // First: apply genMod for ALL new teams (even those that get no drivers signed)
  // NOTE: genMod is now handled entirely by teamBaseTb's fallback (added later) for any
  // team not in the game-start roster — it's returned directly as that team's BASE
  // modifier. Explicitly setting app.teamModifiers[canon]=genMod here as well used to
  // double-count it (base + accumulated both equal to genMod), and the modHistory entry
  // it created also corrupted the season-start baseline used for the 'season change'
  // column. Do not reintroduce this.
  (eos.confirmedNewTeams||[]).forEach(_newT=>{
    const _canonNew=teamCanonicalName(_newT);
    registerNewTeam(_canonNew,eos.nextYear);
  });
  app._seasonFAPool=app._seasonFAPool||[];
  app._faCallupCount={};app._activeContracts={};
  (eos.signings||[]).forEach(s=>{
    const fa=s.driver;const team=s.team;
    const existing=BASE_DRIVERS.find(d=>d.id===fa.id);
    const maxS=isOneDriverTeam(team,eos.nextYear)?1:2;
    if(BASE_DRIVERS.filter(d=>d.team===team&&!d._retired).length>=maxS)return;
    if(existing){
      const newTb2=teamBaseTb(team)||0;
      const newDb2=existing.driverBonus||0;
      // Direct team reassignment for an already-contracted driver — same PQ-status sync
      // needed for the in-season poach applies here (EOS poaching, EOS 'upgrade' movements,
      // or any other existing-driver signing that changes team at this stage).
      syncPQStatusOnTeamChange(fa.id,existing.team,team);
      existing.team=team;
      existing.teamBonus=newTb2;
      existing.qualiBonus=newDb2+newTb2;
      existing.raceNoGridBonus=newDb2+newTb2;
      existing._released=false;
    }
    else{
      const _dbLookup=DRIVER_DATABASE.find(x=>x.id===fa.id);
      const _fn=fa.firstName||fa.fn||_dbLookup?.fn||'';
      const _ln=fa.lastName||fa.ln||fa.name||_dbLookup?.ln||'';
      const db=fa.driverBonus||fa.db||0;
      const tb=teamBaseTb(team)||0;
      // NOTE: do NOT re-apply app._inexperienceDrivers[fa.id].penalty here — if this driver
      // is new to BASE_DRIVERS, registerFreeAgentDriver already applied that penalty (via
      // the accumulated modifier, since the driver wasn't in BASE_DRIVERS at the time it
      // was called). Applying it again here double-counted it (e.g. -1.00 total instead
      // of -0.50 for a brand new EoS-signed driver). If registration hasn't happened yet at
      // all (e.g. a driver from the initial FA pool who never passed through
      // hireReplacement), register now, before the push, so the accumulated-modifier
      // fallback path applies correctly.
      if(!app._inexperienceDrivers||app._inexperienceDrivers[fa.id]===undefined){
        registerFreeAgentDriver(fa.id,eos.nextYear);
      }
      BASE_DRIVERS.push({id:fa.id,pid:fa.pid||fa.id,listOrder:39,firstName:_fn,lastName:_ln,name:_ln,
        nation2:fa.nation2||fa.n2||'',nation3:fa.nation3||fa.n3||'',team,dob:fa.dob||1970,driverBonus:db,teamBonus:tb,qualiBonus:db+tb,raceNoGridBonus:db+tb,
        preferredTeam:null,isFreeAgent:true,_temp:false});
    }app._seasonFAPool=app._seasonFAPool.filter(f=>f.id!==fa.id);
    const name=(fa.firstName||fa.fn||'')+' '+(fa.lastName||fa.ln||fa.name||'');
    recordDriverIncident(fa.id,'teamJoin',{team,round:0,year:eos.nextYear});
    // Positive team signing bonus: driver with ≤0.00 modifier signed by a positive-modifier team
    // gets a bonus scaled by team strength, max +0.25 (simulates inspiration/motivation boost)
    // Only from the driver's second season — first year drivers don't benefit from this yet
    const _signingDb=(fa.driverBonus||fa.db||0)+(getDriverMod(fa.id)||0);
    const _teamTtm=(teamBaseTb(team)||0)+(getTeamMod(team)||0);
    const _driverCareerEntries=app.history.weekends.filter(w=>(w.qualifying||[]).some(q=>q.id===fa.id)||(w.prequalifying||[]).some(p=>p.id===fa.id)).length;
    const _isFirstYearDriver=_driverCareerEntries===0;
    if(!_isFirstYearDriver&&_signingDb<=0.0&&_teamTtm>0){
      const _bonus=Math.round(Math.min(0.25,_teamTtm*0.05)*100)/100;
      if(_bonus>0){
        applyDriverModEndOfSeason(fa.id,_bonus,`Signing bonus: joined ${teamDisplayName(team)}`);
        _moveNews.push(`⬆ <strong>${escapeHtml(name.trim())}</strong> gets +${_bonus.toFixed(2)} motivation boost signing with ${escapeHtml(teamDisplayName(team))}.`);
      }
    }
    _moveNews.push(`✅ <strong>${escapeHtml(name.trim())}</strong> signs with <strong>${escapeHtml(teamDisplayName(team))}</strong>.`);
    // New teams always start in PQ — add their drivers to preqDriverIds
    const _isNewTeam=(eos.confirmedNewTeams||[]).includes(teamCanonicalName(team))||(eos.confirmedNewTeams||[]).includes(team);
    if(_isNewTeam&&!app.preqDriverIds.includes(fa.id)){
      app.preqDriverIds.push(fa.id);
      // Also ensure the team is in _pqTeamsBySeason for computePreqIds to find
      if(!app._pqTeamsBySeason)app._pqTeamsBySeason={};
      if(!app._pqTeamsBySeason[eos.nextYear])app._pqTeamsBySeason[eos.nextYear]=[];
      const _tc=teamCanonicalName(team);
      if(!app._pqTeamsBySeason[eos.nextYear].includes(_tc))app._pqTeamsBySeason[eos.nextYear].push(_tc);
    }
  });

  // Bidding war announcements — genuine contests detected during signing computation
  // (eos._biddingWars), surfaced here now that news is actually being built.
  (eos._biddingWars||[]).forEach(bw=>{
    _moveNews.push(`⚔ <strong>${escapeHtml(teamDisplayName(bw.teamA))}</strong> and <strong>${escapeHtml(teamDisplayName(bw.teamB))}</strong> both wanted <strong>${escapeHtml(bw.driverName)}</strong> — bidding war fuels a growing rivalry.`);
  });

  // Team mean reversion: a team that's stayed dominant (total modifier >= +3.00) for
  // multiple consecutive seasons starts losing a little modifier at each season
  // transition — not a punishment, but "the rest of the grid catching up" (rivals
  // developing, technical regulations narrowing the gap, etc.). They have to keep
  // actively outperforming through the season — which the normal systems already
  // reward — to hold position, rather than coast on modifier banked years ago. Needs
  // 2+ consecutive dominant seasons before it starts, then grows slowly, capped at -0.20.
  // A team that drops below the threshold resets the streak entirely.
  {
    const REVERSION_THRESHOLD=3.0;
    if(!app._seasonsAtTop)app._seasonsAtTop={};
    const _teamsThisSeason=[...new Set(BASE_DRIVERS.filter(d=>d.team&&d.team!=='Available'&&!d._retired).map(d=>teamCanonicalName(d.team)))];
    _teamsThisSeason.forEach(team=>{
      const ttm=teamTotalMod(team);
      if(ttm>=REVERSION_THRESHOLD){
        const streak=(app._seasonsAtTop[team]||0)+1;
        app._seasonsAtTop[team]=streak;
        if(streak>=2){
          const decay=Math.min(0.20,0.05+(streak-2)*0.03);
          applyTeamModEndOfSeason(team,-decay,`Rivals catching up after ${streak} dominant seasons`);
        }
      } else {
        app._seasonsAtTop[team]=0;
      }
    });
  }

  // Pre-season penalty: a team at +2.50+ whose modifier sits far above the average skill
  // of its own drivers is unsustainable — an excellent car doesn't win races if the
  // drivers can't extract its potential. Scales with both how far above the threshold the
  // team sits and how big the actual gap to their drivers is.
  const _preseasonPenaltyRows=[];
  {
    const PENALTY_THRESHOLD=2.5;
    const _teamsForPenalty=[...new Set(BASE_DRIVERS.filter(d=>d.team&&d.team!=='Available'&&!d._retired).map(d=>teamCanonicalName(d.team)))];
    _teamsForPenalty.forEach(team=>{
      const ttm=teamTotalMod(team);
      if(ttm<PENALTY_THRESHOLD)return;
      const teamDrivers=BASE_DRIVERS.filter(d=>d.team&&teamCanonicalName(d.team)===team&&!d._retired);
      if(!teamDrivers.length)return;
      const avgDriverMod=teamDrivers.reduce((s,d)=>s+driverTotalMod(d.id),0)/teamDrivers.length;
      const gap=ttm-avgDriverMod;
      if(gap<=0)return; // drivers are at or above team level — no mismatch
      const penalty=Math.min(0.35,gap*0.0625*(1+(ttm-PENALTY_THRESHOLD)*0.1));
      if(penalty>0.005){
        applyTeamModEndOfSeason(team,-penalty,`Drivers below team standard (avg driver ${fmtBonus(avgDriverMod)} vs team ${fmtBonus(ttm)})`);
        _preseasonPenaltyRows.push({team,delta:-penalty,reason:`drivers below team standard (avg driver ${fmtBonus(avgDriverMod)} vs team ${fmtBonus(ttm)})`});
      }
    });
  }

  // Pre-season bonus: the positive mirror of the above — a team from -5.00 to +1.00
  // whose drivers are collectively performing ABOVE their team's level (an underdog car
  // being carried by talent) gets a reward, scaling up the further below the range's top
  // the team sits (mirroring how the penalty above scales up the further above ITS
  // threshold a team sits).
  {
    const BONUS_MIN=-5.00,BONUS_MAX=1.00;
    const _teamsForBonus=[...new Set(BASE_DRIVERS.filter(d=>d.team&&d.team!=='Available'&&!d._retired).map(d=>teamCanonicalName(d.team)))];
    _teamsForBonus.forEach(team=>{
      const ttm=teamTotalMod(team);
      if(ttm<BONUS_MIN||ttm>BONUS_MAX)return;
      const teamDrivers=BASE_DRIVERS.filter(d=>d.team&&teamCanonicalName(d.team)===team&&!d._retired);
      if(!teamDrivers.length)return;
      const avgDriverMod=teamDrivers.reduce((s,d)=>s+driverTotalMod(d.id),0)/teamDrivers.length;
      const gap=avgDriverMod-ttm;
      if(gap<=0)return; // drivers are at or below team level — no bonus
      const bonus=Math.min(0.35,gap*0.0625*(1+(BONUS_MAX-ttm)*0.1));
      if(bonus>0.005){
        applyTeamModEndOfSeason(team,bonus,`Drivers above team standard (avg driver ${fmtBonus(avgDriverMod)} vs team ${fmtBonus(ttm)})`);
        _preseasonPenaltyRows.push({team,delta:bonus,reason:`drivers above team standard (avg driver ${fmtBonus(avgDriverMod)} vs team ${fmtBonus(ttm)})`});
      }
    });
  }

  // Reputation penalty for severe underperformance at a top team now runs immediately
  // after the last race of the season (see applyReputationPenaltyAfterLastRace), not here
  // — this way the driver enters every EoS stage already carrying the lower modifier,
  // with no need to reorder anything in this pipeline.

  // Pre-season penalty: a team at +2.50+ that changes drivers over the off-season also
  // takes a hit — continuity matters more the stronger the team is. Scales linearly from
  // -0.05 (1 change) / -0.10 (2 changes) at +2.50 up to -0.25 / -0.50 at +5.00.
  {
    const PENALTY_THRESHOLD=2.5;
    Object.keys(_rosterAtStart).forEach(team=>{
      const ttm=teamTotalMod(team);
      if(ttm<PENALTY_THRESHOLD)return;
      const currentRoster=new Set(BASE_DRIVERS.filter(d=>d.team&&teamCanonicalName(d.team)===team&&!d._retired).map(d=>d.id));
      let departures=0;
      _rosterAtStart[team].forEach(id=>{if(!currentRoster.has(id))departures++;});
      const numChanges=Math.min(2,departures);
      if(numChanges<1)return;
      const clampedMod=Math.max(2.5,Math.min(5.0,ttm));
      const t=(clampedMod-2.5)/(5.0-2.5);
      const base1=-0.05+t*(-0.25-(-0.05));
      const base2=-0.10+t*(-0.50-(-0.10));
      const deltaVal=numChanges===1?base1:base2;
      applyTeamModEndOfSeason(team,deltaVal,`Driver lineup changes disrupt continuity (${numChanges} driver${numChanges>1?'s':''} changed)`);
      _preseasonPenaltyRows.push({team,delta:deltaVal,reason:`${numChanges} driver change${numChanges>1?'s':''}`});
    });
  }

  // Close championship finish: the top two constructors get a rivalry boost if the season
  // finish was tight — either the constructors' title itself (within 20 points) or their
  // lead drivers' finish in the drivers' title (within 10 points).
  {
    const _finalYear=eos.year||app.currentSeason;
    const _stFinal=seasonStandings(_finalYear);
    const _topTeams=(_stFinal.teams||[]).slice(0,2);
    if(_topTeams.length===2){
      const constructorGap=Math.abs((_topTeams[0].championshipPoints||0)-(_topTeams[1].championshipPoints||0));
      const _driverTeamAtSeasonEnd=(driverId)=>{
        const weeks=app.history.weekends.filter(w=>w.raceMeta.year===_finalYear).sort((a,b)=>b.raceMeta.round-a.raceMeta.round);
        for(const w of weeks){
          const entry=(w.race||[]).find(r=>r.id===driverId)||(w.qualifying||[]).find(r=>r.id===driverId);
          if(entry)return teamCanonicalName(entry.team);
        }
        return null;
      };
      const topDriverOf=(teamName)=>{
        const teamDrivers=(_stFinal.drivers||[]).filter(d=>_driverTeamAtSeasonEnd(d.id)===teamName);
        return teamDrivers.sort((a,b)=>(b.championshipPoints||0)-(a.championshipPoints||0))[0];
      };
      const d1=topDriverOf(_topTeams[0].name),d2=topDriverOf(_topTeams[1].name);
      const driverGap=(d1&&d2)?Math.abs((d1.championshipPoints||0)-(d2.championshipPoints||0)):Infinity;
      const _eosScale=_scoringScaleForYear(_finalYear);
      if(constructorGap<=20*_eosScale||driverGap<=10*_eosScale){
        const pts=Math.floor(Math.random()*21)+30; // 30-50
        const reason=constructorGap<=20*_eosScale&&driverGap<=10*_eosScale?'Nail-biting title fight all season':(constructorGap<=20*_eosScale?'Constructors\' title down to the wire':'Drivers\' title down to the wire');
        addTeamRivalryPoints(_topTeams[0].name,_topTeams[1].name,pts,reason,newsItems);
      }
    }
  }

  // Off-season storylines — one round, bigger swings than weekly noise. Must run here,
  // before the season advances below — applyDriverModEndOfSeason/applyTeamModEndOfSeason
  // label their modHistory entries using app.currentSeason at the moment they're called,
  // so running this after the season had already advanced mislabeled every storyline event
  // with the NEW year instead of the season it was actually the end-of.
  const _storylineItems=applyOffSeasonStorylines();


  // 6. Advance season
  const oldSeason=eos.year; // newSeason already declared above
  app.currentSeason=newSeason;
  applyEndOfSeasonRelationMilestones(oldSeason);
  driftDriverTeamRelations();
  // Only rebuild BASE_DRIVERS/FREE_AGENTS from SEASONS data if that season exists
  // If SEASONS[newSeason] doesn't exist (e.g. 1990), keep the current modified BASE_DRIVERS
  // so EoS movements/signings applied above are preserved
  // Only rebuild from SEASONS if the game STARTED in that season (not if we transitioned there)
  // This prevents Jordan/Modena getting their 1991 historical drivers when game started in 1989
  const _gameStartYr=app.history.weekends.length>0?Math.min(...app.history.weekends.map(w=>w.raceMeta.year)):newSeason;
  const _seasonHasData=!!SEASONS[newSeason];
  const _useSeasonData=_seasonHasData&&(_gameStartYr>=newSeason); // only if game starts in this year
  if(_useSeasonData){
    BASE_DRIVERS=buildDrivers(newSeason);
    FREE_AGENTS=buildFreeAgents(newSeason);
  } else {
    // For intermediate years: keep current BASE_DRIVERS (movements already applied)
    // Rebuild FREE_AGENTS from DRIVER_DATABASE for next year's available pool
    const _cy=newSeason;
    // Use getSeasonFreeAgents which properly uses permanent IDs and excludes contracted drivers
    FREE_AGENTS=getSeasonFreeAgents(_cy);
  }
  resetSeasonScopedTrackers();
  {const _rls=seasonRules();const _sd=SEASONS[app.currentSeason];
  const _sdHasData=_sd&&_sd.contracted&&_sd.rules; // full season data (not just calendar stub)
  const _gameStartRebuild=app.history.weekends.length>0?Math.min(...app.history.weekends.map(w=>w.raceMeta.year)):app.currentSeason;
  const _isIntermediate=_gameStartRebuild<=1989&&app.currentSeason>1989;
  if(_isIntermediate){
    // 1989-start entering an intermediate year (no full SEASONS data): use EoS-computed PQ teams
    const _nextPQFromEos=eos._nextPQTeams||[];
    if(_nextPQFromEos.length){
      const _pqSet=new Set(_nextPQFromEos.map(t=>teamCanonicalName(t)));
      app.preqDriverIds=BASE_DRIVERS.filter(d=>!d._retired&&!d._temp&&d.team!=='Available'&&_pqSet.has(teamCanonicalName(d.team))).map(d=>d.id);
      // Store for computePreqIds to use during the season
      app._pqTeamsBySeason=app._pqTeamsBySeason||{};
      app._pqTeamsBySeason[newSeason]=[..._nextPQFromEos];
    } else {
      // Fallback: filter preqDriverIds to active drivers only
      app.preqDriverIds=(app.preqDriverIds||[]).filter(id=>BASE_DRIVERS.some(d=>d.id===id&&!d._retired&&!d._temp));
    }
  } else if(_gameStartRebuild>1989&&app.currentSeason>_gameStartRebuild){
    // 1991-start (or later) entering any year after the starting year:
    // Always use EoS-computed PQ teams — never fall back to initialPreqIds from the season data
    // (those IDs are only valid for season R1, not for EoS transitions)
    const _nextPQFromEos91=eos._nextPQTeams||[];
    if(_nextPQFromEos91.length){
      const _pqSet91=new Set(_nextPQFromEos91.map(t=>teamCanonicalName(t)));
      app.preqDriverIds=BASE_DRIVERS.filter(d=>!d._retired&&!d._temp&&d.team!=='Available'&&_pqSet91.has(teamCanonicalName(d.team))).map(d=>d.id);
      app._pqTeamsBySeason=app._pqTeamsBySeason||{};
      app._pqTeamsBySeason[newSeason]=[..._nextPQFromEos91];
    } else {
      app.preqDriverIds=(app.preqDriverIds||[]).filter(id=>BASE_DRIVERS.some(d=>d.id===id&&!d._retired&&!d._temp));
    }
  } else if(_sdHasData){
    // Full season data exists for this year AND game started in this year: use data-driven PQ IDs
    app.preqDriverIds=_rls.initialPreqIds89||_rls.initialPreqIds91||_sd.contracted.filter(e=>_sd.teams?.[e[6]]?.pq).map(e=>e[5]).filter(Boolean);
  } else {
    app.preqDriverIds=[];
  }}

  // Reset _initialTeamSizes to reflect the new season's actual contracted roster
  // This prevents ensureAllSeatsFilledBeforeWeekend from using stale 1989 counts
  app._initialTeamSizes={};
  BASE_DRIVERS.filter(d=>d.team!=='Available'&&!d._retired&&!d._temp).forEach(d=>{
    app._initialTeamSizes[d.team]=(app._initialTeamSizes[d.team]||0)+1;
  });

  // 7. Modifier decay — only pulls back a sustained TOP-TIER positive bonus (+2.50 and
  // above); mid-table teams keep whatever they've earned, and slumps are never
  // artificially decayed — a team digs itself out of a slump only through actual
  // on-track performance, same as it always has.
  const POSITIVE_DECAY_THRESHOLD=2.50;
  Object.keys(app.teamModifiers||{}).forEach(k=>{
    const v=app.teamModifiers[k];if(v>=POSITIVE_DECAY_THRESHOLD){app.teamModifiers[k]=Math.round(v*0.9*100)/100;}
  });
  // modHistory is intentionally NOT reset between seasons — it's a rolling 5-year record

  // 7.5. Off-season storylines display rows (application already happened earlier, before
  // the season advanced, so modHistory entries get labeled with the correct year).
  // Driver storylines stay as individual rows; team storylines get grouped together with
  // the other pre-season team modifier entries (mismatch/driver-change/positive-bonus
  // penalties) below, so each team appears once with all its changes listed together.
  const _storyRowsDriver=_storylineItems.filter(it=>it.kind==='driver').map(it=>{
    const nm=BASE_DRIVERS.find(d=>d.id===it.id)?driverFullName(BASE_DRIVERS.find(d=>d.id===it.id)):it.name;
    const link=driverLink(it.id,escapeHtml(nm),true);
    return`${link}: <span class="${it.delta>=0?'modifier-pos':'modifier-neg'}">${it.delta>=0?'+':''}${it.delta.toFixed(2)}</span> — ${escapeHtml(it.reason)}`;
  });
  const _teamModEntries=[
    ..._preseasonPenaltyRows,
    ..._storylineItems.filter(it=>it.kind==='team').map(it=>({team:it.name,delta:it.delta,reason:it.reason})),
  ];
  const _teamModGrouped={};
  _teamModEntries.forEach(e=>{
    const canon=teamCanonicalName(e.team);
    if(!_teamModGrouped[canon])_teamModGrouped[canon]=[];
    _teamModGrouped[canon].push(e);
  });
  const _storyRowsTeam=Object.entries(_teamModGrouped).map(([canon,entries])=>{
    const nm=teamDisplayName(canon)||canon;
    const link=teamLink(canon,escapeHtml(nm),true);
    const changesHtml=entries.map(e=>`<span class="${e.delta>=0?'modifier-pos':'modifier-neg'}">${e.delta>=0?'+':''}${e.delta.toFixed(2)}</span> — ${escapeHtml(e.reason)}`).join('<br>&nbsp;&nbsp;&nbsp;');
    return`<strong>${link}</strong><br>&nbsp;&nbsp;&nbsp;${changesHtml}`;
  });
  const _storyRows=[..._storyRowsTeam,..._storyRowsDriver];

  // 8. Build news
  const endNews={id:'season-end-'+oldSeason,type:'season-end',year:oldSeason,title:`${oldSeason} Season Review`,
    html:buildSeasonEndSummary(oldSeason,_retireNews,_moveNews,_storyRows,newSeason)};
  pushNews(endNews);
  app._eos=null;
  // Remove #end-of-season from nav history so Back never returns to EoS
  _navHistory.splice(0,_navHistory.length,..._navHistory.filter(h=>h!=='#end-of-season'));
  saveApp();
  saveAutosave(); // autosave only at end of season (not after every race)
  // Navigate back to start
  goHash('#start');
  render();
  showSeasonEndModal(endNews,newSeason);
  }catch(e){
    console.error('eosApplyAndBeginNewSeason error:',e);
    alert('Error starting new season: '+e.message+'. Check browser console for details.');
  }
};

// ── Main renderer for End-of-Season route ─────────────────────────
function renderEndOfSeason(){
  // Only render EoS if the current hash is #end-of-season (prevents spurious re-renders)
  if(window.location.hash!=='#end-of-season'&&!app._eos)return;
  // Initialise state if first visit or null
  if(!app._eos){app._eos=eosInitState();}
  const eos=app._eos;
  // Guard: stagesDone must be a Set (can't survive JSON round-trip as Set — ensure it always is)
  if(!(eos.stagesDone instanceof Set)){
    eos.stagesDone=new Set(Array.isArray(eos.stagesDone)?eos.stagesDone:Object.keys(eos.stagesDone||{}).map(Number).filter(n=>!isNaN(n)));
  }
  const el=document.getElementById('routeProfile');if(!el)return;
  const stageContent=eos.stage===0?eosRenderSettings():eos.stage===1?eosRenderRetirements():eos.stage===2?eosRenderEntrants():eos.stage===3?eosRenderTeamChanges():eos.stage===4?eosRenderMovements():eos.stage===5?eosRenderSignings():eosRenderComplete();
  el.innerHTML=`<div class="card">
    <a class="back-link" href="#start" onclick="event.preventDefault();if(confirm('Exit end-of-season module? Progress is saved.')){app._eos=null;goHash('#start');}">← Cancel & return to game</a>
    <div style="margin:12px 0;display:flex;gap:0;flex-wrap:wrap;border-bottom:1px solid var(--line);padding-bottom:10px">
      ${EOS_STAGES.map((s,i)=>{const done=eos.stagesDone.has(i);const active=eos.stage===i;const future=i>eos.stage&&!done;
        return`<span style="padding:6px 12px;font-size:12px;font-weight:${active?700:400};color:${active?'var(--accent)':done?'#15803d':future?'#cbd5e1':'var(--muted)'};border-bottom:${active?'2px solid var(--accent)':done?'2px solid #86efac':future?'2px solid transparent':'2px solid transparent'};display:inline-block;white-space:nowrap;user-select:none">${done?'✓ ':active?'▶ ':''}${escapeHtml(s)}</span>`;}).join('')}
    </div>
    <div style="margin-top:16px">${stageContent}</div>
  </div>`;
}
window.renderEndOfSeason=renderEndOfSeason;

// ── Debug: simulate to end of season ──────────────────────────────
function debugSimulateToEndOfSeason(){
  const totalRounds=seasonRules().totalRounds||16;
  const completedRounds=currentSeasonEntries().length;
  if(completedRounds>=totalRounds){alert('Season already complete!');return;}
  if(!confirm(`Simulate rounds ${completedRounds+1}–${totalRounds} with random results? This will fill in all remaining races for testing.`))return;
  // Clear any in-progress weekend
  if(app.currentWeekend){clearLive();app.currentWeekend=null;}
  const calendar=seasonCalendar();
  for(let rIdx=completedRounds;rIdx<totalRounds;rIdx++){
    const r=calendar[rIdx];if(!r)continue;
    const raceMeta={round:r.round,gp:r.gp,track:r.track,country:r.country,n2:r.n2,year:app.currentSeason||1989,weather:'dry'};
    // Build random race result from current contracted drivers
    const drivers=BASE_DRIVERS.filter(d=>d.team!=='Available'&&!d._retired&&!d._temp).slice();
    // Randomise order (simple random sort)
    drivers.sort(()=>Math.random()-0.5);
    const pqIds=new Set(app.preqDriverIds||[]);
    const pqField=drivers.filter(d=>pqIds.has(d.id)).slice(0,6);
    const autoField=drivers.filter(d=>!pqIds.has(d.id));
    const qualifyingField=[...autoField,...pqField].slice(0,30);
    const raceField=qualifyingField.slice(0,26);
    // Build history entry
    const prequalifying=Array.from({length:Math.min(pqField.length,13)},(_,i)=>{const d=pqField[i]||drivers[i];return{id:d.id,driver:d.name,team:d.team,totalNumeric:Math.random()*5,position:i+1,laps:[],status:'active',nation2:d.nation2};});
    const qualifying=qualifyingField.map((d,i)=>({id:d.id,driver:d.name,team:d.team,totalNumeric:Math.random()*10+(30-i),position:i+1,laps:[],status:'active',nation2:d.nation2,pole:i===0}));
    const pts=[10,6,4,3,2,1];
    const race=raceField.map((d,i)=>({id:d.id,driver:d.name,team:d.team,position:i+1,points:pts[i]||0,total:Math.random()*5+20-i,laps:[],status:Math.random()<0.15?'retired':'active',nation2:d.nation2}));
    app.history.weekends.push({raceMeta,prequalifying,qualifying,race,sessions:{prequalifying:{finishedOrder:prequalifying.map(x=>x.id)},qualifying:{finishedOrder:qualifying.map(x=>x.id)},race:{finishedOrder:race.map(x=>x.id)}},log:[],_logIncidentsOnly:true});
  }
  invalidateStandingsCache();saveApp();render();

function debugSimulateToEndOfSeasonFullDetail(){
  const totalRounds=seasonRules().totalRounds||16;
  const completedRounds=currentSeasonEntries().length;
  if(completedRounds>=totalRounds){alert('Season already complete!');return;}
  if(!confirm(`Simulate rounds ${completedRounds+1}–${totalRounds} using full game mechanics (real dice rolls, modifier changes, injuries, firings, rivalries, etc.)? This is much slower than the quick simulation and may take a moment.`))return;
  const roundsToRun=totalRounds-completedRounds;
  let safetyIterations=0;
  const maxIterations=roundsToRun*3000; // generous per-round ceiling against any stuck-state loop
  try{
    while(currentSeasonEntries().length<totalRounds&&safetyIterations<maxIterations){
      safetyIterations++;
      if(!app.currentWeekend||app.currentWeekend.weekendFinished){
        if(app._eos)break; // EoS wizard already active — stop here, let the player continue manually
        newWeekend();
        if(!app.currentWeekend)break; // couldn't create a new weekend — season/calendar exhausted
        continue;
      }
      if(app.currentWeekend.pendingAdvance){
        advanceToPendingSession();
        continue;
      }
      instantResult();
    }
  }catch(e){
    console.error('debugSimulateToEndOfSeasonFullDetail exception:',e);
    alert('Simulation stopped early due to an error — check the console. Progress made so far has been kept.');
  }
  invalidateStandingsCache();saveApp();render();
  const nowCompleted=currentSeasonEntries().length;
  if(safetyIterations>=maxIterations){
    alert(`Simulation stopped after reaching the safety limit at round ${nowCompleted} of ${totalRounds} — this usually means the weekend got stuck in an unexpected state. Check the console for details.`);
  } else {
    alert(`Simulated ${nowCompleted-completedRounds} round(s) using full game mechanics. Now at round ${nowCompleted} of ${totalRounds}.`);
  }
}

function eosDebugRunFullEoS(debugLog){
  // Run all EoS stages automatically with sensible defaults
  try{
    if(!app._eos){app._eos=eosInitState();}
    const eos=app._eos;
    eos._debugMode=true;

    // Stage 0: save settings
    if(!eos.stagesDone.has(0)){eos.settings={overrideRetirements:false,allowRandomTeams:false};eos.stagesDone.add(0);eos.stage=1;}

    // Stage 1: retirements — auto-roll
    if(!eos.stagesDone.has(1)){
      eosComputeRetirements();
      eos.retConfirmed=true;eos.stagesDone.add(1);eos.stage=2;
    }

    // Stage 2: new entrants — auto-confirm
    if(!eos.stagesDone.has(2)){
      eosConfirmEntrants();
    }

    // Stage 3: team changes — auto-roll closures if needed, then confirm
    if(!eos.stagesDone.has(3)){
      const gr=eos.gridRules||{maxTeams:20};
      const existingTeams=[...new Set(BASE_DRIVERS.filter(d=>d.team!=='Available'&&!d._retired&&!d._temp).map(d=>d.team))];
      const newCount=(eos.confirmedNewTeams||[]).filter(t=>!existingTeams.includes(t)).length;
      const total=existingTeams.length+newCount;
      if(total>(gr.maxTeams||20)){
        const cl=eosComputeClosures(true); // mandatory only
        eos.closures=cl;
        cl.forEach(t=>debugLog&&debugLog.push(`[${eos.year}→${eos.nextYear}] CLOSE: ${t}`));
      }
      window.eosConfirmTeamChanges();
    }

    // Stage 4: movements — auto-compute and confirm all
    if(!eos.stagesDone.has(4)){
      eosComputeMovements();
      (eos.movements||[]).forEach(m=>{if(m.approved===null)m.approved=true;});
      eos.movementsConfirmed=true;eos.stagesDone.add(4);eos.stage=5;
    }

    // Stage 5: signings — auto-compute and confirm
    if(!eos.stagesDone.has(5)){
      eosComputeSignings();
      eos.rosterConfirmed=true;eos.stagesDone.add(5);eos.stage=6;
    }

    // Stage 6: confirm complete then apply
    if(!eos.stagesDone.has(6)){
      window.eosConfirmComplete();
    }

    // Apply
    window.eosApplyAndBeginNewSeason();
    return true;
  }catch(e){
    if(debugLog)debugLog.push(`ERROR in ${app._eos?.year}→${app._eos?.nextYear} EoS: ${e.message}`);
    console.error('eosDebugRunFullEoS error:',e);
    return false;
  }
}

window.eosAutoAdvanceTo2025=function(){
  const targetYear=2025;
  const startYear=app.currentSeason||1989;
  if(startYear>=targetYear){alert(`Already at ${startYear}`);return;}
  if(!confirm(`Auto-advance from ${startYear} to ${targetYear}? This will simulate ${targetYear-startYear} season(s) with random results. This cannot be undone.`))return;
  const debugLog=[`Auto-advance: ${startYear} → ${targetYear}`];
  let currentYear=startYear;
  let maxIter=targetYear-startYear+5; // safety cap
  // Suppress autosave and per-season saveApp during the loop to avoid quota errors.
  // A single save happens after the loop completes.
  app._suppressAutosave=true;
  try{
    while(currentYear<targetYear&&maxIter-->0){
      debugLog.push(`[${currentYear}] Simulating season...`);
      try{eosDebugSimulateSeason();}
      catch(e){debugLog.push(`[${currentYear}] Simulate error: ${e.message}`);break;}
      debugLog.push(`[${currentYear}] Running EoS...`);
      const ok=eosDebugRunFullEoS(debugLog);
      if(!ok){debugLog.push(`[${currentYear}] EoS failed — stopping.`);break;}
      currentYear=app.currentSeason;
      debugLog.push(`[${currentYear}] Season started.`);
    }
  }finally{
    delete app._suppressAutosave;
  }
  if(currentYear>=targetYear)debugLog.push(`Auto-advance complete! Now in ${currentYear}.`);
  else debugLog.push(`Auto-advance stopped at ${currentYear}.`);
  // Single save at the end — after all seasons are done
  saveApp();
  saveAutosave();
  // Show log
  const logText=debugLog.join('\n');
  console.log(logText);
  alert(`Auto-advance ${currentYear>=targetYear?'complete':'stopped'}.\n\nLog:\n${debugLog.slice(-20).join('\n')}`);
  goHash('#start');render();
};

const RAND_MOD_DRIVER_POS=['Good team morale','New skill','New sponsor'];
const RAND_MOD_DRIVER_NEG=['Bad team morale','Illness','Sponsor trouble'];
const RAND_MOD_TEAM_POS=['Good team morale','Technical breakthrough','Positive testing'];
const RAND_MOD_TEAM_NEG=['Bad team morale','Technical trouble','Poor testing'];
// Off-season storyline pools — distinct flavor from the weekly in-season noise above, used
// for the once-per-season storylines pass (bigger swings, sponsorship/backing themed).
const RAND_STORY_DRIVER_POS=['Lucrative sponsorship deal','Energised by new management','Positive team atmosphere','Confidence high after testing'];
const RAND_STORY_DRIVER_NEG=['Sponsor pulls funding','Dispute with team management','Lost commercial backing','Off-season distractions'];
const RAND_STORY_TEAM_POS=['New major sponsor','New technical partnership','New investment boosts budget','Positive off-season testing'];
const RAND_STORY_TEAM_NEG=['Major sponsor withdraws','Technical partner departs','Budget cuts','Team personnel changes'];

function randMod(){
  // Random modifier ±0.01 to ±0.15, 2dp, not 0
  const sign=Math.random()<0.5?1:-1;
  const mag=Math.round((Math.random()*0.09+0.01)*100)/100;
  return sign*mag;
}
function randStoryMod(){
  // Off-season storyline swing: 4x the weekly random modifier range (±0.04 to ±0.60)
  const sign=Math.random()<0.5?1:-1;
  const mag=Math.round((Math.random()*0.36+0.04)*100)/100;
  return sign*mag;
}
function randChoice(arr){return arr[Math.floor(Math.random()*arr.length)];}

function applyOffSeasonStorylines(){
  // One round of off-season storylines: same participation rate as the general off-season
  // pass (40%), but bigger swings and its own sponsorship/backing-themed flavor text,
  // reported separately in the new season's pre-season news rather than folded into the
  // outgoing season's review.
  const items=[];
  BASE_DRIVERS.filter(d=>d.team!=='Available'&&!d._retired).forEach(d=>{
    if(Math.random()<0.40){
      const delta=Math.round(randStoryMod()*0.5*100)/100; // driver effect scores halved
      const reason=delta>0?randChoice(RAND_STORY_DRIVER_POS):randChoice(RAND_STORY_DRIVER_NEG);
      applyDriverModEndOfSeason(d.id,delta,reason);
      if(reason==='Energised by new management')applyDriverTeamRelation(d.id,d.team,6,reason);
      else if(reason==='Dispute with team management')applyDriverTeamRelation(d.id,d.team,-6,reason);
      else if(reason==='Positive team atmosphere')applyDriverTeamRelation(d.id,d.team,3,reason);
      else if(reason==='Off-season distractions')applyDriverTeamRelation(d.id,d.team,-3,reason);
      items.push({kind:'driver',id:d.id,name:d.name,delta,reason});
    }
  });
  const teams=[...new Set(BASE_DRIVERS.filter(d=>d.team!=='Available'&&!d._retired).map(d=>d.team))];
  teams.forEach(t=>{
    if(Math.random()<0.40){
      const delta=Math.round(randStoryMod()*0.5*100)/100; // team effect scores halved
      const reason=delta>0?randChoice(RAND_STORY_TEAM_POS):randChoice(RAND_STORY_TEAM_NEG);
      applyTeamModEndOfSeason(t,delta,reason);
      if(reason==='New investment boosts budget'||reason==='Budget cuts'){
        const teamRelDelta=reason==='New investment boosts budget'?4:-4;
        BASE_DRIVERS.filter(dd=>dd.team===t&&!dd._retired).forEach(dd=>applyDriverTeamRelation(dd.id,t,teamRelDelta,reason));
      }
      items.push({kind:'team',name:t,delta,reason});
    }
  });
  return items;
}

function applyRandomModifiers(isOffseason){
  // Per-race: ~8% chance each driver/team; off-season: ~40%
  const driverProb=isOffseason?0.40:MIDWEEK_DRIVER_PROB;
  const teamProb=isOffseason?0.40:MIDWEEK_TEAM_PROB;
  const items=[];

  BASE_DRIVERS.filter(d=>d.team!=='Available'&&!d._retired).forEach(d=>{
    if(Math.random()<driverProb){
      const delta=randMod();
      const reason=delta>0?randChoice(RAND_MOD_DRIVER_POS):randChoice(RAND_MOD_DRIVER_NEG);
      if(isOffseason)applyDriverModEndOfSeason(d.id,delta,reason);
      else applyDriverMod(d.id,delta);
      if(reason==='Good team morale')applyDriverTeamRelation(d.id,d.team,3,'Good team morale');
      else if(reason==='Bad team morale')applyDriverTeamRelation(d.id,d.team,-3,'Bad team morale');
      items.push({kind:'driver',id:d.id,name:d.name,delta,reason});
    }
  });

  const teams=[...new Set(BASE_DRIVERS.filter(d=>d.team!=='Available'&&!d._retired).map(d=>d.team))];
  teams.forEach(t=>{
    if(Math.random()<teamProb){
      const delta=randMod();
      const reason=delta>0?randChoice(RAND_MOD_TEAM_POS):randChoice(RAND_MOD_TEAM_NEG);
      if(isOffseason)applyTeamModEndOfSeason(t,delta,reason);
      else applyTeamMod(t,delta);
      items.push({kind:'team',name:t,delta,reason});
    }
  });

  return items; // [{kind,name,delta,reason}]
}

function raceNewsChampionship(year,round){
  const _st=seasonStandings(year);
  // Max points still available per remaining round: the win value for THIS season's scoring
  // system, plus the fastest-lap bonus point in years that have one. Previously hardcoded to
  // the old 10-points-per-win value, which under 25pt-win eras (2010+) meant the game could
  // declare a champion 'mathematically clinched' far too early, and understate the field of
  // drivers still realistically in the title race.
  const _winPtsForYear=_scoringSummaryForYear(year).points[0]+(_effectiveHasFastestLap(year)?1:0);
  const _rl=seasonRules().totalRounds-round,_mpl=_rl*_winPtsForYear,_mtl=_rl*_winPtsForYear*2;
  const _ld=_st.drivers[0],_nd=_st.drivers[1],_lt=_st.teams[0],_nt=_st.teams[1];
  const parts=[];
  // Only show driver champion message if clinched THIS round (not already clinched in a prior round)
  const _prevSt=round>1?seasonStandings(year):null;
  const _prevLd=_prevSt?.drivers[0],_prevNd=_prevSt?.drivers[1];
  const _prevMpl=(seasonRules().totalRounds-(round-1))*_winPtsForYear,_prevMtl=(seasonRules().totalRounds-(round-1))*_winPtsForYear*2;
  const driverAlreadyClinched=_prevLd&&_prevNd&&(_prevLd.championshipPoints-_prevNd.championshipPoints)>_prevMpl;
  const teamAlreadyClinched=_prevSt&&_prevSt.teams[0]&&_prevSt.teams[1]&&(_prevSt.teams[0].championshipPoints-_prevSt.teams[1].championshipPoints)>_prevMtl;
  if(!driverAlreadyClinched&&_ld&&_nd&&(_ld.championshipPoints-_nd.championshipPoints)>_mpl){
    const _ldb=BASE_DRIVERS.find(x=>x.id===_ld.id);
    parts.push(`<h4>🏆 Driver Champion!</h4><p style="font-size:14px">${flagImg(_ld.nation2)} <strong>${_ldb?driverFullName(_ldb):_ld.name}</strong> is the ${year} World Drivers' Champion!</p>`);
  } else if(round>=Math.ceil(seasonRules().totalRounds*0.75)&&_ld&&_nd){
    const contenders=_st.drivers.filter(d=>_ld.championshipPoints-d.championshipPoints<=_mpl);
    if(contenders.length>1){
      const rows=contenders.map((d,i)=>{
        const bd=BASE_DRIVERS.find(x=>x.id===d.id);
        return`<tr><td>${i+1}</td><td class="left">${flagImg(d.nation2)} ${escapeHtml(bd?driverFullName(bd):d.name)}</td><td>${d.championshipPoints}</td><td>${_ld.championshipPoints-d.championshipPoints>0?'-'+(_ld.championshipPoints-d.championshipPoints):'—'}</td></tr>`;
      }).join('');
      parts.push(`<h4>🏆 Championship race</h4><table class="small-table"><thead><tr><th>Pos</th><th>Driver</th><th>Pts</th><th>Gap</th></tr></thead><tbody>${rows}</tbody></table>`);
    }
  }
  if(!teamAlreadyClinched&&_lt&&_nt&&(_lt.championshipPoints-_nt.championshipPoints)>_mtl){
    parts.push(`<h4>🏆 Constructors' Champion!</h4><p style="font-size:14px"><strong>${escapeHtml(_lt.name)}</strong> are the ${year} Constructors' Champions!</p>`);
  }
  return parts.join('');
}

function raceNewsMilestones(weekendEntry,year,round){
  const race=weekendEntry.race||[];
  const DRIVER_WIN_MILESTONES=[1,5,25,50,100];
  const DRIVER_POLE_MILESTONES=[1,5,25,50,100];
  const TEAM_RACE_MILESTONES=[1,50,100,150,200,250,300];
  const TEAM_WIN_MILESTONES=[1,25,50,100,150,200,250];
  const milestones=[];
  const priorWeekends=app.history.weekends.filter(w=>w.weekendKey!==weekendEntry.weekendKey);
  // 'First points' is gated to round 9+ of the game's very first season — avoids a wave of
  // near-automatic 'first points' messages for the entire starting grid in the opening
  // handful of races, which isn't really milestone-worthy the way a genuine first points
  // finish is later in a career.
  const _gameStartYrMs=priorWeekends.length>0?Math.min(...priorWeekends.map(w=>w.raceMeta.year)):year;
  const _firstPointsEligible=!(year===_gameStartYrMs&&round<9);
  function priorDriverStats(id){
    let wins=0,poles=0,podiums=0,points=0;
    priorWeekends.forEach(w=>{
      const r=w.race.find(r=>r.id===id);
      if(r&&r.position===1)wins++;
      if(r&&r.position<=3)podiums++;
      if(r&&(r.points||0)>0)points+=Number(r.points||0);
      if(w.qualifying.find(q=>q.id===id&&q.pole))poles++;
    });
    return{wins,poles,podiums,points};
  }
  function priorTeamStats(team){
    // Use canonical-name matching, same as teamCareer() below — team is already the
    // canonical name at the call site.
    let starts=0,wins=0,points=0;
    priorWeekends.forEach(w=>{
      if(w.race.some(r=>teamCanonicalName(r.team)===team))starts++;
      if(w.race.find(r=>teamCanonicalName(r.team)===team&&r.position===1))wins++;
      w.race.forEach(r=>{if(teamCanonicalName(r.team)===team)points+=Number(r.points||0);});
    });
    return{starts,wins,points};
  }
  race.forEach(r=>{
    if(!r.id)return;
    const career=driverCareer(r.id);const st=career.stats;
    const prior=priorDriverStats(r.id);
    const bd=BASE_DRIVERS.find(x=>x.id===r.id);const nm=bd?driverFullName(bd):r.driver;
    if(DRIVER_WIN_MILESTONES.includes(st.wins)&&prior.wins<st.wins)
      milestones.push(`${flagImg(r.nation2)} ${escapeHtml(nm)}: ${st.wins===1?'First win':st.wins+' wins'}`);
    if(DRIVER_POLE_MILESTONES.includes(st.poles)&&prior.poles<st.poles)
      milestones.push(`${flagImg(r.nation2)} ${escapeHtml(nm)}: ${st.poles===1?'First pole position':st.poles+' career poles'}`);
    if(prior.podiums===0&&st.podiums===1)
      milestones.push(`${flagImg(r.nation2)} ${escapeHtml(nm)}: First podium`);
    if(_firstPointsEligible&&Number(prior.points||0)===0&&Number(st.championshipPoints||st.points||0)>0)
      milestones.push(`${flagImg(r.nation2)} ${escapeHtml(nm)}: First points`);
  });
  const teamsThisRace=[...new Set(race.map(r=>r.team))];
  teamsThisRace.forEach(teamRaw=>{
    const team=teamCanonicalName(teamRaw); // Ensure we use canonical name for career lookups
    const tc=teamCareer(team);const ts=tc.stats;
    const prior=priorTeamStats(team);
    // Display name for the alias at this year
    const dispName=teamDisplayName(team,year)||team;
    if(TEAM_RACE_MILESTONES.includes(ts.starts)&&prior.starts<ts.starts&&!(ts.starts===1&&round===1))
      milestones.push(`${escapeHtml(dispName)}: ${ts.starts===1?(ts.races>0?'First start':'First entry'):ts.starts+' races'}`);
    if(_firstPointsEligible&&Number(prior.points||0)===0&&Number(ts.championshipPoints||ts.points||0)>0)
      milestones.push(`${escapeHtml(dispName)}: First points`);
    if(TEAM_WIN_MILESTONES.includes(ts.wins)&&prior.wins<ts.wins){
      // For first win: check if this is genuinely the first win under the current alias/display name
      if(ts.wins===1){
        milestones.push(`${escapeHtml(dispName)}: First win`);
      } else {
        // Check if this is first win for the current alias specifically
        const aliasWins=app.history.weekends.filter(w=>{
          const d=teamDisplayName(team,w.raceMeta.year)||team;
          return d===dispName&&(w.race||[]).some(r=>teamCanonicalName(r.team)===teamCanonicalName(team)&&r.position===1);
        }).length;
        const priorAliasWins=aliasWins-1; // subtract the one from this race
        if(priorAliasWins===0){
          milestones.push(`${escapeHtml(dispName)}: First win`);
        } else if(TEAM_WIN_MILESTONES.includes(ts.wins)){
          milestones.push(`${escapeHtml(dispName)}: ${ts.wins} wins`);
        }
      }
    }
  });
  if(!milestones.length)return'';
  return`<h4>🎖 Milestones</h4><ul>${milestones.map(m=>`<li>${m}</li>`).join('')}</ul>`;
}

function raceNewsTeamChanges(weekendEntry,round){
  const items=[];

  // ── Temporary replacements (injury/suspension) ────────────────────────
  if(app.driverInjuries){
    Object.entries(app.driverInjuries).forEach(([id,inj])=>{
      if(inj.fromRound!==round||!inj.impact)return;
      const d=BASE_DRIVERS.find(x=>x.id===Number(id));
      if(!d)return;
      // Use team at time of injury (driver may have since been released/moved to Available)
      const teamForNews=inj.teamAtInjury||(d.team!=='Available'?d.team:null);
      if(!teamForNews)return; // Don't show news for Available-pool drivers
      const isSusp=inj.impact==='Suspension'||inj.cause==='suspension';
      let fa=findPreciseTempCoverage(teamForNews,Number(id));
      const loanEntry=fa&&app._activeLoans?.[fa.id]?[fa.id,app._activeLoans[fa.id]]:null;
      let replStr='';
      if(loanEntry&&fa){
        const donorTeam=loanEntry[1].fromTeam;
        const backfillD=BASE_DRIVERS.find(x=>x.id===loanEntry[1].backfillId);
        replStr=` Replaced by ${flagImg(fa.nation2||'')} <strong>${escapeHtml(driverFullName(fa))}</strong> (loaned from ${escapeHtml(teamDisplayName(donorTeam))}).`;
        if(backfillD){
          replStr+=` <strong>${escapeHtml(driverFullName(fa))}</strong> temporarily replaced at ${escapeHtml(teamDisplayName(donorTeam))} by <strong>${escapeHtml(driverFullName(backfillD))}</strong>.`;
        }
      } else if(fa){
        replStr=` Replaced by ${flagImg(fa.nation2||'')} <strong>${escapeHtml(driverFullName(fa))}</strong>`;
      }
      if(isSusp){
        items.push(`<li>${flagImg(d.nation2)} <strong>${escapeHtml(teamDisplayName(teamForNews)||teamForNews)}</strong> — <strong>${escapeHtml(driverFullName(d))}</strong> suspended for the next race.${replStr}</li>`);
      } else {
        let duration;
        if(inj.missRaces==='career'){duration='career-ending injury!';}
        else if(inj.missRaces==='season'){duration='out for the season due to injury!';}
        else{
          const mr=Number(inj.missRaces)||1;
          const racesRemaining=seasonRules().totalRounds-(inj.fromRound||round);
          if(mr>=racesRemaining){duration='out until end of season due to injury!';}
          else{duration=`injured for next ${mr===1?'race':mr+' races'}.`;}
        }
        items.push(`<li>${flagImg(d.nation2)} <strong>${escapeHtml(teamDisplayName(teamForNews)||teamForNews)}</strong> — <strong>${escapeHtml(driverFullName(d))}</strong> ${escapeHtml(duration)}${replStr}</li>`);
      }
    });
  }

  // ── Permanent changes (firings and quits + replacements) ─────────────────
  if(weekendEntry._firedNews&&weekendEntry._firedNews.length){
    weekendEntry._firedNews.forEach(f=>{
      const isQuit=f.action==='quit';
      const actionLabel=isQuit?'quits!':'fired!';
      const _reasonMap={'rivalry':'rivalry','poor-qualifying':'failed to qualify','reckless-driving':'performance issues','paddock-drama':'paddock drama','underperforming-teammate':'outperformed by teammate','teammate-frustration':'outperformed by teammate','top-team-underperformance':'underperforming a top team','very-poor-form':'prolonged loss of form','car-reliability-frustration':'car reliability frustration'};
      const reasonLabel=f.reason&&f.reason!=='personal'?' ('+(_reasonMap[f.reason]||f.reason)+')':'';
      let line=`<li>${flagImg(f.nation2||'')} <strong>${escapeHtml(f.originalName)}</strong> ${actionLabel}${reasonLabel}`;
      if(f.replacementName){
        if(f.signedFromTeam){
          line+=` <strong>${escapeHtml(teamDisplayName(f.team))}</strong> signs ${f.replacementNation2?flagImg(f.replacementNation2)+' ':''}<strong>${escapeHtml(f.replacementName)}</strong> from <strong>${escapeHtml(teamDisplayName(f.signedFromTeam))}</strong>${f.viaPromotion?' (promoted from pre-qualifying)':''}.`;
          if(f.backfillName){
            line+=` <strong>${escapeHtml(teamDisplayName(f.signedFromTeam))}</strong> signs ${f.backfillNation2?flagImg(f.backfillNation2)+' ':''}<strong>${escapeHtml(f.backfillName)}</strong> to fill the available seat.`;
          }
        } else {
          line+=` <strong>${escapeHtml(teamDisplayName(f.team))}</strong> signs ${f.replacementNation2?flagImg(f.replacementNation2)+' ':''}<strong>${escapeHtml(f.replacementName)}</strong>.`;
        }
      }
      line+='</li>';
      items.push(line);
    });
  }

  // ── Contract expirations (driver returns) from _movementNews ──────────
  const teamReturnItems=(weekendEntry._movementNews||[]).filter(n=>n.startsWith('📋TEAMRETURN:'));
  teamReturnItems.forEach(n=>items.push(`<li>${n.replace('📋TEAMRETURN:','')}</li>`));

  if(!items.length)return'';
  return`<h4>📋 Team news</h4><ul>${items.join('')}</ul>`;
}

function raceNewsMidweekEvents(weekendEntry){

    const curMod=m.kind==='driver'?(()=>{const _bd=m.id?BASE_DRIVERS.find(x=>x.id===m.id):null;return(_bd?.driverBonus||0)+getDriverMod(m.id);})():(teamBaseTb(m.name))+getTeamMod(m.name);

function raceNewsRivalries(weekendEntry){
  const all=[...(weekendEntry._rivalryNews||[])];
  // Also pull fired/replaced rivalry items from movement news
  const firedRivalry=(weekendEntry._movementNews||[]).filter(n=>n.includes('rivalry'));
  all.push(...firedRivalry);
  if(!all.length)return'';
  // Group by type
  const newRiv=all.filter(n=>n.includes('New rivalry'));
  const escalates=all.filter(n=>n.includes('Rivalry escalates'));
  const ends=all.filter(n=>n.includes('Rivalry ends'));
  const other=all.filter(n=>!n.includes('New rivalry')&&!n.includes('Rivalry escalates')&&!n.includes('Rivalry ends'));
  const grouped=[...newRiv,...escalates,...ends,...other];
  return`<h4>⚔ Rivalry news</h4><ul>${grouped.map(n=>`<li>${n}</li>`).join('')}</ul>`;
}

function buildRaceNews(weekendEntry){
  const race=weekendEntry.race||[];
  const year=weekendEntry.raceMeta.year;
  const round=weekendEntry.raceMeta.round;
  const _gameStartYrNews=app.history.weekends.length>0?Math.min(...app.history.weekends.map(w=>w.raceMeta.year)):(app.currentSeason||1989);

  // ── LEFT COLUMN ───────────────────────────────────────────────
  const left=[];
  const sl=str=>{if(str)left.push(str);};

  sl(raceNewsPointsScorers(weekendEntry));
  // Championship race (late-season standings gap) — only when title is close
  sl(raceNewsChampionship(year,round));
  // Rivalries
  sl(raceNewsRivalries(weekendEntry));
  // Midweek events
  sl(raceNewsMidweekEvents(weekendEntry));

  // ── RIGHT COLUMN ──────────────────────────────────────────────
  const right=[];
  const sr=str=>{if(str)right.push(str);};

  // Milestones
  sr(raceNewsMilestones(weekendEntry,year,round));
  // Track records
  sr(raceNewsTrackRecords(weekendEntry));
  // PQ update (after round 8)
  sr(raceNewsPreqUpdate(weekendEntry));
  // Team changes
  sr(raceNewsTeamChanges(weekendEntry,round));
  // All-time records (conditional — season 2+ only, nothing to compare in season 1)
  if(year>_gameStartYrNews){
    sr(raceNewsRecords(weekendEntry));
  }
  // Random category snapshot:
  // Season 1: always show modifier top 5 (driver or team, alternating)
  // Season 2+: full random rotation including modifier categories
  {
    const _snap=(()=>{
      const _modCats=[
        {key:'_modTop',label:'Highest Driver Modifiers',type:'modifier',dir:'top'},
        {key:'_modBot',label:'Lowest Driver Modifiers',type:'modifier',dir:'bot'},
        {key:'_teamModTop',label:'Highest Team Modifiers',type:'modifier',dir:'top',entity:'team'},
        {key:'_teamModBot',label:'Lowest Team Modifiers',type:'modifier',dir:'bot',entity:'team'},
      ];
      const _historyCats=[
        {key:'starts',label:'Race Starts',type:'driver'},{key:'wins',label:'Race Wins',type:'driver'},
        {key:'podiums',label:'Podiums',type:'driver'},{key:'poles',label:'Pole Positions',type:'driver'},
        {key:'championshipPoints',label:'Career Points',type:'driver'},
        {key:'starts',label:'Team Starts',type:'team'},{key:'wins',label:'Team Wins',type:'team'},
        {key:'podiums',label:'Team Podiums',type:'team'},{key:'poles',label:'Team Poles',type:'team'},
        {key:'retirements',label:'Team DNFs',type:'team'},
      ];
      // Season 1: only show modifier categories
      // Season 2+: full rotation
      const _cats=year>_gameStartYrNews?[..._modCats,..._historyCats]:_modCats;
      const _cat=_cats[Math.floor(Math.random()*_cats.length)];
      // Handle modifier categories separately
      if(_cat.type==='modifier'){
        const _isTeam=_cat.entity==='team';
        const _isBot=_cat.dir==='bot';
        const _curYr=year;
        // Helper: accumulated modifier at start of this season (before any this-season modHistory entries)
        function _seasonStartAccMod(id,isTeam){
          const raw=isTeam?(app.modHistory?.teams?.[id]):(app.modHistory?.drivers?.[id]);
          // Guard: modHistory.teams may be initialized as season-teams object (not array) in legacy saves
          const hist=Array.isArray(raw)?raw:[];
          // Find last entry from a PREVIOUS season (yr < curYr)
          const prevEntries=hist.filter(h=>(h.yr||_curYr)<_curYr);
          if(!prevEntries.length)return 0; // no prior history → started at 0 accumulated
          return prevEntries[prevEntries.length-1].v||0;
        }
        let _modEntries=[];
        if(_isTeam){
          _modEntries=[...new Set(BASE_DRIVERS.filter(d=>d.team&&d.team!=='Available'&&!d._retired).map(d=>teamCanonicalName(d.team)))].map(t=>{
            const base=teamBaseTb(t)||0;
            const acc=getTeamMod(t)||0;
            const total=Math.round((base+acc)*100)/100;
            const startAcc=_seasonStartAccMod(t,true);
            const seasonDelta=Math.round((acc-startAcc)*100)/100;
            return{id:t,name:teamDisplayName(t)||t,base,acc,total,seasonDelta};
          });
        } else {
          _modEntries=BASE_DRIVERS.filter(d=>d.team&&d.team!=='Available'&&!d._retired&&!d._temp).map(d=>{
            const base=d.driverBonus||0;
            const acc=getDriverMod(d.id)||0;
            const total=Math.round((base+acc)*100)/100;
            const startAcc=_seasonStartAccMod(d.id,false);
            const seasonDelta=Math.round((acc-startAcc)*100)/100;
            return{id:d.id,name:driverFullName(d),team:d.team,base,acc,total,seasonDelta};
          });
        }
        _modEntries.sort((a,b)=>_isBot?a.total-b.total:b.total-a.total);
        const _top5m=_modEntries.slice(0,10);
        if(!_top5m.length)return'';
        const rowsM=_top5m.map((e,i)=>{
          const nameCell=_isTeam?teamLink(e.id,escapeHtml(e.name),true):driverLink(e.id,escapeHtml(e.name),true);
          const teamCell=_isTeam?'':escapeHtml(teamDisplayName(e.team)||e.team||'');
          const deltaStr=e.seasonDelta===0?'±0.00':(e.seasonDelta>0?`<span style="color:#15803d">+${e.seasonDelta.toFixed(2)}</span>`:`<span style="color:#dc2626">${e.seasonDelta.toFixed(2)}</span>`);
          if(_isTeam){
            return`<tr><td>${i+1}</td><td class="left">${nameCell}</td><td>${fmtBonus(e.total)}</td><td>${deltaStr}</td></tr>`;
          }
          return`<tr><td>${i+1}</td><td class="left">${nameCell}</td><td class="left" style="font-size:12px">${teamCell}</td><td>${fmtBonus(e.total)}</td><td>${deltaStr}</td></tr>`;
        }).join('');
        const hdrs=_isTeam
          ?`<tr><th>Pos</th><th>Team</th><th>Total</th><th>Season</th></tr>`
          :`<tr><th>Pos</th><th>Driver</th><th>Team</th><th>Total</th><th>Season</th></tr>`;
        return`<h4>📊 ${escapeHtml(_cat.label)}</h4><table class="small-table"><thead>${hdrs}</thead><tbody>${rowsM}</tbody></table>`;
      }
      const _weeks=app.history.weekends;
      const _m={};
      _weeks.forEach(w=>{
        if(_cat.type==='driver'){
          w.qualifying.forEach(q=>{if(!_m[q.id])_m[q.id]={name:null,val:0,n2:q.nation2||''};});
          w.race.forEach(r=>{if(!_m[r.id])_m[r.id]={name:null,val:0,n2:r.nation2||''};if(_cat.key==='starts')_m[r.id].val++;else if(_cat.key==='wins'&&r.position===1)_m[r.id].val++;else if(_cat.key==='podiums'&&r.position<=3)_m[r.id].val++;else if(_cat.key==='championshipPoints')_m[r.id].val+=(r.points||0);});
          w.qualifying.forEach(q=>{if(q.pole&&_m[q.id]&&_cat.key==='poles')_m[q.id].val++;});
        } else {
          w.race.forEach(r=>{const t=teamCanonicalName(r.team);if(!_m[t])_m[t]={name:teamDisplayName(t)||t,val:0};if(_cat.key==='starts')_m[t].val++;else if(_cat.key==='wins'&&r.position===1)_m[t].val++;else if(_cat.key==='podiums'&&r.position<=3)_m[t].val++;else if(_cat.key==='retirements'&&(r.status==='retired'||r.status==='crashed'))_m[t].val++;});
          w.qualifying.forEach(q=>{if(q.pole&&_cat.key==='poles'){const t=teamCanonicalName(q.team);if(!_m[t])_m[t]={name:teamDisplayName(t)||t,val:0};_m[t].val++;}});
        }
      });
      if(_cat.type==='driver'){
        Object.entries(_m).forEach(([id,e])=>{const _nid=Number(id);const bd=BASE_DRIVERS.find(d=>d.id===_nid)||(app._retiredDrivers||[]).find(d=>d.id===_nid)||(app._seasonFAPool||[]).find(d=>d.id===_nid);if(bd){e.name=driverFullName(bd)||((bd.fn||bd.firstName||'')+' '+(bd.ln||bd.lastName||'')).trim()||null;}if(!e.name){const dbE=DRIVER_DATABASE.find(d=>d.id===_nid);e.name=dbE?(dbE.fn+' '+dbE.ln).trim():`Driver ${id}`;}});
      }
      const _top10=Object.entries(_m).filter(([,e])=>e.val>0).sort((a,b)=>b[1].val-a[1].val).slice(0,10);
      if(!_top10.length)return'';
      const rows=_top10.map(([id,e],i)=>`<tr><td>${i+1}</td><td class="left">${_cat.type==='driver'?driverLink(Number(id),escapeHtml(e.name),true):teamLink(id,escapeHtml(e.name),true)}</td><td>${e.val}</td></tr>`).join('');
      return`<h4>📊 All-time ${escapeHtml(_cat.label)}</h4><table class="small-table"><thead><tr><th>Pos</th><th>${_cat.type==='driver'?'Driver':'Team'}</th><th>#</th></tr></thead><tbody>${rows}</tbody></table>`;
    })();
    sr(_snap||'');
  }
  // Unused — driver mod changes (kept for debug export, not shown in news)
  // raceNewsDriverMods / raceNewsIncidentMods intentionally omitted

  // ── ASSEMBLE TWO-COLUMN HTML ─────────────────────────────────
  const leftHtml=left.join('');
  const rightHtml=right.join('');
  const html=`<div style="display:flex;gap:20px;align-items:flex-start">
    <div style="flex:0 0 auto;min-width:308px;max-width:440px;padding-right:20px;border-right:1px solid var(--line)">${leftHtml}</div>
    <div style="flex:1 1 0;min-width:200px">${rightHtml}</div>
  </div>`;
  return{
    id:'race-'+weekendEntry.weekendKey,
    type:'race',year,round,
    title:`Rd ${round}: ${weekendEntry.raceMeta.gp}`,
    html
  };
}
function raceNewsRecords(weekendEntry){
  // Check if any driver or team passed/equalled the all-time leader in tracked categories
  // Categories for drivers: starts, wins, podiums, poles, points, championshipWins (titles)
  // Categories for teams:   starts, wins, podiums, poles, points, retirements (DNFs)
  const DRIVER_CATS=[
    {key:'starts',     label:'race starts'},
    {key:'wins',       label:'race wins'},
    {key:'podiums',    label:'podiums'},
    {key:'poles',      label:'pole positions'},
    {key:'championshipPoints', label:'career points'},
    {key:'championshipWins',   label:'Drivers\' Championship titles'},
  ];
  const TEAM_CATS=[
    {key:'starts',     label:'race starts'},
    {key:'wins',       label:'race wins'},
    {key:'podiums',    label:'podiums'},
    {key:'poles',      label:'pole positions'},
    {key:'championshipPoints', label:'career points'},
    {key:'retirements',label:'race DNFs'},
  ];

  // Helper: compute rankings excluding the current weekend (the "before" state)
  // Then compare to current (the "after" state).
  const currentKey=weekendEntry.weekendKey;
  const allWeekends=app.history.weekends;
  const beforeIdx=allWeekends.findIndex(w=>w.weekendKey===currentKey);
  if(beforeIdx<0)return''; // weekend not yet in history

  // Build stat maps from history excluding this weekend
  const beforeWeekends=allWeekends.slice(0,beforeIdx);
  const afterWeekends=allWeekends.slice(0,beforeIdx+1);

  function buildDriverStats(weeks){
    const m={};
    weeks.forEach(w=>{
      w.qualifying.forEach(q=>{const id=q.id;if(!m[id])m[id]={starts:0,wins:0,podiums:0,poles:0,championshipPoints:0,championshipWins:0,entries:0};m[id].entries++;});
      w.prequalifying.forEach(q=>{const id=q.id;if(!m[id])m[id]={starts:0,wins:0,podiums:0,poles:0,championshipPoints:0,championshipWins:0,entries:0};});
      w.race.forEach(r=>{const id=r.id;if(!m[id])m[id]={starts:0,wins:0,podiums:0,poles:0,championshipPoints:0,championshipWins:0,entries:0};m[id].starts++;if(r.position===1)m[id].wins++;if(r.position<=3)m[id].podiums++;m[id].championshipPoints+=(r.points||0);});
      w.qualifying.forEach(q=>{if(q.pole&&m[q.id])m[q.id].poles++;});
    });
    // championship wins per driver
    const yrs=[...new Set(weeks.map(w=>w.raceMeta.year))];
    yrs.forEach(yr=>{
      const st=seasonStandings(yr);
      if(st.complete&&st.drivers[0]){const id=st.drivers[0].id;if(m[id])m[id].championshipWins++;}
    });
    return m;
  }

  function buildTeamStats(weeks){
    const m={};
    weeks.forEach(w=>{
      w.qualifying.forEach(q=>{const t=teamCanonicalName(q.team);if(!m[t])m[t]={starts:0,wins:0,podiums:0,poles:0,championshipPoints:0,retirements:0,entries:0};m[t].entries++;if(q.pole)m[t].poles++;});
      w.prequalifying.forEach(q=>{const t=teamCanonicalName(q.team);if(!m[t])m[t]={starts:0,wins:0,podiums:0,poles:0,championshipPoints:0,retirements:0,entries:0};});
      w.race.forEach(r=>{const t=teamCanonicalName(r.team);if(!m[t])m[t]={starts:0,wins:0,podiums:0,poles:0,championshipPoints:0,retirements:0,entries:0};m[t].starts++;if(r.position===1)m[t].wins++;if(r.position<=3)m[t].podiums++;m[t].championshipPoints+=(r.points||0);if(r.status==='retired'||r.status==='crashed')m[t].retirements++;});
    });
    return m;
  }

  const dBefore=buildDriverStats(beforeWeekends);
  const dAfter=buildDriverStats(afterWeekends);
  const tBefore=buildTeamStats(beforeWeekends);
  const tAfter=buildTeamStats(afterWeekends);

  function topVal(stats,cat){
    // Returns the highest value across all entities for a category
    return Object.values(stats).reduce((mx,s)=>Math.max(mx,s[cat]||0),0);
  }

  // Suppress records before Round 8 in the first season (too noisy when everyone starts from 0)
  const gameStartYr=app.history.weekends.length>0?Math.min(...app.history.weekends.map(w=>w.raceMeta.year)):(app.currentSeason||1989);
  if(weekendEntry.raceMeta.year===gameStartYr&&weekendEntry.raceMeta.round<=8)return'';

  const lines=[];

  // Helper: resolve driver name from any source
  const driverName=id=>{
    const d=BASE_DRIVERS.find(x=>x.id===id)||(app._retiredDrivers||[]).find(x=>x.id===id)||(app._seasonFAPool||[]).find(x=>x.id===id);
    if(d){const n=driverFullName(d)||((d.fn||d.firstName||'')+' '+(d.ln||d.lastName||'')).trim();if(n)return n;}
    const db=DRIVER_DATABASE.find(x=>x.id===id);
    if(db)return((db.fn||'')+' '+(db.ln||'')).trim();
    return null; // suppress unknown drivers
  };

  // Driver records — only fire when someone genuinely separates from the pack
  DRIVER_CATS.forEach(({key,label})=>{
    const prevTop=topVal(dBefore,key);
    if(prevTop===0)return;
    let newTop=prevTop;
    Object.entries(dAfter).forEach(([idStr,stats])=>{
      const id=Number(idStr);
      const newVal=stats[key]||0;
      const prevVal=(dBefore[id]||{})[key]||0;
      if(newVal>prevVal&&newVal>newTop)newTop=newVal;
    });
    if(newTop<=prevTop)return;
    // Who genuinely broke through — was NOT already at prevTop before the race
    const prevHolderIds=Object.entries(dBefore).filter(([,s])=>(s[key]||0)===prevTop).map(([hId])=>Number(hId));
    const prevHolderSet=new Set(prevHolderIds);
    const genuineBreakers=Object.entries(dAfter)
      .filter(([idStr,stats])=>{const id=Number(idStr);return(stats[key]||0)===newTop&&((dBefore[id]||{})[key]||0)<newTop&&!prevHolderSet.has(id);})
      .map(([idStr])=>Number(idStr));
    if(!genuineBreakers.length)return; // all who reached newTop were already at prevTop
    const breakerNames=genuineBreakers.map(id=>driverName(id)).filter(Boolean);
    if(!breakerNames.length)return;
    const breakerSet=new Set(genuineBreakers);
    const prevOnlyIds=prevHolderIds.filter(id=>!breakerSet.has(id)).slice(0,2);
    if(!prevOnlyIds.length)return; // no one left behind = no passing
    const ph=prevOnlyIds.map(hId=>driverName(hId)).filter(Boolean);
    if(!ph.length)return;
    const totalPrev=prevHolderIds.filter(id=>!breakerSet.has(id)).length;
    const phStr=ph.join(' & ')+(totalPrev>2?' et al.':'');
    lines.push(`🏅 <strong>${escapeHtml(breakerNames.join(', '))}</strong> pass${breakerNames.length===1?'es':''} <strong>${escapeHtml(phStr)}</strong> for most ${label} (${newTop})`);
  });

  // Team records — same logic
  TEAM_CATS.forEach(({key,label})=>{
    const prevTop=topVal(tBefore,key);
    if(prevTop===0)return;
    let newTop=prevTop;
    Object.entries(tAfter).forEach(([tKey,stats])=>{
      const newVal=stats[key]||0;
      const prevVal=(tBefore[tKey]||{})[key]||0;
      if(newVal>prevVal&&newVal>newTop)newTop=newVal;
    });
    if(newTop<=prevTop)return;
    const prevHolderKeys=Object.keys(tBefore).filter(hk=>(tBefore[hk][key]||0)===prevTop);
    const prevHolderKeySet=new Set(prevHolderKeys);
    const genuineBreakers=Object.entries(tAfter)
      .filter(([tKey,stats])=>{return(stats[key]||0)===newTop&&((tBefore[tKey]||{})[key]||0)<newTop&&!prevHolderKeySet.has(tKey);})
      .map(([tKey])=>tKey);
    if(!genuineBreakers.length)return;
    const breakerNames=genuineBreakers.map(tKey=>teamDisplayName(tKey)||tKey);
    const breakerSet=new Set(genuineBreakers);
    const prevOnlyKeys=prevHolderKeys.filter(hk=>!breakerSet.has(hk)).slice(0,2);
    if(!prevOnlyKeys.length)return;
    const ph=prevOnlyKeys.map(hk=>teamDisplayName(hk)||hk);
    const totalPrev=prevHolderKeys.filter(hk=>!breakerSet.has(hk)).length;
    const phStr=ph.join(' & ')+(totalPrev>2?' et al.':'');
    lines.push(`🏅 <strong>${escapeHtml(breakerNames.join(', '))}</strong> pass${breakerNames.length===1?'es':''} <strong>${escapeHtml(phStr)}</strong> for most ${label} (${newTop})`);
  });

  if(!lines.length)return'';
  return`<h4>📊 All-time records</h4><ul>${lines.map(l=>`<li>${l}</li>`).join('')}</ul>`;
}

function _scoringSummaryForYear(year){
  const mode=app?.realism?.scoringMode||'historical';
  if(mode==='always9')return{points:[9,6,4,3,2,1],bestN:11,fastestLap:false};
  if(mode==='always10')return{points:[10,6,4,3,2,1],bestN:null,fastestLap:false};
  const era=_scoringEraForYear(year);
  return{points:era.points,bestN:era.bestN,fastestLap:era.fastestLap};
}
// Points-gap thresholds elsewhere in the code (e.g. 'is this championship battle close?')
// were calibrated against the classic 10-points-for-a-win scoring. Under the 25pt-win eras
// (2010+) those same absolute gaps are trivially crossed and stop meaning what they used to,
// so callers scale their thresholds by this ratio rather than using the raw numbers as-is.
function _scoringScaleForYear(year){
  return (_scoringSummaryForYear(year).points[0]||10)/10;
}

  const preqDriversNews=BASE_DRIVERS.filter(d=>preqIdsForNews.includes(d.id)&&d.team&&d.team!=='Available'&&!d._retired&&!d._temp);
  // Auto-qualifiers table grouped by team (use display name for aliases)

  const preqTeamNamesNews=[...new Set(preqDriversNews.map(d=>teamDisplayName(d.team)))];
  const preqRows=preqTeamNamesNews.map(t=>{const ds=preqDriversNews.filter(d=>teamDisplayName(d.team)===t);return`<tr><td class="left"><strong>${escapeHtml(t)}</strong></td><td class="left">${ds.map(d=>`${flagImg(d.nation2)} ${escapeHtml(driverFullName(d))}`).join('<br>')}</td></tr>`;}).join('');

  return {
