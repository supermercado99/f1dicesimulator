<style>

*{box-sizing:border-box} body{margin:0;font-family:Segoe UI,Arial,sans-serif;color:var(--text);background:var(--bg)} .app{padding:16px;max-width:1900px;margin:0 auto} h1{margin:0 0 12px;font-size:28px;color:var(--accent)}

.controls,.statusbar{display:flex;gap:12px;flex-wrap:wrap;align-items:center}.controls{padding:12px;margin-bottom:12px}.statusbar{padding:12px;margin-bottom:12px}
button,select{font:inherit;padding:8px 12px;border-radius:8px;border:1px solid var(--line);background:white} button{cursor:pointer;background:var(--accent);color:white;border:none;font-weight:600}.secondary{background:#4b5563}.ghost{background:white;color:var(--accent);border:1px solid var(--accent)} button:disabled{opacity:.5;cursor:not-allowed}

/* ── RETRO MODAL ─────────────────────────────────────────────────────────── */

.save-slot-name{font-size:11px;color:#f5c518;letter-spacing:1px;margin-bottom:3px}

<script>

// ── DEBUG MESSAGE SYSTEM ───────────────────────────────────────────────────
// Shows on-screen toast when app._debugMessages is true (default on).
// Safe to call anywhere — never throws.

// ── STANDINGS & HISTORY CACHES ────────────────────────────────────────────
// Declared here (top of script) so invalidateStandingsCache() is safe to call
// from postInitSetup(), which runs before these would otherwise be declared.
const _standingsCache={};
let _historyRaceFlatCache=null,_historyFlatLen=-1;
function getHistoryRaceFlat(){
  if(_historyFlatLen===app.history.weekends.length&&_historyRaceFlatCache)return _historyRaceFlatCache;
  _historyRaceFlatCache=app.history.weekends.flatMap(w=>w.race);
  _historyFlatLen=app.history.weekends.length;
  return _historyRaceFlatCache;
}
function invalidateStandingsCache(){Object.keys(_standingsCache).forEach(k=>delete _standingsCache[k]);_historyRaceFlatCache=null;_historyFlatLen=-1;}
function debugMsg(title, detail){
  try{
    console.log('[DEBUG]',title, detail||'');
    if(typeof app==='undefined'||!app||app._debugMessages===false)return;
    const el=document.createElement('div');
    el.style.cssText='position:fixed;bottom:12px;left:50%;transform:translateX(-50%);background:#1e293b;color:#f1f5f9;padding:8px 14px;border-radius:8px;font-size:11px;font-family:monospace;z-index:9999;max-width:520px;box-shadow:0 4px 12px rgba(0,0,0,.4);pointer-events:none';
    el.innerHTML=`<strong style="color:#fbbf24">${escapeHtml?escapeHtml(String(title)):String(title)}</strong>${detail?'<br>'+String(detail).slice(0,200):''}`;
    document.body.appendChild(el);
    setTimeout(()=>{try{el.remove();}catch(e){}},8000);
  }catch(e){
    // debugMsg itself must never throw
    try{console.error('[debugMsg error]',e);}catch(e2){}
  }
}

// ── SEASON ACCESSORS ─────────────────────────────────────────────────────────
// Active season data accessor — safe to call before app is initialized
function seasonData(yr){
  let year=yr;
  if(!year){try{year=app?.currentSeason;}catch(e){year=1989;}}
  return SEASONS[year||1989]||SEASONS[1989];
}
function seasonRules(){return seasonData().rules;}
function seasonCalendar(){return seasonData().calendar;}
// Display name for a team (e.g. 'Arrows' → 'Footwork' in 1991)
function teamDisplayName(teamKey,yr){
  const sd=yr?SEASONS[yr]:seasonData();
  return(sd&&sd.teamAliases&&sd.teamAliases[teamKey])||teamKey;
}
// Canonical key from display name
function teamCanonicalName(displayName){
  const sd=seasonData();if(!sd.teamAliases)return displayName;
  for(const[k,v]of Object.entries(sd.teamAliases)){if(v===displayName)return k;}
  return displayName;
}
// Base team bonus for current season
function teamBaseTb(teamKey){
  const sd=seasonData();
  const canon=teamCanonicalName(teamKey);
  return(sd.teams[canon]||sd.teams[teamKey])?.tb||0;
}
// Is this team a one-driver team in current season?
function isOneDriverTeam(teamKey){
  return(seasonRules().oneDriverTeams||[]).includes(teamCanonicalName(teamKey));
}
// Championship points table (season-specific)
function champPointsFor(position){
  const pts=seasonRules().champPoints||[10,6,4,3,2,1];
  return pts[position-1]||0;
}

// ── DRIVER DATA ────────────────────────────────────────────────────────────
function buildDrivers(year){
  const rows = [];
  const sd = seasonData(year);   // explicit year avoids reading app during module init
  const teamData = sd.teams;

  // ── 1. Contracted drivers ─────────────────────────────────────────────
  // Format: [firstName, lastName, nationality, dobYear, driverBonus, permanentId, team]
  sd.contracted.forEach(([fn,ln,nat,dob,db,pid,team])=>{
    const {n2,n3} = natCodes(nat);
    const tb = teamData[team]?.tb ?? 0;
    rows.push({fn,ln,n2,n3,team,db,tb,dob,pref:null,nat,pid});
  });

  // ── 2. randomSecondDriver is no longer used (EuroBrun is now a regular contracted one-driver team)

  // ── 3. Build BASE_DRIVERS array with listOrder and bonus breakdown ────
  return rows.map((d,i)=>{
    const id=d.pid||i+1, lo=i+1;
    const db=d.db||0, tb=d.tb||0, qb=db+tb;
    return {
      id, pid:d.pid||null, listOrder:lo,
      firstName:d.fn, lastName:d.ln, name:d.ln,
      nation2:d.n2, nation3:d.n3, nationality:d.nat,
      team:d.team, dob:d.dob||0,
      preferredTeam:d.pref||null,
      isFreeAgent:false,
      driverBonus:db, teamBonus:tb, qualiBonus:qb, raceNoGridBonus:qb,
      bonusBreakdownQuali:'D'+(db>=0?'+':'')+db+' T'+(tb>=0?'+':'')+tb,
      bonusBreakdownRaceBase:'D'+(db>=0?'+':'')+db+' T'+(tb>=0?'+':'')+tb,
    };
  });
}
let BASE_DRIVERS = buildDrivers(1989);  // initially 1989; rebuilt by postInitSetup if save is 1991

// ── AVAILABLE POOL (season runtime) ───────────────────────────────────────
// Built from seasonData().available at season start.
// Separate from BASE_DRIVERS (contracted). IDs start at 2000.
// The EuroBrun second driver is removed from this pool after being contracted above.
function buildFreeAgents(year){
  const _faSD=seasonData(year);
  return _faSD.available
    .map(([fn,ln,nat,dob,db,pid],i)=>{
      const {n2,n3}=natCodes(nat);
      return {
        id:pid||2000+i, fn, ln, firstName:fn, lastName:ln, name:ln,
        n2, n3, nation2:n2, nation3:n3, nationality:nat,
        nat, dob, db, driverBonus:db,
        teamBonus:0, qualiBonus:db, raceNoGridBonus:db,
        team:'Available', preferredTeam:null,
        isFreeAgent:true,
        pid:pid||null,
      };
    });
}

// ── AGE MODIFIER ─────────────────────────────────────────────────────────
function ageModifier(d,season){
  const age=driverAge(d,season);
  if(!age||age<30)return 0;
  if(age<=31)return 0.00;
  if(age<=33)return -0.05;
  if(age<=35)return -0.15;
  if(age<=37)return -0.30;
  if(age<=39)return -0.50;
  return -0.75; // 40+
}

// Get available free agents for a given season (from DB, eligible, not retired)
function getSeasonFreeAgents(season){
  const retiredIds=new Set((app._retiredDrivers||[]).map(r=>r.dbKey));
  const used=new Set(BASE_DRIVERS.map(d=>d.lastName));
  // Active free agent pool: drivers from DB with firstYear<=season, not in BASE_DRIVERS by last name, not retired
  return DRIVER_DATABASE.filter(d=>{
    if(!d.firstYear||d.firstYear>season)return false;  // exclude drivers with no firstYear or future firstYear
    if(retiredIds.has(d.ln))return false;
    if(used.has(d.ln))return false; // already on grid
    return true;
  }).map(d=>({...d,id:3000+DRIVER_DATABASE.indexOf(d),name:d.ln,firstName:d.fn,lastName:d.ln,
    teamBonus:0,preferredTeam:null,team:'Available',
    dob:d.dob,driverBonus:d.db,qualiBonus:d.db,raceNoGridBonus:d.db}));
}

// ── NAME DISPLAY HELPERS ─────────────────────────────────────────────────
function driverFullName(d){return d.firstName&&d.lastName?d.firstName+' '+d.lastName:(d.name||'');}
function driverShortName(d){
  // "A. Surname" format for race screens
  if(d.firstName&&d.lastName)return d.firstName.charAt(0)+'. '+d.lastName;
  return d.name||'';
}
function driverSurname(d){return d.lastName||d.name||'';}

function loadApp(){
  try{
    // Load the most recently saved season (tracked in f1dice_lastSeason)
    const lastSeason=Number(localStorage.getItem('f1dice_lastSeason'))||1989;
    let s=JSON.parse(localStorage.getItem(appKey(lastSeason)));
    // Fallback: try the other season, then legacy key
    if(!s){const otherSeason=lastSeason===1989?1991:1989;s=JSON.parse(localStorage.getItem(appKey(otherSeason)));}
    if(!s)s=JSON.parse(localStorage.getItem('f1dice_app_v8')); // legacy key
    if(!s) return defaultApp();
    if(!s.driverModifiers){const d=defaultApp();s.driverModifiers=d.driverModifiers;s.teamModifiers=d.teamModifiers;s.driverInjuries={};s.modHistory={drivers:{},teams:{}};}
    if(!s.modHistory) s.modHistory={drivers:{},teams:{}};
    if(s._debugMessages===undefined) s._debugMessages=true;
    // _euroBrunDriver no longer used (EuroBrun is now a contracted one-driver team)
    if(!s._initialTeamSizes){
      s._initialTeamSizes={};
      BASE_DRIVERS.filter(d=>d.team!=='Available'&&!d._retired&&!d._temp).forEach(d=>{s._initialTeamSizes[d.team]=(s._initialTeamSizes[d.team]||0)+1;});
    }
    if(!s._movementRules) s._movementRules={injuries:true,suspensions:true,quitting:true,firing:true}; // default on for existing saves
    // Migrate stale 1990 season to 1989 on version change
    if(s.currentSeason===1990)s.currentSeason=1989;
    // Migrate preqDriverIds — allow temp driver IDs (they're transient; just keep any valid BASE_DRIVERS id
    // plus any id that might be a temp hire not yet in BASE_DRIVERS at cold load — preserve them)
    const validIds=new Set(BASE_DRIVERS.map(d=>d.id));
    const _defaultPqIds=()=>{
      const yr=s.currentSeason||1989;
      const rls=seasonRules(yr);
      // 1989: use fixed PQ seat list
      if(rls.initialPreqIds89) return rls.initialPreqIds89;
      // For other seasons: derive from SEASONS contracted data (not BASE_DRIVERS,
      // which may not be rebuilt yet at this point in loadApp)
      const sd=SEASONS[yr];
      if(!sd) return [];
      const cutoff=rls.autoQualCutoff||20;
      // contracted[i] has listOrder = i+1; PQ drivers are those with listOrder > cutoff
      return sd.contracted.slice(cutoff).map(e=>e[5]).filter(Boolean);
    };
    if(!s.preqDriverIds||!s.preqDriverIds.length){
      s.preqDriverIds=_defaultPqIds();
    } else {
      // Only strip IDs that are neither in BASE_DRIVERS nor could be valid temp driver IDs (>=2000)
      s.preqDriverIds=s.preqDriverIds.filter(id=>validIds.has(id)||id>=2000);
      if(!s.preqDriverIds.length){
        s.preqDriverIds=_defaultPqIds();
      }
    }
    return s;
  }catch(e){return defaultApp();}
}

function updateModifiersAfterRace(results){
  const isSecondSeasonPlus=app.currentSeason>1989||(app.history.weekends.filter(w=>w.raceMeta.year!==app.currentSeason).length>0);

    const ttm=teamTotalMod(r.team);
    // Determine tier: 0=Win, 1=Podium, 2=P4-6, 3=P7-12, 4=P13+/DNF
    const tier=r.position===1?0:r.position<=3?1:r.position<=6?2:r.position<=12?3:4;
    const dnf=r.status!=='active';
    const effectiveTier=dnf?4:tier;
    // Driver scaled delta
    const dd=scaledMod(MOD_RACE_DRIVER,dtm,effectiveTier);
    if(dd!==0){applyDriverMod(r.id,dd);rec('driver',r.id,dName,dd,['Win','Podium','P4-6','P7-12','DNF'][effectiveTier]);}
    // Team scaled delta — only best driver result (handled outside loop via bestTier tracking)
    // Special flat bonuses on top of scaled delta
    const fromPreq=(app.preqDriverIds||[]).includes(r.id);
    if(!dnf&&r.position<=6&&fromPreq){applyDriverMod(r.id,MOD_TOP6_FROM_PQ);rec('driver',r.id,dName,MOD_TOP6_FROM_PQ,'Top-6 from PQ');}
    else if(!dnf&&r.position<=6&&!fromPreq&&(r.gridPos||99)>18){applyDriverMod(r.id,MOD_TOP6_BACKGRID);rec('driver',r.id,dName,MOD_TOP6_BACKGRID,'Top-6 from back of grid');}
    if(!dnf&&r.qualifyingPos<=6&&r.position>10){applyDriverMod(r.id,MOD_UNDERPERF);rec('driver',r.id,dName,MOD_UNDERPERF,'Underperformed vs qualifying position');}
    // Early career
    if(isSecondSeasonPlus){
      const careerEntries=app.history.weekends.filter(w=>w.qualifying.some(q=>q.id===r.id)||w.prequalifying.some(p=>p.id===r.id)).length;
      if(careerEntries<10){
        if(r.position===1&&!(app._earlyCareerWinAwarded||{})[r.id]){
          if(!app._earlyCareerWinAwarded)app._earlyCareerWinAwarded={};
          app._earlyCareerWinAwarded[r.id]=true;

        } else if(r.position<=3&&!(app._earlyCareerPodiumAwarded||{})[r.id]&&!(app._earlyCareerWinAwarded||{})[r.id]){
          if(!app._earlyCareerPodiumAwarded)app._earlyCareerPodiumAwarded={};
          app._earlyCareerPodiumAwarded[r.id]=true;
          applyDriverMod(r.id,MOD_EARLY_PODIUM);rec('driver',r.id,dName,MOD_EARLY_PODIUM,'First career podium bonus');
        }
        if((r.points||0)>0){

          const cnt=app._earlyCareerPtsAwarded[r.id]||0;
          if(cnt<3){app._earlyCareerPtsAwarded[r.id]=cnt+1;applyDriverMod(r.id,MOD_EARLY_PTS);rec('driver',r.id,dName,MOD_EARLY_PTS,'Early career points bonus');}
        }
      }
    }
  });
  // Team modifier — best driver result per team
  const byTeam={};
  results.forEach(r=>{
    const tier=r.status!=='active'?4:r.position===1?0:r.position<=3?1:r.position<=6?2:r.position<=12?3:4;

}

// ── PRE-QUALIFYING RECALCULATION ──────────────────────────────────────────
// PQ pool computation
function computePreqIds(){
  const yr=app.currentSeason||1989;
  const rules=seasonRules(yr);
  const round=currentSeasonEntries().length+1; // round about to be played

  // 1989 R1-R8: use fixed initial list (expanded for any replacements in those teams)
  if(yr===1989&&round<=rules.preqRecalcAfterRound){
    // Seat-count approach: each PQ team contributes N drivers determined by listOrder.
    // Replacement drivers inherit the listOrder of the driver they replace (see hireFA),
    // so taking the N highest-listOrder drivers from each PQ team always finds the right seats.
    const PQ_SEATS_1989={
      Brabham:2,Onyx:2,Osella:2,Zakspeed:2,EuroBrun:1, // full-PQ teams
      AGS:1,Coloni:1,Dallara:1,Rial:1,                  // split teams (one seat each)
    };
    const result=[];
    Object.entries(PQ_SEATS_1989).forEach(([team,count])=>{
      BASE_DRIVERS
        .filter(d=>d.team===team&&!d._retired&&!d._temp)
        .sort((a,b)=>b.listOrder-a.listOrder) // highest listOrder = PQ seat
        .slice(0,count)
        .forEach(d=>result.push(d.id));
    });
    return result.filter(id=>BASE_DRIVERS.some(d=>d.id===id&&!d._retired));
  }

  // 1989 R9+ and 1991: recalc based on bottom teams
  const st=seasonStandings(yr);
  const _PREQ_SKIP=new Set(['Available']);
  const _allTeamsSrc=app._initialTeams||BASE_DRIVERS.filter(d=>!_PREQ_SKIP.has(d.team)).map(d=>d.team);
  const allTeams=[...new Set(_allTeamsSrc)];
  const teamPts={};
  allTeams.forEach(t=>teamPts[t]=0);
  st.teams.forEach(t=>{
    const canon=teamCanonicalName(t.name);
    if(teamPts[canon]!==undefined)teamPts[canon]=t.championshipPoints;
    else teamPts[t.name]=t.championshipPoints;
  });
  const currentPqTeams=new Set((app.preqDriverIds||[])
    .map(id=>BASE_DRIVERS.find(d=>d.id===id)?.team).filter(Boolean));
  const avgListOrder=t=>{const ds=BASE_DRIVERS.filter(d=>d.team===t);return ds.length?ds.reduce((s,d)=>s+d.listOrder,0)/ds.length:99;};
  const sortedTeams=allTeams.slice().sort((a,b)=>{
    const pa=teamPts[a]||0,pb=teamPts[b]||0;
    if(pa!==pb)return pa-pb;
    const aPq=currentPqTeams.has(a)?0:1, bPq=currentPqTeams.has(b)?0:1;
    if(aPq!==bPq)return aPq-bPq;
    return avgListOrder(a)-avgListOrder(b);
  });
  const preqTeams=sortedTeams.slice(0,rules.preqRecalcTeams||10);
  // 1989 R9+: ALL drivers from those teams PQ (not just original PQ-flagged ones)
  return BASE_DRIVERS.filter(d=>preqTeams.includes(d.team)&&d.team!=='Available'&&!d._retired&&!d._temp).map(d=>d.id);
}

function applyPreqRecalc(){
  const oldIds=[...(app.preqDriverIds||[])];
  const newIds=computePreqIds();
  app.preqDriverIds=newIds;
  saveApp();
  // Diff by TEAMS not individual drivers
  const oldTeams=new Set(oldIds.map(id=>BASE_DRIVERS.find(d=>d.id===id)?.team).filter(Boolean));
  const newTeams=new Set(newIds.map(id=>BASE_DRIVERS.find(d=>d.id===id)?.team).filter(Boolean));
  const addedTeams=[...newTeams].filter(t=>!oldTeams.has(t));
  const removedTeams=[...oldTeams].filter(t=>!newTeams.has(t));
  // If a one-driver PQ team (e.g. EuroBrun in 1989, Osella/Coloni in 1991) exits PQ after recalc,
  // there are now one fewer auto-qualifier, so one extra driver from PQ must advance to keep qualifying at 30.
  const oneDriverTeams=seasonRules().oneDriverTeams||[];
  const onedriverExited=removedTeams.some(t=>oneDriverTeams.includes(t)||oneDriverTeams.includes(teamCanonicalName(t)));
  if(onedriverExited&&seasonRules().preqAdvanceIfOnedriverExits){
    app._preqAdvanceOverride=seasonRules().preqAdvanceIfOnedriverExits;
  } else {
    delete app._preqAdvanceOverride;
  }
  return {addedTeams,removedTeams,newIds,onedriverExited};
}

function applyCrashMod(crashed,secondId){
  const applied=new Set();
  crashed.forEach(id=>{
    if(applied.has(id))return; // prevent double-apply
    applied.add(id);
    applyDriverMod(id,id===secondId?-0.20:-0.10);
  });
}

// Drivers: free agents start at -0.50. Scale up per race result until 0.00.
// Teams: new entrants start at -0.30. Expires end of debut season regardless.

function registerFreeAgentDriver(id){
  // Call when a new free-agent driver is added from second season
  if(!app._inexperienceDrivers)app._inexperienceDrivers={};
  if(app._inexperienceDrivers[id]===undefined)app._inexperienceDrivers[id]=-0.50;
  applyDriverMod(id,-0.50);
}

function registerNewTeam(team,season){
  if(!app._inexperienceTeams)app._inexperienceTeams={};
  if(!app._inexperienceTeams[team]){
    app._inexperienceTeams[team]={penalty:-0.30,seasonDebut:season};
    applyTeamMod(team,MOD_INEXP_TEAM);
  }
}

function updateInexperienceAfterRace(results,preqFailedIds){
  if(!app._inexperienceDrivers)return;
  const isSecondSeason=app.currentSeason>1989;
  if(!isSecondSeason)return;

  // Driver inexperience scale-down
  Object.keys(app._inexperienceDrivers).forEach(rawId=>{
    const id=Number(rawId);
    let pen=app._inexperienceDrivers[id];
    if(pen>=0){delete app._inexperienceDrivers[id];return;} // already expired
    const r=results.find(x=>x.id===id);
    let delta=0;
    if(r){
      if(r.position===1) delta+=0.25;
      else if(r.position<=3) delta+=0.15;
      else if((r.points||0)>0) delta+=0.08; // 4th–6th points finish (note: spec says +0.8 but that seems a typo for +0.08)
      delta+=0.04; // per race start
    }
    // Failed pre-qualification counts too
    if(preqFailedIds&&preqFailedIds.includes(id)) delta+=0.02;
    if(delta>0){
      const newPen=Math.min(0,pen+delta);
      const actualDelta=newPen-pen;
      app._inexperienceDrivers[id]=newPen;
      if(actualDelta!==0) applyDriverMod(id,actualDelta);
      if(newPen>=0) delete app._inexperienceDrivers[id];
    }
  });

  // Team inexperience: expire at end of debut season, apply race-by-race scale-down
  if(!app._inexperienceTeams)return;
  Object.keys(app._inexperienceTeams).forEach(team=>{
    const entry=app._inexperienceTeams[team];
    if(!entry)return;
    // Expire at end of debut season (if current season > seasonDebut, clear it)
    if(app.currentSeason>entry.seasonDebut){
      // Reset any remaining penalty
      const rem=entry.penalty;
      if(rem<0) applyTeamMod(team,-rem); // bring back to 0
      delete app._inexperienceTeams[team];
      return;
    }
    let pen=entry.penalty;
    if(pen>=0){delete app._inexperienceTeams[team];return;}
    const teamResults=results.filter(r=>r.team===team);
    let delta=0;
    teamResults.forEach(r=>{
      if(r.position===1) delta+=0.15;
      else if(r.position<=3) delta+=0.05; // note spec says +0.5 but likely +0.05
    });
    if(delta>0){
      const newPen=Math.min(0,pen+delta);
      const actualDelta=newPen-pen;
      entry.penalty=newPen;
      if(actualDelta!==0) applyTeamMod(team,actualDelta);
      if(newPen>=0) delete app._inexperienceTeams[team];
    }
  });
}

function expireSeasonEndInexperience(){
  // Called at end of season to expire new-team modifiers
  if(!app._inexperienceTeams)return;
  Object.keys(app._inexperienceTeams).forEach(team=>{
    const entry=app._inexperienceTeams[team];
    if(!entry||entry.seasonDebut!==app.currentSeason)return;
    if(entry.penalty<0) applyTeamMod(team,-entry.penalty);
    delete app._inexperienceTeams[team];
  });
}

// ── SEASON TRANSITION MECHANICS ─────────────────────────────────────────

// ── FIRING PROBABILITY (during season) ────────────────────────────────────
// Returns % chance a driver gets fired after a given race, based on table in changelog
function firingChance(raceNum, isPreqTeam, isReplacingFiredDriver){
  // raceNum = races completed so far this season
  // Early 1990s F1 saw significant mid-season movement; rates reflect this
  if(isPreqTeam){
    if(raceNum<=8)  return isReplacingFiredDriver?0.005:0.025;   // ~2.5% per race for PQ teams R1-8
    if(raceNum<=13) return isReplacingFiredDriver?0.02:0.04;
    return          isReplacingFiredDriver?0.04:0.08;
  } else {
    if(raceNum<=8)  return 0.005;  // 0.5% per race R1-8 for auto-qual teams
    if(raceNum<=13) return 0.018;
    return 0.04;
  }
}

// ── MID-SEASON: FIRING & QUITTING LOGIC ──────────────────────────────────
// quittingChance = half of firingChance; driver in top 5 cannot quit
function quittingChance(raceNum, isPreqTeam, isReplacingFiredDriver){
  return firingChance(raceNum, isPreqTeam, isReplacingFiredDriver) * 0.5;
}

// Remove a driver from their team mid-season and return them to available pool
// reason: 'fired' | 'quit'
function releaseDriverFromTeam(d, reason){
  d._fired = reason==='fired' ? true : undefined;
  d._quit  = reason==='quit'  ? true : undefined;
  // Remove from PQ list immediately
  if(app.preqDriverIds){
    app.preqDriverIds=app.preqDriverIds.filter(id=>id!==d.id);
  }
  // Remove from BASE_DRIVERS — fired/quit drivers are no longer in the active race pool.
  // Their history remains in app.history; they return to the available pool below.
  const idx=BASE_DRIVERS.findIndex(x=>x.id===d.id);
  if(idx>=0) BASE_DRIVERS.splice(idx,1);
  // Return to available pool with clean bonus data (strip stale team bonus)
  if(app._seasonFAPool){
    app._seasonFAPool.push({
      ...d,
      id: d.id,
      fn: d.firstName, ln: d.lastName,
      firstName: d.firstName, lastName: d.lastName,
      teamBonus: 0,
      qualiBonus: d.driverBonus||0,
      raceNoGridBonus: d.driverBonus||0,
      team: 'Available'
    });
  }
}

function evaluateAndFireDrivers(raceResults, newsItems){
  const round=currentSeasonEntries().length;
  const st=seasonStandings(app.currentSeason||1989);
  const top5Ids=new Set(st.drivers.slice(0,5).map(d=>d.id));
  const preqIds=new Set(app.preqDriverIds||[]);
  const toProcess=[];

  BASE_DRIVERS.filter(d=>!d._temp&&d.team!=='Available').forEach(d=>{
    if(top5Ids.has(d.id))return;
    // Guard: don't fire if this would leave the team with zero contracted drivers
    const currentContracted=BASE_DRIVERS.filter(x=>x.team===d.team&&!x._temp&&!x._retired&&x.team!=='Available').length;
    if(currentContracted<=1)return; // would orphan the team — skip
    const dSt=st.drivers.find(x=>x.id===d.id);
    const hasSeasonPoints=(dSt?.championshipPoints||0)>0;
    // Did this driver score points in the race just completed?
    const scoredThisRace=(raceResults.find(r=>r.id===d.id)?.points||0)>0;
    const isPreq=preqIds.has(d.id);
    const isReplacer=!!(app._activeContracts&&app._activeContracts[d.id]);

    // ── Firing ──
    let fireChance=app._movementRules?.firing===false?0:firingChance(round,isPreq,isReplacer);
    if(!isPreq&&hasSeasonPoints)fireChance=0;
    // Rivalry firing: 0.5% chance hatred forces a firing
    let rivalFire=false;
    const teammate=BASE_DRIVERS.find(t=>t.team===d.team&&t.id!==d.id&&!t._temp);
    if(teammate&&Math.random()<0.005){
      const rv=getRivalry(d.id,teammate.id);
      if(rv&&rv.hatred){fireChance=1;rivalFire=true;}
    }
    if(Math.random()<fireChance){
      toProcess.push({id:d.id,team:d.team,reason:rivalFire?'rivalry':'performance',action:'fired'});
      return; // if fired, skip quit check
    }

    // ── Quitting ──
    let quitChance=app._movementRules?.quitting===false?0:quittingChance(round,isPreq,isReplacer);
    if(!isPreq&&hasSeasonPoints)quitChance=0; // season points still block firing
    if(scoredThisRace)quitChance=0;           // can't quit after scoring this race
    if(Math.random()<quitChance){
      toProcess.push({id:d.id,team:d.team,reason:'personal',action:'quit'});
    }
  });

  toProcess.forEach(f=>{
    const d=BASE_DRIVERS.find(x=>x.id===f.id);
    if(!d)return;
    const name=driverSurname(d);
    const fullName=driverFullName(d);
    const team=d.team;

    if(f.action==='fired'&&f.reason==='rivalry'){
      const tm=BASE_DRIVERS.find(x=>x.team===team&&x.id!==d.id&&!x._temp);
      if(tm){const rv=getRivalry(f.id,tm.id);if(rv){rv.pts=100;rv.hatred=true;}}
    }

    releaseDriverFromTeam(d, f.action);

    // Always find a replacement (teams must stay at their starting driver count)
    if(!app.currentWeekend._firedNews)app.currentWeekend._firedNews=[];
    const repl=findReplacement(team,[f.id],true);
    if(repl){
      hireReplacement(repl,team,999,null); // 999 = rest of season; null = no one returning
      const replFullName=((repl.fn||repl.firstName||'')+' '+(repl.ln||repl.lastName||'')).trim();
      const actionLabel=f.action==='quit'?'has quit':'has been fired';
      const reasonLabel=f.reason==='rivalry'?' (rivalry)':(f.action==='quit'?'':'');
      app.currentWeekend._firedNews.push({
        team, action: f.action, reason: f.reason,
        originalName: fullName||name,
        replacementName: replFullName,
        nation2: d.nation2||''
      });
      // Rivalry points between departing driver and replacement
      const rivalPts=Math.floor(Math.random()*26);
      if(rivalPts>0) addRivalryPoints(f.id,repl.id,rivalPts,f.action==='fired'?'Fired and replaced':'Replaced after quitting',newsItems);
    } else {
      if(newsItems)newsItems.push(`⚠ No available replacement found for <strong>${escapeHtml(team)}</strong> after ${escapeHtml(name)} ${f.action==='quit'?'quit':'was fired'}.`);
    }
  });
  return toProcess;
}
function retirementChance(age){
  if(age<20)return 0;
  if(age<=25)return 0.02;
  if(age<=27)return 0.03;
  if(age<=29)return 0.05;
  if(age<=31)return 0.08;
  if(age<=33)return 0.12;
  if(age<=35)return 0.18;
  if(age<=37)return 0.28;
  if(age<=39)return 0.35;
  if(age<=40)return 0.22; // note: 39-40 drops slightly (late bloomers)
  return 0.90; // 40+
}

function runEndOfSeasonRetirements(){
  const season=app.currentSeason;
  const retired=[];
  const allDrivers=[...BASE_DRIVERS,...(FREE_AGENTS||[])];
  allDrivers.forEach(d=>{
    if(d.team==='Available'&&!d._active)return; // skip unused FAs
    const age=driverAge(d,season);
    if(!age)return;
    if(age<17)return; // under 17 can't retire
    if(age>=45){
      // Mandatory retirement at 45
      retired.push({id:d.id,name:d.name,team:d.team,reason:'Age limit (45)',age});
      return;
    }
    if(age<17||age<=20)return; // 17-20 cannot voluntarily retire
    const chance=retirementChance(age);
    if(Math.random()<chance){
      retired.push({id:d.id,name:d.name,team:d.team,reason:'Voluntary retirement',age});
    }
  });
  if(!app._retiredDrivers)app._retiredDrivers=[];
  if(!app._qualiRetirementPenalty)app._qualiRetirementPenalty={};
  retired.forEach(r=>{app._retiredDrivers.push({...r,season});});
  return retired;
}

  if(rank<=3)  return {one:0.20,both:0.10};
  if(rank<=6)  return {one:0.30,both:0.15};

  if(rank<=15) return {one:0.75,both:0.50};
  return            {one:0.90,both:0.60};

function runEndOfSeasonTeamChanges(){
  const season=app.currentSeason;
  const st=seasonStandings(season);
  const changes=[];
  const teamsSorted=st.teams.map((t,i)=>({...t,pos:i+1}));
  teamsSorted.forEach(t=>{
    const tc=teamChangeChance(t.pos,teamsSorted.length);
    const drivers=BASE_DRIVERS.filter(d=>d.team===t.name);
    // Both drivers change?
    if(drivers.length>=2&&Math.random()<tc.both){
      drivers.forEach(d=>changes.push({id:d.id,name:d.name,team:d.team,reason:'End-of-season team change (both)'}));
    } else if(drivers.length>=1&&Math.random()<tc.one){
      // One driver changes - random pick
      const d=drivers[Math.floor(Math.random()*drivers.length)];
      changes.push({id:d.id,name:d.name,team:d.team,reason:'End-of-season team change'});
    }
  });
  if(!app._teamChanges)app._teamChanges=[];
  changes.forEach(c=>app._teamChanges.push({...c,season}));
  return changes;
}

// ── RIVALRY SYSTEM ───────────────────────────────────────────────────────
// No pre-coded rivalries — all rivalries develop organically through race events.

function rivalryKey(a,b){return a<b?`${a}:${b}`:`${b}:${a}`;}
function getRivalry(idA,idB){if(!app.rivalries)return null;return app.rivalries[rivalryKey(idA,idB)]||null;}

function rivalryLevel(pts){
  if(pts>=75)return'Hatred';
  if(pts>=50)return'Dislike';
  if(pts>=25)return'Tension';
  return null;
}

function rivalryColour(level){
  if(level==='Hatred')return'#dc2626';
  if(level==='Dislike')return'#d97706';
  if(level==='Tension')return'#6b7280';
  return'#94a3b8';
}

function addRivalryPoints(idA,idB,delta,reason,newsItems){
  if(!app.rivalries)app.rivalries={};
  const key=rivalryKey(idA,idB);
  if(!app.rivalries[key]){
    app.rivalries[key]={pts:0,hatred:false,started:null,ended:null,history:[]};
  }
  const r=app.rivalries[key];
  const oldPts=r.pts;
  const oldLevel=r.hatred?'Hatred':rivalryLevel(oldPts);
  const round=currentSeasonEntries().length;
  const year=app.currentSeason||1989;

  r.pts=Math.max(0,Math.min(100,r.pts+delta));

  // Lock hatred permanently
  if(oldLevel==='Hatred'||r.pts>=75)r.hatred=true;
  if(r.hatred)r.pts=Math.max(75,r.pts); // floor at 75 once hatred

  const newLevel=r.hatred?'Hatred':rivalryLevel(r.pts);
  const na=BASE_DRIVERS.find(d=>d.id===idA)||getHistoryRaceFlat().find(r=>r.id===idA);
  const nb=BASE_DRIVERS.find(d=>d.id===idB)||getHistoryRaceFlat().find(r=>r.id===idB);
  const nameA=na?(na.lastName||na.driver||'?'):'?';
  const nameB=nb?(nb.lastName||nb.driver||'?'):'?';

  r.history.push({year,round,delta,reason,pts:r.pts});

  // wasNew: this call is what first pushed the rivalry to a named level
  const wasNew=!oldLevel&&!!newLevel;

  // Rivalry started — only when crossing into Tension (≥25) for the first time
  if(wasNew){
    r.started={year,round,reason};r.ended=null;
    if(newLevel&&newsItems)newsItems.push(`⚔ <strong>New rivalry:</strong> ${escapeHtml(nameA)} vs ${escapeHtml(nameB)} — <span style="color:${rivalryColour(newLevel)}">${newLevel}</span> (${escapeHtml(reason)})`);
  }
  // Level changed — only if the rivalry already existed before this call and not started this same round
  else if(!wasNew&&oldLevel&&newLevel&&oldLevel!==newLevel){
    const startedThisRound=r.started&&r.started.year===year&&r.started.round===round;
    if(!startedThisRound){
      const levelOrder={Tension:1,Dislike:2,Hatred:3};
      const rising=(levelOrder[newLevel]||0)>(levelOrder[oldLevel]||0);
      const verb=rising?'Rivalry escalates':'Rivalry cools';
      if(newsItems)newsItems.push(`⚔ <strong>${verb}:</strong> ${escapeHtml(nameA)} vs ${escapeHtml(nameB)} ${oldLevel} → <span style="color:${rivalryColour(newLevel)}">${newLevel}</span>`);
    }
  }
  // Rivalry ended (dropped below 25, not hatred) — but not within 2 rounds of starting
  const tooNew=r.started&&r.started.year===year&&(round-r.started.round)<2;
  if(oldLevel&&!newLevel&&!r.hatred&&!tooNew){
    r.ended={year,round};
    if(newsItems)newsItems.push(`⚔ <strong>Rivalry ends:</strong> ${escapeHtml(nameA)} vs ${escapeHtml(nameB)} — tensions have cooled.`);
  }
}

function decayRivalries(newsItems){
  if(!app.rivalries)return;
  Object.keys(app.rivalries).forEach(key=>{
    const r=app.rivalries[key];
    if(r.hatred)return; // Hatred never decays
    if(r.pts<=0)return;
    const decay=Math.floor(Math.random()*3)+1; // 1-3
    const [a,b]=key.split(':').map(Number);
    addRivalryPoints(a,b,-decay,'Natural decay',newsItems);
  });
}

function evaluateRaceDayRivalries(raceResults, crashedIds, newsItems){
  const round=currentSeasonEntries().length;
  const weather=app.currentWeekend?.raceMeta?.weather||'dry';
  const wetFactor=(weather==='heavy rain'||weather==='rain')?0.5:1;

  // 1. Crash rivalry — only pair drivers who were in THE SAME crash incident
  const crashGroups=app.currentWeekend?._crashGroups||[];
  // Fall back to treating all crashed drivers as one group if no group data
  const groups=crashGroups.length>0?crashGroups:(crashedIds&&crashedIds.length>=2?[crashedIds]:[]);
  groups.forEach(group=>{
    for(let i=0;i<group.length;i++){
      for(let j=i+1;j<group.length;j++){
        const dA=BASE_DRIVERS.find(d=>d.id===group[i]);
        const dB=BASE_DRIVERS.find(d=>d.id===group[j]);
        const areTeammates=dA&&dB&&dA.team===dB.team;
        const minPts=areTeammates?20:10;
        const pts=Math.round((Math.floor(Math.random()*(76-minPts))+minPts)*wetFactor);
        addRivalryPoints(group[i],group[j],pts,'Crash'+(areTeammates?' — teammates':''),newsItems);
      }
    }
  });

  // 2. Close race finish: P1 and P2 within 0.25 on raw die scores (excluding modifiers)
  if(raceResults.length>=2){
    const p1=raceResults.find(r=>r.position===1);
    const p2=raceResults.find(r=>r.position===2);
    if(p1&&p2){
      const rawP1=(p1.totalNumeric||0)-(p1.bonus||0);
      const rawP2=(p2.totalNumeric||0)-(p2.bonus||0);
      const margin=Math.abs(rawP1-rawP2);
      if(margin<=0.25){
        const pts=Math.floor(Math.random()*10)+1;
        addRivalryPoints(p1.id,p2.id,pts,'Extremely close race finish',newsItems);
      }
      // Close race between existing rivals (within 1.00)
      const r12=getRivalry(p1.id,p2.id);
      if(r12&&r12.pts>=25&&margin<=1.00){
        const pts=Math.floor(Math.random()*10)+1;
        addRivalryPoints(p1.id,p2.id,pts,'Rivals fight for victory',newsItems);
      }
    }
    // Close finish between rivals at 6th/7th
    const p6=raceResults.find(r=>r.position===6);
    const p7=raceResults.find(r=>r.position===7);
    if(p6&&p7){
      const r67=getRivalry(p6.id,p7.id);
      if(r67&&r67.pts>=25){
        const margin=Math.abs((p6.totalNumeric||0)-(p7.totalNumeric||0));
        if(margin<=1.00){
          const pts=Math.floor(Math.random()*10)+1;
          addRivalryPoints(p6.id,p7.id,pts,'Points battle between rivals',newsItems);
        }
      }
    }
  }

  // 3. Paddock drama: 0.2% chance per driver pair, maximum one event per race
  const activeIds=raceResults.map(r=>r.id);
  let paddockDramaFired=false;
  const pairs=[];
  for(let i=0;i<activeIds.length;i++)for(let j=i+1;j<activeIds.length;j++)pairs.push([activeIds[i],activeIds[j]]);
  // Shuffle pairs so the cap doesn't always favour lower IDs
  for(let k=pairs.length-1;k>0;k--){const r=Math.floor(Math.random()*(k+1));[pairs[k],pairs[r]]=[pairs[r],pairs[k]];}
  for(const [idA,idB] of pairs){
    if(paddockDramaFired)break;
    if(Math.random()<0.002){
      const pts=Math.floor(Math.random()*24)+1;
      addRivalryPoints(idA,idB,pts,'Paddock drama',newsItems);
      paddockDramaFired=true;
    }
  }

  // 4. Teammate drama: 2% chance per teammate pair
  const teamMap={};
  raceResults.forEach(r=>{
    const d=BASE_DRIVERS.find(x=>x.id===r.id);
    if(!d)return;
    if(!teamMap[d.team])teamMap[d.team]=[];
    teamMap[d.team].push(r.id);
  });
  Object.values(teamMap).forEach(ids=>{
    for(let i=0;i<ids.length;i++)for(let j=i+1;j<ids.length;j++){
      if(Math.random()<0.02){
        const pts=Math.floor(Math.random()*10)+1;
        addRivalryPoints(ids[i],ids[j],pts,'Teammate drama',newsItems);
      }
    }
  });

  // 5. Rival drama: 4% chance between existing rivals
  if(app.rivalries){
    Object.keys(app.rivalries).forEach(key=>{
      const r=app.rivalries[key];
      if(r.pts<25)return;
      if(Math.random()<0.04){
        const pts=Math.floor(Math.random()*24)+1;
        const [a,b]=key.split(':').map(Number);
        addRivalryPoints(a,b,pts,'Rival drama',newsItems);
      }
    });
  }

  // 6. Decay all rivalries after race
  decayRivalries(newsItems);
}

function rivalrySummaryForDriver(id){
  if(!app.rivalries)return[];
  return Object.entries(app.rivalries)
    .filter(([key])=>key.split(':').map(Number).includes(id))
    .map(([key,r])=>{
      const [a,b]=key.split(':').map(Number);
      const otherId=a===id?b:a;
      const other=BASE_DRIVERS.find(d=>d.id===otherId);
      return{otherId,otherName:other?driverFullName(other):'Unknown',pts:r.pts,hatred:r.hatred,started:r.started,ended:r.ended,level:r.hatred?'Hatred':rivalryLevel(r.pts),startReason:r.started?.reason||''};
    })
    .filter(r=>r.pts>=25||r.ended||r.hatred)
    .sort((a,b)=>b.pts-a.pts);
}

function isRivalryBlocked(idA,idB){
  const r=getRivalry(idA,idB);
  if(!r)return false;
  return r.hatred; // hatred = cannot join same team as free agents
}

function rivalryJoinPenalty(idA,idB){
  // Returns a weight penalty for team assignment (higher = less likely same team)
  const r=getRivalry(idA,idB);
  if(!r||r.pts<25)return 0;
  if(r.pts>=75)return 100; // hatred = blocked
  if(r.pts>=50)return 60;  // dislike = strongly prefer not
  return 30;               // tension = less likely
}


// ── DRIVER MOVEMENT SYSTEM ────────────────────────────────────────────────

// ── MID-SEASON: INJURY/SUSPENSION REPLACEMENT ─────────────────────────────
// app._activeContracts: {driverId: {replacingId, racesLeft, originalTeam, originalListOrder}}
// app._faCallupCount: {driverId: count} — tracks FA->team->FA->team cycles this season
// app._seasonFAPool: [{...dbEntry, id}] — current season free agent pool

function initSeasonFAPool(){
  if(!app._seasonFAPool||!app._seasonFAPool.length){
    app._seasonFAPool=getSeasonFreeAgents(app.currentSeason||1989);
  }
}

function faEligible(faId){
  const count=(app._faCallupCount||{})[faId]||0;
  return count<2; // FA->team->FA->team = 2 contracts; third time ineligible
}

function findReplacement(team, excludeIds, permanent){
  initSeasonFAPool();
  const pool=(app._seasonFAPool||[]).filter(fa=>{
    if(excludeIds.includes(fa.id))return false;
    if(!faEligible(fa.id))return false;
    if(permanent){
      const teammates=BASE_DRIVERS.filter(d=>d.team===team&&!excludeIds.includes(d.id));
      if(teammates.some(t=>isRivalryBlocked(t.id,fa.id)))return false;
    }
    return true;
  });
  if(!pool.length)return null;
  // Auto-qualifying teams: prefer best available modifier (positive first, then closest to 0)
  const teamData=seasonData().teams[teamCanonicalName(team)];
  const teamIsPQ=teamData?teamData.pq:false;
  if(!teamIsPQ){
    const sorted=[...pool].sort((a,b)=>{
      const da=a.driverBonus||0, db2=b.driverBonus||0;
      // Positive modifiers first (descending), then negative closest to 0 (ascending absolute)
      if(da>=0&&db2>=0)return db2-da;   // both positive: higher first
      if(da>=0)return -1;               // a positive, b negative: a wins
      if(db2>=0)return 1;               // b positive, a negative: b wins
      return Math.abs(da)-Math.abs(db2);// both negative: smaller absolute first
    });
    return sorted[0];
  }
  // PQ teams: random selection
  return pool[Math.floor(Math.random()*pool.length)];
}

function hireReplacement(fa, team, racesLeft, replacingId){
  if(!app._faCallupCount)app._faCallupCount={};
  // Only count against the 2-team temporary limit for genuine temp contracts.
  // Permanent season hires (racesLeft===999) are not temporary and don't use a temp slot.
  const isTemp=racesLeft<999;
  if(isTemp) app._faCallupCount[fa.id]=(app._faCallupCount[fa.id]||0)+1;
  if(!app._activeContracts)app._activeContracts={};
  app._activeContracts[fa.id]={replacingId,racesLeft,team,expiresAfterRound:currentSeasonEntries().length+racesLeft};
  // Add to BASE_DRIVERS temporarily
  if(!BASE_DRIVERS.find(d=>d.id===fa.id)){
    const tb=teamBaseTb(team); // use season base team bonus (not live modifier which includes race results)
    const liveTeamMod=getTeamMod(team); // live modifier from accumulated race results
    const db=fa.driverBonus||0;
    const qb=db+tb+liveTeamMod; // full bonus: driver base + team base + accumulated modifier
    const replacingDriver=replacingId?BASE_DRIVERS.find(d=>d.id===replacingId):null;
    BASE_DRIVERS.push({
      id:fa.id,listOrder:replacingDriver?replacingDriver.listOrder:39,firstName:fa.fn,lastName:fa.ln,name:fa.ln,
      nation2:fa.n2||fa.nation2||'',nation3:fa.n3||fa.nation3||'',team,dob:fa.dob||0,
      driverBonus:db,teamBonus:tb,qualiBonus:qb,raceNoGridBonus:qb,
      preferredTeam:fa.pref||null,isFreeAgent:true,_temp:isTemp,
      bonusBreakdownQuali:`D${db>=0?'+':''}${db} T${tb>=0?'+':''}${tb}`,
      bonusBreakdownRaceBase:`D${db>=0?'+':''}${db} T${tb>=0?'+':''}${tb}`,
    });
  }
  // Remove from available pool
  if(app._seasonFAPool)app._seasonFAPool=app._seasonFAPool.filter(f=>f.id!==fa.id);

  // ── PQ status inheritance ──────────────────────────────────────────────
  // Temp driver inherits PQ slot if the team is a PQ team (regardless of whether
  // replacingId is set — covers both injury covers and vacant-seat fills)
  if(app.preqDriverIds){
    const pqTeamSet=new Set(app.preqDriverIds.map(id=>BASE_DRIVERS.find(dx=>dx.id===id)?.team).filter(Boolean));
    const teamInPQ=pqTeamSet.has(team);
    if(teamInPQ&&!app.preqDriverIds.includes(fa.id)){
      app.preqDriverIds.push(fa.id);
      // Temp driver placed in PQ list for this round
    }
    // While the temp covers an injured/suspended driver, remove the original from the
    // active PQ list so they don't ghost into PQ while out. They're restored in releaseReplacement.
    if(replacingId&&app.preqDriverIds.includes(replacingId)){
      app.preqDriverIds=app.preqDriverIds.filter(id=>id!==replacingId);
    }
  }

  // Rivalry: new-teammate trigger
  const newTeammates=BASE_DRIVERS.filter(d=>d.team===team&&d.id!==fa.id&&!d._temp);
  newTeammates.forEach(tm=>{
    const rv=getRivalry(fa.id,tm.id);
    if(rv&&rv.pts>=25){
      // Existing Tension or Dislike: randomly add OR subtract 1–24
      const delta=(Math.random()<0.5?1:-1)*(Math.floor(Math.random()*24)+1);
      const reason=delta>0?'Teammate tension flares':'Teammates find common ground';
      addRivalryPoints(fa.id,tm.id,delta,reason,null);
    }
    // Track as new pairing regardless (for future hooks)
    if(!app._teammateHistory)app._teammateHistory={};
  if(!app.realism)app.realism={realDrivers:false,realCalendar:false,realCircuits:false};
    const pKey=rivalryKey(fa.id,tm.id);
    if(!app._teammateHistory[pKey])app._teammateHistory[pKey]=[];
    app._teammateHistory[pKey].push({season:app.currentSeason||1989,round:currentSeasonEntries().length,teamA:fa.id,teamB:tm.id,team});
  });
}

function releaseReplacement(faId){
  const contract=app._activeContracts&&app._activeContracts[faId];
  const d=BASE_DRIVERS.find(x=>x.id===faId&&x._temp);
  if(d){
    const idx=BASE_DRIVERS.indexOf(d);
    BASE_DRIVERS.splice(idx,1);
  } else {
    console.log('[DEBUG] releaseReplacement: temp driver not found in BASE_DRIVERS',`id=${faId}`);
  }

  // ── PQ slot restore ────────────────────────────────────────────────────
  if(app.preqDriverIds){
    // Remove temp driver from PQ list
    const wasInPQ=app.preqDriverIds.includes(faId);
    app.preqDriverIds=app.preqDriverIds.filter(id=>id!==faId);

    // Restore the original driver's PQ slot if:
    // (a) the temp was in PQ, AND (b) an original driver was being covered, AND
    // (c) that original driver is still contracted to a PQ team
    if(wasInPQ&&contract&&contract.replacingId){
      const origDriver=BASE_DRIVERS.find(x=>x.id===contract.replacingId);
      if(origDriver&&origDriver.team&&origDriver.team!=='Available'){
        const pqTeamSet=new Set(app.preqDriverIds.map(id=>BASE_DRIVERS.find(dx=>dx.id===id)?.team).filter(Boolean));
        // Also include this team in the check since we just removed the temp
        const origTeamDrivers=BASE_DRIVERS.filter(dx=>dx.team===origDriver.team&&dx.id!==origDriver.id&&!dx._temp);
        const teamStillInPQ=pqTeamSet.has(origDriver.team)||
          origTeamDrivers.some(dx=>app.preqDriverIds.includes(dx.id));
        if(teamStillInPQ&&!app.preqDriverIds.includes(contract.replacingId)){
          app.preqDriverIds.push(contract.replacingId);
          console.log('[DEBUG] PQ: original driver restored to PQ list',`id=${contract.replacingId} team=${origDriver.team}`);
        }
      } else {
        console.log('[DEBUG] PQ: original driver not restored',`replacingId=${contract.replacingId}`);
      }
    }
  }

  // Return to available pool if under the 2-contract limit
  const count=(app._faCallupCount||{})[faId]||0;
  if(count<2){
    const existing=app._seasonFAPool&&app._seasonFAPool.find(x=>x.id===faId);
    if(!existing){
      const dbEntry=DRIVER_DATABASE.find((_,i)=>3000+i===faId);
      if(dbEntry&&app._seasonFAPool){
        app._seasonFAPool.push({...dbEntry,id:faId,name:dbEntry.ln,firstName:dbEntry.fn,lastName:dbEntry.ln,teamBonus:0,team:'Available'});
      } else if(d){
        app._seasonFAPool=app._seasonFAPool||[];
        app._seasonFAPool.push({...d,id:faId,teamBonus:0,qualiBonus:d.driverBonus||0,raceNoGridBonus:d.driverBonus||0,team:'Available',_temp:false});
      } else {
        console.log('[DEBUG] releaseReplacement: cannot return driver to available pool',`id=${faId} — not in DRIVER_DATABASE or BASE_DRIVERS`);
      }
    }
  }
  if(app._activeContracts)delete app._activeContracts[faId];
}

function checkContractExpirations(newsItems){
  if(!app._activeContracts)return;
  const currentRound=currentSeasonEntries().length;
  // Snapshot keys first to avoid mutating while iterating
  const entries=Object.entries(app._activeContracts);
  entries.forEach(([faIdStr,contract])=>{
    const faId=Number(faIdStr);
    if(currentRound>=contract.expiresAfterRound){
      const faD=BASE_DRIVERS.find(d=>d.id===faId);
      const origD=contract.replacingId?BASE_DRIVERS.find(d=>d.id===contract.replacingId):null;
      const faN=faD?driverFullName(faD):(()=>{const fa=FREE_AGENTS.find(d=>d.id===faId)||(app._seasonFAPool||[]).find(d=>d.id===faId);return fa?((fa.fn||fa.firstName||'')+' '+(fa.ln||fa.lastName||'')).trim():'Driver';})();
      const origN=origD?driverFullName(origD):'original driver';
      const teamN=contract.team||faD?.team||'—';
      const teamFlag=origD?flagImg(origD.nation2||''):(faD?flagImg(faD.nation2||''):'');
      console.log('[DEBUG] Contract expiry',`${faN} (id=${faId}) expires after R${contract.expiresAfterRound}, current R${currentRound}`);
      releaseReplacement(faId);
      if(contract.replacingId&&origD){
        const isSusp=app.driverInjuries&&app.driverInjuries[contract.replacingId]?.cause==='suspension';
        const returnStr=isSusp?'returns from suspension':'returns from injury';
        if(newsItems)newsItems.push(`📋TEAMRETURN:${teamFlag} <strong>${escapeHtml(teamN)}</strong> — <strong>${escapeHtml(origN)}</strong> ${returnStr}. <strong>${escapeHtml(faN)}</strong>'s temporary contract has ended.`);
      } else if(contract.replacingId==null){
        if(newsItems)newsItems.push(`🔄 ${escapeHtml(faN)}'s one-round seat fill has ended.`);
      }
    }
  });
}

// ── END-OF-SEASON: GENERATE NEW FREE AGENTS FROM DATABASE ─────────────────
function generateEndOfSeasonFreeAgents(season){
  initSeasonFAPool();
  const nextYear=season+1;
  const newEntrants=DRIVER_DATABASE.filter(d=>d.firstYear===nextYear);
  const added=[];
  newEntrants.forEach((d,i)=>{
    const id=3000+DRIVER_DATABASE.indexOf(d);
    const existing=BASE_DRIVERS.find(x=>x.id===id);
    if(existing)return;
    const faEntry={...d,id,name:d.ln,firstName:d.fn,lastName:d.ln,
      teamBonus:0,team:'Available',preferredTeam:null,driverBonus:d.db||0,
      qualiBonus:d.db||0,raceNoGridBonus:d.db||0,isFreeAgent:true};
    if(!app._seasonFAPool)app._seasonFAPool=[];
    app._seasonFAPool.push(faEntry);
    added.push(faEntry);
  });
  return added;
}

// ── END-OF-SEASON: EXECUTE RETIREMENTS ────────────────────────────────────
function executeEndOfSeasonRetirements(newsItems){
  const season=app.currentSeason||1989;
  const retired=runEndOfSeasonRetirements();
  retired.forEach(r=>{
    const d=BASE_DRIVERS.find(x=>x.id===r.id);
    if(d){d._retired=true;d._retirementSeason=season;}
    if(newsItems)newsItems.push(`🏁 <strong>${escapeHtml(r.name)}</strong> retires from Formula 1 after ${r.age} years of age. (${escapeHtml(r.reason)})`);
  });
  return retired;
}

function executeCareerEndingInjury(driverId, newsItems){
  const d=BASE_DRIVERS.find(x=>x.id===driverId);
  if(!d)return;
  const season=app.currentSeason||1989;
  d._retired=true;d._retirementSeason=season;d._careerEndingInjury=true;
  if(!app._retiredDrivers)app._retiredDrivers=[];
  app._retiredDrivers.push({id:driverId,name:d.name,team:d.team,reason:'Career-ending injury',season,age:driverAge(d,season)});
  if(newsItems)newsItems.push(`🏥 <strong>${escapeHtml(driverSurname(d))}</strong> has suffered a career-ending injury and will not return to Formula 1.`);
}

// ── END-OF-SEASON: DRIVER MOVEMENTS ──────────────────────────────────────
function executeEndOfSeasonMovements(newsItems){
  const season=app.currentSeason||1989;
  const newFAs=generateEndOfSeasonFreeAgents(season);
  if(newFAs.length&&newsItems) newsItems.push(`📋 New drivers joining the free agent pool for ${season+1}: ${newFAs.map(d=>escapeHtml(d.fn+' '+d.ln)).join(', ')}.`);

  // Calculate team changes
  const teamChanges=runEndOfSeasonTeamChanges();
  teamChanges.forEach(tc=>{
    const d=BASE_DRIVERS.find(x=>x.id===tc.id);
    if(!d)return;
    d.team='Available';d._released=true;
    if(app._seasonFAPool)app._seasonFAPool.push({...d,teamBonus:0,team:'Available'});
    if(newsItems)newsItems.push(`🚪 <strong>${escapeHtml(tc.name)}</strong> leaves <strong>${escapeHtml(tc.team)}</strong> and enters the free agent market.`);
    // Small rivalry chance with remaining teammate (5–15% that departing causes bad blood)
    const remainingTm=BASE_DRIVERS.find(x=>x.team===tc.team&&x.id!==tc.id&&!x._temp&&!x._retired&&!x._released);
    if(remainingTm&&Math.random()<0.10){
      const pts=Math.floor(Math.random()*16)+5; // 5–20
      addRivalryPoints(tc.id,remainingTm.id,pts,'Acrimonious team departure',newsItems);
    }
    // Remove from BASE_DRIVERS (splice out, don't just change team)
    const _ri=BASE_DRIVERS.findIndex(x=>x.id===tc.id);
    if(_ri!==-1)BASE_DRIVERS.splice(_ri,1);
  });

  // Fill vacancies from FA pool
  const vacancies=[];
  const allTeams=[...new Set(BASE_DRIVERS.filter(d=>!d._temp&&!d._retired&&d.team!=='Available').map(d=>d.team))];
  allTeams.forEach(team=>{
    const seats=BASE_DRIVERS.filter(d=>d.team===team&&!d._temp&&!d._retired&&!d._released);
    const expectedSeats=2;
    for(let i=seats.length;i<expectedSeats;i++) vacancies.push(team);
  });

  vacancies.forEach(team=>{
    const taken=BASE_DRIVERS.filter(d=>d.team===team&&!d._retired).map(d=>d.id);
    if(taken.length>=2)return; // max 2 drivers per team
    const repl=findReplacement(team,taken,true);
    if(repl){
      // Permanent contract
      const existingFA=BASE_DRIVERS.find(d=>d.id===repl.id);
      if(existingFA){existingFA.team=team;existingFA._released=false;}
      else BASE_DRIVERS.push({...repl,team,teamBonus:0,_temp:false});
      if(app._seasonFAPool)app._seasonFAPool=app._seasonFAPool.filter(f=>f.id!==repl.id);
      if(newsItems)newsItems.push(`✅ <strong>${escapeHtml(repl.fn+' '+repl.ln)}</strong> signs with <strong>${escapeHtml(team)}</strong> for ${season+1}.`);
      // Rivalry: new permanent teammate hook — same as mid-season
      const permTeammates=BASE_DRIVERS.filter(d=>d.team===team&&d.id!==repl.id&&!d._temp&&!d._retired);
      permTeammates.forEach(tm=>{
        const rv=getRivalry(repl.id,tm.id);
        if(rv&&rv.pts>=25){
          const delta=(Math.random()<0.5?1:-1)*(Math.floor(Math.random()*24)+1);
          addRivalryPoints(repl.id,tm.id,delta,delta>0?'Tension with new teammate':'Fresh start with new teammate',newsItems);
        }
        if(!app._teammateHistory)app._teammateHistory={};
  if(!app.realism)app.realism={realDrivers:false,realCalendar:false,realCircuits:false};
        const pKey=rivalryKey(repl.id,tm.id);
        if(!app._teammateHistory[pKey])app._teammateHistory[pKey]=[];
        app._teammateHistory[pKey].push({season:season+1,round:0,team});
      });
    }
  });

  return {teamChanges,newFAs};
}

function proceedToNewSeason(){
  const oldSeason=app.currentSeason||1989;
  const newSeason=oldSeason+1;
  const newsItems=[];

  // 1. Run retirements
  executeEndOfSeasonRetirements(newsItems);

  // 2. Career-ending injury retirements (already flagged mid-season)
  BASE_DRIVERS.filter(d=>d._careerEndingInjury&&!d._retired).forEach(d=>{
    executeCareerEndingInjury(d.id,newsItems);
  });

  // 3. Clear mid-season flags
  BASE_DRIVERS.forEach(d=>{delete d._released;delete d._fired;});

  // 4. Reset injury clearances (drivers retained keep no injury)
  if(app.driverInjuries){
    Object.keys(app.driverInjuries).forEach(id=>{
      delete app.driverInjuries[id];
    });
  }

  // 5. Driver movements + new FA generation
  app._seasonFAPool=[];
  app._faCallupCount={};
  app._activeContracts={};
  executeEndOfSeasonMovements(newsItems);

  // 6. Increment season
  app.currentSeason=newSeason;
  app._qualiRetirementPenalty={};
  app._earlyCareerWinAwarded={};
  app._earlyCareerPodiumAwarded={};
  app._earlyCareerPtsAwarded={};
  // Reset preqDriverIds for new season using correct season rules and contracted data
  {const _rls=seasonRules();const _sd=SEASONS[app.currentSeason];const _co=_rls.autoQualCutoff||20;
  app.preqDriverIds=_rls.initialPreqIds89||(_sd?_sd.contracted.slice(_co).map(e=>e[5]).filter(Boolean):BASE_DRIVERS.filter(d=>d.listOrder>_co).map(d=>d.id));}

  // 7. Build end-of-season news
  const endNews={
    id:'season-end-'+oldSeason,
    type:'season-end',
    year:oldSeason,
    title:`${oldSeason} Season Review`,
    html:buildSeasonEndSummary(oldSeason,newsItems,newSeason),
  };
  pushNews(endNews);
  saveApp();
  render();
  // Show the news with proceed button
  showSeasonEndModal(endNews,newSeason);
}

// ── RANDOM MODIFIERS ─────────────────────────────────────────────────────
const RAND_MOD_DRIVER_POS=['Good team morale','New skill','New sponsor'];
const RAND_MOD_DRIVER_NEG=['Bad team morale','Illness','Sponsor trouble'];
const RAND_MOD_TEAM_POS=['Good team morale','Technical breakthrough','Positive testing'];
const RAND_MOD_TEAM_NEG=['Bad team morale','Technical trouble','Poor testing'];

function randMod(){
  // Random modifier ±0.01 to ±0.15, 2dp, not 0
  const sign=Math.random()<0.5?1:-1;
  const mag=Math.round((Math.random()*0.09+0.01)*100)/100;
  return sign*mag;
}
function randChoice(arr){return arr[Math.floor(Math.random()*arr.length)];}

function applyRandomModifiers(isOffseason){
  // Per-race: ~8% chance each driver/team; off-season: ~40%
  const driverProb=isOffseason?0.40:MIDWEEK_DRIVER_PROB;
  const teamProb=isOffseason?0.40:MIDWEEK_TEAM_PROB;
  const items=[];

  BASE_DRIVERS.filter(d=>d.team!=='Available'&&!d._retired).forEach(d=>{
    if(Math.random()<driverProb){
      const delta=randMod();
      applyDriverMod(d.id,delta);
      const reasons=delta>0?RAND_MOD_DRIVER_POS:RAND_MOD_DRIVER_NEG;
      items.push({kind:'driver',id:d.id,name:d.name,delta,reason:randChoice(reasons)});
    }
  });

  const teams=[...new Set(BASE_DRIVERS.filter(d=>d.team!=='Available'&&!d._retired).map(d=>d.team))];
  teams.forEach(t=>{
    if(Math.random()<teamProb){
      const delta=randMod();
      applyTeamMod(t,delta);
      const reasons=delta>0?RAND_MOD_TEAM_POS:RAND_MOD_TEAM_NEG;
      items.push({kind:'team',name:t,delta,reason:randChoice(reasons)});
    }
  });

  return items; // [{kind,name,delta,reason}]
}

function raceNewsChampionship(year,round){
  const _st=seasonStandings(year);
  const _rl=seasonRules().totalRounds-round,_mpl=_rl*10,_mtl=_rl*20;
  const _ld=_st.drivers[0],_nd=_st.drivers[1],_lt=_st.teams[0],_nt=_st.teams[1];
  const parts=[];
  // Only show driver champion message if clinched THIS round (not already clinched in a prior round)
  const _prevSt=round>1?seasonStandings(year):null;
  const _prevLd=_prevSt?.drivers[0],_prevNd=_prevSt?.drivers[1];
  const _prevMpl=(seasonRules().totalRounds-(round-1))*10,_prevMtl=(seasonRules().totalRounds-(round-1))*10;
  const driverAlreadyClinched=_prevLd&&_prevNd&&(_prevLd.championshipPoints-_prevNd.championshipPoints)>_prevMpl;
  const teamAlreadyClinched=_prevSt&&_prevSt.teams[0]&&_prevSt.teams[1]&&(_prevSt.teams[0].championshipPoints-_prevSt.teams[1].championshipPoints)>_prevMtl;
  if(!driverAlreadyClinched&&_ld&&_nd&&(_ld.championshipPoints-_nd.championshipPoints)>_mpl){
    const _ldb=BASE_DRIVERS.find(x=>x.id===_ld.id);
    parts.push(`<h4>🏆 Driver Champion!</h4><p style="font-size:14px">${flagImg(_ld.nation2)} <strong>${_ldb?driverFullName(_ldb):_ld.name}</strong> is the ${year} World Drivers' Champion!</p>`);
  } else if(round>=12&&_ld&&_nd){
    const contenders=_st.drivers.filter(d=>_ld.championshipPoints-d.championshipPoints<=_mpl);
    if(contenders.length>1){
      const rows=contenders.map((d,i)=>{
        const bd=BASE_DRIVERS.find(x=>x.id===d.id);
        return`<tr><td>${i+1}</td><td class="left">${flagImg(d.nation2)} ${escapeHtml(bd?driverFullName(bd):d.name)}</td><td>${d.championshipPoints}</td><td>${_ld.championshipPoints-d.championshipPoints>0?'-'+(_ld.championshipPoints-d.championshipPoints):'—'}</td></tr>`;
      }).join('');
      parts.push(`<h4>🏆 Championship race</h4><table class="small-table"><thead><tr><th>Pos</th><th>Driver</th><th>Pts</th><th>Gap</th></tr></thead><tbody>${rows}</tbody></table>`);
    }
  }
  if(!teamAlreadyClinched&&_lt&&_nt&&(_lt.championshipPoints-_nt.championshipPoints)>_mtl){
    parts.push(`<h4>🏆 Constructors' Champion!</h4><p style="font-size:14px"><strong>${escapeHtml(_lt.name)}</strong> are the ${year} Constructors' Champions!</p>`);
  }
  return parts.join('');
}

function raceNewsMilestones(weekendEntry,year,round){
  const race=weekendEntry.race||[];
  const DRIVER_WIN_MILESTONES=[1,5,25,50,100];
  const DRIVER_POLE_MILESTONES=[1,5,25,50,100];
  const TEAM_RACE_MILESTONES=[1,50,100,150,200,250,300];
  const TEAM_WIN_MILESTONES=[1,25,50,100,150,200,250];
  const milestones=[];
  const priorWeekends=app.history.weekends.filter(w=>w.weekendKey!==weekendEntry.weekendKey);
  function priorDriverStats(id){
    let wins=0,poles=0;
    priorWeekends.forEach(w=>{
      if(w.race.find(r=>r.id===id&&r.position===1))wins++;
      if(w.qualifying.find(q=>q.id===id&&q.pole))poles++;
    });
    return{wins,poles};
  }
  function priorTeamStats(team){
    let starts=0,wins=0;
    priorWeekends.forEach(w=>{
      if(w.race.some(r=>r.team===team))starts++;
      if(w.race.find(r=>r.team===team&&r.position===1))wins++;
    });
    return{starts,wins};
  }
  race.forEach(r=>{
    if(!r.id)return;
    const career=driverCareer(r.id);const st=career.stats;
    const prior=priorDriverStats(r.id);
    const bd=BASE_DRIVERS.find(x=>x.id===r.id);const nm=bd?driverFullName(bd):r.driver;
    if(DRIVER_WIN_MILESTONES.includes(st.wins)&&prior.wins<st.wins)
      milestones.push(`${flagImg(r.nation2)} ${escapeHtml(nm)}: ${st.wins===1?'First win':st.wins+' wins'}`);
    if(DRIVER_POLE_MILESTONES.includes(st.poles)&&prior.poles<st.poles)
      milestones.push(`${flagImg(r.nation2)} ${escapeHtml(nm)}: ${st.poles===1?'First career pole':st.poles+' career poles'}`);
  });
  const teamsThisRace=[...new Set(race.map(r=>r.team))];
  teamsThisRace.forEach(team=>{
    const tc=teamCareer(team);const ts=tc.stats;
    const prior=priorTeamStats(team);
    if(TEAM_RACE_MILESTONES.includes(ts.starts)&&prior.starts<ts.starts&&!(ts.starts===1&&round===1))
      milestones.push(`${escapeHtml(team)}: ${ts.starts===1?'First entry':ts.starts+' races'}`);
    if(TEAM_WIN_MILESTONES.includes(ts.wins)&&prior.wins<ts.wins)
      milestones.push(`${escapeHtml(team)}: ${ts.wins===1?'First win':ts.wins+' wins'}`);
  });
  if(!milestones.length)return'';
  return`<h4>🎖 Milestones</h4><ul>${milestones.map(m=>`<li>${m}</li>`).join('')}</ul>`;
}

function raceNewsTeamChanges(weekendEntry,round){
  const items=[];

  // ── Temporary replacements (injury/suspension) ────────────────────────
  if(app.driverInjuries){
    Object.entries(app.driverInjuries).forEach(([id,inj])=>{
      if(inj.fromRound!==round||!inj.impact)return;
      const d=BASE_DRIVERS.find(x=>x.id===Number(id));
      if(!d)return;
      const isSusp=inj.impact==='Suspension'||inj.cause==='suspension';
      const contractEntry=Object.entries(app._activeContracts||{}).find(([faId,c])=>c.replacingId===Number(id));
      const fa=contractEntry?BASE_DRIVERS.find(x=>x.id===Number(contractEntry[0])):null;
      const replStr=fa?` Replaced by <strong>${escapeHtml(driverFullName(fa))}</strong>.`:'';
      if(isSusp){
        // Suspension: clean format
        items.push(`<li>${flagImg(d.nation2)} <strong>${escapeHtml(d.team)}</strong> — <strong>${escapeHtml(driverFullName(d))}</strong> suspended for the next race.${replStr}</li>`);
      } else {
        // Injury
        let duration;
        if(inj.missRaces==='career'){duration='career-ending injury!';}
        else if(inj.missRaces==='season'){duration='out for the season due to injury!';}
        else{
          const mr=Number(inj.missRaces)||1;
          const racesRemaining=seasonRules().totalRounds-(inj.fromRound||round);
          if(mr>=racesRemaining){duration='out until end of season due to injury!';}
          else{duration=`out for next ${mr} race${mr===1?'':'s'} due to injury.`;}
        }
        items.push(`<li>${flagImg(d.nation2)} <strong>${escapeHtml(d.team)}</strong> — <strong>${escapeHtml(driverFullName(d))}</strong> ${escapeHtml(duration)}${replStr}</li>`);
      }
    });
  }

  // ── Permanent changes (firings and quits + replacements) ─────────────────
  if(weekendEntry._firedNews&&weekendEntry._firedNews.length){
    weekendEntry._firedNews.forEach(f=>{
      const isQuit=f.action==='quit';
      const actionLabel=isQuit?'has quit the team!':'has been fired!';
      const reasonLabel=(!isQuit&&f.reason==='rivalry')?' (rivalry)':'';
      let line=`<li>${flagImg(f.nation2||'')} <strong>${escapeHtml(teamDisplayName(f.team))}</strong> — <strong>${escapeHtml(f.originalName)}</strong> ${actionLabel}${reasonLabel}`;
      if(f.replacementName)line+=` Replaced by <strong>${escapeHtml(f.replacementName)}</strong>.`;
      line+='</li>';
      items.push(line);
    });
  }

  // ── Contract expirations (driver returns) from _movementNews ──────────
  const teamReturnItems=(weekendEntry._movementNews||[]).filter(n=>n.startsWith('📋TEAMRETURN:'));
  teamReturnItems.forEach(n=>items.push(`<li>${n.replace('📋TEAMRETURN:','')}</li>`));

  if(!items.length)return'';
  return`<h4>📋 Team news</h4><ul>${items.join('')}</ul>`;
}

// ── INJURY ─────────────────────────────────────────────────────────────────
function rollInjury(){const r=Math.random();let c=0;for(const row of INJURY_TABLE){c+=row.prob;if(r<c)return row;}return null;}
function applyInjury(id,row,round){
  if(!app.driverInjuries)app.driverInjuries={};
  app.driverInjuries[id]={impact:row.impact,result:row.result,fromRound:round,missRaces:row.missRaces,career:row.missRaces==='career'};
  if(row.mod0!==0)applyDriverMod(id,row.mod0);
}
function recordDriverIncident(id,type,details){
  if(!app.driverIncidents)app.driverIncidents={};
  if(!app.driverIncidents[id])app.driverIncidents[id]=[];
  const round=currentSeasonEntries().length;
  const year=app.currentSeason||1989;
  const _sess=app.currentWeekend?.session||'race';
  const sessLabel=_sess==='prequalifying'?'PQ':_sess==='qualifying'?'Q':'R';
  app.driverIncidents[id].push({type,year,round,session:sessLabel,details,ts:Date.now()});
}

function injuryLogMsg(id,row,round){
  const name=BASE_DRIVERS.find(d=>d.id===id)?.name||'Driver';
  const impact=row.impact;
  if(row.missRaces==='career')return `${impact}: ${escapeHtml(name)} career-ending injury.`;
  if(row.missRaces==='season')return `${impact}: ${escapeHtml(name)} injured for remainder of season.`;
  const totalRounds=seasonCalendar().length; // 16
  const racesLeft=totalRounds-round; // races after this one
  if(row.missRaces>=racesLeft)return `${impact}: ${escapeHtml(name)} injured until end of season.`;
  return `${impact}: ${escapeHtml(name)} injured for next ${row.missRaces} race${row.missRaces>1?'s':''}.`;
}
function isDriverInjured(id,round){
  const inj=app.driverInjuries&&app.driverInjuries[id];
  if(!inj)return false;
  if(inj.career)return true;
  if(inj.missRaces==='season')return true;
  // Injury applied at end of fromRound; driver misses the NEXT missRaces rounds
  return round>inj.fromRound&&round<=inj.fromRound+inj.missRaces;
}
function INJURY_CHANCE(){return Math.random()<0.005;}
function SUSPENSION_CHANCE(){return Math.random()<0.005;}

// Write a 1-race suspension to driverInjuries state (mirrors applyInjury)
// and queue a replacement. Returns a log message string.
function applySuspension(id,round){
  if(!app._movementRules?.suspensions)return `🚩 ${escapeHtml(BASE_DRIVERS.find(x=>x.id===id)?.name||'Driver')} — suspension (disabled by options).`;
  if(!app.driverInjuries)app.driverInjuries={};
  app.driverInjuries[id]={impact:'Suspension',result:'1-race ban',fromRound:round,missRaces:1,career:false,cause:'suspension'};
  recordDriverIncident(id,'suspension',{gp:app.currentWeekend?.raceMeta?.gp,round});
  const d=BASE_DRIVERS.find(x=>x.id===id);
  if(d&&d.team&&d.team!=='Available'){
    const _taken=BASE_DRIVERS.map(x=>x.id);
    const _repl=findReplacement(d.team,_taken,false);
    if(_repl){hireReplacement(_repl,d.team,1,id);}
  }
  // Return string for race log only — Team news section handles the full suspension report
  const nm=d?driverFullName(d):BASE_DRIVERS.find(x=>x.id===id)?.name||'Driver';
  return `🚩 <strong>${escapeHtml(nm)}</strong> receives a 1-race ban.`;
}

function rollWeather(){

  if(r<0.05)return 'heavy rain';

  return 'dry';
}
function weatherIcon(w){

function crashLogicActive(w){
