  // NOT on every render call — avoids rebuilding standings 260 times during a race
  // pendingSeasonReturn: show the finished-race screen only if still on #weekend and not navigating away
  // Once weekendFinished is true and user has navigated off #weekend, don't force them back.
  const _psr=app.currentWeekend&&app.currentWeekend.pendingSeasonReturn&&!app.currentWeekend._psrDismissed;
  if(_psr&&(window.location.hash==='#weekend'||window.location.hash==='')){
    hideAllRoutes();
    document.getElementById('routeWeekend').classList.remove('hidden');
    renderWeekend();
    return;
  }
  hideAllRoutes();const hash=window.location.hash||'#start';
  if(hash==='#start'){document.getElementById('routeStart').classList.remove('hidden');document.title='F1 Dice Simulator';renderStart();return;}
  if(hash==='#weekend'){document.getElementById('routeWeekend').classList.remove('hidden');document.title='Race Weekend — F1 Dice';renderWeekend();return;}
  if(hash==='#encyclopedia'){document.getElementById('routeEncyclopedia').classList.remove('hidden');document.title='Encyclopedia — F1 Dice';renderEncyclopedia();return;}
  if(hash==='#rankings'){document.getElementById('routeRankings').classList.remove('hidden');renderRankings();return;}
  if(hash.startsWith('#season-')){document.getElementById('routeSeason').classList.remove('hidden');renderSeason(hash);return;}
  if(hash.startsWith('#driver-')||hash.startsWith('#team-')){document.getElementById('routeProfile').classList.remove('hidden');renderProfile(hash);return;}
  if(hash.startsWith('#gp-')){document.getElementById('routeProfile').classList.remove('hidden');renderGP(hash);return;}
  if(hash.startsWith('#track-')){document.getElementById('routeProfile').classList.remove('hidden');renderTrack(hash);return;}
  if(hash.startsWith('#racehistory-')){document.getElementById('routeRaceHistory').classList.remove('hidden');renderRaceHistory(hash);return;}
  if(hash==='#options'){document.getElementById('routeOptions').classList.remove('hidden');renderOptions();return;}
  goHash('#start');
}
const _navHistory=[];
function goHash(h){
  const cur=window.location.hash||'#start';
  if(cur!==h&&cur!=='')_navHistory.push(cur); // record where we came from
  if(_navHistory.length>20)_navHistory.shift(); // cap history

}

  else{goHash('#encyclopedia');}
}
// ── SEAT FILLING: ensure every team has its required number of drivers before each round ──
function ensureAllSeatsFilledBeforeWeekend(roundNum){
  initSeasonFAPool();
  // Required seat count is LOCKED to the number of contracted drivers each team
  // started the season with. This is stored once in app._initialTeamSizes.
  // Using live BASE_DRIVERS would give wrong counts after firings/quits set team='Available'.
  if(!app._initialTeamSizes){
    app._initialTeamSizes={};
    BASE_DRIVERS.filter(d=>d.team!=='Available'&&!d._retired&&!d._temp).forEach(d=>{
      app._initialTeamSizes[d.team]=(app._initialTeamSizes[d.team]||0)+1;
    });
  }
  const allTeams=[...new Set(BASE_DRIVERS.filter(d=>d.team!=='Available'&&!d._retired).map(d=>d.team))];
  const seatNews=[];
  allTeams.forEach(team=>{
    const required=app._initialTeamSizes[team]||0;
    if(!required)return;
    const activeContracted=BASE_DRIVERS.filter(d=>d.team===team&&!d._retired&&!d._temp&&!isDriverInjured(d.id,roundNum));
    const activeTemps=BASE_DRIVERS.filter(d=>d.team===team&&d._temp&&!isDriverInjured(d.id,roundNum));
    const covered=activeContracted.length+activeTemps.length;
    if(covered<required){
      const missing=required-covered;
      const allContracted=BASE_DRIVERS.filter(d=>d.team===team&&!d._retired&&!d._temp);
      const outContracted=allContracted.filter(d=>isDriverInjured(d.id,roundNum));
      const outNames=outContracted.map(d=>{
        const inj=app.driverInjuries?.[d.id];
        return `${d.name} [${inj?.cause==='suspension'?'suspended':`injured: ${inj?.impact||'unknown'}`}]`;
      });
      // Vacant seats (fired/quit) = missing minus known injured
      const vacancies=missing-outContracted.length;
      const vacancyStr=vacancies>0?` + ${vacancies} vacancy(fired/quit)`:'';
      // debugMsg removed: seat gap info logged internally only
      for(let i=0;i<missing;i++){
        const taken=BASE_DRIVERS.map(d=>d.id);
        const repl=findReplacement(team,taken,false);
        const replacingDriver=outContracted[i]||null;
        const inj=replacingDriver&&app.driverInjuries?.[replacingDriver.id];
        let racesLeft;
        if(inj){
          // Temp covers for the remaining injury duration
          if(inj.missRaces==='season'||inj.missRaces==='career') racesLeft=999;
          else racesLeft=Math.max(1,(inj.fromRound+Number(inj.missRaces))-roundNum+1);
        } else {
          racesLeft=999; // fired/quit vacancy — replacement stays rest of season
        }
        const durationStr=racesLeft>=999?'rest of season':`${racesLeft} round${racesLeft===1?'':'s'}`;
        if(repl){
          hireReplacement(repl,team,racesLeft,replacingDriver?replacingDriver.id:null);
          const replName=((repl.fn||repl.firstName||'')+' '+(repl.ln||repl.lastName||'')).trim();
          const forStr=replacingDriver?`, covering ${replacingDriver.name}`:'';
          seatNews.push(`<strong>${escapeHtml(team)}</strong>: <strong>${escapeHtml(replName)}</strong> fills vacant seat${forStr} for ${durationStr}.`);
          // seat filled — banner shown in weekend view
        } else {
          const reason=inj?(inj.cause==='suspension'?'suspension':`injury (${inj.impact||'unknown'})`):'vacancy';
          seatNews.push(`⚠ <strong>${escapeHtml(team)}</strong> — no available driver to fill seat due to ${reason}.`);
          // seat unfilled — pool exhausted
        }
      }
    }
  });
  return seatNews;
}

function newWeekend(){
  const idx=nextRoundIndex();
  if(idx>=16){
    // Season complete - show end-of-season news if not yet shown
    const endKey='season-end-'+app.currentSeason;
    if(!app.news||!app.news.some(n=>n.id===endKey)){
      expireSeasonEndInexperience();
  const endNews=buildSeasonEndNews(app.currentSeason);
      pushNews(endNews);
      saveApp();
      requestAnimationFrame(()=>showNewsModal(endNews));
    } else {
      alert('Season complete.');
    }
    return;
  }
  stopAuto(true);
  // Clear any lingering end-of-race state before creating the new weekend
  if(app.currentWeekend){app.currentWeekend.pendingSeasonReturn=false;app.currentWeekend._psrDismissed=true;}
  // Ensure all team seats are filled before creating the weekend
  const nextRound=(seasonCalendar()[idx]||{}).round||idx+1;
  const _seatNews=ensureAllSeatsFilledBeforeWeekend(nextRound);
  app.currentWeekend=createWeekend(idx);
  if(app.currentWeekend){
    app.currentWeekend.rollSequence=0;
    // Attach seat-fill news to weekend so it appears in team news post-race if needed
    if(_seatNews.length) app.currentWeekend._seatFillNews=_seatNews;
    const _wr=rollWeather();
    app.currentWeekend.raceMeta.weather=_wr;
    if(_wr==='rain'||_wr==='heavy rain'){
      requestAnimationFrame(()=>showWeatherWarning(_wr));
    }
  }
  // Show season-start news on round 1
  if(idx===0){
    const startKey='season-start-'+app.currentSeason;
    if(!app.news||!app.news.some(n=>n.id===startKey)){
      const startNews=buildSeasonStartNews(app.currentSeason);
      pushNews(startNews);
      saveApp();
      requestAnimationFrame(()=>showNewsModal(startNews));
    }
  }
  saveApp();saveLive();goHash('#weekend');
}

function rollManualDie(){
  const inp=document.getElementById('manualDieInput');
  const val=inp?inp.value.trim():'';
  const die=parseInt(val);
  if(!isNaN(die)&&die>=1&&die<=6){
    const orig=Math.random;
    Math.random=()=>(die-1)/6+0.001;
    processNextRollWrapper();
    Math.random=orig;
    if(inp)inp.value='';
  } else {
    processNextRollWrapper();
  }
}
function exportRollLog(){
  const w=app.currentWeekend;
  if(!w)return;
  const meta=w.raceMeta;
  const lines=[`F1 Dice Simulator — Roll Log`,`${meta.year} ${meta.gp} at ${meta.track}`,``];
  const sessions=[
    {name:'Pre-Qualifying',key:'prequalifying',laps:seasonRules().preqLaps},
    {name:'Qualifying',key:'qualifying',laps:seasonRules().qualiLaps},
    {name:'Race',key:'race',laps:seasonRules().raceLaps},
  ];
  sessions.forEach(({name,key,laps})=>{
    const sess=w.sessions[key];
    if(!sess||!sess.drivers||!sess.drivers.length)return;
    lines.push(`--- ${name} ---`);
    const header=['Pos','Driver','Team','Modifier',...Array.from({length:laps},(_,i)=>`L${i+1}`),'Total','Status'];
    lines.push(header.join('\t'));
    const ordered=sess.finishedOrder.length?sess.finishedOrder.map((id,i)=>({...sess.drivers.find(d=>d.id===id),_pos:i+1})):sess.drivers.map((d,i)=>({...d,_pos:i+1}));
    ordered.forEach(d=>{
      if(!d)return;
      const nm=driverFullName(d.base)||d.base.name;
      const row=[d._pos,nm,d.base.team,Number(d.bonus).toFixed(2),...d.laps.map(v=>v===''?'—':v),Number(d.totalNumeric).toFixed(2),d.status==='active'?'Finished':(d.retirementReason||d.status)];
      lines.push(row.join('\t'));
    });
    lines.push(``);
  });
  // Race log entries
  lines.push(`--- Roll-by-roll log ---`);
  const logEntries=[...(w.log||[])].reverse();
  logEntries.forEach(entry=>{
    const txt=(entry.html||entry).replace(/<[^>]+>/g,'').replace(/&lt;/g,'<').replace(/&gt;/g,'>').replace(/&amp;/g,'&').replace(/&nbsp;/g,' ').replace(/\s+/g,' ').trim();
    if(txt)lines.push(txt);
  });
  const blob=new Blob([lines.join('\n')],{type:'text/plain;charset=utf-8'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');
  a.href=url;
  a.download=`F1Dice_RollLog_${meta.year}_R${meta.round}_${(meta.gp||'GP').replace(/\s+/g,'_')}.txt`;
  a.click();
  URL.revokeObjectURL(url);
}
window.exportRollLog=exportRollLog;

// Export modifier change log — all _raceEventMods across the entire season history
function exportModifierLog(){
  const lines=[
    'F1 Dice Simulator — Modifier Change Log',
    `Season: ${app.currentSeason||1989}  Rounds completed: ${app.history.weekends.length}`,
    `Exported: ${new Date().toLocaleString()}`,
    '',
    'Round\tGP\tSession\tKind\tName\tDelta\tNow (acc.)\tReason',
  ];
  // Also include current weekend if in progress
  const allWeekends=[...app.history.weekends];
  if(app.currentWeekend&&(app.currentWeekend._raceEventMods||[]).length)allWeekends.push(app.currentWeekend);
  allWeekends.forEach(w=>{
    const mods=w._raceEventMods||[];
    if(!mods.length)return;
    const gp=w.raceMeta?.gp||'?';
    const round=w.raceMeta?.round||'?';
    mods.forEach(m=>{
      const accNow=m.kind==='driver'?(getDriverMod(m.id)||0):(getTeamMod(m.name)||0);
      lines.push([
        `R${round}`,escapeHtml(gp).replace(/&amp;/g,'&'),
        m.session||'race',m.kind,
        m.name,
        (m.delta>=0?'+':'')+m.delta.toFixed(2),
        (accNow>=0?'+':'')+accNow.toFixed(2),
        m.reason||'',
      ].join('\t'));
    });
  });
  const blob=new Blob([lines.join('\n')],{type:'text/plain;charset=utf-8'});
  const a=document.createElement('a');a.href=URL.createObjectURL(blob);
  a.download=`F1Dice_ModifierLog_${app.currentSeason||1989}.txt`;a.click();
}
window.exportModifierLog=exportModifierLog;
document.addEventListener('keydown',e=>{
  if(e.target.tagName==='INPUT'||e.target.tagName==='TEXTAREA'||e.target.tagName==='SELECT')return;
  const w=app.currentWeekend;
  if(!w)return;
  if((e.key==='n'||e.key==='N')&&!w.weekendFinished&&!w.pendingSeasonReturn){e.preventDefault();processNextRollWrapper();}
  else if((e.key==='i'||e.key==='I')&&!w.weekendFinished&&!w.pendingSeasonReturn){e.preventDefault();instantLapWrapper();}
  else if((e.key==='s'||e.key==='S')&&!w.weekendFinished&&!w.pendingSeasonReturn){e.preventDefault();instantResult();}
});
