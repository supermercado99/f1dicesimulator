function createWeekend(idx){
  const cal=seasonCalendar()[idx];
  const raceMeta={year:app.currentSeason||1989,round:cal.round,country:cal.country,gp:cal.gp,track:cal.track,title:`${app.currentSeason||1989} ${cal.gp} at ${cal.track}`,weather:null};
  const preqIds=app.preqDriverIds&&app.preqDriverIds.length?app.preqDriverIds:BASE_DRIVERS.filter(d=>d.listOrder>AUTO_QUALIFY_CUTOFF_FOR_SEASON()).map(d=>d.id);
  const _thisRound=cal.round;
  if(BASE_DRIVERS.length>55) console.log('[DEBUG] BASE_DRIVERS overflow',`${BASE_DRIVERS.length} drivers`);
  const _injuredIds=new Set(Object.entries(app.driverInjuries||{}).filter(([id,inj])=>isDriverInjured(Number(id),_thisRound)).map(([id])=>Number(id)));
  const autoBase=BASE_DRIVERS.filter(d=>!preqIds.includes(d.id)&&!_injuredIds.has(d.id)&&d.team!=='Available'&&!d._retired).map(d=>({...d,gridPos:d.listOrder}));
  const preqBase=BASE_DRIVERS.filter(d=>preqIds.includes(d.id)&&!_injuredIds.has(d.id)&&d.team!=='Available'&&!d._retired).map(d=>({...d,gridPos:d.listOrder}));
  const preqExpected=seasonRules().preqTotal||20;
  if(preqBase.length<preqExpected){
    console.log('[DEBUG] PQ grid short',`${preqBase.length}/${preqExpected}`);
  }

  return {
    raceMeta,session:'prequalifying',lap:1,rollSequence:0,
    order:preqBase.map(d=>d.id),displayOrder:preqBase.map(d=>d.id),slotPointer:0,
    sameNumberStreak:{value:null,refs:[]},_prevSameStreak:{value:null,refs:[]},fiveStreak:{refs:[]},_openFiveCrash:null,
    sessionFinished:false,weekendFinished:false,autoTimer:null,log:[],pendingAdvance:null,
    _logIncidentsOnly:true, // default: show incidents only in race log (user can toggle)
    sessions:{
      prequalifying:{name:'prequalifying',header:`${raceMeta.title} — Pre-qualifying`,lapLimit:seasonRules().preqLaps,drivers:preqBase.map(b=>sessionDriver(b,'prequalifying')),startOrder:preqBase.map(d=>d.id),finishedOrder:[]},
      qualifying:{name:'qualifying',header:`${raceMeta.title} — Qualifying`,lapLimit:seasonRules().qualiLaps,drivers:[],startOrder:[],finishedOrder:[]},
      race:{name:'race',header:`${raceMeta.title} — Race`,lapLimit:seasonRules().raceLaps,drivers:[],startOrder:[],finishedOrder:[]}
    },
    poleDriverId:null,poleTeam:null,
    _autoBase:autoBase.map(d=>d.id)
  };
}

// sessionDriver now includes modifier in starting bonus
function sessionDriver(base,mode,preqPenalty){
  const dMod=getDriverMod(base.id);
  const tModRaw=getTeamMod(base.team);
  // Full team contribution = base team bonus + accumulated modifier
  const tFull=base.teamBonus+tModRaw;
  // In qualifying: double the full team contribution if positive
  const tEffective=(mode==='qualifying'&&tFull>0)?tFull*2:tFull;
  const ageMod=ageModifier(base,app.currentSeason||1989);
  const qualiRetPenalty=(mode==='race'&&app._qualiRetirementPenalty&&app._qualiRetirementPenalty[base.id])||0;
  // basePure: for race, strip out teamBonus from raceNoGridBonus (it's added back via tEffective)
  // for qualifying, strip out teamBonus from qualiBonus (same reason)
  // raceNoGridBonus = driverBonus + teamBonus; qualiBonus = driverBonus + teamBonus
  // We apply tEffective (= teamBonus + tModRaw, or doubled if positive in qualifying)
  // so we must NOT also include teamBonus in basePure
  const basePure=mode==='race'?(base.raceNoGridBonus-base.teamBonus+gridBonus(base.gridPos)):(base.qualiBonus-base.teamBonus);
  const penalty=preqPenalty?seasonRules().preqPenalty:0;
  const startBonus=basePure+penalty+dMod+tEffective+ageMod+qualiRetPenalty;
  const dTotal=base.driverBonus+dMod;
  const doubled=mode==='qualifying'&&tFull>0;
  const parts=[`D ${fmtBonus(dTotal)}`,`T ${fmtBonus(tEffective)}${doubled?' (×2)':''}`];
  const gVal=mode==='race'?gridBonus(base.gridPos):null;
  if(gVal!==null)parts.push(`G ${gVal>=0?'+':''}${gVal}`);
  if(ageMod!==0)parts.push(`Age ${fmtBonus(ageMod)}`);
  if(qualiRetPenalty!==0)parts.push(`QRet ${fmtBonus(qualiRetPenalty)}`);
  if(preqPenalty)parts.push(`PQ ${seasonRules().preqPenalty}`);
  const bd=parts.join(', ')+` = ${fmtBonus(startBonus)}`;
  const lapLimit=mode==='prequalifying'?seasonRules().preqLaps:(mode==='qualifying'?seasonRules().qualiLaps:seasonRules().raceLaps);
  return {id:base.id,base,gridPos:base.gridPos,totalNumeric:startBonus,bonus:startBonus,bonusBreakdown:bd,status:'active',retirementReason:'',points:0,laps:Array(lapLimit).fill(''),incidentLap:null,incidentRoll:null,counts:{3:0,4:0,5:0,6:0},pitDramaLaps:[]};
}

function getCurrentSession(){return app.currentWeekend.sessions[app.currentWeekend.session];}
function getSessionDriver(sn,id){return app.currentWeekend.sessions[sn].drivers.find(d=>d.id===id);}
function currentActive(){return getCurrentSession().drivers.filter(d=>d.status==='active');}
function currentCompare(a,b){return app.currentWeekend.session==='race'?compareRaceActive(a,b):compareQuali(a,b);}
function currentDisplayRows(){return app.currentWeekend.displayOrder.map(id=>getSessionDriver(app.currentWeekend.session,id)).filter(Boolean);}
function addLog(html){const sess=app.currentWeekend?.session||'';app.currentWeekend.log.unshift({html,sess});app.currentWeekend.log=app.currentWeekend.log.slice(0,350);}

function setupQualifyingFromPreQualifying(){
  const w=app.currentWeekend;
  const fin=w.sessions.prequalifying.finishedOrder;
  const advance=app._preqAdvanceOverride||seasonRules().preqAdvance;
  const top6=fin.slice(0,advance);
  const failed=fin.slice(advance);
  applyPreqFailMod(failed);
  applyPreqTop6TeamMod(top6);
  w._preqAdvance=advance;
  // Exclude any driver injured or suspended during PQ from the qualifying grid
  const _injuredInPQ=new Set(top6.filter(id=>{
    const inj=app.driverInjuries&&app.driverInjuries[id];
    return inj&&inj.fromRound===w.raceMeta.round;
  }));
  if(_injuredInPQ.size){
    if(!w._pqInjuredOut)w._pqInjuredOut=[];
    _injuredInPQ.forEach(id=>w._pqInjuredOut.push(id));
  }
  const auto=BASE_DRIVERS.filter(d=>w._autoBase&&w._autoBase.includes(d.id)).map(d=>({...d,gridPos:d.listOrder}));
  const movers=BASE_DRIVERS.filter(d=>top6.includes(d.id)&&!_injuredInPQ.has(d.id)).map(d=>({...d,gridPos:d.listOrder}));
  const union=[...auto,...movers.filter(m=>!auto.some(a=>a.id===m.id))];
  w.sessions.qualifying.drivers=union.map(b=>sessionDriver(b,'qualifying',movers.some(m=>m.id===b.id)));
  w.sessions.qualifying.startOrder=union.map(b=>b.id);
}

function setupRaceFromQualifying(){
  const w=app.currentWeekend;
  const qualifiedIds=w.sessions.qualifying.finishedOrder;
  const raceField=seasonRules().raceField||26; // 1991=26, 1989=26 (all qualifiers race)
  // Exclude injured/suspended
  const injuredForThisRound=qualifiedIds.filter(id=>isDriverInjured(id,w.raceMeta.round));
  if(injuredForThisRound.length){
    if(!w._qualiInjuredOut)w._qualiInjuredOut=[];
    injuredForThisRound.forEach(id=>{if(!w._qualiInjuredOut.includes(id))w._qualiInjuredOut.push(id);});
  }
  const eligible=qualifiedIds.filter(id=>!injuredForThisRound.includes(id));
  // Take top raceField drivers (promotes from positions 27+ if injuries create vacancies)
  const raceIds=eligible.slice(0,raceField);
  // Track DNQ (qualified for qualifying but not race — only relevant in 1991 with 30→26 cut)
  w._dnqIds=qualifiedIds.filter(id=>!raceIds.includes(id)&&!injuredForThisRound.includes(id));
  const ordered=raceIds.map((id,i)=>{
    const qd=getSessionDriver('qualifying',id);
    return {...qd.base,gridPos:i+1};
  });
  const pole=ordered[0];
  w.poleDriverId=pole?pole.id:null;
  w.poleTeam=pole?pole.team:null;
  if(pole){updateModifiersForPole(pole.id,pole.team);}
  w.sessions.race.drivers=ordered.map(b=>sessionDriver(b,'race'));
  w.sessions.race.startOrder=ordered.map(d=>d.id);
}

function advanceToPendingSession(){
  const w=app.currentWeekend;
  if(!w.pendingAdvance)return false;
  const next=w.pendingAdvance;
  w.pendingAdvance=null;w.session=next;w.lap=1;w.slotPointer=0;
  w.sessionFinished=false;w.sameNumberStreak={value:null,refs:[]};w._prevSameStreak={value:null,refs:[]};w.fiveStreak={refs:[]};w._openFiveCrash=null;
  w.rollSequence=0; // restart roll numbers per phase
  w.order=[...w.sessions[next].startOrder];w.displayOrder=[...w.order];
  saveLive();saveApp();render();return true;
}

function markRetired(d,lap,roll,die){
  if(!d||d.status!=='active')return;
  d.status='retired';d.retirementReason=chooseRetirementReason(d,app.currentWeekend.rollSequence);
  d.incidentLap=lap;d.incidentRoll=roll;d.laps[lap-1]='X';
  // In qualifying/pre-qualifying, void the retirement lap score entirely (deduct the full roll)
  if(die&&app.currentWeekend.session!=='race'){
    d.totalNumeric-=die;
  }
  // Reset five streak and crash state — retiring driver's roll must not seed a crash sequence
  // sameNumberStreak is NOT reset here: consecutive retirements (4th, 5th same number etc.)
  // must keep triggering. Only crashes reset the same-number streak.
  const w=app.currentWeekend;
  if(w&&w.session==='race'){
    w._prevSameStreak={value:null,refs:[]};
    w.fiveStreak={refs:[]};
    if(w._openFiveCrash){try{closeFiveCrash(w);}catch(e){} w._openFiveCrash=null;}
  }
  // Team mod for retirement; spun off driver mod (guarded)
  try{if(app.currentWeekend&&(d.base||d.team))applyRetirementTeamMod(d,app.currentWeekend.session);}catch(e){}
  try{if(d.retirementReason===SPUN_OFF)applySpunOffDriverMod(d.id);}catch(e){}
}
function markCrashed(d,lap,roll,die){
  if(!d)return;
  d.status='crashed';d.retirementReason='';d.incidentLap=lap;d.incidentRoll=roll;d.laps[lap-1]='X';
  // _crashedIds feeds legacy tracking; _crashGroups feeds per-incident rivalry evaluation
  if(app.currentWeekend&&app.currentWeekend.session==='race'){
    if(!app.currentWeekend._crashedIds)app.currentWeekend._crashedIds=[];
    if(!app.currentWeekend._crashedIds.includes(d.id))app.currentWeekend._crashedIds.push(d.id);
  }
  // In qualifying/pre-qualifying, void the crash lap score entirely (deduct the full roll)
  if(die&&app.currentWeekend.session!=='race'){
    d.totalNumeric-=die;
  }
}

function updateSameNumberStreak(id,val,lap,roll){
  // Shared cross-driver streak: retirements and crashes are triggered by any combination
  // of drivers rolling the same number consecutively (intentional game mechanic).
  // Pit lane drama uses driver.laps directly and is unaffected by this streak.
  const w=app.currentWeekend;
  const s=w.sameNumberStreak;
  if(s.value===val){
    s.refs.push({driverId:id,lap,roll,value:val});
  } else {
    // Save previous streak before resetting (for same/same/5 crash detection)
    w._prevSameStreak=s;
    w.sameNumberStreak={value:val,refs:[{driverId:id,lap,roll,value:val}]};
  }
}
function updateFiveStreak(id,val,lap,roll){
  const w=app.currentWeekend;
  if(!crashLogicActive(w)){
    // If crash was open and logic is no longer active (lap changed), close it
    if(w._openFiveCrash)closeFiveCrash(w);
    return;
  }
  if(val===5){
    w.fiveStreak.refs.push({driverId:id,lap,roll,value:val});
  } else {
    // Non-5 breaks the streak — close any open crash first
    if(w._openFiveCrash)closeFiveCrash(w);
    w.fiveStreak={refs:[]};
  }
}

function closeFiveCrash(w){
  const crash=w._openFiveCrash;
  if(!crash||!crash.ids.length){w._openFiveCrash=null;return;}
  // Apply modifiers, injury, suspension to all accumulated victims
  const secondId=crash.ids[1]||crash.ids[0];
  applyCrashMod(crash.ids,secondId);
  const injMsgs=[];
  const _faultId=crash.ids[1]||crash.ids[0]; // at-fault driver
  crash.ids.forEach((id,i)=>{
    if(INJURY_CHANCE()){const inj=rollInjury();if(inj){applyInjury(id,inj,w.raceMeta.round);injMsgs.push(`🚑 ${injuryLogMsg(id,inj,w.raceMeta.round)}`);}}
    if(id===_faultId&&SUSPENSION_CHANCE()){injMsgs.push(applySuspension(id,w.raceMeta.round));}
  });
  // Extra suspension check for at-fault driver in 4+ car crashes (~2%)
  if(crash.ids.length>=4&&_faultId){
    if(Math.random()<0.02){
      const alreadySusp=app.driverInjuries&&app.driverInjuries[_faultId]?.cause==='suspension';
      if(!alreadySusp){injMsgs.push(applySuspension(_faultId,w.raceMeta.round).replace('1 race.','1 race (multi-car crash).'));}
    }
  }
  // Record this crash as a group for per-incident rivalry evaluation
  if(crash.ids.length>=2){
    if(!w._crashGroups)w._crashGroups=[];
    w._crashGroups.push([...crash.ids]);
  }
  // Log injuries/suspensions only (crash declaration already logged when it opened/joined)
  if(injMsgs.length)addLog(`<span class="injury">${injMsgs.join('<br>')}</span>`);
  w._openFiveCrash=null;
}

// Shared: apply injury from a spun-off incident, queue replacement for all sessions
function applySpunInjury(driver,round){
  if(!app._movementRules?.injuries)return null;
  const inj=rollInjury();
  if(!inj)return null;
  applyInjury(driver.id,inj,round);
  recordDriverIncident(driver.id,'injury',{impact:inj.impact,result:inj.result,missRaces:inj.missRaces,round,gp:app.currentWeekend.raceMeta.gp});
  if(inj.missRaces==='career'){
    executeCareerEndingInjury(driver.id,[]);
    // For one-driver teams: immediately find permanent replacement
    if(isOneDriverTeam(driver.base.team)){
      const _injTeam=driver.base.team;
      const _taken=BASE_DRIVERS.map(d=>d.id);
      const _repl=findReplacement(_injTeam,_taken,true);
      if(_repl){
        hireReplacement(_repl,_injTeam,999,null);
        if(!app.currentWeekend._movementNews)app.currentWeekend._movementNews=[];
        app.currentWeekend._movementNews.push(`🏥 <strong>${escapeHtml(driverFullName(driver.base))}</strong> career-ending injury. <strong>${escapeHtml(_repl.fn+' '+_repl.ln)}</strong> takes the seat at ${escapeHtml(_injTeam)} for the remainder of the season.`);
      }
    }
  } else if(inj.missRaces>0){
    // Queue replacement for NEXT round regardless of which session the injury happened in
    const _injTeam=driver.base.team;
    const _taken=BASE_DRIVERS.map(d=>d.id);
    const _repl=findReplacement(_injTeam,_taken,false);
    if(_repl){
      const _misses=typeof inj.missRaces==='number'?inj.missRaces:16;
      hireReplacement(_repl,_injTeam,_misses,driver.id);
      if(!app.currentWeekend._movementNews)app.currentWeekend._movementNews=[];
      app.currentWeekend._movementNews.push(`🚑 <strong>${escapeHtml(driverFullName(driver.base))}</strong> injured for ${_misses} race${_misses>1?'s':''}. <strong>${escapeHtml(driverFullName(_repl))}</strong> will substitute at ${escapeHtml(_injTeam)}.`);
    }
  }
  return inj;
}

function handleGeneralIncident(driver,die,w){
  const lap=w.lap,roll=w.rollSequence,sess=w.session;
  const refs=w.sameNumberStreak.refs;
  if(refs.length<3)return'';
  // Global rule: In PQ, retirements only trigger on last 2 laps; in Q, last lap only.
  // Streak CAN start on an earlier lap and complete on an eligible lap.
  const lapLimit=sess==='prequalifying'?seasonRules().preqLaps:sess==='qualifying'?seasonRules().qualiLaps:null;
  if(lapLimit){
    const eligibleFrom=sess==='prequalifying'?lapLimit-1:lapLimit; // PQ: last 2 laps; Q: last lap
    if(lap<eligibleFrom)return''; // streak accumulating but not yet on eligible lap
  }
  markRetired(driver,lap,roll,die);
  if(w.session!=='race'){
    if(!app._qualiRetirementPenalty)app._qualiRetirementPenalty={};
    app._qualiRetirementPenalty[driver.id]=(app._qualiRetirementPenalty[driver.id]||0)-0.25;
  }
  const isSpun=driver.retirementReason===SPUN_OFF;
  const ordinal={3:'3rd',4:'4th',5:'5th',6:'6th',7:'7th',8:'8th'}[refs.length]||`${refs.length}th`;
  const reasonStr=isSpun?'spun off':`(${escapeHtml(driver.retirementReason)})`;
  let msg=`<span class="incident">Retirement!</span> <strong>${ordinal} consecutive ${die}. ${escapeHtml(driverSurname(driver.base))}</strong> ${reasonStr}.`;
  if(isSpun){
    const inj=applySpunInjury(driver,w.raceMeta.round);
    if(inj){
      msg+=` <span class="injury">🚑 ${injuryLogMsg(driver.id,inj,w.raceMeta.round)}</span>`;
      if(driver.laps&&driver.incidentLap!=null)driver.laps[driver.incidentLap-1]='🚑';
      // retirementReason remains 'Spun Off' for total column display
    }
  }
  recordDriverIncident(driver.id,'retirement',{reason:driver.retirementReason,gp:w.raceMeta.gp,round:w.raceMeta.round});
  // A retirement only resets the crash state (fiveStreak, _prevSameStreak, openFiveCrash).
  // The sameNumberStreak is preserved: 4th, 5th consecutive same number keep triggering retirement.
  // e.g. 3,3,3 → retire; 3 → retire again; 3 → retire again, etc.
  if(w._openFiveCrash)closeFiveCrash(w);
  return msg;
}

function handleFiveCrash(driver,roll){
  const w=app.currentWeekend;
  if(!crashLogicActive(w))return'';
  const refs=w.fiveStreak.refs;
  // same/same/5 trigger: first 5 in fiveStreak AND at least 2 prior same numbers
  const streak=w._prevSameStreak||{refs:[]};
  if(refs.length===1&&streak.refs.length>=2){
    // Mandatory participants:
    //   - The driver who rolled the 5 (current driver = at fault)
    //   - The last driver in the same-number streak (immediately before the 5)
    // Optional: other drivers from the same-number streak (random 50% chance to include each)
    const lastSameRef=streak.refs[streak.refs.length-1]; // immediately preceding driver
    const otherSameRefs=streak.refs.slice(0,-1); // all earlier same-streak drivers
    const mandatoryIds=[lastSameRef.driverId,driver.id].filter((id,i,a)=>a.indexOf(id)===i);
    // Randomly include other same-streak drivers (up to making 3 total)
    const extras=otherSameRefs
      .filter(r=>!mandatoryIds.includes(r.driverId))
      .filter(()=>Math.random()<0.5)
      .map(r=>r.driverId);
    const allIds=[...mandatoryIds,...extras].slice(0,3); // cap at 3 total
    // Filter to active drivers only
    const crashedIds=[],names=[];
    allIds.forEach(id=>{
      const d=getSessionDriver('race',id);
      if(d&&d.status==='active'){markCrashed(d,w.lap,roll,5);crashedIds.push(id);names.push(d.base.name);}
    });
    if(!crashedIds.length)return'';
    // 5-roller is at fault (first element of allIds if active, else fallback to crashedIds[0])
    const faultId=crashedIds.includes(driver.id)?driver.id:crashedIds[0];
    applyCrashMod(crashedIds,faultId);
    const injMsgs=[];
    crashedIds.forEach((id,i)=>{
      if(INJURY_CHANCE()){const inj=rollInjury();if(inj){applyInjury(id,inj,w.raceMeta.round);injMsgs.push(`🚑 ${injuryLogMsg(id,inj,w.raceMeta.round)}`);}}
      if(id===faultId&&SUSPENSION_CHANCE()){injMsgs.push(applySuspension(id,w.raceMeta.round));}
    });
    crashedIds.forEach(id=>recordDriverIncident(id,'crash',{gp:w.raceMeta.gp,round:w.raceMeta.round,others:crashedIds.filter(x=>x!==id)}));
    if(crashedIds.length>=2){if(!w._crashGroups)w._crashGroups=[];w._crashGroups.push([...crashedIds]);}
    // Build name list: at-fault driver shown with (at fault)
    const nameList=names.map((n,i)=>crashedIds[i]===faultId?`${escapeHtml(n)} <em>(at fault)</em>`:escapeHtml(n));
    const nameStr=nameList.length>2?nameList.slice(0,-1).join(', ')+', and '+nameList[nameList.length-1]:nameList.join(' and ');
    let msg=`<span class="incident">Crash!</span> <strong>${nameStr}</strong>.`;
    if(injMsgs.length)msg+=`<br><span class="injury">${injMsgs.join('<br>')}</span>`;
    return msg;
  }
  if(refs.length<3)return'';
  if(refs.length===3){
    // Third consecutive 5 opens a crash — crash refs[1] and refs[2]
    const d2=getSessionDriver('race',refs[1].driverId),d3=getSessionDriver('race',refs[2].driverId);
    const crashedIds=[],names=[];
    if(d2&&d2.status==='active'){markCrashed(d2,w.lap,refs[1].roll,5);crashedIds.push(d2.id);names.push(d2.base.name);recordDriverIncident(d2.id,'crash',{gp:w.raceMeta.gp,round:w.raceMeta.round,others:[]});}
    if(d3&&d3.status==='active'){markCrashed(d3,w.lap,refs[2].roll,5);crashedIds.push(d3.id);names.push(d3.base.name);recordDriverIncident(d3.id,'crash',{gp:w.raceMeta.gp,round:w.raceMeta.round,others:[]});}
    // Open the crash — it stays open, more drivers can be added on refs>=4
    w._openFiveCrash={ids:crashedIds,names,lap:w.lap};
    // Two drivers open the crash — second (refs[2]) is at fault (rolled the second 5)
    const openFaultId=crashedIds[1]||crashedIds[0];
    const openNames=names.map((n,i)=>crashedIds[i]===openFaultId?escapeHtml(n)+' <em>(at fault)</em>':escapeHtml(n));
    const openStr=openNames.join(' and ');
    return `<span class="incident">Crash!</span> <strong>${openStr}</strong>.`;
  }
  // refs.length >= 4: add current driver to the open crash
  if(driver.status==='active'){
    markCrashed(driver,w.lap,roll,5);
    recordDriverIncident(driver.id,'crash',{gp:w.raceMeta.gp,round:w.raceMeta.round,others:[]});
    if(!w._openFiveCrash)w._openFiveCrash={ids:[],names:[],lap:w.lap};
    if(!w._openFiveCrash.ids.includes(driver.id)){
      w._openFiveCrash.ids.push(driver.id);
      w._openFiveCrash.names.push(driver.base.name);
    }
    const crashCount=w._openFiveCrash.ids.length;
    if(crashCount===3){
      // Third driver: "[NewDriver] collides with [original two]"
      const origNames=w._openFiveCrash.names.slice(0,-1).map(n=>escapeHtml(n)).join(' and ');
      return `<span class="incident">Crash!</span> <strong>${escapeHtml(driver.base.name)}</strong> collides with <strong>${origNames}</strong>.`;
    }
    return `<span class="incident">Chaos!</span> <strong>${escapeHtml(driver.base.name)}</strong> joins multi-car crash.`;
  }
  return'';
}

function processNextRoll(){
  const w=app.currentWeekend;
  if(!w||w.weekendFinished)return;
  if(w.pendingAdvance){advanceToPendingSession();return;}
  if(w.slotPointer>=w.order.length){endLapAndReorder();return;}
  const driver=getSessionDriver(w.session,w.order[w.slotPointer]);
  if(!driver){
    // Driver ID in order but not found in session drivers — skip slot and log it
    console.log('[DEBUG] processNextRoll: driver not found',`session=${w.session} id=${w.order[w.slotPointer]} slot=${w.slotPointer}`);
    w.slotPointer++;
    if(w.slotPointer>=w.order.length){endLapAndReorder();return;}
    return;
  }
  const lapIdx=w.lap-1;
  w.rollSequence+=1;
  const die=Math.floor(Math.random()*6)+1;
  let pitDramaThisRoll=false;
  if(driver.status==='active'){
    driver.laps[lapIdx]=String(die);
    driver.totalNumeric+=die;
    if(driver.counts[die]!==undefined)driver.counts[die]+=1;
    // Pit Lane Drama: same die value rolled by THIS driver for 4 consecutive laps (laps 4-9, triggers on lap 4 or when the 4th consecutive falls within laps 4-9)
    if(w.session==='race'&&w.lap>=4&&w.lap<=9){
      const recentLaps=driver.laps.slice(w.lap-4,w.lap); // laps [lap-3 .. lap], 4 entries
      if(recentLaps.length===4&&recentLaps.every(v=>v===String(die))&&!driver.pitDramaLaps.includes(w.lap)){
        // Pit Lane Drama triggered! Cancel lap 5's die from total, mark lap cell
        driver.totalNumeric-=die;
        driver.laps[lapIdx]='P';
        driver.pitDramaLaps.push(w.lap);
        pitDramaThisRoll=true;
        applyTeamMod(driver.base.team,-0.05);
      }
    }
  }
  if(driver.status==='active')updateSameNumberStreak(driver.id,die,w.lap,w.rollSequence);
  if(driver.status==='active')updateFiveStreak(driver.id,die,w.lap,w.rollSequence);
  const msgs=[];
  if(w.session==='race'){const m=handleFiveCrash(driver,w.rollSequence);if(m)msgs.push(m);}
  // Only fire retirement if no crash message already fired — crash covers the event
  const g=msgs.length===0?handleGeneralIncident(driver,die,w):null;
  if(g)msgs.push(g);
  // If pit drama fired on same roll as crash/retire, cancel pit drama
  if(pitDramaThisRoll&&driver.status!=='active'){
    // Reverse pit drama: restore die to total, restore lap cell to X (crash/retire overwrites)
    driver.totalNumeric+=die; // restore voided score
    driver.pitDramaLaps.splice(driver.pitDramaLaps.indexOf(w.lap),1); // un-mark lap
    applyTeamMod(driver.base.team,0.05); // reverse team modifier
    pitDramaThisRoll=false;
  }
  const prefix=`<span style="color:var(--muted);font-size:12px">Roll ${w.rollSequence} · Lap ${w.lap}:</span> <strong>${escapeHtml(driverSurname(driver.base))}</strong> rolled <strong>${die}</strong>.`;
  if(pitDramaThisRoll)msgs.push(`<span class="incident">🔧 Pit lane drama!</span> <strong>${escapeHtml(driverSurname(driver.base))}</strong> rolls ${die} for 4 consecutive laps — Lap score voided.`);
  addLog(msgs.length?`${prefix}<br>${msgs.join('<br>')}`:prefix);
  w.slotPointer+=1;
  saveLive(); // crash-recovery only; saveApp() happens at session/race end
  if(w.slotPointer>=w.order.length){endLapAndReorder();if(!w._suppressRender)render();return;}
  if(!w._suppressRender)render();
}

// Instant lap: complete all remaining rolls in current lap only
function instantLap(){
  const w=app.currentWeekend;
  if(!w||w.weekendFinished||w.pendingAdvance)return;
  const lapBefore=w.lap;
  w._suppressRender=true; // skip per-roll renders during instant mode
  try{
    while(app.currentWeekend&&!app.currentWeekend.weekendFinished&&!app.currentWeekend.pendingAdvance&&!app.currentWeekend.sessionFinished&&app.currentWeekend.lap===lapBefore){
      if(app.currentWeekend.slotPointer>=app.currentWeekend.order.length){
        endLapAndReorder();
        break;
      }
      const _nextId=app.currentWeekend.order[app.currentWeekend.slotPointer];
      const _nextDriver=getSessionDriver(app.currentWeekend.session,_nextId);
      if(!_nextDriver){
        console.log('[DEBUG] instantLap: null driver at slot',app.currentWeekend.slotPointer,`id=${_nextId}`);
        app.currentWeekend.slotPointer++;
        continue;
      }
      processNextRoll();
      if(!app.currentWeekend||app.currentWeekend.weekendFinished||app.currentWeekend.pendingAdvance||app.currentWeekend.sessionFinished)break;
      if(app.currentWeekend.lap!==lapBefore)break;
    }
  }catch(e){
    console.error('instantLap exception:',e);
    try{debugMsg('instantLap exception',e?.message||String(e));}catch(e2){}
  }finally{
    if(app.currentWeekend)app.currentWeekend._suppressRender=false;
  }
  render();
  if(app.currentWeekend&&app.currentWeekend.weekendFinished&&app.news&&app.news.length){
    requestAnimationFrame(()=>{
      if(app.news&&app.news.length&&!document.getElementById('newsModal'))showNewsModal(app.news[0]);
    });
  }
}

function endLapAndReorder(){
  const w=app.currentWeekend,s=getCurrentSession();
  let active=currentActive().sort(currentCompare);
  let inactive=s.drivers.filter(d=>d.status!=='active');
  if(w.session==='qualifying'){
    // Active drivers sorted by score; retired drivers placed at end of the lap they retired on
    // Group: for each lap, show active drivers who scored on that lap, then retired on that lap
    const retiredByLap={};
    inactive.forEach(d=>{const l=d.incidentLap||0;if(!retiredByLap[l])retiredByLap[l]=[];retiredByLap[l].push(d);});
    // Sort active by score
    const activeSorted=active.sort(compareQuali);
    // Build ordered list: active in score order, with retired inserted after their incident lap's active batch
    // Simpler approach: active first (score order), retired at end sorted by lap desc then score
    // Retired drivers ranked by total score at retirement - merge with active by score
    // Active drivers take precedence over retired with equal score (they can still improve)
    // Active drivers sorted by score with 6s tiebreaker; retired merged by total then 6s, active beats retired on equal
    const allSorted=[...active,...inactive].sort((a,b)=>{
      if(b.totalNumeric!==a.totalNumeric)return b.totalNumeric-a.totalNumeric;
      // 6s tiebreaker
      if((b.counts[6]||0)!==(a.counts[6]||0))return(b.counts[6]||0)-(a.counts[6]||0);
      if((b.counts[5]||0)!==(a.counts[5]||0))return(b.counts[5]||0)-(a.counts[5]||0);
      // Active beats retired at equal score (active can still improve)
      const aActive=a.status==='active',bActive=b.status==='active';
      if(aActive!==bActive)return aActive?-1:1;
      return (b.incidentLap||0)-(a.incidentLap||0)||a.base.listOrder-b.base.listOrder;
    });
    w.displayOrder=allSorted.map(d=>d.id);
  } else if(w.session==='prequalifying'){
    // Pre-qualifying: sort by total, then 6s count (main tiebreaker), then 5s, then active > retired, then listOrder
    const allSortedPreq=[...active,...inactive].sort((a,b)=>{
      if(b.totalNumeric!==a.totalNumeric)return b.totalNumeric-a.totalNumeric;
      if((b.counts[6]||0)!==(a.counts[6]||0))return(b.counts[6]||0)-(a.counts[6]||0);
      if((b.counts[5]||0)!==(a.counts[5]||0))return(b.counts[5]||0)-(a.counts[5]||0);
      const aActive=a.status==='active',bActive=b.status==='active';
      if(aActive!==bActive)return aActive?-1:1;
      return (b.incidentLap||0)-(a.incidentLap||0)||a.base.listOrder-b.base.listOrder;
    });
    w.displayOrder=allSortedPreq.map(d=>d.id);
  } else {
    inactive=inactive.sort(compareInactive);
    w.displayOrder=[...active.map(d=>d.id),...inactive.map(d=>d.id)];
  }
  const phaseName=w.session==='prequalifying'?'Pre-Qualifying':w.session==='qualifying'?'Qualifying':'Race';
  addLog(`<strong>End of ${phaseName} Lap ${w.lap}.</strong>`);
  if(w.lap>=s.lapLimit||active.length===0){s.finishedOrder=[...w.displayOrder];finishSession();return;}
  w.lap+=1;
  if(w.session==='qualifying'||w.session==='prequalifying'){w.order=w.displayOrder.filter(id=>getSessionDriver(w.session,id)?.status==='active');}else{w.order=active.map(d=>d.id);}
  w.slotPointer=0;
  if(!crashLogicActive(w)){if(w._openFiveCrash)closeFiveCrash(w);w.fiveStreak={refs:[]};}
  w._prevSameStreak={value:null,refs:[]}; // reset between laps
  // No render() here — processNextRoll calls render() for single-roll mode,
  // and instantLap/instantResult render after the whole loop completes.
}

function finishSession(){
  const w=app.currentWeekend;
  w.sessionFinished=true;
  if(w.session==='prequalifying'){
    setupQualifyingFromPreQualifying();
    // pre-qual complete — banner shown in UI, no log entry needed
    w.pendingAdvance='qualifying';saveLive();saveApp();render();return;
  }
  if(w.session==='qualifying'){
    setupRaceFromQualifying();
    const pole=getSessionDriver('qualifying',w.sessions.qualifying.finishedOrder[0]);
    // Apply qualifying result modifiers for all drivers (scaled by total modifier)
  const qualiFinished=w.sessions.qualifying.finishedOrder;
  const totalQ=qualiFinished.length;
  const raceField=seasonRules().raceField||26;
  // Best driver result per team for team modifier
  const qualiTeamBest={};
  qualiFinished.forEach((id,i)=>{
    const pos=i+1;
    const qd=BASE_DRIVERS.find(d=>d.id===id);if(!qd)return;
    const dtm=driverTotalMod(id);
    // Tier: 0=Pole, 1=P2-3, 2=P4-8, 3=P9-15, 4=P16+/DNQ/Ret
    const tier=pos===1?0:pos<=3?1:pos<=8?2:pos<=15?3:4;
    const dd=scaledMod(MOD_QUALI_DRIVER,dtm,tier);
    if(dd!==0){applyDriverMod(id,dd);recordMod('driver',id,driverFullName(qd),dd,`Quali P${pos}`,'qualifying');}
    const t=qd.team;
    if(qualiTeamBest[t]===undefined||tier<qualiTeamBest[t])qualiTeamBest[t]=tier;
  });

  (w._dnqIds||[]).forEach(id=>{
    const qd=BASE_DRIVERS.find(d=>d.id===id);if(!qd)return;
    const dtm=driverTotalMod(id);
    const dd=scaledMod(MOD_QUALI_DRIVER,dtm,4); // tier 4 = DNQ
    if(dd!==0){applyDriverMod(id,dd);recordMod('driver',id,driverFullName(qd),dd,'DNQ','qualifying');}
    const t=qd.team;
    if(qualiTeamBest[t]===undefined||4<qualiTeamBest[t])qualiTeamBest[t]=4;
  });
  Object.entries(qualiTeamBest).forEach(([team,tier])=>{
    const ttm=teamTotalMod(team);
    const td=scaledMod(MOD_QUALI_TEAM,ttm,tier);
    if(td!==0){applyTeamMod(team,td);recordMod('team',null,teamDisplayName(team),td,`Quali best P${['1','2-3','4-8','9-15','16+'][tier]}`,'qualifying');}
  });
  addLog(`<strong>Qualifying complete:</strong> ${escapeHtml(pole?.base.name||'—')} takes pole position.`);
    w.pendingAdvance='race';saveLive();saveApp();render();return;
  }
  if(w.session==='race'){finishWeekend();render();}
}

function assignChampionshipPoints(){
  const race=app.currentWeekend.sessions.race;
  race.drivers.forEach(d=>d.points=0);
  race.drivers.filter(d=>d.status==='active').sort(compareRaceActive).slice(0,_effectiveChampPoints().length).forEach((d,i)=>d.points=champPointsFor(i+1));
}

function recordWeekendHistory(){
  const w=app.currentWeekend;
  if(w._nonChampionship){return;} // Non-championship races don't count in history
  if(!w||!w.weekendFinished)return;
  const key=weekendKey(w.raceMeta);
  if(app.history.weekends.some(x=>x.weekendKey===key))return;
  const ser=(sn,id,pos)=>{const d=w.sessions[sn].drivers.find(x=>x.id===id);return{id:d.id,position:pos,driver:d.base.name,team:teamDisplayName(d.base.team),nation2:d.base.nation2,nation3:d.base.nation3,status:d.status,total:d.totalNumeric,counts:{...d.counts},gridPos:d.gridPos,points:d.points||0,retirementReason:d.retirementReason||''};};
  const preq=w.sessions.prequalifying.finishedOrder.map((id,i)=>ser('prequalifying',id,i+1));
  const quali=w.sessions.qualifying.finishedOrder.map((id,i)=>{const r=ser('qualifying',id,i+1);r.pole=(i===0);return r;});
  const race=w.sessions.race.finishedOrder.map((id,i)=>ser('race',id,i+1));
  app.history.weekends.push({weekendKey:key,raceMeta:w.raceMeta,poleDriverId:w.poleDriverId,poleTeam:w.poleTeam,prequalifying:preq,qualifying:quali,race,_randMods:w._randMods||[],_rivalryNews:w._rivalryNews||[],_raceEventMods:w._raceEventMods||[],_firedNews:w._firedNews||[],_movementNews:w._movementNews||[],_seatFillNews:w._seatFillNews||[],_crashGroups:w._crashGroups||[]});
}

function finishWeekend(){
  const w=app.currentWeekend;
  assignChampionshipPoints();
  const race=w.sessions.race;
  const active=race.drivers.filter(d=>d.status==='active').sort(compareRaceActive);
  const inactive=race.drivers.filter(d=>d.status!=='active').sort(compareInactive);
  race.finishedOrder=[...active.map(d=>d.id),...inactive.map(d=>d.id)];
  w.displayOrder=[...race.finishedOrder];
  w.weekendFinished=true;w.sessionFinished=true;
  const _raceResults=race.finishedOrder.map((id,i)=>{const d=race.drivers.find(x=>x.id===id);const qd=app.currentWeekend.sessions.qualifying.drivers.find(x=>x.id===id);return{id,position:i+1,team:teamDisplayName(d.base.team),gridPos:d.gridPos||0,qualifyingPos:qd?(app.currentWeekend.sessions.qualifying.finishedOrder.indexOf(id)+1):99,status:d.status,points:d.points||0,totalNumeric:d.totalNumeric||0,bonus:d.bonus||0};});
  updateModifiersAfterRace(_raceResults);

  const _preqFailed=app.currentWeekend.sessions.prequalifying?(app.currentWeekend.sessions.prequalifying.finishedOrder||[]).slice(_preqAdvFail):[]; // positions 7+ failed to qualify
  updateInexperienceAfterRace(_raceResults,_preqFailed);
  // Apply random modifiers
  const randMods=applyRandomModifiers(false);
  w._randMods=randMods;
  // Clear one-race qualifying retirement penalties after race
  if(app._qualiRetirementPenalty) app._qualiRetirementPenalty={};

  // ── Run all post-race driver movement BEFORE recording history so news is complete ──
  if(!w._firedNews)w._firedNews=[];
  const _movementNews=w._movementNews||[];
  // Do not process firings/quits after Round 16 — season end, new-season logic handles this separately
  const _isLastRound=w.raceMeta.round>=seasonRules().totalRounds;
  if(!_isLastRound){
    checkContractExpirations(_movementNews);
    evaluateAndFireDrivers(_raceResults,_movementNews);
  }
  w._movementNews=_movementNews;

  // Evaluate rivalries from this race
  const _rivalryNews=[];
  const _crashedThisRace=(app.currentWeekend._crashedIds||[]);
  evaluateRaceDayRivalries(_raceResults,_crashedThisRace,_rivalryNews);
  w._rivalryNews=_rivalryNews;

  recordWeekendHistory();
  invalidateStandingsCache();

  // After race 8, recalculate pre-qualifying pool
  const _completedRound=app.history.weekends.filter(wk=>wk.raceMeta.year===app.currentSeason).length;
  if(_completedRound===seasonRules().preqRecalcAfterRound){
    const _preqChange=applyPreqRecalc();
    app._preqChangeAfterR8=_preqChange;
  }

  clearLive();saveApp();

  // Build race news from history entry (which now has all movement data via recordWeekendHistory)
  const entry=app.history.weekends[app.history.weekends.length-1];
  if(entry){
    const newsItem=buildRaceNews(entry);
    pushNews(newsItem);
    if(app._preqChangeAfterR8)delete app._preqChangeAfterR8;
  }
  saveApp();saveAutosave();
  requestAnimationFrame(()=>{
    if(app.news&&app.news.length)showNewsModal(app.news[0]);
  });
  w.pendingSeasonReturn=true;
  render();
  requestAnimationFrame(()=>{if(app.currentWeekend&&app.currentWeekend.pendingSeasonReturn)render();});
}

function instantResult(){
  const w=app.currentWeekend;
  if(!w||w.weekendFinished)return;
  if(w.pendingAdvance){advanceToPendingSession();render();return;}
  const ss=w.session;
  w._suppressRender=true;
  try{
    while(app.currentWeekend&&!app.currentWeekend.weekendFinished&&app.currentWeekend.session===ss&&!app.currentWeekend.pendingAdvance){
      const _nextId=app.currentWeekend.order[app.currentWeekend.slotPointer];
      const _nextDriver=_nextId!==undefined?getSessionDriver(app.currentWeekend.session,_nextId):null;
      if(_nextId!==undefined&&!_nextDriver){
        console.log('[DEBUG] instantResult: null driver at slot',app.currentWeekend.slotPointer,`id=${_nextId}`);
        app.currentWeekend.slotPointer++;
        continue;
      }
      processNextRoll();
      if(app.currentWeekend.pendingAdvance||app.currentWeekend.session!==ss)break;
    }
  }catch(e){
    console.error('instantResult exception:',e);
    try{debugMsg('instantResult exception',e?.message||String(e));}catch(e2){}
  }finally{
    if(app.currentWeekend)app.currentWeekend._suppressRender=false;
  }
  render();
  if(app.currentWeekend&&app.currentWeekend.weekendFinished&&app.news&&app.news.length){
    requestAnimationFrame(()=>{
      if(app.news&&app.news.length&&!document.getElementById('newsModal'))showNewsModal(app.news[0]);
    });
  }
}
function startAuto(){
  const w=app.currentWeekend;

  // Helper: get canonical team entry from tm, resolving any alias

  weeks.forEach(w=>{

    w.qualifying.forEach(q=>{

      const qt=getTeam(q.team);

    const teamEntrySeen={};
    [...w.prequalifying,...w.qualifying].forEach(r=>{
      const rt=getTeam(r.team);if(!rt)return;
      const key=teamCanonicalName(r.team)+'|'+r.id;

    w.race.forEach(r=>{

function seasonSummaries(){

}

function seasonsForEntity(nameOrId,type){

function compressYears(yrs){
  // Takes sorted array of year numbers, returns compressed string e.g. [1989,1990,1992] → "1989-1990, 1992"
  if(!yrs||!yrs.length)return'';
  const groups=[];let start=yrs[0],prev=yrs[0];
  for(let i=1;i<yrs.length;i++){
    if(yrs[i]===prev+1){prev=yrs[i];}
    else{groups.push(start===prev?[start]:[start,prev]);start=yrs[i];prev=yrs[i];}
  }
  groups.push(start===prev?[start]:[start,prev]);
  return groups.map(g=>g.length===2?`${g[0]}-${g[1]}`:String(g[0])).join(', ');
}

    return`<a class="profile-link" href="#season-${g[0]}" onclick="event.preventDefault();goHash('#season-${g[0]}')">${g[0]}</a>`;
  }).join(', ');
}
function teamRosterYears(team){
  // team is canonical (e.g. 'March'); r.team in history may be display name ('Leyton House')
  const canonical=teamCanonicalName(team);
  const roster=[...new Set(
    app.history.weekends.flatMap(w=>w.race.filter(r=>teamCanonicalName(r.team)===canonical).map(r=>r.driver))
    .concat(BASE_DRIVERS.filter(d=>d.team===canonical).map(d=>d.name))
  )].sort();
  return roster.map(name=>{
    const _bd2=BASE_DRIVERS.find(d=>d.name===name);
    const _rd2=(app._retiredDrivers||[]).find(r=>(r.lastName||r.name)===name);
    const _dId2=_bd2?.id||_rd2?.id||name;
    return{name,years:seasonsForEntity(_dId2,'driver')};
  });
}

// ── MOD HISTORY CHART ────────────────────────────────────────────────────
function modHistoryChart(id,isTeam){
  const allHist=((isTeam?app.modHistory.teams[id]:app.modHistory.drivers[id])||[]).filter(h=>h.round>0);
  if(!allHist.length)return`<p class="subtle" style="font-size:13px">No modifier history yet.</p>`;
  // Show last 5 seasons only
  const curYr=app.currentSeason||1989;
  const minYr=curYr-4;
  const hist=allHist.filter(h=>(h.yr||curYr)>=minYr);
  const displayHist=hist.length?hist:allHist.slice(-Math.min(80,allHist.length));
  const baseRef=isTeam?teamBaseTb(id):(()=>{const _bd=BASE_DRIVERS.find(d=>d.id===id);return _bd?(_bd.driverBonus||0):0;})();
  const accVals=displayHist.map(h=>h.v);
  const totalVals=displayHist.map(h=>h.v+baseRef);
  const allVals=[...accVals,...totalVals,baseRef,-0.5,0.5];
  const min=Math.min(...allVals),max=Math.max(...allVals);
  const range=max-min||1;
  const W=360,H=130,padL=44,padR=8,padT=10,padB=24;
  const plotW=W-padL-padR,plotH=H-padT-padB;
  const cx=(i)=>padL+((i/(displayHist.length-1||1))*plotW);
  const cy=(v)=>padT+((1-(v-min)/range)*plotH);
  const zero=cy(0),baseY=cy(baseRef);
  const lastTotal=totalVals[totalVals.length-1];
  const col=lastTotal>0?'#15803d':lastTotal<0?'#dc2626':'#6b7280';
  const yLabels=[[min,cy(min)],[0,cy(0)],[baseRef,baseY],[max,cy(max)]].filter((a,i,arr)=>i===0||Math.abs(a[1]-arr[i-1][1])>14);
  // Year boundary lines
  const yrBoundaries=[];
  let prevYr=null;
  displayHist.forEach((h,i)=>{const hy=h.yr||curYr;if(hy!==prevYr){if(prevYr!==null)yrBoundaries.push({i,yr:hy});prevYr=hy;}});
  const xLabels=[];
  if(displayHist.length>0){const h0=displayHist[0];xLabels.push({i:0,label:`'${String(h0.yr||curYr).slice(2)} R${h0.round}`});}
  yrBoundaries.forEach(({i,yr})=>xLabels.push({i,label:`'${String(yr).slice(2)}`}));
  if(displayHist.length>1){const hl=displayHist[displayHist.length-1];xLabels.push({i:displayHist.length-1,label:`R${hl.round}`});}
  const accPts=displayHist.map((h,i)=>`${cx(i).toFixed(1)},${cy(h.v).toFixed(1)}`).join(' ');
  const totalPts=displayHist.map((h,i)=>`${cx(i).toFixed(1)},${cy(h.v+baseRef).toFixed(1)}`).join(' ');
  return`<svg viewBox="0 0 ${W} ${H}" style="width:100%;height:${H}px;border:1px solid #e2e8f0;border-radius:4px;background:#fafcff">
    <line x1="${padL}" y1="${padT}" x2="${padL}" y2="${padT+plotH}" stroke="#cbd5e1" stroke-width="1"/>
    <line x1="${padL}" y1="${zero.toFixed(1)}" x2="${padL+plotW}" y2="${zero.toFixed(1)}" stroke="#e2e8f0" stroke-width="1" stroke-dasharray="3,3"/>
    <line x1="${padL}" y1="${baseY.toFixed(1)}" x2="${padL+plotW}" y2="${baseY.toFixed(1)}" stroke="#f59e0b" stroke-width="1" stroke-dasharray="4,3" opacity="0.7"/>
    <text x="${padL+plotW-2}" y="${(baseY-3).toFixed(1)}" text-anchor="end" font-size="7" fill="#f59e0b">base ${baseRef>=0?'+':''}${baseRef.toFixed(2)}</text>
    ${yrBoundaries.map(({i})=>`<line x1="${cx(i).toFixed(1)}" y1="${padT}" x2="${cx(i).toFixed(1)}" y2="${padT+plotH}" stroke="#e2e8f0" stroke-width="1" stroke-dasharray="2,2"/>`).join('')}
    ${yLabels.map(([v,yp])=>`<text x="${padL-3}" y="${(yp+3.5).toFixed(1)}" text-anchor="end" font-size="8" fill="#94a3b8">${v>=0?'+':''}${v.toFixed(2)}</text><line x1="${padL-2}" y1="${yp.toFixed(1)}" x2="${padL}" y2="${yp.toFixed(1)}" stroke="#cbd5e1" stroke-width="1"/>`).join('')}
    ${xLabels.map(({i,label})=>`<text x="${cx(i).toFixed(1)}" y="${H-4}" text-anchor="${i===0?'start':i===displayHist.length-1?'end':'middle'}" font-size="8" fill="#94a3b8">${escapeHtml(label)}</text>`).join('')}
    <polyline points="${accPts}" fill="none" stroke="#94a3b8" stroke-width="1.5" stroke-dasharray="4,2" opacity="0.6"/>
    <polyline points="${totalPts}" fill="none" stroke="${col}" stroke-width="2"/>
    ${displayHist.map((h,i)=>{const tip=`Rd ${h.round}, ${h.yr||curYr}: acc ${fmtBonus(h.v)} | total ${fmtBonus(h.v+baseRef)}`;return`<circle cx="${cx(i).toFixed(1)}" cy="${cy(h.v+baseRef).toFixed(1)}" r="3" fill="${col}" stroke="white" stroke-width="1"><title>${tip}</title></circle>`;}).join('')}
  </svg><div style="font-size:10px;color:#94a3b8;margin-top:2px">— Total &nbsp; <span style="opacity:0.6">- - Accumulated</span> &nbsp; <span style="color:#f59e0b">- - Base</span> &nbsp; Last 5 seasons</div>`;
}

// ── RANKINGS ─────────────────────────────────────────────────────────────
function rankingsData(){
  // All drivers: active (BASE_DRIVERS), retired, and available pool — anyone with history
  const _allDriverSources=[...BASE_DRIVERS];
  const _histDriverIds=new Set(app.history.weekends.flatMap(w=>[...w.qualifying.map(q=>q.id),...w.prequalifying.map(p=>p.id)]));
  (app._retiredDrivers||[]).forEach(rd=>{
    const _rdId=rd.id;  // permanent ID (dbKey was legacy, never set)
    if(!_rdId||_allDriverSources.some(d=>d.id===_rdId))return;
    const _dbE=DRIVER_DATABASE.find(d=>d.id===_rdId);
    _allDriverSources.push({
      id:_rdId,
      name:rd.lastName||rd.ln||_dbE?.ln||'',
      firstName:rd.firstName||rd.fn||_dbE?.fn||'',
      lastName:rd.lastName||rd.ln||_dbE?.ln||'',
      nation2:rd.nation2||rd.n2||_dbE?.n2||''
    });
  });  const drivers=_allDriverSources.filter(d=>_histDriverIds.has(d.id)).map(d=>{const c=driverCareer(d.id);const entryWeeks=app.history.weekends.filter(w=>w.qualifying.some(q=>q.id===d.id)||w.prequalifying.some(p=>p.id===d.id)||w.race.some(r=>r.id===d.id)).sort((a,b)=>a.raceMeta.year-b.raceMeta.year);const _dbE_enc=DRIVER_DATABASE.find(x=>x.id===d.id);const firstYear=entryWeeks.length?entryWeeks[0].raceMeta.year:(_dbE_enc?.firstYear||'—');const lastYear=d._retired?(entryWeeks.length?entryWeeks[entryWeeks.length-1].raceMeta.year:(_dbE_enc?.lastYear||null)):null;return{type:'Driver',id:d.id,name:d.name||d.lastName||'',fullName:driverFullName(d),code:d.nation2,firstYear,lastYear,entries:c.stats.entries,starts:c.stats.starts,poles:c.stats.poles,wins:c.stats.wins,podiums:c.stats.podiums,retirements:c.stats.retirements+c.stats.crashes,championshipPoints:c.stats.championshipPoints,championshipWins:c.stats.championshipWins};}).filter(d=>d.entries>0);
  // All teams: canonical names from BASE_DRIVERS PLUS all team names that appear in history (covers aliases and closed teams)
  // Include all teams that have ever raced, including defunct ones
  const _histTeams=new Set(app.history.weekends.flatMap(w=>[...w.race.map(r=>teamCanonicalName(r.team)),...w.qualifying.map(r=>teamCanonicalName(r.team))]));
  const _canonicalTeams=new Set([...BASE_DRIVERS.filter(d=>d.team&&d.team!=='Available').map(d=>d.team),..._histTeams].map(t=>teamCanonicalName(t)));
  app.history.weekends.forEach(w=>{
    [...w.qualifying.map(q=>q.team),...w.race.map(r=>r.team)].forEach(t=>{
      if(t&&t!=='Available'){
        // Resolve alias to canonical
        const canon=teamCanonicalName(t);
        _canonicalTeams.add(canon);
      }
    });
  });
  const teams=[..._canonicalTeams].sort().map(t=>{const c=teamCareer(t);const disp=teamDisplayName(t);const firstTeamEntry=app.history.weekends.filter(w=>w.qualifying.some(q=>teamCanonicalName(q.team)===t)||w.race.some(r=>teamCanonicalName(r.team)===t)).sort((a,b)=>a.raceMeta.year-b.raceMeta.year);const _tdE_enc=TEAMS_DATABASE.find(x=>teamCanonicalName(x.name)===t);const firstYear=firstTeamEntry.length?firstTeamEntry[0].raceMeta.year:(_tdE_enc?.firstYear||'—');const isTeamActive=BASE_DRIVERS.some(d=>teamCanonicalName(d.team)===t&&d.team!=='Available'&&!d._retired);const lastTeamYear=isTeamActive?null:(firstTeamEntry.length?firstTeamEntry[firstTeamEntry.length-1].raceMeta.year:null);return{type:'Team',lastYear:isTeamActive?null:lastTeamYear,name:disp,canonicalName:t,firstYear,entries:c.stats.entries,starts:c.stats.starts,poles:c.stats.poles,wins:c.stats.wins,podiums:c.stats.podiums,retirements:c.stats.retirements+c.stats.crashes,championshipPoints:c.stats.championshipPoints,championshipWins:c.stats.championshipWins};}).filter(t=>t.entries>0);
  return{drivers,teams};
}

    race:'<h4 style="margin:0 0 8px;color:var(--accent)">Race Rules</h4><ul style="margin:0;padding-left:18px"><li>Retirements triggered by same number ×3, then any subsequent same numbers by any driver</li><li>Retiring/crashing drivers placed at foot of classification</li><li><strong>Crashes (Lap 1 only):</strong> Same number ×2 by consecutive drivers, then a 5</li><li><strong>Crashes (Dry):</strong> Three or more consecutive rolls of 5 by different drivers</li><li><strong>Crashes (Rain):</strong> Lap 1 rules active for first 5 laps</li><li><strong>Crashes (Heavy Rain):</strong> Lap 1 rules active all 10 laps</li><li><strong>Pit Lane Drama:</strong> Driver rolls same number four laps in a row (laps 4–9) — lap score voided, team −0.05</li><li><strong>Tiebreaker:</strong> 1) Most 6s rolled, 2) Most 5s, 3) Higher grid position</li></ul>'
  };
  const html=rMap[sess]||rMap.race;
  const existing=document.getElementById('sessionRulesModal');if(existing)existing.remove();
  const modal=document.createElement('div');modal.id='sessionRulesModal';
  modal.style.cssText='position:fixed;inset:0;background:rgba(0,0,0,.55);z-index:9600;display:flex;align-items:center;justify-content:center;padding:16px';
  modal.innerHTML='<div style="background:white;border-radius:12px;max-width:500px;width:90%;box-shadow:0 8px 32px rgba(0,0,0,.25)"><div style="padding:12px 16px;background:var(--accent);border-radius:12px 12px 0 0;display:flex;justify-content:space-between;align-items:center"><strong style="color:white;font-size:14px">Session Rules</strong><button onclick="document.getElementById(\'sessionRulesModal\').remove()" style="background:transparent;border:1px solid rgba(255,255,255,.4);color:white;padding:3px 10px;border-radius:5px">×</button></div><div style="padding:14px 18px;font-size:13px;line-height:1.8">'+html+'</div></div>';
  document.body.appendChild(modal);
}

function buildWeekendChampionshipHtml(standings){
  const SKIP=new Set(['Available']);
  const preqSet=new Set((app.preqDriverIds||[]).map(id=>BASE_DRIVERS.find(d=>d.id===id)?.team).filter(Boolean));
  const ptsDrivers=standings.drivers.filter(d=>d.championshipPoints>0);
  const driverRows=ptsDrivers.length
    ?ptsDrivers.map((d,i)=>{const bd=BASE_DRIVERS.find(x=>x.id===d.id);return`<tr><td>${i+1}</td><td class="left">${driverLink(d.id,flagImg(d.nation2)+' '+escapeHtml(bd?driverFullName(bd):d.name),false)}</td><td>${d.championshipPoints}</td></tr>`;}).join('')
    :'<tr><td colspan="3" class="subtle">No points yet.</td></tr>';
  const ptsTeams=standings.teams.filter(t=>!SKIP.has(t.name)&&t.championshipPoints>0);
  const teamRows=ptsTeams.length
    ?ptsTeams.map((t,i)=>`<tr><td>${i+1}</td><td class="left">${teamLink(slugify(t.name),escapeHtml(t.name),false)}${preqSet.has(t.name)?'<span style="font-size:10px;color:var(--muted)"> (PQ)</span>':''}</td><td>${t.championshipPoints}</td></tr>`).join('')
    :'<tr><td colspan="3" class="subtle">No points yet.</td></tr>';
  return`<div class="panel"><h2>Championship</h2><div class="table-wrap"><table class="small-table"><thead><tr><th colspan="3">Drivers</th></tr></thead><tbody>${driverRows}</tbody></table><table class="small-table" style="margin-top:8px"><thead><tr><th colspan="3">Constructors</th></tr></thead><tbody>${teamRows}</tbody></table></div></div>`;
}

function buildSessionRowHtml(d,idx,viewSession,isPastView,currentDriver,preqTop6Ids,weekend){
  if(!d)return'';
  const pos=idx+1;
  const preqAdvN=seasonRules().preqAdvance||6;
  const raceFieldN=seasonRules().raceField||26;
  const isPreqQualifier=viewSession==='prequalifying'&&isPastView&&pos<=preqAdvN;
  const isPQMover=preqTop6Ids.includes(d.id)&&(viewSession==='qualifying'||(viewSession==='prequalifying'&&isPastView&&pos<=preqAdvN));
  const pqLabel=isPreqQualifier?'<span style="font-size:10px;color:#166534;font-weight:700"> (PQ)</span>':'';
  const pqBadge=isPQMover&&viewSession==='qualifying'?'<span style="font-size:10px;color:#166534;font-weight:700"> (PQ)</span>':'';
  const isDNQ=viewSession==='qualifying'&&isPastView&&pos>raceFieldN&&weekend&&(weekend._dnqIds||[]).includes(d.id);
  const dnqLabel=isDNQ?'<span style="font-size:10px;color:#dc2626;font-weight:700"> (DNQ)</span>':'';
  const trClass=[
    d.status!=='active'?d.status:'',
    !isPastView&&currentDriver&&currentDriver.id===d.id?'current-row':'',
    (viewSession==='prequalifying'&&pos<=preqAdvN&&isPastView)||
    (viewSession==='qualifying'&&pos===1)||
    (viewSession==='race'&&pos<=6)?'top6':''
  ].filter(Boolean).join(' ');
  const totalCell=d.status==='active'?String(Number(d.totalNumeric).toFixed(2)).replace(/\.00$/,''):escapeHtml(d.retirementReason||d.status||'');
  const lapCells=d.laps.map(v=>`<td class="lap" style="${v==='P'?'background:#fee2e2;color:#dc2626;font-weight:700':''}">${v==='P'?'<span title="Pit Lane Drama! Lap score voided.">P</span>':(v===''?'&nbsp;':escapeHtml(String(v)))}</td>`).join('');
  return`<tr class="${trClass}" id="drow-${d.id}"><td class="pos">${pos}</td><td class="driver left"><span class="driver-wrap">${flagImg(d.base.nation2)} ${driverLink(d.id,escapeHtml(driverShortName(d.base)),false)}${pqLabel}${pqBadge}${dnqLabel}</span></td><td class="team left">${teamLink(d.base.team,escapeHtml(teamDisplayName(d.base.team)),false)}</td>${viewSession==='race'?`<td class="grid">${d.gridPos}</td>`:''}<td class="bonus" title="${escapeHtml(d.bonusBreakdown+' | Acc.mod: '+(getDriverMod(d.id)>=0?'+':'')+getDriverMod(d.id).toFixed(2))}">${fmtBonus(d.bonus)}</td>${lapCells}<td class="total">${totalCell}</td>${viewSession==='race'?`<td class="points">${d.points||''}</td>`:''}</tr>`;
}

function renderWeekend(){
  const w=app.currentWeekend;if(!w){goHash('#start');return;}
  const sess=getCurrentSession(),isRace=w.session==='race';
  const currentDriver=(!w.weekendFinished&&w.slotPointer<w.order.length&&!w.pendingAdvance)?getSessionDriver(w.session,w.order[w.slotPointer]):null;
  const standings=seasonStandings(app.currentSeason||1989);
  const weather=w.raceMeta.weather||'dry'; // weather is rolled on newWeekend
  const wCls=weather==='heavy rain'?'vwet':weather==='rain'?'wet':'';
  const weatherTip={'dry':'Standard rules apply. Lap 1 crash logic (same/same/5) active on opening lap only.','rain':'RAIN: Lap 1 crash logic active for first 5 laps.','heavy rain':'HEAVY RAIN: Lap 1 crash logic active for all 10 laps.'};
  const wBadge=`<div class="pill" style="background:${weather==='heavy rain'?'#dbeafe':weather==='rain'?'#e0f2fe':'#f1f5f9'};border:2px solid ${weather==='heavy rain'?'#3b82f6':weather==='rain'?'#7dd3fc':'#cbd5e1'};font-weight:700;padding:6px 14px" title="${escapeHtml(weatherTip[weather]||'')}">${weatherIcon(weather)} ${weatherLabel(weather)}</div>`;
  // crash logic active state available via crashLogicActive(w) but not displayed as a box
  const crashNote='';
  // Pending banner - now clickable
  const pendingBanner=w.pendingAdvance?`<div class="session-banner clickable" onclick="advanceToPendingSessionWrapper()"><span>👉 Click to move to <strong>${w.pendingAdvance==='qualifying'?'Qualifying':'Race'}</strong></span><span style="font-size:12px;color:#6b7280">or press Next roll</span></div>`:'';
  const endBanner=w.pendingSeasonReturn?`<div class="session-banner clickable" onclick="app.currentWeekend._psrDismissed=true;goHash('#season-'+(app.currentSeason||1989))" style="background:#eefaf0;border-color:#86efac;cursor:pointer"><span>🏁 <strong>Click to end race weekend</strong></span><span style="font-size:12px;color:#166534">Return to Season</span></div>`:'';
  const seatFillBanner=(w._seatFillNews&&w._seatFillNews.length)?`<div class="session-banner" style="cursor:default;background:#eff6ff;border-color:#93c5fd"><span>👤 <strong>Driver changes:</strong> ${w._seatFillNews.join(' &nbsp;|&nbsp; ')}</span></div>`:'';
  // Pre-Q top 6 markers
  const preqTop6Ids=w.sessions.prequalifying.finishedOrder.slice(0,seasonRules().preqAdvance);
  // Session tabs for viewing previous sessions
  let tabsHtml='';
  if(w.session==='qualifying'||w.session==='race'){
    const mainLabel=w.session==='qualifying'?'Qualifying':'Race';
    tabsHtml=`<div class="tab-bar"><span class="tab ${w.viewTab==='preq'?'active':''}" onclick="setWeekendTab('preq')">Pre-Qualifying</span>${w.session==='race'?`<span class="tab ${w.viewTab==='quali'?'active':''}" onclick="setWeekendTab('quali')">Qualifying</span>`:''}<span class="tab ${!w.viewTab?'active':''}" id="tabMain" onclick="setWeekendTab('main')">${mainLabel}</span></div>`;
  }
  // Which session to display
  const viewSession=(w.viewTab==='preq')?'prequalifying':(w.viewTab==='quali'?'qualifying':w.session);
  const viewSess=w.sessions[viewSession];
  const viewDrivers=w.sessions[viewSession].finishedOrder.length>0?w.sessions[viewSession].finishedOrder.map((id,idx)=>({...w.sessions[viewSession].drivers.find(d=>d.id===id),_pos:idx+1})):currentDisplayRows().map((d,idx)=>({...d,_pos:idx+1}));
  // isPastView: true when viewing a prior session tab, OR when current session is complete (finishedOrder populated)
  const isPastView=viewSession!==w.session||(w.sessions[viewSession].finishedOrder.length>0);
  document.getElementById('routeWeekend').innerHTML=`
  <div class="card controls">
    <div class="control-group">
      <button onclick="processNextRollWrapper()" ${w.weekendFinished||w.pendingAdvance?'disabled':''} title="Shortcut: N">Next roll <span style="font-size:10px;opacity:.6">(n)</span></button>
      <button class="secondary" onclick="startAuto()" ${w.weekendFinished||w.autoTimer||w.pendingAdvance?'disabled':''}>Auto roll</button>
      <button class="ghost" onclick="stopAuto()" ${w.autoTimer?'':'disabled'}>Stop</button>
      <label for="speedSelect" style="margin-left:4px"><strong>Speed:</strong></label>
      <select id="speedSelect"><option value="1400">Slow</option><option value="800" selected>Med</option><option value="350">Fast</option></select>
      <button class="ghost" onclick="instantLapWrapper()" ${w.weekendFinished?'disabled':''} title="Shortcut: I">Instant lap <span style="font-size:10px;opacity:.6">(i)</span></button>
      <button class="ghost" onclick="instantResult()" ${w.weekendFinished||w.pendingSeasonReturn?'disabled':''}>Instant session <span style="font-size:10px;opacity:.6">(s)</span></button>
      <button class="ghost" onclick="saveWeekend()">Save</button>
      <button class="ghost" onclick="goHash('#season-'+(app.currentSeason||1989))">Season</button>
      ${w.weekendFinished&&w.session==='race'?`<button class="ghost" onclick="exportRollLog()" style="font-size:11px">📋 Export roll log</button><button class="ghost" onclick="exportModifierLog()" style="font-size:11px">📊 Export modifier log</button>`:''}
    </div>
  </div>
  ${seatFillBanner}${endBanner}${pendingBanner}
  <div class="card statusbar">
    <div class="pill ${w.session==='prequalifying'?'preq':w.session==='qualifying'?'quali':'race ${wCls}'}"><strong>${w.session==='prequalifying'?'Pre-Qualifying':w.session==='qualifying'?'Qualifying':'Race'}</strong></div>
    ${wBadge}
    <div class="pill"><strong>Lap:</strong> ${w.lap} / ${sess.lapLimit}</div>
    <div class="pill" style="padding:0;border:none;background:none"><button class="ghost" onclick="showSessionRules()" style="padding:6px 12px;font-size:14px">Rules</button></div>
    <div class="pill"><strong>Next:</strong> ${currentDriver?escapeHtml(currentDriver.base.name):'—'}</div>
    <div class="pill"><strong>Active:</strong> ${sess.drivers.filter(d=>d.status==='active').length}</div>
    ${crashNote}
  </div>
  <div class="layout">
    <div class="panel">
      ${tabsHtml}
      <h2>${escapeHtml(viewSess.header||w.sessions[viewSession].header)}</h2>
      <div class="table-wrap" id="raceTable" style="max-height:none;overflow-y:visible">
        <table><thead><tr>
          <th class="pos">Pos</th>
          <th class="driver left">Driver</th>
          <th class="team left">Team</th>
          ${viewSession==='race'?'<th class="grid">Grid</th>':''}
          <th class="bonus" title="Total of driver, team, grid position modifiers combined">Mod</th>
          ${Array.from({length:viewSess.lapLimit},(_,i)=>`<th class="lap">${i+1}</th>`).join('')}
          <th class="total">Total</th>
          ${viewSession==='race'?'<th class="points">Pts</th>':''}
        </tr></thead><tbody>
        ${(isPastView?w.sessions[viewSession].finishedOrder.map((id,idx)=>w.sessions[viewSession].drivers.find(d=>d.id===id)):currentDisplayRows()).map((d,idx)=>{
          const pos=idx+1;
          const _preqAdvN2=seasonRules().preqAdvance||6;
          const _raceFieldN2=seasonRules().raceField||26;
          const isPreqTop6=viewSession==='prequalifying'&&isPastView&&pos<=_preqAdvN2;
          const isPQMover=preqTop6Ids.includes(d.id)&&(viewSession==='qualifying'||(viewSession==='prequalifying'&&isPastView&&pos<=_preqAdvN2));
          const isPreqQualifier=viewSession==='prequalifying'&&isPastView&&pos<=_preqAdvN2;
          const isDNQRow=viewSession==='qualifying'&&isPastView&&pos>_raceFieldN2&&(w._dnqIds||[]).includes(d.id);
          const pqLabel=(isPreqQualifier||(isPQMover&&viewSession==='qualifying'))?'<span style="font-size:10px;color:#166534;font-weight:700"> (PQ)</span>':'';
          const dnqLabel=isDNQRow?'<span style="font-size:10px;color:#dc2626;font-weight:700"> (DNQ)</span>':'';
          const trClass=[
            d.status!=='active'?d.status:'',
            !isPastView&&currentDriver&&currentDriver.id===d.id?'current':'',
            isPreqTop6?'preq-advance':'',
            // Bold: PQ top-N (live or past), qualifying P1 (past), race top-6 (past)
            (viewSession==='prequalifying'&&pos<=_preqAdvN2)||
            (viewSession==='qualifying'&&pos===1)||
            (viewSession==='race'&&pos<=6)?'top6':''
          ].filter(Boolean).join(' ');
          const advancedTag=pqLabel+dnqLabel;
          return`<tr class="${trClass}" id="drow-${d.id}">
            <td class="pos">${pos}</td>
            <td class="driver left"><span class="driver-wrap">${flagImg(d.base.nation2)} ${driverLink(d.id,escapeHtml(driverShortName(d.base))+advancedTag,false)}</span></td>
            <td class="team left">${teamLink(d.base.team,escapeHtml(teamDisplayName(d.base.team)),false)}</td>
            ${viewSession==='race'?`<td class="grid">${d.gridPos}</td>`:''}
            <td class="bonus" title="${escapeHtml(d.bonusBreakdown)}">${fmtBonus(d.bonus)}</td>
            ${d.laps.map(v=>`<td class="lap" style="${v==='P'?'background:#fee2e2;color:#dc2626;font-weight:700':''}">` + (v==='P'?`<span title="Pit Lane Drama! Lap score voided.">P</span>`:(v===''?'&nbsp;':escapeHtml(String(v)))) + `</td>`).join('')}
            <td class="total">${d.status==='active'?Number(d.totalNumeric).toFixed(2).replace(/\.00$/,''):escapeHtml(d.status==='retired'?(d.retirementReason||'Retired'):'Crashed')}${d.status!=='active'&&(w.session==='qualifying'||w.session==='prequalifying')?` <span style="font-size:11px;color:var(--muted)">(${Number(d.totalNumeric).toFixed(2).replace(/\.00$/,'')})</span>`:''}</td>
            ${viewSession==='race'?`<td class="points">${d.points||''}</td>`:''}
          </tr>`;
        }).join('')}
        </tbody></table>
      </div>
    </div>
    <div style="display:grid;gap:12px;">
      <div class="panel" style="padding:0">
        <div style="display:flex;align-items:center;justify-content:space-between;padding:8px 14px 4px;border-bottom:1px solid var(--line)">
          <div style="display:flex;flex-direction:column;gap:2px">
            <h2 style="margin:0;padding:0;background:none;border:none;font-size:18px">Race Log</h2>

function setWeekendTab(tab){
  const w=app.currentWeekend;if(!w)return;
  w.viewTab=(tab==='main')?undefined:tab;
  render();
}

// ── RENDER: SEASON ────────────────────────────────────────────────────────
function renderSeason(hash){
  const y=Number(hash.replace('#season-',''))||1989;
  const st=seasonStandings(y),currentIdx=nextRoundIndex(),complete=st.roundsCompleted>=16;
  document.getElementById('routeSeason').innerHTML=`<div class="card"><a class="back-link" href="#start">← Home screen</a><h2 class="route-title">${y} season <button class="ghost" onclick="newWeekend()" style="font-size:12px;padding:4px 10px;margin-left:8px" ${currentSeasonEntries().length>=seasonRules().totalRounds?'disabled':''}>▶ Start next round</button></h2>
  <div class="metric-grid">
    <div class="metric"><div class="label">Rounds</div><div class="value">${st.roundsCompleted}/${st.totalRounds}</div></div>
    <div class="metric"><div class="label">Drivers' leader</div><div class="value">${(()=>{const _ld=st.drivers[0];if(!_ld)return'—';const _b=BASE_DRIVERS.find(d=>d.id===_ld.id);return (_b?flagImg(_b.nation2)+' ':'')+escapeHtml(_b?driverFullName(_b):_ld.name);})()}</div></div>
    <div class="metric"><div class="label">Constructors' leader</div><div class="value">${st.teams[0]?teamLink(st.teams[0].canonicalName||st.teams[0].name,escapeHtml(st.teams[0].displayName||teamDisplayName(st.teams[0].name)),true):'—'}</div></div>
  </div>
  <div class="two-col" style="margin-top:12px">
    <div class="panel"><h2>Drivers' Championship</h2><div class="table-wrap"><table class="small-table"><thead><tr><th>Pos</th><th>Driver</th><th>Starts</th><th>Points</th><th>Wins</th></tr></thead><tbody>
    ${(()=>{
      if(!st.drivers.length) return '<tr><td colspan="5">No standings yet.</td></tr>';
      // Assign positions: equal for zero-points drivers (all share same position number)
      const firstZeroIdx=st.drivers.findIndex(d=>d.championshipPoints===0);
      const zeroPos=firstZeroIdx>=0?firstZeroIdx+1:null;
      return st.drivers.map((d,i)=>{
        const bd=BASE_DRIVERS.find(x=>x.id===d.id);
        const isZero=d.championshipPoints===0;
        const posStr=isZero?`=${zeroPos}`:String(i+1);
        // Reconstruct full name even when driver is no longer in BASE_DRIVERS (fired/retired mid-season)
        let _dName;
        if(bd) _dName=driverFullName(bd);
        else if(d.firstName&&d.lastName) _dName=d.firstName+' '+d.lastName;
        else{
          const _ret=app._retiredDrivers?.find(x=>x.id===d.id||x.dbKey===d.id);
          const _dbE=DRIVER_DATABASE.find(x=>x.id===d.id);
          _dName=_ret?(((_ret.firstName||_ret.fn||'')+' '+(_ret.lastName||_ret.ln||_ret.name||'')).trim()):_dbE?((_dbE.fn||'')+' '+(_dbE.ln||'')).trim():d.name;
        }
        return`<tr><td>${posStr}</td><td class="left">${driverLink(d.id,flagImg(d.nation2)+' '+escapeHtml(_dName||d.name),true)}</td><td>${d.starts||0}</td><td>${d.championshipPoints}</td><td>${d.wins||0}</td></tr>`;
      }).join('');
    })()}
    </tbody></table></div></div>
    <div class="panel"><h2>Constructors' Championship</h2><div class="table-wrap"><table class="small-table"><thead><tr><th>Pos</th><th>Team</th><th>Starts</th><th>Points</th><th>Wins</th><th>Podiums</th></tr></thead><tbody>
    ${(()=>{
      const _SK=new Set(['Available']);

// ── RENDER: PROFILE ───────────────────────────────────────────────────────
function buildDriverRaceResultsHtml(c,selectedYear){
  if(!c.races||!c.races.length)return'<div class="panel"><h2>Race results</h2><p class="subtle" style="padding:8px">No race history recorded yet.</p></div>';
  const allYears=[...new Set(c.races.filter(e=>e&&e.meta).map(e=>e.meta.year))].sort((a,b)=>a-b);
  const selYr=selectedYear&&allYears.includes(selectedYear)?selectedYear:allYears[allYears.length-1];
  const yearBtns=allYears.map(y=>`<button onclick="_profileRaceYear=${y};renderProfile(window.location.hash)" style="padding:3px 8px;font-size:11px;font-weight:${y===selYr?700:400};color:${y===selYr?'var(--accent)':'var(--muted)'};background:none;border:none;border-bottom:${y===selYr?'2px solid var(--accent)':'2px solid transparent'};cursor:pointer">${y}</button>`).join('');
  const rows=c.races.filter(e=>e&&e.meta&&e.meta.year===selYr).map(entry=>{
    if(!entry||!entry.meta)return'';
    const q=entry.quali,pq=entry.preq,r=entry.race;
    const dnpq=pq&&!pq.advanced&&!q; // was in PQ but didn't advance
    const dnq=!r&&q&&!q.retired;     // qualified but didn't make race grid (1991: pos 27-30)
    const preqCell=pq?(pq.retired?'<span style="color:#dc2626">X</span>':pq.advanced?`P${pq.position||'?'}`:`<span style="color:#dc2626">P${pq.position||'?'}</span>`):'\u2014';
    const qualiCell=dnpq?'<span style="color:#dc2626">DNPQ</span>':q?(q.retired?'<span style="color:#dc2626">X</span>':`P${q.position||'?'}`):(pq&&!pq.advanced?'<span style="color:#dc2626">DNPQ</span>':'\u2014');
    const finishCell=r?`P${r.position}`:dnq?'<span style="color:#dc2626">DNQ</span>':dnpq?'<span style="color:#dc2626">DNPQ</span>':'\u2014';
    const statusCell=r?(r.status==='active'?'Finished':r.status==='crashed'?'Crashed':r.retirementReason||r.status||''):'\u2014';
    const ptsCell=r&&r.points>0?String(r.points):'';
    const gpShort=entry.meta.country||(entry.meta.gp||'').replace(/ Grand Prix$/,'').replace(/^.* /,'');
    return'<tr><td>'+entry.meta.round+'</td><td class="left">'+raceLink(weekendKey(entry.meta),escapeHtml(gpShort),true)+'</td><td>'+preqCell+'</td><td>'+qualiCell+'</td><td>'+finishCell+'</td><td class="left" style="font-size:11px">'+statusCell+'</td><td>'+ptsCell+'</td></tr>';
  }).join('');
  return'<div class="panel"><h2>Race results</h2><div style="margin-bottom:6px">'+yearBtns+'</div><div class="table-wrap"><table class="small-table"><thead><tr><th>Rd</th><th>GP</th><th>Pre-Q</th><th>Q</th><th>Finish</th><th>Status</th><th>Points</th></tr></thead><tbody>'+rows+'</tbody></table></div></div>';
}

function buildDriverSeasonSummaryHtml(c){
  if(!c.seasons||!c.seasons.length)return'<div class="panel" style="margin-top:12px"><h2>Season summary</h2><p class="subtle" style="padding:8px">No data yet.</p></div>';
  const rows=[...c.seasons].reverse().filter(s=>s.races&&s.races.length>0).map(s=>{
    const sr=s.races.map(x=>x.race).filter(Boolean);
    const sq=s.races.map(x=>x.quali).filter(Boolean);
    const entries=s.races.filter(r=>r.preq||r.quali).length;
    if(!entries&&!sr.length)return null; // skip years with no actual entries
    // Championship position
    const st=seasonStandings(s.year);
    const driverPos=st.drivers.findIndex(d=>d.id===c.base?.id)+1;
    const totalStarters=st.drivers.filter(d=>d.starts>0).length;
    const posStr=sr.length>0?(driverPos>0?`${driverPos}/${totalStarters}`:'—'):'N/A';
    return'<tr><td>'+s.year+'</td><td>'+entries+'</td><td>'+sr.length+'</td><td>'+sq.filter(q=>q.pole).length+'</td><td>'+sr.filter(r=>r.position===1).length+'</td><td>'+sr.filter(r=>r.position<=3).length+'</td><td>'+s.championshipPoints+'</td><td>'+posStr+'</td></tr>';
  });
  const filteredRows=rows.filter(Boolean);
  return'<div class="panel" style="margin-top:12px"><h2>Season summary</h2><div class="table-wrap"><table class="small-table"><thead><tr><th>Year</th><th>Entries</th><th>Starts</th><th>Poles</th><th>Wins</th><th>Podiums</th><th>Points</th><th>Position</th></tr></thead><tbody>'+(filteredRows.join('')||'<tr><td colspan="8" class="subtle">No data yet.</td></tr>')+'</tbody></table></div></div>';
}

function buildTeamSeasonRows(seasons){
  if(!seasons||!seasons.length)return'<tr><td colspan="9">No data.</td></tr>';
  return [...seasons].reverse().map(s=>{
    const sq=s.races.flatMap(x=>x.quali),sr=s.races.flatMap(x=>x.race);
    const posStr=s.teamPos?(s.teamPos+'/'+(s.totalTeams||'?')):'—';
    const dLinks=s.drivers.map(nm=>{
      const bd=BASE_DRIVERS.find(d=>d.name===nm||driverFullName(d)===nm);
      return bd?`<a class="profile-link" href="#driver-${bd.id}" onclick="event.preventDefault();goHash('#driver-${bd.id}')">${escapeHtml(driverFullName(bd))}</a>`:escapeHtml(nm);
    }).join(', ')||'—';
    const yrLink='<a class="profile-link" href="#season-'+s.year+'" onclick="goHash(String.fromCharCode(35)+\'season-\'+s.year)">'+s.year+'</a>';
    return'<tr><td>'+yrLink+'</td><td>'+posStr+'</td><td>'+s.rounds+'/'+s.scheduled+'</td><td>'+sq.length+'</td><td>'+sq.filter(q=>q.pole).length+'</td><td>'+sr.filter(r=>r.position===1).length+'</td><td>'+sr.filter(r=>r.position<=3).length+'</td><td>'+s.championshipPoints+'</td></tr>';
  }).join('');
}

      ${(()=>{return c.seasons.filter(s=>{

    </div>
