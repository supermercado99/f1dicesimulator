// ── RENDER: ENCYCLOPEDIA ──────────────────────────────────────────────────
function renderEncyclopedia(){
  // Only include seasons that have actual race history (avoid showing cache from old games)
  const _allHistYears=[...new Set(app.history.weekends.map(w=>w.raceMeta.year))].sort((a,b)=>a-b);
  // Include current season even if no races yet (shows as "In progress"), but not others with 0 races
  const seasons=_allHistYears.length>0
    ? ([...new Set([..._allHistYears,(app.currentSeason||1989)])].sort((a,b)=>a-b))
    : [app.currentSeason||1989];
  const _baseIds=new Set(BASE_DRIVERS.map(d=>d.id));
  // Also track permanent IDs (pid) to catch FA pool entries that duplicate BASE_DRIVERS
  const _basePids=new Set(BASE_DRIVERS.map(d=>d.pid||d.id).filter(Boolean));
  const _seasonFADrivers=(app._seasonFAPool||[]).filter(f=>{
    if(!f.id)return false;
    if(_baseIds.has(f.id)||_basePids.has(f.id)||_basePids.has(f.pid))return false;
    if(!(f.firstName||f.fn))return false;
    return true;
  });
  // Track all IDs+pids already included to prevent any duplication
  const _includedIds=new Set([..._baseIds,..._basePids,..._seasonFADrivers.map(f=>f.id)]);
  const _dedupedFAs=(FREE_AGENTS||[]).filter(f=>{
    const fid=f.id||0; const fpid=f.pid||f.id||0;
    if(_includedIds.has(fid)||_includedIds.has(fpid))return false;
    _includedIds.add(fid); if(fpid)_includedIds.add(fpid);
    return true;
  });
  const _faObjs=_seasonFADrivers.map(f=>({...f,firstName:f.firstName||f.fn||'',lastName:f.lastName||f.ln||'',name:f.lastName||f.ln||'',team:'Available',nation2:f.nation2||f.n2||'',isFreeAgent:true}));
  // Include retired drivers (spliced from BASE_DRIVERS but recorded in _retiredDrivers)
  const _retiredObjs=(app._retiredDrivers||[]).map(r=>{
    const bd=BASE_DRIVERS.find(d=>d.id===r.id);if(bd)return null; // still in BASE_DRIVERS
    if(_includedIds.has(r.id))return null; // already included via FA pool
    _includedIds.add(r.id);
    // Reconstruct a minimal driver object for display
    const dbE=DRIVER_DATABASE.find(d=>d.id===r.id)||DRIVER_DATABASE.find(d=>d.pid===r.id);
    return{id:r.id,firstName:r.firstName||r.fn||dbE?.fn||'',lastName:r.lastName||r.ln||r.name||dbE?.ln||'',
      name:r.lastName||r.ln||r.name||dbE?.ln||'',nation2:r.nation2||dbE?.n2||'',
      team:'Available',_retired:true,_retiredSeason:r.season,dob:r.dob||dbE?.dob||0};
  }).filter(Boolean);
  const allDrivers=[...BASE_DRIVERS,..._dedupedFAs,..._faObjs,..._retiredObjs].sort((a,b)=>(a.name||'').localeCompare(b.name||''));
  // Include both current BASE_DRIVERS teams AND all historical teams from race history
  const _encHistTeams=new Set(app.history.weekends.flatMap(w=>[...w.qualifying.map(q=>teamCanonicalName(q.team)),...w.race.map(r=>teamCanonicalName(r.team))]));
  const teams=[...new Set([...BASE_DRIVERS.map(d=>d.team).filter(t=>t&&t!=='Available'),..._encHistTeams])].sort();
  const round=nextRoundIndex()+1;
  // Filter drivers
  const statusFilter=encFilter.status||'active';
  const filteredDrivers=allDrivers.filter(d=>{
    if(statusFilter==='all')return true;
    const injured=app.driverInjuries&&app.driverInjuries[d.id]&&isDriverInjured(d.id,round);
    if(statusFilter==='active')return d.team!=='Available'&&!d._retired;
    if(statusFilter==='free')return d.team==='Available'&&!d._retired;
    if(statusFilter==='inactive'){
      if(d.type==='Team'){
        const canon=teamCanonicalName(d.name);
        const isActive=BASE_DRIVERS.some(x=>teamCanonicalName(x.team)===canon&&x.team!=='Available'&&!x._retired);
        const hasHistory=app.history.weekends.some(w=>w.race&&w.race.some(r=>teamCanonicalName(r.team)===canon));
        return !isActive&&hasHistory;
      }
      return d._retired===true;
    }
    return true;
  });
  document.getElementById('routeEncyclopedia').innerHTML=`<div class="card"><a class="back-link" href="#start">← Home screen</a><h2 class="route-title">Encyclopedia</h2>
  <div class="three-col">
    <div>
      <h3>Drivers</h3>
      <div class="filter-bar">
        <button class="filter-btn ${statusFilter==='active'?'active':''}" onclick="setEncFilter('active')">Active</button>
        <button class="filter-btn ${statusFilter==='free'?'active':''}" onclick="setEncFilter('free')">Available</button>
        <button class="filter-btn ${statusFilter==='inactive'?'active':''}" onclick="setEncFilter('inactive')">Retired</button>
        <button class="filter-btn ${statusFilter==='all'?'active':''}" onclick="setEncFilter('all')">All</button>
      </div>
      ${filteredDrivers.map(d=>{
        const inj=app.driverInjuries&&app.driverInjuries[d.id]&&isDriverInjured(d.id,round);
        const injBadge=inj?'<span class="status-badge badge-inj">🚑 inj</span>':'';const tempBadge=d._temp?'<span class="status-badge" style="background:#dbeafe;color:#1e40af">Temp</span>':'';const badge=injBadge+tempBadge;
        const yrs=seasonsForEntity(d.id||d.name,'driver');
        // Hyperlink each year to the season page
        const isFreeAgentDriver=d.team==='Available'||(d.isFreeAgent&&!d._temp);
        const yrsLinked=yrs?compressYearsLinked(yrs):'';
        const yrsLabel=yrsLinked?` <span class="subtle" style="font-size:11px">(${yrsLinked})</span>`:'';
        return`<div style="margin-bottom:3px"><a class="profile-link" href="#driver-${d.id}" onclick="event.preventDefault();goHash('#driver-${d.id}')">${flagImg(d.nation2)} ${escapeHtml(driverFullName(d))}</a>${yrsLabel}${badge}</div>`;
      }).join('')}
    </div>
    <div>
            <h3>Teams <span class="subtle" style="font-size:11px">(click to view profile)</span>
        <span style="margin-left:8px">
          <button class="filter-btn ${(encFilter.teamStatus||'active')==='active'?'active':''}" onclick="encFilter.teamStatus='active';render()" style="font-size:11px;padding:2px 8px">Active</button>
          <button class="filter-btn ${(encFilter.teamStatus||'active')==='defunct'?'active':''}" onclick="encFilter.teamStatus='defunct';render()" style="font-size:11px;padding:2px 8px">Defunct</button>
          <button class="filter-btn ${(encFilter.teamStatus||'active')==='all'?'active':''}" onclick="encFilter.teamStatus='all';render()" style="font-size:11px;padding:2px 8px">All</button>
        </span>
      </h3>
      ${(()=>{const teamStatus=encFilter.teamStatus||'active';const activeTeamNames=new Set(BASE_DRIVERS.map(d=>d.team));const histTeamNames=new Set(app.history.weekends.flatMap(w=>[...w.qualifying.map(q=>teamCanonicalName(q.team)),...w.race.map(r=>teamCanonicalName(r.team))]));const activeTeamNamesCanon=new Set([...activeTeamNames].map(t=>teamCanonicalName(t)));const filtered=teams.filter(t=>{if(teamStatus==='all')return true;if(teamStatus==='active')return activeTeamNames.has(t);if(teamStatus==='defunct')return histTeamNames.has(teamCanonicalName(t))&&!activeTeamNamesCanon.has(teamCanonicalName(t));return true;});return [...filtered].sort((a,b)=>teamDisplayName(a).localeCompare(teamDisplayName(b))).map(t=>{const disp=teamDisplayName(t);const tYrs=seasonsForEntity(t,'team');const tYrsLinked=tYrs?compressYearsLinked(tYrs):'';const _tid=teamIdForName(t);const _th=_tid?`#team-${_tid}`:`#team-${slugify(t)}`;return`<div style="margin-bottom:3px"><a class="profile-link" href="${_th}" onclick="event.preventDefault();goHash('${_th}')">${escapeHtml(disp)}</a>${tYrsLinked?` <span class="subtle" style="font-size:11px">(${tYrsLinked})</span>`:''}</div>`;}).join('');})()}
    </div>
    <div>
      <h3>Seasons</h3>
      <table class="small-table" style="width:100%"><thead><tr><th>Year</th><th>Drivers' Champion</th><th>Constructors' Champion</th></tr></thead><tbody>
      ${seasons.map(y=>{const _yWeeks=app.history.weekends.filter(w=>w.raceMeta.year===y);const _complete=_yWeeks.length>0;const _st=_complete?seasonStandings(y):{drivers:[],teams:[],driverChampion:null,teamChampion:null};const _dc=_complete?(_st.driverChampion||(_st.drivers[0]?(_st.drivers[0].id?(()=>{const _bd=BASE_DRIVERS.find(d=>d.id===_st.drivers[0].id)||(app._retiredDrivers||[]).find(r=>r.id===_st.drivers[0].id);return _bd?(driverFullName(_bd)||_bd.name||''):_st.drivers[0].name;})():_st.drivers[0].name):'—')):'—';const _cc_name=_complete?(_st.teamChampion||_st.teams[0]?.name||null):null;const _cc_link=_cc_name?(teamLink(_cc_name,escapeHtml(teamDisplayName(_cc_name)),true)):null;const _cc=_cc_name?(_cc_link||escapeHtml(teamDisplayName(_cc_name))):'—';return _complete?`<tr><td><a class="profile-link" href="#season-${y}" onclick="event.preventDefault();goHash('#season-${y}')">${y}</a></td><td>${escapeHtml(_dc)}</td><td>${_cc}</td></tr>`:`<tr><td><a class="profile-link" href="#season-${y}" onclick="event.preventDefault();goHash('#season-${y}')">${y}</a></td><td colspan="2" class="subtle">In progress</td></tr>`;}).join('')}
      </tbody></table>
      
  </div></div>`;
}

function slotSummary(data){
  if(!data||!data.history) return null;
  const rounds=data.history.weekends.length;
  const season=data.currentSeason||1989;
  const lastRace=data.history.weekends[rounds-1];
  const lastGP=lastRace?lastRace.raceMeta.gp:'No races yet';
  const ts=data._savedAt?new Date(data._savedAt).toLocaleString('en-AU',{day:'2-digit',month:'2-digit',year:'2-digit',hour:'2-digit',minute:'2-digit'}):'Unknown';
  return{rounds,season,lastGP,ts};
}
function saveToSlot(slotIdx){
  const snapshot=JSON.parse(JSON.stringify(app));
  snapshot._savedAt=Date.now();
  localStorage.setItem(slotKey(null,slotIdx),JSON.stringify(snapshot));
}
function loadFromSlot(slotIdx){
  try{return JSON.parse(localStorage.getItem(slotKey(null,slotIdx))||'null');}catch(e){return null;}
}
function deleteSlot(slotIdx){localStorage.removeItem(slotKey(null,slotIdx));}
function saveAutosave(){

  if(!app.driverIncidents)app.driverIncidents={};
  if(!app._earlyCareerWinAwarded)app._earlyCareerWinAwarded={};
  if(!app._earlyCareerPodiumAwarded)app._earlyCareerPodiumAwarded={};

  if(!app._inexperienceTeams)app._inexperienceTeams={};
  if(!app._retiredDrivers)app._retiredDrivers=[];
  if(!app._qualiRetirementPenalty)app._qualiRetirementPenalty={};

}

function startNewGameWithSeason(year){
  // Remove all overlays regardless of exact style string
  document.querySelectorAll('[style*="position:fixed"]').forEach(el=>{if(el!==document.body)el.remove();});
  document.querySelectorAll('.splash-screen,.modal-overlay,.retro-modal-overlay').forEach(el=>el.remove());
  if(app.history&&app.history.weekends.length>0)saveAutosave();
  // Wipe ALL season saves from localStorage so no stale season can reload on refresh
  // Scan known season years plus any others stored under our key pattern
  const knownYears=[1989,1990,1991,1992,1993,1994,1995,1996,1997,1998,1999,2000,2001,2002,2003,2004,2005];
  knownYears.forEach(y=>{localStorage.removeItem(appKey(y));localStorage.removeItem(liveKey(y));});
  // Also scan all localStorage keys for our pattern (catches any unexpected years like 1996)
  Object.keys(localStorage).filter(k=>k.startsWith('f1dice_')&&k.endsWith('_app_v8')).forEach(k=>localStorage.removeItem(k));
  Object.keys(localStorage).filter(k=>k.startsWith('f1dice_')&&k.endsWith('_live_v8')).forEach(k=>localStorage.removeItem(k));
  // Reset lastSeason to the chosen year so refresh loads correctly
  localStorage.setItem('f1dice_lastSeason',String(year));
  // Rebuild season data
  BASE_DRIVERS=buildDrivers(year);
  FREE_AGENTS=buildFreeAgents(year);
  app=defaultApp(year);
  app._eos=null;
  _navHistory.length=0;
  invalidateStandingsCache();
  clearLive();
  saveApp();
  // Always re-render the start screen immediately
  hideAllRoutes();
  document.getElementById('routeStart').classList.remove('hidden');
  document.title='F1 Dice Simulator';
  renderStart();
  if(window.location.hash!=='#start')window.location.hash='#start';
}

// ── SEAT FILLING: ensure every team has its required number of drivers before each round ──
function ensureAllSeatsFilledBeforeWeekend(roundNum){
  initSeasonFAPool();
  // Required seat count is LOCKED to the number of contracted drivers each team
  // started the season with. This is stored once in app._initialTeamSizes.
  // Using live BASE_DRIVERS would give wrong counts after firings/quits set team='Available'.
  if(!app._initialTeamSizes){
    app._initialTeamSizes={};
    BASE_DRIVERS.filter(d=>d.team!=='Available'&&!d._retired&&!d._temp).forEach(d=>{
      app._initialTeamSizes[d.team]=(app._initialTeamSizes[d.team]||0)+1;
    });
  }
  const allTeams=[...new Set(BASE_DRIVERS.filter(d=>d.team!=='Available'&&!d._retired).map(d=>d.team))];
  const seatNews=[];
  allTeams.forEach(team=>{
    const required=app._initialTeamSizes[team]||0;
    if(!required)return;
    const activeContracted=BASE_DRIVERS.filter(d=>d.team===team&&!d._retired&&!d._temp&&!isDriverInjured(d.id,roundNum));
    const activeTemps=BASE_DRIVERS.filter(d=>d.team===team&&d._temp&&!isDriverInjured(d.id,roundNum));
    const covered=activeContracted.length+activeTemps.length;
    if(covered<required){
      const missing=required-covered;
      const allContracted=BASE_DRIVERS.filter(d=>d.team===team&&!d._retired&&!d._temp);
      const outContracted=allContracted.filter(d=>isDriverInjured(d.id,roundNum));
      const outNames=outContracted.map(d=>{
        const inj=app.driverInjuries?.[d.id];
        return `${d.name} [${inj?.cause==='suspension'?'suspended':`injured: ${inj?.impact||'unknown'}`}]`;
      });
      // Vacant seats (fired/quit) = missing minus known injured
      const vacancies=missing-outContracted.length;
      const vacancyStr=vacancies>0?` + ${vacancies} vacancy(fired/quit)`:'';
      // debugMsg removed: seat gap info logged internally only
      for(let i=0;i<missing;i++){
        const taken=BASE_DRIVERS.map(d=>d.id);
        const repl=findReplacement(team,taken,false);
        const replacingDriver=outContracted[i]||null;
        const inj=replacingDriver&&app.driverInjuries?.[replacingDriver.id];
        let racesLeft;
        if(inj){
          // Temp covers for the remaining injury duration
          if(inj.missRaces==='season'||inj.missRaces==='career') racesLeft=999;
          else racesLeft=Math.max(1,(inj.fromRound+Number(inj.missRaces))-roundNum+1);
        } else {
          racesLeft=999; // fired/quit vacancy — replacement stays rest of season
        }
        const durationStr=racesLeft>=999?'rest of season':`${racesLeft} round${racesLeft===1?'':'s'}`;
        if(repl){
          hireReplacement(repl,team,racesLeft,replacingDriver?replacingDriver.id:null);
          const replName=((repl.fn||repl.firstName||'')+' '+(repl.ln||repl.lastName||'')).trim();
          const forStr=replacingDriver?`, covering ${replacingDriver.name}`:'';
          seatNews.push(`<strong>${escapeHtml(team)}</strong>: <strong>${escapeHtml(replName)}</strong> fills vacant seat${forStr} for ${durationStr}.`);
          // seat filled — banner shown in weekend view
        } else {
          const reason=inj?(inj.cause==='suspension'?'suspension':`injury (${inj.impact||'unknown'})`):'vacancy';
          seatNews.push(`⚠ <strong>${escapeHtml(team)}</strong> — no available driver to fill seat due to ${reason}.`);
          // seat unfilled — pool exhausted
        }
      }
    }
  });
  return seatNews;
}

function newWeekend(){
  const idx=nextRoundIndex();
  if(idx>=16){
    // Season complete - show end-of-season news if not yet shown
    const endKey='season-end-'+app.currentSeason;
    if(!app.news||!app.news.some(n=>n.id===endKey)){
      expireSeasonEndInexperience();
  const endNews=buildSeasonEndNews(app.currentSeason);
      pushNews(endNews);
      saveApp();
      requestAnimationFrame(()=>showNewsModal(endNews));
    } else {
      alert('Season complete.');
    }
    return;
  }
  stopAuto(true);
  // Clear any lingering end-of-race state before creating the new weekend
  if(app.currentWeekend){app.currentWeekend.pendingSeasonReturn=false;app.currentWeekend._psrDismissed=true;}
  // Ensure all team seats are filled before creating the weekend
  const nextRound=(seasonCalendar()[idx]||{}).round||idx+1;
  const _seatNews=ensureAllSeatsFilledBeforeWeekend(nextRound);
  app.currentWeekend=createWeekend(idx);
  if(app.currentWeekend){
    app.currentWeekend.rollSequence=0;
    // Attach seat-fill news to weekend so it appears in team news post-race if needed
    if(_seatNews.length) app.currentWeekend._seatFillNews=_seatNews;
    const _wr=rollWeather();
    app.currentWeekend.raceMeta.weather=_wr;
    if(_wr==='rain'||_wr==='heavy rain'){
      requestAnimationFrame(()=>showWeatherWarning(_wr));
    }
  }
  // Show season-start news on round 1
  if(idx===0){
    const startKey='season-start-'+app.currentSeason;
    if(!app.news||!app.news.some(n=>n.id===startKey)){
      const startNews=buildSeasonStartNews(app.currentSeason);
      pushNews(startNews);
      saveApp();
      requestAnimationFrame(()=>showNewsModal(startNews));
    }
  }
  saveApp();saveLive();goHash('#weekend');
}

function rollManualDie(){
  const inp=document.getElementById('manualDieInput');
  const val=inp?inp.value.trim():'';
  const die=parseInt(val);
  if(!isNaN(die)&&die>=1&&die<=6){
    const orig=Math.random;
    Math.random=()=>(die-1)/6+0.001;
    processNextRollWrapper();
    Math.random=orig;
    if(inp)inp.value='';
  } else {
    processNextRollWrapper();
  }

function exportRollLog(){
  const w=app.currentWeekend;
  if(!w)return;
  const meta=w.raceMeta;
  const lines=[`F1 Dice Simulator — Roll Log`,`${meta.year} ${meta.gp} at ${meta.track}`,``];
  const sessions=[
    {name:'Pre-Qualifying',key:'prequalifying',laps:seasonRules().preqLaps},
    {name:'Qualifying',key:'qualifying',laps:seasonRules().qualiLaps},
    {name:'Race',key:'race',laps:seasonRules().raceLaps},
  ];
  sessions.forEach(({name,key,laps})=>{
    const sess=w.sessions[key];
    if(!sess||!sess.drivers||!sess.drivers.length)return;
    lines.push(`--- ${name} ---`);
    const header=['Pos','Driver','Team','Modifier',...Array.from({length:laps},(_,i)=>`L${i+1}`),'Total','Status'];
    lines.push(header.join('\t'));
    const ordered=sess.finishedOrder.length?sess.finishedOrder.map((id,i)=>({...sess.drivers.find(d=>d.id===id),_pos:i+1})):sess.drivers.map((d,i)=>({...d,_pos:i+1}));
    ordered.forEach(d=>{
      if(!d)return;
      const nm=driverFullName(d.base)||d.base.name;
      const row=[d._pos,nm,d.base.team,Number(d.bonus).toFixed(2),...d.laps.map(v=>v===''?'—':v),Number(d.totalNumeric).toFixed(2),d.status==='active'?'Finished':(d.retirementReason||d.status)];
      lines.push(row.join('\t'));
    });
    lines.push(``);
  });
  // Race log entries
  lines.push(`--- Roll-by-roll log ---`);
  const logEntries=[...(w.log||[])].reverse();
  logEntries.forEach(entry=>{
    const txt=(entry.html||entry).replace(/<[^>]+>/g,'').replace(/&lt;/g,'<').replace(/&gt;/g,'>').replace(/&amp;/g,'&').replace(/&nbsp;/g,' ').replace(/\s+/g,' ').trim();
    if(txt)lines.push(txt);
  });
  const blob=new Blob([lines.join('\n')],{type:'text/plain;charset=utf-8'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');
  a.href=url;
  a.download=`F1Dice_RollLog_${meta.year}_R${meta.round}_${(meta.gp||'GP').replace(/\s+/g,'_')}.txt`;
  a.click();
  URL.revokeObjectURL(url);
}

    `Season: ${app.currentSeason||1989}  Rounds completed: ${app.history.weekends.length}`,
    `Exported: ${new Date().toLocaleString()}`,
    '',
    'Round\tGP\tSession\tKind\tName\tDelta\tNow (acc.)\tReason',
  ];
  // Also include current weekend if in progress
  const allWeekends=[...app.history.weekends];
  if(app.currentWeekend&&(app.currentWeekend._raceEventMods||[]).length)allWeekends.push(app.currentWeekend);
  allWeekends.forEach(w=>{
    const mods=w._raceEventMods||[];
    if(!mods.length)return;
    const gp=w.raceMeta?.gp||'?';
    const round=w.raceMeta?.round||'?';
    mods.forEach(m=>{
      const accNow=m.kind==='driver'?(getDriverMod(m.id)||0):(getTeamMod(m.name)||0);
      lines.push([
        `R${round}`,escapeHtml(gp).replace(/&amp;/g,'&'),
        m.session||'race',m.kind,
        m.name,
        (m.delta>=0?'+':'')+m.delta.toFixed(2),
        (accNow>=0?'+':'')+accNow.toFixed(2),
        m.reason||'',
      ].join('\t'));
    });
  });
  const blob=new Blob([lines.join('\n')],{type:'text/plain;charset=utf-8'});
  const a=document.createElement('a');a.href=URL.createObjectURL(blob);
  a.download=`F1Dice_ModifierLog_${app.currentSeason||1989}.txt`;a.click();
}
window.exportModifierLog=exportModifierLog;

// ── Export end-of-season state for single-season prototype ──────────────────
function exportEndOfSeasonData(){
  const yr=app.currentSeason||1989;
  const st=seasonStandings(yr);

  // Build team list
  const teams=BASE_DRIVERS.filter(d=>d.team&&d.team!=='Available'&&!d._retired&&!d._temp)
    .reduce((acc,d)=>{
      if(!acc.find(t=>t.name===d.team)){
        const teamMod=getTeamMod(d.team);
        const tb=d.teamBonus||0;
        // Get standings data
        const stTeam=st.teams.find(t=>teamCanonicalName(t.name)===d.team)||{};
        const isPQ=(app.preqDriverIds||[]).some(id=>BASE_DRIVERS.find(x=>x.id===id)?.team===d.team);
        const rules=seasonRules(yr);
        acc.push({
          id: (TEAMS_DATABASE.find(t=>teamCanonicalName(t.name)===teamCanonicalName(d.team))?.id)||(20000+acc.length),
          name: d.team,
          disp: teamDisplayName(d.team),
          tb, acc:teamMod,
          pq: isPQ,
          starts: stTeam.starts||0,
          pts: stTeam.championshipPoints||0,
          dnpq:0, dnq:0, // not tracked per-team in current version
          isNew: false,
          nextAlias: seasonData(yr).teamAliases?.[d.team]||null,
        });
      }
      return acc;
    },[]);

  // Build driver list (contracted + available pool)
  const stDriverMap={};
  st.drivers.forEach(d=>{stDriverMap[d.id]=d;});
  const contracted=BASE_DRIVERS.filter(d=>d.team&&d.team!=='Available'&&!d._retired&&!d._temp).map(d=>{
    const dMod=getDriverMod(d.id);
    const sd=stDriverMap[d.id]||{};
    return{
      id:d.id, simId:'d_'+d.id, name:driverFullName(d), nat:d.nationality,
      team: d.team, // canonical team name
      dob: d.dob||1960, db: d.driverBonus||0, acc: dMod,
      fa:0, wins:sd.wins||0, pods:sd.podiums||0, poles:sd.poles||0,
      dnpq:0, dnq:0, retired:false,
    };
  });
  const available=(app._seasonFAPool||[]).filter(f=>f.id&&(f.firstName||f.fn)).map(f=>{
    const dMod=getDriverMod(f.id);
    return{
      id:f.id, simId:'fa_'+f.id, name:(f.firstName||f.fn)+' '+(f.lastName||f.ln),
      nat:f.nationality||f.nat||'', team:null,
      dob:f.dob||1960, db:f.driverBonus||f.db||0, acc:dMod,
      fa:0, wins:0, pods:0, poles:0, dnpq:0, dnq:0, retired:false,
    };
  });
  // Retired drivers from this season
  const retired=(app._retiredDrivers||[]).map(r=>({
    id:r.dbKey, simId:'ret_'+r.dbKey, name:(r.firstName||'')+' '+(r.lastName||r.ln||''),
    nat:'', team:null, dob:1960, db:0, acc:0, fa:0,
    wins:0,pods:0,poles:0,dnpq:0,dnq:0, retired:true,
  }));

  // Rivalry data
  const rivalries=[];
  Object.entries(app.rivalries||{}).forEach(([key,r])=>{
    if(!r||!r.level)return;
    const [a,b]=key.split('|');
    const da=BASE_DRIVERS.find(d=>d.id===Number(a));
    const db2=BASE_DRIVERS.find(d=>d.id===Number(b));
    if(da&&db2)rivalries.push({a:'d_'+a,b:'d_'+b,level:r.hatred?'Hatred':r.level,
      driverA:driverFullName(da),driverB:driverFullName(db2)});
  });

  const exportObj={
    exportedAt: new Date().toISOString(),
    season: yr,
    seasonLabel: `${yr} end-of-season`,
    minTeams: seasonRules(yr).minTeams||16,
    maxTeams: seasonRules(yr).maxTeams||17,
    targetTeams: seasonRules(yr).targetTeams||16,
    teams, drivers:[...contracted,...available,...retired],
    rivalries,
    roundsCompleted: currentSeasonEntries().length,
    totalRounds: seasonRules(yr).totalRounds||16,
  };

  const blob=new Blob([JSON.stringify(exportObj,null,2)],{type:'application/json'});
  const a=document.createElement('a');a.href=URL.createObjectURL(blob);
  a.download=`f1dice_endofseason_${yr}.json`;a.click();
}
window.exportEndOfSeasonData=exportEndOfSeasonData;
document.addEventListener('keydown',e=>{
  if(e.target.tagName==='INPUT'||e.target.tagName==='TEXTAREA'||e.target.tagName==='SELECT')return;
  const w=app.currentWeekend;
  if(!w)return;
  if((e.key==='n'||e.key==='N')&&!w.weekendFinished&&!w.pendingSeasonReturn){e.preventDefault();processNextRollWrapper();}
  else if((e.key==='i'||e.key==='I')&&!w.weekendFinished&&!w.pendingSeasonReturn){e.preventDefault();instantLapWrapper();}
  else if((e.key==='s'||e.key==='S')&&!w.weekendFinished&&!w.pendingSeasonReturn){e.preventDefault();instantResult();}
});
</script>
