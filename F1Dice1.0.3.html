// ── Compute PQ teams for next season after Stage 3 ────────────────────────
function eosComputeNextPQTeams(){
  const eos=app._eos;if(!eos)return[];
  const gameStartYr=app.history.weekends.length>0?Math.min(...app.history.weekends.map(w=>w.raceMeta.year)):eos.year;
  if(gameStartYr>1989)return[]; // 1991-start uses fixed PQ from season data
  const closedSet=new Set(eos.closures.map(t=>teamCanonicalName(t)));
  const newTeams=(eos.confirmedNewTeams||[]).map(t=>teamCanonicalName(t)).filter(t=>!closedSet.has(t));
  // All active teams after closures + new entries
  const activeCurrent=[...new Set(BASE_DRIVERS.filter(d=>d.team!=='Available'&&!d._retired&&!d._temp).map(d=>d.team))]
    .filter(t=>!closedSet.has(teamCanonicalName(t))).map(t=>teamCanonicalName(t));
  const totalTeams=activeCurrent.length+newTeams.filter(t=>!activeCurrent.includes(t)).length;
  // PQ_SLOTS: totalTeams - 13 (auto-qualifying teams), minimum 1
  // 13 auto-qualifying teams × 2 drivers = 26 auto-qualifiers
  const AUTO_Q_TEAMS=13;
  const PQ_SLOTS=Math.max(1,totalTeams-AUTO_Q_TEAMS);
  // New entry teams fill slots first (they always PQ)
  const pqTeams=newTeams.map(t=>teamCanonicalName(t));
  const slotsRemaining=Math.max(0,PQ_SLOTS-pqTeams.length);
  if(slotsRemaining<=0)return pqTeams;
  // Current PQ teams (from preqDriverIds)
  const currentPQTeams=new Set([...(app.preqDriverIds||[])].map(id=>teamCanonicalName(BASE_DRIVERS.find(d=>d.id===id)?.team||'')).filter(Boolean));
  // Standings from this season
  const st=eos._standingsCache;
  // Build scored list for remaining slots, sorted by PQ priority:
  // 1. Championship points (ascending — lowest first)
  // 2. Tiebreaker 1: already in PQ this season (true = higher priority)
  // 3. Tiebreaker 2: fewer race starts (fewer = higher priority)
  const candidates=activeCurrent.filter(t=>!pqTeams.includes(t));
  const stTeamsMap=new Map((st.teams||[]).map(t=>[teamCanonicalName(t.name),t]));
  const startsByTeam=new Map();
  app.history.weekends.filter(w=>w.raceMeta.year===eos.year).forEach(w=>{
    w.race.forEach(r=>{const c=teamCanonicalName(r.team);startsByTeam.set(c,(startsByTeam.get(c)||0)+1);});
  });
  const scored=candidates.map(t=>{
    const stT=stTeamsMap.get(t);
    const pts=stT?.championshipPoints??999; // unranked teams treated as 0 pts
    const isCurrentPQ=currentPQTeams.has(t)?1:0;
    const starts=startsByTeam.get(t)||0;
    return{t,pts:stT?pts:0,isCurrentPQ,starts};
  }).sort((a,b)=>{
    if(a.pts!==b.pts)return a.pts-b.pts; // lowest pts first
    if(a.isCurrentPQ!==b.isCurrentPQ)return b.isCurrentPQ-a.isCurrentPQ; // current PQ first
    return a.starts-b.starts; // fewer starts first
  });
  for(const s of scored){
    if(pqTeams.length>=PQ_SLOTS)break;
    pqTeams.push(s.t);
  }
  return pqTeams;
}

window.eosConfirmTeamChanges=function(){
  const eos=app._eos;
  if(!eos||eos.stagesDone.has(3))return;
  eos.closures.forEach(t=>eosLog(`CLOSED: ${t}`,3));
  eosGetRenames().forEach(r=>eosLog(`RENAME: ${r.from} → ${r.to}`,3));
  (eos.confirmedNewTeams||[]).forEach(t=>eosLog(`NEW ENTRY: ${t}`,3));
  try{
    eos._nextPQTeams=eosComputeNextPQTeams();
    eos._nextPQTeams.forEach(t=>eosLog(`PQ for ${eos.nextYear}: ${teamDisplayName(t)}`,3));
  }catch(e){console.error('eosComputeNextPQTeams:',e);eos._nextPQTeams=[];}
  eos.closuresConfirmed=true;
  eosNextStage();
};

// ── Stage 4: Driver Movements ──────────────────────────────────────
function eosComputeMovements(){
  const eos=app._eos;if(!eos||eos.movements!==null)return;
  eos.movements=[];
  const closedTeams=new Set(eos.closures);
  const retiringIds=new Set(eos.retirements.filter(r=>!r.override).map(r=>r.d.id));
  const activeTeams=[...new Set(BASE_DRIVERS.filter(d=>d.team!=='Available'&&!d._retired&&!d._temp).map(d=>d.team))].filter(t=>!closedTeams.has(t));
  const activeDrivers=BASE_DRIVERS.filter(d=>d.team!=='Available'&&!d._retired&&!d._temp&&!retiringIds.has(d.id)&&!closedTeams.has(d.team));
  const teamTtm=t=>(teamBaseTb(t)||0)+(getTeamMod(t)||0);
  const driverDtm=d=>(d.driverBonus||0)+(getDriverMod(d.id)||0);
  const activeTeamsSorted=[...activeTeams].sort((a,b)=>teamTtm(b)-teamTtm(a));

  // ── Pass 1: driver-side releases and voluntary departures ──────────
  // alreadyMovingIds must be declared before Pass 1 since Pass 1 references it
  // It starts empty and grows as movements are added during Pass 1 and Pass 2
  const alreadyMovingIds=new Set();
  activeDrivers.forEach(d=>{
    const team=d.team;
    const dtm=driverDtm(d);
    const ttm=teamTtm(team);
    const teammates=activeDrivers.filter(x=>x.team===team&&x.id!==d.id);
    const isPreq=(app.preqDriverIds||[]).some(id=>id===d.id)||(app.preqDriverIds||[]).some(pid=>BASE_DRIVERS.find(b=>b.id===pid)?.team===team);

    // Release: well below teammate — but only if teammate isn't already being recruited away
    const stayingTeammates=teammates.filter(x=>!alreadyMovingIds.has(x.id));
    const bestStayingMod=stayingTeammates.length?Math.max(...stayingTeammates.map(x=>driverDtm(x))):-99;
    if(stayingTeammates.length&&bestStayingMod-dtm>1.2&&Math.random()<0.55){
      eos.movements.push({d,from:team,to:null,type:'release',approved:null,
        reason:`Below teammate by ${(bestStayingMod-dtm).toFixed(2)}`});
      alreadyMovingIds.add(d.id);return;
    }
    // Release: well below team level (PQ teams more trigger-happy)
    // Drivers with modifier >= +3.0 are immune from below-team-level release
    const relThresh=isPreq?0.8:1.2;
    const relProb=isPreq?0.60:0.45;
    if(dtm<3.0&&ttm-dtm>relThresh&&Math.random()<relProb){
      eos.movements.push({d,from:team,to:null,type:'release',approved:null,
        reason:`Below team level (driver ${dtm.toFixed(2)} vs team ${ttm.toFixed(2)})`});
      alreadyMovingIds.add(d.id);return;
    }
    // Voluntary departure (small baseline chance)
    if(Math.random()<0.05){
      eos.movements.push({d,from:team,to:null,type:'leave',approved:null,reason:'Voluntary departure'});
      alreadyMovingIds.add(d.id);
    }
  });

  // ── Pass 2: teams pursue better drivers ────────────────────────────
  activeTeamsSorted.forEach(targetTeam=>{
    const ttm=teamTtm(targetTeam);
    const isPreq=(app.preqDriverIds||[]).some(pid=>BASE_DRIVERS.find(b=>b.id===pid)?.team===targetTeam);
    // Only non-PQ teams can actively recruit
    if(isPreq)return;
    // Recruitment probability: positive mod teams recruit easily, negative teams struggle
    const recruitProb=Math.max(0.10,0.55+ttm*0.05); // e.g. +4 team: 75%, -3 team: 40%
    if(Math.random()>recruitProb)return;
    // Find drivers at other non-PQ teams who are significantly better than this team
    const candidates=activeDrivers.filter(d=>{
      if(d.team===targetTeam)return false; // already here
      if(alreadyMovingIds.has(d.id))return false; // already moving
      const srcIsPreq=(app.preqDriverIds||[]).some(pid=>BASE_DRIVERS.find(b=>b.id===pid)?.team===d.team);
      if(srcIsPreq)return false; // don't poach from PQ teams
      const dtm=driverDtm(d);
      if(dtm<=ttm+0.5)return false; // driver must be better than target team
      if(dtm>ttm+3.0)return false; // max 3.0 gap — prevents extreme downward moves
      // Driver at a team that is better than target: they'd be moving down, so less likely
      const srcTtm=teamTtm(d.team);
      if(srcTtm>ttm+1.5&&Math.random()<0.85)return false; // 85% refuse to move down significantly
      return true;
    }).sort((a,b)=>driverDtm(b)-driverDtm(a)); // best drivers first

    if(!candidates.length)return;
    // Recruit the best available candidate (top of sorted list with some randomness)
    const topN=candidates.slice(0,Math.min(3,candidates.length));
    const pick=topN[Math.floor(Math.random()*topN.length)];
    if(pick){
      // Check if target team is at capacity — if so, they must release their weakest driver first
      const currentAtTarget=activeDrivers.filter(d=>d.team===targetTeam&&!alreadyMovingIds.has(d.id));
      const maxAtTarget=2; // non-PQ teams only in Pass 2
      if(currentAtTarget.length>=maxAtTarget){
        // Release the weakest driver to make room
        const weakest=currentAtTarget.sort((a,b)=>driverDtm(a)-driverDtm(b))[0];
        if(weakest){
          eos.movements.push({d:weakest,from:targetTeam,to:null,type:'release',approved:null,
            reason:`Released to make room for incoming recruit`});
          alreadyMovingIds.add(weakest.id);
        }
      }
      eos.movements.push({d:pick,from:pick.team,to:targetTeam,type:'upgrade',approved:null,
        reason:`Recruited by ${escapeHtml(teamDisplayName(targetTeam))} (team ${ttm.toFixed(2)}, driver ${driverDtm(pick).toFixed(2)})`});
      alreadyMovingIds.add(pick.id);
    }
  });
}

      <div style="display:flex;flex-direction:column;gap:4px;align-items:flex-end">
        ${isApp?'<span class="tag" style="background:#dcfce7;color:#166534">✓ Approved</span>':isRej?'<span class="tag" style="background:#fee2e2;color:#991b1b">✗ Rejected</span>':'<span class="tag" style="background:#f1f5f9;color:#64748b" title="Will be approved on Confirm">Pending ✓</span>'}
        ${!isDone?`<div style="display:flex;gap:4px">
          <button class="ghost" style="font-size:11px;padding:2px 8px" onclick="eos_mvSet(${i},true)">✓</button>
          <button class="ghost" style="font-size:11px;padding:2px 8px" onclick="eos_mvSet(${i},false)">✗</button>
        </div>`:''}
      </div>
    </div></div>`;
  }).join('')}`,isDone);
}
window.eos_approveAll=function(){(app._eos.movements||[]).forEach(m=>m.approved=true);renderEndOfSeason();};

window.eos_mvSet=function(i,v){if(app._eos.movements[i])app._eos.movements[i].approved=v;renderEndOfSeason();};
window.eosConfirmMovements=function(){
  const eos=app._eos;
  (eos.movements||[]).filter(m=>m.approved!==false).forEach(mv=>{
    const bd=BASE_DRIVERS.find(x=>x.id===mv.d.id);
    if(bd){bd._eosMovement={type:mv.type,to:mv.to||null,from:mv.from};}
    const dName=bd?driverFullName(bd):(mv.d.name||'?');
    eosLog(`${mv.type.toUpperCase()}: ${dName} — ${teamDisplayName(mv.from||'?')} → ${mv.to?teamDisplayName(mv.to):'Available'}`,4);
  });
  eos.movementsConfirmed=true;
  eosNextStage();
};

// ── Stage 5: Roster Fill (Signings) ───────────────────────────────
function eosComputeSignings(){
  const eos=app._eos;if(!eos||eos.signings!==null)return;
  if(!eos.movementsConfirmed)return;

  const retiringIds=new Set(eos.retirements.filter(r=>!r.override).map(r=>r.d.id));
  const closedTeams=new Set(eos.closures);
  const movedDrivers=new Map();
  (eos.movements||[]).filter(m=>m.approved!==false).forEach(m=>movedDrivers.set(m.d.id,{type:m.type,to:m.to}));

  // Active teams (existing + new entries, not closed)
  const existingActiveTeams=[...new Set(BASE_DRIVERS.filter(d=>d.team!=='Available'&&!d._retired&&!d._temp).map(d=>d.team))].filter(t=>!closedTeams.has(t));
  const newTeamNames=(eos.confirmedNewTeams||[]).filter(t=>!closedTeams.has(t)&&!existingActiveTeams.includes(t));
  const activeTeams=[...existingActiveTeams,...newTeamNames];

  // Calculate seats per team after retirements + movements
  const teamSeats={};
  activeTeams.forEach(t=>{
    if(newTeamNames.includes(t)){
      const td=TEAMS_DATABASE.find(x=>x.name===t);
      // All new entry teams start in PQ (1989-era: up to 2 single-driver PQ teams allowed)
      // In 1991-era, new teams have 2 drivers in PQ
      const maxS=2; // always field 2 drivers
      teamSeats[t]={count:0,max:maxS,isNew:true,isPQ:true,genMod:td?.genMod||0};return;
    }
    const staying=BASE_DRIVERS.filter(d=>d.team===t&&!d._retired&&!d._temp&&!retiringIds.has(d.id)).filter(d=>{
      const mv=movedDrivers.get(d.id);return !mv||mv.to===t;
    });
    const arriving=BASE_DRIVERS.filter(d=>d.team!==t&&!d._retired&&!d._temp&&!retiringIds.has(d.id)&&movedDrivers.get(d.id)?.to===t);
    const maxS=isOneDriverTeam(t)?1:2;
    teamSeats[t]={count:Math.min(staying.length+arriving.length,maxS),max:maxS,isNew:false,genMod:teamBaseTb(t)||0};
  });

  // ── Build available pool ─────────────────────────────────────────
  // Add closed team drivers to pool — they should be immediately available
  // INCLUDE: FA pool, season free agents, released drivers (approved movements with no to)
  // EXCLUDE: retired drivers, upgrade-moving drivers, drivers already contracted elsewhere
  const upgradeIds=new Set([...(eos.movements||[])].filter(m=>m.approved!==false&&m.to).map(m=>m.d.id));
  const releasedIds=new Set([...(eos.movements||[])].filter(m=>m.approved!==false&&!m.to).map(m=>m.d.id));
  // Drivers from closed teams — immediately available for signing
  const closedTeamDrivers=BASE_DRIVERS.filter(d=>closedTeams.has(d.team)&&!d._retired&&!d._temp&&!retiringIds.has(d.id));
  // FA pool (existing available drivers from during the season)
  const faBase=(app._seasonFAPool||[]).filter(f=>!retiringIds.has(f.id));
  // Season free agents from DRIVER_DATABASE (firstYear<=season)
  const filteredFAs=getSeasonFreeAgents(eos.year).filter(f=>!retiringIds.has(f.id));
  // Drivers released by EoS movements (NOT retired — those go to _retiredDrivers)
  const releasedFromMovements=BASE_DRIVERS.filter(d=>releasedIds.has(d.id)&&!retiringIds.has(d.id));
  // Existing BASE_DRIVERS with team=Available (in-season released, not retired)
  const existingAvail=BASE_DRIVERS.filter(d=>d.team==='Available'&&!d._retired&&!retiringIds.has(d.id));

  // Exclude: upgrade movers (already in teamSeats.arriving) and contracted drivers
  const contractedIds=new Set([
    ...BASE_DRIVERS.filter(d=>d.team!=='Available'&&!d._retired&&!d._temp).map(d=>d.id),
    ...BASE_DRIVERS.filter(d=>d.team!=='Available'&&!d._retired&&!d._temp).map(d=>d.pid).filter(Boolean),
  ]);
  // Remove contracted drivers who are STAYING (not released/leaving) from pool
  // upgradeIds: already counted as arriving elsewhere
  // contractedIds minus releasedIds minus upgradeIds: the truly contracted-and-staying set
  const stayingContractedIds=new Set([...contractedIds].filter(id=>!releasedIds.has(id)&&!upgradeIds.has(id)));

  const allPool=[...faBase,...filteredFAs,...releasedFromMovements,...existingAvail,...closedTeamDrivers]
    .filter(f=>{
      const fid=f.id||f.pid;
      if(!fid)return false;
      if(upgradeIds.has(fid)||upgradeIds.has(f.pid||f.id))return false;
      if(stayingContractedIds.has(fid)||stayingContractedIds.has(f.pid||f.id))return false;
      return true;
    });

  // Deduplicate ONLY by permanent ID — name-based dedup causes false exclusions
  // Sort pool by surname for consistent display
  allPool.sort((a,b)=>(a.lastName||a.ln||a.name||'').localeCompare(b.lastName||b.ln||b.name||''));
  const seen=new Set();
  const uniquePool=allPool.filter(f=>{
    const fid=f.id||f.pid;
    if(!fid||seen.has(fid))return false;
    seen.add(fid);
    // Also mark the alternate ID form to prevent duplicates
    if(f.pid&&f.pid!==fid)seen.add(f.pid);
    if(f.id&&f.id!==fid)seen.add(f.id);
    return true;
  });
  // (pool size logged below after signingDebugLog declared)

  // Build a lookup: driverId → team(s) they left/were released from this EoS
  // Drivers cannot re-sign with a team they just departed
  const leftTeamMap=new Map(); // driverId → Set of team names they left
  (eos.movements||[]).filter(m=>m.approved!==false).forEach(m=>{
    // Driver left m.from (either released with no destination, or upgraded away)
    if(!leftTeamMap.has(m.d.id))leftTeamMap.set(m.d.id,new Set());
    leftTeamMap.get(m.d.id).add(m.from);
  });

  // Debug log for vacancy analysis
  const signingDebugLog=[];
  signingDebugLog.push(`Pool after dedup: ${uniquePool.length} drivers available for signing`);

  // ── Signing loop — round-robin so every team gets a pick before second picks ─
  // Round 1: each team picks their FIRST vacancy (best teams get first pick within round)
  // Round 2: teams with a second vacancy pick again from what remains
  // This prevents best teams exhausting the pool before bottom teams get any pick.
  const sorted=[...activeTeams].sort((a,b)=>(teamBaseTb(b)||0)-(teamBaseTb(a)||0));
  const usedIds=new Set();const results=[];

  function pickForTeam(team,round){
    const ts=teamSeats[team];if(!ts)return;
    const alreadyPicked=results.filter(r=>r.team===team).length;
    const totalNeeded=Math.max(0,(ts.max||2)-(ts.count||0));
    if(alreadyPicked>=totalNeeded)return; // all vacancies filled
    if(alreadyPicked<round-1)return; // haven't filled earlier rounds yet (shouldn't happen)

    const ttmBase=teamBaseTb(team)||0;
    const ttmTotal=ttmBase+(getTeamMod(team)||0);
    const isNew=ts.isNew||false;
    // isPQ for signing: use next season's computed PQ list, not current preqDriverIds
    const _nextPQ=eos._nextPQTeams||[];
    const isPQ=_nextPQ.some(t=>teamCanonicalName(t)===teamCanonicalName(team))||
               (isNew&&TEAMS_DATABASE.find(x=>x.name===teamCanonicalName(team))?.firstYear===eos.nextYear);
    const driverMod=f=>(f.driverBonus||f.db||0)+(getDriverMod(f.id)||0);

    // Pool: exclude used drivers and drivers who just left this team
    const pool=uniquePool.filter(f=>!usedIds.has(f.id)&&!leftTeamMap.get(f.id)?.has(team));
    if(!pool.length){
      signingDebugLog.push(`⚠ ${teamDisplayName(team)} R${round}: pool exhausted (ttm=${ttmTotal.toFixed(1)}, vacancies=${totalNeeded-alreadyPicked})`);
      return;
    }

    let pick;
    if(isNew){
      const gm=ts.genMod||0;
      const weights=pool.map(f=>Math.max(0.05,1/(Math.abs(driverMod(f)-gm)+0.5)));
      const tot=weights.reduce((a,b)=>a+b,0);let r=Math.random()*tot,idx=0;
      for(let j=0;j<weights.length;j++){r-=weights[j];if(r<=0){idx=j;break;}}
      pick=pool[Math.min(idx,pool.length-1)];
    } else if(isPQ){
      // PQ teams: prefer low-modifier 'pay' drivers (negative/zero mod)
      // Weight: drivers with lower mod more likely (inverted range from bottom)
      const payWeight=f=>{const dm=driverMod(f);return dm<=0?Math.max(0.5,2.0-dm*0.3):Math.max(0.05,1.0/(dm+1));};
      const pwts=pool.map(f=>payWeight(f));
      const ptot=pwts.reduce((a,b)=>a+b,0);let pr=Math.random()*ptot,pidx=0;
      for(let j=0;j<pwts.length;j++){pr-=pwts[j];if(pr<=0){pidx=j;break;}}
      pick=pool[Math.min(pidx,pool.length-1)];
    } else {
      // Non-PQ tiered picking:
      // Tier 1 (positive team): within range → positive modifier → zero → low negative → anyone
      // Tier 2 (zero/negative team): within range → then anyone
      const maxReach=Math.max(1.5,3.5+ttmBase*0.15+(round-1)*1.5);
      let cands=pool.filter(f=>Math.abs(driverMod(f)-ttmTotal)<=maxReach);
      if(ttmBase>0){
        // Positive modifier team: tiered preference
        if(!cands.length){
          // Tier 2: positive-modifier drivers anywhere in pool
          cands=pool.filter(f=>driverMod(f)>0);
        }
        if(!cands.length){
          // Tier 3: zero-modifier drivers (within 0.5)
          cands=pool.filter(f=>Math.abs(driverMod(f))<0.5);
        }
        if(!cands.length){
          // Tier 4: mild negative only (>=-1.0, not deeply negative)
          cands=pool.filter(f=>driverMod(f)>=-1.0);
        }
        if(!cands.length){
          // Tier 5: any remaining (last resort)
          // Positive teams should strongly resist hiring deeply negative drivers
          // Only hire drivers within 4.0 of team modifier as absolute fallback
          const hardCap=ttmTotal-4.0;
          cands=pool.filter(f=>driverMod(f)>=hardCap);
        }
        if(!cands.length)cands=pool; // Tier 6: absolute last resort
      } else {
        // Zero/negative team: use range or full pool
        if(!cands.length){
          signingDebugLog.push(`  ${teamDisplayName(team)} R${round}: 0 cands in range ±${maxReach.toFixed(1)} (ttm=${ttmTotal.toFixed(1)}), using full pool`);
          cands=pool;
        }
      }
      if(!cands.length)cands=pool; // absolute fallback
      const weights=cands.map(f=>Math.max(0.05,1/(Math.abs(driverMod(f)-ttmTotal)+0.5)));
      const tot=weights.reduce((a,b)=>a+b,0);let r=Math.random()*tot,idx=0;
      for(let j=0;j<weights.length;j++){r-=weights[j];if(r<=0){idx=j;break;}}
      pick=cands[Math.min(idx,cands.length-1)];
    }

    if(pick){
      const gm_for_reason=isNew?(ts.genMod||0):ttmBase;
      const reason=isNew?`New team hire (genMod ${gm_for_reason>=0?'+':''}${gm_for_reason.toFixed(1)})`
        :isPQ?'PQ — pool selection'
        :`Modifier match R${round} (team ${ttmTotal.toFixed(2)})`;
      results.push({driver:pick,team,reason});
      usedIds.add(pick.id);
      if(pick.pid&&pick.pid!==pick.id)usedIds.add(pick.pid);
      const pname=(pick.firstName||pick.fn||'')+' '+(pick.lastName||pick.ln||pick.name||'');
      signingDebugLog.push(`  ✓ ${teamDisplayName(team)} R${round}: signed ${pname.trim()} (driver ${driverMod(pick).toFixed(2)}, team ${ttmTotal.toFixed(2)})`);
    } else {
      signingDebugLog.push(`  ✗ ${teamDisplayName(team)} R${round}: no pick made (pool=${pool.length}, cands available)`);
    }
  }

  // Round 1: every team picks first driver
  sorted.forEach(t=>pickForTeam(t,1));
  if(uniquePool.filter(f=>!usedIds.has(f.id)).length>0){
    // Round 2: teams that need a second driver pick again
    sorted.forEach(t=>pickForTeam(t,2));
  }

  signingDebugLog.push(`Main loop: ${results.length} picks made, ${uniquePool.filter(f=>!usedIds.has(f.id)).length} pool remaining`);

  // Hard cap: never exceed maxSeats per team
  const signedCount={};
  let filteredResults=results.filter(s=>{
    const max=teamSeats[s.team]?.max||2;
    const existing=teamSeats[s.team]?.count||0;
    signedCount[s.team]=(signedCount[s.team]||0)+1;
    return existing+signedCount[s.team]<=max;
  });

  // ── Mandatory fallback: fill all remaining vacancies no matter what ──
  // If any team still has vacancies after the weighted loop, assign from remaining pool
  // without ANY modifier filtering. This guarantees full rosters.
  const signedIds=new Set(filteredResults.map(s=>s.driver.id));
  let remainingPool=uniquePool.filter(f=>!signedIds.has(f.id));

  activeTeams.forEach(team=>{
    const ts=teamSeats[team];if(!ts)return;
    const existing=ts.count||0;
    const alreadySigned=(signedCount[team]||0);
    const stillNeeded=Math.max(0,(ts.max||2)-existing-alreadySigned);
    if(!stillNeeded)return;

    for(let i=0;i<stillNeeded;i++){
      // Filter: cannot re-sign from same team, and not already used
      const eligible=remainingPool.filter(f=>!leftTeamMap.get(f.id)?.has(team));
      const pick=eligible[0]||remainingPool[0]; // absolute fallback ignores team restriction
      if(!pick)break;
      const reason=`Fallback fill (${team} had ${stillNeeded} vacancy)`;
      filteredResults.push({driver:pick,team,reason});
      signedIds.add(pick.id);
      signedCount[team]=(signedCount[team]||0)+1;
      remainingPool=remainingPool.filter(f=>f.id!==pick.id);
      signingDebugLog.push(`Fallback fill: ${(pick.firstName||pick.fn||'')} ${(pick.lastName||pick.ln||pick.name||'')} → ${teamDisplayName(team)}`);
    }
  });

  // Debug: report any teams STILL vacant and remaining available pool
  const stillVacant=activeTeams.filter(t=>{
    const ts=teamSeats[t];if(!ts)return false;
    const filled=(ts.count||0)+(signedCount[t]||0);
    return filled<(ts.max||2);
  });
  if(stillVacant.length){
    const poolLeft=remainingPool.length;
    signingDebugLog.push(`⚠ ${stillVacant.length} team(s) still have vacancies after fill. Pool remaining: ${poolLeft} driver(s).`);
    stillVacant.forEach(t=>{
      const ts=teamSeats[t];
      const filled=(ts.count||0)+(signedCount[t]||0);
      signingDebugLog.push(`  ↳ ${teamDisplayName(t)}: ${filled}/${ts.max||2} filled`);
    });
  }
  eos.signings=filteredResults;
  eos._signingDebugLog=signingDebugLog;
}
function eosRenderSignings(){
  const eos=app._eos;const isDone=eos.stagesDone.has(5);
  eosComputeSignings();
  const signings=eos.signings||[];
  const closedTeams=new Set(eos.closures);
  const retiringIds=new Set(eos.retirements.filter(r=>!r.override).map(r=>r.d.id));
  const movedMap=new Map();
  (eos.movements||[]).filter(m=>m.approved!==false).forEach(m=>movedMap.set(m.d.id,m));
  const activeTeams=[...new Set(BASE_DRIVERS.filter(d=>d.team!=='Available'&&!d._retired&&!d._temp).map(d=>d.team))].filter(t=>!closedTeams.has(t));
  // Add confirmed new teams from Stage 3 (they have no drivers yet — need 2 each)
  const newTeamNames=(eos.confirmedNewTeams||[]).filter(t=>!closedTeams.has(t)&&!activeTeams.includes(t));
  newTeamNames.forEach(t=>activeTeams.push(t));
  const rosterByTeam={};
  activeTeams.forEach(t=>{
    const existing=BASE_DRIVERS.filter(d=>d.team===t&&!d._retired&&!d._temp&&!retiringIds.has(d.id)).filter(d=>{
      const mv=movedMap.get(d.id);return !mv||mv.to===t;
    });
    // Also include drivers arriving via upgrade movement (they're at a different team in BASE_DRIVERS)
    const arriving=BASE_DRIVERS.filter(d=>d.team!==t&&!d._retired&&!d._temp&&!retiringIds.has(d.id)&&movedMap.get(d.id)?.to===t);
    const proposed=signings.filter(s=>s.team===t);
    const totalDrivers=[...existing,...arriving,...(isDone?[]:proposed)];
    const total=totalDrivers.length;
    const maxS=newTeamNames.includes(t)?2:(isOneDriverTeam(t)?1:2);
    rosterByTeam[t]={team:t,existing:[...existing,...arriving],proposed:isDone?[]:proposed,total,maxS};
  });
  const contractedIds2=new Set(BASE_DRIVERS.filter(d=>d.team!=='Available'&&!d._retired&&!d._temp).map(d=>d.id));
  // Build display pool using same exclusions as signing pool
  // Exclude: retired, retiring, signed this EoS, upgrade-moving, staying-contracted
  const _signedIds=new Set(signings.map(s=>s.driver.id||s.driver.pid).filter(Boolean));
  const _upgradeMvIds=new Set((eos.movements||[]).filter(m=>m.approved!==false&&m.to).map(m=>m.d.id));
  const _stayingIds=new Set(BASE_DRIVERS
    .filter(d=>d.team!=='Available'&&!d._retired&&!d._temp&&!retiringIds.has(d.id))
    .filter(d=>{const mv=(eos.movements||[]).find(m=>m.d.id===d.id&&m.approved!==false);return !mv||mv.to===d.team;})
    .flatMap(d=>[d.id,d.pid].filter(Boolean)));
  // _seasonFAPool entries should never be excluded via stayingContractedIds
  // (new entrants confirmed in Stage 2 are in _seasonFAPool but not yet in BASE_DRIVERS)
  // _seasonFAPool contains new entrants (Stage 2) + mid-season released drivers
  const _faPoolIds=new Set((app._seasonFAPool||[]).map(f=>f.id||f.pid).filter(Boolean));
  const allAvail=[
    ...(app._seasonFAPool||[]),  // new entrants + released pool
    ...(getSeasonFreeAgents(eos.year)),  // DRIVER_DATABASE eligibles
    ...BASE_DRIVERS.filter(d=>d.team==='Available'&&!d._retired&&!retiringIds.has(d.id)),
    ...(eos.closures||[]).flatMap(t=>BASE_DRIVERS.filter(d=>d.team===t&&!d._retired&&!retiringIds.has(d.id))),
    ...BASE_DRIVERS.filter(d=>{const mv=(eos.movements||[]).find(m=>m.d.id===d.id&&m.approved!==false);return mv&&!mv.to&&!retiringIds.has(d.id);}),
  ].filter(f=>{
    const fid=f.id||f.pid;if(!fid)return false;
    if(retiringIds.has(fid))return false;
    if(_signedIds.has(fid)||_signedIds.has(f.pid||fid))return false;
    if(_upgradeMvIds.has(fid))return false;
    // Don't exclude FA pool entries via stayingIds (they're not contracted)
    if(!_faPoolIds.has(fid)&&(_stayingIds.has(fid)||_stayingIds.has(f.pid||fid)))return false;
    return true;
  });
  allAvail.sort((a,b)=>(a.lastName||a.ln||a.name||'').localeCompare(b.lastName||b.ln||b.name||''));
  const seenAvail=new Set();
  const availPool=allAvail.filter(f=>{
    const fid=f.id||f.pid;
    if(seenAvail.has(fid))return false;
    seenAvail.add(fid);if(f.pid&&f.pid!==fid)seenAvail.add(f.pid);
    return true;
  });
  return eosReadOnlyWrap(`
  <div class="eos-header"><div class="eos-tag">Stage 5 of 6</div><h2>Roster Fill</h2>
    <p style="color:var(--muted);font-size:13px">Available drivers are assigned to teams with vacancies. ${signings.length} signing(s) proposed.</p></div>
  <div class="btn-row">
    ${isDone?'<span class="tag" style="background:#dcfce7;color:#166534;padding:6px 12px">✓ Confirmed</span>':`<button class="btn" onclick="eosConfirmSignings()">Confirm roster →</button>
    <button class="ghost" onclick="app._eos.signings=null;renderEndOfSeason()">↺ Re-generate</button>`}
  </div>
  <div class="session-banner" style="cursor:default">Pool: ${availPool.length} available · ${signings.length} proposed signing(s)</div>
  <div class="two-col" style="margin-top:12px">
  ${Object.values(rosterByTeam).map(({team,existing,proposed,total,maxS})=>{
    const disp=teamDisplayName(team);
    const ttmVal=(teamBaseTb(team)||0)+(getTeamMod(team)||0);
    const modStr=(ttmVal>=0?'+':'')+ttmVal.toFixed(2);
    return`<div class="panel"><div style="display:flex;justify-content:space-between;margin-bottom:6px">
      <span style="font-weight:600">${escapeHtml(disp)}</span>
      <span style="font-size:12px;color:var(--muted)">${modStr}</span></div>
    ${existing.map(d=>{const mv=movedMap.get(d.id);const isUpgrade=mv&&mv.type==='upgrade';const mod=(d.driverBonus||0)+(getDriverMod(d.id)||0);return`<div style="font-size:12px;padding:2px 0;color:${isUpgrade?'#92400e':'inherit'}">${isUpgrade?'↗ ':''}${flagImg(d.nation2)} ${escapeHtml(driverFullName(d))} <span style="color:var(--muted)">${(mod>=0?'+':'')+mod.toFixed(2)}</span></div>`;}).join('')}
    ${proposed.map(s=>{const f=s.driver;const mod=(f.driverBonus||f.db||0)+(getDriverMod(f.id)||0);const n2=f.nation2||f.n2||'';return`<div style="font-size:12px;padding:2px 0;color:#15803d">+ ${flagImg(n2)} ${escapeHtml((f.firstName||f.fn||'')+' '+(f.lastName||f.ln||f.name||''))} <span style="color:var(--muted)">${(mod>=0?'+':'')+mod.toFixed(2)}</span></div>`;}).join('')}
    ${total<maxS?`<div style="color:#dc2626;font-size:11px;margin-top:3px">⚠ ${maxS-total} vacant</div>`:''}
    </div>`;
  }).join('')}
  </div>
  ${availPool.length?`<div class="sec" style="margin-top:12px">Remaining available pool (${availPool.length})</div>
  ${availPool.map(f=>`<span style="display:inline-block;font-size:12px;margin:2px 4px;padding:2px 8px;background:var(--surface);border:1px solid var(--line);border-radius:4px">${flagImg(f.nation2||f.n2||'')} ${escapeHtml((f.firstName||f.fn||'')+' '+(f.lastName||f.ln||f.name||''))}</span>`).join('')}`:'<div style="font-size:13px;color:#15803d;margin-top:10px">✓ All drivers placed.</div>'}
  ${(eos._signingDebugLog||[]).length?`<div class="sec" style="margin-top:12px">Signing debug log</div>
  <div class="panel" style="max-height:160px;overflow-y:auto">${(eos._signingDebugLog||[]).map(e=>`<div style="font-size:11px;color:var(--muted);padding:2px 0;border-bottom:1px solid var(--line)">${escapeHtml(e)}</div>`).join('')}</div>`:``}`,isDone);
}
window.eosConfirmSignings=function(){
  const eos=app._eos;
  (eos.signings||[]).forEach(s=>{
    const name=(s.driver.firstName||s.driver.fn||'')+' '+(s.driver.lastName||s.driver.ln||s.driver.name||'');
    eosLog(`SIGNED: ${name} → ${teamDisplayName(s.team)}`,5);
  });
  eos.rosterConfirmed=true;
  eosNextStage();
};

// ── Stage 6: Complete + Apply ──────────────────────────────────────
function eosRenderComplete(){
  const eos=app._eos;const isDone=eos.stagesDone.has(6);
  const st=eos._standingsCache;
  const dChamp=st.driverChampion||st.drivers[0]?.name||'—';
  const cChamp=st.teamChampion||teamDisplayName(st.teams[0]?.name||'—')||'—';

  // ── Build roster summary: team → {stays, leaves, joins} ──────────
  const retiringIds=new Set(eos.retirements.filter(r=>!r.override).map(r=>r.d.id));
  const closedTeams=new Set(eos.closures);
  const approvedMvs=(eos.movements||[]).filter(m=>m.approved!==false);
  const movedOut=new Map(); // id → {type,to,from}
  const movedIn=new Map();  // teamName → [{d,from}]
  approvedMvs.forEach(m=>{
    movedOut.set(m.d.id,m);
    if(m.to){if(!movedIn.has(m.to))movedIn.set(m.to,[]);movedIn.get(m.to).push(m);}
  });
  const signingsByTeam=new Map();
  (eos.signings||[]).forEach(s=>{
    if(!signingsByTeam.has(s.team))signingsByTeam.set(s.team,[]);
    signingsByTeam.get(s.team).push(s.driver);
  });

  // All teams for next year (existing minus closed, plus new entries)
  const existingTeams=[...new Set(BASE_DRIVERS.filter(d=>d.team!=='Available'&&!d._retired&&!d._temp).map(d=>d.team))].filter(t=>!closedTeams.has(t));
  const newTeamNames=(eos.confirmedNewTeams||[]).filter(t=>!closedTeams.has(t)&&!existingTeams.includes(t));
  const allNextTeams=[...existingTeams,...newTeamNames].sort((a,b)=>a.localeCompare(b));

  const gr=eos.gridRules||{};
  // Count projected drivers
  let totalDrivers=0;
  const teamRows=allNextTeams.map(team=>{
    const isNew=newTeamNames.includes(team);
    const disp=teamDisplayName(team);
    const stays=isNew?[]:BASE_DRIVERS.filter(d=>d.team===team&&!d._retired&&!d._temp&&!retiringIds.has(d.id)).filter(d=>{
      const mv=movedOut.get(d.id);return !mv||mv.to===team;
    });
    const retires=isNew?[]:BASE_DRIVERS.filter(d=>d.team===team&&!d._temp&&retiringIds.has(d.id));
    const leaves=isNew?[]:BASE_DRIVERS.filter(d=>d.team===team&&!d._retired&&!d._temp&&!retiringIds.has(d.id)).filter(d=>{
      const mv=movedOut.get(d.id);return mv&&!mv.to; // released/left
    });
    const promoted=(movedIn.get(team)||[]).map(m=>m.d); // moves in from other teams
    const signed=signingsByTeam.get(team)||[];
    const total=stays.length+promoted.length+signed.length;
    totalDrivers+=total;
    const maxS=isNew?2:(isOneDriverTeam(team)?1:2);
    const shortage=maxS-total;
    const fn=d=>driverFullName(d)||d.name||d.ln||'?';
    const rows=[];
    stays.forEach(d=>rows.push(`<div style="font-size:11px;padding:1px 0">${flagImg(d.nation2)} ${escapeHtml(fn(d))}</div>`));
    promoted.forEach(d=>rows.push(`<div style="font-size:11px;padding:1px 0;color:#1d4ed8">↗ ${flagImg(d.nation2)} ${escapeHtml(fn(d))}</div>`));
    signed.forEach(f=>{const n=(f.firstName||f.fn||'')+' '+(f.lastName||f.ln||f.name||'');rows.push(`<div style="font-size:11px;padding:1px 0;color:#15803d">+ ${flagImg(f.nation2||f.n2||'')} ${escapeHtml(n.trim())}</div>`);});
    retires.forEach(d=>rows.push(`<div style="font-size:11px;padding:1px 0;color:#9f1239;text-decoration:line-through">⛔ ${flagImg(d.nation2)} ${escapeHtml(fn(d))}</div>`));
    leaves.forEach(d=>rows.push(`<div style="font-size:11px;padding:1px 0;color:#92400e">🚪 ${flagImg(d.nation2)} ${escapeHtml(fn(d))}</div>`));
    return`<div class="panel" style="margin-bottom:6px">
      <div style="display:flex;justify-content:space-between;align-items:baseline;margin-bottom:4px">
        <span style="font-weight:600;font-size:13px">${escapeHtml(disp)}${isNew?'<span style="font-size:10px;color:#1d4ed8;margin-left:4px">NEW</span>':''}</span>
        <span style="font-size:11px;color:${shortage>0?'#dc2626':total>maxS?'#dc2626':'var(--muted)'}">${total}/${maxS} drivers${shortage>0?` ⚠ ${shortage} short`:total>maxS?' ⚠ over':''}</span>
      </div>
      ${rows.join('')}
    </div>`;
  });

  // Closed teams
  const closedRows=eos.closures.map(t=>`<div class="panel" style="margin-bottom:6px;opacity:0.6">
    <div style="font-weight:600;font-size:13px;color:#991b1b">✕ ${escapeHtml(teamDisplayName(t))} — Closed</div>
    ${BASE_DRIVERS.filter(d=>d.team===t&&!d._retired&&!d._temp).map(d=>`<div style="font-size:11px;padding:1px 0;color:#9f1239;text-decoration:line-through">${flagImg(d.nation2)} ${escapeHtml(driverFullName(d)||d.name||'?')}</div>`).join('')}
  </div>`);

  return`
  <div class="eos-header"><div class="eos-tag">Stage 6 of 6</div><h2>${eos.nextYear} Season Grid</h2>
    <p style="color:var(--muted);font-size:13px">${gr.label||''} rules: ${gr.minDrivers}–${gr.maxDrivers} drivers from ${gr.minTeams}–${gr.maxTeams} teams. Projected: <strong>${totalDrivers} drivers from ${allNextTeams.length} teams</strong>.</p></div>
  <div class="btn-row">
    ${isDone?`<button class="btn" style="background:#15803d" onclick="eosApplyAndBeginNewSeason()">🏁 Begin ${eos.nextYear} season →</button>
    ${eos._debugMode?`<button class="ghost" style="color:#7c3aed" onclick="eosDebugNextYear()">🛠 Debug: next year →</button>`:''}
    `:`<button class="btn" onclick="eosConfirmComplete()">Confirm all →</button>`}
  </div>
  <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:12px">
    <div class="metric"><div class="label">${eos.year} Drivers' Champion</div><div class="value" style="font-size:13px">${escapeHtml(dChamp)}</div></div>
    <div class="metric"><div class="label">${eos.year} Constructors' Champion</div><div class="value" style="font-size:13px">${escapeHtml(cChamp)}</div></div>
  </div>
  <div style="font-size:11px;color:var(--muted);margin-bottom:8px">Legend: stays (grey) &nbsp;·&nbsp; <span style="color:#1d4ed8">↗ promoted</span> &nbsp;·&nbsp; <span style="color:#15803d">+ signed</span> &nbsp;·&nbsp; <span style="color:#9f1239;text-decoration:line-through">⛔ retiring</span> &nbsp;·&nbsp; <span style="color:#92400e">🚪 leaving</span></div>
  <div class="two-col">
  ${teamRows.join('')}
  ${closedRows.join('')}
  </div>
  <div class="sec" style="margin-top:12px">Process log</div>
  <div class="panel" style="max-height:180px;overflow-y:auto">
  ${eos.processLog.length?eos.processLog.map(e=>`<div style="font-size:11px;color:var(--muted);padding:2px 0;border-bottom:1px solid var(--line)">${escapeHtml(e)}</div>`).join(''):'<span style="color:var(--muted);font-size:12px">No log entries.</span>'}
  </div>`;
}
window.eosConfirmComplete=function(){
  const eos=app._eos;if(!eos)return;
  // Build comprehensive log summary of all stage decisions
  const gr=eos.gridRules||{};
  eosLog(`═══ ${eos.year}→${eos.nextYear} TRANSITION SUMMARY ═══`,6);
  eosLog(`Grid rules: ${gr.label||''} — ${gr.minTeams||'?'}–${gr.maxTeams||'?'} teams, ${gr.minDrivers||'?'}–${gr.maxDrivers||'?'} drivers`,6);
  // Stage 1: retirements
  const retList=eos.retirements.filter(r=>!r.override);
  if(retList.length)retList.forEach(r=>eosLog(`RETIRE: ${driverFullName(r.d)||r.d.name||'?'} (${r.reason})`,6));
  else eosLog(`RETIREMENTS: none`,6);
  // Stage 2: new entrants
  const entList=eosGetNewEntrants();
  if(entList.length)entList.forEach(d=>eosLog(`NEW ENTRANT: ${d.firstName} ${d.lastName} (db${d.driverBonus>=0?'+':''}${d.driverBonus.toFixed(2)})`,6));
  else eosLog(`NEW ENTRANTS: none`,6);
  // Stage 3: team changes
  if(eos.closures.length)eos.closures.forEach(t=>eosLog(`CLOSE: ${t}`,6));
  if((eos.confirmedNewTeams||[]).length)(eos.confirmedNewTeams||[]).forEach(t=>eosLog(`NEW TEAM: ${t}`,6));
  eosGetRenames().forEach(r=>eosLog(`RENAME: ${r.from} → ${r.to}`,6));
  // Stage 4: movements
  (eos.movements||[]).filter(m=>m.approved!==false).forEach(mv=>{
    const bd=BASE_DRIVERS.find(x=>x.id===mv.d.id);
    const dName=bd?driverFullName(bd):(mv.d.name||'?');
    eosLog(`${mv.type.toUpperCase()}: ${dName} — ${teamDisplayName(mv.from||'?')} → ${mv.to?teamDisplayName(mv.to):'Available'}`,6);
  });
  // Stage 5: signings
  (eos.signings||[]).forEach(s=>{
    const n=(s.driver.firstName||s.driver.fn||'')+' '+(s.driver.lastName||s.driver.ln||s.driver.name||'');
    eosLog(`SIGN: ${n.trim()} → ${teamDisplayName(s.team)} (${s.reason})`,6);
  });
  if((eos._signingDebugLog||[]).length)(eos._signingDebugLog||[]).forEach(e=>eosLog(e,6));
  eosNextStage();
};

// ── Apply EoS to game state ─────────────────────────────────────────
window.eosApplyAndBeginNewSeason=function(){
  const eos=app._eos;if(!eos)return;
  const newsItems=[];
  // Wrap in try-catch so errors are visible rather than silently failing
  try{

  // 1. Retirements — must set suppress flag BEFORE calling executeCareerEndingInjury
  const _appliedRetireIds=new Set();
  eos.retirements.filter(r=>!r.override).forEach(r=>{
    if(_appliedRetireIds.has(r.d.id))return;
    _appliedRetireIds.add(r.d.id);
    const d=BASE_DRIVERS.find(x=>x.id===r.d.id);
    if(d){
      d._suppressCEINews=true; // set BEFORE call so the CEI message is blocked
      executeCareerEndingInjury(d.id,newsItems);
    } else {
      // FA pool retirement
      if(app._seasonFAPool)app._seasonFAPool=app._seasonFAPool.filter(f=>f.id!==r.d.id);
    }
    newsItems.push(`⛔ <strong>${escapeHtml(driverFullName(r.d)||r.d.name||'?')}</strong> retires. ${escapeHtml(r.reason)}`);
    if(d){const rd=app._retiredDrivers.find(x=>x.id===d.id);if(rd){rd.firstName=rd.firstName||d.firstName||'';rd.lastName=rd.lastName||d.name||'';rd.nation2=rd.nation2||d.nation2||'';}}
  });

  // 2. Clear mid-season flags and splice retired drivers from BASE_DRIVERS for new season
  BASE_DRIVERS.forEach(d=>{delete d._released;delete d._fired;delete d._eosMovement;delete d._suppressCEINews;});
  // Splice out retired drivers so they don't remain in BASE_DRIVERS for new season
  // (they're recorded in _retiredDrivers already by executeCareerEndingInjury)
  for(let i=BASE_DRIVERS.length-1;i>=0;i--){
    if(BASE_DRIVERS[i]._retired)BASE_DRIVERS.splice(i,1);
  }
  if(app.driverInjuries){Object.keys(app.driverInjuries).forEach(id=>{delete app.driverInjuries[id];});}

  // 3. Apply movements (releases + upgrades)
  const movedDrivers=new Map();
  (eos.movements||[]).filter(m=>m.approved!==false).forEach(m=>movedDrivers.set(m.d.id,m));
  movedDrivers.forEach((mv,dId)=>{
    const d=BASE_DRIVERS.find(x=>x.id===dId);if(!d)return;
    if(mv.to){
      // Upgrade: change team
      d.team=mv.to;
      recordDriverIncident(d.id,'teamJoin',{team:mv.to,round:0,year:eos.nextYear});
      newsItems.push(`🔄 <strong>${escapeHtml(driverFullName(d))}</strong> moves to <strong>${escapeHtml(teamDisplayName(mv.to))}</strong>.`);
    } else {
      // Release/leave
      recordDriverIncident(d.id,'teamChange',{action:mv.type,fromTeam:d.team,round:0,year:eos.nextYear});
      releaseDriverFromTeam(d,mv.type);
      newsItems.push(`🚪 <strong>${escapeHtml(driverFullName(d))}</strong> leaves <strong>${escapeHtml(teamDisplayName(mv.from||'?'))}</strong>.`);
    }
  });

  // 4. Team closures — record IDs permanently to prevent re-entry
  if(!app._closedTeamIds)app._closedTeamIds=[];
  eos.closures.forEach(team=>{
    // Record team ID as permanently closed
    const td=TEAMS_DATABASE.find(t=>t.name===teamCanonicalName(team));
    if(td&&!app._closedTeamIds.includes(td.id))app._closedTeamIds.push(td.id);
    // Release all drivers from closed team into FA pool
    BASE_DRIVERS.filter(d=>d.team===team&&!d._retired).forEach(d=>{
      releaseDriverFromTeam(d,'closed');
      newsItems.push(`🏴 <strong>${escapeHtml(teamDisplayName(team))}</strong> closes. <strong>${escapeHtml(driverFullName(d))}</strong> enters FA pool.`);
    });
  });

  // 5. Apply signings
  // First: apply genMod for ALL new teams (even those that get no drivers signed)
  (eos.confirmedNewTeams||[]).forEach(_newT=>{
    const _canonNew=teamCanonicalName(_newT);
    const _tdNew=TEAMS_DATABASE.find(t=>t.name===_canonNew);
    if(_tdNew&&_tdNew.genMod!=null&&_tdNew.genMod!==0&&!app.teamModifiers[_canonNew]){
      app.teamModifiers[_canonNew]=_tdNew.genMod;
      if(!app.modHistory.teams[_canonNew])app.modHistory.teams[_canonNew]=[];
      app.modHistory.teams[_canonNew].push({season:newSeason,round:0,delta:_tdNew.genMod,reason:'New team entry (genMod)'});
    }
  });
  app._seasonFAPool=app._seasonFAPool||[];
  app._faCallupCount={};app._activeContracts={};
  (eos.signings||[]).forEach(s=>{
    const fa=s.driver;const team=s.team;
    const existing=BASE_DRIVERS.find(d=>d.id===fa.id);
    const maxS=isOneDriverTeam(team)?1:2;
    if(BASE_DRIVERS.filter(d=>d.team===team&&!d._retired).length>=maxS)return;
    if(existing){existing.team=team;existing._released=false;}
    else{
      const tb=teamBaseTb(team)||0;const db=fa.driverBonus||fa.db||0;
      BASE_DRIVERS.push({id:fa.id,firstName:fa.firstName||fa.fn||'',lastName:fa.lastName||fa.ln||fa.name||'',name:fa.lastName||fa.ln||fa.name||'',
        nation2:fa.nation2||fa.n2||'',nation3:fa.nation3||fa.n3||'',team,dob:fa.dob||1970,driverBonus:db,teamBonus:tb,qualiBonus:db+tb,raceNoGridBonus:db+tb,
        preferredTeam:null,isFreeAgent:true,_temp:false,listOrder:39});
    }
    if(app._seasonFAPool)app._seasonFAPool=app._seasonFAPool.filter(f=>f.id!==fa.id);
    const name=(fa.firstName||fa.fn||'')+' '+(fa.lastName||fa.ln||fa.name||'');
    recordDriverIncident(fa.id,'teamJoin',{team,round:0,year:eos.nextYear});
    newsItems.push(`✅ <strong>${escapeHtml(name.trim())}</strong> signs with <strong>${escapeHtml(teamDisplayName(team))}</strong>.`);
    // New teams: apply genMod as their initial team modifier
    const _isNewForMod=(eos.confirmedNewTeams||[]).some(n=>teamCanonicalName(n)===teamCanonicalName(team));
    if(_isNewForMod){
      const _canonNew=teamCanonicalName(team);
      const _td=TEAMS_DATABASE.find(t=>t.name===_canonNew);
      if(_td&&_td.genMod!=null&&_td.genMod!==0){
        // Always set — override any previous value for new teams
        app.teamModifiers[_canonNew]=_td.genMod;
        if(!app.modHistory.teams[_canonNew])app.modHistory.teams[_canonNew]=[];
        app.modHistory.teams[_canonNew].push({season:eos.nextYear,round:0,delta:_td.genMod,reason:'New team entry (genMod)'});
      }
    }
    // New teams always start in PQ — add their drivers to preqDriverIds
    const _isNewTeam=(eos.confirmedNewTeams||[]).includes(teamCanonicalName(team))||(eos.confirmedNewTeams||[]).includes(team);
    if(_isNewTeam&&!app.preqDriverIds.includes(fa.id)){
      app.preqDriverIds.push(fa.id);
      // Also ensure the team is in _pqTeamsBySeason for computePreqIds to find
      if(!app._pqTeamsBySeason)app._pqTeamsBySeason={};
      if(!app._pqTeamsBySeason[eos.nextYear])app._pqTeamsBySeason[eos.nextYear]=[];
      const _tc=teamCanonicalName(team);
      if(!app._pqTeamsBySeason[eos.nextYear].includes(_tc))app._pqTeamsBySeason[eos.nextYear].push(_tc);
    }
  });

  // 6. Advance season
  const oldSeason=eos.year;const newSeason=eos.nextYear;
  app.currentSeason=newSeason;
  // Only rebuild BASE_DRIVERS/FREE_AGENTS from SEASONS data if that season exists
  // If SEASONS[newSeason] doesn't exist (e.g. 1990), keep the current modified BASE_DRIVERS
  // so EoS movements/signings applied above are preserved
  // Only rebuild from SEASONS if the game STARTED in that season (not if we transitioned there)
  // This prevents Jordan/Lambo getting their 1991 historical drivers when game started in 1989
  const _gameStartYr=app.history.weekends.length>0?Math.min(...app.history.weekends.map(w=>w.raceMeta.year)):newSeason;
  const _seasonHasData=!!SEASONS[newSeason];
  const _useSeasonData=_seasonHasData&&(_gameStartYr>=newSeason); // only if game starts in this year
  if(_useSeasonData){
    BASE_DRIVERS=buildDrivers(newSeason);
    FREE_AGENTS=buildFreeAgents(newSeason);
  } else {
    // For intermediate years: keep current BASE_DRIVERS (movements already applied)
    // Rebuild FREE_AGENTS from DRIVER_DATABASE for next year's available pool
    const _cy=newSeason;
    // Use getSeasonFreeAgents which properly uses permanent IDs and excludes contracted drivers
    FREE_AGENTS=getSeasonFreeAgents(_cy);
  }
  app._qualiRetirementPenalty={};
  app._earlyCareerWinAwarded={};app._earlyCareerPodiumAwarded={};app._earlyCareerPtsAwarded={};
  // Rebuild preqDriverIds for the new season
  {const _rls=seasonRules();const _sd=SEASONS[app.currentSeason];
  const _gameStartRebuild=app.history.weekends.length>0?Math.min(...app.history.weekends.map(w=>w.raceMeta.year)):app.currentSeason;
  const _isIntermediate=_gameStartRebuild<=1989&&app.currentSeason>1989&&!SEASONS[app.currentSeason];
  if(_isIntermediate){
    // Use PQ teams computed in Stage 3 (stored in eos._nextPQTeams)
    const _nextPQFromEos=eos._nextPQTeams||[];
    if(_nextPQFromEos.length){
      const _pqSet=new Set(_nextPQFromEos.map(t=>teamCanonicalName(t)));
      app.preqDriverIds=BASE_DRIVERS.filter(d=>!d._retired&&!d._temp&&d.team!=='Available'&&_pqSet.has(teamCanonicalName(d.team))).map(d=>d.id);
      // Store for computePreqIds to use during the season
      app._pqTeamsBySeason=app._pqTeamsBySeason||{};
      app._pqTeamsBySeason[newSeason]=[..._nextPQFromEos];
    } else {
      // Fallback: filter preqDriverIds to active drivers only
      app.preqDriverIds=(app.preqDriverIds||[]).filter(id=>BASE_DRIVERS.some(d=>d.id===id&&!d._retired&&!d._temp));
    }
  } else if(_sd){
    app.preqDriverIds=_rls.initialPreqIds89||_rls.initialPreqIds91||_sd.contracted.filter(e=>_sd.teams?.[e[6]]?.pq).map(e=>e[5]).filter(Boolean);
  } else {
    app.preqDriverIds=[];
  }}

  // Reset _initialTeamSizes to reflect the new season's actual contracted roster
  // This prevents ensureAllSeatsFilledBeforeWeekend from using stale 1989 counts
  app._initialTeamSizes={};
  BASE_DRIVERS.filter(d=>d.team!=='Available'&&!d._retired&&!d._temp).forEach(d=>{
    app._initialTeamSizes[d.team]=(app._initialTeamSizes[d.team]||0)+1;
  });

  // 7. Modifier decay for teams with positive acc
  Object.keys(app.teamModifiers||{}).forEach(k=>{
    const v=app.teamModifiers[k];if(v>0){app.teamModifiers[k]=Math.round(v*0.9*100)/100;}
  });
  app.modHistory={drivers:{},teams:{}};

  // 8. Build news
  const endNews={id:'season-end-'+oldSeason,type:'season-end',year:oldSeason,title:`${oldSeason} Season Review`,
    html:buildSeasonEndSummary(oldSeason,newsItems,newSeason)};
  pushNews(endNews);
  app._eos=null;
  // Remove #end-of-season from nav history so Back never returns to EoS
  _navHistory.splice(0,_navHistory.length,..._navHistory.filter(h=>h!=='#end-of-season'));
  saveApp();
  // Navigate back to start
  goHash('#start');
  render();
  showSeasonEndModal(endNews,newSeason);
  }catch(e){
    console.error('eosApplyAndBeginNewSeason error:',e);
    alert('Error starting new season: '+e.message+'. Check browser console for details.');
  }
};

// ── Main renderer for End-of-Season route ─────────────────────────
function renderEndOfSeason(){
  // Only render EoS if the current hash is #end-of-season (prevents spurious re-renders)
  if(window.location.hash!=='#end-of-season'&&!app._eos)return;
  // Initialise state if first visit or null
  if(!app._eos){app._eos=eosInitState();}
  const eos=app._eos;
  // Guard: stagesDone must be a Set (can't survive JSON round-trip as Set — ensure it always is)
  if(!(eos.stagesDone instanceof Set)){
    eos.stagesDone=new Set(Array.isArray(eos.stagesDone)?eos.stagesDone:Object.keys(eos.stagesDone||{}).map(Number).filter(n=>!isNaN(n)));
  }
  const el=document.getElementById('routeProfile');if(!el)return;
  const stageContent=eos.stage===0?eosRenderSettings():eos.stage===1?eosRenderRetirements():eos.stage===2?eosRenderEntrants():eos.stage===3?eosRenderTeamChanges():eos.stage===4?eosRenderMovements():eos.stage===5?eosRenderSignings():eosRenderComplete();
  el.innerHTML=`<div class="card">
    <a class="back-link" href="#start" onclick="event.preventDefault();if(confirm('Exit end-of-season module? Progress is saved.')){app._eos=null;goHash('#start');}">← Cancel & return to game</a>
    <div style="margin:12px 0;display:flex;gap:0;flex-wrap:wrap;border-bottom:1px solid var(--line);padding-bottom:10px">
      ${EOS_STAGES.map((s,i)=>{const done=eos.stagesDone.has(i);const active=eos.stage===i;const future=i>eos.stage&&!done;
        return`<span style="padding:6px 12px;font-size:12px;font-weight:${active?700:400};color:${active?'var(--accent)':done?'#15803d':future?'#cbd5e1':'var(--muted)'};border-bottom:${active?'2px solid var(--accent)':done?'2px solid #86efac':future?'2px solid transparent':'2px solid transparent'};display:inline-block;white-space:nowrap;${active?'':''}user-select:none">${done?'✓ ':active?'▶ ':''}${escapeHtml(s)}</span>`;}).join('')}
    </div>
    <div style="margin-top:16px">${stageContent}</div>
  </div>`;
}
window.renderEndOfSeason=renderEndOfSeason;

// ── Debug: simulate to end of season ──────────────────────────────
function debugSimulateToEndOfSeason(){
  const totalRounds=seasonRules().totalRounds||16;
  const completedRounds=currentSeasonEntries().length;
  if(completedRounds>=totalRounds){alert('Season already complete!');return;}

function eosDebugRunFullEoS(debugLog){
  // Run all EoS stages automatically with sensible defaults
  try{
    if(!app._eos){app._eos=eosInitState();}
    const eos=app._eos;
    eos._debugMode=true;

    // Stage 0: save settings
    if(!eos.stagesDone.has(0)){eos.settings={overrideRetirements:false,allowRandomTeams:false};eos.stagesDone.add(0);eos.stage=1;}

    // Stage 1: retirements — auto-roll
    if(!eos.stagesDone.has(1)){
      eosComputeRetirements();
      eos.retConfirmed=true;eos.stagesDone.add(1);eos.stage=2;
    }

    // Stage 2: new entrants — auto-confirm
    if(!eos.stagesDone.has(2)){
      eosConfirmEntrants();
    }

    // Stage 3: team changes — auto-roll closures if needed, then confirm
    if(!eos.stagesDone.has(3)){
      const gr=eos.gridRules||{maxTeams:19};
      const existingTeams=[...new Set(BASE_DRIVERS.filter(d=>d.team!=='Available'&&!d._retired&&!d._temp).map(d=>d.team))];
      const newCount=(eos.confirmedNewTeams||[]).filter(t=>!existingTeams.includes(t)).length;
      const total=existingTeams.length+newCount;
      if(total>(gr.maxTeams||19)){
        const cl=eosComputeClosures(true); // mandatory only
        eos.closures=cl;
        cl.forEach(t=>debugLog&&debugLog.push(`[${eos.year}→${eos.nextYear}] CLOSE: ${t}`));
      }
      window.eosConfirmTeamChanges();
    }

    // Stage 4: movements — auto-compute and confirm all
    if(!eos.stagesDone.has(4)){
      eosComputeMovements();
      (eos.movements||[]).forEach(m=>{if(m.approved===null)m.approved=true;});
      eos.movementsConfirmed=true;eos.stagesDone.add(4);eos.stage=5;
    }

    // Stage 5: signings — auto-compute and confirm
    if(!eos.stagesDone.has(5)){
      eosComputeSignings();
      eos.rosterConfirmed=true;eos.stagesDone.add(5);eos.stage=6;
    }

    // Stage 6: confirm complete then apply
    if(!eos.stagesDone.has(6)){
      window.eosConfirmComplete();
    }

    // Apply
    window.eosApplyAndBeginNewSeason();
    return true;
  }catch(e){
    if(debugLog)debugLog.push(`ERROR in ${app._eos?.year}→${app._eos?.nextYear} EoS: ${e.message}`);
    console.error('eosDebugRunFullEoS error:',e);
    return false;
  }
}

window.eosDebugNextYear=function(){
  const eos=app._eos;if(!eos)return;
  const targetYear=eos.nextYear;
  const debugLog=[];
  debugLog.push(`[Debug] Applying ${eos.year}→${targetYear} EoS and simulating ${targetYear} season`);
  // Apply EoS (Begin season)
  try{window.eosApplyAndBeginNewSeason();}
  catch(e){alert('Error applying EoS: '+e.message);return;}
  // Simulate the new season
  try{eosDebugSimulateSeason();}
  catch(e){debugLog.push(`Error simulating ${targetYear}: ${e.message}`);}
  // Restart EoS for next year
  app._eos=eosInitState();
  app._eos._debugMode=true;
  app._eos._debugLog=debugLog;

window.eosAutoAdvanceTo2025=function(){
  const targetYear=2025;
  const startYear=app.currentSeason||1989;
  if(startYear>=targetYear){alert(`Already at ${startYear}`);return;}
  if(!confirm(`Auto-advance from ${startYear} to ${targetYear}? This will simulate ${targetYear-startYear} season(s) with random results. This cannot be undone.`))return;
  const debugLog=[`Auto-advance: ${startYear} → ${targetYear}`];
  let currentYear=startYear;
  let maxIter=targetYear-startYear+5; // safety cap
  while(currentYear<targetYear&&maxIter-->0){
    debugLog.push(`[${currentYear}] Simulating season...`);
    // Simulate if season not complete
    try{eosDebugSimulateSeason();}
    catch(e){debugLog.push(`[${currentYear}] Simulate error: ${e.message}`);break;}
    debugLog.push(`[${currentYear}] Running EoS...`);
    const ok=eosDebugRunFullEoS(debugLog);
    if(!ok){debugLog.push(`[${currentYear}] EoS failed — stopping.`);break;}
    currentYear=app.currentSeason;
    debugLog.push(`[${currentYear}] Season started.`);
    saveApp();
  }
  if(currentYear>=targetYear)debugLog.push(`Auto-advance complete! Now in ${currentYear}.`);
  else debugLog.push(`Auto-advance stopped at ${currentYear}.`);
  // Show log
  const logText=debugLog.join('\n');
  console.log(logText);
  alert(`Auto-advance ${currentYear>=targetYear?'complete':'stopped'}.\n\nLog:\n${debugLog.slice(-20).join('\n')}`);
  goHash('#start');render();
};

const RAND_MOD_DRIVER_POS=['Good team morale','New skill','New sponsor'];
const RAND_MOD_DRIVER_NEG=['Bad team morale','Illness','Sponsor trouble'];
const RAND_MOD_TEAM_POS=['Good team morale','Technical breakthrough','Positive testing'];
const RAND_MOD_TEAM_NEG=['Bad team morale','Technical trouble','Poor testing'];

function randMod(){
  // Random modifier ±0.01 to ±0.15, 2dp, not 0
  const sign=Math.random()<0.5?1:-1;
  const mag=Math.round((Math.random()*0.09+0.01)*100)/100;
  return sign*mag;
}
function randChoice(arr){return arr[Math.floor(Math.random()*arr.length)];}

function applyRandomModifiers(isOffseason){
  // Per-race: ~8% chance each driver/team; off-season: ~40%
  const driverProb=isOffseason?0.40:MIDWEEK_DRIVER_PROB;
  const teamProb=isOffseason?0.40:MIDWEEK_TEAM_PROB;
  const items=[];

  BASE_DRIVERS.filter(d=>d.team!=='Available'&&!d._retired).forEach(d=>{
    if(Math.random()<driverProb){
      const delta=randMod();
      applyDriverMod(d.id,delta);
      const reasons=delta>0?RAND_MOD_DRIVER_POS:RAND_MOD_DRIVER_NEG;
      items.push({kind:'driver',id:d.id,name:d.name,delta,reason:randChoice(reasons)});
    }
  });

  const teams=[...new Set(BASE_DRIVERS.filter(d=>d.team!=='Available'&&!d._retired).map(d=>d.team))];
  teams.forEach(t=>{
    if(Math.random()<teamProb){
      const delta=randMod();
      applyTeamMod(t,delta);
      const reasons=delta>0?RAND_MOD_TEAM_POS:RAND_MOD_TEAM_NEG;
      items.push({kind:'team',name:t,delta,reason:randChoice(reasons)});
    }
  });

  return items; // [{kind,name,delta,reason}]
}

function raceNewsChampionship(year,round){
  const _st=seasonStandings(year);
  const _rl=seasonRules().totalRounds-round,_mpl=_rl*10,_mtl=_rl*20;
  const _ld=_st.drivers[0],_nd=_st.drivers[1],_lt=_st.teams[0],_nt=_st.teams[1];
  const parts=[];
  // Only show driver champion message if clinched THIS round (not already clinched in a prior round)
  const _prevSt=round>1?seasonStandings(year):null;
  const _prevLd=_prevSt?.drivers[0],_prevNd=_prevSt?.drivers[1];
  const _prevMpl=(seasonRules().totalRounds-(round-1))*10,_prevMtl=(seasonRules().totalRounds-(round-1))*10;
  const driverAlreadyClinched=_prevLd&&_prevNd&&(_prevLd.championshipPoints-_prevNd.championshipPoints)>_prevMpl;
  const teamAlreadyClinched=_prevSt&&_prevSt.teams[0]&&_prevSt.teams[1]&&(_prevSt.teams[0].championshipPoints-_prevSt.teams[1].championshipPoints)>_prevMtl;
  if(!driverAlreadyClinched&&_ld&&_nd&&(_ld.championshipPoints-_nd.championshipPoints)>_mpl){
    const _ldb=BASE_DRIVERS.find(x=>x.id===_ld.id);
    parts.push(`<h4>🏆 Driver Champion!</h4><p style="font-size:14px">${flagImg(_ld.nation2)} <strong>${_ldb?driverFullName(_ldb):_ld.name}</strong> is the ${year} World Drivers' Champion!</p>`);
  } else if(round>=12&&_ld&&_nd){
    const contenders=_st.drivers.filter(d=>_ld.championshipPoints-d.championshipPoints<=_mpl);
    if(contenders.length>1){
      const rows=contenders.map((d,i)=>{
        const bd=BASE_DRIVERS.find(x=>x.id===d.id);
        return`<tr><td>${i+1}</td><td class="left">${flagImg(d.nation2)} ${escapeHtml(bd?driverFullName(bd):d.name)}</td><td>${d.championshipPoints}</td><td>${_ld.championshipPoints-d.championshipPoints>0?'-'+(_ld.championshipPoints-d.championshipPoints):'—'}</td></tr>`;
      }).join('');
      parts.push(`<h4>🏆 Championship race</h4><table class="small-table"><thead><tr><th>Pos</th><th>Driver</th><th>Pts</th><th>Gap</th></tr></thead><tbody>${rows}</tbody></table>`);
    }
  }
  if(!teamAlreadyClinched&&_lt&&_nt&&(_lt.championshipPoints-_nt.championshipPoints)>_mtl){
    parts.push(`<h4>🏆 Constructors' Champion!</h4><p style="font-size:14px"><strong>${escapeHtml(_lt.name)}</strong> are the ${year} Constructors' Champions!</p>`);
  }
  return parts.join('');
}

function raceNewsMilestones(weekendEntry,year,round){
  const race=weekendEntry.race||[];
  const DRIVER_WIN_MILESTONES=[1,5,25,50,100];
  const DRIVER_POLE_MILESTONES=[1,5,25,50,100];
  const TEAM_RACE_MILESTONES=[1,50,100,150,200,250,300];
  const TEAM_WIN_MILESTONES=[1,25,50,100,150,200,250];
  const milestones=[];
  const priorWeekends=app.history.weekends.filter(w=>w.weekendKey!==weekendEntry.weekendKey);
  function priorDriverStats(id){
    let wins=0,poles=0;
    priorWeekends.forEach(w=>{
      if(w.race.find(r=>r.id===id&&r.position===1))wins++;
      if(w.qualifying.find(q=>q.id===id&&q.pole))poles++;
    });
    return{wins,poles};
  }
  function priorTeamStats(team){
    let starts=0,wins=0;
    priorWeekends.forEach(w=>{
      if(w.race.some(r=>r.team===team))starts++;
      if(w.race.find(r=>r.team===team&&r.position===1))wins++;
    });
    return{starts,wins};
  }
  race.forEach(r=>{
    if(!r.id)return;
    const career=driverCareer(r.id);const st=career.stats;
    const prior=priorDriverStats(r.id);
    const bd=BASE_DRIVERS.find(x=>x.id===r.id);const nm=bd?driverFullName(bd):r.driver;
    if(DRIVER_WIN_MILESTONES.includes(st.wins)&&prior.wins<st.wins)
      milestones.push(`${flagImg(r.nation2)} ${escapeHtml(nm)}: ${st.wins===1?'First win':st.wins+' wins'}`);
    if(DRIVER_POLE_MILESTONES.includes(st.poles)&&prior.poles<st.poles)
      milestones.push(`${flagImg(r.nation2)} ${escapeHtml(nm)}: ${st.poles===1?'First career pole':st.poles+' career poles'}`);
  });
  const teamsThisRace=[...new Set(race.map(r=>r.team))];
  teamsThisRace.forEach(team=>{
    const tc=teamCareer(team);const ts=tc.stats;
    const prior=priorTeamStats(team);
    if(TEAM_RACE_MILESTONES.includes(ts.starts)&&prior.starts<ts.starts&&!(ts.starts===1&&round===1))
      milestones.push(`${escapeHtml(team)}: ${ts.starts===1?'First entry':ts.starts+' races'}`);
    if(TEAM_WIN_MILESTONES.includes(ts.wins)&&prior.wins<ts.wins)
      milestones.push(`${escapeHtml(team)}: ${ts.wins===1?'First win':ts.wins+' wins'}`);
  });
  if(!milestones.length)return'';
  return`<h4>🎖 Milestones</h4><ul>${milestones.map(m=>`<li>${m}</li>`).join('')}</ul>`;
}

function raceNewsTeamChanges(weekendEntry,round){
  const items=[];

  // ── Temporary replacements (injury/suspension) ────────────────────────
  if(app.driverInjuries){
    Object.entries(app.driverInjuries).forEach(([id,inj])=>{
      if(inj.fromRound!==round||!inj.impact)return;
      const d=BASE_DRIVERS.find(x=>x.id===Number(id));
      if(!d)return;
      const isSusp=inj.impact==='Suspension'||inj.cause==='suspension';
      const contractEntry=Object.entries(app._activeContracts||{}).find(([faId,c])=>c.replacingId===Number(id));
      const fa=contractEntry?BASE_DRIVERS.find(x=>x.id===Number(contractEntry[0])):null;
      const replStr=fa?` Replaced by <strong>${escapeHtml(driverFullName(fa))}</strong>.`:'';
      if(isSusp){
        // Suspension: clean format
        items.push(`<li>${flagImg(d.nation2)} <strong>${escapeHtml(teamDisplayName(d.team)||d.team)}</strong> — <strong>${escapeHtml(driverFullName(d))}</strong> suspended for the next race.${replStr}</li>`);
      } else {
        // Injury
        let duration;
        if(inj.missRaces==='career'){duration='career-ending injury!';}
        else if(inj.missRaces==='season'){duration='out for the season due to injury!';}
        else{
          const mr=Number(inj.missRaces)||1;
          const racesRemaining=seasonRules().totalRounds-(inj.fromRound||round);
          if(mr>=racesRemaining){duration='out until end of season due to injury!';}
          else{duration=`out for next ${mr} race${mr===1?'':'s'} due to injury.`;}
        }
        items.push(`<li>${flagImg(d.nation2)} <strong>${escapeHtml(teamDisplayName(d.team)||d.team)}</strong> — <strong>${escapeHtml(driverFullName(d))}</strong> ${escapeHtml(duration)}${replStr}</li>`);
      }
    });
  }

  // ── Permanent changes (firings and quits + replacements) ─────────────────
  if(weekendEntry._firedNews&&weekendEntry._firedNews.length){
    weekendEntry._firedNews.forEach(f=>{
      const isQuit=f.action==='quit';
      const actionLabel=isQuit?'has quit the team!':'has been fired!';
      const reasonLabel=(!isQuit&&f.reason==='rivalry')?' (rivalry)':'';
      let line=`<li>${flagImg(f.nation2||'')} <strong>${escapeHtml(teamDisplayName(f.team))}</strong> — <strong>${escapeHtml(f.originalName)}</strong> ${actionLabel}${reasonLabel}`;
      if(f.replacementName)line+=` Replaced by <strong>${escapeHtml(f.replacementName)}</strong>.`;
      line+='</li>';
      items.push(line);
    });
  }

  // ── Contract expirations (driver returns) from _movementNews ──────────
  const teamReturnItems=(weekendEntry._movementNews||[]).filter(n=>n.startsWith('📋TEAMRETURN:'));
  teamReturnItems.forEach(n=>items.push(`<li>${n.replace('📋TEAMRETURN:','')}</li>`));

  if(!items.length)return'';
  return`<h4>📋 Team news</h4><ul>${items.join('')}</ul>`;
}

  const all=[...(weekendEntry._rivalryNews||[])];
  // Also pull fired/replaced rivalry items from movement news
  const firedRivalry=(weekendEntry._movementNews||[]).filter(n=>n.includes('rivalry'));
  all.push(...firedRivalry);
  if(!all.length)return'';
  // Group by type
  const newRiv=all.filter(n=>n.includes('New rivalry'));
  const escalates=all.filter(n=>n.includes('Rivalry escalates'));
  const ends=all.filter(n=>n.includes('Rivalry ends'));
  const other=all.filter(n=>!n.includes('New rivalry')&&!n.includes('Rivalry escalates')&&!n.includes('Rivalry ends'));
  const grouped=[...newRiv,...escalates,...ends,...other];
  return`<h4>⚔ Rivalry news</h4><ul>${grouped.map(n=>`<li>${n}</li>`).join('')}</ul>`;
}

function rollInjury(){const r=Math.random();let c=0;for(const row of INJURY_TABLE){c+=row.prob;if(r<c)return row;}return null;}
function applyInjury(id,row,round){
  if(!app.driverInjuries)app.driverInjuries={};
  app.driverInjuries[id]={impact:row.impact,result:row.result,fromRound:round,missRaces:row.missRaces,career:row.missRaces==='career'};
  if(row.mod0!==0)applyDriverMod(id,row.mod0);
}
function recordDriverIncident(id,type,details){
  if(!app.driverIncidents)app.driverIncidents={};
  if(!app.driverIncidents[id])app.driverIncidents[id]=[];
  // Round: use currentSeasonEntries().length + 1 since the race isn't saved yet
  const round=currentSeasonEntries().length+1;
  const year=app.currentSeason||1989;
  const _sess=app.currentWeekend?.session||'race';
  const sessLabel=_sess==='prequalifying'?'PQ':_sess==='qualifying'?'Q':'R';
  app.driverIncidents[id].push({type,year,round,session:sessLabel,details,ts:Date.now()});
}

function injuryLogMsg(id,row,round){
  const name=BASE_DRIVERS.find(d=>d.id===id)?.name||'Driver';
  const impact=row.impact;
  if(row.missRaces==='career')return `${impact}: ${escapeHtml(name)} career-ending injury.`;
  if(row.missRaces==='season')return `${impact}: ${escapeHtml(name)} injured for remainder of season.`;
  const totalRounds=seasonCalendar().length; // 16
  const racesLeft=totalRounds-round; // races after this one
  if(row.missRaces>=racesLeft)return `${impact}: ${escapeHtml(name)} injured until end of season.`;
  return `${impact}: ${escapeHtml(name)} injured for next ${row.missRaces} race${row.missRaces>1?'s':''}.`;
}
function isDriverInjured(id,round){
  const inj=app.driverInjuries&&app.driverInjuries[id];
  if(!inj)return false;
  if(inj.career)return true;
  if(inj.missRaces==='season')return true;
  // Injury applied at end of fromRound; driver misses the NEXT missRaces rounds
  return round>inj.fromRound&&round<=inj.fromRound+inj.missRaces;
}
function INJURY_CHANCE(){return Math.random()<0.005;}
function SUSPENSION_CHANCE(){return Math.random()<0.005;}

// Write a 1-race suspension to driverInjuries state (mirrors applyInjury)
// and queue a replacement. Returns a log message string.
function applySuspension(id,round){
  if(!app._movementRules?.suspensions)return `🚩 ${escapeHtml(BASE_DRIVERS.find(x=>x.id===id)?.name||'Driver')} — suspension (disabled by options).`;
  if(!app.driverInjuries)app.driverInjuries={};
  app.driverInjuries[id]={impact:'Suspension',result:'1-race ban',fromRound:round,missRaces:1,career:false,cause:'suspension'};
  recordDriverIncident(id,'suspension',{gp:app.currentWeekend?.raceMeta?.gp,round});
  const d=BASE_DRIVERS.find(x=>x.id===id);
  if(d&&d.team&&d.team!=='Available'){
    const _taken=BASE_DRIVERS.map(x=>x.id);
    const _repl=findReplacement(d.team,_taken,false);
    if(_repl){hireReplacement(_repl,d.team,1,id);}
  }
  // Return string for race log only — Team news section handles the full suspension report
  const nm=d?driverFullName(d):BASE_DRIVERS.find(x=>x.id===id)?.name||'Driver';
  return `🚩 <strong>${escapeHtml(nm)}</strong> receives a 1-race ban.`;
}

// ── COMPARATORS ───────────────────────────────────────────────────────────
function compareQuali(a,b){
  if(b.totalNumeric!==a.totalNumeric)return b.totalNumeric-a.totalNumeric;
  for(const v of[6,5,4,3]){if((b.counts[v]||0)!==(a.counts[v]||0))return(b.counts[v]||0)-(a.counts[v]||0);}
  return a.base.listOrder-b.base.listOrder;
}
function compareRaceActive(a,b){
  if(b.totalNumeric!==a.totalNumeric)return b.totalNumeric-a.totalNumeric;
  if((b.counts[6]||0)!==(a.counts[6]||0))return(b.counts[6]||0)-(a.counts[6]||0);
  if((b.counts[5]||0)!==(a.counts[5]||0))return(b.counts[5]||0)-(a.counts[5]||0);
  return a.gridPos-b.gridPos; // higher grid position (lower number) wins
}
function compareInactive(a,b){
  if((b.incidentLap||0)!==(a.incidentLap||0))return(b.incidentLap||0)-(a.incidentLap||0);
  if((b.incidentRoll||0)!==(a.incidentRoll||0))return(b.incidentRoll||0)-(a.incidentRoll||0);
  return a.gridPos-b.gridPos;
}
function currentSeasonEntries(){return app.history.weekends.filter(w=>w.raceMeta.year===app.currentSeason);}
function nextRoundIndex(){return currentSeasonEntries().length;}
